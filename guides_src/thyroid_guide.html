<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦋 갑상선 통합 처방가이드</title>
<style>
:root{
  /* 갑상선 테마: teal 계열(초음파 모니터 톤) */
  --teal:#0d7377; --teal-d:#095457; --teal-l:#14a085;
  --indigo:#4a5899; --indigo-l:#6b7bc4;     /* 결절축 */
  --amber:#e89611; --red:#d6455d; --green:#1f9e6b;
  --bg:#f5f8f9; --card:#ffffff; --ink:#1a2629; --sub:#5b6b70; --line:#e1ebed;
  --gradeA:#1f9e6b; --gradeB:#e89611; --gradeC:#8896a0;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo",sans-serif;
  background:var(--bg);color:var(--ink);line-height:1.5;font-size:14px;-webkit-text-size-adjust:100%}
.mono{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-variant-numeric:tabular-nums}
.wrap{max-width:780px;margin:0 auto;padding:0 14px 60px}

/* 헤더 */
header{background:linear-gradient(135deg,var(--teal) 0%,var(--teal-d) 100%);color:#fff;
  padding:18px 14px 14px;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(13,115,119,.18)}
header .h-in{max-width:780px;margin:0 auto}
header h1{font-size:18px;font-weight:700;letter-spacing:-.3px}
header .sub{font-size:11.5px;opacity:.85;margin-top:2px}

/* 탭 */
.tabs{display:flex;gap:6px;margin-top:12px}
.tab{flex:1;padding:9px;text-align:center;background:rgba(255,255,255,.14);color:#fff;
  border:none;border-radius:9px 9px 0 0;font-size:14px;font-weight:600;cursor:pointer;transition:.15s}
.tab.active{background:var(--bg);color:var(--teal-d)}
.tab.nodule.active{color:var(--indigo)}

/* 입력 패널 */
.panel{background:var(--card);border-radius:0 0 14px 14px;padding:14px;margin-bottom:14px;
  box-shadow:0 1px 8px rgba(0,0,0,.05)}
.field{margin-bottom:11px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--sub);margin-bottom:4px}
.field input,.field select{width:100%;padding:8px 10px;border:1.5px solid var(--line);border-radius:8px;
  font-size:14px;background:#fbfdfd}
.field input:focus,.field select:focus{outline:none;border-color:var(--teal-l)}
.row{display:flex;gap:8px}.row>.field{flex:1}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.chip{padding:6px 11px;border:1.5px solid var(--line);border-radius:18px;font-size:12.5px;
  cursor:pointer;background:#fbfdfd;user-select:none}
.chip.on{background:var(--teal);color:#fff;border-color:var(--teal)}
.seg{display:flex;border:1.5px solid var(--line);border-radius:8px;overflow:hidden}
.seg button{flex:1;padding:8px;border:none;background:#fbfdfd;font-size:13px;cursor:pointer}
.seg button.on{background:var(--indigo);color:#fff}
.btn-run{width:100%;padding:12px;background:var(--teal);color:#fff;border:none;border-radius:10px;
  font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}
.btn-run:active{background:var(--teal-d)}
.nodule-mode .btn-run{background:var(--indigo)}

/* 결과 카드 */
.result{margin-top:4px}
.card{background:var(--card);border-radius:12px;margin-bottom:11px;overflow:hidden;
  box-shadow:0 1px 6px rgba(0,0,0,.05);border-left:4px solid var(--teal)}
.card.nodule{border-left-color:var(--indigo)}
.card.warn{border-left-color:var(--amber)}
.card.danger{border-left-color:var(--red)}
.card-h{padding:11px 13px;font-weight:700;font-size:14px;display:flex;align-items:center;gap:7px}
.card-b{padding:0 13px 12px}

/* 권고등급 배지 */
.grade{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;
  padding:0 5px;border-radius:5px;font-size:11px;font-weight:800;color:#fff}
.grade.A{background:var(--gradeA)}.grade.B{background:var(--gradeB)}.grade.C{background:var(--gradeC)}
.orig{font-size:10.5px;color:var(--sub);margin-left:4px}

/* 약물/타겟 행 */
.drug-row{display:flex;align-items:flex-start;gap:9px;padding:9px 0;border-top:1px solid var(--line)}
.drug-row:first-child{border-top:none}
.rank{min-width:22px;height:22px;border-radius:6px;background:var(--teal-l);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.drug-main{flex:1}
.drug-name{font-weight:600;font-size:14px}
.drug-meta{font-size:12px;color:var(--sub);margin-top:2px}
.drug-dose{font-size:12.5px;background:#eef6f6;padding:4px 8px;border-radius:6px;margin-top:4px;display:inline-block}

/* flag */
.flag{display:flex;gap:7px;padding:8px 10px;border-radius:8px;font-size:12.5px;margin-top:7px;align-items:flex-start}
.flag.info{background:#eef4f6;color:#2d5560}
.flag.caution{background:#fdf3e3;color:#8a5a00}
.flag.warning{background:#fceb ee;color:#9c2740;background:#fcebee}
.flag.referral{background:#eae8f7;color:#3a3d7a;font-weight:600}

/* 분류(K-TIRADS/Bethesda) */
.cls{display:flex;align-items:center;gap:9px;padding:10px;border-radius:9px;margin-bottom:7px}
.cls-k5{background:#fbe9ec;color:#a01b34}.cls-k4{background:#fdf0e0;color:#8a5200}
.cls-k3{background:#fdf8e3;color:#7a6500}.cls-k2{background:#e8f5ec;color:#1a6b42}
.cls-badge{font-weight:800;font-size:15px;min-width:38px}
.cls-mal{margin-left:auto;font-size:12px;font-weight:600}

/* details 접기 */
details{margin-top:8px;border-top:1px solid var(--line);padding-top:8px}
details summary{cursor:pointer;font-size:12.5px;font-weight:600;color:var(--teal-d);list-style:none}
details summary::-webkit-details-marker{display:none}
details summary::before{content:"▸ ";color:var(--teal-l)}
details[open] summary::before{content:"▾ "}
details .det-body{padding:8px 2px 2px;font-size:12.5px;color:var(--sub);line-height:1.6}

/* 균형정보(가이드라인↔급여) */
.balance{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border-radius:8px;overflow:hidden;margin-top:6px}
.balance>div{background:#fff;padding:9px}
.balance .bh{font-size:11px;font-weight:700;color:var(--sub);margin-bottom:3px}
.balance .gl{border-top:2px solid var(--teal-l)}
.balance .rb{border-top:2px solid var(--amber)}
.conflict{grid-column:1/3;background:#fff8ec;padding:8px 9px;font-size:12px;color:#7a5200}

/* 비교표 */
.cmp{width:100%;border-collapse:collapse;font-size:12px;margin-top:6px}
.cmp th,.cmp td{border:1px solid var(--line);padding:6px 8px;text-align:left;vertical-align:top}
.cmp th{background:#eef6f6;font-size:11px}
.cmp td:first-child{font-weight:600;width:22%}

/* KCD */
.kcd-item{border:1px solid var(--line);border-radius:8px;padding:9px;margin-bottom:7px}
.kcd-code{display:inline-block;background:var(--teal);color:#fff;padding:2px 8px;border-radius:5px;
  font-weight:700;font-size:12px;margin-right:6px}
.kcd-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.tag{font-size:11px;padding:2px 7px;border-radius:10px;background:#eef4f6;color:var(--sub)}

/* 출처 */
.refs{margin-top:18px;padding:14px;background:#eef3f4;border-radius:12px;font-size:11.5px}
.refs h3{font-size:13px;margin-bottom:8px;color:var(--teal-d)}
.refs .rgrp{margin-bottom:10px}
.refs .rgrp b{display:block;font-size:11px;color:var(--sub);margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px}
.refs a{color:var(--teal);text-decoration:none;word-break:break-all}
.refs li{list-style:none;margin-bottom:4px;line-height:1.45}

.sec-title{font-size:13px;font-weight:700;color:var(--sub);margin:18px 0 8px;padding-left:2px}
.empty{text-align:center;padding:40px 20px;color:var(--sub);font-size:13px}
.disclaimer{font-size:11px;color:var(--sub);text-align:center;margin-top:14px;line-height:1.5;padding:0 10px}
/* ===== 도서관 ===== */
.badge-main{font-size:9px;background:#fff;color:var(--teal-d);border-radius:4px;padding:1px 4px;margin-left:4px;font-weight:800;vertical-align:super}
.lib-intro{font-size:12.5px;color:var(--sub);background:#eef6f6;padding:11px 13px;border-radius:10px;margin-bottom:11px;line-height:1.5}
.lib-search input{width:100%;padding:11px 13px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;background:#fff;margin-bottom:9px}
.lib-search input:focus{outline:none;border-color:var(--teal-l)}
.lib-filter{display:flex;gap:6px;margin-bottom:13px;flex-wrap:wrap}
.lf{padding:7px 13px;border:1.5px solid var(--line);border-radius:18px;background:#fff;font-size:12.5px;cursor:pointer;font-weight:600;color:var(--sub)}
.lf.on{background:var(--teal);color:#fff;border-color:var(--teal)}
.lib-hint{font-size:12px;color:var(--sub);background:#f0f5f6;padding:9px 12px;border-radius:9px;margin:12px 0}

.libcard{background:var(--card);border-radius:12px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.05);border-left:4px solid var(--line)}
.libcard[data-cat="pay"]{border-left-color:var(--amber)}
.libcard[data-cat="clin"]{border-left-color:var(--teal)}
.libcard[data-cat="care"]{border-left-color:var(--indigo)}
.libcard-head{width:100%;display:flex;align-items:center;gap:11px;padding:13px;background:none;border:none;cursor:pointer;text-align:left}
.lc-icon{font-size:22px;flex-shrink:0}
.lc-tt{flex:1;min-width:0}
.lc-title{display:block;font-weight:700;font-size:14.5px;color:var(--ink)}
.lc-sub{display:block;font-size:11.5px;color:var(--sub);margin-top:2px}
.lc-cat{font-size:10px;font-weight:700;color:#fff;padding:2px 8px;border-radius:10px;flex-shrink:0}
.lc-arrow{font-size:20px;color:var(--sub);transition:transform .2s;flex-shrink:0}
.libcard.open .lc-arrow{transform:rotate(90deg)}
.libcard-body{padding:0 13px 13px;border-top:1px solid var(--line)}
.lib-sec{margin-top:13px}

.sh{font-weight:700;font-size:13.5px;color:var(--teal-d);margin-bottom:6px}
.snote{font-size:11.5px;color:var(--sub);margin-bottom:6px;line-height:1.5}
.kp{list-style:none;padding:0}
.kp li{position:relative;padding:5px 0 5px 16px;font-size:13px;line-height:1.5;border-bottom:1px solid #f0f4f5}
.kp li:before{content:"▪";position:absolute;left:2px;color:var(--teal-l)}
.kp li:last-child{border-bottom:none}

.minicards{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mc{background:#f7fafb;border-radius:9px;padding:9px;border:1px solid var(--line)}
.mc.danger{background:#fcebee;border-color:#f3c6cf}
.mch{font-weight:700;font-size:12.5px;margin-bottom:3px}
.mcb{font-size:11.5px;color:var(--sub);line-height:1.45}

.ladder-l{display:flex;flex-direction:column;gap:7px}
.lr{display:flex;gap:10px;align-items:flex-start;background:#f7fafb;border-radius:9px;padding:9px}
.lr.danger{background:#fcebee}
.ln{min-width:22px;height:22px;border-radius:6px;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.lr.danger .ln{background:var(--red)}
.lh{font-weight:600;font-size:13px}
.lb{font-size:11.5px;color:var(--sub);margin-top:2px;line-height:1.45}

.dtable{width:100%;border-collapse:collapse;font-size:12px;margin-top:4px}
.dtable th,.dtable td{border:1px solid var(--line);padding:6px 8px;text-align:left;vertical-align:top}
.dtable th{background:#eef6f6;font-size:11px;font-weight:700}
.dtable td:first-child{font-weight:600}
.codetable .code-cell{font-family:ui-monospace,monospace;font-weight:700;color:var(--teal-d);white-space:nowrap}
.codetable .code-note{font-size:11px;color:var(--sub)}

/* drugclass 펼침 */
.dcclass{border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-top:4px}
.dcclass-head{width:100%;display:flex;align-items:center;gap:8px;padding:11px;background:#f7fafb;border:none;cursor:pointer;text-align:left;flex-wrap:wrap}
.dcc-title{font-weight:700;font-size:13.5px;flex:1 1 100%}
.dcc-eff{font-size:11.5px;color:var(--sub);flex:1 1 70%}
.dcc-cnt{font-size:10px;background:var(--teal);color:#fff;padding:2px 7px;border-radius:9px;font-weight:700}
.dcc-arrow{font-size:18px;color:var(--sub);transition:transform .2s}
.dcclass.open .dcc-arrow{transform:rotate(90deg)}
.dcclass-body{padding:11px}
.drugclass-box{display:flex;flex-direction:column;gap:1px;background:var(--line);border-radius:8px;overflow:hidden;margin-bottom:10px}
.dc-row{display:flex;background:#fff;padding:7px 9px;gap:9px}
.dc-k{font-size:11px;font-weight:700;color:var(--sub);min-width:42px;flex-shrink:0}
.dc-v{font-size:12px;line-height:1.45}
.dc-ae .dc-k{color:var(--red)}.dc-contra .dc-k{color:#a0344a}
.dc-reimb{background:#fffaf0}.dc-reimb .dc-k{color:var(--amber)}
.memlist{margin-top:4px}
.mem-h{font-size:11px;font-weight:700;color:var(--sub);margin-bottom:6px}
.memcard{background:#f7fafb;border-radius:9px;padding:9px;margin-bottom:7px;border:1px solid var(--line)}
.mem-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.mem-nm{font-weight:700;font-size:13px}
.mem-brand{font-size:11px;color:var(--sub);background:#fff;padding:1px 7px;border-radius:8px;border:1px solid var(--line)}
.mem-tip{font-size:11.5px;color:#3a5560;margin-top:5px;line-height:1.5}
.mem-stop{font-size:11.5px;margin-top:5px;padding:5px 8px;background:#fff4e6;border-radius:7px;color:#8a5200}
.mem-stop.hard{background:#fcebee;color:#9c2740;font-weight:600}
.stop-lbl{font-weight:700;margin-right:5px}

/* ===== 인터랙티브 진단 알고리듬 ===== */
.algo{background:#f7fbfb;border:1.5px solid var(--teal-l);border-radius:12px;padding:13px;margin-top:4px}
.algo-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
.algo-ttl{font-weight:700;font-size:13.5px;color:var(--teal-d)}
.algo-reset{font-size:11px;background:#fff;border:1px solid var(--line);border-radius:7px;padding:4px 9px;cursor:pointer;color:var(--sub)}
.algo-crumb{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.crumb{font-size:11px;background:var(--teal);color:#fff;padding:3px 9px;border-radius:11px;position:relative}
.crumb:not(:last-child):after{content:"›";margin-left:5px;opacity:.6}
.algo-q{font-weight:700;font-size:14.5px;margin-bottom:4px;color:var(--ink)}
.algo-hint{font-size:11.5px;color:var(--sub);margin-bottom:10px;line-height:1.5;background:#eef6f6;padding:7px 10px;border-radius:7px}
.algo-opts{display:flex;flex-direction:column;gap:7px}
.algo-opt{display:flex;align-items:center;justify-content:space-between;gap:8px;width:100%;
  background:#fff;border:1.5px solid var(--teal-l);border-radius:9px;padding:12px 13px;
  font-size:13.5px;font-weight:600;color:var(--ink);cursor:pointer;text-align:left;transition:.12s}
.algo-opt:active{background:var(--teal);color:#fff}
.opt-arrow{color:var(--teal-l);font-weight:700;flex-shrink:0}
.algo-opt:active .opt-arrow{color:#fff}
.algo-back{margin-top:9px;font-size:12px;background:none;border:none;color:var(--sub);cursor:pointer;padding:4px}

/* 결과 노드 — 톤별 색상 */
.algo-res{border-radius:10px;padding:12px;border-left:4px solid var(--teal)}
.res-treat{background:#e9f6f0;border-left-color:var(--green)}
.res-observe{background:#eef4f6;border-left-color:var(--teal)}
.res-selflimit{background:#fef6e8;border-left-color:var(--amber)}
.res-branch{background:#eef0fb;border-left-color:var(--indigo)}
.res-refer{background:#fceef0;border-left-color:var(--red)}
.res-normal{background:#eef4f6;border-left-color:var(--teal-l)}
.res-caution{background:#fdf3e3;border-left-color:var(--amber)}
.res-dx{font-weight:800;font-size:16px;margin-bottom:5px}
.res-sum{font-size:12.5px;color:var(--sub);line-height:1.5;margin-bottom:7px}
.res-flag{font-size:12px;font-weight:700;color:#9c2740;background:#fff;padding:6px 9px;border-radius:7px;margin-bottom:8px;display:inline-block}
.res-adv{list-style:none;padding:0;margin:0 0 9px}
.res-adv li{position:relative;padding:4px 0 4px 15px;font-size:12.5px;line-height:1.5}
.res-adv li:before{content:"▸";position:absolute;left:0;color:var(--teal-l)}
.res-lib{font-size:12px;background:var(--teal);color:#fff;border:none;border-radius:8px;padding:8px 12px;cursor:pointer;font-weight:600}
.res-lib:active{background:var(--teal-d)}
</style>
</head>
<body>
<header>
  <div class="h-in">
    <h1>🦋 갑상선 통합 처방가이드</h1>
    <div class="sub">대한갑상선학회 권고안 2023-2024 · 심평원 급여기준 · 조언 도구</div>
    <div class="tabs">
      <button class="tab lib active" onclick="switchTab('lib')">📚 도서관<span class="badge-main">주</span></button>
      <button class="tab func" onclick="switchTab('func')">⚕️ 기능이상</button>
      <button class="tab nodule" onclick="switchTab('nodule')">🔬 결절·종양</button>
    </div>
  </div>
</header>

<div class="wrap" id="app"></div>

<script>
/* ===== 인라인 주입 지점 (조립 시 DATA/ENGINE/CONTENT/LABEL이 여기 삽입) ===== */
/* === grade_norm === */
/* ============================================================
   권고등급 정규화 (grade_norm.js) v1.0
   각 학회 가이드라인 고유 등급 → 통합 표준 grade_norm(A/B/C) 매핑.
   relation_layer.json 표준과 정렬. 원본 등급은 항상 보존(recLevelOrig).
   정렬 키: grade_rank(1,2,3 추천순위) 1차 + grade_norm(A>B>C) 보조.
   ============================================================ */

/* 학회별 등급 → grade_norm 매핑 사전 */
var GRADE_MAP = {
  // 대한갑상선학회 결절·분화암 권고수준 (1~4)
  "recsys:kta_nodule_1to4": {
    "1": { norm:"A", rank:1, label:"강력히 권고" },
    "2": { norm:"B", rank:2, label:"일반적으로 권고" },
    "3": { norm:"C", rank:3, label:"전문가 합의" },
    "4": { norm:"C", rank:4, label:"권고 보류" },
    // 복합 등급: 상위 채택
    "1/2": { norm:"A", rank:1, label:"권고(상위)" },
    "2/3": { norm:"B", rank:2, label:"권고" },
    "3/2": { norm:"B", rank:2, label:"권고" }
  },
  // 기능이상 GRADE 기반
  "recsys:kta_func_grade": {
    "강함/높음":   { norm:"A", rank:1, label:"강한 권고·높은 근거" },
    "강함/중등도": { norm:"A", rank:1, label:"강한 권고·중등도 근거" },
    "약함/낮음":   { norm:"C", rank:3, label:"약한 권고·낮은 근거" },
    "전문가합의":  { norm:"C", rank:3, label:"전문가 합의" }
  }
};

/* 등급 정규화: (recSys, recLevel원본) → {grade_norm, grade_rank, recLevelOrig, label} */
function normalizeGrade(recSys, recLevel){
  var m = GRADE_MAP[recSys];
  var hit = m && m[recLevel];
  if(!hit){
    // 미정의: 첫 토큰 시도
    var first = String(recLevel).split("/")[0];
    hit = m && m[first];
  }
  if(!hit) return { grade_norm:"C", grade_rank:9, recLevelOrig:recLevel, label:String(recLevel), recSys:recSys };
  return {
    grade_norm: hit.norm,
    grade_rank: hit.rank,
    recLevelOrig: recLevel,   // 원본 등급 보존 (체계 무손상)
    label: hit.label,
    recSys: recSys
  };
}

/* 정렬 비교자: grade_rank 오름차순(1=최우선), 동률 시 grade_norm A>B>C */
var NORM_ORDER = { "A":0, "B":1, "C":2 };
function gradeCompare(a, b){
  var ra = a.grade_rank!=null?a.grade_rank:9, rb = b.grade_rank!=null?b.grade_rank:9;
  if(ra!==rb) return ra-rb;
  return (NORM_ORDER[a.grade_norm]||9) - (NORM_ORDER[b.grade_norm]||9);
}

   갑상선 통합 가이드 — ENGINE 레이어 (engine.js) v2.2
   스펙 v2.2. 단일 정문: recommend(patient) → {drugs,targets,flags,classifications}
   원칙: DATA 참조만, 하드코딩 금지.
   권고등급: grade_norm.js 표준(A/B/C + rank) 사용. 자체 sortKey 폐기.
   가이드라인 ID: GL-thyroid-{sch|hyper|nodule|dtc} (relation_layer 정렬).

var _G = { normalizeGrade: normalizeGrade, gradeCompare: gradeCompare };
var normalizeGrade = _G.normalizeGrade, gradeCompare = _G.gradeCompare;

/* 권고등급 객체 생성 헬퍼: recSys+원본등급 → 정규화 + 표시필드 */
function grade(recSys, recLevel){
  return normalizeGrade(recSys, recLevel);
}

/* ---------- 유틸: flag 생성 ---------- */
function mkFlag(level, msg, ref){ return { level:level, msg:msg, ref:ref||null }; }

/* ---------- 기능이상 축 정문 ---------- */
function recommendFunc(patient, F){
  // F = func_data 모듈
  var out = { drugs:[], targets:[], flags:[], classifications:[] };
  var tsh = patient.tsh, ft4 = patient.free_t4, age = patient.age;
  var upper = F.TSH_REF.upperDefault;

  // TSH 기기차이 flag 상시
  out.flags.push(mkFlag("info", F.TSH_REF.assayFlag, F.TSH_REF.id));

  // --- 기능상태 분류 ---
  var state = null;
  if(tsh==null){ /* 입력없음 */ }
  else if(tsh > upper){
    state = (ft4!=null && ft4 < patient.ft4_low) ? "overt_hypo" : "subclinical_hypo";
  } else if(tsh < F.TSH_REF.lowerDefault){
    if(ft4!=null && ft4 > patient.ft4_high) state="overt_hyper";
    else if(patient.t3_high) state="t3_toxicosis";
    else state="subclinical_hyper";
  } else state="euthyroid";

  if(state){
    out.classifications.push({
      id:"thyroid:func:state", value:state,
      label: F.FUNCTION_CLASSIFY.states[state] ? F.FUNCTION_CLASSIFY.states[state].label : state
    });
  }

  // --- SCH 치료판정 (2023 권고안: 추적관찰 1차, 치료는 조건부) ---
  if(state==="subclinical_hypo"){
    var sch = F.SCH_RULES;
    var tsh = patient.tsh;
    var isSevere = (tsh!=null && tsh > sch.severity.severeCut); // >10
    // 진행 위험인자 수집 (입력 기반)
    var risks = [];
    if(isSevere) risks.push("중증 (TSH > 10.0)");
    if(patient.tsh_rising) risks.push("추적 시 TSH 지속 상승");
    if(patient.tpo_positive) risks.push("TPO 항체 양성/자가면역 소견");
    if(patient.female) risks.push("여성");
    if(patient.lobectomy) risks.push("갑상선엽절제술 과거력");
    if(patient.neck_radiation) risks.push("경부 방사선 병력");

    // 적극 치료군: 임신/가임여성(계획)/진행 뚜렷
    var activeGroup = patient.pregnant || patient.pregnancy_planning || patient.overt_progression;

    if(activeGroup){
      var act = sch.activeTreatmentGroup;
      out.drugs.push({ drugId:act.drug, rank:1, recSys:sch.recSys, recLevel:act.recLevel,
        g:grade(sch.recSys, act.recLevel), note:"적극 치료군: "+act.conditions.join("·"), source:act.ref });
      if(patient.pregnant||patient.pregnancy_planning)
        out.flags.push(mkFlag("caution", act.pregnancyNote, act.ref));
    } else if(age!=null && age >= sch.ageThreshold){
      // 노인: 보수적 추적 원칙
      var b=sch.branches.elderly;
      out.targets.push({ id:b.id, value:"1차: "+b.action, recSys:sch.recSys, recLevel:b.recLevel,
        g:grade(sch.recSys, b.recLevel), note:b.reason, source:b.ref });
      out.flags.push(mkFlag("caution", "고령 SCH는 처방 없이 검사만 추적이 원칙 — LT4 과치료 시 심방세동·골다공증 위험", b.ref));
    } else {
      // 성인(<70): 추적관찰 1차
      var ad=sch.branches.adult;
      out.targets.push({ id:"thyroid:rule:sch_recheck", value:"1차: "+sch.firstStep.action,
        recSys:sch.recSys, recLevel:sch.firstStep.recLevel,
        g:grade(sch.recSys, sch.firstStep.recLevel),
        note:sch.firstStep.addLab, source:sch.ref });
      // 위험인자 있으면 치료 '고려' (자동 1차 아님)
      if(risks.length){
        out.targets.push({ id:ad.treatConsider.drug, value:"치료 고려: LT4 (위험인자 충족 시)",
          recSys:sch.recSys, recLevel:ad.treatConsider.recLevel,
          g:grade(sch.recSys, ad.treatConsider.recLevel),
          note:"해당 위험인자: "+risks.join(", "), source:ad.ref });
        out.flags.push(mkFlag("info", "진행 위험인자 존재 → 재검 후 LT4 치료 고려. 자동 1차 처방 아님", ad.ref));
      } else {
        out.flags.push(mkFlag("info", "뚜렷한 진행 위험인자 없음 → 추적관찰 우선. 일과성 가능성 감별", sch.ref));
      }
    }
    // 공통 안내: TPO 항체
    out.flags.push(mkFlag("info", "TPO 항체 측정 권고 — 양성 시 현성 진행 위험 2배↑ (자가면역 갑상선염)", sch.ref));
  }

  // --- 현성 저하증 용량 ---
  if(state==="overt_hypo"){
    var L=F.LT4_DOSING, cautious=false;
    if((patient.comorbid||[]).indexOf("comorbid:cad")>=0 ||
       (patient.comorbid||[]).indexOf("comorbid:hf")>=0 || (age!=null&&age>=60)) cautious=true;
    var dn = cautious ? ("저용량 시작 "+L.cautious.start.join("–")+L.cautious.unit+", "+L.cautious.titrate)
                      : (L.standard.perKg+L.standard.unit+" ("+L.standard.note+")");
    out.drugs.push({ drugId:L.drug, rank:1, recSys:L.recSys, recLevel:"강함/높음",
      g:grade(L.recSys, "강함/높음"), dose:dn, note:L.admin, source:L.ref });
    out.targets.push({ id:L.id, value:"TSH "+L.target.tsh+", FT4 "+L.target.ft4,
      recSys:L.recSys, source:L.ref });
  }

  // --- 항진증/그레이브스 ---
  if(state==="overt_hyper" || state==="subclinical_hyper" || state==="t3_toxicosis"){
    var A=F.ATD_RULES;
    var preg1 = patient.pregnant_1st;
    var ptuInd = patient.pregnant_1st || patient.thyroid_storm || patient.mmi_adverse;
    // 임신1기: PTU 1차(MMI 기형유발 회피), 그 외: MMI 1차
    // 1차 MMI — 임신1기엔 rank 후순위 + 경고
    out.drugs.push({ drugId:A.firstLine.drug, rank: preg1?3:1, recSys:A.recSys, recLevel:"강함/높음",
      g:grade(A.recSys, "강함/높음"),
      dose:"초기 경증"+A.firstLine.dosing.initial.mild+"/중등도"+A.firstLine.dosing.initial.moderate.join("-")+"/중증"+A.firstLine.dosing.initial.severe+"mg, 유지 "+A.firstLine.dosing.maintenance.range.join("-")+"mg",
      note: preg1?"⚠ 임신1기 기형유발 위험 — PTU 우선":"1일 1회(유지)", source:A.ref });
    if(preg1) out.flags.push(mkFlag("warning","임신 1기: MMI 기형유발(MMI embryopathy) 위험 → PTU로 전환", A.ref));
    // PTU (조건부) — 임신1기엔 rank1
    out.drugs.push({ drugId:A.ptu.drug, rank: preg1?1:(ptuInd?1:3), recSys:A.recSys,
      recLevel: ptuInd?"강함/중등도":"약함/낮음",
      g:grade(A.recSys, ptuInd?"강함/중등도":"약함/낮음"),
      note:"한정 적응: "+A.ptu.indication.join("·")+" (1일 2-3회 분복)", source:A.ref });
    // 증상조절
    if(patient.symptomatic!==false)
      out.drugs.push({ drugId:A.symptomControl.drug, rank:2, recSys:A.recSys, recLevel:"강함/중등도",
        g:grade(A.recSys, "강함/중등도"), note:A.symptomControl.note, source:A.ref });
    // 안전 flag
    A.safetyFlags.forEach(function(sf){ out.flags.push(mkFlag("warning", sf.msg, A.ref)); });
    // 중단기준
    out.targets.push({ id:"thyroid:target:atd_stop", value:"중단 고려: "+A.stopCriteria.kta,
      recSys:A.recSys, source:A.ref, note:"ATA: "+A.stopCriteria.ata });
  }

  // --- 분화암 동반 TSH 억제 ---
  if(patient.thyroid_ca && patient.ca_risk){
    var S=F.SUPPRESSION_TARGET, ir=S.initialRisk[patient.ca_risk];
    if(ir){
      var tval = ir.target ? (ir.target[0]==null? "<"+ir.target[1] : ir.target.join("–")) : ir.note;
      out.targets.push({ id:S.id+":"+patient.ca_risk, value:"초기 TSH 목표 "+tval+" mIU/L",
        recSys:S.recSys, recLevel:ir.rec||ir.recTarget,
        g:grade(S.recSys, ir.rec||ir.recTarget), source:S.ref });
    }
    S.overSuppressionFlags.forEach(function(of){
      if((patient.comorbid||[]).indexOf(of.when)>=0) out.flags.push(mkFlag("caution", of.msg, S.ref));
    });
    out.flags.push(mkFlag("info", S.contrastFlag, S.ref));
  }

  return out;
}

/* ---------- 결절 축: K-TIRADS 계산기 ---------- */
function classifyTirads(comp, suspicious, N){
  var logic = N.KTIRADS_TABLE.calcLogic;
  // 명시적 규칙 순서대로 평가
  if(comp==="저에코 고형") return suspicious?"thyroid:tirads:k5":"thyroid:tirads:k4";
  if(comp==="부분낭성/등고에코") return suspicious?"thyroid:tirads:k4":"thyroid:tirads:k3";
  if(comp==="완전석회화") return "thyroid:tirads:k4";
  if(comp==="해면/순수낭종") return "thyroid:tirads:k2";
  return null;
}

/* ---------- 결절 축 정문 ---------- */
function recommendNodule(patient, N){
  var out = { drugs:[], targets:[], flags:[], classifications:[] };

  // 진입: TSH
  if(patient.tsh!=null){
    var e=N.NODULE_ENTRY;
    if(patient.tsh < (patient.tsh_low||0.4)){
      out.flags.push(mkFlag("info","TSH 낮음 → 갑상선스캔(자율기능성 감별) 권고", e.id));
    }
    out.flags.push(mkFlag("info", e.bridgeFlag, e.id));
  }

  // K-TIRADS 분류
  var k = null;
  if(patient.tirads_direct){ k = patient.tirads_direct; }
  else if(patient.us_composition){ k = classifyTirads(patient.us_composition, patient.us_suspicious, N); }
  if(k){
    var cat = N.KTIRADS_TABLE.categories[k];
    out.classifications.push({ id:k, value:cat.label,
      malignancy:cat.malignancyLabel, fnaSize:cat.fnaSize, recSys:N.KTIRADS_TABLE.recSys });
    if(cat.fnaSize && (cat.fnaSize.gt||cat.fnaSize.range))
      out.flags.push(mkFlag("info","FNA/CNB 기준: "+(cat.fnaSize.gt?(">"+cat.fnaSize.gt+cat.fnaSize.unit):(cat.fnaSize.range.join("–")+cat.fnaSize.unit)), k));
  }

  // Bethesda
  if(patient.bethesda){
    var b = N.BETHESDA_TABLE.categories[patient.bethesda];
    if(b){
      out.classifications.push({ id:patient.bethesda, value:b.label,
        malignancy:b.riskAdult[2]+"%", next:b.next, recSys:N.BETHESDA_TABLE.recSys, recLevel:b.rec });
      // 의뢰 트리거
      if(patient.bethesda==="thyroid:bethesda:b5" || patient.bethesda==="thyroid:bethesda:b6")
        out.flags.push(mkFlag("referral","악성의심·악성 → 수술 상담 의뢰", N.DTC_SCOPE.ref));
    }
  }

  // 양성결절 LT4 억제 — 비권고 명시
  var T=N.NODULE_TREATMENT;
  out.flags.push(mkFlag("warning", T.lt4Suppression.rule+" [수준"+T.lt4Suppression.rec+"]: "+T.lt4Suppression.evidence, T.ref));

  return out;
}

/* ---------- 통합 정문 ---------- */
function recommend(patient, modules){
  // modules = { func: func_data, nodule: nodule_data }
  var axis = patient.axis || "func"; // "func" | "nodule"
  var res;
  if(axis==="nodule") res = recommendNodule(patient, modules.nodule);
  else res = recommendFunc(patient, modules.func);

  // drugs/targets를 grade_norm 표준으로 정렬 (rank 우선, A>B>C 보조)
  function byGrade(a,b){
    var ga=a.g||{grade_rank:9}, gb=b.g||{grade_rank:9};
    return gradeCompare(ga,gb) || (a.rank||9)-(b.rank||9);
  }
  res.drugs.sort(byGrade);
  res.targets.sort(byGrade);
  return res;
}

/* 라벨 조회 */
function L(id){
  if(!id) return "";
  var m=LABEL_MAP;
  if(id.indexOf("drug:")===0) return (m.drug[id]&&m.drug[id].ko)||id;
  if(id.indexOf("lab:")===0) return (m.lab[id]&&m.lab[id].ko)||id;
  if(id.indexOf("proc:")===0) return (m.proc[id]&&m.proc[id].ko)||id;
  if(id.indexOf("comorbid:")===0) return (m.comorbid[id]&&m.comorbid[id].ko)||id;
  return id;
}

function num(id){ var v=document.getElementById(id); return v&&v.value!==""?parseFloat(v.value):null; }

function runFunc(){
  var comorbid=[]; for(var k in picked){ if(picked[k]&&k.indexOf("comorbid:")===0) comorbid.push(k); }
  var p={ axis:"func", tsh:num("tsh"), free_t4:num("ft4"), ft4_low:0.8, ft4_high:1.9,
    age:num("age"), weight:num("wt"), comorbid:comorbid,
    pregnant_1st:!!picked.pregnant_1st, thyroid_storm:!!picked.thyroid_storm,
    mmi_adverse:!!picked.mmi_adverse, thyroid_ca:!!picked.thyroid_ca, ca_risk:caRiskVal,
    // SCH 위험인자
    female:!!picked.female, tpo_positive:!!picked.tpo_positive, tsh_rising:!!picked.tsh_rising,
    lobectomy:!!picked.lobectomy, neck_radiation:!!picked.neck_radiation,
    pregnancy_planning:!!picked.pregnancy_planning,
    pregnant:!!picked.pregnant_1st };
  var res=recommend(p,{func:window,nodule:window});
  renderResult(res,"func");
}
function runNodule(){
  var susp=!!picked.susp;
  var p={ axis:"nodule", tsh:num("n_tsh") };
  if(tiradsMode==="direct"&&kDirectVal) p.tirads_direct=kDirectVal;
  else { var c=document.getElementById("us_comp"); if(c&&c.value){ p.us_composition=c.value; p.us_suspicious=susp; } }
  var b=document.getElementById("bethesda"); if(b&&b.value) p.bethesda=b.value;
  var res=recommend(p,{func:window,nodule:window});
  renderResult(res,"nodule");
}

function renderResult(res, axis){
  var h='<div class="result">';
  // 분류 (결절)
  if(res.classifications&&res.classifications.length){
    res.classifications.forEach(function(c){
      if(c.id&&c.id.indexOf("tirads")>=0){
        var kc=c.id.split(":").pop();
        h+='<div class="cls cls-'+kc+'"><span class="cls-badge">'+kc.toUpperCase()+'</span>'+
           '<span>'+esc(c.value)+'</span><span class="cls-mal">'+esc(c.malignancy||"")+'</span></div>';
      } else if(c.id&&c.id.indexOf("bethesda")>=0){
        h+='<div class="cls cls-k4"><span class="cls-badge">'+esc(c.value.split(" ")[0]||"")+'</span>'+
           '<span>'+esc(c.value)+'</span><span class="cls-mal">'+esc(c.malignancy||"")+'</span></div>';
        if(c.next) h+='<div class="flag info">다음 단계: '+esc(c.next)+'</div>';
      } else if(c.label){
        h+='<div class="card '+(axis==="nodule"?"nodule":"")+'"><div class="card-h">📋 '+esc(c.label)+'</div></div>';
      }
    });
  }
  // 약물
  if(res.drugs&&res.drugs.length){
    h+='<div class="sec-title">💊 약물 권고 (등급순)</div><div class="card '+(axis==="nodule"?"nodule":"")+'"><div class="card-b">';
    res.drugs.forEach(function(d){
      h+='<div class="drug-row"><div class="rank">'+(d.rank||"")+'</div><div class="drug-main">'+
        '<div class="drug-name">'+esc(L(d.drugId))+' '+gradeBadge(d.g)+'</div>'+
        (d.note?'<div class="drug-meta">'+esc(d.note)+'</div>':"")+
        (d.dose?'<div class="drug-dose mono">'+esc(d.dose)+'</div>':"")+
        '</div></div>';
    });
    h+='</div></div>';
  }
  // 타겟
  if(res.targets&&res.targets.length){
    h+='<div class="sec-title">🎯 목표·판정</div><div class="card '+(axis==="nodule"?"nodule":"")+'"><div class="card-b">';
    res.targets.forEach(function(t){
      h+='<div class="drug-row"><div class="drug-main"><div class="drug-name">'+esc(t.value)+' '+gradeBadge(t.g)+'</div>'+
        (t.note?'<div class="drug-meta">'+esc(t.note)+'</div>':"")+'</div></div>';
    });
    h+='</div></div>';
  }
  // flags
  if(res.flags&&res.flags.length){
    h+='<div class="sec-title">⚑ 주의·안내</div>';
    res.flags.forEach(function(f){ h+='<div class="flag '+f.level+'">'+esc(f.msg)+'</div>'; });
  }
  h+='</div>';
  document.getElementById("result").innerHTML=h;
  document.getElementById("result").scrollIntoView({behavior:"smooth",block:"nearest"});
}

/* ===== 정적 콘텐츠 (비교표·KCD·도서관·출처) ===== */

  if(typeof GUIDELINE_COMPARE!=="undefined"){

      '<table class="cmp"><tr><th>쟁점</th><th>KTA</th><th>ATA/ETA</th></tr>';
    GUIDELINE_COMPARE.rows.forEach(function(r){
      h+='<tr><td>'+esc(r.issue)+'</td><td>'+esc(r.kta)+'</td><td>'+esc(r.intl)+'</td></tr>';
    });
    h+='</table></div></details>';
  }
  // 균형정보
  if(typeof BALANCE_INFO!=="undefined"){
    h+='<details><summary>⚖️ 가이드라인 ↔ 급여 균형정보 ('+BALANCE_INFO.items.length+')</summary><div class="det-body">';
    BALANCE_INFO.items.forEach(function(it){
      h+='<div style="font-weight:600;margin:8px 0 4px">'+esc(it.topic)+'</div><div class="balance">'+
        '<div class="gl"><div class="bh">📘 가이드라인</div>'+esc(it.guideline)+'</div>'+
        '<div class="rb"><div class="bh">💰 급여기준</div>'+esc(it.reimbursement)+'</div>'+
        '<div class="conflict">⚠️ '+esc(it.conflict)+'</div></div>';
    });
    h+='</div></details>';
  }
  // KCD
  if(typeof KCD_SECTION!=="undefined"){
    h+='<details><summary>🏷️ 흔한 상병·급여코드 ('+KCD_SECTION.codes.length+')</summary><div class="det-body">';
    KCD_SECTION.codes.forEach(function(c){
      h+='<div class="kcd-item"><span class="kcd-code">'+esc(c.kcd)+'</span><b>'+esc(c.label)+'</b>';
      if(c.note) h+='<div style="font-size:11.5px;color:#a05a00;margin-top:3px">📌 '+esc(c.note)+'</div>';
      if(c.common) h+='<div style="font-size:11.5px;margin-top:3px">'+c.common.map(esc).join(" · ")+'</div>';
      h+='<div class="kcd-tags">';
      (c.labs||[]).forEach(function(x){h+='<span class="tag">🧪 '+esc(L(x))+'</span>';});
      (c.drugs||[]).forEach(function(x){h+='<span class="tag">💊 '+esc(L(x))+'</span>';});
      (c.procs||[]).forEach(function(x){h+='<span class="tag">🔧 '+esc(L(x))+'</span>';});
      h+='</div></div>';
    });
    if(KCD_SECTION.specialNote) h+='<div class="flag caution">'+esc(KCD_SECTION.specialNote)+'</div>';
    h+='</div></details>';
  }
  // 도서관
  if(typeof LIBRARY!=="undefined"){
    h+='<details><summary>📚 임상 도서관 ('+LIBRARY.topics.length+' 토픽)</summary><div class="det-body">';
    LIBRARY.topics.forEach(function(t){
      h+='<div style="margin-bottom:7px"><b>'+esc(t.icon)+' '+esc(t.title)+'</b>'+
        (t.content?'<div style="margin-top:2px">'+esc(t.content)+'</div>':"")+'</div>';

/* ===== 출처 (하단 고정) ===== */
function refsSection(){
  if(typeof REFERENCES==="undefined") return "";
  var R=REFERENCES, h='<div class="refs"><h3>📖 출처 · 참고문헌</h3>';
  function grp(title,arr){ var s='<div class="rgrp"><b>'+title+'</b><ul>';
    arr.forEach(function(g){ s+='<li>'+esc(g.title)+(g.cite?' — '+esc(g.cite):"")+
      (g.url?' <a href="'+g.url+'" target="_blank" rel="noopener">🔗</a>':"")+
      (g.note?' <span style="color:#a05">('+esc(g.note)+')</span>':"")+'</li>'; });
    return s+'</ul></div>'; }
  h+=grp("국내 가이드라인",R.guidelines);
  h+=grp("해외 가이드라인",R.intlGuidelines);
  h+=grp("급여기준",R.reimbursement);
  h+='<div class="rgrp"><b>약물허가</b><ul><li>'+esc(R.drugLicense.title)+
     ' <a href="'+R.drugLicense.url+'" target="_blank" rel="noopener">🔗</a></li></ul></div>';
  h+='</div>';
  return h;
}

/* ===== 도서관 섹션 렌더러 (당뇨 패턴 채택) ===== */
function libSection(s){
  var h='';
  var hasHead = s.title && s.type!=="drugclass";
  if(hasHead) h+='<div class="sh">'+esc(s.title)+'</div>';
  if(s.note && s.type!=="drugclass") h+='<div class="snote">'+esc(s.note)+'</div>';

  if(s.type==="keypoints"){
    h+='<ul class="kp">';
    s.items.forEach(function(it){ h+='<li>'+esc(it)+'</li>'; });
    h+='</ul>';
  } else if(s.type==="cards"){
    h+='<div class="minicards">';
    s.items.forEach(function(it){
      h+='<div class="mc'+(it.danger?" danger":"")+'"><div class="mch">'+esc(it.h)+'</div><div class="mcb">'+esc(it.b)+'</div></div>';
    });
    h+='</div>';
  } else if(s.type==="ladder"){
    h+='<div class="ladder-l">';
    s.items.forEach(function(it){
      h+='<div class="lr'+(it.danger?" danger":"")+'"><span class="ln">'+esc(it.n)+'</span>'+
         '<div><div class="lh">'+esc(it.h)+'</div><div class="lb">'+esc(it.b)+'</div></div></div>';
    });
    h+='</div>';
  } else if(s.type==="table"){
    h+='<table class="dtable"><thead><tr>';
    s.cols.forEach(function(c){ h+='<th>'+esc(c)+'</th>'; });
    h+='</tr></thead><tbody>';
    s.rows.forEach(function(r){
      h+='<tr>'; r.forEach(function(cell){ h+='<td>'+esc(cell)+'</td>'; }); h+='</tr>';
    });
    h+='</tbody></table>';
  } else if(s.type==="codetable"){
    h+='<table class="dtable codetable"><thead><tr><th>코드</th><th>상병명</th><th>비고</th></tr></thead><tbody>';
    s.rows.forEach(function(r){
      h+='<tr><td class="code-cell">'+esc(r[0])+'</td><td>'+esc(r[1])+'</td><td class="code-note">'+esc(r[2]||"")+'</td></tr>';
    });
    h+='</tbody></table>';
  } else if(s.type==="balance"){
    s.items.forEach(function(it){
      h+='<div style="font-weight:600;margin:8px 0 4px">'+esc(it.topic)+'</div><div class="balance">'+
        '<div class="gl"><div class="bh">📘 가이드라인</div>'+esc(it.gl)+'</div>'+
        '<div class="rb"><div class="bh">💰 급여기준</div>'+esc(it.rb)+'</div>'+
        '<div class="conflict">⚠️ '+esc(it.conflict)+'</div></div>';
    });
  } else if(s.type==="drugclass"){
    var mem=(s.members||[]).length;
    h+='<div class="dcclass"><button type="button" class="dcclass-head" onclick="this.parentNode.classList.toggle(\'open\');var b=this.nextElementSibling;b.style.display=b.style.display===\'none\'?\'block\':\'none\';">'+
      '<div class="dcc-title">'+esc(s.title)+'</div>'+
      '<div class="dcc-eff">'+esc(s.effect)+'</div>'+
      (mem>1?'<span class="dcc-cnt">'+mem+'성분</span>':'')+
      '<span class="dcc-arrow">›</span></button>'+
      '<div class="dcclass-body" style="display:none">'+
      '<div class="drugclass-box">'+
        dcRow("기전",s.mechanism)+dcRow("효과",s.effect)+
        dcRow("부작용",s.ae,"dc-ae")+dcRow("금기",s.contra,"dc-contra")+
        dcRow("특징",s.feature,"dc-feat")+(s.reimb?dcRow("급여",s.reimb,"dc-reimb"):"")+
      '</div>';
    if(s.members&&s.members.length){
      h+='<div class="memlist"><div class="mem-h">성분별 — 상품명 · 복약 · 중단</div>';
      s.members.forEach(function(m){
        h+='<div class="memcard"><div class="mem-top"><span class="mem-nm">'+esc(m.nm)+'</span>'+
          (m.brand&&m.brand!=="-"?'<span class="mem-brand">'+esc(m.brand)+'</span>':'')+'</div>';
        if(m.tip) h+='<div class="mem-tip">'+esc(m.tip)+'</div>';
        if(m.stop) h+='<div class="mem-stop'+(/⛔/.test(m.stop)?' hard':'')+'"><span class="stop-lbl">중단</span>'+esc(m.stop)+'</div>';
        h+='</div>';
      });
      h+='</div>';
    }
    h+='</div></div>';
  } else if(s.type==="algorithm"){
    h+=renderAlgo(s.algo);
  }
  return h;
}
function dcRow(k,v,cls){ return '<div class="dc-row '+(cls||"")+'"><span class="dc-k">'+k+'</span><span class="dc-v">'+esc(v)+'</span></div>'; }

/* ===== 인터랙티브 진단 알고리듬 렌더 ===== */
var ALGO_REGISTRY = {};
function regAlgo(){
  if(typeof ALGO_FUNCTION!=="undefined") ALGO_REGISTRY["algo:function"]=ALGO_FUNCTION;
  if(typeof ALGO_THYROIDITIS!=="undefined") ALGO_REGISTRY["algo:thyroiditis"]=ALGO_THYROIDITIS;
}
// 각 알고리듬 인스턴스의 현재 경로 상태
var ALGO_STATE = {};
function renderAlgo(algoId){
  regAlgo();
  var tree=ALGO_REGISTRY[algoId];
  if(!tree) return '<div class="snote">알고리듬 데이터 없음</div>';
  if(!ALGO_STATE[algoId]) ALGO_STATE[algoId]=[tree.start];
  return '<div class="algo" id="algo-'+cssId(algoId)+'">'+algoInner(algoId)+'</div>';
}
function cssId(s){ return s.replace(/[:]/g,"_"); }
function algoInner(algoId){
  var tree=ALGO_REGISTRY[algoId];
  var path=ALGO_STATE[algoId];
  var h='<div class="algo-head"><span class="algo-ttl">🧭 '+esc(tree.title)+'</span>'+
    '<button type="button" class="algo-reset" onclick="algoReset(\''+algoId+'\')">↺ 처음부터</button></div>';
  // 경로(breadcrumb): 지나온 선택들
  if(path.length>1){
    h+='<div class="algo-crumb">';
    for(var i=0;i<path.length-1;i++){
      var nd=tree.nodes[path[i]];
      var chosen=nd._chosenLabel||"";
      h+='<span class="crumb">'+esc(chosen||(nd.q||"").slice(0,14))+'</span>';
    }
    h+='</div>';
  }
  var cur=tree.nodes[path[path.length-1]];
  if(cur.result){
    h+=algoResult(cur);
  } else {
    h+='<div class="algo-q">'+esc(cur.q)+'</div>';
    if(cur.hint) h+='<div class="algo-hint">'+esc(cur.hint)+'</div>';
    h+='<div class="algo-opts">';
    cur.options.forEach(function(o,idx){
      h+='<button type="button" class="algo-opt" onclick="algoPick(\''+algoId+'\','+idx+')">'+
        esc(o.label)+'<span class="opt-arrow">→</span></button>';
    });
    h+='</div>';
    if(path.length>1) h+='<button type="button" class="algo-back" onclick="algoBack(\''+algoId+'\')">← 이전</button>';
  }
  return h;
}
function algoResult(n){
  var toneCls = "res-"+(n.tone||"normal");
  var h='<div class="algo-res '+toneCls+'">';
  h+='<div class="res-dx">📋 '+esc(n.dx)+'</div>';
  h+='<div class="res-sum">'+esc(n.summary)+'</div>';
  if(n.flag) h+='<div class="res-flag">⚑ '+esc(n.flag)+'</div>';
  if(n.advice&&n.advice.length){
    h+='<ul class="res-adv">';
    n.advice.forEach(function(a){ h+='<li>'+esc(a)+'</li>'; });
    h+='</ul>';
  }
  if(n.libRef) h+='<button type="button" class="res-lib" onclick="jumpLib(\''+n.libRef+'\')">📚 관련 도서관 카드 열기</button>';
  h+='</div>';
  return h;
}
function algoPick(algoId, optIdx){
  var tree=ALGO_REGISTRY[algoId];
  var path=ALGO_STATE[algoId];
  var cur=tree.nodes[path[path.length-1]];
  var opt=cur.options[optIdx];
  cur._chosenLabel=opt.label;
  path.push(opt.next);
  redrawAlgo(algoId);
}
function algoBack(algoId){
  var path=ALGO_STATE[algoId];
  if(path.length>1){ path.pop(); redrawAlgo(algoId); }
}
function algoReset(algoId){
  var tree=ALGO_REGISTRY[algoId];
  ALGO_STATE[algoId]=[tree.start];
  redrawAlgo(algoId);
}
function redrawAlgo(algoId){
  var el=document.getElementById("algo-"+cssId(algoId));
  if(el) el.innerHTML=algoInner(algoId);
}
// 결과에서 도서관 카드로 점프 (해당 카드 펼치고 스크롤)
function jumpLib(cardId){
  if(TAB!=="lib"){ switchTab("lib"); }
  setTimeout(function(){
    var cards=document.querySelectorAll("#libGrid .libcard");
    for(var i=0;i<cards.length;i++){
      if(THY_LIBRARY[i] && THY_LIBRARY[i].id===cardId){
        var card=cards[i];
        if(!card.classList.contains("open")){
          var head=card.querySelector(".libcard-head"); if(head) head.click();
        }
        card.scrollIntoView({behavior:"smooth",block:"start"});
        break;
      }
    }
  }, 60);
}

/* 도서관 카드 (펼침형) */
function libCard(card){
  var cat=THY_LIB_CATS[card.cat]||{label:"",color:"#888"};
  var h='<div class="libcard" data-cat="'+card.cat+'">'+
    '<button type="button" class="libcard-head" onclick="this.parentNode.classList.toggle(\'open\');var b=this.nextElementSibling;b.style.display=b.style.display===\'none\'?\'block\':\'none\';">'+
      '<span class="lc-icon">'+esc(card.icon)+'</span>'+
      '<span class="lc-tt"><span class="lc-title">'+esc(card.title)+'</span>'+
        '<span class="lc-sub">'+esc(card.sub||"")+'</span></span>'+
      '<span class="lc-cat" style="background:'+cat.color+'">'+cat.label+'</span>'+
      '<span class="lc-arrow">›</span></button>'+
    '<div class="libcard-body" style="display:none">';
  card.sections.forEach(function(s){ h+='<div class="lib-sec">'+libSection(s)+'</div>'; });
  h+='</div></div>';
  return h;
}

/* 도서관 탭 전체 */
function renderLibrary(){
  if(typeof THY_LIBRARY==="undefined") return '<div class="empty">도서관 데이터 없음</div>';
  var h='<div class="lib-intro">📚 전문가용 참고서 — 카드를 눌러 펼치세요. 급여·임상·관리 '+THY_LIBRARY.length+'개 주제.</div>';
  // 검색
  h+='<div class="lib-search"><input id="libQ" type="text" placeholder="🔍 검색 (예: 무과립구증, 급여, 복약, TSH)" oninput="filterLib()"></div>';
  // 카테고리 필터
  h+='<div class="lib-filter">'+
     '<button class="lf on" data-c="all" onclick="setLibFilter(\'all\')">전체</button>'+
     '<button class="lf" data-c="pay" onclick="setLibFilter(\'pay\')">💰 급여</button>'+
     '<button class="lf" data-c="clin" onclick="setLibFilter(\'clin\')">🩺 임상</button>'+
     '<button class="lf" data-c="care" onclick="setLibFilter(\'care\')">🌿 관리</button></div>';
  h+='<div id="libGrid">';
  THY_LIBRARY.forEach(function(c){ h+=libCard(c); });
  h+='</div>';
  return h;
}
var libFilter="all";
function setLibFilter(c){
  libFilter=c;
  document.querySelectorAll(".lf").forEach(function(b){ b.classList.toggle("on", b.getAttribute("data-c")===c); });
  filterLib();
}
function filterLib(){
  var q=(document.getElementById("libQ")&&document.getElementById("libQ").value||"").toLowerCase();
  var cards=document.querySelectorAll("#libGrid .libcard");
  THY_LIBRARY.forEach(function(c,i){
    var card=cards[i]; if(!card) return;
    var catOk = libFilter==="all"||c.cat===libFilter;
    var txt=(c.title+" "+(c.sub||"")+" "+(c.tags||[]).join(" ")).toLowerCase();
    var qOk = !q || txt.indexOf(q)>=0;
    card.style.display=(catOk&&qOk)?"block":"none";
  });
}

/* ===== 메인 렌더 ===== */
function render(){
  var h='';
  if(TAB==="lib"){
    h+=renderLibrary();
    h+=refsSection();
  } else {
    h+=inputPanel();
    h+='<div id="result"><div class="empty">환자 정보를 입력하고 <b>조언 보기</b>를 누르세요.<br>이 도구는 의사결정을 돕는 <b>조언자</b>이며 최종 판단은 의료진에게 있습니다.</div></div>';
    // 기능/결절 탭에서도 빠른 참고: 관련 도서관 안내
    h+='<div class="lib-hint">📚 상세 기준·약제·급여는 <b onclick="switchTab(\'lib\')" style="color:var(--teal);cursor:pointer">도서관 탭</b>에서 확인하세요.</div>';
    h+=refsSection();
  }
  h+='<div class="disclaimer">⚕️ 본 도구는 대한갑상선학회 권고안·심평원 급여기준에 근거한 임상 의사결정 <b>보조</b> 목적입니다.<br>처방을 강제하지 않으며, 모든 결정과 책임은 진료 의사에게 있습니다. 각 검사실 참고치·최신 고시를 우선하십시오.</div>';
  document.getElementById("app").innerHTML=h;
  picked={}; caRiskVal=null; kDirectVal=null;
  if(TAB!=="lib"){ bindChips(); if(TAB==="nodule") setTiradsMode(tiradsMode); }
}
render();
