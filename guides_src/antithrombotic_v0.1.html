<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="light only">
<title>항혈전제 가이드 · Antithrombotic</title>
<style>
:root{
  /* 동맥축 = crimson (백색혈전·항혈소판) */
  --art:#b91c3c; --art-dim:#d4546e; --art-bg:#fdf2f4; --art-line:#f3c5cf;
  /* 정맥축 = slate-blue (적색혈전·항응고) */
  --ven:#2c5282; --ven-dim:#5a7ba8; --ven-bg:#f0f4f9; --ven-line:#c3d3e6;
  /* 중립 */
  --ink:#1a1d23; --ink2:#4a4f5a; --ink3:#7c828d; --line:#e4e7ec; --bg:#fafbfc; --card:#fff;
  --warn:#b45309; --warn-bg:#fef6ec; --ok:#15803d;
  --r:14px; --rs:10px;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo',Roboto,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--sans);
  font-size:15px;line-height:1.55;-webkit-text-size-adjust:100%}
body{padding-bottom:80px}
h1,h2,h3{margin:0;font-weight:700;letter-spacing:-.02em}
button{font-family:inherit;cursor:pointer;border:none;background:none}
.wrap{max-width:680px;margin:0 auto;padding:0 16px}

/* ── 고정 헤더 ── */
.hdr{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line)}
.hdr-in{max-width:680px;margin:0 auto;padding:11px 16px;display:flex;align-items:center;gap:10px}
.hdr-logo{font-weight:800;font-size:16px;letter-spacing:-.03em;
  background:linear-gradient(90deg,var(--art),var(--ven));-webkit-background-clip:text;background-clip:text;color:transparent}
.hdr-sub{font-size:11px;color:var(--ink3);font-weight:600}

/* ── 척추 배너 ── */
.spine{margin:16px 0 4px;border-radius:var(--r);overflow:hidden;border:1px solid var(--line);
  display:grid;grid-template-columns:1fr 1fr}
.spine-half{padding:15px 14px}
.spine-art{background:var(--art-bg);border-right:1px solid var(--line)}
.spine-ven{background:var(--ven-bg)}
.spine-tag{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
.spine-art .spine-tag{color:var(--art)} .spine-ven .spine-tag{color:var(--ven)}
.spine-flow{font-size:13px;font-weight:700;margin:5px 0 2px}
.spine-drug{font-size:11.5px;color:var(--ink2);font-weight:600}
.spine-note{font-size:10.5px;color:var(--ink3);margin-top:7px;grid-column:1/-1;padding:8px 14px;
  background:#fff;border-top:1px solid var(--line)}

/* ── 탭 ── */
.tabs{display:flex;gap:4px;position:sticky;top:53px;z-index:40;background:var(--bg);
  padding:10px 0 8px;margin-bottom:4px}
.tab{flex:1;padding:10px 6px;border-radius:var(--rs);font-size:12.5px;font-weight:700;color:var(--ink3);
  background:#fff;border:1px solid var(--line);min-height:44px;transition:.15s}
.tab.on{color:#fff;border-color:transparent}
.tab.on[data-t="flow"]{background:var(--ink)}
.tab.on[data-t="lib"]{background:var(--ven)}
.tab.on[data-t="learn"]{background:var(--art)}

/* ── 카드 ── */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.card-h{padding:13px 15px;font-size:13.5px;font-weight:700;display:flex;align-items:center;gap:8px}
.card-b{padding:0 15px 14px}
.muted{color:var(--ink3);font-size:12px}

/* ── 입력 ── */
.field{margin-bottom:13px}
.field-l{font-size:12px;font-weight:700;color:var(--ink2);margin-bottom:6px;display:block}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:8px 12px;border-radius:20px;font-size:12.5px;font-weight:600;background:#fff;
  border:1.5px solid var(--line);color:var(--ink2);min-height:38px}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.chip.on.art{background:var(--art);border-color:var(--art)}
.chip.on.ven{background:var(--ven);border-color:var(--ven)}
select,input{width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:var(--rs);
  font-size:14px;font-family:inherit;background:#fff;color:var(--ink);min-height:44px}

/* ── 결과 ── */
.res-drug{border:1px solid var(--line);border-radius:var(--rs);padding:12px 13px;margin-bottom:9px;
  border-left:3px solid var(--ink3)}
.res-drug.hold{border-left-color:var(--art)}
.res-drug.continue{border-left-color:var(--ok)}
.res-drug.info{border-left-color:var(--ink3)}
.res-name{font-weight:700;font-size:14px;margin-bottom:3px}
.res-action{display:inline-block;font-size:11px;font-weight:800;padding:2px 8px;border-radius:6px;
  text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.res-action.hold{background:var(--art-bg);color:var(--art)}
.res-action.continue{background:#eafaf0;color:var(--ok)}
.res-action.info{background:#f1f3f6;color:var(--ink3)}
.res-row{font-size:12.5px;color:var(--ink2);margin:3px 0}
.res-row b{color:var(--ink);font-weight:700}
.res-src{font-size:10.5px;color:var(--ink3);margin-top:6px;font-style:italic}
.flag{padding:9px 12px;border-radius:var(--rs);font-size:12px;margin-bottom:7px;font-weight:600;display:flex;gap:7px}
.flag.warn{background:var(--warn-bg);color:var(--warn)}
.flag.info{background:#f0f4f9;color:var(--ven)}
.reimb{background:#fffbeb;border:1px solid #fde68a;border-radius:var(--rs);padding:11px 13px;margin-top:8px;font-size:12px}
.reimb b{color:var(--warn)}

/* ── 접기 ── */
details{border-top:1px solid var(--line)}
details summary{padding:11px 0;font-size:12.5px;font-weight:700;color:var(--ink2);
  cursor:pointer;list-style:none;display:flex;align-items:center;gap:6px;min-height:40px}
details summary::-webkit-details-marker{display:none}
details summary::before{content:'+';font-size:16px;color:var(--ink3);font-weight:400}
details[open] summary::before{content:'−'}
details .det-b{padding:0 0 13px;font-size:12.5px;color:var(--ink2)}

.disclaimer{font-size:10.5px;color:var(--ink3);text-align:center;padding:18px 20px;line-height:1.6}
.sec{display:none} .sec.on{display:block}

/* ── 라이브러리 타일 격자 ── */
.tile-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-top:4px}
.tile{text-align:left;padding:10px 11px;border-radius:var(--rs);background:#fff;
  border:1.5px solid var(--line);min-height:54px;transition:.12s;border-left-width:3px}
.tile:active{transform:scale(.97)}
.tile-ven{border-left-color:var(--ven)} .tile-art{border-left-color:var(--art)}
.tile-name{font-size:13px;font-weight:700;color:var(--ink);line-height:1.3}
.tile-target{font-size:10.5px;color:var(--ink3);font-weight:600;margin-top:3px}

/* ── 바텀시트 ── */
.sheet-ov{position:fixed;inset:0;background:rgba(20,22,28,.4);z-index:90;opacity:0;
  pointer-events:none;transition:.2s}
.sheet-ov.on{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:91;background:#fff;
  border-radius:20px 20px 0 0;padding:8px 20px calc(24px + env(safe-area-inset-bottom));
  max-width:680px;margin:0 auto;transform:translateY(100%);transition:transform .24s cubic-bezier(.32,.72,0,1);
  max-height:82vh;overflow-y:auto}
.sheet.on{transform:translateY(0)}
.sheet-grip{width:36px;height:4px;background:var(--line);border-radius:3px;margin:6px auto 14px}
.sheet-title{font-size:18px;font-weight:800;letter-spacing:-.02em}
.sheet-target{font-size:12px;color:var(--ink3);font-weight:700;margin-top:3px}
.sheet-extra{font-size:13.5px;color:var(--ink2);line-height:1.62;margin:13px 0}
.sheet-rows{border-top:1px solid var(--line);margin-top:6px}
.sheet-row{display:flex;justify-content:space-between;gap:14px;padding:9px 0;
  border-bottom:1px solid var(--line);font-size:13px}
.sheet-row span{color:var(--ink3);font-weight:600;flex-shrink:0}
.sheet-row b{color:var(--ink);font-weight:700;text-align:right}
.sheet-sect-h{font-size:13px;font-weight:800;color:var(--ink);margin:16px 0 8px;letter-spacing:-.01em}
.dose-card{border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px;border-left:3px solid var(--ink3)}
.dose-card.ven{border-left-color:var(--ven)} .dose-card.art{border-left-color:var(--art)}
.dose-cond{font-size:12.5px;font-weight:800;color:var(--ink);margin-bottom:5px}
.dose-std{font-size:12.5px;color:var(--ink);margin:3px 0}
.dose-std b,.dose-red b{display:inline-block;min-width:34px;font-size:10.5px;padding:1px 6px;border-radius:5px;margin-right:6px;font-weight:700}
.dose-std b{background:#eafaf0;color:var(--ok)}
.dose-red{font-size:12.5px;color:var(--ink2);margin:3px 0}
.dose-red b{background:var(--art-bg);color:var(--art)}
.dose-note{font-size:11px;color:var(--ink3);margin-top:5px;line-height:1.5;padding-top:5px;border-top:1px dashed var(--line)}
.dtbl.mini{font-size:12px}
.dtbl.mini th{font-size:11px;padding:6px}
.dtbl.mini td{padding:7px 8px;vertical-align:top}
.sheet-det{border-top:1px solid var(--line);margin-top:4px}
.sheet-det summary{padding:11px 0;font-size:12.5px;font-weight:700;color:var(--ink2);cursor:pointer;
  list-style:none;display:flex;align-items:center;gap:6px;min-height:40px}
.sheet-det summary::-webkit-details-marker{display:none}
.sheet-det summary::before{content:'+';font-size:16px;color:var(--ink3)}
.sheet-det[open] summary::before{content:'−'}
.sheet-kr{margin-top:12px;padding:9px 12px;background:#f0f4f9;border-radius:8px;font-size:11.5px;color:var(--ven);font-weight:600}
.sheet-ci{margin-top:12px;padding:11px 13px;background:var(--art-bg);border:1px solid var(--art-line);border-radius:8px;font-size:12px;color:var(--ink);line-height:1.55}
.sheet-ci b{color:var(--art)}
.ref-badge{font-size:10px;font-weight:700;color:var(--ink3);background:#f1f3f6;padding:2px 7px;border-radius:6px;margin-left:6px;letter-spacing:-.01em}

/* ── 학습 ── */
.learn-p{font-size:13.5px;line-height:1.66;color:var(--ink2);margin:9px 0}
.learn-p b{color:var(--ink);font-weight:700}
.learn-node{border-top:1px solid var(--line)}
.learn-node summary{border-left:3px solid var(--line);padding-left:11px}
.learn-ven summary{border-left-color:var(--ven)} .learn-art summary{border-left-color:var(--art)}
.learn-tier{margin:8px 0;border:1px solid var(--line);border-radius:var(--rs);overflow:hidden}
.learn-tier-row{display:flex;gap:11px;padding:9px 12px;font-size:12.5px;border-bottom:1px solid var(--line);align-items:baseline}
.learn-tier-row:last-child{border-bottom:none}
.learn-tier-row b{flex-shrink:0;width:88px;color:var(--ink);font-weight:700}
.learn-tier-row span{color:var(--ink2);line-height:1.5}
.learn-arrow{display:flex;flex-wrap:wrap;align-items:center;gap:6px;font-size:12.5px;font-weight:700;
  color:var(--ink2);margin:10px 0;padding:11px 12px;background:var(--ven-bg);border-radius:var(--rs)}
.learn-arrow span{color:var(--ven-dim)} .learn-arrow b{color:var(--ven)}
.cascade-wrap{margin:14px auto;max-width:340px;padding:12px;background:#fcfdfe;border:1px solid var(--line);border-radius:var(--r)}
.learn-cap{font-size:11.5px;color:var(--ink3);line-height:1.55;margin:6px 2px 4px}
.trial-tag{font-size:11.5px;line-height:1.5;padding:7px 10px;border-radius:8px;margin:6px 0;
  background:#f7f9fb;border-left:3px solid var(--ink3);color:var(--ink2)}
.trial-tag.ven{border-left-color:var(--ven);background:var(--ven-bg)}
.trial-tag.art{border-left-color:var(--art);background:var(--art-bg)}

/* ── 중단기간 요약표 ── */
.tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.dtbl{width:100%;border-collapse:collapse;font-size:12.5px}
.dtbl th{background:var(--ink);color:#fff;padding:8px 6px;font-weight:700;text-align:center;font-size:11.5px;white-space:nowrap}
.dtbl th:first-child{text-align:left;border-radius:8px 0 0 0} .dtbl th:last-child{border-radius:0 8px 0 0}
.dtbl td{padding:8px 6px;text-align:center;border-bottom:1px solid var(--line);white-space:nowrap}
.dtbl-name{text-align:left!important;font-weight:700;color:var(--ink);border-left:3px solid transparent}
.dtbl-ven .dtbl-name{border-left-color:var(--ven)} .dtbl-art .dtbl-name{border-left-color:var(--art)}
.dtbl-ven{background:var(--ven-bg)} .dtbl-art{background:var(--art-bg)}
.dtbl tbody tr:hover{filter:brightness(.97)}

@media print{
  .hdr,.tabs,.spine,.disclaimer,.sheet,.sheet-ov{display:none!important}
  .sec{display:block!important}
  body{padding:0} .card{break-inside:avoid;border:1px solid #999}
  .dtbl th{background:#333!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
</style>
</head>
<body>

<header class="hdr"><div class="hdr-in">
  <span class="hdr-logo">⛓️ 항혈전제</span>
  <span class="hdr-sub">Antithrombotic · periprocedural · 학습</span>
</div></header>

<div class="wrap">

  <!-- 척추 배너 -->
  <div class="spine">
    <div class="spine-half spine-art">
      <div class="spine-tag">🔴 동맥 · ARTERY</div>
      <div class="spine-flow">빠른 흐름 → 백색 혈전</div>
      <div class="spine-drug">혈소판 풍부 → <b>항혈소판제</b></div>
    </div>
    <div class="spine-half spine-ven">
      <div class="spine-tag">🔵 정맥 · VEIN</div>
      <div class="spine-flow">느린 흐름 → 적색 혈전</div>
      <div class="spine-drug">섬유소 풍부 → <b>항응고제</b></div>
    </div>
    <div class="spine-note">💡 혈류 환경이 혈전 성질을 정하고, 혈전 성질이 약을 정한다 — 이 한 줄이 모든 약을 꿰는 축</div>
  </div>

  <!-- 탭 -->
  <nav class="tabs">
    <button class="tab on" data-t="learn" onclick="tab('learn')">🎓 학습</button>
    <button class="tab" data-t="flow" onclick="tab('flow')">🩺 시술 전후</button>
    <button class="tab" data-t="lib" onclick="tab('lib')">📚 약물</button>
  </nav>

  <!-- ═══ 학습 (메인) ═══ -->
  <section class="sec on" id="sec-learn"></section>

  <!-- ═══ 시술 전후 ═══ -->
  <section class="sec" id="sec-flow">
    <div class="card">
      <div class="card-h">🩺 시술 전후 항혈전제 중단·재개</div>
      <div class="card-b">
        <p class="muted" style="margin:2px 0 14px">복용 약물·예정 시술·신기능을 선택하면 중단/재개 권고를 보여줍니다. <b>조언용 — 처방 결정은 의사</b>.</p>

        <div class="field">
          <label class="field-l">복용 중인 항혈전제 (복수선택)</label>
          <div class="chips" id="med-chips"></div>
        </div>

        <div class="field">
          <label class="field-l">예정 시술</label>
          <select id="proc-sel"><option value="">— 선택 —</option></select>
        </div>

        <div class="field">
          <label class="field-l">신기능 (eGFR/CrCl, mL/min)</label>
          <input type="number" id="egfr-in" placeholder="예: 45 (모르면 비워두기)" inputmode="numeric">
        </div>

        <details id="adv-field">
          <summary>추가 조건 (심방세동·혈전위험)</summary>
          <div class="det-b">
            <div class="field" style="margin-top:8px">
              <label class="field-l">동반질환</label>
              <div class="chips" id="comorbid-chips"></div>
            </div>
            <div class="field">
              <label class="field-l">와파린 환자 혈전위험 (bridging 판단용)</label>
              <div class="chips" id="thrombo-chips"></div>
            </div>
          </div>
        </details>

        <div id="result" style="margin-top:8px"></div>
      </div>
    </div>
  </section>

  <!-- ═══ 2층 라이브러리 ═══ -->
  <section class="sec" id="sec-lib"></section>

  <!-- ═══ 3층 학습 ═══ -->

  <div class="disclaimer" id="disc"></div>
</div>

<div class="sheet-ov" id="sheet-ov" onclick="closeSheet()"></div>

date","usage_restriction":"⚠️ 학습 섹션 전용. investigational. 임상 플로우·라이브러리 처방부 진입 절대금지. 모든 항목 investigational:true.","role":"항응고제 진화사의 마지막 장 = '왜 차세대는 factor XI을 노리는가'. 본인 요청 컨셉의 정점.","key_sources":[{"trial":"OCEANIC-AF","ref":"Piccini JP, et al. Asundexian vs apixaban in AF. N Engl J Med 2025;392:23-32","doi":"10.1056/NEJMoa2407105"},{"trial":"AZALEA-TIMI 71","ref":"Ruff CT, et al. Abelacimab vs rivaroxaban in AF. N Engl J Med 2025;392:361-371","doi":"10.1056/NEJMoa2406674"},{"trial":"AXIOMATIC-TKR (milvexian VTE예방)","ref":"Weitz JI, et al. N Engl J Med 2021;385:2161-2172","doi":"10.1056/NEJMoa2113194"},{"review":"ISTH SSC 2024 (FXIa 역전 포함)","pmid":"39029742"},{"review":"FXI/XIa: What We Now Know","ref":"EMJ Cardiol 2024;12[Suppl 2]:2-13","doi":"10.33590/emjcardiol/JJBL7143"}]},"core_concept":{"headline":"지혈 보존 항응고 (haemostasis-sparing anticoagulation)","promise":"혈전·뇌졸중 예방은 유지하면서 출혈위험은 최소화 — 기존 항응고제의 근본 딜레마(항혈전 효과 ↔ 출혈위험) 분리 시도","epidemiologic_basis":"선천성 factor XI 결핍자는 혈전질환에서 보호받지만 자발출혈은 드묾 → 'FXI을 막으면 혈전만 막고 지혈은 보존된다'는 가설의 근거","why_factor_xi":{"cascade_position":"FXI은 내인경로 증폭(amplification)에 관여. 지혈 초기 트롬빈 생성(외인경로·조직인자)에는 덜 필수적.","implication":"FXI 억제 → 병적 혈전증폭은 차단, 손상부위 1차 지혈(외인경로)은 온존 → 출혈 적음","learning_link":"기존 DOAC(FXa·트롬빈 직접억제)는 지혈 공통경로를 때려 출혈 동반. FXI은 더 상류·선택적 표적."}},"mechanism_classes":{"_desc":"두 가지 기전 계열 — 학습 핵심 대조","monoclonal_antibody":{"class":"class:factor_xi_mab","target":"factor XI zymogen (비활성 전구체)","action":"자이모겐을 비활성 고정 → FXIa 생성 자체 차단 + 기존 FXIa 중화. 선천성 결핍 모방.","pk":"반감기 수 주(20-40일), 월 1회 IV/SC 투여. 식세포·세망내피계 대사 → 중증 CKD 적합.","agents":["abelacimab","osocimab","xisomab 3G3"]},"small_molecule":{"class":"class:factor_xia_smi","target":"factor XIa 활성(촉매)부위","action":"가역적 결합. FXIa 생성 후 작용, 자연기질 FIX와 경쟁. → 일부 FXIa 회피 가능성(이론적 효능 한계).","pk":"경구 생체이용률 높음, 반감기 짧아 1일 1-2회. 응고검사 간섭 주의(asundexian·milvexian).","agents":["asundexian","milvexian"]}},"agents":{"drug:abelacimab":{"id":"drug:abelacimab","investigational":true,"type":"monoclonal antibody (anti-FXI zymog 1598-020-59526-x","JACC 2014","ATVB 2017 (COMPASS)","Thromb Haemost 2017 (스펙트럼 정직성)"]},{"topic":"헤파린 AT 기전·사슬길이","refs":["ATVB/Circulation 2001 AHA statement (10.1161/hq0701.093686)","Front Pharmacol 2025 LMWH review","pac6.ch 8.3.2"]},{"topic":"차세대 FXI","refs":["D9 블록 참조 — NEJM 2025 OCEANIC-AF, AZALEA-TIMI 71"]}]},"structure":{"L1_spine":{"title":"척추 — 혈류가 혈전을 정하고, 혈전이 약을 정한다","content":{"arterial":"동맥 = high shear(빠른 흐름) → 혈소판 풍부 '백색 혈전' → 항혈소판제","venous":"정맥 = low shear(느린 흐름) → fibrin 풍부 '적색 혈전' → 항응고제","color_mapping":"동맥축=crimson, 정맥축=slate-blue. 색이 곧 학습장치.","honesty_layer":{"step1":"큰 그림: 이분법 (강력한 출발점)","step2":"진실: 스펙트럼. 두 혈전 모두 복합 fibrin망 + 동일 혈구(적혈구·백혈구·혈소판), 상대적 함량 차이일 뿐.","bridge":"동맥혈전도 fibrin이 안정화 → 항응고제도 역할(COMPASS: 저용량 rivaroxaban+aspirin). 단순 이분법의 예외이자 심화."}}},"L2_cascade":{"title":"캐스케이드 재구성 — 약이 어디를 때리나","principle":"factor 나열 대신 약물 표적 노드만 강조. 흐름은 화살표로, 표적은 약물과 연결.","target_nodes":{"vitaminK_dependent":{"factors":["II","VII","IX","X"],"drug":"drug:warfarin","action":"비타민K 의존 인자 '생산' 차단(간). 기존 인자 소진까지 지연 발현(그래서 5일 중단·부스트).","note":"Protein C/S도 비타민K 의존 → 초기 일시적 응고항진(bridging 논거 중 하나)"},"antithrombin_mediated":{"drug_class":"class:heparin","mechanism":"AT 결합→형태변화→IIa·Xa(및 IXa·XIa·XIIa) 비활성 가속. 간접.","chain_length_story":{"_headline":"분자 사슬 길이 하나가 표적을 정한다 (L2 백미)","UFH":"≥18당류 → AT+트롬빈 동시결합(bridging) 가능 → anti-Xa:anti-IIa = 1:1","LMWH":"짧은 사슬 → 트롬빈 bridging 약화, Xa는 결합 불필요 → 비율 2:1~4:1 (drug:enoxaparin)","fondaparinux":"펜타사카라이드만 → bridging 불가 → IIa 못막고 Xa만 선택 억제 (drug:fondaparinux)","learning_link":"사슬 짧아질수록 표적이 Xa로 좁혀짐 → DOAC의 Xa 직접 선택성으로 자연 연결"}},"direct_Xa":{"factor":"Xa","drugs":["drug:rivaroxaban","drug:apixaban","drug:edoxaban"],"class":"class:doac_fxa","action":"Xa 활성부위 직접 결합(AT 불요). 고정용량·모니터링 불요. ~ban 접미사.","why_Xa":"Xa는 공통경로 입구·증폭 핵심. 트롬빈 1분자가 수천 fibrin → 그 상류 차단이 효율적."},"direct_IIa":{"factor":"IIa (thrombin)","drug":"drug:dabigatran","class":"class:doac_dti","action":"트롬빈 직접 억제. 최종 효소 차단. ~gatran 접미사.","reversal_link":"특이역전제 idarucizumab 존재(D6)"},"factor_XI_future":{"factor":"XI/XIa","drugs":["drug:abelacimab(투여중단 자이모겐)","drug:asundexian","drug:milvexian"],"class":"class:factor_xi","action":"증폭경로 상류 선택 차단 → 지혈 보존 항응고. investigational(D9).","learning_role":"진화의 종착점. '왜 더 상류·선택적으로 가나 = 출혈 줄이려는 여정'"}},"platelet_targets":{"_desc":"항혈소판 표적(동맥축). 혈소판 활성화 경로별.","COX1":{"drug":"drug:aspirin","action":"COX-1 비가역 억제→TXA2↓→혈소판 응집↓","extra":"drug:triflusal 유사"},"P2Y12":{"drugs":["drug:clopidogrel","drug:prasugrel","drug:ticagrelor"],"action":"ADP 수용체 P2Y12 차단→혈소판 활성 증폭↓","prodrug_note":"clopidogrel·prasugrel=프로드럭(간 대사 필요, clopidogrel은 CYP2C19 다형성 영향). ticagrelor=직접·가역."},"PDE":{"drugs":["drug:cilostazol","drug:dipyridamole"],"action":"PDE 억제→cAMP↑→혈소판 활성↓ + 혈관확장"},"GPIIbIIIa":{"drug":"drug:tirofiban","action":"최종 공통경로(섬유소원 가교) 차단. 정맥주사·PCI."},"PAR1":{"drug":"vorapaxar","action":"트롬빈 수용체 차단. (국내 제한적, 학습 참고)"}}},"L3_antiplatelet_evolution":{"title":"항혈소판 진화사 — 활성화 경로를 하나씩 공략","timeline_concept":"COX(아스피린) → P2Y12 프로드럭(clopidogrel) → P2Y12 강화·직접(prasugrel·ticagrelor) → 최종공통 GPIIbIIIa → 트롬빈수용체 PAR-1(vorapaxar)","through_theme":"표적을 활성화 단계별로 더 강하게/직접/가역으로. 출혈-허혈 균형 조율.","_fill_at_build":"약물별 승인연도·대표시험(CAPRIE·TRITON·PLATO 등)은 빌드시 약물 기본정보로 채움"},"L4_anticoagulant_evolution":{"title":"항응고 진화사 — 출혈을 줄이려는 선택성의 여정","timeline_concept":"헤파린·와파린(비특이·모니터링 필요) → LMWH/폰다(부분 선택) → DOAC(Xa/IIa 직접·고정용량) → factor XI(지혈 보존)","through_theme":"비특이 광범위 억제 → 점점 선택적 표적 → 항혈전 유지하며 출혈만 분리하려는 시도. L2 사슬길이 story와 D9가 양 끝.","honest_endpoint":"factor XI = 약속(AZALEA 성공)과 실패(OCEANIC-AF 좌초) 공존. 차세대=만능 아님(D9 정직성).","_fill_at_build":"약물별 승인연도·대표시험(RE-LY·ROCKET-AF·ARISTOTLE·ENGAGE-AF)은 빌드시 채움"}},"_learning_principles":{"audience":"기반지식 없어도 이해 가능한 수준. 단계 설명 + SVG 모식도 + 용어 풀이. 영어 용어 통일.","format":"핵심만 펼침, 나머지 접기. 색(crimson/slate)으로 동맥/정맥 직관 학습.","no_simulation":"시뮬레이션 섹션 v0.1 보류(플로우 안정화 후)"}},"druglib":{"_meta":{"block":"라이브러리 약물상세 — DOAC 4종 (라운드1)","version":"0.1","status":"verified-frozen-candidate (국내 허가용량 코딩 직전 재확인 플래그)","sources":[{"ref":"JAHA 2020 Practical Guide DOAC","doi":"10.1161/JAHA.120.017559","pmc":"PMC7670541"},{"ref":"Apixaban dose adjustment critical analysis","pmc":"PMC8175828"},{"ref":"DOAC in CKD update","pmc":"PMC7769201"},{"ref":"Xarelto HCP condition-specific dosing","url":"xareltohcp.com/dosing"},{"ref":"대한부정맥학회 2024 NOAC 사용지침","url":"k-hrs.org"}],"_recheck":"국내 허가용량(특히 dabigatran 110mg, edoxaban 30mg 기준)·급여 CrCl 컷오프는 식약처·HIRA 원문 코딩 직전 재확인","renal_note":"CrCl은 Cockcroft-Gault(실체중) 기준. eGFR(CKD-EPI)과 다를 수 있음 — DOAC 용량조절은 CrCl 사용이 원칙."},"drug:apixaban":{"id":"drug:apixaban","ko":"아픽사반","class":"class:doac_fxa","target":"Factor Xa 직접","renal_excretion":"27% (DOAC 중 최소)","half_life":"8–15시간","onset":"3–4시간","reversal":"andexanet alfa(국내 미확인) / 4F-PCC","indications":[{"cond":"NVAF (뇌졸중예방)","std":"5 mg BID","reduce":"2.5 mg BID — 다음 3개 중 2개 충족 시: ①연령 ≥80세 ②체중 ≤60kg ③혈청Cr ≥1.5 mg/dL","note":"감량기준이 eGFR이 아닌 3중2 방식(C-G 대입 시 약 CrCl 30 상당)"},{"cond":"VTE 치료","std":"10 mg BID × 7일 → 5 mg BID","reduce":"VTE에는 공식 감량기준 없음(신기능 무관 유지)","note":"초기 부하(10mg BID 1주)가 특징 — parenteral 브릿지 불요"},{"cond":"VTE 재발예방(6개월 후)","std":"2.5 mg BID","reduce":"—"}],"renal_table":[{"crcl":"≥30 (또는 3중2 미충족)","dose":"5 mg BID (NVAF)"},{"crcl":"3중2 충족","dose":"2.5 mg BID"},{"crcl":"<15 / 투석","dose":"국내 권고 제한 — 신중, 근거부족(투석시 2.5 BID 쓰이기도)"}],"interactions":"강력 CYP3A4+P-gp 이중 억제제(케토코나졸·이트라코나졸·리토나비르)와 병용 시 감량/회피. 이중 유도제(리팜핀·카바마제핀·페니토인) 병용 회피.","tips":"신기능 영향이 가장 적어 중증 CKD·고령에서 선호되는 경향. 1일 2회 복용 순응도가 관건. 감량기준을 신기능 하나로 오해하지 말 것(3중2).","_kr_flag":"국내 NVAF 급여 CHA2DS2-VASc≥2 (D7 참조)"},"drug:rivaroxaban":{"id":"drug:rivaroxaban","ko":"리바록사반","class":"class:doac_fxa","target":"Factor Xa 직접","renal_excretion":"35%","half_life":"5–9시간(젊은층)·11–13시간(고령)","onset":"2–4시간","reversal":"andexanet alfa(국내 미확인) / 4F-PCC","indications":[{"cond":"NVAF","std":"20 mg QD (저녁 식사와)","reduce":"15 mg QD — CrCl 15–50","note":"적응증 기반 감량. 반드시 음식과 복용(15/20mg 흡수율↑)"},{"cond":"VTE 치료","std":"15 mg BID × 21일 → 20 mg QD","reduce":"치료기 후 유지 20 mg QD(CrCl≥15). 감량은 개별판단","note":"초기 3주 BID 부하가 특징"},{"cond":"VTE 재발예방","std":"10 mg QD 또는 20 mg QD","reduce":"—"},{"cond":"CAD/PAD (COMPASS)","std":"2.5 mg BID + 아스피린","reduce":"—","note":"동맥질환에 저용량 병용 — 학습 L1 참조"}],"renal_table":[{"crcl":"≥50","dose":"20 mg QD (NVAF)"},{"crcl":"15–50","dose":"15 mg QD (NVAF)"},{"crcl":"<15 / 투석","dose":"권고 안 됨(회피)"}],"interactions":"강력 CYP3A4+P-gp 이중 억제/유도제 병용 회피(아픽사반과 동일 계열 주의). 아졸계 항진균제·HIV 프로테아제억제제 주의.","tips":"1일 1회로 순응도 유리하나 반드시 식사와 복용. CrCl 저하 시 노출↑ — 15mg도 일부 환자엔 높을 수 있다는 지적(정밀용량 연구 진행).","_kr_flag":"국내 NVAF 급여 CHA2DS2-VASc≥2"},"drug:edoxaban":{"id":"drug:edoxaban","ko":"에독사반","class":"class:doac_fxa","target":"Factor Xa 직접","renal_excretion":"50% (DOAC 중 최대)","half_life":"10–14시간","onset":"1–2시간","reversal":"andexanet(off-label, 국내 미확인) / 4F-PCC","indications":[{"cond":"NVAF","std":"60 mg QD","reduce":"30 mg QD — CrCl 15–50 OR 체중 ≤60kg OR 강력 P-gp억제제 병용","note":"★신기능 정상(CrCl>95)에선 효능 저하 경고 — 뇌졸중예방 효과 감소 보고"},{"cond":"VTE 치료","std":"LMWH/헤파린 5–10일 선행 → 60 mg QD","reduce":"30 mg QD (동일 감량조건)","note":"parenteral 선행 필수(HOKUSAI-VTE 설계)"}],"renal_table":[{"crcl":">95","dose":"NVAF 효능저하 경고 — 대체 고려"},{"crcl":"50–95","dose":"60 mg QD"},{"crcl":"15–50","dose":"30 mg QD"},{"crcl":"<15 / 투석","dose":"권고 안 됨"}],"interactions":"강력 P-gp 억제제(베라파밀·퀴니딘·드로네다론)와 병용 시 30mg 감량. CYP 영향은 FXa억제제 중 적은 편.","tips":"신기능이 '너무 좋아도' 문제 — CrCl>95는 대체약 고려. parenteral 선행이 필요해 급성기 단독 시작 불가.","_kr_flag":"국내 NVAF 급여 CHA2DS2-VASc≥2"},"drug:dabigatran":{"id":"drug:dabigatran","ko":"다비가트란","class":"class:doac_dti","target":"Factor IIa(트롬빈) 직접","renal_excretion":"80% (최대 — 신기능 의존 큼)","half_life":"12–17시간(정상)·장기화(신부전)","onset":"1–2시간","reversal":"idarucizumab(특이역전·국내 급여) — DOAC 중 유일 특이역전제","indications":[{"cond":"NVAF","std":"150 mg BID","reduce":"110 mg BID — 고령(≥80세) OR P-gp억제제(베라파밀) 병용 OR 출혈고위험(HAS-BLED≥3) OR 중등도 신장애","note":"국내 110mg 도입. 75mg(미국 CrCl15-30)는 국내 미도입"},{"cond":"VTE 치료","std":"parenteral 5–10일 선행 → 150 mg BID","reduce":"110 mg BID(동일조건)","note":"parenteral 선행 필수(RE-COVER)"}],"renal_table":[{"crcl":"≥50","dose":"150 mg BID (또는 110)"},{"crcl":"30–50","dose":"150 또는 110 mg BID(출혈위험 고려 감량)"},{"crcl":"<30","dose":"국내 금기/회피 (신배설 80%)"}],"interactions":"P-gp 억제제(케토코나졸·드로네다론·베라파밀)와 병용 주의/감량. P-gp 유도제(리팜핀) 병용 회피. CYP 대사 거의 없음.","tips":"특이역전제(이다루시주맙)가 있는 유일한 DOAC — 응급수술 잦은 환자에 강점. 단 신배설 80%라 신기능 악화 시 축적 위험 최대. 캡슐 습기민감(원포장 보관). 소화불량 부작용 흔함.","_kr_flag":"국내 NVAF 급여 CHA2DS2-VASc≥2. 이다루시주맙 응급 급여(D6)"},"drug:aspirin":{"id":"drug:aspirin","ko":"아스피린","class":"class:antiplatelet_cox","target":"COX-1 비가역 억제 → TXA2↓","renal_excretion":"—","half_life":"효소 비가역(혈소판 수명 7–10일)","onset":"속효성 30–60분","reversal":"특이역전제 없음(혈소판 수혈 — 단 ACG는 GI출혈시 수혈 반대)","indications":[{"cond":"심혈관 2차예방","std":"75–100 mg QD","reduce":"—","note":"저용량이 표준. 고용량이 효과 더 크지 않고 출혈만↑"},{"cond":"ACS 부하","std":"150–300 mg 1회 부하 → 75–100 mg QD","reduce":"—","note":"DAPT 시 유지 아스피린 100mg 초과 금지(특히 티카그렐러 병용)"}],"renal_table":[{"crcl":"전 구간","dose":"용량조절 불요(신배설 비의존)"}],"interactions":"NSAID(이부프로펜)와 병용 시 COX-1 경쟁으로 항혈소판 효과 감소 가능 — 복용 간격 분리. 항응고제 병용 시 출혈↑.","contraindication":"활동성 소화성궤양·출혈, 아스피린 과민(천식 등), 중증 간·신부전","tips":"위장관 출혈이 흔한 부작용 — 고위험군 PPI 병용 고려. 수술 전에도 심혈관 고위험군은 유지하는 경우가 많음(중단 말 것).","_kr_flag":"저용량 아스피린 급여는 적응증(심혈관질환) 기반"},"drug:clopidogrel":{"id":"drug:clopidogrel","ko":"클로피도그렐","class":"class:antiplatelet_p2y12","target":"P2Y12(ADP 수용체) 비가역 — 프로드럭","renal_excretion":"—","half_life":"활성대사체 단반감기(효과는 혈소판 수명)","onset":"부하 600mg시 2–8시간","reversal":"특이역전제 없음(혈소판 수혈 유효 — 대사체 단반감기)","indications":[{"cond":"ACS/PCI 부하","std":"300–600 mg 부하 → 75 mg QD","reduce":"—","note":"부하 600mg이 표준(빠른 발현). 이중용량 유지는 이점 불명확"},{"cond":"만성 2차예방","std":"75 mg QD","reduce":"—","note":"아스피린 불내성 시 단독 대체로도 사용"}],"renal_table":[{"crcl":"전 구간","dose":"용량조절 불요(단 중증 신부전 경험 제한적)"}],"interactions":"★CYP2C19 억제제(오메프라졸·에소메프라졸) 병용 시 활성화↓ → 판토프라졸/라베프라졸 선호. 강력 CYP2C19 유도/억제제 주의.","contraindication":"활동성 출혈, 중증 간장애","tips":"CYP2C19 유전다형성으로 15–30% 저반응 — 아시아인 poor metabolizer 비율 높음. PPI 병용시 오메프라졸 회피가 실전 포인트.","_kr_flag":"국내 급여 적응증(허혈성 심질환·뇌혈관·말초동맥). 아스피린 병용 DAPT 기간 급여조건 확인"},"drug:prasugrel":{"id":"drug:prasugrel","ko":"프라수그렐","class":"class:antiplatelet_p2y12","target":"P2Y12 비가역 — 프로드럭(효율적 활성화)","renal_excretion":"—","half_life":"활성대사체 단반감기(효과는 혈소판 수명)","onset":"부하 60mg시 30분–4시간(빠름)","reversal":"특이역전제 없음(혈소판 수혈 유효)","indications":[{"cond":"ACS+PCI","std":"60 mg 부하 → 10 mg QD","reduce":"5 mg QD — ≥75세 또는 체중 <60kg","note":"관상동맥 해부 확인 후 사용(진단 전 투여 비권장)"}],"renal_table":[{"crcl":"전 구간","dose":"신기능 조절 불요(단 ESRD 경험 제한)"}],"interactions":"다른 항혈전제와 병용 시 출혈↑. CYP 영향은 클로피도그렐보다 적음(활성화 일관).","contraindication":"★뇌졸중·TIA 병력(금기), 활동성 출혈, 중증 간장애. 관상동맥 해부 미확인 시 비권장.","tips":"클로피도그렐보다 강력·일관되나 출혈↑. 고령·저체중은 5mg 감량. 뇌졸중 병력이면 절대 쓰지 말 것 — 가장 중요한 금기.","_kr_flag":"국내 급여 ACS+PCI 적응증 확인"},"drug:ticagrelor":{"id":"drug:ticagrelor","ko":"티카그렐러","class":"class:antiplatelet_p2y12","target":"P2Y12 직접·가역 (프로드럭 아님)","renal_excretion":"—","half_life":"7–9시간(가역이나 효과 ~5일 지속)","onset":"부하 180mg시 30분–2시간(빠름)","reversal":"특이역전제 벤트라시맙(연구단계). 혈소판 수혈은 가역결합으로 효과 제한적.","indications":[{"cond":"ACS (첫 12개월)","std":"180 mg 부하 → 90 mg BID","reduce":"—","note":"아스피린 75–100mg 병용, 100mg 초과 금지"},{"cond":"ACS 12개월 이후 고위험","std":"60 mg BID","reduce":"—","note":"장기 2차예방 감량 유지"}],"renal_table":[{"crcl":"전 구간","dose":"신기능 조절 불요(투석 경험 제한)"}],"interactions":"강력 CYP3A4 억제제(케토코나졸·클래리스로마이신) 병용 금기·회피. CYP3A4 유도제(리팜핀)는 효과↓. 심바스타틴·로바스타틴 40mg 초과 병용 주의.","contraindication":"★중증 간장애(금기), 활동성 출혈, 두개내출혈 병력.","tips":"호흡곤란(dyspnea) 부작용 특징적 — 아데노신 관련, 대개 경미하나 중단 사유 될 수 있음. 1일 2회 순응도 관건. 프로드럭 아니라 발현 빠름.","_kr_flag":"국내 급여 ACS 적응증. 60mg 장기유지 급여조건 확인"},"drug:cilostazol":{"id":"drug:cilostazol","ko":"실로스타졸","class":"class:antiplatelet_pde","target":"PDE3 억제 → cAMP↑ (+ 혈관확장)","renal_excretion":"—","half_life":"11–13시간","onset":"정상상태 수일","reversal":"특이역전제 없음","indications":[{"cond":"말초동맥질환(간헐성 파행)","std":"100 mg BID (식전 30분/식후 2시간)","reduce":"—","note":"증상완화·보행거리 개선 목적"},{"cond":"뇌졸중 2차예방(일부)","std":"100 mg BID","reduce":"—","note":"국내 사용 있음"}],"renal_table":[{"crcl":"전 구간","dose":"용량조절 자료 제한 — 신중"}],"interactions":"강력 CYP3A4/CYP2C19 억제제(케토코나졸·오메프라졸) 병용 시 감량(50mg BID). 자몽주스 주의.","contraindication":"★모든 심부전 환자에 금기 — PDE3 억제로 치명적 부정맥 위험(심박수 5–7 BPM↑, 심실조기수축↑). 활동성 출혈.","tips":"심부전 금기가 절대적 — 처방 전 반드시 확인. 두통이 흔한 부작용. 간헐성 파행에 pentoxifylline이 심부전 동반 시 대안.","_kr_flag":"국내 급여 말초동맥질환·뇌졸중 적응증 확인"},"drug:heparin":{"id":"drug:heparin","ko":"헤파린(미분획, UFH)","class":"class:heparin","target":"AT 매개 IIa·Xa 억제 (1:1)","renal_excretion":"간·세망내피(신비의존 낮음)","half_life":"1–2시간(용량의존)","onset":"IV 즉시","reversal":"프로타민(특이·완전역전)","indications":[{"cond":"치료(ACS·VTE)","std":"체중기반 IV(bolus + 지속주입), aPTT 조절","reduce":"—","note":"aPTT 1.5–2.5배 목표. anti-Xa 모니터링 대안"},{"cond":"예방","std":"5000 U SC BID–TID","reduce":"—"}],"renal_table":[{"crcl":"전 구간","dose":"신조절 불요 — 신부전에서 LMWH보다 선호(ACCP)"}],"interactions":"다른 항응고·항혈소판제와 출혈↑. 니트로글리세린 IV가 헤파린 효과 감소시킬 수 있음.","contraindication":"활동성 대량출혈, HIT(헤파린유발 혈소판감소증) 병력. 혈소판 모니터링 필수.","tips":"반감기 짧아 조절 용이 — 출혈시 중단만으로 빠르게 회복, 프로타민으로 완전역전. 신부전에서 LMWH 대신 선호. HIT 감시(혈소판 4–14일).","_kr_flag":"입원 치료 기반 급여"},"drug:enoxaparin":{"id":"drug:enoxaparin","ko":"에녹사파린(LMWH)","class":"class:heparin","target":"AT 매개 Xa 우위 (anti-Xa:IIa ≈ 2–4:1)","renal_excretion":"신배설(축적 위험)","half_life":"4–7시간(신부전서 연장)","onset":"SC 3–5시간(peak)","reversal":"프로타민(부분역전 ~60%)","indications":[{"cond":"치료(ACS·VTE)","std":"1 mg/kg SC BID (또는 1.5 mg/kg QD)","reduce":"CrCl<30: 1 mg/kg SC QD로 감량","note":"BID가 QD보다 선호(중단계획·출혈완화). CrCl 30–50은 25% 감량 고려"},{"cond":"예방","std":"40 mg SC QD","reduce":"CrCl<30: 30 mg SC QD"}],"renal_table":[{"crcl":"≥30","dose":"치료 1 mg/kg BID / 예방 40 mg QD"},{"crcl":"<30","dose":"치료 1 mg/kg QD / 예방 30 mg QD (anti-Xa 모니터링 고려)"}],"interactions":"다른 항혈전제와 출혈↑. 신부전서 축적.","contraindication":"활동성 대량출혈, HIT 병력, 중증 신부전 신중.","tips":"신기능 저하 시 축적 — CrCl<30 감량 필수, anti-Xa 모니터링 고려. 프로타민은 부분(~60%)만 중화. 신부전에선 UFH가 더 안전할 수 있음.","_kr_flag":"치료·예방 적응증별 급여"},"drug:fondaparinux":{"id":"drug:fondaparinux","ko":"폰다파리눅스","class":"class:heparin","target":"AT 매개 Xa 선택 억제 (펜타사카라이드)","renal_excretion":"신배설(높음)","half_life":"17–21시간(길다)","onset":"SC 2–3시간(peak)","reversal":"특이역전제 없음(프로타민 무효) — 지혈 어려움","indications":[{"cond":"VTE 치료","std":"체중별 5/7.5/10 mg SC QD (<50/50–100/>100kg)","reduce":"—","note":"반감기 길어 1일 1회. HIT에서 대안으로 쓰이기도"},{"cond":"VTE 예방","std":"2.5 mg SC QD","reduce":"CrCl 20–50: 1.5 mg QD"}],"renal_table":[{"crcl":">50","dose":"표준(치료 체중별 / 예방 2.5 mg)"},{"crcl":"20–50","dose":"예방 1.5 mg QD, 치료는 신중"},{"crcl":"<20–30","dose":"★금기(CrCl<30 금기, <20 절대금기)"}],"interactions":"다른 항혈전제와 출혈↑.","contraindication":"★중증 신부전(CrCl<30) 금기, 활동성 출혈, 체중<50kg 예방 신중.","tips":"반감기 길고 역전제 없어 출혈시 관리 어려움 — 신중한 환자 선택. HIT에서 교차반응 없어 대안이 될 수 있음. 프로타민 안 들음.","_kr_flag":"치료·예방 적응증별 급여"}}};</script>
<script>// ============================================================
// 항혈전제 가이드 ENGINE v0.1
// 정문: recommend(patient) -> { drugs[], targets[], flags[], reimbursement[] }
// 원칙: DATA/ENGINE/UI 분리. 임상수치는 DATA에만. 엔진은 DATA를 ID로 참조·조합.
// advisory only — 처방결정권은 의사.
// ============================================================

window.buildEngine=function(DATA) {
  const PP = DATA.periprocedural;
  const ENDO = DATA.periendoscopy;
  const REV = DATA.reversal;
  const REIMB = DATA.reimbursement;

  // --- 약물→계열 매핑 (라우팅용) ---
  const DOAC = ['drug:apixaban','drug:edoxaban','drug:rivaroxaban','drug:dabigatran'];
  const ANTIPLATELET = Object.keys(PP.antiplatelet_periop.agents);
  const GI_PROCS = new Set([
    ...ENDO.endoscopyBleedRisk.high.procedures.map(p=>p.id),
    ...ENDO.endoscopyBleedRisk.low.procedures.map(p=>p.id)
  ]);

  // --- 시술 출혈위험 판정 (GI는 D4 우선, 그 외 D1) ---
  function resolveBleedRisk(procId) {
    if (!procId) return { tier:null, isGI:false, src:null };
    // D4 내시경 우선
    if (ENDO.endoscopyBleedRisk.high.procedures.some(p=>p.id===procId))
      return { tier:'high', isGI:true, src:'ACG-CAG 2022' };
    if (ENDO.endoscopyBleedRisk.low.procedures.some(p=>p.id===procId))
      return { tier:'low', isGI:true, src:'ACG-CAG 2022' };
    // D1 일반시술
    const P = PP.procedures;
    const inList = (arr)=>arr && arr.some(x=> (typeof x==='string'?x:x.id)===procId);
    if (inList(P._GI_focus.filter(p=>p.bleedRisk==='high'))|| inList(P._other_high))
      return { tier:'high', isGI:false, src:'CHEST 2022' };
    if (inList(P._GI_focus.filter(p=>p.bleedRisk==='lowmod'))|| inList(P._other_lowmod))
      return { tier:'lowmod', isGI:false, src:'CHEST 2022' };
    if (inList(P._minimal))
      return { tier:'minimal', isGI:false, src:'CHEST 2022' };
    // GI_focus 개별 점검
    const gi = P._GI_focus.find(p=>p.id===procId);
    if (gi) return { tier:gi.bleedRisk, isGI:false, src:'CHEST 2022' };
    return { tier:null, isGI:false, src:null };
  }

  // tier 정규화: D1은 lowmod/high/minimal, D4는 low/high
  function normTier(tier){
    if(tier==='low') return 'lowmod';
    return tier; // high, lowmod, minimal 그대로
  }

  // --- DOAC 중단·재개 ---
  function doacPlan(drugId, tier, egfr) {
    const a = PP.doac_periop.agents[drugId];
    const t = normTier(tier)==='minimal' ? 'lowmod' : normTier(tier); // minimal은 lowmod로 보수적
    let hold, renalNote=null;
    if (a.renalIndependent) {
      hold = a.hold[t];
    } else if (a.renalDependent) {
      // dabigatran: CrCl 구간
      let band;
      if (egfr==null) { band='crcl_30_50'; renalNote='신기능 미입력 → 보수적(CrCl 30-50) 가정'; }
      else if (egfr>=50) band='crcl_ge50';
      else if (egfr>=30) band='crcl_30_50';
      else band='crcl_lt30';
      hold = a.byRenal[band].hold[t];
      if (egfr!=null && egfr<30) renalNote='CrCl<30: anti-Xa 일상측정 회피, 실체중 계산';
    }
    const resume = (t==='high') ? PP.doac_periop._resume_general.high
                                : PP.doac_periop._resume_general.lowmod;
    return { id:drugId, action:'hold', holdDays:hold, resumeAfter:resume, renalNote,
             _src:'CHEST 2022 / PAUSE' };
  }

  // --- 항혈소판 중단·재개 ---
  function antiplateletPlan(drugId, tier) {
    const a = PP.antiplatelet_periop.agents[drugId];
    // 고출혈위험 기준. 저위험·minimal은 대개 지속(특히 ASA).
    const t = normTier(tier);
    if (drugId==='drug:aspirin' && t!=='high') {
      return { id:drugId, action:'continue', note:'비고위험: ASA 유지(중단말 것)', _src:'CHEST 2022' };
    }
    return { id:drugId, action: t==='high'?'hold':'consider_continue',
             holdDays:a.hold_days, resumeAfter:a.resume,
             note: t!=='high'?'저위험 시술: 지속 고려(DAPT면 P2Y12만 중단)':null,
             _src:'CHEST 2022' };
  }

  // --- 와파린 ---
  function warfarinPlan(tier, isGI, thromboticRisk) {
    if (isGI) {
      // ACG-CAG: 내시경은 와파린 유지
      return { id:'drug:warfarin', action:'continue',
               note:'내시경: 와파린 유지 권고(중단보다). bridging 반대.',
               grade:ENDO.elective_endoscopy.warfarin.grade, _src:'ACG-CAG 2022' };
    }
    const c = PP.conventional_periop['drug:warfarin'];
    const bridge = (thromboticRisk==='high' && normTier(tier)!=='high');
    return { id:'drug:warfarin', action:'hold', holdInfo:c.hold, resumeAfter:c.resume,
             bridging: bridge ? 'consider (고혈전+저출혈)' : 'no (AF routine bridging 반대)',
             _src:'CHEST 2022' };
  }

  // --- 역전제 매핑 ---
  function reversalFor(drugId) {
    const r = REV.reversal_decision_logic[drugId];
    if (!r) return null;
    const first = REV.specific_reversal[r.first] || REV.nonspecific_reversal[r.first];
    return { target:drugId, first:r.first, firstLabel:first?(first.brand_ko||first.label_ko||r.first):r.first,
             alt:r.alt, krCaveat:r._kr_caveat||null };
  }

  // --- 급여 ---
  function reimbursementFor(drugId, comorbids) {
    const out=[];
    if (DOAC.includes(drugId) && comorbids && comorbids.includes('comorbid:af')) {
      const n = REIMB.noac_reimbursement_nvaf;
      out.push({ drug:drugId, scheme:'NVAF',
                 criterion:`${n.criterion.score} ${n.criterion.threshold}`,
                 conflict:n._GUIDELINE_VS_REIMBURSEMENT_CONFLICT.gap,
                 _recheck:'HIRA 원문 확인' });
    }
    return out;
  }

  // ============ 정문 ============
  function recommend(patient) {
    patient = patient||{};
    const meds = patient.meds||[];
    const tierInfo = resolveBleedRisk(patient.proc);
    const egfr = patient.egfr==null?null:Number(patient.egfr);
    const comorbids = patient.comorbids||[];
    const thromboticRisk = patient.thromboticRisk||null;

    const drugs=[], flags=[], reimbursement=[];

    // 신기능 경고
    if (egfr!=null && egfr<30)
      flags.push({level:'warn', code:'renal', msg:`CrCl/eGFR ${egfr}: DOAC 중단기간 연장, 용량·역전 주의`});

    for (const m of meds) {
      if (DOAC.includes(m)) {
        if (tierInfo.isGI) {
          // 내시경: DOAC는 중단(ACG-CAG) + 중단일수는 CHEST표 적용
          const plan = doacPlan(m, tierInfo.tier, egfr);
          plan.endoNote='내시경: DOAC 일시중단 권고(ACG-CAG). 재개 대개 익일.';
          drugs.push(plan);
        } else if (tierInfo.tier) {
          drugs.push(doacPlan(m, tierInfo.tier, egfr));
        } else {
          drugs.push({id:m, action:'info', note:'시술 미선택: 일반 복약정보만'});
        }
      } else if (m==='drug:warfarin') {
        drugs.push(warfarinPlan(tierInfo.tier, tierInfo.isGI, thromboticRisk));
      } else if (ANTIPLATELET.includes(m)) {
        drugs.push(antiplateletPlan(m, tierInfo.tier));
      } else {
        drugs.push({id:m, action:'info', note:'periprocedural 표 외 약물 — 라이브러리 참조'});
      }
      // 역전제·급여 부가
      const rev=reversalFor(m); if(rev) flags.push({level:'info', code:'reversal', msg:`${m} 역전: ${rev.firstLabel}${rev.alt?(' / 대체 '+rev.alt):''}`, data:rev});
      reimbursement.push(...reimbursementFor(m, comorbids));
    }

    // 안전장치: DAPT(ASA+P2Y12) + 고위험 시술 동시중단 경고
    const p2y12List = ['drug:clopidogrel','drug:prasugrel','drug:ticagrelor'];
    const hasASA = meds.includes('drug:aspirin');
    const hasP2Y12 = meds.some(m=>p2y12List.includes(m));
    if (hasASA && hasP2Y12 && normTier(tierInfo.tier)==='high') {
      flags.push({level:'warn', code:'dapt_highrisk',
        msg:'DAPT + 고위험 시술: ASA 유지·P2Y12만 중단이 원칙(ACG-CAG). 스텐트 혈전 위험 — 시술 연기 또는 심장내과 협진 권고.'});
    }

    // 시술 위험 플래그
    if (tierInfo.tier)
      flags.push({level:'info', code:'bleedrisk',
        msg:`시술 출혈위험: ${normTier(tierInfo.tier)} (${tierInfo.src}${tierInfo.isGI?', 내시경 정밀분류':''})`});

    return { drugs, targets:[], flags, reimbursement, _meta:{tier:tierInfo, egfr} };
  }

  return { recommend, resolveBleedRisk, _internal:{doacPlan, antiplateletPlan, warfarinPlan, reversalFor} };
}</script>

// 약물 타일 → 바텀시트
function tileOpen(id,cls){
  const ko=DRUG_KO[id]||id;
  const DL=(DATA.druglib&&DATA.druglib[id])||null;
  if(DL){ return tileOpenRich(id,cls,DL); }  // 상세 데이터 있으면 풍부한 시트
  // 기존 간단 시트 (상세 미보강 약물)
  const d=LIB_DETAIL[id]||{};
  const rev=REV.reversal_decision_logic[id];
  const revTxt=rev?REV_KO_LIB(rev.first):'—';
  let b=`<div class="sheet-title" style="color:var(--${cls})">${ko}</div>`;
  b+=`<div class="sheet-target">${d.target||''}</div>`;
  b+=`<p class="sheet-extra">${d.extra||''}</p>`;
  b+=`<div class="sheet-rows">`;
  if(d.half) b+=`<div class="sheet-row"><span>반감기</span><b>${d.half}</b></div>`;
  if(d.hold) b+=`<div class="sheet-row"><span>시술 전 중단</span><b>${d.hold}</b></div>`;
  if(d.resume) b+=`<div class="sheet-row"><span>재개</span><b>${d.resume}</b></div>`;
  if(d.renal) b+=`<div class="sheet-row"><span>신기능</span><b>${d.renal}</b></div>`;
  b+=`<div class="sheet-row"><span>역전</span><b>${revTxt}</b></div>`;
  b+=`</div>`;
  openSheet(b);
}

// 풍부한 시트 (DOAC 등 상세 데이터)
function tileOpenRich(id,cls,DL){
  let b=`<div class="sheet-title" style="color:var(--${cls})">${DL.ko}</div>`;
  b+=`<div class="sheet-target">${DL.target} · ${DL.class.replace('class:','')}</div>`;

  // 핵심 지표 (항상 열림)
  b+=`<div class="sheet-rows">`;
  b+=`<div class="sheet-row"><span>신배설</span><b>${DL.renal_excretion}</b></div>`;
  b+=`<div class="sheet-row"><span>반감기</span><b>${DL.half_life}</b></div>`;
  if(DL.onset) b+=`<div class="sheet-row"><span>Tmax</span><b>${DL.onset}</b></div>`;
  b+=`<div class="sheet-row"><span>역전</span><b>${DL.reversal}</b></div>`;
  b+=`</div>`;

  // 적응증별 용량 (핵심 — 열림)
  b+=`<div class="sheet-sect-h">💊 적응증별 용량</div>`;
  DL.indications.forEach(ind=>{
    b+=`<div class="dose-card ${cls}">
      <div class="dose-cond">${ind.cond}</div>
      <div class="dose-std"><b>표준</b> ${ind.std}</div>`;
    if(ind.reduce && ind.reduce!=='—') b+=`<div class="dose-red"><b>감량</b> ${ind.reduce}</div>`;
    if(ind.note) b+=`<div class="dose-note">${ind.note}</div>`;
    b+=`</div>`;
  });

  // CrCl 조절표 (핵심 — 열림)
  b+=`<div class="sheet-sect-h">🫘 신기능(CrCl)별 용량</div>`;
  b+=`<div class="tbl-scroll"><table class="dtbl mini"><thead><tr><th>CrCl (mL/min)</th><th>용량</th></tr></thead><tbody>`;
  DL.renal_table.forEach(r=>{
    b+=`<tr><td class="dtbl-name">${r.crcl}</td><td style="text-align:left">${r.dose}</td></tr>`;
  });
  b+=`</tbody></table></div>`;

  // 상호작용·팁 (접기)
  b+=`<details class="sheet-det"><summary>⚠️ 상호작용</summary><div class="det-b"><p class="sheet-extra" style="margin:6px 0">${DL.interactions}</p></div></details>`;
  b+=`<details class="sheet-det"><summary>💡 실전 팁</summary><div class="det-b"><p class="sheet-extra" style="margin:6px 0">${DL.tips}</p></div></details>`;
  // 금기 (항상 표시 — 안전정보)
  if(DL.contraindication) b+=`<div class="sheet-ci">🚫 <b>금기·주의</b><br>${DL.contraindication}</div>`;
  if(DL._kr_flag) b+=`<div class="sheet-kr">🇰🇷 ${DL._kr_flag}</div>`;

  openSheet(b);
}

// ===== 항혈전제 가이드 UI v0.1 =====
const ENG = buildEngine(DATA);
const PP = DATA.periprocedural, ENDO = DATA.periendoscopy, REV = DATA.reversal,
      NEXT = DATA.nextgen, LEARN = DATA.learn;

// 약물 표시명
const DRUG_KO = {
  'drug:warfarin':'와파린','drug:dabigatran':'다비가트란','drug:rivaroxaban':'리바록사반',
  'drug:apixaban':'아픽사반','drug:edoxaban':'에독사반','drug:heparin':'헤파린(UFH)',
  'drug:enoxaparin':'에녹사파린(LMWH)','drug:fondaparinux':'폰다파리눅스',
  'drug:aspirin':'아스피린','drug:clopidogrel':'클로피도그렐','drug:prasugrel':'프라수그렐',
  'drug:ticagrelor':'티카그렐러','drug:cilostazol':'실로스타졸','drug:dipyridamole':'디피리다몰'
};
const DRUG_AXIS = { // 동맥/정맥 축
  'drug:aspirin':'art','drug:clopidogrel':'art','drug:prasugrel':'art','drug:ticagrelor':'art',
  'drug:cilostazol':'art','drug:dipyridamole':'art',
  'drug:warfarin':'ven','drug:dabigatran':'ven','drug:rivaroxaban':'ven','drug:apixaban':'ven',
  'drug:edoxaban':'ven','drug:heparin':'ven','drug:enoxaparin':'ven','drug:fondaparinux':'ven'
};

const state = { meds:new Set(), proc:'', egfr:null, comorbids:new Set(), thrombo:null };

// 역전제 ID → 한글명
const REV_KO_MAP = {
  'drug:idarucizumab':'이다루시주맙','drug:andexanet_alfa':'안덱사넷','drug:pcc_4f':'4F-PCC',
  'drug:apcc_feiba':'APCC(FEIBA)','drug:vitamin_k':'비타민K','drug:protamine':'프로타민'
};
function REV_KO(id){ return REV_KO_MAP[id]||DRUG_KO[id]||id; }

// ── 바텀시트 ──
function openSheet(html){
  document.getElementById('sheet-body').innerHTML=html;
  document.getElementById('sheet').classList.add('on');
  document.getElementById('sheet-ov').classList.add('on');
  document.body.style.overflow='hidden';
}
function closeSheet(){
  document.getElementById('sheet').classList.remove('on');
  document.getElementById('sheet-ov').classList.remove('on');
  document.body.style.overflow='';
}

// ── 탭 ──
function tab(t){
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.t===t));
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.getElementById('sec-'+t).classList.add('on');
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── 플로우 입력 빌드 ──
function buildInputs(){
  // 약물 칩
  const mc = document.getElementById('med-chips');
  Object.keys(DRUG_KO).forEach(id=>{
    const b=document.createElement('button');
    b.className='chip'; b.textContent=DRUG_KO[id]; b.dataset.id=id;
    b.onclick=()=>{ b.classList.toggle('on'); b.classList.toggle(DRUG_AXIS[id]);
      state.meds.has(id)?state.meds.delete(id):state.meds.add(id); run(); };
    mc.appendChild(b);
  });
  // 시술 셀렉트 (GI 우선 그룹핑)
  const ps=document.getElementById('proc-sel');
  const giHigh=ENDO.endoscopyBleedRisk.high.procedures;
  const giLow=ENDO.endoscopyBleedRisk.low.procedures;
  const og=(label,arr)=>{ const g=document.createElement('optgroup'); g.label=label;
    arr.forEach(p=>{ const o=document.createElement('option'); o.value=p.id; o.textContent=p.label_ko; g.appendChild(o);}); return g; };
  ps.appendChild(og('🔴 고위험 내시경 (ACG-CAG)',giHigh));
  ps.appendChild(og('🟢 저위험 내시경 (ACG-CAG)',giLow));
  // 비-GI 주요
  const nonGI=[
    {id:'proc:major_ortho',label_ko:'주요 정형외과수술'},{id:'proc:cardiac_surgery',label_ko:'심장수술'},
    {id:'proc:intracranial_spinal_surgery',label_ko:'두개내·척추수술'},{id:'proc:neuraxial_anesthesia',label_ko:'신경축마취(척추·경막외)'},
    {id:'proc:coronary_angiography',label_ko:'관상동맥조영술'},{id:'proc:pacemaker_icd',label_ko:'심박동기·제세동기'},
    {id:'proc:cataract',label_ko:'백내장'},{id:'proc:minor_dental',label_ko:'소수 발치·스케일링'}
  ];
  ps.appendChild(og('🏥 비-소화기 시술',nonGI));
  ps.onchange=e=>{ state.proc=e.target.value; run(); };
  // eGFR
  document.getElementById('egfr-in').oninput=e=>{ state.egfr=e.target.value===''?null:Number(e.target.value); run(); };
  // 동반질환
  const cc=document.getElementById('comorbid-chips');
  [['comorbid:af','심방세동'],['comorbid:cad','관상동맥질환'],['comorbid:vte','정맥혈전색전증'],['comorbid:mechanical_valve','기계판막']].forEach(([id,ko])=>{
    const b=document.createElement('button'); b.className='chip'; b.textContent=ko;
    b.onclick=()=>{ b.classList.toggle('on'); state.comorbids.has(id)?state.comorbids.delete(id):state.comorbids.add(id); run(); };
    cc.appendChild(b);
  });
  // 혈전위험
  const tc=document.getElementById('thrombo-chips');
  [['high','고위험'],['lowmod','저-중등도']].forEach(([v,ko])=>{
    const b=document.createElement('button'); b.className='chip'; b.textContent=ko;
    b.onclick=()=>{ tc.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
      if(state.thrombo===v){state.thrombo=null;}else{b.classList.add('on');state.thrombo=v;} run(); };
    tc.appendChild(b);
  });
}

// ── 결과 렌더 ──
function run(){
  const box=document.getElementById('result');
  if(state.meds.size===0){ box.innerHTML='<p class="muted" style="text-align:center;padding:20px 0">약물을 선택하세요</p>'; return; }
  const r=ENG.recommend({
    meds:[...state.meds], proc:state.proc||null, egfr:state.egfr,
    comorbids:[...state.comorbids], thromboticRisk:state.thrombo
  });
  let h='';
  // 플래그(warn 먼저)
  r.flags.sort((a,b)=>a.level==='warn'?-1:1).forEach(f=>{
    let msg=f.msg;
    // 역전 플래그: drug ID → 한글명
    if(f.code==='reversal' && f.data){
      const tgt=DRUG_KO[f.data.target]||f.data.target;
      const first=REV_KO(f.data.first);
      const alt=f.data.alt?(REV_KO(f.data.alt)):null;
      msg=`${tgt} 역전: ${first}${alt?(' / 대체 '+alt):''}`;
    }
    h+=`<div class="flag ${f.level}"><span>${f.level==='warn'?'⚠️':'ℹ️'}</span><span>${msg}</span></div>`;
  });
  // 약물 카드
  r.drugs.forEach(d=>{
    const ko=DRUG_KO[d.id]||d.id;
    const act=d.action;
    const actLabel={hold:'중단',continue:'유지',info:'정보',consider_continue:'유지 고려'}[act]||act;
    h+=`<div class="res-drug ${act}"><div class="res-name">${ko}</div>`;
    h+=`<span class="res-action ${act}">${actLabel}</span>`;
    if(d.holdDays!=null) h+=`<div class="res-row"><b>중단:</b> 시술 ${d.holdDays}일 전 마지막 복용</div>`;
    if(d.holdInfo) h+=`<div class="res-row"><b>중단:</b> ${d.holdInfo}</div>`;
    if(d.resumeAfter) h+=`<div class="res-row"><b>재개:</b> ${d.resumeAfter}</div>`;
    if(d.bridging) h+=`<div class="res-row"><b>Bridging:</b> ${d.bridging}</div>`;
    if(d.renalNote) h+=`<div class="res-row" style="color:var(--warn)">🔸 ${d.renalNote}</div>`;
    if(d.endoNote) h+=`<div class="res-row">🔹 ${d.endoNote}</div>`;
    if(d.note) h+=`<div class="res-row">${d.note}</div>`;
    if(d.grade) h+=`<div class="res-row muted">권고등급: ${d.grade}</div>`;
    if(d._src) h+=`<div class="res-src">${d._src}</div>`;
    h+='</div>';
  });
  // 급여
  r.reimbursement.forEach(x=>{
    h+=`<div class="reimb">💰 <b>급여 (${x.scheme}):</b> ${x.criterion}<br><span style="color:var(--ink2)">⚖️ 가이드라인 vs 급여: ${x.conflict}</span></div>`;
  });
  box.innerHTML=h;
}

document.getElementById('disc').innerHTML =
  '본 도구는 임상 의사결정 <b>보조용</b>이며 처방을 강제하지 않습니다. 모든 결정은 담당의 판단에 따릅니다.<br>'+
  '출처: CHEST 2022 (PMID 35964704) · ACG-CAG 2022 (10.14309/ajg.0000000000001627) · ISTH SSC 2024 · 대한부정맥학회 2024 · NEJM 2025';

buildInputs();
buildLibrary();
buildLearn();
run();
</script>
