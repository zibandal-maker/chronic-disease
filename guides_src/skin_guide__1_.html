<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>피부질환 통합 가이드</title>
<style>
:root{
  --bg:#f4f6f8; --panel:#ffffff; --panel2:#eef1f4; --line:#d6dde3;
  --ink:#1a2530; --ink-dim:#4a5a68; --ink-faint:#8493a0;
  --clin:#2c6fb0; --clin-bg:#e4eef8;
  --pay:#b87514; --pay-bg:#fbf0d8;
  --care:#1a8a72; --care-bg:#dcf2ec;
  --ad:#d8632a; --ad-bg:#fbe9df;
  --csu:#b5478f; --csu-bg:#f7e6f1;
  --ok:#1f9d54; --ok-bg:#e3f5ea;
  --warn:#b87514; --warn-bg:#fbf0d8;
  --block:#c43838; --block-bg:#fbe6e6;
  --alert:#d8632a;
  --accent:var(--ad); --accent-bg:var(--ad-bg);
  --radius:14px; --radius-sm:9px;
  --shadow:0 1px 3px rgba(20,40,60,.06),0 4px 16px rgba(20,40,60,.05);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",Roboto,sans-serif;
  font-size:15px;line-height:1.5;-webkit-text-size-adjust:100%;}
body{padding-bottom:84px;}
.wrap{max-width:760px;margin:0 auto;padding:0 14px;}

/* 헤더 */
.appbar{position:sticky;top:0;z-index:40;background:rgba(244,246,248,.92);
  backdrop-filter:saturate(1.4) blur(8px);-webkit-backdrop-filter:saturate(1.4) blur(8px);
  border-bottom:1px solid var(--line);}
.appbar-in{max-width:760px;margin:0 auto;padding:10px 14px 0;}
.title-row{display:flex;align-items:center;gap:9px;margin-bottom:9px;}
.title-row h1{font-size:18px;font-weight:800;margin:0;letter-spacing:-.3px;}
.title-row .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);flex:none;
  box-shadow:0 0 0 4px var(--accent-bg);transition:background .25s,box-shadow .25s;}

/* 질환 토글 */
.disease-toggle{display:flex;gap:6px;margin-bottom:9px;}
.disease-toggle button{flex:1;border:1.5px solid var(--line);background:var(--panel);
  border-radius:var(--radius-sm);padding:9px 6px;font-size:14px;font-weight:700;color:var(--ink-dim);
  cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;}
.disease-toggle button .ic{font-size:16px;}
.disease-toggle button.on[data-d="ad"]{border-color:var(--ad);background:var(--ad-bg);color:var(--ad);}
.disease-toggle button.on[data-d="csu"]{border-color:var(--csu);background:var(--csu-bg);color:var(--csu);}

/* 탭바 */
.tabbar{display:flex;gap:4px;}
.tabbar button{flex:1;border:none;background:none;padding:9px 4px 11px;font-size:13px;font-weight:700;
  color:var(--ink-faint);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .18s;
  display:flex;flex-direction:column;align-items:center;gap:3px;}
.tabbar button .ic{font-size:17px;}
.tabbar button.on{color:var(--accent);border-bottom-color:var(--accent);}

/* 콘텐츠 */
.view{padding-top:14px;}
.view[hidden]{display:none;}

/* 카드 공통 */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);margin-bottom:11px;overflow:hidden;}
.card-head{padding:13px 15px;display:flex;align-items:flex-start;gap:11px;cursor:pointer;}
.card-head .icon{font-size:22px;flex:none;line-height:1;margin-top:1px;}
.card-head .ht{flex:1;min-width:0;}
.card-head .ht .t{font-size:15.5px;font-weight:750;letter-spacing:-.2px;}
.card-head .ht .l{font-size:12.5px;color:var(--ink-faint);margin-top:2px;}
.card-head .chev{color:var(--ink-faint);font-size:13px;transition:transform .2s;flex:none;margin-top:3px;}
.card.open .card-head .chev{transform:rotate(90deg);}
.card-body{padding:0 15px;max-height:0;overflow:hidden;transition:max-height .01s;}
.card.open .card-body{max-height:none;padding:0 15px 15px;}

/* 카테고리 색 태그 */
.cat-tag{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;margin-left:6px;vertical-align:middle;}
.cat-clin{background:var(--clin-bg);color:var(--clin);}
.cat-pay{background:var(--pay-bg);color:var(--pay);}
.cat-care{background:var(--care-bg);color:var(--care);}

/* 섹션 */
.sec{margin-top:14px;}
.sec:first-child{margin-top:4px;}
.sec-t{font-size:13px;font-weight:750;color:var(--ink-dim);margin-bottom:7px;
  display:flex;align-items:center;gap:6px;}
.sec-t::before{content:"";width:3px;height:13px;background:var(--accent);border-radius:2px;}

/* keypoints */
.kp{list-style:none;margin:0;padding:0;}
.kp li{position:relative;padding:6px 0 6px 18px;font-size:13.5px;color:var(--ink);border-bottom:1px dashed var(--line);}
.kp li:last-child{border-bottom:none;}
.kp li::before{content:"›";position:absolute;left:3px;color:var(--accent);font-weight:800;}
.kp li b{color:var(--ad);}

/* note */
.note{background:var(--panel2);border-radius:var(--radius-sm);padding:10px 12px;font-size:13px;
  color:var(--ink-dim);margin-top:9px;border-left:3px solid var(--accent);}
.note .nt{font-weight:750;color:var(--ink);font-size:12.5px;margin-bottom:3px;}

/* 약물 카드(클릭형) */
.drugmini{border:1px solid var(--line);border-radius:var(--radius-sm);margin-top:8px;overflow:hidden;background:var(--panel);}
.drugmini-h{padding:10px 12px;cursor:pointer;display:flex;align-items:center;gap:9px;}
.drugmini-h .bn{font-weight:750;font-size:14px;}
.drugmini-h .gn{font-size:12px;color:var(--ink-faint);}
.drugmini-h .tg{margin-left:auto;font-size:11px;font-weight:700;padding:2px 8px;border-radius:14px;background:var(--clin-bg);color:var(--clin);}
.drugmini-b{padding:0 12px;max-height:0;overflow:hidden;transition:max-height .01s;font-size:12.5px;color:var(--ink-dim);}
.drugmini.open .drugmini-b{max-height:none;padding:2px 12px 12px;}
.drugmini .row{padding:5px 0;border-top:1px dashed var(--line);}
.drugmini .row .k{font-weight:700;color:var(--ink);font-size:11.5px;display:block;margin-bottom:1px;}
.drugmini .bx{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px;}
.drugmini .bx span{background:var(--panel2);border-radius:10px;padding:2px 8px;font-size:11px;}
.drugmini .warnbox{background:var(--block-bg);color:var(--block);border-radius:7px;padding:6px 9px;margin-top:6px;font-size:11.5px;font-weight:600;}
.drugmini .tiplist{margin:3px 0 0;padding-left:16px;}
.drugmini .tiplist li{font-size:11.5px;color:var(--ink-dim);padding:2px 0;line-height:1.45;}

/* 게이트/뱃지 */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:14px;}
.b-ok{background:var(--ok-bg);color:var(--ok);}
.b-warn{background:var(--warn-bg);color:var(--warn);}
.b-block{background:var(--block-bg);color:var(--block);}
.gaterow{display:flex;align-items:center;gap:9px;padding:9px 11px;border:1px solid var(--line);
  border-radius:var(--radius-sm);margin-top:7px;background:var(--panel);}
.gaterow .gi{font-size:16px;}
.gaterow .gl{flex:1;font-size:13px;font-weight:650;}
.gaterow .gv{font-size:11.5px;color:var(--ink-faint);}

/* table */
.codetbl{width:100%;border-collapse:collapse;margin-top:8px;font-size:12.5px;}
.codetbl td{padding:7px 9px;border-bottom:1px solid var(--line);vertical-align:top;}
.codetbl td.c{font-weight:750;color:var(--ad);white-space:nowrap;width:74px;}
.codetbl tr.hot td{background:var(--pay-bg);}

/* 검색바 */
.searchbar{position:relative;margin-bottom:12px;}
.searchbar input{width:100%;border:1.5px solid var(--line);border-radius:var(--radius-sm);
  padding:11px 14px 11px 38px;font-size:14px;background:var(--panel);color:var(--ink);}
.searchbar input:focus{outline:none;border-color:var(--accent);}
.searchbar .si{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--ink-faint);}

/* 배너 */
.banner{background:linear-gradient(135deg,var(--accent-bg),var(--panel));border:1px solid var(--line);
  border-radius:var(--radius);padding:13px 15px;margin-bottom:13px;font-size:12.5px;color:var(--ink-dim);}
.banner b{color:var(--ink);}

/* 시뮬 */
.simnode{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:13px 15px;margin-bottom:10px;box-shadow:var(--shadow);}
.simnode .sq{font-size:14.5px;font-weight:750;margin-bottom:9px;}
.simopt{display:flex;flex-wrap:wrap;gap:7px;}
.simopt button{border:1.5px solid var(--line);background:var(--panel);border-radius:20px;padding:8px 14px;font-size:13px;font-weight:650;color:var(--ink-dim);cursor:pointer;transition:all .18s;}
.simopt button.sel{border-color:var(--accent);background:var(--accent-bg);color:var(--accent);}
.simnext{margin-top:11px;padding-top:11px;border-top:1px dashed var(--line);font-size:13px;color:var(--ink-dim);}
.simhint{font-size:12px;color:var(--ink-dim);background:var(--panel2);border-radius:8px;padding:8px 11px;margin-bottom:10px;line-height:1.5;border-left:3px solid var(--clin);}
.sticky-collect{position:fixed;left:0;right:0;bottom:64px;z-index:30;background:rgba(255,255,255,.96);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-top:1px solid var(--line);
  padding:9px 14px;font-size:12px;color:var(--ink-dim);max-height:120px;overflow-y:auto;}
.sticky-collect b{color:var(--accent);}
.sticky-collect[hidden]{display:none;}

/* 플로우 입력 */
.inpgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px;}
.inpgrid .fld{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius-sm);padding:9px 11px;}
.inpgrid .fld.full{grid-column:1/-1;}
.inpgrid .fld label{font-size:11px;font-weight:700;color:var(--ink-faint);display:block;margin-bottom:4px;}
.inpgrid .fld input,.inpgrid .fld select{width:100%;border:none;background:none;font-size:15px;color:var(--ink);padding:2px 0;}
.inpgrid .fld input:focus,.inpgrid .fld select:focus{outline:none;}
.inpgrid .fld{position:relative;}
.fld-calc{position:absolute;right:8px;top:50%;transform:translateY(-50%);border:1px solid var(--accent);background:var(--accent-bg);color:var(--accent);border-radius:14px;padding:4px 9px;font-size:11px;font-weight:700;cursor:pointer;}
.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chips button{border:1.4px solid var(--line);background:var(--panel);border-radius:18px;padding:6px 12px;font-size:12.5px;font-weight:650;color:var(--ink-dim);cursor:pointer;transition:all .16s;}
.chips button.on{border-color:var(--accent);background:var(--accent-bg);color:var(--accent);}
.runbtn{width:100%;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:750;padding:13px;border-radius:var(--radius-sm);cursor:pointer;margin-bottom:14px;box-shadow:var(--shadow);}
.runbtn:active{opacity:.85;}

/* 결과 카드 */
.rescard{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:11px;overflow:hidden;}
.rescard .rh{padding:11px 15px;font-weight:750;font-size:14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--line);}
.rescard .rh .ricon{font-size:17px;}
.rescard .rb{padding:13px 15px;}
.rescard.clin .rh{background:var(--clin-bg);color:var(--clin);}
.rescard.pay .rh{background:var(--pay-bg);color:var(--pay);}
.rescard.care .rh{background:var(--care-bg);color:var(--care);}
.optrow{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px dashed var(--line);}
.optrow:last-child{border-bottom:none;}
.optrow .on{font-weight:700;font-size:13.5px;flex:none;}
.optrow .od{font-size:11.5px;color:var(--ink-faint);flex:1;}
.prio{width:22px;height:22px;border-radius:50%;background:var(--accent-bg);color:var(--accent);font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;flex:none;}

/* 근거(refs) */
.refitem{border:1px solid var(--line);border-radius:var(--radius-sm);margin-top:7px;overflow:hidden;background:var(--clin-bg);cursor:pointer;}
.refhead{padding:9px 11px;display:flex;align-items:center;gap:8px;}
.refgrade{font-size:10.5px;font-weight:800;color:#fff;background:var(--clin);padding:2px 7px;border-radius:10px;white-space:nowrap;flex:none;}
.reftxt{flex:1;font-size:12.5px;font-weight:650;color:var(--ink);line-height:1.4;}
.refchev{color:var(--clin);font-size:14px;flex:none;}
.refbody{max-height:0;overflow:hidden;transition:max-height .01s;padding:0 11px;}
.refitem.open .refbody{max-height:none;padding:0 11px 11px;}
.refsrc{font-size:11.5px;color:var(--clin);font-weight:700;margin-bottom:5px;}
.refdetail{font-size:12px;color:var(--ink-dim);line-height:1.55;}

/* 점수 계산기 */
.calcsrc{font-size:11.5px;color:var(--ink-faint);margin-bottom:8px;}
.calctip{font-size:12px;color:var(--ink-dim);background:var(--panel2);border-radius:8px;padding:8px 11px;margin-bottom:12px;line-height:1.5;border-left:3px solid var(--accent);}
.calcregion{border:1px solid var(--line);border-radius:var(--radius-sm);padding:10px 11px;margin-bottom:10px;background:var(--panel);}
.calcreg-h{font-size:13.5px;font-weight:750;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.calcw{font-size:11px;font-weight:600;color:var(--accent);background:var(--accent-bg);padding:1px 7px;border-radius:10px;}
.calcrow{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.calclab{flex:1;min-width:0;font-size:12px;font-weight:600;color:var(--ink-dim);line-height:1.25;}
.calclab .calcdesc{display:block;font-size:10.5px;color:var(--ink-faint);font-weight:400;}
.calcseg{display:flex;gap:3px;flex:none;}
.calcseg.sm{gap:2px;}
.calcbtn{width:28px;height:30px;border:1.3px solid var(--line);background:var(--panel);border-radius:7px;font-size:12px;font-weight:700;color:var(--ink-dim);cursor:pointer;padding:0;transition:all .12s;}
.calcseg.sm .calcbtn{width:26px;height:28px;}
.calcbtn.on{border-color:var(--accent);background:var(--accent);color:#fff;}
.calcbtn.area{border-style:dashed;}
.calcbtn.area.on{border-style:solid;background:var(--clin);border-color:var(--clin);}
.calcsub{font-size:11px;color:var(--ink-faint);margin-top:4px;text-align:right;}
.calcsub b{color:var(--ink);font-size:13px;}
.calcresult{border:2px solid var(--ok);border-radius:var(--radius);padding:14px;text-align:center;margin:14px 0;background:var(--panel);}
.calcrn{font-size:12px;font-weight:700;color:var(--ink-faint);}
.calcrs{font-size:38px;font-weight:850;line-height:1.1;letter-spacing:-1px;}
.calcrb{font-size:14px;font-weight:750;}
.calcrsub{font-size:12px;color:var(--ink-dim);margin-top:4px;}
.calcapply{width:100%;border:none;background:var(--accent);color:#fff;font-size:14px;font-weight:750;padding:12px;border-radius:var(--radius-sm);cursor:pointer;}
.uastbl{width:100%;border-collapse:collapse;}
.uastbl th{font-size:11px;color:var(--ink-faint);font-weight:700;padding:4px;text-align:center;}
.uastbl td{padding:4px 2px;text-align:center;}
.uastbl .uasday{font-size:12px;font-weight:700;color:var(--ink-dim);}
.uctq{border:1px solid var(--line);border-radius:var(--radius-sm);padding:11px;margin-bottom:9px;background:var(--panel);}
.uctq-t{font-size:13px;font-weight:650;margin-bottom:9px;line-height:1.4;}
.uctopt{display:flex;align-items:center;gap:8px;width:100%;border:1.3px solid var(--line);background:var(--panel);border-radius:8px;padding:8px 11px;margin-bottom:5px;font-size:12.5px;color:var(--ink-dim);cursor:pointer;text-align:left;transition:all .12s;}
.uctopt.on{border-color:var(--accent);background:var(--accent-bg);color:var(--accent);font-weight:650;}
.uctv{width:20px;height:20px;border-radius:50%;background:var(--panel2);color:var(--ink-faint);font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center;flex:none;}
.uctopt.on .uctv{background:var(--accent);color:#fff;}
.igaopt{display:block;width:100%;border:1.3px solid var(--line);background:var(--panel);border-radius:9px;padding:10px 12px;margin-bottom:7px;text-align:left;cursor:pointer;transition:all .12s;}
.igaopt.on{border-color:var(--accent);background:var(--accent-bg);}
.igaopt .igal{font-size:13.5px;font-weight:750;color:var(--ink);margin-bottom:3px;}
.igaopt.on .igal{color:var(--accent);}
.igaopt .igad{font-size:11.5px;color:var(--ink-dim);line-height:1.45;}
/* TCS 가이드 */
.tcssite{border:1px solid var(--line);border-radius:9px;padding:9px 11px;margin-bottom:7px;background:var(--panel);}
.tcssite-h{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:4px;flex-wrap:wrap;}
.tcssite-n{font-size:13px;font-weight:750;}
.tcssite-r{font-size:11px;font-weight:700;color:var(--ad);background:var(--ad-bg);padding:2px 8px;border-radius:10px;}
.tcssite-d{font-size:11.5px;color:var(--ink-dim);line-height:1.45;}
.tcsacc{border:1px solid var(--line);border-radius:9px;margin-top:8px;overflow:hidden;cursor:pointer;background:var(--panel2);}
.tcsacc-h{padding:9px 12px;font-size:12.5px;font-weight:700;color:var(--ink-dim);}
.tcsacc-b{max-height:0;overflow:hidden;transition:max-height .01s;padding:0 12px;}
.tcsacc.open .tcsacc-b{max-height:none;padding:0 12px 12px;}
.tcsrow{padding:7px 0;border-top:1px dashed var(--line);}
.tcsrow .k{font-weight:700;font-size:12px;color:var(--ink);display:block;margin-bottom:3px;}
.tcsrow .tcsv{font-size:11px;color:var(--ink-dim);line-height:1.6;}
.tcscls{padding:8px 0;border-top:1px dashed var(--line);}
.tcscls-h{font-size:12.5px;font-weight:700;margin-bottom:3px;}
.tcscls-n{color:#fff;padding:1px 7px;border-radius:9px;font-size:11px;margin-right:5px;}
.tcscls-d{font-size:11px;color:var(--ink-dim);margin-bottom:3px;}
.tcscls-u{font-size:11px;color:var(--ok);}
.tcscls-a{font-size:11px;color:var(--block);}
.wkgroup{border:1px solid var(--line);border-radius:9px;padding:10px 12px;margin-bottom:9px;background:var(--panel);}
.wkg-t{font-size:13px;font-weight:750;margin-bottom:7px;color:var(--care);}
.wkrow{padding:5px 0;}
.wkrow .k{font-weight:700;font-size:11.5px;color:var(--ink);display:block;margin-bottom:3px;}
/* 다제 병용 삭감 경고 */
.multiwarn{border:1.5px solid var(--block);background:var(--block-bg);border-radius:10px;padding:11px 13px;margin-top:9px;}
.mw-h{font-size:13px;font-weight:800;color:var(--block);margin-bottom:7px;}
.mw-list{margin:0;padding-left:17px;}
.mw-list li{font-size:12px;color:var(--ink);padding:2px 0;line-height:1.5;}
.mw-list li b{color:var(--block);}
.mw-why{font-size:11.5px;color:var(--ink-dim);margin-top:7px;padding-top:7px;border-top:1px dashed var(--block);line-height:1.5;}
.calc-launch{display:inline-flex;align-items:center;gap:6px;border:1.5px solid var(--accent);background:var(--accent-bg);color:var(--accent);border-radius:20px;padding:7px 14px;font-size:12.5px;font-weight:700;cursor:pointer;margin-top:8px;}
.cstep{border:1px solid var(--line);border-radius:9px;padding:9px 11px;margin-bottom:7px;background:var(--panel);cursor:pointer;}
.cstep-h{display:flex;align-items:center;justify-content:space-between;}
.cstep-h .on{font-size:13.5px;font-weight:700;}
.cstep-chev{color:var(--ink-faint);transition:transform .2s;}
.cstep.open .cstep-chev{transform:rotate(180deg);}
.cstep-why{font-size:11.5px;color:var(--ink-faint);margin-top:3px;line-height:1.45;}
.cstep-reg{max-height:0;overflow:hidden;transition:max-height .01s;}
.cstep.open .cstep-reg{max-height:none;margin-top:8px;}
.cstep-rt{font-size:11px;font-weight:750;color:var(--clin);margin-bottom:4px;}

/* 모달 */

/* EASI 계산: input = { h:{E,I,Ex,L,area}, u:{...}, t:{...}, l:{...} } */
function calcEASI(input){
  input=input||{};
  var total=0, detail=[];
  for(var i=0;i<CALC_EASI.regions.length;i++){
    var r=CALC_EASI.regions[i], d=input[r.key]||{};
    var sevSum=(num(d.E)+num(d.I)+num(d.Ex)+num(d.L));
    var area=num(d.area);
    var sub=sevSum*area*r.weight;
    total+=sub;
    detail.push({ region:r.label, sevSum:sevSum, area:area, weight:r.weight, sub:Math.round(sub*10)/10 });
  }
  total=Math.round(total*10)/10;
  return { score:total, detail:detail, band:easiBandOf(total), gate:CALC_EASI.gate, gateMet:(total>=CALC_EASI.gate) };
}

/* UAS7 계산: input = { days:[{w,i},{w,i}...7개] } 또는 단순 {dailyAvg} */

/* ---- EASI → 중증도 밴드 ---- */
function adEasiBand(easi){
  var b=AD_SEVERITY["lab:easi"].bands;
  for(var i=0;i<b.length;i++){ if(easi<=b[i].max) return b[i]; }
  return b[b.length-1];
}

/* ---- 정문 보조: 임상 단계 권고 산출 ----
   input: { easi, iga, bsa, scorad, ageBand, priorTopicalWeeks, priorSystemicMonths, comorbid:[], currentDrugs:[] } */
function adClinicalEngine(input){
  input = input||{};
  var easi = (typeof input.easi==="number")? input.easi : null;
  var band = (easi!=null)? adEasiBand(easi) : null;
  var out = { severityBand:band, steps:[], notes:[], refs:[] };

  // 적용 단계 필터
  var sevId = band? band.id : "moderate";
  for(var i=0;i<AD_LADDER.length;i++){
    var st=AD_LADDER[i];
    if(st.severity.indexOf(sevId)>=0 || st.order===0){
      out.steps.push({ id:st.id, label:st.label, why:st.why, drugs:st.drugs.slice(), actions:st.actions.slice(), regimen:(st.regimen||[]).slice() });
    }
  }

  // 게이트 환기
  if(easi!=null){
    if(easi>=23) out.notes.push("EASI "+easi+" → 급여 게이트(≥23) 충족. 국소4주+전신3개월 이력 확인 시 advanced 진입 가능.");
    else out.notes.push("EASI "+easi+" → 급여 게이트(≥23) 미충족. advanced 급여는 EASI≥23 필요(경과규정 예외 별도).");
  }

  // 동반질환 → 듀피 우선 힌트
  var comorbid = input.comorbid||[];
  if(comorbid.indexOf("comorbid:asthma")>=0 || comorbid.indexOf("comorbid:ar")>=0 || comorbid.indexOf("comorbid:crswnp")>=0){
    out.notes.push("동반 Type2 질환 → 듀피젠트가 한 약제로 동반질환까지 커버 가능(우선 고려 근거).");
    out.refs.push("r_dupi_comorbid");
  }
  out.refs.push("r_topical_first","r_advanced_high");
  return out;
}

/* ---- advanced 후보 우선순위(임상관점) — 급여/연령 판정은 외부 주입 ----
   reimbCheck(drugId)->{grade}, ageOk(drugId)->bool 주입받아 차등 */
function adAdvancedOptions(input, reimbCheck, ageOk){
  input = input||{};
  var comorbid = input.comorbid||[];
  var current = input.currentDrugs||[];
  var list=[];
  for(var i=0;i<AD_ADVANCED_PROFILE.length;i++){
    var p=AD_ADVANCED_PROFILE[i];
    if(current.indexOf(p.drug)>=0) continue; // 이미 쓰는 약 제외
    var score=0; var reasons=[];
    // 동반질환 매칭
    if(p.drug==="drug:dupilumab" && (comorbid.indexOf("comorbid:asthma")>=0||comorbid.indexOf("comorbid:ar")>=0||comorbid.indexOf("comorbid:crswnp")>=0)){
      score+=3; reasons.push("동반 Type2 질환 동시 커버");
    }
    // 연령 적합
    var aOk = ageOk? ageOk(p.drug) : true;
    if(!aOk){ score-=5; reasons.push("연령 적응 미해당"); }
    // 급여
    var rb = reimbCheck? reimbCheck(p.drug) : {grade:"unknown"};
    if(rb.grade==="benefit") score+=2;
    else if(rb.grade==="switch_benefit") { score+=2; reasons.push("기전 교차 교체로 급여 가능"); }
    else if(rb.grade==="switch_only") { score+=1; reasons.push("교체투여 경로로 급여 가능"); }
    else if(rb.grade==="nonbenefit_sameclass") { score-=3; reasons.push("동일계열 교체 → 급여 불인정"); }
    else if(rb.grade==="gate_unmet") { reasons.push("진입 게이트 미충족"); }
    else if(rb.grade==="nonbenefit") reasons.push("현 조건상 비급여(전액본인)");
    list.push({ drug:p.drug, pref:p.pref, tags:p.tags, score:score, ageOk:aOk, reimb:rb, reasons:reasons });
  }
  list.sort(function(a,b){ return b.score-a.score; });
  return list;
}

/* ---- class 종류 매핑 ---- */
function adDrugKind(drugId){
  var r=AD_DRUG_REIMB[drugId]; return r? r.clsKind : null;
}

/* ---- 급여 판정: 신규 진입 ----
   input: { easi, priorTopicalWeeks, priorSystemicMonths, ageBand, highRisk:bool, currentDrugs:[] }
   drugId: 평가 대상 약물 */
function adReimbCheck(drugId, input){
  input=input||{};
  var r=AD_DRUG_REIMB[drugId];
  if(!r) return { drug:drugId, grade:"unknown", msgs:["급여정보 없음"] };
  var msgs=[], grade="benefit", gateMet=true;

  // 게이트 점검
  var easi = (typeof input.easi==="number")? input.easi : null;
  if(easi!=null && easi<23){ gateMet=false; msgs.push("EASI "+easi+" < 23 → 진입 게이트 미충족"); }
  var tw = input.priorTopicalWeeks;
  if(typeof tw==="number" && tw<4){ gateMet=false; msgs.push("국소치료 "+tw+"주 < 4주 → 이력 부족"); }
  var sm = input.priorSystemicMonths;
  if(typeof sm==="number" && sm<3){ gateMet=false; msgs.push("전신면역억제제 "+sm+"개월 < 3개월 → 이력 부족"); }

  // 고위험군 JAK 제한
  if(r.clsKind==="jak" && input.highRisk){
    msgs.push("고령/심혈관/악성종양 위험군 → JAK 1차 급여 불가(생물학제제 불응 후에만)");
    grade="switch_only";
  }

  // 교체투여 평가 (현재약 있을 때)
  var current = input.currentDrugs||[];
  var hasCurrentAdvanced=false, currentKind=null;
  for(var i=0;i<current.length;i++){
    var k=adDrugKind(current[i]);
    if(k){ hasCurrentAdvanced=true; currentKind=k; }
  }
  if(hasCurrentAdvanced){
    var targetKind=r.clsKind;
    if(currentKind===targetKind){
      grade="nonbenefit_sameclass";
      msgs.push("현재 "+(currentKind==="jak"?"JAK":"생물학제제")+" 사용 중 → 동일계열 교체는 급여 불인정(2025 규칙)");
    } else {
      grade= (grade==="switch_only")? "switch_only" : "switch_benefit";
      msgs.push("기전 교차 교체("+(currentKind==="jak"?"JAK→생물":"생물→JAK")+") → 불충분반응/내약성 시 급여 가능. 게이트 재충족 필요.");
    }
  }

  if(grade==="benefit" && gateMet) msgs.unshift("신규 진입 게이트 충족 → 급여 인정 (산정특례 V308, 본인부담 10%).");
  else if(!gateMet && grade==="benefit"){ grade="gate_unmet"; }

  return {
    drug:drugId, kind:r.clsKind, grade:grade, gateMet:gateMet,
    ageFrom:r.ageFrom, listed:r.listed, msgs:msgs,
    eval:AD_EVAL_SCHEDULE.first+" · "+AD_EVAL_SCHEDULE.criterion
  };
}

/* ---- 게이트 충족도 요약 ---- */
function adGateStatus(input){
  input=input||{};
  var rows=[];
  var easi=(typeof input.easi==="number")?input.easi:null;
  rows.push({ id:"g_easi", label:"EASI ≥ 23", ok:(easi!=null && easi>=23), val:(easi!=null?("EASI "+easi):"미입력") });
  var tw=input.priorTopicalWeeks;
  rows.push({ id:"g_topical", label:"국소치료 4주↑ 실패", ok:(typeof tw==="number" && tw>=4), val:(typeof tw==="number"?(tw+"주"):"미입력") });
  var sm=input.priorSystemicMonths;
  rows.push({ id:"g_systemic", label:"전신면역억제제 3개월↑ 실패", ok:(typeof sm==="number" && sm>=3), val:(typeof sm==="number"?(sm+"개월"):"미입력") });
  var allOk=true; for(var i=0;i<rows.length;i++){ if(!rows[i].ok) allOk=false; }
  return { rows:rows, allOk:allOk };
}

/* ---- 정문 보조: 챙길 목록 산출 ----
   input: { currentDrugs:[], comorbid:[], highRisk:bool, age } */
function adComprehensiveCare(input){
  input=input||{};
  var cur=input.currentDrugs||[];
  var care={ monitor:[], infection:AD_INFECTION, education:AD_EDUCATION, comorbid:AD_COMORBID, flags:[] };

  // 현재약 기반 모니터링
  var hasJak=false, hasBio=false;
  for(var i=0;i<cur.length;i++){
    if(cur[i]==="drug:upadacitinib"||cur[i]==="drug:baricitinib"||cur[i]==="drug:abrocitinib") hasJak=true;
    if(cur[i]==="drug:dupilumab"||cur[i]==="drug:tralokinumab"||cur[i]==="drug:lebrikizumab") hasBio=true;
    if(cur[i]==="drug:cyclosporine") care.flags.push("사이클로스포린 사용 중 → 혈압·신기능(Cr)·K 모니터");
    if(cur[i]==="drug:methotrexate") care.flags.push("MTX 사용 중 → CBC·간기능 정기, 엽산 보충");
    if(cur[i]==="drug:prednisolone") care.flags.push("전신스테로이드 → 단기로 제한, 장기 회피(반동)");
  }
  if(hasJak){ care.monitor.push(AD_JAK_MONITORING);
    if(input.highRisk) care.flags.push("⚠ JAK + 고위험군 → 위험-이익 재평가, 저용량 고려"); }
  if(hasBio) care.monitor.push(AD_BIOLOGIC_MONITORING);

  // 동반질환 플래그
  var comorbid=input.comorbid||[];
  if(comorbid.indexOf("comorbid:asthma")>=0) care.flags.push("동반 천식 → 듀피젠트 한 약제로 양 질환 커버 가능");
  return care;
}

/* ---- UAS7 → 밴드 ---- */
function csuUas7Band(uas7){
  var b=CSU_SCALES["lab:uas7"].bands;
  for(var i=0;i<b.length;i++){ if(uas7<=b[i].max) return b[i]; }
  return b[b.length-1];
}
/* ---- UCT 조절 여부 ---- */
function csuUctControlled(uct){ return (typeof uct==="number") ? (uct>=12) : null; }

/* ---- 정문 보조: 단계 권고 산출 ----
   input: { uas7, uct, currentStep, inducible, angioedema, currentDrugs:[] } */
function csuClinicalEngine(input){
  input=input||{};
  var uas7=(typeof input.uas7==="number")?input.uas7:null;
  var band=(uas7!=null)?csuUas7Band(uas7):null;
  var controlled=csuUctControlled(input.uct);
  var out={ activityBand:band, controlled:controlled, steps:[], notes:[], refs:[] };

  // 현재 치료단계 기반 다음 권고
  var cs=input.currentStep||0; // 0=미시작
  for(var i=0;i<CSU_LADDER.length;i++){
    var st=CSU_LADDER[i];
    if(st.order>=1 && st.order<=3){ out.steps.push({ id:st.id, label:st.label, why:st.why, order:st.order,
      drugs:st.drugs.slice(), actions:st.actions.slice(), regimen:(st.regimen||[]).slice(), adjunct:st.adjunct||null, adjunctNote:st.adjunctNote||null }); }
  }
  // 조절상태 환기
  if(controlled===true) out.notes.push("UCT "+input.uct+" ≥ 12 → 잘 조절됨. 현 단계 유지하며 감량 시도 고려.");
  else if(controlled===false) out.notes.push("UCT "+input.uct+" < 12 → 조절 불충분. 다음 단계 상향 고려.");
  if(band) out.notes.push("UAS7 "+uas7+" → "+band.label+" (활성도).");

  // 혈관부종/응급 환기
  if(input.angioedema) out.notes.push("혈관부종 동반 — 후두부종 등 기도증상은 응급. 발작 시 대처 교육 필요.");
  if(input.inducible) out.notes.push("유발성(CIndU) 의심 — 유발인자 회피 교육 + 유발검사로 확인.");

  out.refs.push("r_h1_first","r_updose","r_omalizumab");
  return out;
}

  if(drugId==="drug:omalizumab"){
    return { drug:drugId, grade:"nonbenefit",
      title:"오말리주맙(졸레어) — CSU 비급여",
      msgs:[ CSU_OMALIZUMAB_STATUS.reality,
             CSU_OMALIZUMAB_STATUS.asymmetry,
             "용량: "+CSU_OMALIZUMAB_STATUS.dose,
             "비용: "+CSU_OMALIZUMAB_STATUS.costExample ],
      cost:true };
  }
  if(drugId==="drug:cyclosporine"){
    return { drug:drugId, grade:"offlabel",
      title:"사이클로스포린 — off-label",
      msgs:[ CSU_CYCLOSPORINE_REIMB.status, "모니터: "+CSU_CYCLOSPORINE_REIMB.monitor ] };
  }
  // 항히스타민 계열
  var DB=(typeof DRUG_DB!=="undefined")?DRUG_DB:null;
  if(DB && DB[drugId] && DB[drugId].cls==="class:antihistamine_2g"){
    var msgs=[ CSU_ANTIHISTAMINE_REIMB.standard ];
    if(input.updose) msgs.push("⚠ 4배 증량: "+CSU_ANTIHISTAMINE_REIMB.updose);
    if(input.combo) msgs.push(CSU_MULTI_AH_WARNING.short);
    return { drug:drugId, grade:"benefit",
      title:DB[drugId].brand+" — 표준용량 급여",
      msgs:msgs, multiWarn:(input.combo===true) };

  if(drugId==="drug:montelukast"){
    return { drug:drugId, grade:"adjunct", title:"몬테루카스트 — 보조(제한적)",
      msgs:["항히스타민 보조 추가. 두드러기 단독 1차 아님."] };
  }
  if(drugId==="drug:prednisolone"){
    return { drug:drugId, grade:"short_only", title:"전신스테로이드 — 단기만",
      msgs:[CSU_STEROID_NOTE.status] };
  }
  return { drug:drugId, grade:"unknown", msgs:["급여정보 없음"] };
}

        { code:"L50.2", label:"한랭·열에 의한 두드러기" },
        { code:"L50.3", label:"피부묘기증성 두드러기" },
        { code:"L50.5", label:"콜린성 두드러기" },
        { code:"L50.8", label:"기타 두드러기" },
        { code:"L50.9", label:"두드러기, 상세불명" }
      ]},
      { type:"note", title:"청구 포인트", body:"항히스타민 표준용량은 L50.x 상병에 급여. 4배 증량 청구 시 허가용량 초과분 삭감 주의. 오말리주맙 CSU는 비급여라 별도 동의." },
      { type:"multiwarn", title:"★삭감 방어", ref:"CSU_MULTI_AH_WARNING" }
    ]
  }
];

/* alt 보조 데이터(렌더용) */
var CSU_ALT = {
  cyclosporine:"off-label, 중증·난치 옵션. 신독성·혈압 모니터.",
  steroid:"급성악화 단기만, 장기 회피.",
  montelukast:"항히스타민 보조(제한적)."
};


</script>
<script>
/* ============================================================
   ui.js — 피부질환 통합 가이드 UI 로직
   질환 토글 + 3탭 + 도서관 렌더러 + 시뮬 + 플로우 + 모달
   AD 구동 / CSU placeholder (다음 라운드)
   ============================================================ */

var STATE = { disease:"ad", tab:"library" };

/* ---------- 토글 ---------- */
function setDisease(d){
  STATE.disease=d;
  var btns=document.querySelectorAll("#diseaseToggle button");
  for(var i=0;i<btns.length;i++){ btns[i].className = (btns[i].getAttribute("data-d")===d)?"on":""; }
  var dot=document.getElementById("titleDot");
  var root=document.documentElement;
  if(d==="ad"){ root.style.setProperty("--accent","var(--ad)"); root.style.setProperty("--accent-bg","var(--ad-bg)"); }
  else { root.style.setProperty("--accent","var(--csu)"); root.style.setProperty("--accent-bg","var(--csu-bg)"); }
  renderAll();
}
function setTab(t){
  STATE.tab=t;
  var btns=document.querySelectorAll("#tabbar button");
  for(var i=0;i<btns.length;i++){ btns[i].className=(btns[i].getAttribute("data-tab")===t)?"on":""; }
  document.getElementById("view-library").hidden = (t!=="library");
  document.getElementById("view-sim").hidden = (t!=="sim");
  document.getElementById("view-flow").hidden = (t!=="flow");
  document.getElementById("simCollect").hidden = !(t==="sim" && SIM.collected.length>0);
  renderAll();
}

/* ---------- 공통 렌더 진입 ---------- */
function renderAll(){
  if(STATE.tab==="library") renderLibrary();
  else if(STATE.tab==="sim") renderSim();
  else if(STATE.tab==="flow") renderFlow();
  renderFoot();
}

/* ---------- 도서관 ---------- */
function libCatClass(c){ return c==="clin"?"cat-clin":c==="pay"?"cat-pay":"cat-care"; }
function libCatLabel(c){ return c==="clin"?"임상":c==="pay"?"급여":"관리"; }

function renderLibrary(){
  var isAd=(STATE.disease==="ad");
  var topics=isAd?AD_LIBRARY:CSU_LIBRARY;
  var banner=isAd
    ? '<div class="banner"><b>아토피피부염 도서관</b> — 2024 대한아토피피부염학회 가이드라인 + 심평원 급여·산정특례 기준. 카드를 누르면 상세가 펼쳐집니다. 약물명을 누르면 성분별 상세.</div>'
    : '<div class="banner"><b>만성두드러기 도서관</b> — 2020 대한천식알레르기·피부면역학회 공동 진료지침 + 심평원 급여기준. 오말리주맙 비급여 등 현실 정보 포함. 카드를 누르면 상세가 펼쳐집니다.</div>';
  var ph=isAd?"약물·상황 검색 (예: 듀피젠트, EASI, 교체투여)":"약물·상황 검색 (예: 오말리주맙, UAS7, 4배 증량)";
  var html=banner;
  html+='<div class="searchbar"><span class="si">🔍</span><input id="libSearch" placeholder="'+ph+'" oninput="filterLib(this.value)"></div>';
  html+='<div id="libList">';
  for(var i=0;i<topics.length;i++){ html+=renderTopicCard(topics[i],i); }
  html+='</div>';
  document.getElementById("view-library").innerHTML=html;
}
function renderTopicCard(t,idx){
  var h='<div class="card" id="card-'+idx+'" data-search="'+(t.title+' '+t.lead).toLowerCase()+'">';
  h+='<div class="card-head" onclick="toggleCard('+idx+')">';
  h+='<span class="icon">'+t.icon+'</span><div class="ht"><div class="t">'+t.title+
     '<span class="cat-tag '+libCatClass(t.cat)+'">'+libCatLabel(t.cat)+'</span></div>'+
     '<div class="l">'+t.lead+'</div></div><span class="chev">▶</span></div>';
  h+='<div class="card-body" id="cardbody-'+idx+'">';
  for(var s=0;s<t.sections.length;s++){ h+=renderSection(t.sections[s],idx,s); }
  h+='</div></div>';
  return h;
}
function toggleCard(idx){
  var c=document.getElementById("card-"+idx);
  c.className = (c.className.indexOf("open")>=0)?"card":"card open";
}
function filterLib(q){
  q=(q||"").toLowerCase().trim();
  var cards=document.querySelectorAll("#libList .card");
  for(var i=0;i<cards.length;i++){
    var hay=cards[i].getAttribute("data-search")+" "+cards[i].textContent.toLowerCase();
    cards[i].style.display = (!q || hay.indexOf(q)>=0)?"":"none";
  }
}

/* ---------- 섹션 렌더러 (타입 분기) ---------- */
function renderSection(sec,ci,si){
  var t=sec.type, h='<div class="sec">';
  if(sec.title) h+='<div class="sec-t">'+sec.title+'</div>';
  if(t==="keypoints"){
    h+='<ul class="kp">';
    for(var i=0;i<sec.items.length;i++){ h+='<li>'+boldStar(sec.items[i])+'</li>'; }
    h+='</ul>';
  }
  else if(t==="note"){
    h='<div class="note"><div class="nt">'+(sec.title||"")+'</div>'+sec.body+'</div>';
    return h;
  }
  else if(t==="easiband"){ h+=renderEasiBand(); }
  else if(t==="drugcards"){ h+=renderDrugCards(sec.drugs,ci,si); }
  else if(t==="selectguide"){ h+=renderSelectGuide(); }
  else if(t==="gate"){ h+=renderGateInfo(); }
  else if(t==="switch"){ h+=renderSwitchInfo(); }
  else if(t==="eval"){ h+=renderEvalInfo(); }
  else if(t==="sanjeong"){ h+=renderSanjeong(); }
  else if(t==="monitor"){ h+=renderMonitor(sec.ref); }
  else if(t==="infection"){ h+=renderInfection(); }
  else if(t==="education"){ h+=renderEducation(); }
  else if(t==="comorbid"){ h+=renderComorbid(); }
  else if(t==="codetable"){ h+=renderCodeTable(sec.rows); }
  else if(t==="uas7band"){ h+=renderUas7Band(); }
  else if(t==="uct"){ h+=renderUct(); }
  else if(t==="csuclassify"){ h+=renderCsuClassify(); }
  else if(t==="csuworkup"){ h+=renderCsuWorkup(); }
  else if(t==="csuladder"){ h+=renderCsuLadder(); }
  else if(t==="omalizumab"){ h+=renderOmalizumab(); }
  else if(t==="csualt"){ h+=renderCsuAlt(); }
  else if(t==="refs"){ h+=renderRefs(sec.items); }
  else if(t==="tcsguide"){ h+=renderTcsGuide(); }
  else if(t==="workup"){ h+=renderWorkup(); }
  else if(t==="multiwarn"){ h+=renderMultiWarn(); }
  h+='</div>';
  return h;
}

/* ---- 항히스타민 다제 병용 삭감 경고 (단일 데이터 참조) ---- */
function renderMultiWarn(){
  var w=CSU_MULTI_AH_WARNING;
  var h='<div class="multiwarn">';
  h+='<div class="mw-h">'+w.title+'</div>';
  h+='<ul class="mw-list">';
  for(var i=0;i<w.rules.length;i++){ h+='<li>'+boldStar(w.rules[i])+'</li>'; }
  h+='</ul>';
  h+='<div class="mw-why">'+w.why+'</div>';
  h+='</div>';
  return h;
}

/* ---- TCS 강도·제형·부위 가이드 ---- */
function renderTcsGuide(){
  var h='';
  // 부위별 추천 (핵심)
  h+='<div style="font-size:12px;font-weight:700;color:var(--ink-dim);margin-bottom:6px">부위별 추천 (상황 → 강도·제형)</div>';
  for(var i=0;i<TCS_SITE_GUIDE.length;i++){
    var s=TCS_SITE_GUIDE[i];
    h+='<div class="tcssite"><div class="tcssite-h"><span class="tcssite-n">'+s.site+'</span><span class="tcssite-r">'+s.rec+' · '+s.vehicle+'</span></div>';
    h+='<div class="tcssite-d">'+s.note+(s.tci?' <b style="color:var(--care)">→ 유지·재발 시 TCI 전환</b>':'')+'</div></div>';
  }
  // 제형 선택 (접이식)
  h+='<div class="tcsacc" onclick="toggleAcc(this)"><div class="tcsacc-h">제형(연고·크림·로션·폼) 선택 ▾</div><div class="tcsacc-b">';
  for(var v=0;v<TCS_VEHICLES.length;v++){
    var ve=TCS_VEHICLES[v];
    h+='<div class="tcsrow"><span class="k">'+ve.name+'</span><div class="tcsv"><div>✅ '+ve.best+'</div><div>⛔ '+ve.avoid+'</div><div style="color:var(--clin)">💡 '+ve.tip+'</div></div></div>';
  }
  h+='</div></div>';
  // 7군 강도표 (접이식)
  h+='<div class="tcsacc" onclick="toggleAcc(this)"><div class="tcsacc-h">TCS 7군 강도 분류표 ▾</div><div class="tcsacc-b">';
  for(var c=0;c<TCS_CLASSES.length;c++){
    var cl=TCS_CLASSES[c];
    var col=cl.egColor==="block"?"var(--block)":cl.egColor==="warn"?"var(--warn)":"var(--ok)";
    h+='<div class="tcscls"><div class="tcscls-h"><span class="tcscls-n" style="background:'+col+'">'+cl.cls+'군</span> '+cl.potency+'</div>';
    h+='<div class="tcscls-d">'+cl.drugs.join(" · ")+'</div>';
    h+='<div class="tcscls-u">✅ '+cl.use+'</div><div class="tcscls-a">⛔ '+cl.avoid+'</div></div>';
  }
  h+='</div></div>';
  // 도포 원칙
  var a=TCS_APPLICATION;
  h+='<div class="note"><div class="nt">도포 원칙</div>FTU: '+a.ftu+'<br>빈도: '+a.frequency+'<br>proactive: '+a.proactive+'<br>감량: '+a.taper+'</div>';
  return h;
}
function toggleAcc(el){ el.className=(el.className.indexOf("open")>=0)?"tcsacc":"tcsacc open"; }

/* ---- 검사 패널 ---- */
function renderWorkup(){
  var w=AD_WORKUP, h='';
  function blk(title,arr){ var x='<div class="wkrow"><span class="k">'+title+'</span><div class="bx">'; for(var i=0;i<arr.length;i++)x+='<span>'+arr[i]+'</span>'; return x+'</div></div>'; }
  // 진단
  h+='<div class="wkgroup"><div class="wkg-t">'+w.diagnostic.title+'</div>';
  h+='<ul class="kp">'; for(var i=0;i<w.diagnostic.items.length;i++) h+='<li>'+w.diagnostic.items[i]+'</li>'; h+='</ul>';
  h+='<div class="note" style="margin-top:6px">'+w.diagnostic.note+'</div></div>';
  // 전신면역억제제 전
  h+='<div class="wkgroup"><div class="wkg-t">'+w.beforeSystemic.title+'</div>';
  h+=blk("사이클로스포린",w.beforeSystemic.csa)+blk("MTX",w.beforeSystemic.mtx)+'</div>';
  // advanced 전
  h+='<div class="wkgroup"><div class="wkg-t">'+w.beforeAdvanced.title+'</div>';
  h+=blk("생물학제제",w.beforeAdvanced.biologic)+blk("JAK(검사 부담 큼)",w.beforeAdvanced.jak)+'</div>';
  h+='<div class="note">'+w.why+'</div>';
  return h;
}

/* ---- 근거(refId) 렌더러 — 클릭하면 등급·출처·상세 펼침 ---- */
function getRec(refId){
  if(typeof AD_RECOMMENDATIONS!=="undefined" && AD_RECOMMENDATIONS[refId]) return AD_RECOMMENDATIONS[refId];
  if(typeof CSU_RECOMMENDATIONS!=="undefined" && CSU_RECOMMENDATIONS[refId]) return CSU_RECOMMENDATIONS[refId];
  return null;
}
function renderRefs(items){
  var h='';
  for(var i=0;i<items.length;i++){
    var r=getRec(items[i]); if(!r) continue;
    var uid="ref_"+items[i]+"_"+i+"_"+Math.floor(Math.random()*100000);
    h+='<div class="refitem" id="'+uid+'" onclick="toggleRef(\''+uid+'\')">';
    h+='<div class="refhead"><span class="refgrade">'+r.grade+'</span><span class="reftxt">'+r.txt+'</span><span class="refchev">ⓘ</span></div>';
    h+='<div class="refbody"><div class="refsrc">📚 '+r.src+'</div>'+(r.detail?'<div class="refdetail">'+r.detail+'</div>':'')+'</div>';
    h+='</div>';
  }
  return h;
}
function toggleRef(uid){
  var el=document.getElementById(uid);
  el.className = (el.className.indexOf("open")>=0)?"refitem":"refitem open";
}

/* ---- CSU 섹션 렌더러 ---- */
function renderUas7Band(){
  var s=CSU_SCALES["lab:uas7"], b=s.bands, h='<div class="note" style="margin-bottom:8px">'+s.desc+'</div><div class="chips" style="margin-top:4px">';
  var prevMax=-1;
  for(var i=0;i<b.length;i++){
    var col=b[i].color==="block"?"var(--block)":b[i].color==="warn"?"var(--warn)":"var(--ok)";
    var rng=(prevMax+1)+"~"+b[i].max; prevMax=b[i].max;
    h+='<span style="border:1.4px solid '+col+';color:'+col+';border-radius:16px;padding:5px 11px;font-size:12px;font-weight:700">'+b[i].label+' ('+rng+')</span>';
  }
  h+='</div><div class="note" style="margin-top:9px">'+s.mid+' · '+s.note+'</div>';
  h+='<button class="calc-launch" onclick="openCalc(\'uas7\')">🧮 UAS7 점수 계산기 열기</button>';
  return h;
}
function renderUct(){
  var u=CSU_SCALES["lab:uct"];
  var h='<div class="note">'+u.desc+'</div>';
  h+='<div class="gaterow" style="margin-top:8px"><span class="gi">🎯</span><div class="gl">'+u.cutoffNote+'</div></div>';
  h+='<div class="note" style="margin-top:8px">'+u.note+'</div>';
  h+='<button class="calc-launch" onclick="openCalc(\'uct\')">🧮 UCT 조절검사 계산기 열기</button>';
  return h;
}
function renderCsuClassify(){
  var c=CSU_CLASSIFY;
  var h='<div class="note"><div class="nt">급성 vs 만성</div>'+c.acuteVsChronic+'</div>';
  for(var i=0;i<c.spontVsInducible.length;i++){
    h+='<div class="gaterow"><span class="gi">•</span><div style="flex:1"><div class="gl">'+c.spontVsInducible[i].label+'</div><div class="gv">'+c.spontVsInducible[i].desc+'</div></div></div>';
  }
  h+='<div class="note" style="border-left-color:var(--block)"><div class="nt" style="color:var(--block)">혈관부종</div>'+c.angioedema+'</div>';
  return h;
}
function renderCsuWorkup(){
  var w=CSU_WORKUP, h='';
  function blk(t,arr){ if(!arr||!arr.length)return''; var x='<div class="row" style="border-top:1px dashed var(--line);padding:7px 0"><span class="k">'+t+'</span><div class="bx">'; for(var i=0;i<arr.length;i++)x+='<span>'+arr[i]+'</span>'; return x+'</div></div>'; }
  h+='<div class="drugmini open"><div class="drugmini-b" style="max-height:none;padding:4px 12px 10px">';
  h+=blk("기본",w.basic)+blk("선택",w.selective)+blk("유발성 의심",w.inducible);
  h+='</div></div>';
  h+='<div class="note" style="border-left-color:var(--block)"><div class="nt" style="color:var(--block)">회피</div>'+w.avoid+'</div>';
  return h;
}
function renderCsuLadder(){
  var h='';
  for(var i=0;i<CSU_LADDER.length;i++){
    var st=CSU_LADDER[i];
    if(st.order>3) continue;
    h+='<div class="gaterow" style="align-items:flex-start"><span class="prio">'+st.order+'</span><div style="flex:1"><div class="gl">'+st.label.replace(/^\d단계 — /,'')+'</div><div class="gv" style="margin-top:3px">'+st.why+'</div></div></div>';
  }
  // rescue
  var rescue=CSU_LADDER[CSU_LADDER.length-1];
  h+='<div class="note" style="border-left-color:var(--alert)"><div class="nt">급성악화 구제</div>'+rescue.why+'</div>';
  return h;
}
function renderOmalizumab(){
  var o=CSU_OMALIZUMAB_STATUS;
  var h='<div class="gaterow" style="border-color:var(--block)"><span class="gi">💉</span><div class="gl">CSU 적응증</div><span class="badge b-block">급여 X (전액본인)</span></div>';
  h+='<div class="note"><div class="nt">허가</div>'+o.approved+'</div>';
  h+='<div class="note" style="border-left-color:var(--block)"><div class="nt" style="color:var(--block)">★적응증별 비대칭</div>'+o.asymmetry+'</div>';
  h+='<div class="note"><div class="nt">용량·비용</div>'+o.dose+'<br>'+o.costExample+'</div>';
  h+='<div class="note"><div class="nt">실전</div>'+o.guidance+'</div>';
  return h;
}
function renderCsuAlt(){
  var a=CSU_ALT;
  var h='<div class="row"><span class="k">사이클로스포린</span>'+a.cyclosporine+'</div>';
  h+='<div class="row" style="border-top:1px dashed var(--line);padding-top:6px"><span class="k">전신스테로이드</span>'+a.steroid+'</div>';
  h+='<div class="row" style="border-top:1px dashed var(--line);padding-top:6px"><span class="k">몬테루카스트</span>'+a.montelukast+'</div>';
  return '<div class="drugmini open"><div class="drugmini-b" style="max-height:none;padding:4px 12px 10px">'+h+'</div></div>';
}
function boldStar(s){ return s.replace(/★([^,·\)]+)/g,'<b>★$1</b>'); }

function renderEasiBand(){
  var b=AD_SEVERITY["lab:easi"].bands, h='<div class="chips" style="margin-top:4px">';
  for(var i=0;i<b.length;i++){
    var col=b[i].color==="block"?"var(--block)":b[i].color==="warn"?"var(--warn)":"var(--ok)";
    var rng = (i===0)?"0":((b[i-1].max+1)+"~"+(b[i].max===72?"72":b[i].max));
    h+='<span style="border:1.4px solid '+col+';color:'+col+';border-radius:16px;padding:5px 11px;font-size:12px;font-weight:700">'+b[i].label+' ('+rng+')</span>';
  }
  h+='</div><div class="note" style="margin-top:9px"><div class="nt">급여 게이트</div>'+AD_SEVERITY["lab:easi"].gateNote+'</div>';
  h+='<button class="calc-launch" onclick="openCalc(\'easi\')">🧮 EASI 점수 계산기 열기</button>';
  return h;
}

function renderDrugCards(ids,ci,si){
  var h='';
  for(var i=0;i<ids.length;i++){
    var d=DRUG_DB[ids[i]]; if(!d) continue;
    var uid=ci+"_"+si+"_"+i;
    h+='<div class="drugmini" id="dm-'+uid+'">';
    h+='<div class="drugmini-h" onclick="toggleDrug(\''+uid+'\')"><span class="bn">'+d.brand+'</span>'+
       '<span class="gn">'+d.name+'</span><span class="tg">'+d.target.split("(")[0].trim()+'</span></div>';
    h+='<div class="drugmini-b">';
    h+='<div class="row"><span class="k">기전</span>'+d.moa+'</div>';
    if(d.indication){ h+='<div class="warnbox" style="background:var(--clin-bg);color:var(--clin)">📌 '+d.indication+'</div>'; }
    if(d.efficacy){ h+='<div class="row"><span class="k">효과·근거</span>'+d.efficacy+'</div>'; }
    h+='<div class="row"><span class="k">용량</span>'+d.dose+'</div>';
    if(d.doseDetail){ h+='<div class="row"><span class="k">용법 상세</span>'+d.doseDetail+'</div>'; }

function simNode(id){ var fl=curSimFlow(); for(var i=0;i<fl.length;i++){ if(fl[i].id===id) return fl[i]; } return null; }
function renderSimStream(){
  var stream=document.getElementById("simStream"); if(!stream)return;
  var html="";
  for(var i=0;i<SIM.path.length;i++){
    var n=simNode(SIM.path[i]);
    if(!n) continue;
    if(n.finale){ html+=renderSimFinale(); continue; }
    if(n.info){ html+='<div class="simnode"><div class="simnext">ℹ️ '+n.info+'</div></div>'; continue; }
    html+='<div class="simnode"><div class="sq">'+n.q+'</div>';
    if(n.hint){ html+='<div class="simhint">'+n.hint+'</div>'; }
    if(n.calc){ html+='<button class="calc-launch" style="margin-bottom:10px" onclick="openCalc(\''+n.calc+'\')">🧮 '+n.calc.toUpperCase()+' 점수 계산기 열기</button>'; }
    html+='<div class="simopt">';
    for(var o=0;o<n.opts.length;o++){
      var sel = (SIM.answers[n.id]===n.opts[o].k)?" sel":"";
      html+='<button class="'+sel.trim()+'" onclick="simAnswer(\''+n.id+'\',\''+n.opts[o].k+'\')">'+n.opts[o].label+'</button>';
    }
    html+='</div></div>';
  }
  stream.innerHTML=html;
  renderSimCollect();
}
function simAnswer(nodeId,ans){
  SIM.answers[nodeId]=ans;
  var n=simNode(nodeId);
  // path 잘라내기(재선택 시 이후 제거)
  var idx=SIM.path.indexOf(nodeId);
  SIM.path=SIM.path.slice(0,idx+1);
  // next
  var nx=n.next?n.next(ans):null;
  if(nx && SIM.path.indexOf(nx)<0){ SIM.path.push(nx); }
  // collect는 path 기준으로 일괄 재계산(중복 방지)
  recomputeCollect();
  renderSimStream();
}
function recomputeCollect(){
  SIM.collected=[];
  for(var i=0;i<SIM.path.length;i++){
    var n=simNode(SIM.path[i]); if(!n)continue;
    if(n.info&&n.collect) SIM.collected.push(n.collect);
    if(n.collectFn && SIM.answers[n.id]){ var c=n.collectFn(SIM.answers[n.id]); if(c) SIM.collected.push(c); }
  }
}

  var input={
    uas7:numOrNull("c_uas7"), uct:numOrNull("c_uct"),
    currentStep:parseInt(document.getElementById("c_step").value,10),
    inducible:feat.indexOf("inducible")>=0,
    angioedema:feat.indexOf("angioedema")>=0,
    updose:feat.indexOf("updose")>=0,
    multiAh:feat.indexOf("multi_ah")>=0
  };
  var clin=csuClinicalEngine(input);
  var h="";
  // 임상 카드
  h+='<div class="rescard clin"><div class="rh"><span class="ricon">🩺</span>임상 권고 (2020 공동지침)</div><div class="rb">';
  if(clin.activityBand) h+='<div style="margin-bottom:6px">활성도: <span class="badge '+(clin.activityBand.color==="block"?"b-block":clin.activityBand.color==="warn"?"b-warn":"b-ok")+'">'+clin.activityBand.label+'</span>';
  if(clin.controlled===true) h+=' <span class="badge b-ok">UCT 조절됨</span>';
  else if(clin.controlled===false) h+=' <span class="badge b-warn">UCT 조절 불충분</span>';
  h+='</div>';
  h+='<div style="font-size:12px;color:var(--ink-faint);margin:6px 0 4px">치료 단계 (탭하면 구체 용법)</div>';
  for(var i=0;i<clin.steps.length;i++){
    var cur=(clin.steps[i].order===input.currentStep);
    var sid="cstepu_"+i, st=clin.steps[i];
    h+='<div class="cstep" id="'+sid+'" onclick="toggleCstep(\''+sid+'\')"><div class="cstep-h"><span class="on"><span class="prio" style="display:inline-flex;width:18px;height:18px;font-size:10px;margin-right:5px">'+st.order+'</span>'+st.label.replace(/^\d단계 — /,'')+(cur?' (현재)':'')+'</span><span class="cstep-chev">▾</span></div><div class="cstep-why">'+st.why+'</div>';
    if(st.regimen&&st.regimen.length){
      h+='<div class="cstep-reg"><div class="cstep-rt">처방 예시</div><ul class="tiplist">';
      for(var r=0;r<st.regimen.length;r++){ h+='<li>'+boldStar(st.regimen[r])+'</li>'; }
      if(st.adjunctNote) h+='<li style="color:var(--clin)">보조: '+st.adjunctNote+'</li>';
      h+='</ul></div>';
    }
    h+='</div>';
  }
  for(var n=0;n<clin.notes.length;n++){ h+='<div class="note">'+clin.notes[n]+'</div>'; }
  h+='</div></div>';

  // 급여 카드
  h+='<div class="rescard pay"><div class="rh"><span class="ricon">💳</span>급여 · 비용 현실</div><div class="rb">';
  // 항히스타민
  var ah=csuReimbCheck("drug:cetirizine",{updose:input.updose});
  h+='<div class="optrow"><span class="on">2세대 항히스타민</span><span class="badge b-ok" style="margin-left:auto">표준 급여</span></div>';
  if(input.updose) h+='<div class="note" style="border-left-color:var(--warn)">⚠ 4배 증량: 허가용량 초과분 삭감 주의. 4종 병용은 상대적으로 무난. 고용량 시 졸음·QT 주의.</div>';
  if(input.multiAh) h+=renderMultiWarn();
  // 오말리주맙
  var om=csuReimbCheck("drug:omalizumab",{});
  h+='<div class="optrow"><span class="on">오말리주맙(졸레어)</span><span class="badge b-block" style="margin-left:auto">CSU 비급여</span></div>';
  h+='<div class="note" style="border-left-color:var(--block)"><div class="nt" style="color:var(--block)">★전액 본인부담</div>'+CSU_OMALIZUMAB_STATUS.asymmetry+'<br>'+CSU_OMALIZUMAB_STATUS.costExample+'</div>';
  // CsA
  h+='<div class="optrow"><span class="on">사이클로스포린</span><span class="badge b-warn" style="margin-left:auto">off-label</span></div>';
  h+='<div class="note">중증·난치 옵션. 신독성·혈압 모니터 필수.</div>';
  h+='</div></div>';

  // 관리 카드
  h+='<div class="rescard care"><div class="rh"><span class="ricon">🛡️</span>챙길 목록</div><div class="rb">';
  if(input.angioedema) h+='<div class="note" style="border-left-color:var(--block)">혈관부종 동반 — 후두부종 등 기도증상은 응급. 발작 시 대처·에피네프린 교육.</div>';
  if(input.inducible) h+='<div class="note">유발성 의심 — 유발인자 회피 교육 + 유발검사로 확인.</div>';
  h+='<div class="note">기본검사: CBC·갑상선기능/항체. 광범위 알레르기검사는 권고 안 함.</div>';
  h+='<div class="note">추적: UAS7(활성도) + UCT(조절, ≥12 목표). 조절되면 단계적 감량.</div>';
  h+='</div></div>';

  document.getElementById("csuFlowResult").innerHTML=h;
  document.getElementById("csuFlowResult").scrollIntoView({behavior:"smooth",block:"start"});
}

function toggleCstep(sid){ var el=document.getElementById(sid); el.className=(el.className.indexOf("open")>=0)?"cstep":"cstep open"; }

/* ---------- 모달 ---------- */
function closeModal(){ document.getElementById("modal").hidden=true; }

/* ---------- 점수 계산기 ---------- */
var CALC_STATE={ type:null, easi:{}, uas7:{}, uct:{}, iga:{level:null}, onApply:null };

function openCalc(type, onApply){
  CALC_STATE.type=type;
  CALC_STATE.onApply=onApply||null;
  if(type==="easi" && !CALC_STATE.easi.h){ CALC_STATE.easi={h:{},u:{},t:{},l:{}}; }
  if(type==="uas7" && !CALC_STATE.uas7.days){ CALC_STATE.uas7={days:[{},{},{},{},{},{},{}]}; }
  if(type==="uct" && !CALC_STATE.uct.answers){ CALC_STATE.uct={answers:[null,null,null,null]}; }
  if(type==="iga" && CALC_STATE.iga.level==null){ CALC_STATE.iga={level:null}; }
  renderCalc();
  document.getElementById("modal").hidden=false;
}
function renderCalc(){
  var body=document.getElementById("modalBody");
  if(CALC_STATE.type==="easi") body.innerHTML=renderCalcEASI();
  else if(CALC_STATE.type==="uas7") body.innerHTML=renderCalcUAS7();
  else if(CALC_STATE.type==="uct") body.innerHTML=renderCalcUCT();
  else if(CALC_STATE.type==="iga") body.innerHTML=renderCalcIGA();
}
function renderCalcIGA(){
  var c=CALC_IGA;
  var h='<h3>🩺 IGA (vIGA-AD) 평가</h3>';
  h+='<div class="calcsrc">'+c.src+' · 범위 '+c.range+'</div>';
  h+='<div class="calctip">'+c.tip+'</div>';
  for(var i=0;i<c.levels.length;i++){
    var lv=c.levels[i], on=(CALC_STATE.iga.level===lv.v)?" on":"";
    h+='<button class="igaopt'+on+'" onclick="setIga('+lv.v+')"><div class="igal">'+lv.label+'</div><div class="igad">'+lv.desc+'</div></button>';
  }
  var res=calcIGA(CALC_STATE.iga);
  if(res.score!=null){
    var col=res.score>=3?"var(--block)":res.score>=2?"var(--warn)":"var(--ok)";
    h+='<div class="calcresult" style="border-color:'+col+'"><div class="calcrn">IGA</div><div class="calcrs" style="color:'+col+'">'+res.score+'</div><div class="calcrb" style="color:'+col+'">'+res.level.label.split("—")[1].trim()+'</div><div class="calcrsub">'+(res.moderate?"중등증-중증(IGA 3~4)":"경증 이하")+'</div></div>';
  }
  if(CALC_STATE.onApply && res.score!=null) h+='<button class="calcapply" onclick="applyCalc()">이 점수로 플로우 채우기 →</button>';
  return h;
}
function setIga(v){ CALC_STATE.iga.level=v; renderCalc(); }

/* EASI 계산기 */
function renderCalcEASI(){
  var c=CALC_EASI;
  var h='<h3>📏 EASI 자동 계산</h3>';
  h+='<div class="calcsrc">'+c.src+' · 범위 '+c.range+'</div>';
  h+='<div class="calctip">'+c.tip+'</div>';
  for(var r=0;r<c.regions.length;r++){
    var reg=c.regions[r], rd=CALC_STATE.easi[reg.key]||{};
    h+='<div class="calcregion"><div class="calcreg-h">'+reg.label+' <span class="calcw">가중치 ×'+reg.weight+'</span></div>';
    // 4징후
    for(var s=0;s<c.signs.length;s++){
      var sg=c.signs[s];
      h+='<div class="calcrow"><div class="calclab">'+sg.label+'<span class="calcdesc">'+sg.desc+'</span></div><div class="calcseg">';
      for(var v=0;v<c.signScale.length;v++){
        var sv=c.signScale[v], on=(rd[sg.key]===sv.v)?" on":"";
        h+='<button class="calcbtn'+on+'" onclick="setEasi(\''+reg.key+'\',\''+sg.key+'\','+sv.v+')">'+sv.v+'</button>';
      }
      h+='</div></div>';
    }
    // 면적
    h+='<div class="calcrow"><div class="calclab">면적(Area)<span class="calcdesc">침범 %→0~6</span></div><div class="calcseg">';
    for(var a=0;a<c.areaScale.length;a++){
      var as=c.areaScale[a], aon=(rd.area===as.v)?" on":"";
      h+='<button class="calcbtn area'+aon+'" onclick="setEasi(\''+reg.key+'\',\'area\','+as.v+')" title="'+as.label+'">'+as.v+'</button>';
    }
    h+='</div></div>';
    var subVal=(num(rd.E)+num(rd.I)+num(rd.Ex)+num(rd.L))*num(rd.area)*reg.weight;
    h+='<div class="calcsub">소계: <b>'+(Math.round(subVal*10)/10)+'</b> = (E+I+Ex+L) '+(num(rd.E)+num(rd.I)+num(rd.Ex)+num(rd.L))+' × 면적 '+num(rd.area)+' × '+reg.weight+'</div>';
    h+='</div>';
  }
  var res=calcEASI(CALC_STATE.easi);
  h+=calcResultBox("EASI", res.score, res.band, res.gateMet?"급여 게이트(≥23) 충족":"게이트(≥23) 미충족", res.gateMet);
  if(CALC_STATE.onApply) h+='<button class="calcapply" onclick="applyCalc()">이 점수로 플로우 채우기 →</button>';
  return h;
}
function setEasi(reg,sign,val){
  if(!CALC_STATE.easi[reg]) CALC_STATE.easi[reg]={};
  CALC_STATE.easi[reg][sign]=val;
  renderCalc();
}

/* UAS7 계산기 */
function renderCalcUAS7(){
  var c=CALC_UAS7;
  var h='<h3>📊 UAS7 자동 계산</h3>';
  h+='<div class="calcsrc">'+c.src+' · 범위 '+c.range+'</div>';
  h+='<div class="calctip">'+c.tip+'</div>';
  h+='<table class="uastbl"><tr><th>일</th><th>팽진(0~3)</th><th>가려움(0~3)</th></tr>';
  for(var d=0;d<7;d++){
    var day=CALC_STATE.uas7.days[d]||{};
    h+='<tr><td class="uasday">'+c.days[d]+'</td>';
    h+='<td><div class="calcseg sm">';
    for(var w=0;w<c.wheal.length;w++){ var won=(day.w===c.wheal[w].v)?" on":""; h+='<button class="calcbtn'+won+'" onclick="setUas('+d+',\'w\','+c.wheal[w].v+')" title="'+c.wheal[w].label+'">'+c.wheal[w].v+'</button>'; }
    h+='</div></td><td><div class="calcseg sm">';
    for(var it=0;it<c.itch.length;it++){ var ion=(day.i===c.itch[it].v)?" on":""; h+='<button class="calcbtn'+ion+'" onclick="setUas('+d+',\'i\','+c.itch[it].v+')" title="'+c.itch[it].label+'">'+c.itch[it].v+'</button>'; }
    h+='</div></td></tr>';
  }
  h+='</table>';
  h+='<div class="calctip" style="margin-top:6px">팽진: 0없음 / 1(1~6개) / 2(7~12개) / 3(>12개)</div>';
  var res=calcUAS7(CALC_STATE.uas7);
  h+=calcResultBox("UAS7", res.score, res.band, res.band.label, res.band.color==="ok");
  if(CALC_STATE.onApply) h+='<button class="calcapply" onclick="applyCalc()">이 점수로 플로우 채우기 →</button>';
  return h;
}
function setUas(day,key,val){
  if(!CALC_STATE.uas7.days[day]) CALC_STATE.uas7.days[day]={};
  CALC_STATE.uas7.days[day][key]=val;
  renderCalc();
}

/* UCT 계산기 */
function renderCalcUCT(){
  var c=CALC_UCT;
  var h='<h3>🎯 UCT 조절검사 자동 계산</h3>';
  h+='<div class="calcsrc">'+c.src+' · '+c.recall+' · 범위 '+c.range+'</div>';
  h+='<div class="calctip">'+c.tip+'</div>';
  for(var q=0;q<c.questions.length;q++){
    var qu=c.questions[q];
    h+='<div class="uctq"><div class="uctq-t">'+(q+1)+'. '+qu.q+'</div>';
    for(var o=0;o<qu.opts.length;o++){
      var op=qu.opts[o], on=(CALC_STATE.uct.answers[q]===op.v)?" on":"";
      h+='<button class="uctopt'+on+'" onclick="setUct('+q+','+op.v+')"><span class="uctv">'+op.v+'</span>'+op.label+'</button>';
    }
    h+='</div>';
  }
  var res=calcUCT(CALC_STATE.uct);
  h+=calcResultBox("UCT", res.score, {label:res.label,color:res.controlled?"ok":"warn"}, res.label+" (기준 ≥12)", res.controlled);
  if(CALC_STATE.onApply) h+='<button class="calcapply" onclick="applyCalc()">이 점수로 플로우 채우기 →</button>';
  return h;
}
function setUct(q,val){ CALC_STATE.uct.answers[q]=val; renderCalc(); }

function calcResultBox(name,score,band,sub,good){
  var col=band.color==="block"?"var(--block)":band.color==="warn"?"var(--warn)":"var(--ok)";
  return '<div class="calcresult" style="border-color:'+col+'"><div class="calcrn">'+name+'</div>'+
    '<div class="calcrs" style="color:'+col+'">'+score+'</div>'+
    '<div class="calcrb" style="color:'+col+'">'+band.label+'</div>'+
    '<div class="calcrsub">'+sub+'</div></div>';
}
function applyCalc(){
  var t=CALC_STATE.type, val=null;
  if(t==="easi") val=calcEASI(CALC_STATE.easi).score;
  else if(t==="uas7") val=calcUAS7(CALC_STATE.uas7).score;
  else if(t==="uct") val=calcUCT(CALC_STATE.uct).score;
  else if(t==="iga") val=calcIGA(CALC_STATE.iga).score;
  if(CALC_STATE.onApply) CALC_STATE.onApply(val);
  closeModal();
}

/* ---------- 푸터 ---------- */

  var f=document.getElementById("foot");

    f.innerHTML='2024 대한아토피피부염학회 치료 가이드라인 · 심평원 약제 급여기준·산정특례(V308) · 교체투여 개정(2025.3.1)<br>'+
      '★급여기준은 갱신되므로 처방·청구 시 최신 고시 확인 권장 · 임상 판단 보조 도구, 최종 결정은 처방의 책임';
  } else {
    f.innerHTML='2020 대한천식알레르기학회·피부면역학회 공동 만성두드러기 진료지침 · 심평원 급여기준<br>'+
      '★오말리주맙 CSU 적응증은 비급여(전액본인) · 급여기준은 갱신되므로 처방·청구 시 최신 고시 확인 권장 · 임상 판단 보조 도구, 최종 결정은 처방의 책임';
  }
}

/* ---------- 이벤트 바인딩 ---------- */
document.getElementById("diseaseToggle").addEventListener("click",function(e){
  var b=e.target.closest("button"); if(b) setDisease(b.getAttribute("data-d"));
});
document.getElementById("tabbar").addEventListener("click",function(e){
  var b=e.target.closest("button"); if(b) setTab(b.getAttribute("data-tab"));
});

renderAll();
