<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>법정감염병 격리 가이드</title>
<style>
:root{
  --bg:#eef2f5; --panel:#ffffff; --panel2:#f5f8fa; --line:#d9e0e6;
  --ink:#16212c; --ink-dim:#46586a; --ink-faint:#7c8c9a;
  --air:#c23636; --air-bg:#fae5e5;
  --drop:#d8632a; --drop-bg:#fbeadd;
  --contact:#b6820f; --contact-bg:#fbf2d6;
  --std:#5f6f7e; --std-bg:#e9eef2;
  --none:#1c9a5f; --none-bg:#d9f1e5;
  --grade1:#a3263a; --grade2:#c2622a; --grade3:#2d77ad; --grade4:#5f6f7e;
  --shadow:0 1px 3px rgba(20,33,44,.07),0 4px 14px rgba(20,33,44,.05);
  --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  background:var(--bg);color:var(--ink);line-height:1.55;font-size:15px}
.app{max-width:780px;margin:0 auto;min-height:100vh;padding-bottom:40px}

.top{position:sticky;top:0;z-index:50;background:rgba(238,242,245,.93);
  backdrop-filter:saturate(1.4) blur(12px);-webkit-backdrop-filter:saturate(1.4) blur(12px);
  border-bottom:1px solid var(--line);padding:12px 16px 11px}
.top-row{display:flex;align-items:center;gap:10px}
.back{background:var(--panel);width:32px;height:32px;border-radius:9px;font-size:17px;
  color:var(--ink-dim);cursor:pointer;display:none;align-items:center;justify-content:center;
  border:1px solid var(--line);flex:0 0 auto}
.back.on{display:flex}
.top h1{font-size:16.5px;font-weight:760;letter-spacing:-.02em;display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.top h1 .dot{width:8px;height:8px;border-radius:50%;background:var(--air);box-shadow:0 0 0 4px var(--air-bg);flex:0 0 auto}
.top h1 .txt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.searchwrap{margin-top:10px;position:relative}
.searchwrap input{width:100%;border:1.5px solid var(--line);background:var(--panel);
  border-radius:11px;padding:10px 38px;font-size:15px;color:var(--ink);outline:none;
  transition:border-color .15s,box-shadow .15s}
.searchwrap input:focus{border-color:#9db4c6;box-shadow:0 0 0 3px rgba(45,119,173,.12)}
.searchwrap .ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ink-faint);pointer-events:none}
.searchwrap .clr{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:24px;height:24px;
  border:none;background:var(--panel2);border-radius:50%;color:var(--ink-dim);font-size:13px;cursor:pointer;display:none}
.searchwrap .clr.on{display:block}

.view{display:none;padding:16px}
.view.on{display:block}

.hub-lead{font-size:12.5px;color:var(--ink-faint);margin:2px 2px 14px;line-height:1.5}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.cat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:15px 14px;cursor:pointer;box-shadow:var(--shadow);position:relative;overflow:hidden;
  transition:transform .12s;border-top-width:4px;min-height:120px;display:flex;flex-direction:column}
.cat:active{transform:scale(.975)}
.cat.c-air{border-top-color:var(--air)} .cat.c-contact{border-top-color:var(--contact)}
.cat.c-drop{border-top-color:var(--drop)} .cat.c-none{border-top-color:var(--none)}
.cat .ci{font-size:21px;line-height:1}
.cat .cnt{position:absolute;top:13px;right:13px;font-size:12px;font-weight:750;color:var(--ink-faint);background:var(--panel2);border-radius:20px;padding:2px 9px}
.cat .cn{font-size:15px;font-weight:740;margin-top:9px;letter-spacing:-.02em}
.cat .cd{font-size:11.5px;color:var(--ink-dim);margin-top:3px;line-height:1.4}
.cat .ch{font-size:10.5px;color:var(--ink-faint);margin-top:auto;padding-top:7px;line-height:1.4}
.hub-all{margin-top:12px;width:100%;background:var(--panel);border:1px solid var(--line);
  border-radius:12px;padding:13px 15px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow)}
.hub-all:active{transform:scale(.985)}
.hub-all .l{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.hub-all .r{font-size:12px;color:var(--ink-faint);font-weight:600}

.list-head{display:flex;align-items:center;justify-content:space-between;margin:0 2px 12px}
.list-title{font-size:15px;font-weight:740;display:flex;align-items:center;gap:7px}
.list-title .badge{font-size:11px;font-weight:700;color:var(--ink-faint);background:var(--panel2);padding:2px 9px;border-radius:20px}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:13px}
.filt-lbl{font-size:10px;font-weight:750;color:var(--ink-faint);letter-spacing:.03em;align-self:center;margin-right:1px}
.chip{font-size:11.5px;font-weight:650;padding:4px 10px;border-radius:20px;border:1.5px solid var(--line);
  background:var(--panel);color:var(--ink-dim);cursor:pointer;user-select:none;transition:all .12s}
.chip:active{transform:scale(.94)}
.chip.on{color:#fff;border-color:transparent}
.chip.on.f-g1{background:var(--grade1)} .chip.on.f-g2{background:var(--grade2)}
.chip.on.f-g3{background:var(--grade3)} .chip.on.f-g4{background:var(--grade4)}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.gc{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 12px 11px;
  cursor:pointer;box-shadow:var(--shadow);border-left-width:4px;transition:transform .1s;
  display:flex;flex-direction:column;min-height:106px}
.gc:active{transform:scale(.97)}
.gc.l-air{border-left-color:var(--air)} .gc.l-drop{border-left-color:var(--drop)}
.gc.l-contact{border-left-color:var(--contact)} .gc.l-std{border-left-color:var(--std)}
.gc.l-none{border-left-color:var(--none)}
.gc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px}
.gc-name{font-size:14px;font-weight:730;letter-spacing:-.02em;line-height:1.3}
.gc-g{font-size:9.5px;font-weight:750;padding:1px 6px;border-radius:5px;color:#fff;flex:0 0 auto;margin-top:1px}
.gc-g.g1{background:var(--grade1)} .gc-g.g2{background:var(--grade2)} .gc-g.g3{background:var(--grade3)} .gc-g.g4{background:var(--grade4)}
.gc-lvls{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.gc-lvl{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px}
.gc-lvl.air{background:var(--air-bg);color:var(--air)} .gc-lvl.drop{background:var(--drop-bg);color:var(--drop)}
.gc-lvl.contact{background:var(--contact-bg);color:var(--contact)} .gc-lvl.std{background:var(--std-bg);color:var(--std)}
.gc-lvl.none{background:var(--none-bg);color:var(--none)}
.gc-room{font-size:10.5px;color:var(--ink-dim);margin-top:auto;padding-top:8px;font-weight:600;display:flex;align-items:center;gap:3px;line-height:1.3}
.gc-neg{display:inline-block;font-size:9px;font-weight:800;color:#7d3a9e;background:#f0e3f7;border-radius:4px;padding:1px 5px;margin-left:3px}

.sheet-bg{position:fixed;inset:0;background:rgba(20,33,44,.42);z-index:90;display:none;backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px)}
.sheet-bg.on{display:block}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:91;background:var(--panel);border-radius:20px 20px 0 0;
  max-height:90vh;overflow-y:auto;transform:translateY(100%);transition:transform .26s cubic-bezier(.32,.72,0,1);
  max-width:780px;margin:0 auto;-webkit-overflow-scrolling:touch}
.sheet.on{transform:translateY(0)}
.sheet-grip{position:sticky;top:0;background:var(--panel);padding:9px 0 5px;text-align:center;z-index:2}
.sheet-grip::before{content:"";display:inline-block;width:38px;height:4px;border-radius:3px;background:var(--line)}
.sheet-x{position:absolute;right:14px;top:11px;width:30px;height:30px;border:none;background:var(--panel2);border-radius:50%;font-size:15px;color:var(--ink-dim);cursor:pointer;z-index:3}
.sheet-in{padding:4px 18px 28px}
.sh-name{font-size:20px;font-weight:780;letter-spacing:-.02em}
.sh-en{font-size:12.5px;color:var(--ink-faint);font-weight:500;margin-top:1px}
.sh-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:11px}
.sh-b{font-size:11px;font-weight:700;padding:4px 10px;border-radius:8px}
.sh-b.air{background:var(--air-bg);color:var(--air)} .sh-b.drop{background:var(--drop-bg);color:var(--drop)}
.sh-b.contact{background:var(--contact-bg);color:var(--contact)} .sh-b.std{background:var(--std-bg);color:var(--std)}
.sh-b.none{background:var(--none-bg);color:var(--none)} .sh-b.neg{background:#f0e3f7;color:#7d3a9e}
.sh-b.mand{background:#fde8e8;color:#b3261e} .sh-b.g{color:#fff}
.sh-b.g.g1{background:var(--grade1)} .sh-b.g.g2{background:var(--grade2)} .sh-b.g.g3{background:var(--grade3)} .sh-b.g.g4{background:var(--grade4)}
.sect{margin-top:18px}
.sect-t{font-size:11px;font-weight:780;color:var(--ink-faint);letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:7px}
.sect-t::before{content:"";width:3px;height:13px;border-radius:2px;background:var(--line)}
.sect.s-rel .sect-t::before{background:var(--air)} .sect.s-iso .sect-t::before{background:var(--drop)}
.sect.s-extra .sect-t::before{background:var(--contact)} .sect.s-src .sect-t::before{background:var(--std)}
.big-room{background:linear-gradient(135deg,var(--panel2),#fff);border:1px solid var(--line);border-radius:12px;padding:13px 15px;display:flex;align-items:center;gap:12px;margin-top:2px}
.big-room .ic{font-size:24px}
.big-room .t{font-size:16px;font-weight:740}
.big-room .s{font-size:11.5px;color:var(--ink-faint);margin-top:1px}
.rel-list{list-style:none;display:flex;flex-direction:column;gap:7px}
.rel-list li{font-size:13.5px;line-height:1.55;padding:10px 12px;background:var(--panel2);border-radius:10px;border:1px solid var(--line);position:relative;padding-left:32px}
.rel-list li::before{content:"✓";position:absolute;left:12px;top:10px;color:var(--none);font-weight:800;font-size:12px}
.rel-list li.star{background:#fff6e8;border-color:#f0d9a8}
.rel-list li.star::before{content:"★";color:var(--contact)}
.rel-note{font-size:12.5px;color:var(--ink-dim);margin-top:8px;padding:9px 12px;background:#eef5fb;border-radius:10px;border:1px solid #d4e4f0;line-height:1.5}
.kv{display:flex;gap:10px;font-size:13.5px;padding:7px 0;border-bottom:1px solid var(--panel2)}
.kv:last-child{border-bottom:none}
.kv .k{flex:0 0 78px;color:var(--ink-faint);font-weight:650;font-size:12px;padding-top:1px}
.kv .v{flex:1;color:var(--ink-dim);line-height:1.5}
.kv .v.warn{color:#b3261e;font-weight:600}
.ppe{display:flex;gap:5px;flex-wrap:wrap;margin-top:3px}
.ppe span{font-size:11px;font-weight:600;padding:2px 9px;border-radius:6px;background:var(--panel2);border:1px solid var(--line);color:var(--ink-dim)}
.dur-pill{display:inline-block;background:var(--air-bg);color:var(--air);font-weight:750;font-size:12px;padding:4px 11px;border-radius:8px;margin-top:9px}
.src{font-size:12px;line-height:1.5;padding:9px 12px;background:var(--panel2);border-radius:10px;border:1px solid var(--line);margin-bottom:7px}
.src .sg{font-weight:700;color:var(--ink)} .src .sv{color:var(--ink-faint);font-size:11px}
.src a{color:#2d77ad;text-decoration:none;font-weight:600;font-size:11.5px}
.src .sver{font-size:10.5px;color:var(--ink-faint);margin-top:2px}
.reclass{font-size:11.5px;color:#8a5a14;background:#fdf4e3;border:1px solid #f0dcb0;border-radius:8px;padding:7px 10px;margin-top:7px;line-height:1.45}
.cat-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:11px}
.cat-tags span{font-size:10.5px;font-weight:650;padding:3px 9px;border-radius:7px;background:var(--panel2);border:1px solid var(--line);color:var(--ink-dim)}
.empty{text-align:center;padding:46px 20px;color:var(--ink-faint)}
.empty .big{font-size:30px;margin-bottom:8px}
.empty p{font-size:13.5px;line-height:1.6}
.foot{padding:18px 16px 6px;font-size:10.5px;color:var(--ink-faint);line-height:1.6;border-top:1px solid var(--line);margin-top:22px}
.foot b{color:var(--ink-dim)}
.foot .disc{margin-top:8px;padding:9px 11px;background:#fdf4e3;border:1px solid #f0dcb0;border-radius:8px;color:#8a5a14}
@media(max-width:360px){ .gc-name{font-size:13px} .cat .cn{font-size:14px} }
</style>
</head>
<body>
<div class="app">

<header class="top">
  <div class="top-row">
    <button class="back" id="back">‹</button>
    <h1><span class="dot"></span><span class="txt" id="title">법정감염병 격리 가이드</span></h1>
  </div>
  <div class="searchwrap">
    <span class="ico">🔍</span>
    <input id="q" type="search" placeholder="질환명·약어 검색 (결핵, TB, MERS, CRE…)" autocomplete="off">
    <button class="clr" id="clr" aria-label="지우기">✕</button>
  </div>
</header>

<div class="view on" id="v-hub">
  <div class="hub-lead">격리가 필요한 상황으로 먼저 들어가세요. 한 질환은 여러 분류에 함께 나타납니다.</div>
  <div class="cat-grid" id="catGrid"></div>
  <button class="hub-all" id="goAll">
    <span class="l">📋 전체 질환 조회</span>
    <span class="r" id="allCnt"></span>
  </button>
</div>

<div class="view" id="v-list">
  <div class="list-head"><div class="list-title" id="listTitle"></div></div>
  <div class="filters" id="gradeFilters">
    <span class="filt-lbl">등급</span>
    <button class="chip f-g1" data-grade="급1">1급</button>
    <button class="chip f-g2" data-grade="급2">2급</button>
    <button class="chip f-g3" data-grade="급3">3급</button>
    <button class="chip f-g4" data-grade="급4">4급</button>
  </div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none"><div class="big">🔍</div><p>결과가 없습니다.</p></div>
</div>

<div class="foot">
  <b>출처</b> · 감염병예방법·시행령 별표2 · 질병관리청 감염병포털 및 질환별 대응지침 · 의료관련감염 표준예방지침(2017)
  <div class="disc">⚠️ 격리 기준은 지침 개정으로 수시 변경됩니다. 실제 결정 시 최신 지침·감염관리실 확인 권장. 색인·판단 보조용이며 최종 결정은 의료진·감염관리실 책임입니다.</div>
</div>
</div>

<div class="sheet-bg" id="sheetBg"></div>
<div class="sheet" id="sheet">
  <div class="sheet-grip"></div>
  <button class="sheet-x" id="sheetX">✕</button>
  <div class="sheet-in" id="sheetIn"></div>
</div>

<script>
/* ============================================================
   isolation_levels.js  —  격리 레벨 / 병실 / 공유 해제기준 정의
   전역 ID 체계. 읽기전용·가산만. 기존 ID 변경 금지.
   ============================================================ */

/* 격리 유형 (전파경로 — 감염관리 근거). 위험 우선순위: 공기>비말>접촉>표준 */
var ISO_LEVELS = {
  "class:iso_airborne": { ko:"공기주의", short:"공기", rank:4, color:"air",
    ppe:["N95 호흡기", "음압격리"], desc:"5μm 이하 비말핵·에어로졸 공기 전파" },
  "class:iso_droplet":  { ko:"비말주의", short:"비말", rank:3, color:"drop",
    ppe:["수술용 마스크", "눈 보호구(상황별)"], desc:"5μm 초과 비말 1m 내 전파" },
  "class:iso_contact":  { ko:"접촉주의", short:"접촉", rank:2, color:"contact",
    ppe:["장갑", "가운"], desc:"직접·간접(환경·기구) 접촉 전파" },
  "class:iso_standard": { ko:"표준주의", short:"표준", rank:1, color:"std",
    ppe:["손위생", "상황별 보호구"], desc:"모든 환자 기본 적용" }
};

/* 병실 배치 (간호진 즉답용) */
var ROOM_TYPES = {
  "room:negative_pressure": { ko:"음압 1인실", rank:4, color:"air" },
  "room:single":            { ko:"1인실",      rank:3, color:"contact" },
  "room:cohort":            { ko:"1인실/코호트", rank:2, color:"contact",
    note:"동일 균주끼리 코호트 격리 가능" },
  "room:general":           { ko:"일반 병실",   rank:1, color:"none" }
};

/* 공유 해제기준 — ID 참조로 중복 제거 (값 복제 금지)
   다제내성균 6종(CRE·VRSA·MRSA·VRE·MRPA·MRAB)이 참조 */
var RELEASE_COMMON = {
  "release:mdro_common": [
    "원래 분리되었던 부위(임상검체) + 보균검사(대변·직장도말)에서 3일~1주 간격 검사",
    "연속 3회 이상 음성 시 격리 해제 고려",
    "★명확히 정해진 기준 없으며 재양전 가능 → 의료기관 감염관리실 자체 판단"
  ]
};
/* ============================================================
   disease_registry.js  —  법정감염병 90종 격리 마스터
   전역 ID: disease:<영문표준명>. 같은 병원체=같은 ID.
   각 카드: 등급·격리레벨·병실·해제기준·출처(버전·확인일)
   ★격리해제는 분기엔진 아님 — 조건 문구 배열. UI는 나열만.
   ============================================================ */

/* 카테고리 (메인 허브 — 중복 허용, 실무 격리 단위) */
var CATEGORIES = [
  { id:"cat:negative",  ko:"음압 격리",      icon:"🔴", color:"air",
    desc:"공기매개 — 음압 1인실 필요", hint:"결핵·홍역·수두·MERS·두창" },
  { id:"cat:contact",   ko:"병원 접촉 격리",  icon:"🟡", color:"contact",
    desc:"다제내성균 등 — 격리실/코호트", hint:"CRE·VRSA·MRSA·VRE" },
  { id:"cat:droplet",   ko:"비말 격리",      icon:"🟠", color:"drop",
    desc:"1m 이내 비말 — 1인실", hint:"백일해·수막구균·디프테리아" },
  { id:"cat:enteric",   ko:"장관 격리",      icon:"🟤", color:"contact",
    desc:"분변·접촉 — 배양 음성까지", hint:"콜레라·장티푸스·이질·EHEC" },
  { id:"cat:imported",  ko:"해외 감염병·검역", icon:"✈️", color:"drop",

/* === 카테고리 자동 도출 (규칙 기반 — 하드코딩 회피) ===
   중복 허용: 한 질환이 여러 카테고리에 속할 수 있음 */
function deriveCategories(d){
  var c=[], t=d.isolation.types, tags=d.tags||[];
  var has=function(x){return t.indexOf(x)>=0;};
  var tag=function(x){return tags.indexOf(x)>=0;};
  var noIso=!d.isolation.mandatory && t.length===1 && t[0]==="class:iso_standard";

  if(d.isolation.negative_pressure) c.push("cat:negative");
  // 병원 접촉격리: 의료관련감염·다제내성균 (코호트 격리)
  if(tag("의료관련감염")||tag("다제내성균")||tag("MDRO")) c.push("cat:contact");
  // 비말격리: 비말 mandatory (음압 아닌)
  if(has("class:iso_droplet") && d.isolation.mandatory && !d.isolation.negative_pressure) c.push("cat:droplet");
  // 장관격리: 수인성·식품매개·분변 + 접촉 mandatory
  if((tag("수인성")||tag("식품매개")||tag("분변경구")) && has("class:iso_contact") && d.isolation.mandatory) c.push("cat:enteric");
  // 해외감염병·검역
  if(tag("해외유입")||tag("출혈열")||tag("VHF")||tag("모기")||tag("검역")||
     ["disease:mers","disease:sars","disease:smallpox","disease:plague","disease:diphtheria","disease:nipah","disease:zoonotic_influenza","disease:novel_influenza","disease:malaria"].indexOf(d.id)>=0) c.push("cat:imported");
  // 격리불요
  if(noIso) c.push("cat:noiso");

  // 어디에도 안 들어간 mandatory는 접촉격리로 흡수(폴리오 등), 아니면 격리불요
  if(c.length===0){ c.push(d.isolation.mandatory?"cat:contact":"cat:noiso"); }
  return c;
}
DISEASES.forEach(function(d){ d.categories=deriveCategories(d); });

var ROOM_COLOR={"room:negative_pressure":"air","room:single":"contact","room:cohort":"contact","room:general":"none"};
function topLevel(d){var r=0,t=null;d.isolation.types.forEach(function(x){var L=ISO_LEVELS[x];if(L&&L.rank>r){r=L.rank;t=x;}});return t;}
function isNoIso(d){return !d.isolation.mandatory && d.isolation.types.length===1 && d.isolation.types[0]==="class:iso_standard";}
function levelClass(d){if(isNoIso(d))return "none";var t=topLevel(d);if(t==="class:iso_airborne")return "air";if(t==="class:iso_droplet")return "drop";if(t==="class:iso_contact")return "contact";return "std";}
function resolveRelease(d){if(typeof d.release==="string")return RELEASE_COMMON[d.release]||[d.release];return d.release;}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function lvlShort(t){return ISO_LEVELS[t]?ISO_LEVELS[t].short:t;}
function lvlCls(t){return t==="class:iso_airborne"?"air":t==="class:iso_droplet"?"drop":t==="class:iso_contact"?"contact":"std";}

var state={mode:"hub",cat:null,q:"",grades:{}};

function renderHub(){
  var counts={};
  DISEASES.forEach(function(d){d.categories.forEach(function(c){counts[c]=(counts[c]||0)+1;});});
  var html="";
  CATEGORIES.forEach(function(c){
    html+='<div class="cat c-'+c.color+'" data-cat="'+c.id+'"><div class="ci">'+c.icon+'</div>';
    html+='<div class="cnt">'+(counts[c.id]||0)+'</div><div class="cn">'+esc(c.ko)+'</div>';
    html+='<div class="cd">'+esc(c.desc)+'</div><div class="ch">'+esc(c.hint)+'</div></div>';
  });
  document.getElementById("catGrid").innerHTML=html;
  document.getElementById("allCnt").textContent="전체 "+DISEASES.length+"종";
  document.querySelectorAll(".cat").forEach(function(el){ el.addEventListener("click",function(){openCat(this.dataset.cat);}); });
}

function matchList(d){
  if(state.q){
    var q=state.q.toLowerCase();
    var hay=(d.name_ko+" "+d.name_en+" "+(d.aliases||[]).join(" ")+" "+(d.tags||[]).join(" ")).toLowerCase();
    if(hay.indexOf(q)<0)return false;
  } else if(state.cat){ if(d.categories.indexOf(state.cat)<0)return false; }
  var gk=Object.keys(state.grades).filter(function(k){return state.grades[k];});
  if(gk.length && !state.grades[d.grade])return false;
  return true;
}
function sortKey(d){var lc=levelClass(d);var r={air:5,drop:4,contact:3,std:2,none:1}[lc]||0;if(d.isolation.negative_pressure)r+=.5;return -r;}

function renderList(){
  var arr=DISEASES.filter(matchList);
  arr.sort(function(a,b){return sortKey(a)-sortKey(b);});
  var g=document.getElementById("grid");
  document.getElementById("empty").style.display=arr.length?"none":"block";
  var html="";
  arr.forEach(function(d){
    var lc=levelClass(d), gn=d.grade.replace("급","");
    var lvls="";
    ["class:iso_airborne","class:iso_droplet","class:iso_contact","class:iso_standard"].forEach(function(t){
      if(d.isolation.types.indexOf(t)>=0) lvls+='<span class="gc-lvl '+lvlCls(t)+'">'+lvlShort(t)+'</span>';
    });
    if(isNoIso(d)) lvls='<span class="gc-lvl none">격리불요</span>';
    var roomShort=(d.room.label||"").replace("국가지정 입원치료병상","국가지정").replace(/\s*\(.*?\)\s*/," ").trim();
    html+='<div class="gc l-'+lc+'" data-id="'+d.id+'"><div class="gc-top"><span class="gc-name">'+esc(d.name_ko)+'</span><span class="gc-g g'+gn+'">'+gn+'</span></div>';
    html+='<div class="gc-lvls">'+lvls+'</div>';
    html+='<div class="gc-room">🏠 '+esc(roomShort||"-")+(d.isolation.negative_pressure?'<span class="gc-neg">음압</span>':'')+'</div></div>';
  });
  g.innerHTML=html;
  g.querySelectorAll(".gc").forEach(function(el){ el.addEventListener("click",function(){openSheet(this.dataset.id);}); });
}

function openSheet(id){
  var d=DISEASES.filter(function(x){return x.id===id;})[0]; if(!d)return;
  var rels=resolveRelease(d), gn=d.grade.replace("급","");
  var h="";
  h+='<div class="sh-name">'+esc(d.name_ko)+'</div><div class="sh-en">'+esc(d.name_en)+'</div>';
  h+='<div class="sh-badges"><span class="sh-b g g'+gn+'">'+gn+'급</span>';
  ["class:iso_airborne","class:iso_droplet","class:iso_contact","class:iso_standard"].forEach(function(t){
    if(d.isolation.types.indexOf(t)>=0) h+='<span class="sh-b '+lvlCls(t)+'">'+ISO_LEVELS[t].ko+'</span>';
  });
  if(isNoIso(d)) h+='<span class="sh-b none">격리 불요</span>';
  if(d.isolation.negative_pressure) h+='<span class="sh-b neg">음압</span>';
  if(d.isolation.mandatory) h+='<span class="sh-b mand">법정 의무</span>';
  h+='</div>';
  h+='<div class="sect s-iso"><div class="sect-t">격리 장소</div>';
  var rl=d.room.label||"", rmain=rl.split("(")[0].trim(), rsub=rl.indexOf("(")>=0?rl.split("(")[1].replace(")",""):"";
  h+='<div class="big-room"><span class="ic">'+(d.isolation.negative_pressure?"🔴":isNoIso(d)?"🟢":"🏠")+'</span><div><div class="t">'+esc(rmain)+'</div>'+(rsub?('<div class="s">'+esc(rsub)+'</div>'):'')+'</div></div></div>';
  h+='<div class="sect s-rel"><div class="sect-t">격리해제 기준</div><ul class="rel-list">';
  rels.forEach(function(r){
    var star=/★/.test(r)||/명확히 정해진|자체 판단|확인 필요/.test(r);
    h+='<li'+(star?' class="star"':'')+'>'+esc(r.replace(/^★/,''))+'</li>';
  });
  h+='</ul>';
  if(d.release_note) h+='<div class="rel-note">📋 '+esc(d.release_note)+'</div>';
  if(d.duration) h+='<div class="dur-pill">⏱ '+esc(d.duration)+'</div>';
  h+='</div>';
  h+='<div class="sect s-iso"><div class="sect-t">격리 상세</div>';
  h+='<div class="kv"><span class="k">전파경로</span><span class="v">'+d.isolation.types.map(function(t){return ISO_LEVELS[t]?ISO_LEVELS[t].ko:t;}).join(" + ")+(d.isolation.note?(' <span style="color:var(--ink-faint)">('+esc(d.isolation.note)+')</span>'):'')+'</span></div>';
  h+='<div class="kv"><span class="k">법정 의무</span><span class="v'+(d.isolation.mandatory?' warn':'')+'">'+(d.isolation.mandatory?"의무격리 대상":"의무격리 아님(권고/표준주의)")+'</span></div>';
  var ppe={};d.isolation.types.forEach(function(t){if(ISO_LEVELS[t])ISO_LEVELS[t].ppe.forEach(function(p){ppe[p]=1;});});
  var pa=Object.keys(ppe);
  if(pa.length) h+='<div class="kv"><span class="k">개인보호구</span><span class="v"><div class="ppe">'+pa.map(function(p){return '<span>'+esc(p)+'</span>';}).join("")+'</div></span></div>';
  h+='</div>';
  var ex=d.extra||{};
  if(ex.contact_monitoring||ex.work_restriction||ex.special_precaution){
    h+='<div class="sect s-extra"><div class="sect-t">부가 관리</div>';
    if(ex.contact_monitoring)h+='<div class="kv"><span class="k">접촉자</span><span class="v">'+esc(ex.contact_monitoring)+'</span></div>';
    if(ex.work_restriction)h+='<div class="kv"><span class="k">업무제한</span><span class="v">'+esc(ex.work_restriction)+'</span></div>';
    if(ex.special_precaution)h+='<div class="kv"><span class="k">특수주의</span><span class="v warn">'+esc(ex.special_precaution)+'</span></div>';
    h+='</div>';
  }
  h+='<div class="sect s-extra"><div class="sect-t">신고 · 코드</div>';
  h+='<div class="kv"><span class="k">신고기한</span><span class="v">'+esc(ex.notify||"-")+'</span></div>';
  if(d.kcd&&d.kcd!=="...")h+='<div class="kv"><span class="k">KCD</span><span class="v">'+esc(d.kcd)+'</span></div>';
  if(ex.cost_support)h+='<div class="kv"><span class="k">입원치료비</span><span class="v">지원 대상</span></div>';
  h+='</div>';
  if(d.reclassified&&d.reclassified.length){
    d.reclassified.forEach(function(rc){ h+='<div class="reclass">⟳ '+esc(rc.date)+' · '+esc(rc.change)+(rc.note?(" — "+esc(rc.note)):"")+'</div>'; });
  }
  h+='<div class="sect s-src"><div class="sect-t">출처 · 확인일</div>';
  (d.sources||[]).forEach(function(s){
    h+='<div class="src"><span class="sg">'+esc(s.guideline)+'</span> <span class="sv">'+esc(s.version||"")+'</span>';
    if(s.url)h+=' · <a href="'+esc(s.url)+'" target="_blank" rel="noopener">지침 링크 ↗</a>';
    h+='<div class="sver">확인일 '+esc(s.verified||"")+'</div></div>';
  });
  h+='</div>';
  h+='<div class="cat-tags">';
  d.categories.forEach(function(cid){var c=CATEGORIES.filter(function(x){return x.id===cid;})[0];if(c)h+='<span>'+c.icon+' '+esc(c.ko)+'</span>';});
  h+='</div>';
  document.getElementById("sheetIn").innerHTML=h;
  document.getElementById("sheetBg").classList.add("on");
  document.getElementById("sheet").classList.add("on");
  document.getElementById("sheet").scrollTop=0;
}
function closeSheet(){document.getElementById("sheetBg").classList.remove("on");document.getElementById("sheet").classList.remove("on");}

function showHub(){
  state.mode="hub";state.cat=null;state.grades={};
  document.querySelectorAll("#gradeFilters .chip").forEach(function(c){c.classList.remove("on");});
  document.getElementById("v-hub").classList.add("on");
  document.getElementById("v-list").classList.remove("on");
  document.getElementById("back").classList.remove("on");
  document.getElementById("title").textContent="법정감염병 격리 가이드";
}
function openCat(cid){
  state.mode="cat";state.cat=cid;state.q="";state.grades={};
  document.querySelectorAll("#gradeFilters .chip").forEach(function(c){c.classList.remove("on");});
  document.getElementById("q").value="";document.getElementById("clr").classList.remove("on");
  var c=CATEGORIES.filter(function(x){return x.id===cid;})[0];
  var arr=DISEASES.filter(function(d){return d.categories.indexOf(cid)>=0;});
  document.getElementById("listTitle").innerHTML=(c?c.icon+" "+esc(c.ko):"")+'<span class="badge">'+arr.length+'종</span>';
  document.getElementById("v-hub").classList.remove("on");
  document.getElementById("v-list").classList.add("on");
  document.getElementById("back").classList.add("on");
  document.getElementById("title").textContent=c?c.ko:"";
  renderList();
}
function openAll(){
  state.mode="all";state.cat=null;state.q="";state.grades={};
  document.querySelectorAll("#gradeFilters .chip").forEach(function(c){c.classList.remove("on");});
  document.getElementById("q").value="";document.getElementById("clr").classList.remove("on");
  document.getElementById("listTitle").innerHTML='📋 전체 질환<span class="badge">'+DISEASES.length+'종</span>';
  document.getElementById("v-hub").classList.remove("on");
  document.getElementById("v-list").classList.add("on");
  document.getElementById("back").classList.add("on");
  document.getElementById("title").textContent="전체 질환 조회";
  renderList();
}

document.getElementById("q").addEventListener("input",function(){
  state.q=this.value.trim();
  document.getElementById("clr").classList.toggle("on",!!this.value);
  if(state.q){
    state.mode="search";state.cat=null;
    document.getElementById("listTitle").innerHTML='🔍 "'+esc(state.q)+'" 검색';
    document.getElementById("v-hub").classList.remove("on");
    document.getElementById("v-list").classList.add("on");
    document.getElementById("back").classList.add("on");
    document.getElementById("title").textContent="검색";
    renderList();
  } else { showHub(); }
});
document.getElementById("clr").addEventListener("click",function(){document.getElementById("q").value="";state.q="";this.classList.remove("on");showHub();});
document.getElementById("back").addEventListener("click",showHub);
document.getElementById("goAll").addEventListener("click",openAll);
document.getElementById("sheetX").addEventListener("click",closeSheet);
document.getElementById("sheetBg").addEventListener("click",closeSheet);
document.querySelectorAll("#gradeFilters .chip").forEach(function(c){
  c.addEventListener("click",function(){this.classList.toggle("on");state.grades[this.dataset.grade]=this.classList.contains("on");renderList();});
});

renderHub();
</script>
</body>
</html>
