<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>IBD 통합 가이드 — 궤양성대장염·크론병</title>
<style>
:root{
  --bg:#f4f6f8; --panel:#ffffff; --panel2:#eef1f4; --line:#d6dde3;
  --ink:#1a2530; --ink-dim:#4a5a68; --ink-faint:#8493a0;
  --clin:#2c6fb0; --clin-bg:#e4eef8;
  --pay:#b87514; --pay-bg:#fbf0d8;
  --care:#1a8a72; --care-bg:#dcf2ec;
  --uc:#2c6fb0; --uc-bg:#e4eef8;
  --cd:#c0533a; --cd-bg:#fbe7e0;
  --ok:#1f9d54; --ok-bg:#e3f5ea;
  --warn:#b87514; --warn-bg:#fbf0d8;
  --block:#c43838; --block-bg:#fbe6e6;
  --alert:#d8632a;
  --accent:var(--uc); --accent-bg:var(--uc-bg);
  --radius:14px; --radius-sm:9px;
  --shadow:0 1px 3px rgba(20,40,60,.06),0 4px 16px rgba(20,40,60,.05);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",Roboto,sans-serif;
  font-size:15px;line-height:1.5;-webkit-text-size-adjust:100%;}
body{padding-bottom:84px;}
.wrap{max-width:760px;margin:0 auto;padding:0 14px;}

.appbar{position:sticky;top:0;z-index:40;background:rgba(244,246,248,.92);
  backdrop-filter:saturate(1.4) blur(8px);-webkit-backdrop-filter:saturate(1.4) blur(8px);
  border-bottom:1px solid var(--line);}
.appbar-in{max-width:760px;margin:0 auto;padding:10px 14px 0;}
.title-row{display:flex;align-items:center;gap:9px;margin-bottom:9px;}
.title-row h1{font-size:17px;font-weight:800;margin:0;letter-spacing:-.3px;}
.title-row .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);flex:none;
  box-shadow:0 0 0 4px var(--accent-bg);transition:background .25s,box-shadow .25s;}
.title-row .sub{margin-left:auto;font-size:11px;color:var(--ink-faint);font-weight:600;}

.disease-toggle{display:flex;gap:6px;margin-bottom:9px;}
.disease-toggle button{flex:1;border:1.5px solid var(--line);background:var(--panel);
  border-radius:var(--radius-sm);padding:9px 6px;font-size:14px;font-weight:700;color:var(--ink-dim);
  cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;}
.disease-toggle button .ic{font-size:16px;}
.disease-toggle button.on[data-d="uc"]{border-color:var(--uc);background:var(--uc-bg);color:var(--uc);}
.disease-toggle button.on[data-d="cd"]{border-color:var(--cd);background:var(--cd-bg);color:var(--cd);}

.tabbar{display:flex;gap:2px;}
.tabbar button{flex:1;border:none;background:none;padding:9px 2px 11px;font-size:12px;font-weight:700;
  color:var(--ink-faint);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .18s;
  display:flex;flex-direction:column;align-items:center;gap:3px;}
.tabbar button .ic{font-size:17px;}
.tabbar button.on{color:var(--accent);border-bottom-color:var(--accent);}

.view{padding-top:14px;}
.view[hidden]{display:none;}

.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);margin-bottom:11px;overflow:hidden;}
.card-head{padding:13px 15px;display:flex;align-items:flex-start;gap:11px;cursor:pointer;}
.card-head .icon{font-size:22px;flex:none;line-height:1;margin-top:1px;}
.card-head .ht{flex:1;min-width:0;}
.card-head .ht .t{font-size:15.5px;font-weight:750;letter-spacing:-.2px;}
.card-head .ht .l{font-size:12.5px;color:var(--ink-faint);margin-top:2px;}
.card-head .chev{color:var(--ink-faint);font-size:13px;transition:transform .2s;flex:none;margin-top:3px;}
.card.open .card-head .chev{transform:rotate(90deg);}
.card-body{padding:0 15px;max-height:0;overflow:hidden;transition:max-height .01s;}
.card.open .card-body{max-height:none;padding:0 15px 15px;}

.cat-tag{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;margin-left:6px;vertical-align:middle;}
.cat-clin{background:var(--clin-bg);color:var(--clin);}
.cat-pay{background:var(--pay-bg);color:var(--pay);}
.cat-care{background:var(--care-bg);color:var(--care);}

.sec{margin-top:14px;}
.sec:first-child{margin-top:4px;}
.sec-t{font-size:13px;font-weight:750;color:var(--ink-dim);margin-bottom:7px;
  display:flex;align-items:center;gap:6px;}
.sec-t::before{content:"";width:3px;height:13px;background:var(--accent);border-radius:2px;}

.kp{list-style:none;margin:0;padding:0;}
.kp li{position:relative;padding:6px 0 6px 18px;font-size:13.5px;color:var(--ink);border-bottom:1px dashed var(--line);}
.kp li:last-child{border-bottom:none;}
.kp li::before{content:"›";position:absolute;left:3px;color:var(--accent);font-weight:800;}
.kp li b{color:var(--accent);}

.note{background:var(--panel2);border-radius:var(--radius-sm);padding:10px 12px;font-size:13px;
  color:var(--ink-dim);margin-top:9px;border-left:3px solid var(--accent);}
.note .nt{font-weight:750;color:var(--ink);font-size:12.5px;margin-bottom:3px;}
.note.why{border-left-color:var(--clin);background:var(--clin-bg);}
.note.why .nt{color:var(--clin);}

.drugmini{border:1px solid var(--line);border-radius:var(--radius-sm);margin-top:8px;overflow:hidden;background:var(--panel);}
.drugmini-h{padding:10px 12px;cursor:pointer;display:flex;align-items:center;gap:9px;}
.drugmini-h .bn{font-weight:750;font-size:14px;}
.drugmini-h .gn{font-size:12px;color:var(--ink-faint);}
.drugmini-h .tg{margin-left:auto;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:14px;background:var(--clin-bg);color:var(--clin);white-space:nowrap;}
.drugmini-h .uctag{font-size:10px;font-weight:800;padding:2px 6px;border-radius:10px;margin-left:4px;}
.drugmini-h .uctag.uc{background:var(--uc-bg);color:var(--uc);}
.drugmini-h .uctag.cd{background:var(--cd-bg);color:var(--cd);}
.drugmini-b{padding:0 12px;max-height:0;overflow:hidden;transition:max-height .01s;font-size:12.5px;color:var(--ink-dim);}
.drugmini.open .drugmini-b{max-height:none;padding:2px 12px 12px;}
.drugmini .row{padding:5px 0;border-top:1px dashed var(--line);}
.drugmini .row .k{font-weight:700;color:var(--ink);font-size:11.5px;display:block;margin-bottom:1px;}
.drugmini .bx{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px;}
.drugmini .bx span{background:var(--panel2);border-radius:10px;padding:2px 8px;font-size:11px;}
.drugmini .warnbox{background:var(--block-bg);color:var(--block);border-radius:7px;padding:6px 9px;margin-top:6px;font-size:11.5px;font-weight:600;}
.drugmini .paybox{background:var(--pay-bg);color:var(--pay);border-radius:7px;padding:6px 9px;margin-top:6px;font-size:11.5px;font-weight:600;}
.drugmini .tiplist{margin:3px 0 0;padding-left:16px;}
.drugmini .tiplist li{font-size:11.5px;color:var(--ink-dim);padding:2px 0;line-height:1.45;}

.badge{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:14px;}
.b-ok{background:var(--ok-bg);color:var(--ok);}
.b-warn{background:var(--warn-bg);color:var(--warn);}
.b-block{background:var(--block-bg);color:var(--block);}
.gaterow{display:flex;align-items:center;gap:9px;padding:9px 11px;border:1px solid var(--line);
  border-radius:var(--radius-sm);margin-top:7px;background:var(--panel);}
.gaterow .gi{font-size:16px;}
.gaterow .gl{flex:1;font-size:13px;font-weight:650;}
.gaterow .gv{font-size:11.5px;color:var(--ink-faint);}
.tracktag{display:inline-block;font-size:10.5px;font-weight:800;padding:2px 8px;border-radius:10px;background:var(--pay-bg);color:var(--pay);margin-bottom:6px;}

.ladder{counter-reset:lad;list-style:none;margin:6px 0 0;padding:0;}
.ladder li{position:relative;padding:9px 0 9px 34px;border-bottom:1px solid var(--line);font-size:13px;}
.ladder li:last-child{border-bottom:none;}
.ladder li::before{counter-increment:lad;content:counter(lad);position:absolute;left:0;top:8px;
  width:24px;height:24px;border-radius:50%;background:var(--accent-bg);color:var(--accent);
  font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;}
.ladder li .lt{font-weight:700;color:var(--ink);}
.ladder li .ld{font-size:11.5px;color:var(--ink-faint);margin-top:2px;}

.codetbl{width:100%;border-collapse:collapse;margin-top:8px;font-size:12.5px;}
.codetbl td{padding:7px 9px;border-bottom:1px solid var(--line);vertical-align:top;}
.codetbl td.c{font-weight:750;color:var(--accent);white-space:nowrap;width:78px;}
.codetbl tr.hot td{background:var(--pay-bg);}

.searchbar{position:relative;margin-bottom:12px;}
.searchbar input{width:100%;border:1.5px solid var(--line);border-radius:var(--radius-sm);
  padding:11px 14px 11px 38px;font-size:14px;background:var(--panel);color:var(--ink);}
.searchbar input:focus{outline:none;border-color:var(--accent);}
.searchbar .si{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--ink-faint);}

.banner{background:linear-gradient(135deg,var(--accent-bg),var(--panel));border:1px solid var(--line);
  border-radius:var(--radius);padding:13px 15px;margin-bottom:13px;font-size:12.5px;color:var(--ink-dim);}
.banner b{color:var(--ink);}

.simnode{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:13px 15px;margin-bottom:10px;box-shadow:var(--shadow);}
.simnode .sq{font-size:14.5px;font-weight:750;margin-bottom:9px;}
.simopt{display:flex;flex-wrap:wrap;gap:7px;}
.simopt button{border:1.5px solid var(--line);background:var(--panel);border-radius:20px;padding:8px 14px;font-size:13px;font-weight:650;color:var(--ink-dim);cursor:pointer;transition:all .18s;}
.simopt button.sel{border-color:var(--accent);background:var(--accent-bg);color:var(--accent);}
.simnext{margin-top:11px;padding-top:11px;border-top:1px dashed var(--line);font-size:13px;color:var(--ink-dim);}
.simhint{font-size:12px;color:var(--ink-dim);background:var(--panel2);border-radius:8px;padding:8px 11px;margin-bottom:10px;line-height:1.5;border-left:3px solid var(--clin);}
.calc-launch{border:1px solid var(--accent);background:var(--accent-bg);color:var(--accent);border-radius:var(--radius-sm);padding:9px 13px;font-size:13px;font-weight:700;cursor:pointer;width:100%;}
.sticky-collect{position:fixed;left:0;right:0;bottom:64px;z-index:30;background:rgba(255,255,255,.97);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-top:1px solid var(--line);
  padding:9px 14px;font-size:12px;color:var(--ink-dim);max-height:140px;overflow-y:auto;}
.sticky-collect b{color:var(--accent);}
.sticky-collect[hidden]{display:none;}

.inpgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px;}
.inpgrid .fld{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius-sm);padding:9px 11px;position:relative;}
.inpgrid .fld.full{grid-column:1/-1;}
.inpgrid .fld label{font-size:11px;font-weight:700;color:var(--ink-faint);display:block;margin-bottom:4px;}
.inpgrid .fld input,.inpgrid .fld select{width:100%;border:none;background:none;font-size:15px;color:var(--ink);padding:2px 0;}
.inpgrid .fld input:focus,.inpgrid .fld select:focus{outline:none;}
.fld-calc{position:absolute;right:8px;top:50%;transform:translateY(-50%);border:1px solid var(--accent);background:var(--accent-bg);color:var(--accent);border-radius:14px;padding:4px 9px;font-size:11px;font-weight:700;cursor:pointer;}
.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chips button{border:1.4px solid var(--line);background:var(--panel);border-radius:18px;padding:6px 12px;font-size:12.5px;font-weight:650;color:var(--ink-dim);cursor:pointer;transition:all .16s;}
.chips button.on{border-color:var(--accent);background:var(--accent-bg);color:var(--accent);}
.runbtn{width:100%;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:750;padding:13px;border-radius:var(--radius-sm);cursor:pointer;margin-bottom:14px;box-shadow:var(--shadow);}
.runbtn:active{opacity:.85;}

.rescard{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:11px;overflow:hidden;}
.rescard .rh{padding:11px 15px;font-weight:750;font-size:14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--line);}
.rescard .rh .ricon{font-size:17px;}
.rescard .rb{padding:13px 15px;}
.rescard.clin .rh{background:var(--clin-bg);color:var(--clin);}
.rescard.pay .rh{background:var(--pay-bg);color:var(--pay);}
.rescard.care .rh{background:var(--care-bg);color:var(--care);}
.optrow{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px dashed var(--line);}
.optrow:last-child{border-bottom:none;}
.optrow .on{font-weight:700;font-size:13.5px;flex:none;}
.optrow .od{font-size:11.5px;color:var(--ink-faint);flex:1;}
.prio{width:22px;height:22px;border-radius:50%;background:var(--accent-bg);color:var(--accent);font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;flex:none;}

.refitem{border:1px solid var(--line);border-radius:var(--radius-sm);margin-top:7px;overflow:hidden;background:var(--clin-bg);cursor:pointer;}
.refhead{padding:9px 11px;display:flex;align-items:center;gap:8px;}
.refgrade{font-size:10.5px;font-weight:800;color:#fff;background:var(--clin);padding:2px 7px;border-radius:10px;white-space:nowrap;flex:none;}
.reftxt{flex:1;font-size:12.5px;font-weight:650;color:var(--ink);line-height:1.4;}
.refchev{color:var(--clin);font-size:14px;flex:none;}
.refbody{max-height:0;overflow:hidden;transition:max-height .01s;padding:0 11px;}
.refitem.open .refbody{max-height:none;padding:0 11px 11px;}
.refsrc{font-size:11.5px;color:var(--clin);font-weight:700;margin-bottom:5px;}
.refdetail{font-size:12px;color:var(--ink-dim);line-height:1.55;}

.calcsrc{font-size:11.5px;color:var(--ink-faint);margin-bottom:8px;}
.calctip{font-size:12px;color:var(--ink-dim);background:var(--panel2);border-radius:8px;padding:8px 11px;margin-bottom:12px;line-height:1.5;border-left:3px solid var(--accent);}
.calcregion{border:1px solid var(--line);border-radius:var(--radius-sm);padding:10px 11px;margin-bottom:10px;background:var(--panel);}
.calcreg-h{font-size:13.5px;font-weight:750;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.calcw{font-size:11px;font-weight:600;color:var(--accent);background:var(--accent-bg);padding:1px 7px;border-radius:10px;}
.calcrow{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;}
.calclab{flex:1;min-width:0;font-size:12px;font-weight:600;color:var(--ink-dim);line-height:1.3;}
.calclab .calcdesc{display:block;font-size:10.5px;color:var(--ink-faint);font-weight:400;margin-top:1px;}
.calcseg{display:flex;gap:3px;flex:none;flex-wrap:wrap;justify-content:flex-end;max-width:60%;}
.calcbtn{min-width:28px;height:30px;padding:0 5px;border:1.3px solid var(--line);background:var(--panel);border-radius:7px;font-size:11.5px;font-weight:700;color:var(--ink-dim);cursor:pointer;transition:all .12s;}
.calcbtn.on{border-color:var(--accent);background:var(--accent);color:#fff;}
.calcnum{flex:none;width:78px;}
.calcnum input{width:100%;border:1.3px solid var(--line);border-radius:7px;padding:6px 8px;font-size:13px;text-align:center;color:var(--ink);}
.calcnum input:focus{outline:none;border-color:var(--accent);}
.calcresult{border:2px solid var(--accent);border-radius:var(--radius);padding:14px;text-align:center;margin:14px 0;background:var(--panel);}
.calcrn{font-size:12px;font-weight:700;color:var(--ink-faint);}
.calcrs{font-size:38px;font-weight:850;line-height:1.1;letter-spacing:-1px;color:var(--ink);}
.calcrb{font-size:14px;font-weight:750;}
.calcrsub{font-size:12px;color:var(--ink-dim);margin-top:4px;}
.calcgate{font-size:12px;font-weight:700;margin-top:8px;padding:7px 10px;border-radius:8px;}
.calcgate.met{background:var(--ok-bg);color:var(--ok);}
.calcgate.unmet{background:var(--warn-bg);color:var(--warn);}
.calcapply{width:100%;border:none;background:var(--accent);color:#fff;font-size:14px;font-weight:750;padding:12px;border-radius:var(--radius-sm);cursor:pointer;margin-top:4px;}

.modal-bg{position:fixed;inset:0;z-index:100;background:rgba(20,30,40,.45);display:flex;align-items:flex-end;justify-content:center;}
.modal-bg[hidden]{display:none;}
.modal{background:var(--bg);width:100%;max-width:760px;max-height:92vh;overflow-y:auto;border-radius:18px 18px 0 0;padding:16px 16px 80px;}
.modal-top{display:flex;align-items:center;gap:10px;margin-bottom:12px;position:sticky;top:-16px;background:var(--bg);padding:8px 0;z-index:2;}
.modal-top .mt{font-size:16px;font-weight:800;flex:1;}
.modal-close{border:none;background:var(--panel2);color:var(--ink-dim);width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer;}

.foot{font-size:11px;color:var(--ink-faint);line-height:1.6;padding:16px 0 8px;border-top:1px solid var(--line);margin-top:18px;}
.foot b{color:var(--ink-dim);}
.foot a{color:var(--clin);}

.tabnav{position:fixed;left:0;right:0;bottom:0;z-index:35;background:var(--panel);border-top:1px solid var(--line);display:flex;max-width:760px;margin:0 auto;box-shadow:0 -2px 12px rgba(20,30,40,.06);}
body{padding-bottom:60px;}

.disclaimer{font-size:11.5px;color:var(--alert);background:var(--block-bg);border-radius:8px;padding:8px 11px;margin-bottom:12px;font-weight:600;border-left:3px solid var(--alert);}
</style>
</head>
<body>
<div class="appbar">
  <div class="appbar-in">
    <div class="title-row">
      <span class="dot" id="appDot"></span>
      <h1 id="htitle">IBD 통합 가이드</h1>
      <span class="sub">조언자 · 근거기반</span>
    </div>
    <div class="disease-toggle" id="diseaseToggle">
      <button data-d="uc" class="on"><span class="ic">🟦</span>궤양성대장염</button>
      <button data-d="cd"><span class="ic">🟥</span>크론병</button>
    </div>
    <div class="tabbar" id="tabbar">
      <button data-tab="library" class="on"><span class="ic">📚</span>도서관</button>
      <button data-tab="sim"><span class="ic">🧭</span>시뮬레이션</button>
      <button data-tab="flow"><span class="ic">⚡</span>플로우</button>
      <button data-tab="calc"><span class="ic">🧮</span>계산기</button>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="view" id="view-library"></div>
  <div class="view" id="view-sim" hidden></div>
  <div class="view" id="view-flow" hidden></div>
  <div class="view" id="view-calc" hidden></div>
</div>

<div class="sticky-collect" id="simCollect" hidden></div>

<nav class="tabnav" id="bottomnav"></nav>

<div class="modal-bg" id="modal" hidden onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-top"><span class="mt" id="modalTitle"></span><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
/* ============================================================
   ibd_data.js — IBD 통합 가이드 데이터 레이어 (Single Source of Truth)
   궤양성대장염(UC, K51) · 크론병(CD, K50)
   ID: drug:<성분> / class:<계열> / lab:<지표> / uc:* cd:* ibd:*
   ES5(var), 외부 의존성 0, 문자열 concat
   근거: KASID UC/CD 치료 가이드라인 2차 개정판 + 중등도-중증 생물학제제/소분자 CPG(2023),
        STRIDE-II, 보건복지부 IBD 생물학제제 급여 고시
   ============================================================ */

var STATE = { disease:"uc", tab:"library", openCards:{}, openDrugs:{}, openRefs:{} };

/* ====================== 계열 ====================== */

function bandOf(bands,s){ for(var i=0;i<bands.length;i++){ if(s<=bands[i].max) return bands[i]; } return bands[bands.length-1]; }

function calcCDAI(inp){
  inp=inp||{};
  var stool=num(inp.stool)*2;
  var pain=num(inp.pain)*5;
  var gen=num(inp.general)*7;
  var comp=num(inp.comp)*20;
  var anti=num(inp.antidiar)*30;
  var mass=num(inp.mass)*10;
  // Hct: 남 기준 47, 여 42 → (기준-실측), 음수 0 처리는 안 함(편차 그대로 ×6)
  var sex=inp.sex||"m"; var hctRef=(sex==="f")?42:47;
  var hctDev=(inp.hct!==undefined && inp.hct!=="")?(hctRef-num(inp.hct)):0;
  var hct=hctDev*6;
  // 체중: 표준체중 대비 % 부족. wtPct = 100*(1 - 실제/표준)
  var wtPct=0;
  if(inp.weight!==undefined && inp.weight!=="" && inp.stdweight!==undefined && inp.stdweight!=="" && num(inp.stdweight)>0){
    wtPct=100*(1 - num(inp.weight)/num(inp.stdweight));
  }
  var wt=wtPct*1;
  var total=stool+pain+gen+comp+anti+mass+hct+wt;
  total=Math.round(total*10)/10;
  return { score:total, parts:{stool:stool,pain:pain,gen:gen,comp:comp,anti:anti,mass:mass,hct:Math.round(hct*10)/10,wt:Math.round(wt*10)/10},
    band:bandOf(CALC_CDAI.bands,total), gate:CALC_CDAI.gate, gateMet:(total>=CALC_CDAI.gate) };
}

/* UC 게이트 평가: input.checks(객체) + sevMet(bool) → {ok, trackA, trackB, trackC, rows[]} */
function ucGateEval(c, sevMet){
  c=c||{};
  var A = c.a_dose && c.a_dur && c.a_fail;
  var Adep = c.a_fail; // 의존성만으로도 일부 인정 — 보수적으론 A 전체
  var B = c.b_dur && c.b_fail;
  var C = c.c_nudt15 || c.c_myelo || c.c_panc;
  var pre = A && (B || C);
  var ok = pre && sevMet;
  return { ok:ok, A:A, B:B, C:C, pre:pre, sevMet:sevMet };
}

/* CD 게이트 평가: input.checks + cdai 값 */
function cdGateEval(c, cdaiVal){
  c=c||{};
  var steroid = c.l_steroid || c.l_budeso;
  var immuno  = c.l_immuno  || c.l_mtx;
  var cdaiMet = (cdaiVal!=null && cdaiVal>=220);
  var luminal = steroid && immuno && cdaiMet;
  var fistula = c.f_active && c.f_conv;
  var ok = luminal || fistula;
  return { ok:ok, luminal:luminal, fistula:fistula, steroid:steroid, immuno:immuno, cdaiMet:cdaiMet };
}

<script>
/* ============================================================
   ibd_ui.js — UI 렌더링 레이어
   데이터/엔진(ibd_data.js, ibd_content.js)을 ID 참조로 그림.
   ES5(var), 외부 의존성 0.
   ============================================================ */

var DISEASE_META = {
  uc:{ label:"궤양성대장염", accent:"var(--uc)", accentBg:"var(--uc-bg)", hex:"#2c6fb0", bg:"#e4eef8" },
  cd:{ label:"크론병",       accent:"var(--cd)", accentBg:"var(--cd-bg)", hex:"#c0533a", bg:"#f7e7e1" }
};
var CAT_META = {
  clin:{ cls:"cat-clin", label:"임상" },
  pay:{ cls:"cat-pay", label:"급여" },
  care:{ cls:"cat-care", label:"관리" }
};
var USE_BADGE = {
  primary:{ t:"◎", c:"y" }, option:{ t:"○", c:"y" }, minor:{ t:"△", c:"y" }, no:{ t:"✕", c:"n" }
};

var SIM = { started:false, disease:null, path:[], answers:{}, collected:[] };
var FLOW = { uc:{}, cd:{} };
var CALCVAL = {};       /* per-calc input store */
var CALC_CB = null;     /* injection callback when calc opened from sim/flow */
var CALC_TARGET = null; /* which calc currently in modal */

function esc(s){ return (""+s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function qs(id){ return document.getElementById(id); }

/* ---------- 부팅 ---------- */
function boot(){
  renderBottomNav();
  applyDisease(STATE.disease);
  wireHeader();
  renderAll();
}
function wireHeader(){
  var dt=qs("diseaseToggle");
  dt.addEventListener("click",function(e){ var b=e.target.closest("button"); if(b) setDisease(b.getAttribute("data-d")); });
  qs("tabbar").addEventListener("click",function(e){ var b=e.target.closest("button"); if(b) setTab(b.getAttribute("data-tab")); });
}
function renderBottomNav(){
  var tabs=[["library","📚","도서관"],["sim","🧭","시뮬"],["flow","⚡","플로우"],["calc","🧮","계산기"]];
  var h="";
  for(var i=0;i<tabs.length;i++){
    h+='<button data-tab="'+tabs[i][0]+'" style="flex:1;border:none;background:none;padding:9px 2px 11px;font-size:11px;font-weight:700;color:var(--ink-faint);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px"><span style="font-size:18px">'+tabs[i][1]+'</span>'+tabs[i][2]+'</button>';
  }
  var bn=qs("bottomnav"); bn.innerHTML=h;
  bn.addEventListener("click",function(e){ var b=e.target.closest("button"); if(b) setTab(b.getAttribute("data-tab")); });
}

/* ---------- 질환/탭 전환 ---------- */
function applyDisease(d){
  var m=DISEASE_META[d];
  document.documentElement.style.setProperty("--accent", m.accent);
  document.documentElement.style.setProperty("--accent-bg", m.accentBg);
  qs("htitle").textContent = m.label+" 가이드";
  var btns=qs("diseaseToggle").querySelectorAll("button");
  for(var i=0;i<btns.length;i++){ btns[i].className=(btns[i].getAttribute("data-d")===d)?"on":""; }
}
function setDisease(d){
  if(STATE.disease===d) return;
  STATE.disease=d; applyDisease(d);
  SIM.started=false;
  renderAll();
  window.scrollTo(0,0);
}
function setTab(t){
  STATE.tab=t;
  var ids=["library","sim","flow","calc"];
  for(var i=0;i<ids.length;i++){ qs("view-"+ids[i]).hidden=(ids[i]!==t); }
  var top=qs("tabbar").querySelectorAll("button");
  for(var j=0;j<top.length;j++){ top[j].className=(top[j].getAttribute("data-tab")===t)?"on":""; }
  var bot=qs("bottomnav").querySelectorAll("button");
  for(var k=0;k<bot.length;k++){ bot[k].style.color=(bot[k].getAttribute("data-tab")===t)?"var(--accent)":"var(--ink-faint)"; }
  qs("simCollect").hidden=!(t==="sim" && SIM.collected.length);
  window.scrollTo(0,0);
}
function renderAll(){
  renderLibrary(); renderSim(); renderFlow(); renderCalc();
  setTab(STATE.tab);
}

/* ============================================================
   도서관
   ============================================================ */
function renderLibrary(){
  var lib=LIBRARY_REGISTRY[STATE.disease];
  var m=DISEASE_META[STATE.disease];
  var h='';
  h+='<div class="banner"><b>'+m.label+' 통합 가이드</b> — 임상(파랑)·급여(주황)·관리(초록) 3레이어. 카드를 탭하면 펼쳐지고, 약물·근거는 클릭하면 상세가 나옵니다. <b>조언자 역할이며 처방을 강제하지 않습니다.</b></div>';
  h+='<div class="searchbar"><span class="si">🔍</span><input id="libSearch" type="text" placeholder="약물·상황 검색 (예: 누공, 티오퓨린, 게이트)" oninput="filterLib()"></div>';
  h+='<div id="libGrid">';
  for(var i=0;i<lib.length;i++){ h+=renderTopicCard(lib[i]); }
  h+='</div>';
  h+=renderFoot();
  qs("view-library").innerHTML=h;
}
function filterLib(){
  var q=(qs("libSearch").value||"").toLowerCase().replace(/\s/g,"");
  var lib=LIBRARY_REGISTRY[STATE.disease];
  var h="";
  for(var i=0;i<lib.length;i++){
    var t=lib[i]; var blob=(t.title+t.lead+JSON.stringify(t.sections)).toLowerCase().replace(/\s/g,"");
    if(!q || blob.indexOf(q)>=0){ h+=renderTopicCard(t); }
  }
  qs("libGrid").innerHTML=h || '<div class="note">검색 결과가 없습니다.</div>';
}
function renderTopicCard(t){
  var cat=CAT_META[t.cat]||CAT_META.clin;
  var open=STATE.openCards[t.id]?" open":"";
  var h='<div class="card'+open+'" id="card_'+t.id+'">';
  h+='<div class="card-head" onclick="toggleCard(\''+t.id+'\')">';
  h+='<span class="icon">'+t.icon+'</span><div class="ht"><div class="t">'+esc(t.title)+'<span class="cat-tag '+cat.cls+'">'+cat.label+'</span></div><div class="l">'+esc(t.lead)+'</div></div><span class="chev">›</span></div>';
  h+='<div class="card-body">';
  for(var i=0;i<t.sections.length;i++){ h+=renderSection(t.sections[i], t.id, i); }
  h+='</div></div>';
  return h;
}
function toggleCard(id){
  STATE.openCards[id]=!STATE.openCards[id];
  var c=qs("card_"+id); if(c) c.className="card"+(STATE.openCards[id]?" open":"");
}
function renderSection(s, cid, si){
  var h='<div class="sec"><div class="sec-t">'+esc(s.title||"")+'</div>';
  switch(s.type){
    case "keypoints":
      h+='<ul class="kp">';
      for(var i=0;i<s.items.length;i++){ h+='<li>'+boldStar(s.items[i])+'</li>'; }
      h+='</ul>'; break;
    case "note":
      h+='<div class="note'+(s.why?" why":"")+'"><div class="nt">'+(s.why?"왜 그런가 · ":"")+esc(s.title)+'</div>'+boldStar(s.body)+'</div>'; break;
    case "drugcards":
      h+=renderDrugCards(s.drugs); break;
    case "gate":
      h+=renderGate(s.ref); break;
    case "calcband":
      h+=renderCalcBand(s.calc); break;
    case "ladder":
      h+=renderLadderSteps(s.steps); break;
    case "codetable":
      h+=renderCodeTable(s.rows); break;
    case "refs":
      h+=renderRefs(s.items); break;
    case "precheck": h+=renderRows(IBD_PRECHECK,true); break;
    case "sanjeong": h+=renderRows(IBD_SANJEONG,false); break;
    case "switch":   h+=renderRows(IBD_SWITCH,false); break;
    case "t2t":      h+=renderRows(IBD_T2T,false); break;
    default: h+='<div class="note">'+esc(JSON.stringify(s))+'</div>';
  }
  h+='</div>'; return h;
}
function boldStar(s){ s=esc(s); s=s.replace(/★/g,'<b>★</b>'); return s; }

/* ---- 약물 카드 ---- */
function renderDrugCards(ids){
  var h="";
  for(var i=0;i<ids.length;i++){
    var d=DRUG_DB[ids[i]]; if(!d) continue;
    var open=STATE.openDrugs[ids[i]]?" open":"";
    var ub=USE_BADGE[d.useUC]||USE_BADGE.no, cb=USE_BADGE[d.useCD]||USE_BADGE.no;
    h+='<div class="drugmini'+open+'" id="drug_'+ids[i].replace(/[:]/g,"_")+'">';
    h+='<div class="drugmini-h" onclick="toggleDrug(\''+ids[i]+'\')">';
    h+='<span class="bn">'+esc(d.name)+'</span><span class="gn">'+esc(d.brand)+'</span>';
    h+='<span class="uctag"><span class="uc-y" title="UC">UC '+ub.t+'</span><span class="cd-y" title="CD">CD '+cb.t+'</span></span></div>';
    h+='<div class="drugmini-b">';
    h+=drow("표적·계열", esc(d.target)+' / '+(DRUG_CLASS[d.cls]?DRUG_CLASS[d.cls].label:""));
    h+=drow("기전", esc(d.moa));
    h+=drow("투여경로", esc(d.route));
    if(d.induction) h+=drow("유도", esc(d.induction));
    if(d.maintenance) h+=drow("유지", esc(d.maintenance));
    if(d.dose) h+=drow("용량", boldStar(d.dose));
    if(d.pearls) h+=drowList("핵심", d.pearls);
    if(d.tips) h+=drowTips("실전 팁", d.tips);
    if(d.ae) h+=drowChips("부작용", d.ae);
    if(d.contra) h+=drowChips("금기", d.contra);
    if(d.monitor) h+=drowChips("모니터링", d.monitor);
    if(d.boxedWarning) h+='<div class="warnbox">⚠ '+esc(d.boxedWarning)+'</div>';
    if(d.kr_reimb) h+=drow("급여", boldStar(d.kr_reimb));
    h+='</div></div>';
  }
  return h;

function simAnswer(nodeId,ans){
  SIM.answers[nodeId]=ans;
  var n=simNode(nodeId);
  var idx=SIM.path.indexOf(nodeId);
  SIM.path=SIM.path.slice(0,idx+1);
  var nx=n.next?n.next(ans):null;
  if(nx && SIM.path.indexOf(nx)<0){ SIM.path.push(nx); }
  recomputeCollect();
  renderSimStream();
}
function recomputeCollect(){
  SIM.collected=[];
  for(var i=0;i<SIM.path.length;i++){
    var n=simNode(SIM.path[i]); if(!n) continue;
    if(n.info && n.collect) SIM.collected.push(n.collect);
    if(n.collectFn && SIM.answers[n.id]){ var c=n.collectFn(SIM.answers[n.id]); if(c) SIM.collected.push(c); }
  }
}

function runUCFlow(){

  var has=function(arr,x){ for(var i=0;i<arr.length;i++) if(arr[i]===x) return true; return false; };
  var mayo=valNum("uf_mayo");
  var sevMet=(mayo!=null && mayo>=6);
  if(has(axes,"asuc")) sevMet=true;
  var c={ a_dose:has(g,"a_all"), a_dur:has(g,"a_all"), a_fail:has(g,"a_all"),
          b_dur:has(g,"b_fail"), b_fail:has(g,"b_fail"),
          c_nudt15:has(g,"c_contra") };
  var ev=ucGateEval(c, sevMet);
  var rows=[
    {ok:sevMet,label:"중등도-중증 활성 (Mayo≥6 또는 ASUC)",val:mayo!=null?("Mayo "+mayo):(has(axes,"asuc")?"ASUC":"입력")},
    {ok:ev.A,label:"A트랙: 스테로이드 불응/의존",val:ev.A?"✅":"⬜"},
    {ok:ev.B,label:"B트랙: 티오퓨린 ≥3개월 실패",val:ev.B?"✅":"⬜"},
    {ok:ev.C,label:"C트랙: 금기(NUDT15 등)·내약불가",val:ev.C?"✅":"⬜"}
  ];
  var reasons=[];
  if(!sevMet) reasons.push("중등도-중증 활성도 근거 필요");
  if(!ev.A) reasons.push("A트랙(스테로이드 불응/의존) 필요");
  if(!(ev.B||ev.C)) reasons.push("B(티오퓨린 실패) 또는 C(금기) 필요");
  if(ev.C && !ev.B) reasons.push("✔ 금기로 티오퓨린 사전치료 면제 적용");
  drawFlowResult("uf_result", ev.ok, rows, reasons, pre, "uc", axes, false);
}

function runCDFlow(){
  var form=chipsOn("cf_form"), lum=chipsOn("cf_lum"), fis=chipsOn("cf_fis"), pre=chipsOn("cf_pre"), axes=chipsOn("cf_axis");
  var has=function(arr,x){ for(var i=0;i<arr.length;i++) if(arr[i]===x) return true; return false; };
  var cdai=valNum("cf_cdai");
  var fistula=has(form,"fistula");
  if(fistula && !has(axes,"fistula")) axes=axes.concat(["fistula"]);
  var c={ l_steroid:has(lum,"s_fail"), l_immuno:has(lum,"i_fail"),
          f_active:fistula, f_conv:has(fis,"f_conv") };
  var ev=cdGateEval(c, cdai);
  var rows=[];
  if(ev.fistula || c.f_active){
    rows.push({ok:true,label:"누공형 — CDAI≥220 면제(별도트랙)",val:"별도"});
    rows.push({ok:ev.fistula,label:"항생제·배농·면역억제 中 2 실패",val:ev.fistula?"✅":"⬜"});
  }
  rows.push({ok:ev.steroid,label:"관강형 ①스테로이드 실패",val:ev.steroid?"✅":"⬜"});
  rows.push({ok:ev.immuno,label:"관강형 ②면역억제제(티오퓨린/MTX) 실패",val:ev.immuno?"✅":"⬜"});
  rows.push({ok:ev.cdaiMet,label:"CDAI ≥220",val:cdai!=null?cdai:"입력"});
  var reasons=[];
  if(c.f_active && !ev.fistula) reasons.push("누공형: 보편치료(항생제·배농·면역억제 中 2) 실패 서류 필요 — ★자동통과 아님(삭감방어)");
  if(ev.fistula) reasons.push("✔ 누공형 별도트랙 충족 → anti-TNF 1차 유도 인정");
  if(!ev.fistula && !ev.luminal){
    if(!ev.steroid) reasons.push("①스테로이드 실패 필요");
    if(!ev.immuno) reasons.push("②면역억제제(티오퓨린/MTX) 실패 필요 (★5-ASA 제외)");
    if(!ev.cdaiMet) reasons.push("CDAI ≥220 필요");
  }
  if(ev.luminal) reasons.push("✔ 관강형 게이트 ①②③ 충족");
  drawFlowResult("cf_result", ev.ok, rows, reasons, pre, "cd", axes, fistula);
}

function reimbBadge(id, disease){

  var map={ primary:["1차급","b-ok"], option:["급여옵션","b-ok"], minor:["제한","b-warn"], no:["비적응","b-block"] };
  var m=map[use]||map.no;
  return '<span class="badge '+m[1]+'">'+m[0]+'</span>';

function recommendAdvanced(disease, axes, fistula){
  var opts=ADVANCED_OPTIONS[disease], scored=[];
  for(var i=0;i<opts.length;i++){
    var o=opts[i], score=0, hits=[];
    for(var a=0;a<axes.length;a++){
      var ax=axes[a];
      if(o.tags && o.tags.indexOf(ax)>=0){ score+=2; hits.push(ax); }
      if(o.avoid && o.avoid.indexOf(ax)>=0){ score-=3; }
    }
    if(disease==="cd" && fistula && o.tags.indexOf("fistula")>=0) score+=6;
    scored.push({o:o, score:score, hits:hits, order:i});
  }
  scored.sort(function(x,y){ return (y.score-x.score)||(x.order-y.order); });
  return scored;
}
function axisLabel(disease, k){ var ax=FLOW_AXIS[disease]; for(var i=0;i<ax.length;i++){ if(ax[i].k===k) return ax[i].label; } return k; }

function renderAdvancedCard(disease, axes, fistula, locked, pendingReasons){
  var rec=recommendAdvanced(disease, axes, fistula);
  var h='<div class="rescard clin"><div class="rh"><span class="ricon">'+(locked?'🔓':'💉')+'</span>'+(locked?'게이트 열면 가능한 생물학제제 · 미리보기':'다음 약물 — 우선순위 추천')+'</div><div class="rb">';
  if(locked){
    h+='<div class="note" style="border-left-color:var(--warn);margin-top:0"><b>아래 후보는 게이트 충족 시 급여로 열립니다</b> — 정보·우선순위는 지금 미리 확인하세요.';
    if(pendingReasons && pendingReasons.length){ var ps=[]; for(var z=0;z<pendingReasons.length;z++) ps.push(esc(pendingReasons[z])); h+='<br>🔑 지금 채울 것: <b>'+ps.join(' · ')+'</b>'; }
    h+='</div>';
  } else {
    h+='<div class="calcreg-d" style="margin-bottom:8px">'+(axes.length?'선택한 환자 특성('+axes.length+')에 맞춰 정렬':'환자 특성을 선택하면 우선순위가 재정렬됩니다 — 현재는 가이드라인 기본순')+'. 시퀀싱 고정보다 환자맞춤(내시경·중증도·이력·동반)이 표준.</div>';
  }
  for(var i=0;i<rec.length;i++){
    var o=rec[i].o, dd=DRUG_DB[o.drug];
    var hl=(i===0 && (axes.length||fistula));
    h+='<div class="optrow" style="align-items:flex-start'+(hl?';background:var(--clin-bg);margin:0 -8px;padding:9px 8px;border-radius:8px':'')+(locked?';opacity:.94':'')+'">';
    h+='<span class="prio">'+(i+1)+'</span>';
    h+='<div style="flex:1;min-width:0">';
    h+='<div><span class="on">'+esc(dd.name)+'</span> <span class="od">'+esc(o.line)+' · '+esc(dd.brand)+'</span> '+reimbBadge(o.drug, disease)+(locked?' <span class="badge b-warn">게이트 필요</span>':'')+'</div>';
    h+='<div style="font-size:12px;color:var(--ink-dim);margin-top:3px;line-height:1.45">'+boldStar(o.note)+'</div>';
    if(rec[i].hits.length){ var tg=""; for(var t=0;t<rec[i].hits.length;t++){ tg+='<span style="font-size:10.5px;background:var(--clin-bg);color:var(--clin);padding:1px 7px;border-radius:10px;margin-right:3px">'+esc(axisLabel(disease,rec[i].hits[t]))+'</span>'; } h+='<div style="margin-top:5px">'+tg+'</div>'; }
    h+='<div style="font-size:11px;color:var(--clin);margin-top:4px">근거: '+esc(REFS[o.ref]?REFS[o.ref].src:o.ref)+'</div>';
    h+='</div></div>';
  }
  h+='<div class="note" style="margin-top:9px">'+(locked?'게이트(사전치료·활성도·서류)를 채우면 위 후보가 급여로 진입합니다. 그 전에도 임상적으로 필요하면 후보를 미리 검토·준비하세요.':'병용·유지: anti-TNF는 면역원성 관리 위해 티오퓨린 병용·TDM 고려. 유지 도달 후 STRIDE-II(내시경 치유) 목표로 재평가.')+' <b>최종 선택·비용 동의는 환자와 함께.</b></div>';
  h+='</div></div>';
  return h;
}
function renderPendingCard(disease){
  var p=PENDING_ACTION[disease];
  var h='<div class="rescard clin"><div class="rh"><span class="ricon">🧭</span>지금 무엇을 — 다음 행동</div><div class="rb">';
  h+='<div class="sec-t" style="margin-bottom:6px">지금 할 치료 (게이트 충족 전)</div><ul class="kp">';
  for(var i=0;i<p.nowDoing.length;i++){ h+='<li>'+boldStar(p.nowDoing[i])+'</li>'; }
  h+='</ul>';
  h+='<div class="sec-t" style="margin:11px 0 6px">게이트를 열려면 채울 항목</div><ul class="kp">';
  for(var j=0;j<p.toOpenGate.length;j++){ h+='<li>'+boldStar(p.toOpenGate[j])+'</li>'; }
  h+='</ul>';
  h+='<div class="note" style="margin-top:9px">위 사전치료를 진행하는 것 자체가 곧 게이트 서류가 됩니다 — <b>치료하면서 근거를 남기면 다음 문이 열립니다.</b></div>';
  h+='</div></div>';
  return h;
}

function drawFlowResult(targetId, ok, rows, reasons, pre, disease, axes, fistula){
  axes=axes||[];
  var has=function(arr,x){ for(var i=0;i<arr.length;i++) if(arr[i]===x) return true; return false; };
  var h='';
  /* 급여 카드 */
  h+='<div class="rescard pay"><div class="rh"><span class="ricon">💳</span>급여 게이트 · R-CHECK</div><div class="rb">';
  for(var i=0;i<rows.length;i++){ h+='<div class="gaterow"><span class="gi">'+(rows[i].ok?"✅":"⬜")+'</span><div class="gl">'+boldStar(rows[i].label)+'</div><span class="gv">'+esc(rows[i].val)+'</span></div>'; }
  h+='<div class="note" style="margin-top:9px;border-left-color:'+(ok?"var(--ok)":"var(--warn)")+'">'+
     (ok?'<b>게이트 충족</b> → 생물학제제·소분자 급여 가능 (산정특례 '+(disease==="uc"?"K51":"K50")+', 본인부담 10%).':'<b>게이트 미충족 항목 있음</b> — 아래 "다음 행동"으로 진행 (조언자: 강제 아님).')+'</div>';
  if(reasons.length){ h+='<ul class="kp" style="margin-top:6px">'; for(var r=0;r<reasons.length;r++){ h+='<li>'+boldStar(reasons[r])+'</li>'; } h+='</ul>'; }
  h+='</div></div>';
  /* 충족 → 약물 우선순위(급여 가능) / 미충족 → 다음 행동 + 생물학제제 미리보기(잠금) */
  if(ok){ h+=renderAdvancedCard(disease, axes, fistula, false); }
  else {
    h+=renderPendingCard(disease);
    var pr=[]; for(var pi=0;pi<rows.length;pi++){ if(!rows[pi].ok) pr.push(rows[pi].label); }
    h+=renderAdvancedCard(disease, axes, fistula, true, pr);
  }
  /* 관리 카드 */
  h+='<div class="rescard care"><div class="rh"><span class="ricon">🔬</span>투여 전 점검 · 관리</div><div class="rb">';
  h+='<div class="gaterow"><span class="gi">'+(has(pre,"tb")?"✅":"⬜")+'</span><div class="gl">결핵(IGRA/CXR) — ★anti-TNF 전 필수</div></div>';
  h+='<div class="gaterow"><span class="gi">'+(has(pre,"hbv")?"✅":"⬜")+'</span><div class="gl">HBV 선별·재활성 예방</div></div>';
  if(has(pre,"elderly")||has(pre,"highrisk")||has(axes,"safe")) h+='<div class="note">안전성 우선 — JAK 신중(대상포진·혈전·MACE), vedolizumab/ustekinumab 선호'+(disease==="cd"&&has(pre,"highrisk")?". 고위험 CD는 조기 top-down 고려":"")+'</div>';
  if(has(axes,"preg")) h+='<div class="note" style="border-left-color:var(--block)">임신/가임 — ★JAK·S1P·MTX 금기. vedolizumab·anti-TNF가 상대적 안전(약제별 시기·중단 프로토콜 확인).</div>';
  h+='<div class="note"><div class="nt">반응 평가</div>'+(disease==="uc"?"8~14주 Mayo/내시경 → 점막치유(MES≤1) 목표.":"누공없음=2주 내 CDAI 70↓/25%↓, 누공형=3회 후 누공 50%↓ (고시 유지 인정).")+'</div>';
  h+='</div></div>';
  qs(targetId).innerHTML=h;
}

/* ============================================================
   계산기 탭 + 모달 (자동 계산)
   ============================================================ */
function renderCalc(){
  var list = (STATE.disease==="uc") ? ["mayo","pmayo","uceis","tw"] : ["cdai","hbi"];
  var m=DISEASE_META[STATE.disease];
  var h='<div class="banner"><b>'+m.label+' 점수 계산기</b> — 클릭 입력 → <b>실시간 자동 합산·밴드·급여게이트</b> 판정. 결과는 플로우/시뮬에 적용할 수 있습니다.</div>';
  for(var i=0;i<list.length;i++){
    var c=CALC_REGISTRY[list[i]];
    h+='<div class="card open"><div class="card-head" style="cursor:default"><span class="icon">🧮</span><div class="ht"><div class="t">'+esc(c.label)+' <span style="font-size:11px;color:var(--ink-faint)">'+esc(c.range)+'</span></div><div class="l">'+esc(c.src)+'</div></div></div>';
    h+='<div class="card-body" style="max-height:none;padding:0 15px 15px"><button class="calc-launch" onclick="openCalc(\''+list[i]+'\')">계산기 열기 →</button></div></div>';
  }
  h+=renderFoot();
  qs("view-calc").innerHTML=h;
}

function openCalc(id, cb){
  CALC_TARGET=id; CALC_CB=cb||null;
  if(!CALCVAL[id]) CALCVAL[id]={};
  var c=CALC_REGISTRY[id];
  qs("modalTitle").textContent=c.label;
  qs("modalBody").innerHTML=buildCalcUI(id);
  qs("modal").hidden=false;
  recalc(id);
}
function closeModal(){ qs("modal").hidden=true; CALC_TARGET=null; CALC_CB=null; }

function buildCalcUI(id){
  var c=CALC_REGISTRY[id];
  var h='<div class="calctip">'+boldStar(c.tip)+'</div>';
  /* CDAI 성별 토글(Hct 기준) */
  if(id==="cdai"){
    var sex=CALCVAL[id].sex||"m";
    h+='<div class="calcregion"><div class="calcreg-h">성별 (Hct 기준)</div><div class="calcseg">'+
       '<button class="calcbtn'+(sex==="m"?" on":"")+'" onclick="setSex(\'m\')">남(47)</button>'+
       '<button class="calcbtn'+(sex==="f"?" on":"")+'" onclick="setSex(\'f\')">여(42)</button></div></div>';
  }
  for(var i=0;i<c.items.length;i++){
    var it=c.items[i];
    h+='<div class="calcregion"><div class="calcreg-h">'+esc(it.label)+'</div>';
    if(it.desc) h+='<div class="calcreg-d">'+esc(it.desc)+'</div>';
    if(it.opts){
      h+='<div class="calcseg">';
      for(var o=0;o<it.opts.length;o++){
        var sel=(CALCVAL[id][it.key]===it.opts[o].v)?" on":"";
        h+='<button class="calcbtn'+sel+'" onclick="setSeg(\''+id+'\',\''+it.key+'\','+it.opts[o].v+')">'+esc(it.opts[o].l)+'</button>';
      }
      h+='</div>';
    } else if(it.type==="wt"){
      h+='<div class="calcnum"><input type="number" inputmode="decimal" placeholder="실제체중(kg)" value="'+(CALCVAL[id].weight||"")+'" oninput="setNum(\''+id+'\',\'weight\',this.value)"><input type="number" inputmode="decimal" placeholder="표준체중(kg)" value="'+(CALCVAL[id].stdweight||"")+'" oninput="setNum(\''+id+'\',\'stdweight\',this.value)"></div>';
    } else {
      var key=(it.type==="hct")?"hct":it.key;
      h+='<div class="calcnum"><input type="number" inputmode="decimal" placeholder="'+(it.ph||"값")+'" value="'+(CALCVAL[id][key]||"")+'" oninput="setNum(\''+id+'\',\''+key+'\',this.value)"></div>';
    }
    h+='</div>';
  }
  h+='<div class="calcresult" id="calcResult"></div>';
  return h;
}
function setSeg(id,key,v){ CALCVAL[id][key]=v; recalc(id); rebuildSegs(id); }
function setNum(id,key,v){ CALCVAL[id][key]=v; recalc(id); }
function setSex(s){ CALCVAL[CALC_TARGET].sex=s; recalc(CALC_TARGET); rebuildSegs(CALC_TARGET); }
function rebuildSegs(id){
  /* re-render to reflect selected segments (cheap full rebuild keeps inputs) */
  var body=qs("modalBody");
  /* preserve focus is hard; only rebuild segment 'on' classes */
  var btns=body.querySelectorAll(".calcbtn"); /* recolor handled by recalc via rebuild */
  qs("modalBody").innerHTML=buildCalcUI(id);
  recalc(id);
}

function recalc(id){
  var res;
  if(id==="mayo") res=calcMayo(CALCVAL[id]);
  else if(id==="pmayo") res=calcPMayo(CALCVAL[id]);
  else if(id==="uceis") res=calcUceis(CALCVAL[id]);
  else if(id==="tw") res=calcTW(CALCVAL[id]);
  else if(id==="cdai") res=calcCDAI(CALCVAL[id]);
  else if(id==="hbi") res=calcHBI(CALCVAL[id]);
  var box=qs("calcResult"); if(!box) return;
  var h='';
  if(id==="tw"){
    var col=res.asuc?"var(--block)":"var(--ok)";
    h+='<div class="calcrn">판정</div><div class="calcrs" style="color:'+col+'">'+(res.asuc?"ASUC":"비ASUC")+'</div>';
    h+='<div class="calcrsub">'+(res.asuc?"★급성중증 — 입원·IV스테로이드·CMV/C.difficile 점검":"급성중증 기준 미충족 (전신독성 "+res.systemic+"/4)")+'</div>';
  } else {
    var b=res.band, col2=b.color==="block"?"var(--block)":b.color==="warn"?"var(--warn)":"var(--ok)";
    h+='<div class="calcrn">'+esc(CALC_REGISTRY[id].label)+'</div><div class="calcrs" style="color:'+col2+'">'+res.score+'</div>';
    h+='<div class="calcrb" style="color:'+col2+'">'+esc(b.label)+(b.note?' · '+esc(b.note):'')+'</div>';
    if(typeof res.gate!=="undefined" && res.gate!==null){
      h+='<div class="calcgate '+(res.gateMet?"met":"unmet")+'">급여게이트('+CALC_REGISTRY[id].label+' ≥'+res.gate+'): '+(res.gateMet?"충족 ✅":"미충족")+'</div>';
    }
    if(id==="cdai" && res.parts){
      h+='<div class="calcrsub">①변'+res.parts.stool+' ②통'+res.parts.pain+' ③상태'+res.parts.gen+' ④합병증'+res.parts.comp+' ⑤지사'+res.parts.anti+' ⑥종괴'+res.parts.mass+' ⑦Hct'+res.parts.hct+' ⑧체중'+res.parts.wt+'</div>';
    }
  }
  if(CALC_CB && id!=="tw"){
    h+='<button class="calcapply" onclick="applyCalc('+(res.score||0)+')">이 점수를 플로우에 적용 →</button>';
  }
  box.innerHTML=h;
}
function applyCalc(score){ if(CALC_CB){ CALC_CB(score); } closeModal(); }

/* ---------- 푸터 ---------- */
function renderFoot(){
  return '<div class="foot">'+
    '<b>출처</b> · 대한장연구학회(KASID) UC/CD 치료 가이드라인 2차 개정판 + 중등도-중증 생물학제제·소분자 CPG(2023) · STRIDE-II · 보건복지부 IBD 생물학제제 급여 고시(제2025-200호 등) · KCD 한국표준질병사인분류<br><br>'+
    '★ 급여기준·약가·산정특례 V코드·발효일·교체 인정범위는 변동되므로 처방·청구 시 <b>최신 고시(심평원)·허가사항 확인</b> 권장. 누공형 CD는 "자동통과"가 아니라 누공 보편치료 실패 서류가 필요(삭감 방어).<br><br>'+
    '<b>본 도구는 임상 판단 보조(조언자)이며 최종 처방·결정·비용 동의는 처방의·환자의 책임입니다.</b></div>';
}

/* ---------- 시작 ---------- */
if(document.readyState==="loading"){ document.addEventListener("DOMContentLoaded", boot); } else { boot(); }

</script>
