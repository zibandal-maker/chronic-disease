<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=2, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="color-scheme" content="light only">
<title>심부전 처방가이드 — HFrEF·HFmrEF·HFpEF</title>
<style>
/* ============================================================
   심부전 처방가이드 — UI 스타일 (style.css)
   심장 적색 테마. 시각 충실도: 표현형 3색바·COR배지·LOE점·급여아이콘·게이지.
   Sheet 패턴(sheet_pattern_spec v1.0): .sheet.theme-hf 미러링.
   ============================================================ */
:root{
  color-scheme:light only;
  --hf-primary:#C0392B; --hf-accent:#E74C3C; --hf-soft:#FADBD8; --hf-deep:#922B21; --hf-ink:#3A1512;
  --hf-rEF:#C0392B; --hf-mrEF:#E67E22; --hf-pEF:#16A085;
  --hf-loeA:#27AE60; --hf-loeB:#F39C12; --hf-loeC:#95A5A6;
  --hf-cover:#27AE60; --hf-cond:#F39C12; --hf-noncover:#C0392B;
  --hf-bg:#FFF9F8; --hf-card:#FFFFFF; --hf-line:#F0DDD8; --hf-mut:#8A7A75;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
html{color-scheme:light only;background:#FFF9F8}
body{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  background:var(--hf-bg); color:var(--hf-ink); line-height:1.55; -webkit-text-size-adjust:100%}
.wrap{max-width:760px;margin:0 auto;padding:0 0 80px}

/* 헤더 */
.hf-hd{background:linear-gradient(135deg,var(--hf-primary),var(--hf-deep));color:#fff;padding:20px 16px 16px;
  border-radius:0 0 18px 18px;box-shadow:0 4px 18px rgba(192,57,43,.22)}
.hf-hd h1{margin:0;font-size:21px;font-weight:800;letter-spacing:-.3px}
.hf-hd .sub{margin-top:5px;font-size:12.5px;opacity:.92}
.hf-hd .gl{margin-top:9px;display:flex;gap:6px;flex-wrap:wrap}
.hf-hd .gl span{background:rgba(255,255,255,.18);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600}

/* 검색 */
.hf-search{position:sticky;top:0;z-index:50;background:var(--hf-bg);padding:10px 12px;border-bottom:1px solid var(--hf-line)}
.hf-search input{width:100%;padding:11px 14px;border:1.5px solid var(--hf-line);border-radius:12px;font-size:15px;
  background:#fff;color:var(--hf-ink)}
.hf-search input:focus{outline:none;border-color:var(--hf-accent)}
.search-res{margin-top:8px;max-height:300px;overflow-y:auto}
.search-res .sr{padding:10px 12px;background:#fff;border:1px solid var(--hf-line);border-radius:10px;margin-bottom:6px;cursor:pointer}
.search-res .sr:active{background:var(--hf-soft)}
.search-res .sr .t{font-weight:700;font-size:14px}
.search-res .sr .d{font-size:12px;color:var(--hf-mut);margin-top:2px}
.search-empty{padding:16px;text-align:center;color:var(--hf-mut);font-size:13px}

/* 탭 */
.hf-tabs{display:flex;gap:4px;padding:10px 12px;position:sticky;top:0;z-index:40;background:var(--hf-bg)}
.hf-tabs button{flex:1;padding:10px 4px;border:none;border-radius:11px;background:#fff;color:var(--hf-mut);
  font-size:12.5px;font-weight:700;cursor:pointer;border:1.5px solid var(--hf-line);min-height:44px}
.hf-tabs button.on{background:var(--hf-primary);color:#fff;border-color:var(--hf-primary)}

.sec{display:none;padding:6px 12px}
.sec.on{display:block}
.sec-intro{font-size:13px;color:var(--hf-mut);margin:6px 2px 12px;line-height:1.5}

/* 도서관 분야 허브 */
.lib-hub{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:12px 0 6px}
.hubcard{display:flex;flex-direction:column;align-items:flex-start;gap:3px;text-align:left;
  padding:13px 13px;border:1.5px solid var(--hf-line);border-radius:14px;background:#fff;cursor:pointer;min-height:84px}
.hubcard:active{background:var(--hf-soft)}
.hubcard.on{border-color:var(--hf-primary);background:var(--hf-soft);box-shadow:0 2px 10px rgba(192,57,43,.12)}
.hubcard .he{font-size:22px}
.hubcard .ht{font-weight:800;font-size:14px;color:var(--hf-deep)}
.hubcard .hd{font-size:11px;color:var(--hf-mut);line-height:1.35}
.lib-panel-head{font-size:15px;font-weight:800;color:var(--hf-primary);margin:14px 2px 8px;
  padding-bottom:6px;border-bottom:2px solid var(--hf-soft)}
.lib-grp{font-size:12.5px;font-weight:800;color:var(--hf-deep);margin:14px 2px 6px}
.gdmt-note{background:#FBF3F1;border:1px solid var(--hf-line);border-radius:11px;padding:11px 13px;font-size:12.5px;color:var(--hf-ink);line-height:1.5;margin-bottom:8px}
.cmp-hint{font-size:11.5px;color:var(--hf-mut);margin:2px 2px 4px}
/* 약물 비교표 */
.cmp-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--hf-line);border-radius:12px;margin-bottom:6px;background:#fff}
.cmp-tbl{width:100%;border-collapse:collapse;font-size:12px}
.cmp-tbl thead th{background:var(--hf-soft);color:var(--hf-deep);font-size:11px;font-weight:700;padding:7px 6px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--hf-line)}
.cmp-tbl tbody tr{cursor:pointer;border-bottom:1px solid var(--hf-line)}
.cmp-tbl tbody tr:last-child{border-bottom:none}
.cmp-tbl tbody tr:active{background:var(--hf-soft)}
.cmp-tbl td{padding:8px 6px;vertical-align:middle}
.cmp-nm{font-weight:700;color:var(--hf-ink);min-width:96px;line-height:1.25}
.cmp-emoji{margin-right:3px}
.cmp-en{font-weight:500;font-size:9.5px;color:var(--hf-mut)}
.cmp-ph{white-space:nowrap}
.cmp-dose{white-space:nowrap;font-size:11px}
.cmp-s{color:var(--hf-mut)} .cmp-arrow{color:var(--hf-accent);margin:0 2px} .cmp-t{color:var(--hf-primary);font-weight:700}
.cmp-rec{white-space:nowrap}
.cmp-reimb{text-align:center;font-size:13px}
.cmp-chev{color:var(--hf-primary);font-weight:700;font-size:16px;text-align:center}

/* GDMT 4축 버튼 */
.pillar-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0}
.pbtn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:14px 8px;border:1.5px solid var(--hf-line);border-radius:13px;background:#fff;cursor:pointer;min-height:74px}
.pbtn:active{background:var(--hf-soft)}
.pbtn.on{border-color:var(--hf-primary);background:linear-gradient(135deg,var(--hf-primary),var(--hf-deep));box-shadow:0 3px 12px rgba(192,57,43,.25)}
.pbtn.on .pb-lb,.pbtn.on .pb-sub{color:#fff}
.pb-em{font-size:22px}
.pb-lb{font-weight:800;font-size:14px;color:var(--hf-deep)}
.pb-sub{font-size:10.5px;color:var(--hf-mut)}

/* 리스트 행(검사·동반질환·급여) */
.row-list{display:flex;flex-direction:column;gap:7px}
.lrow{display:flex;align-items:center;gap:10px;padding:13px 13px;background:#fff;border:1px solid var(--hf-line);border-radius:12px;cursor:pointer}
.lrow:active{background:var(--hf-soft)}
.lrow-em{font-size:20px;flex:0 0 auto}
.lrow-main{flex:1;line-height:1.35;min-width:0}
.lrow-main b{font-size:14px;color:var(--hf-ink)}
.lrow-sub{display:block;font-size:11.5px;color:var(--hf-mut);margin-top:2px}
.lrow-chev{flex:0 0 auto;color:var(--hf-primary);font-weight:700;font-size:18px}

/* 핵심/주의 박스 (kbox) */
.kbox{border-radius:11px;padding:11px 13px;margin:9px 0;font-size:12.5px;line-height:1.5}
.kbox b{display:block;margin-bottom:3px;font-size:12.5px}
.kbox div{color:var(--hf-ink)}
.kbox-green{background:#E9F7EF;border:1px solid #A9DFBF}.kbox-green b{color:#1E8449}
.kbox-blue{background:#EBF5FB;border:1px solid #AED6F1}.kbox-blue b{color:#1B4F72}
.kbox-amber{background:#FEF9E7;border:1px solid #F7DC6F}.kbox-amber b{color:#B9770E}
.kbox-red{background:#FDEDEC;border:1.5px solid #E6B0AA}.kbox-red b{color:#C0392B}

/* 검사 정상치 막대 */
.lab-ranges{display:flex;flex-direction:column;gap:5px;margin:6px 0 10px}
.lab-range{display:flex;align-items:center;gap:9px;padding:7px 10px;background:#FAFAFA;border-radius:9px;font-size:12.5px}
.lr-dot{width:12px;height:12px;border-radius:50%;flex:0 0 auto}
.lr-band{flex:1;font-weight:600}
.lr-val{font-weight:700;color:var(--hf-ink)}

/* 동반질환 단계 */
.algo-summary{font-size:13px;font-weight:600;color:var(--hf-deep);background:var(--hf-soft);border-radius:10px;padding:10px 12px;margin:4px 0 8px;line-height:1.5}
.algo-steps{margin-top:8px}
.algo-step{display:flex;gap:9px;align-items:flex-start;padding:8px 0;border-top:1px solid var(--hf-line)}
.algo-step:first-child{border-top:none}
.as-num{flex:0 0 auto;width:22px;height:22px;border-radius:50%;background:var(--hf-primary);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center}
.as-txt{flex:1;font-size:12.5px;line-height:1.5}
.algo-steps-title{font-size:12px;font-weight:800;color:var(--hf-deep);margin:10px 0 2px}
.algo-sec{margin-top:12px;border-top:1px solid var(--hf-line);padding-top:10px}
.algo-sec-h{font-size:13px;font-weight:800;color:var(--hf-primary);margin-bottom:6px}
.algo-sec-list{margin:0;padding-left:0;list-style:none}
.algo-sec-list li{position:relative;padding:5px 0 5px 14px;font-size:12.5px;line-height:1.5;border-bottom:1px dashed var(--hf-line)}
.algo-sec-list li:last-child{border-bottom:none}
.algo-sec-list li:before{content:"·";position:absolute;left:3px;color:var(--hf-accent);font-weight:800}
.algo-sec-list li.hi{background:#FEF9E7;border-radius:6px;padding:5px 8px;font-weight:600;border-bottom:none}
.algo-sec-list li.hi:before{content:"";}
.algo-sec-text{font-size:12.5px;line-height:1.55;color:var(--hf-ink);background:#FAFAFA;border-radius:9px;padding:9px 11px}

/* 급여 시트 */
.reimb-summary{font-size:13px;font-weight:600;color:var(--hf-deep);background:var(--hf-soft);border-radius:10px;padding:10px 12px;margin-bottom:8px;line-height:1.5}
.gate-title{font-size:12.5px;font-weight:800;color:var(--hf-deep);margin:10px 0 4px}

/* 코드표 */
.code-wrap{border:1px solid var(--hf-line);border-radius:12px;overflow:hidden;margin-bottom:8px;background:#fff}
.code-tbl{width:100%;border-collapse:collapse;font-size:12.5px}
.code-tbl tr{border-bottom:1px solid var(--hf-line)}
.code-tbl tr:last-child{border-bottom:none}
.code-tbl td{padding:9px 10px;vertical-align:top}
.code-c{font-weight:800;color:var(--hf-primary);white-space:nowrap;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;min-width:62px}
.code-l{color:var(--hf-ink)}
.code-n{font-size:11px;color:var(--hf-mut)}
.codechip{display:inline-block;background:var(--hf-soft);color:var(--hf-deep);font-weight:700;padding:2px 9px;border-radius:7px;font-size:12px;font-family:ui-monospace,Menlo,monospace}

/* 시트 내부 미러링 (새 요소) */
.sheet.theme-hf .kbox{border-radius:11px;padding:11px 13px;margin:9px 0;font-size:12.5px;line-height:1.5}
.sheet.theme-hf .kbox b{display:block;margin-bottom:3px}
.sheet.theme-hf .kbox-green{background:#E9F7EF;border:1px solid #A9DFBF}.sheet.theme-hf .kbox-green b{color:#1E8449}
.sheet.theme-hf .kbox-blue{background:#EBF5FB;border:1px solid #AED6F1}.sheet.theme-hf .kbox-blue b{color:#1B4F72}
.sheet.theme-hf .kbox-amber{background:#FEF9E7;border:1px solid #F7DC6F}.sheet.theme-hf .kbox-amber b{color:#B9770E}
.sheet.theme-hf .kbox-red{background:#FDEDEC;border:1.5px solid #E6B0AA}.sheet.theme-hf .kbox-red b{color:#C0392B}
.sheet.theme-hf .lab-ranges{display:flex;flex-direction:column;gap:5px;margin:6px 0 10px}
.sheet.theme-hf .lab-range{display:flex;align-items:center;gap:9px;padding:7px 10px;background:#FAFAFA;border-radius:9px;font-size:12.5px}
.sheet.theme-hf .lr-dot{width:12px;height:12px;border-radius:50%;flex:0 0 auto}
.sheet.theme-hf .lr-band{flex:1;font-weight:600}.sheet.theme-hf .lr-val{font-weight:700}
.sheet.theme-hf .algo-summary{font-size:13px;font-weight:600;color:var(--hf-deep);background:var(--hf-soft);border-radius:10px;padding:10px 12px;margin:4px 0 8px;line-height:1.5}
.sheet.theme-hf .algo-step{display:flex;gap:9px;align-items:flex-start;padding:8px 0;border-top:1px solid var(--hf-line)}
.sheet.theme-hf .algo-step:first-child{border-top:none}
.sheet.theme-hf .as-num{flex:0 0 auto;width:22px;height:22px;border-radius:50%;background:var(--hf-primary);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center}
.sheet.theme-hf .as-txt{flex:1;font-size:12.5px;line-height:1.5}
.sheet.theme-hf .algo-steps-title{font-size:12px;font-weight:800;color:var(--hf-deep);margin:10px 0 2px}
.sheet.theme-hf .algo-sec{margin-top:12px;border-top:1px solid var(--hf-line);padding-top:10px}
.sheet.theme-hf .algo-sec-h{font-size:13px;font-weight:800;color:var(--hf-primary);margin-bottom:6px}
.sheet.theme-hf .algo-sec-list{margin:0;padding-left:0;list-style:none}
.sheet.theme-hf .algo-sec-list li{position:relative;padding:5px 0 5px 14px;font-size:12.5px;line-height:1.5;border-bottom:1px dashed var(--hf-line)}
.sheet.theme-hf .algo-sec-list li:last-child{border-bottom:none}
.sheet.theme-hf .algo-sec-list li:before{content:"·";position:absolute;left:3px;color:var(--hf-accent);font-weight:800}
.sheet.theme-hf .algo-sec-list li.hi{background:#FEF9E7;border-radius:6px;padding:5px 8px;font-weight:600;border-bottom:none}
.sheet.theme-hf .algo-sec-list li.hi:before{content:"";}
.sheet.theme-hf .algo-sec-text{font-size:12.5px;line-height:1.55;color:var(--hf-ink);background:#FAFAFA;border-radius:9px;padding:9px 11px}
.sheet.theme-hf .reimb-summary{font-size:13px;font-weight:600;color:var(--hf-deep);background:var(--hf-soft);border-radius:10px;padding:10px 12px;margin-bottom:8px;line-height:1.5}
.sheet.theme-hf .gate-title{font-size:12.5px;font-weight:800;color:var(--hf-deep);margin:10px 0 4px}
.sheet.theme-hf .codechip{display:inline-block;background:var(--hf-soft);color:var(--hf-deep);font-weight:700;padding:2px 9px;border-radius:7px;font-size:12px}

/* 카드 (Sheet 대상 = sheetmode) */
.card{background:var(--hf-card);border:1px solid var(--hf-line);border-radius:14px;margin-bottom:10px;overflow:hidden;
  position:relative}
.card.ph-rEF{border-left:5px solid var(--hf-rEF)}
.card.ph-mrEF{border-left:5px solid var(--hf-mrEF)}
.card.ph-pEF{border-left:5px solid var(--hf-pEF)}
.card.ph-multi{border-left:5px solid;border-image:linear-gradient(180deg,var(--hf-rEF),var(--hf-mrEF),var(--hf-pEF)) 1}
.card .head{display:flex;align-items:center;gap:9px;padding:13px 14px}
.card .head .emoji{font-size:19px;flex:0 0 auto}
.card .head .t{flex:1;font-weight:700;font-size:14.5px;line-height:1.35}
.card .head .t small{display:block;font-weight:500;font-size:11.5px;color:var(--hf-mut);margin-top:2px}
.card .head .chev{flex:0 0 auto;color:var(--hf-mut);font-size:13px;transition:transform .2s}
.card.open .head .chev{transform:rotate(90deg)}
.card .body{padding:0 14px 14px;display:none}
.card.open .body{display:block}
.card.lead .body{display:block} /* lead=인라인 항상 표시 */

/* 배지 (COR/LOE/급여) */
.badges{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-top:5px}
.bdg{display:inline-flex;align-items:center;gap:3px;border-radius:20px;padding:2px 8px;font-size:11px;font-weight:700;line-height:1.6}
.bdg-cor-I{background:#FDEDEC;color:#C0392B}
.bdg-cor-IIa{background:#FEF5E7;color:#CA6F1E}
.bdg-cor-IIb{background:#FEF9E7;color:#B7950B}
.bdg-cor-III{background:#EBEDEF;color:#566573}
.loe-dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.bdg-loe{background:#F4F6F7;color:#566573}
.bdg-cover{background:#E9F7EF;color:#1E8449}
.bdg-cond{background:#FEF5E7;color:#B9770E}
.bdg-noncover{background:#FDEDEC;color:#C0392B}
.bdg-ph-rEF{background:#FDEDEC;color:var(--hf-rEF)}
.bdg-ph-mrEF{background:#FEF5E7;color:var(--hf-mrEF)}
.bdg-ph-pEF{background:#E8F8F5;color:var(--hf-pEF)}

/* 상세 블록 (접힘영역) */
.drow{display:flex;gap:8px;padding:7px 0;border-top:1px solid var(--hf-line);font-size:13px}
.drow:first-child{border-top:none}
.drow .lbl{flex:0 0 76px;color:var(--hf-mut);font-weight:600;font-size:12px}
.drow .val{flex:1}
.drow .val ul{margin:2px 0;padding-left:16px}
.drow .val li{margin:2px 0}
.dose-line{display:flex;align-items:center;gap:8px;margin:4px 0}
.dose-bar{flex:1;height:8px;border-radius:5px;background:#F0E6E3;position:relative;overflow:hidden}
.dose-bar i{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--hf-accent),var(--hf-primary));border-radius:5px}
.tag-start{font-size:11px;color:var(--hf-mut)} .tag-target{font-size:11px;color:var(--hf-primary);font-weight:700}

/* 경고박스 */
.warnbox{background:#FDEDEC;border:1.5px solid var(--hf-noncover);border-radius:10px;padding:10px 12px;margin:8px 0;font-size:12.5px;color:#922B21}
.warnbox b{color:var(--hf-noncover)}
.infobox{background:#EBF5FB;border:1px solid #AED6F1;border-radius:10px;padding:10px 12px;margin:8px 0;font-size:12.5px;color:#1B4F72}
.conflictbox{background:#FEF9E7;border:1.5px solid var(--hf-cond);border-radius:10px;padding:10px 12px;margin:8px 0;font-size:12.5px;color:#7E5109}

/* 급여 게이트 트리 */
.gate{margin:6px 0}
.gate .gnode{margin-left:0}
.gate .gop{font-size:11px;font-weight:800;color:var(--hf-mut);margin:3px 0}
.gate .gleaf{display:flex;align-items:flex-start;gap:7px;padding:5px 8px;border-radius:8px;margin:3px 0;font-size:12.5px;background:#FAFAFA}
.gate .gleaf .ic{flex:0 0 auto;font-size:13px}
.gate .pass{background:#E9F7EF}
.gate .fail{background:#FDEDEC}
.gate .excl{background:#FEF9E7}
.gate .group{border-left:2px solid var(--hf-line);padding-left:9px;margin:4px 0 4px 4px}

/* 게이지 (eGFR/K) */
.gauge{margin:8px 0}
.gauge .glabel{font-size:12px;color:var(--hf-mut);display:flex;justify-content:space-between}
.gauge .gtrack{height:12px;border-radius:7px;margin-top:4px;position:relative;
  background:linear-gradient(90deg,#C0392B 0%,#E67E22 25%,#27AE60 50%,#27AE60 75%,#E67E22 100%)}
.gauge .gmark{position:absolute;top:-3px;width:3px;height:18px;background:#222;border-radius:2px;box-shadow:0 0 0 2px #fff}

/* 4-pillar 인포그래픽 */
.pillars{display:flex;gap:8px;margin:10px 0}
.pillar{flex:1;text-align:center}
.pillar .col{height:70px;border-radius:9px 9px 0 0;background:#F0E6E3;position:relative;overflow:hidden;display:flex;align-items:flex-end}
.pillar .col i{width:100%;background:linear-gradient(180deg,var(--hf-accent),var(--hf-primary));transition:height .4s}
.pillar .nm{font-size:10.5px;font-weight:700;margin-top:5px;color:var(--hf-deep)}
.pillar .em{font-size:16px}

/* 플로우/시뮬 입력 */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0}
.fld{display:flex;flex-direction:column;gap:3px}
.fld label{font-size:11.5px;color:var(--hf-mut);font-weight:600}
.fld input,.fld select{padding:9px 10px;border:1.5px solid var(--hf-line);border-radius:9px;font-size:14px;background:#fff;min-height:40px}
.fld input:focus,.fld select:focus{outline:none;border-color:var(--hf-accent)}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0}
.chip{padding:7px 12px;border:1.5px solid var(--hf-line);border-radius:20px;background:#fff;font-size:12.5px;cursor:pointer;min-height:38px}
.chip.sel{background:var(--hf-primary);color:#fff;border-color:var(--hf-primary)}
.btn{display:inline-block;padding:11px 18px;background:var(--hf-primary);color:#fff;border:none;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;min-height:44px}
.btn:active{background:var(--hf-deep)}
.btn-ghost{background:#fff;color:var(--hf-primary);border:1.5px solid var(--hf-primary)}

/* 결과 카드 */

.rec-item{background:#fff;border:1px solid var(--hf-line);border-radius:11px;padding:10px 12px;margin:7px 0}
.rec-item .rh{display:flex;align-items:center;gap:7px}
.rec-item .rh .nm{flex:1;font-weight:700;font-size:14px}
.rec-item .role{font-size:12px;color:var(--hf-mut);margin-top:3px}
.rec-cls{display:inline-block;background:var(--hf-soft);color:var(--hf-deep);font-size:10.5px;font-weight:700;padding:1px 7px;border-radius:10px;margin-right:2px;vertical-align:middle}
.rec-alts{font-size:11px;color:var(--hf-mut);margin-top:4px;padding:4px 8px;background:#FAFAFA;border-radius:7px}

/* 치료 축 카드 */
.axis-grp-title{font-size:13px;font-weight:800;color:var(--hf-deep);margin:14px 2px 7px}
.axis-grp-title .agt-sub{font-size:11px;font-weight:500;color:var(--hf-mut)}
.axis-card{background:#fff;border:1px solid var(--hf-line);border-radius:13px;margin-bottom:8px;overflow:hidden}
.axis-head{display:flex;align-items:center;gap:10px;padding:12px 13px;cursor:pointer}
.axis-head:active{background:var(--hf-soft)}
.axis-em{font-size:20px;flex:0 0 auto}
.axis-tt{flex:1;min-width:0}
.axis-t{font-weight:800;font-size:14px;color:var(--hf-ink)}
.axis-sel{display:inline-block;background:var(--hf-soft);color:var(--hf-deep);font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;margin-left:4px;vertical-align:middle}
.axis-s{margin-top:4px;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.axis-rep{font-size:12px;color:var(--hf-mut)}
.axis-chev{flex:0 0 auto;color:var(--hf-primary);font-size:15px;transition:transform .2s}
.axis-card.open .axis-chev{transform:rotate(180deg)}
.axis-body{display:none;padding:0 13px 12px;border-top:1px solid var(--hf-line)}
.axis-card.open .axis-body{display:block}
.axis-note{font-size:12px;color:var(--hf-deep);background:var(--hf-soft);border-radius:8px;padding:8px 10px;margin:10px 0 6px;line-height:1.5}
.opt-row{display:flex;align-items:flex-start;gap:8px;padding:9px 0;border-top:1px dashed var(--hf-line);cursor:pointer}
.opt-row:first-of-type{border-top:none}
.opt-row:active{background:#FAFAFA}
.opt-rank{flex:0 0 auto;font-size:10px;font-weight:700;padding:2px 7px;border-radius:9px;background:#EEE;color:#777;margin-top:1px}
.opt-rank.opt-1{background:var(--hf-primary);color:#fff}
.opt-main{flex:1;min-width:0}
.opt-nm{font-weight:700;font-size:13.5px;color:var(--hf-ink)}
.opt-badges{font-weight:400}

.opt-warn{font-size:11px;color:var(--hf-noncover);margin-top:3px}
.opt-caut{font-size:11px;color:var(--hf-cond);margin-top:2px}
.opt-chev{flex:0 0 auto;color:var(--hf-primary);font-weight:700;font-size:16px}
.rec-item .reimb-line{font-size:12px;margin-top:5px}

.score-band{text-align:center;font-weight:700;font-size:13px;padding:5px;border-radius:8px;color:#fff}

.sources{margin-top:14px;padding:12px;background:#fff;border:1px solid var(--hf-line);border-radius:12px}

.sources a{color:var(--hf-primary);font-size:12.5px;word-break:break-all}
.sources li{margin:5px 0;font-size:12.5px}
.rct-link{font-size:12px;color:var(--hf-primary);text-decoration:none}
.disclaimer{margin-top:12px;padding:12px;background:#FBF6F5;border-radius:10px;font-size:11.5px;color:var(--hf-mut);line-height:1.5}

/* ===== Sheet (sheet_pattern_spec v1.0) ===== */
.card.sheetmode:not(.lead) .head{cursor:pointer}
.card.sheetmode:not(.lead) .head .chev{font-size:0;transform:none!important}
.card.sheetmode:not(.lead) .head .chev::after{content:"\203A";font-size:20px;font-weight:700;color:var(--hf-primary)}
.card.sheetmode:not(.lead) .body{display:none!important}

.sheet-overlay{position:fixed;inset:0;background:rgba(40,12,10,.42);opacity:0;pointer-events:none;
  transition:opacity .25s ease;z-index:200}
.sheet-overlay.on{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;max-width:760px;margin:0 auto;background:#fff;
  border-radius:20px 20px 0 0;z-index:201;transform:translateY(100%);
  transition:transform .28s cubic-bezier(.32,.72,0,1);
  height:85vh;max-height:85vh;display:flex;flex-direction:column;
  will-change:transform;-webkit-backface-visibility:hidden;backface-visibility:hidden;
  box-shadow:0 -8px 30px rgba(0,0,0,.18)}
.sheet.on{transform:translateY(0)}
.sheet-handle{flex:0 0 auto;padding:9px 0 5px;display:flex;justify-content:center;cursor:grab;touch-action:none}
.sheet-handle .bar{width:38px;height:5px;border-radius:3px;background:#E4D9D2;border:1px solid #D8CCC4}
.sheet-head{flex:0 0 auto;display:flex;align-items:center;gap:9px;padding:2px 16px 11px;border-bottom:1px solid var(--hf-line)}
.sheet-head .sback{flex:0 0 auto;width:34px;height:34px;border-radius:50%;border:1px solid #E4D9D2;
  background:#F7F2EE;font-size:24px;color:var(--hf-primary);cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;padding-bottom:3px}
.sheet-head .sback:active{background:var(--hf-soft)}
.sheet-head .emoji{font-size:20px}
.sheet-head .stitle{flex:1;font-weight:800;font-size:16.5px;color:var(--hf-ink)}
.sheet-head .sclose{flex:0 0 auto;width:34px;height:34px;border-radius:50%;border:1px solid #E4D9D2;
  background:#F7F2EE;font-size:18px;color:#6B5D55;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.sheet-body{flex:1 1 auto;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px 26px;overscroll-behavior:contain}

<script>
/* ============================================================
   심부전 처방가이드 — ENGINE 레이어 (engine.js)
   값 복제 금지, ID 참조만. 정문 recommend(patient) 노출.
   DATA(HF_DATA)에만 의존. UI 비의존.
   ============================================================ */
var HF_ENGINE = (function(D){
"use strict";

/* COR/LOE 순위 가중치 */
var COR_RANK={"I":0,"IIa":1,"IIb":2,"III":3};
var LOE_RANK={"A":0,"B":1,"C":2};

/* ---------- 표현형 분류 ---------- */
function classifyPhenotype(p){
  // p.lvef (숫자) 필수. 보조: p.np_elevated, p.structural
  if(p==null||p.lvef==null) return null;
  var ef=Number(p.lvef);
  if(ef<=40) return "rEF";
  if(ef>=50) return "pEF";
  // 41–49 = mrEF (지침상 추가조건 필요하나, 분류 자체는 EF 기준)
  return "mrEF";
}

/* ---------- 권고 순위 정렬 ---------- */
function rankRecommendations(phenotype, ctx){
  ctx=ctx||{};
  var out=[];
  for(var i=0;i<D.RECS.length;i++){
    var r=D.RECS[i];
    if(r.ph.indexOf(phenotype)<0) continue;
    out.push(r);
  }
  out.sort(function(a,b){
    var c=(COR_RANK[a.cor]-COR_RANK[b.cor]); if(c) return c;
    var l=(LOE_RANK[a.loe]-LOE_RANK[b.loe]); if(l) return l;
    return 0;
  });
  return out;
}

/* ---------- 급여 게이트 평가 ----------
   재귀적으로 AND/OR 트리 평가. 각 leaf의 test를 patient로 검사.
   반환: {covered, tree:평가결과, missing:[불충족조건txt], notes} */
function evalReimbursement(reimbId, patient){
  var rule=D.REIMB[reimbId];
  if(!rule) return null;
  var missing=[];
  function evalNode(node){
    if(node.op){ // 그룹
      var results=node.conds.map(evalNode);
      var pass;
      if(node.op==="AND") pass=results.every(function(x){return x.pass;});
      else pass=results.some(function(x){return x.pass;});
      return {op:node.op,pass:pass,children:results};
    }
    // leaf
    var ok=evalTest(node.test,patient,node.exclusion);
    if(!ok && !node.exclusion) missing.push(node.txt);
    if(!ok && node.exclusion) missing.push("[제외조건 위반] "+node.txt);
    return {leaf:true,pass:ok,txt:node.txt,k:node.k,exclusion:!!node.exclusion};
  }
  var tree=evalNode(rule.gate);
  return {id:reimbId,covered:tree.pass,tree:tree,missing:missing,
          rule:rule,unknown:hasUnknown(patient,rule)};
}

/* 환자값 부족으로 판정 불가한지 (보수적 표시용) */
function hasUnknown(patient,rule){
  // 핵심 키들이 비어있으면 unknown 플래그
  return false; // UI에서 입력값 기반으로 처리, 엔진은 false-as-fail 기본
}

/* leaf test 평가기 — DSL 문자열을 patient 속성으로 해석 */
function evalTest(test,p,isExclusion){
  p=p||{};
  switch(test){
    // 표현형/EF
    case "lvef<=40": return num(p.lvef)!=null && p.lvef<=40;
    case "lvef>40":  return num(p.lvef)!=null && p.lvef>40;
    case "lvef<=35": return num(p.lvef)!=null && p.lvef<=35;
    // NYHA
    case "nyha in [2,3,4]": return [2,3,4].indexOf(num(p.nyha))>=0;
    case "nyha not in [2,3,4]": return !([2,3,4].indexOf(num(p.nyha))>=0);
    // 표준치료/병용
    case "std_therapy": return !!p.std_therapy;       // BB/MRA 등 표준치료 병용
    case "raasi_max_4wk": return !!p.raasi_max_4wk;
    // 증상·입원
    case "hf_symptom": return !!p.hf_symptom;
    case "hf_admission_12mo": return !!p.hf_admission_12mo;
    // 바이오마커
    case "ntprobnp>=125": return num(p.ntprobnp)!=null && p.ntprobnp>=125;
    case "bnp>=35": return num(p.bnp)!=null && p.bnp>=35;
    // 동반질환
    case "t2dm": return !!p.t2dm;
    case "ckd": return !!p.ckd;
    case "uacr>300": return num(p.uacr)!=null && p.uacr>300;
    case "25<=egfr<75": return num(p.egfr)!=null && p.egfr>=25 && p.egfr<75;
    // 부정맥/HR
    case "sinus_rhythm": return !!p.sinus_rhythm;
    case "hr>=70": return num(p.hr)!=null && p.hr>=70;
    case "bb_max_or_intol": return !!p.bb_max_or_intol;
    // 철결핍
    case "iron_deficiency": return isIronDeficient(p);
    default: return false;
  }
}
function num(x){return (x==null||x==="")?null:Number(x);}
function isIronDeficient(p){
  var f=num(p.ferritin), t=num(p.tsat);
  if(f!=null && f<100) return true;
  if(f!=null && t!=null && f>=100 && f<300 && t<20) return true;
  return false;
}

/* ---------- 정문 recommend(patient) → {drugs[],targets[],flags[]} ---------- */
function recommend(patient){
  patient=patient||{};
  var ph=classifyPhenotype(patient);
  var flags=[];
  if(!ph){ return {phenotype:null,axes:[],drugs:[],targets:[],flags:[{lv:"info",msg:"LVEF를 입력하면 표현형별 권고를 표시합니다."}],recs:[]}; }

  var recs=rankRecommendations(ph,patient);
  // 권고문에서 표현형 적용 약물 집합 + 각 약물의 COR/LOE 최상위 매핑
  var drugRec={};
  for(var i=0;i<recs.length;i++){
    var r=recs[i];
    for(var j=0;j<r.drugs.length;j++){
      var did=r.drugs[j];
      if(!drugRec[did]) drugRec[did]={cor:r.cor,loe:r.loe}; // 최상위(이미 정렬됨)
    }
  }

  // 축 단위로 묶기
  var axes=[];
  for(var a=0;a<D.AXES.length;a++){
    var ax=D.AXES[a];
    if(ax.ph.indexOf(ph)<0) continue;
    // 이 축의 계열들에서 권고된 약물 수집(우선순위 순서)
    var members=[];
    for(var c=0;c<ax.classes.length;c++){
      var clsId=ax.classes[c];
      var clsObj=D.CLASSES[clsId]; if(!clsObj) continue;
      var clsMembers=clsObj.members||[];
      for(var m=0;m<clsMembers.length;m++){
        var did2=clsMembers[m];
        if(!drugRec[did2]) continue; // 이 표현형에 권고 안 된 약 제외
        var dd=D.DRUGS[did2]; if(!dd) continue;
        var mem={id:did2,label:dd.label_ko,cls:clsId,clsLabel:clsObj.label,
                 cor:drugRec[did2].cor,loe:drugRec[did2].loe,role:dd.role,
                 reimb:null,ci_hit:[],caution:[]};
        if(dd.reimb){
          var ev=evalReimbursement(dd.reimb,patient);
          if(ev) mem.reimb={covered:ev.covered,missing:ev.missing,id:dd.reimb,conflict:ev.rule.conflict};
        }
        checkSafety(dd,patient,mem);
        members.push(mem);
      }
    }
    if(!members.length) continue; // 권고 약물 없으면 축 생략
    var primary=members[0];
    axes.push({
      id:ax.id,emoji:ax.emoji,title:ax.title,sub:ax.sub,select:ax.select,
      pillar:!!ax.pillar,note:ax.note,mutex_note:ax.mutex_note||null,
      cor:primary.cor,loe:primary.loe,
      primary:primary,members:members,count:members.length
    });
  }

  // 평면 drugs[](하위호환): 각 축의 대표만
  var drugs=axes.map(function(ax){
    var p=ax.primary;
    return {id:p.id,label:p.label,cls:p.cls,cor:p.cor,loe:p.loe,role:p.role,
            reimb:p.reimb,ci_hit:p.ci_hit,caution:p.caution,
            alts:ax.members.slice(1).map(function(m){return m.label;})};
  });

  // 표적(목표)
  var targets=[];
  if(ph==="rEF"){
    targets.push({k:"GDMT",txt:"4 pillar(RAS차단·BB·MRA·SGLT2i) 조기 병용·목표용량 적정"});
    targets.push({k:"euvolemia",txt:"이뇨제로 울혈 조절(증상)"});
  } else if(ph==="mrEF"){
    targets.push({k:"SGLT2i",txt:"SGLT2i 기둥치료(I-A)"});
    targets.push({k:"comorbid",txt:"동반질환·울혈 관리"});
  } else {
    targets.push({k:"SGLT2i",txt:"SGLT2i(I-A) + 원인·동반질환 적극관리"});
    targets.push({k:"bp",txt:"BP<130/80, AF·DM·비만·OSA 관리"});
  }

  buildFlags(patient,ph,flags);

  return {phenotype:ph,phenotypeInfo:D.PHENOTYPES[ph],axes:axes,drugs:drugs,targets:targets,flags:flags,recs:recs};
}

function checkSafety(dd,p,item){
  var egfr=num(p.egfr), k=num(p.potassium);
  // MRA: K+>5.0 또는 eGFR<30
  if(dd.cls==="class:mra_steroidal"){
    if(k!=null && k>5.0) item.ci_hit.push("K+>5.0 (MRA 개시 금기)");
    if(egfr!=null && egfr<30) item.ci_hit.push("eGFR<30 (MRA 금기)");
    else if(egfr!=null && egfr<50) item.caution.push("eGFR 30–50: 감량·신중");
  }
  // SGLT2i: eGFR<20 개시주의
  if(dd.cls==="class:sglt2i"){
    if(egfr!=null && egfr<20) item.caution.push("eGFR<20: 개시 주의");
  }
  // ACEI/ARB/ARNI: K+>5.5 주의
  if(dd.cls==="class:acei"||dd.cls==="class:arb"||dd.cls==="class:arni"){
    if(k!=null && k>5.5) item.caution.push("K+>5.5: RAS차단 주의");
    if(egfr!=null && egfr<30) item.caution.push("eGFR<30: 신중·감량");
  }
  // finerenone
  if(dd.id==="drug:finerenone"){
    if(k!=null && k>5.0) item.ci_hit.push("K+>5.0 (개시 금기)");
    if(egfr!=null && egfr<25) item.ci_hit.push("eGFR<25 (개시 금기)");
  }
}

function buildFlags(p,ph,flags){
  var egfr=num(p.egfr), k=num(p.potassium), hr=num(p.hr);
  // finerenone 급여 함정
  if(p.t2dm && (ph==="mrEF"||ph==="pEF")){
    flags.push({lv:"warn",msg:"⚠️ finerenone: 심부전(NYHA II-IV)이면 DKD 급여경로에서도 제외 → 급여 불가(삭감 고위험)"});
  }
  // 고칼륨혈증
  if(k!=null && k>5.0){
    flags.push({lv:"warn",msg:"🧂 K+ "+k+": MRA/RAASi 주의. K-binder로 RAASi 유지 고려(중단보다 우선)"});
  }
  // eGFR
  if(egfr!=null && egfr<20){
    flags.push({lv:"warn",msg:"🫘 eGFR<20: SGLT2i 개시 주의, MRA 금기, RAS차단 신중"});
  } else if(egfr!=null && egfr<30){
    flags.push({lv:"info",msg:"🫘 eGFR<30: MRA 금기, ACEI/ARB/ARNI 감량·신중"});
  }
  // 철결핍
  if(isIronDeficient(p)){
    flags.push({lv:"info",msg:"🩸 철결핍 충족: IV 철분(ferric carboxymaltose) 권고 대상(I-A)"});
  }
  // 빈맥+동율동
  if(ph==="rEF" && p.sinus_rhythm && hr!=null && hr>=70){
    flags.push({lv:"info",msg:"⚡ 동율동 HR≥70: BB 최대내약 후에도 빈맥시 이바브라딘 추가 고려(IIa)"});
  }
  // ARNI BNP 주의
  flags.push({lv:"info",msg:"🧪 ARNI 사용시 BNP는 상승(neprilysin 억제)—NT-proBNP로 추적 권장"});
}

/* ---------- 점수 계산기 ---------- */
function scoreH2FPEF(sel){ // sel: {heavy,htn,af,ph,elder,filling} bool
  var items=D.SCORES.h2fpef.items, total=0, detail=[];
  for(var i=0;i<items.length;i++){
    var it=items[i], on=!!sel[it.k];
    if(on) total+=it.pts;
    detail.push({k:it.k,label:it.label,pts:it.pts,on:on});
  }
  return {total:total,detail:detail,band:bandOf(D.SCORES.h2fpef.cutoff,total)};
}
function scoreHFAPEFF(vals){ // vals: {func:0/1/2, morph:0/1/2, biom:0/1/2}
  var total=(num(vals.func)||0)+(num(vals.morph)||0)+(num(vals.biom)||0);
  return {total:total,band:bandOf(D.SCORES.hfapeff.cutoff,total)};
}
function bandOf(cutoffs,total){
  for(var i=0;i<cutoffs.length;i++){ if(total>=cutoffs[i].min) return cutoffs[i]; }
  return cutoffs[cutoffs.length-1];
}

/* eGFR(CKD-EPI 2021) 보조 계산 */
function egfrCKDEPI(scr,age,female){
  scr=Number(scr);age=Number(age);
  if(!scr||!age) return null;
  var k=female?0.7:0.9, a=female?-0.241:-0.302;
  var min=Math.min(scr/k,1), max=Math.max(scr/k,1);
  var e=142*Math.pow(min,a)*Math.pow(max,-1.200)*Math.pow(0.9938,age)*(female?1.012:1);
  return Math.round(e*10)/10;
}

return {classifyPhenotype:classifyPhenotype,rankRecommendations:rankRecommendations,
        evalReimbursement:evalReimbursement,recommend:recommend,
        scoreH2FPEF:scoreH2FPEF,scoreHFAPEFF:scoreHFAPEFF,

})(HF_DATA);

function gateTreeHTML(node,depth){
  depth=depth||0;
  if(node.op){
    var opl=node.op==="AND"?"모두 충족(AND)":"하나 충족(OR)";
    var inner=node.conds.map(function(c){return gateTreeHTML(c,depth+1);}).join('');
    return '<div class="'+(depth>0?'group':'')+'"><div class="gop">'+opl+'</div>'+inner+'</div>';
  }
  var ic=node.exclusion?'🚫':'•';
  return '<div class="gleaf'+(node.exclusion?' excl':'')+'"><span class="ic">'+ic+'</span><span>'+esc(node.txt)+'</span></div>';
}

/* 평가된 게이트 트리 (환자값 반영 — 플로우/시뮬용) */
function gateEvalHTML(tree){
  if(tree.op){
    var opl=tree.op==="AND"?"모두 충족(AND)":"하나 충족(OR)";
    var inner=tree.children.map(gateEvalHTML).join('');
    return '<div class="group"><div class="gop">'+opl+' '+(tree.pass?'✅':'❌')+'</div>'+inner+'</div>';
  }
  var cls=tree.exclusion?(tree.pass?'pass':'excl'):(tree.pass?'pass':'fail');
  var ic=tree.pass?'✅':(tree.exclusion?'🚫':'❌');
  return '<div class="gleaf '+cls+'"><span class="ic">'+ic+'</span><span>'+esc(tree.txt)+'</span></div>';
}

function fld(ns,k,label,type,ph,opts){
  if(type==='select'){
    return '<div class="fld"><label>'+esc(label)+'</label><select data-k="'+k+'" id="'+ns+'_'+k+'">'+
      opts.map(function(o){return '<option value="'+o[0]+'">'+o[1]+'</option>';}).join('')+'</select></div>';
  }
  return '<div class="fld"><label>'+esc(label)+'</label><input type="'+type+'" inputmode="decimal" data-k="'+k+'" id="'+ns+'_'+k+'" placeholder="'+esc(ph||'')+'"></div>';

/* 결과 렌더 */
function resultHTML(res,patient){
  if(!res.phenotype){
    return '<div class="infobox">'+esc(res.flags[0].msg)+'</div>';
  }
  var info=res.phenotypeInfo;
  var h='<div class="ph-banner" style="background:'+info.color+'">'+info.emoji+' '+esc(info.label)+' · '+esc(info.label_full)+' (LVEF '+esc(info.lvef)+')</div>';

  // 플래그
  res.flags.forEach(function(f){
    var cls=f.lv==='warn'?'warnbox':(f.lv==='info'?'infobox':'infobox');
    h+='<div class="'+cls+'">'+esc(f.msg)+'</div>';
  });

  // 표적
  h+='<div style="font-size:12.5px;font-weight:800;color:var(--hf-deep);margin:10px 2px 4px">🎯 치료 표적</div>';
  res.targets.forEach(function(t){h+='<div class="rec-item"><b>'+esc(t.k)+'</b> · '+esc(t.txt)+'</div>';});

  // 치료 축 (대분류 → 클릭하면 약 펼침)
  var pillars=res.axes.filter(function(a){return a.pillar;});
  var adjuncts=res.axes.filter(function(a){return !a.pillar;});

  if(pillars.length){
    h+='<div class="axis-grp-title">🏛️ GDMT 기둥 <span class="agt-sub">각 축에서 1제 선택 · 조기 병용</span></div>';
    pillars.forEach(function(ax){h+=axisCardHTML(ax);});
  }
  if(adjuncts.length){
    h+='<div class="axis-grp-title">➕ 부가 치료 <span class="agt-sub">증상·상황별 선택</span></div>';
    adjuncts.forEach(function(ax){h+=axisCardHTML(ax);});
  }
  h+='<div class="disclaimer">⚕️ 본 도구는 전문가용 의사결정 <b>조언자</b>이며 처방을 강제하지 않습니다. 같은 축 안의 약은 원칙적으로 택일하며, 모든 급여 판정은 입력값 기반 참고이니 실제 청구 전 HIRA 원문·환자 개별상황을 확인하세요.</div>';
  return h;
}

/* 치료 축 카드 (헤더=대분류, 펼치면 약 목록) */
function axisCardHTML(ax){
  var p=ax.primary;
  var selBadge = ax.select==="one"?'<span class="axis-sel">택일</span>':(ax.select==="choice"?'<span class="axis-sel">상황별</span>':'');
  // 헤더: 대분류명 + 대표약 + COR/LOE + 옵션 수
  var head='<div class="axis-head"><span class="axis-em">'+esc(ax.emoji)+'</span>'+
    '<div class="axis-tt"><div class="axis-t">'+esc(ax.title)+' '+selBadge+'</div>'+
    '<div class="axis-s">'+UI.corBadge(p.cor)+UI.loeBadge(p.loe)+' <span class="axis-rep">'+esc(p.label)+(ax.count>1?' 외 '+(ax.count-1)+'제':'')+'</span></div></div>'+
    '<span class="axis-chev">▾</span></div>';
  // 본문(펼침): 약 목록 + note + mutex
  var body='<div class="axis-body">';
  if(ax.note) body+='<div class="axis-note">'+esc(ax.note)+'</div>';
  if(ax.mutex_note) body+='<div class="kbox kbox-amber" style="margin:6px 0"><b>⚠️ 기능 중복</b><div>'+esc(ax.mutex_note)+'</div></div>';
  ax.members.forEach(function(m,idx){
    var tag = idx===0?'<span class="opt-rank opt-1">1차</span>':'<span class="opt-rank">대안</span>';
    var rb='';
    if(m.reimb){
      rb=' '+UI.reimbBadge(m.reimb.covered);
    }
    var safety='';
    if(m.ci_hit&&m.ci_hit.length) safety+='<div class="opt-warn">🚫 '+m.ci_hit.map(esc).join(', ')+'</div>';
    if(m.caution&&m.caution.length) safety+='<div class="opt-caut">⚠ '+m.caution.map(esc).join(', ')+'</div>';
    body+='<div class="opt-row" data-sheet-drug="'+esc(m.id)+'">'+tag+
      '<div class="opt-main"><div class="opt-nm">'+esc(m.label)+rb+
      ' <span class="opt-badges">'+UI.corBadge(m.cor)+UI.loeBadge(m.loe)+'</span></div>'+
      '<div class="opt-role">'+esc(m.role)+'</div>'+safety+
      (m.reimb&&m.reimb.conflict?'<div class="conflictbox" style="margin-top:3px;font-size:11.5px">⚠️ '+esc(m.reimb.conflict)+'</div>':'')+
      '</div><span class="opt-chev">›</span></div>';
  });
  body+='</div>';
  return '<div class="axis-card" data-axis="'+esc(ax.id)+'">'+head+body+'</div>';
}

/* ============ 검색 ============ */
function buildSearchIndex(){
  var idx=[];
  Object.keys(D.DRUGS).forEach(function(id){var d=D.DRUGS[id];
    idx.push({type:'약물',id:id,title:d.label_ko,
      kw:(d.label_ko+' '+d.label_en+' '+(d.brand||'')+' '+(d.role||'')+' '+(d.cls||'')).toLowerCase(),
      desc:d.label_en+(d.brand?' · '+d.brand:'')+' · '+(D.CLASSES[d.cls]?D.CLASSES[d.cls].label:''),
      drug:id});
  });
  Object.keys(D.REIMB).forEach(function(id){var r=D.REIMB[id];
    idx.push({type:'급여',id:id,title:r.title,kw:(r.title+' '+r.summary+' '+r.notice).toLowerCase(),desc:r.summary,reimb:id});
  });
  Object.keys(D.ALGOS).forEach(function(id){var a=D.ALGOS[id];
    idx.push({type:'동반질환',id:id,title:a.title,kw:(a.title+' '+a.rules.join(' ')).toLowerCase(),desc:a.rules[0]||'',algo:id});
  });
  Object.keys(D.LABS).forEach(function(id){var l=D.LABS[id];
    idx.push({type:'검사',id:id,title:l.key,kw:(l.key+' '+l.label+' '+(l.note||'')).toLowerCase(),desc:l.label});
  });
  D.RECS.forEach(function(r){
    idx.push({type:'권고',id:r.id,title:r.txt,kw:(r.txt+' '+r.cor+' '+r.loe).toLowerCase(),desc:'COR '+r.cor+' · LOE '+r.loe});
  });
  return idx;
}
var SEARCH_IDX=null;
function doSearch(q){
  if(!SEARCH_IDX) SEARCH_IDX=buildSearchIndex();
  q=q.trim().toLowerCase();
  var box=$('#searchRes');
  if(!q){box.innerHTML='';return;}
  var hits=SEARCH_IDX.filter(function(it){return it.kw.indexOf(q)>=0;}).slice(0,20);
  if(!hits.length){box.innerHTML='<div class="search-empty">검색 결과 없음</div>';return;}
  box.innerHTML=hits.map(function(it){
    return '<div class="sr" data-open="'+esc(it.drug||it.reimb||it.algo||'')+'" data-type="'+it.type+'">'+
      '<div class="t">['+it.type+'] '+esc(it.title)+'</div><div class="d">'+esc(it.desc)+'</div></div>';
  }).join('');
}
function bindSearch(){
  var inp=$('#searchInput'); if(!inp)return;
  inp.addEventListener('input',function(){doSearch(this.value);});
  $('#searchRes').addEventListener('click',function(e){
    var sr=e.target.closest('.sr'); if(!sr)return;
    var id=sr.getAttribute('data-open');
    var dd=D.DRUGS[id];
    if(dd){ // 약물 시트 열기
      var tmp=document.createElement('div'); tmp.innerHTML=UI.drugCardHTML(dd);
      var bd=tmp.querySelector('.body');
      UI.Sheet.open({emoji:dd.emoji,title:esc(dd.label_ko)+' <small style="font-weight:500;font-size:12px;color:var(--hf-mut)">'+esc(dd.label_en)+'</small>',
        html:bd.innerHTML,rebind:function(){}});
    }
  });
}
