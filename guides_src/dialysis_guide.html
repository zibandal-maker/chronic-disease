    'viz:dialysate_table': function (slot) { dialysateTable(slot); },
    'viz:circuit': function (slot) { circuit(slot); },
    'viz:initiation_checklist': function (slot) { initiationChecklist(slot); },
    'viz:hb_target_band': hbTargetBand,
    'viz:dialyzability_matrix': function (slot) { dialyzabilityMatrix(slot); },
    'viz:diet_balance': function (slot) { dietBalance(slot); },
    'viz:hd_crrt_compare': function (slot) { hdCrrtCompare(slot); },
    'viz:crrt_simulator': function (slot) { crrtSimulator(slot); },
    'viz:crrt_flow': function (slot) { crrtFlow(slot); },
    'viz:hduf_simulator': function (slot) { hdufSimulator(slot); },
    'viz:referral_triage': function (slot) { referralTriage(slot); },
    'viz:referral_prep': function (slot) { referralPrep(slot); }
  };

  global.mountViz = function (cardEl, E, DATA) {
    if (!cardEl) return;
    stopAll();
    var slots = cardEl.querySelectorAll('.viz-slot');
    for (var i = 0; i < slots.length; i++) {
      var slot = slots[i];
      if (slot._mounted) continue; // 1회만
      var vid = slot.getAttribute('data-viz');
      var fn = RENDERERS[vid];
      try {
        if (fn) { fn(slot, E, DATA); }
        else { staticDiagram(slot, (DATA.viz && DATA.viz[vid]) || {}); }
        slot._mounted = true;
      } catch (e) {
        slot.innerHTML = '<div style="font-size:12px;color:' + SOFT + '">시각화를 불러올 수 없습니다.</div>';
      }
    }
  };
})(typeof window !== 'undefined' ? window : this);
</script>

<script>
/* ============ UI 컨트롤러 ============ */
(function(){
  // DATA 조립 (모듈 전역 변수들을 엔진 입력으로)
  var DATA = {
    trials: typeof DIALYSIS_TRIALS!=='undefined'?DIALYSIS_TRIALS:{},
    numbers: typeof DIALYSIS_NUMBERS!=='undefined'?DIALYSIS_NUMBERS:{},
    conceptsA: typeof DIALYSIS_CONCEPTS_A!=='undefined'?DIALYSIS_CONCEPTS_A:{},
    conceptsB: typeof DIALYSIS_CONCEPTS_B!=='undefined'?DIALYSIS_CONCEPTS_B:{},
    drugs: typeof DIALYSIS_DRUGS!=='undefined'?DIALYSIS_DRUGS:{},
    viz: typeof DIALYSIS_VIZ!=='undefined'?DIALYSIS_VIZ:{},
    reimb: typeof DIALYSIS_REIMB!=='undefined'?DIALYSIS_REIMB:{}
  };
  var E = new DialysisEngine(DATA);
  var REFS = typeof DIALYSIS_REFS!=='undefined'?DIALYSIS_REFS:{};

  function esc(s){return (''+s).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
  // 마크다운 약식: **bold** 만
  function md(s){return esc(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');}

  var layers = E.listLayers();
  var tower = document.getElementById('tower');
  var content = document.getElementById('content');

  // 네비 빌드
  layers.forEach(function(L){
    var el=document.createElement('button');
    el.className='floor'; el.setAttribute('data-id',L.id);
    el.innerHTML='<span class="fid">'+esc(L.id)+'</span><span class="ficon">'+esc(L.icon)+'</span><span class="ftitle">'+esc(L.title)+'</span>';
    el.addEventListener('click',function(){show(L.id);});
    tower.appendChild(el);
  });

  // 카드 빌드 (전부 미리 렌더, 표시만 토글)
  layers.forEach(function(L){
    var r=E.explain(L.id);
    var card=document.createElement('section');
    card.className='layer-card'; card.id='card-'+L.id;
    card.innerHTML=renderCard(r);
    content.appendChild(card);
  });
  // 출처 푸터
  var foot=document.createElement('div');
  foot.className='refs-foot'; foot.innerHTML=renderRefs();
  content.appendChild(foot);

  function renderCard(r){
    if(!r.found) return '<p>콘텐츠 없음</p>';
    var h='';
    h+='<div class="lc-head"><div class="lc-eyebrow"><span class="num">'+esc(r.id)+'</span> '+esc(r.icon||'')+' LAYER</div>'+
       '<h2>'+esc(r.title)+'</h2>'+(r.subtitle?'<div class="sub">'+esc(r.subtitle)+'</div>':'')+'</div>';
    // core
    h+='<div class="core"><span class="core-tag">핵심</span>'+md(r.core)+'</div>';
    // analogy
    if(r.analogy) h+='<div class="analogy"><span class="a-tag">🔆 비유</span>'+esc(r.analogy)+'</div>';
    // numbers
    if(r.numbers&&r.numbers.length){
      h+='<div class="numbers">';
      r.numbers.forEach(function(n){
        h+='<div class="numchip"><span class="nlabel">'+esc(n.label)+'</span>'+
           '<span class="nval">'+esc(n.text)+'</span>'+
           '<span class="ngrade g-'+esc(n.grade)+'">'+esc(n.grade)+'</span>'+
           (n.note?'<div class="nnote">'+esc(n.note)+'</div>':'')+'</div>';
      });
      h+='</div>';
    }
    // viz 슬롯 (다음 단계 주입)
    if(r.viz){
      h+='<div class="viz-slot" data-viz="'+esc(r.viz.id)+'"><span class="vtag">인터랙티브 · '+esc(r.viz.type)+'</span>'+esc(r.viz.title)+
         (r.viz.output?'<div style="font-size:11.5px;margin-top:5px;opacity:.8">'+esc(r.viz.output)+'</div>':'')+'</div>';
    }
    // 보조 viz (L1 solvent_drag, L15 flow 등)
    if(r.viz_secondary){
      h+='<div class="viz-slot" data-viz="'+esc(r.viz_secondary.id)+'"><span class="vtag">'+esc(r.viz_secondary.type)+'</span>'+esc(r.viz_secondary.title)+
         (r.viz_secondary.output?'<div style="font-size:11.5px;margin-top:5px;opacity:.8">'+esc(r.viz_secondary.output)+'</div>':'')+'</div>';
    }
    // detail 아코디언
    (r.detail||[]).forEach(function(d){
      h+='<details class="detail-acc"><summary>'+esc(d.h)+'<span class="chev">▶</span></summary>'+
         '<div class="detail-body">'+md(d.t)+'</div></details>';
    });
    // trials
    if(r.trials&&r.trials.length){
      h+='<div class="trials">';
      r.trials.forEach(function(t){
        if(t.missing) return;
        h+='<div class="trial"><span class="tname">'+esc(t.name)+'</span> <span class="tyear">'+esc(t.year)+'</span>'+
           '<div class="tteach">'+esc(t.teaching)+'</div>'+
           '<a href="'+esc(t.pubmed)+'" target="_blank" rel="noopener">PubMed '+esc(t.pmid)+'</a>'+
           '<a href="'+esc(t.url)+'" target="_blank" rel="noopener">DOI</a></div>';
      });
      h+='</div>';
    }
    // CRRT trials (L15)
    if(r.crrt_trials&&r.crrt_trials.length){
      h+='<div class="trials">';
      r.crrt_trials.forEach(function(t){
        if(t.missing) return;
        h+='<div class="trial"><span class="tname">'+esc(t.name)+'</span> <span class="tyear">'+esc(t.year)+'</span>'+
           '<div class="tteach">'+esc(t.finding||t.teaching)+'</div>'+
           '<a href="'+esc(t.pubmed)+'" target="_blank" rel="noopener">PubMed '+esc(t.pmid)+'</a>'+
           '<a href="'+esc(t.url)+'" target="_blank" rel="noopener">DOI</a></div>';
      });
      h+='</div>';
    }
    (r.reimb||[]).forEach(function(rb){
      h+='<div class="reimb"><div class="reimb-head">💰 '+esc(rb.title)+(rb.verified?'':' <span style="font-weight:400;font-size:11px">(미검증)</span>')+'</div>'+
         '<div class="reimb-body"><div class="skeleton">'+esc(rb.skeleton)+'</div>'+
         (rb.guideline?'<div class="gl"><b>가이드라인:</b> '+esc(rb.guideline)+'</div>':'')+
         (rb.conflict?'<div class="conflict">⚠️ '+esc(rb.conflict_note)+'</div>':'')+
         (!rb.verified?'<div class="unverified">'+esc(rb.warning)+'</div>':'')+
         '</div></div>';
    });
    return h;
  }

  function renderRefs(){
    var h='<h3>📚 출처 · 논문 링크</h3><ul>';
    Object.keys(REFS).forEach(function(k){
      var rf=REFS[k];
      h+='<li>'+(rf.url?'<a href="'+esc(rf.url)+'" target="_blank" rel="noopener">'+esc(rf.label)+'</a>':esc(rf.label))+'</li>';
    });
    h+='</ul><div class="disclaimer">본 도구는 <b>학습·조언 목적</b>이며 처방을 대신하지 않습니다. '+
       '실제 임상 결정은 신장내과 전문의와 상의하십시오. · HIRA 급여는 코딩 직전 원문 재검증 대상(미검증 표시).</div>';
    return h;
  }

  var current=null;
  function show(id){
    if(current) {
      var oc=document.getElementById('card-'+current); if(oc) oc.classList.remove('shown');
      var of=tower.querySelector('.floor[data-id="'+current+'"]'); if(of) of.classList.remove('active');
    }
    var c=document.getElementById('card-'+id); if(c) c.classList.add('shown');
    var f=tower.querySelector('.floor[data-id="'+id+'"]'); if(f) f.classList.add('active');
    current=id;
    // viz 주입 (렌더러가 로드돼 있으면)
    if(typeof mountViz==='function') mountViz(c, E, DATA);
    // 콘텐츠 영역만 상단으로(아코디언 토글은 스크롤 금지 — 헌장)
    if(window.innerWidth<780){ window.scrollTo({top:document.querySelector('.content-col').offsetTop-10,behavior:'auto'}); }
  }

  // 초기: L0
  show('L0');
})();
</script>
</body>
</html>
