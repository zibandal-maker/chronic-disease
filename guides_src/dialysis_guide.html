<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>투석 학습 가이드 — 0층부터 여는 투석실</title>
<style>
/* ============ 디자인 토큰 (신장 보라 + 혈액/투석액 액센트) ============ */
:root{
  --kidney:#7C3AED; --kidney-deep:#5B21B6; --kidney-light:#EDE9FE; --kidney-accent:#A78BFA;
  --blood:#DC2626; --dialysate:#0D9488; --warn:#D97706;
  --grade-strong:#059669; --grade-mid:#D97706; --grade-weak:#6B7280;
  --ink:#1E1B2E; --ink-soft:#4C4763; --line:#E5E1F0; --paper:#FBFAFE; --card:#FFFFFF;
  --mono:'SF Mono',ui-monospace,'Menlo','Consolas',monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Malgun Gothic',sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:var(--sans);color:var(--ink);background:var(--paper);line-height:1.65;font-size:15px}
a{color:var(--kidney-deep)}

/* ============ 헤더 ============ */
header.top{background:linear-gradient(135deg,var(--kidney-deep),var(--kidney));color:#fff;padding:22px 18px 18px}
header.top .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;opacity:.8}
header.top h1{margin:6px 0 4px;font-size:21px;font-weight:800;letter-spacing:-.01em}
header.top p{margin:0;font-size:13px;opacity:.9}
header.top .principle{margin-top:12px;padding:9px 12px;background:rgba(255,255,255,.13);border-radius:9px;font-size:12.5px;border-left:3px solid var(--kidney-accent)}

/* ============ 레이아웃 ============ */
.wrap{max-width:920px;margin:0 auto;padding:0 0 60px}
@media(min-width:780px){
  .wrap{display:grid;grid-template-columns:208px 1fr;gap:0;padding:0 16px 60px;align-items:start}
  .nav-col{position:sticky;top:0;align-self:start;max-height:100vh;overflow-y:auto;padding:14px 8px 14px 0}
  .content-col{padding:14px 0 0 18px;border-left:1px solid var(--line)}
}

/* ============ 레이어 네비 (건물 단면 메타포) ============ */
.nav-col{padding:12px}
.nav-title{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;color:var(--ink-soft);text-transform:uppercase;margin:4px 6px 8px}
.tower{display:flex;flex-direction:column-reverse;gap:3px}/* column-reverse: L0를 바닥에 */
.floor{display:flex;align-items:center;gap:8px;padding:7px 9px;border:1px solid var(--line);border-radius:8px;background:var(--card);cursor:pointer;transition:.13s;font-size:12.5px}
.floor:hover{border-color:var(--kidney-accent);background:var(--kidney-light)}
.floor.active{background:var(--kidney);color:#fff;border-color:var(--kidney-deep)}
.floor .fid{font-family:var(--mono);font-size:10px;min-width:30px;opacity:.7}
.floor.active .fid{opacity:.9}
.floor .ficon{font-size:15px}
.floor .ftitle{flex:1;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tower-base{font-family:var(--mono);font-size:9.5px;color:var(--grade-weak);text-align:center;margin-top:6px;letter-spacing:.08em}
.nav-mobile-hint{display:none}
@media(max-width:779px){
  .nav-col{padding:10px 14px;border-bottom:1px solid var(--line);background:var(--card)}
  .tower{flex-direction:row;overflow-x:auto;flex-wrap:nowrap;gap:6px;padding-bottom:4px}
  .floor{flex:0 0 auto;flex-direction:column;min-width:62px;text-align:center;padding:8px 6px}
  .floor .ftitle{display:none}
  .floor .fid{min-width:auto}
  .tower-base{display:none}
}

/* ============ 콘텐츠 카드 ============ */
.layer-card{display:none}
.layer-card.shown{display:block;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.lc-head{padding:4px 0 14px;border-bottom:2px solid var(--kidney-light);margin-bottom:16px}
.lc-eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--kidney);display:flex;align-items:center;gap:8px}
.lc-eyebrow .num{background:var(--kidney-light);padding:1px 7px;border-radius:5px;font-weight:700}
.lc-head h2{margin:8px 0 5px;font-size:22px;font-weight:800;letter-spacing:-.015em;line-height:1.25}
.lc-head .sub{color:var(--ink-soft);font-size:13.5px}

/* core: 핵심 펼침 (항상 열림) */
.core{background:linear-gradient(180deg,var(--kidney-light),#fff);border:1px solid var(--line);border-left:4px solid var(--kidney);border-radius:11px;padding:15px 16px;margin-bottom:14px;font-size:15px}
.core strong{color:var(--kidney-deep)}
.core .core-tag{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--kidney);text-transform:uppercase;display:block;margin-bottom:7px}

/* analogy */
.analogy{background:#FFF8F3;border:1px dashed var(--warn);border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:13.5px;color:#7C4A12}
.analogy .a-tag{font-weight:700;margin-right:6px}

/* 아코디언 detail (접힘 기본) */
.detail-acc{border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:10px;background:var(--card)}
.detail-acc summary{padding:12px 14px;font-weight:600;font-size:14px;cursor:pointer;list-style:none;display:flex;align-items:center;gap:9px;color:var(--ink)}
.detail-acc summary::-webkit-details-marker{display:none}
.detail-acc summary .chev{margin-left:auto;transition:.2s;color:var(--kidney);font-size:13px}
.detail-acc[open] summary .chev{transform:rotate(90deg)}
.detail-acc summary:hover{background:var(--kidney-light)}
.detail-body{padding:0 14px 13px;font-size:13.5px;color:var(--ink-soft);white-space:pre-line;border-top:1px solid var(--line);padding-top:11px}

/* 수치 칩 */
.numbers{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0}
.numchip{border:1px solid var(--line);border-radius:9px;padding:8px 11px;background:var(--card);min-width:0;font-size:12.5px}
.numchip .nlabel{color:var(--ink-soft);font-size:11px;display:block}
.numchip .nval{font-family:var(--mono);font-weight:700;font-size:14px;color:var(--kidney-deep)}
.numchip .ngrade{font-size:10px;padding:1px 5px;border-radius:4px;margin-left:5px;color:#fff;vertical-align:middle}
.numchip .nnote{color:var(--ink-soft);font-size:11px;margin-top:3px;line-height:1.4}
.g-권고,.g-1A,.g-1B,.g-1C{background:var(--grade-strong)}
.g-2C,.g-2D,.g-1D,.g-B{background:var(--grade-mid)}
.g-관찰,.g-의견,.g-참고,.g-경고{background:var(--grade-weak)}

/* 트라이얼 카드 */
.trials{margin:14px 0}
.trial{border:1px solid var(--line);border-left:3px solid var(--dialysate);border-radius:9px;padding:11px 13px;margin-bottom:8px;background:var(--card);font-size:13px}
.trial .tname{font-weight:700;color:var(--ink)}
.trial .tyear{font-family:var(--mono);font-size:11px;color:var(--ink-soft)}
.trial .tteach{margin:5px 0 6px;color:var(--ink-soft);font-size:12.5px}
.trial a{font-size:11.5px;font-family:var(--mono);margin-right:12px;text-decoration:none}

/* viz 슬롯 (다음 단계에서 주입) */
.viz-slot{border:1.5px dashed var(--kidney-accent);border-radius:11px;padding:16px;margin:14px 0;text-align:center;background:var(--kidney-light);color:var(--kidney-deep);font-size:13px}
.viz-slot .vtag{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:5px;opacity:.7}

/* 급여 박스 */
.reimb{border:1px solid var(--line);border-radius:11px;margin:14px 0;overflow:hidden}
.reimb-head{background:#F0FDFA;padding:10px 14px;font-weight:700;font-size:13.5px;color:var(--dialysate);border-bottom:1px solid var(--line)}
.reimb-body{padding:12px 14px;font-size:13px}
.reimb .skeleton{color:var(--ink-soft)}
.reimb .gl{margin-top:8px;padding-top:8px;border-top:1px dashed var(--line);font-size:12.5px}
.reimb .gl b{color:var(--kidney-deep)}
.reimb .conflict{margin-top:10px;background:#FEF2F2;border:1px solid #FCA5A5;border-radius:8px;padding:9px 11px;color:var(--blood);font-size:12.5px}
.reimb .unverified{margin-top:9px;font-size:11px;color:var(--warn);font-style:italic}

/* 출처 */
.refs-foot{margin-top:30px;padding:18px 16px;background:var(--card);border:1px solid var(--line);border-radius:12px}
.refs-foot h3{margin:0 0 10px;font-size:14px;font-family:var(--mono);letter-spacing:.05em;color:var(--ink-soft)}
.refs-foot ul{margin:0;padding-left:18px;font-size:12px;color:var(--ink-soft);columns:1}
.refs-foot li{margin-bottom:4px;break-inside:avoid}
.disclaimer{margin-top:14px;font-size:11.5px;color:var(--grade-weak);text-align:center;line-height:1.6}

/* 접근성 */
:focus-visible{outline:2.5px solid var(--kidney);outline-offset:2px;border-radius:4px}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<header class="top">
  <div class="eyebrow">Dialysis Learning Guide · 0층부터 여는 투석실</div>
  <h1>투석, 블랙박스를 연다</h1>
  <p>아무 배경지식 없이도 — 물리 0층에서 임상 숫자까지 쌓아올리는 학습 도구</p>
  <div class="principle" id="globalPrinciple">관통 원리: <b>수치를 정상까지 밀어붙이지 않는다</b> — Kt/V 1.2, Hb 11.5 미만, PTH 약간 높게. 단 단백질은 충분히.</div>
</header>

<div class="wrap">
  <nav class="nav-col">
    <div class="nav-title">▲ 위층=임상 / 아래층=기전</div>
    <div class="tower" id="tower"></div>
    <div class="tower-base">▼ 0층: 물리 (확산·대류·UF)</div>
  </nav>

  <main class="content-col" id="content">
    <!-- 레이어 카드들이 여기 렌더됨 -->
  </main>
</div>

<!-- DATA 모듈 (조립 시 인라인 치환) -->
<script>/* ============================================================
   투석 학습 가이드 — DATA 레이어: 임상시험 레지스트리
   DIALYSIS_TRIALS  (전역 pmid: ID)
   ※ 모든 PMID PubMed 직접 검증 완료 (2026-06-27)
   ※ 하드코딩 금지 원칙: 본문 어디서도 이 값들을 문자열로 복제하지 말 것.
      ENGINE/UI는 pmid: ID로만 인용.
   ============================================================ */

var DIALYSIS_TRIALS = {
  "pmid:hemo2002": {
    id: "pmid:hemo2002",
    pmid: "12490682",
    doi: "10.1056/NEJMoa021583",
    name_ko: "HEMO 연구",
    name_en: "HEMO Study",
    journal: "N Engl J Med", year: 2002,
    design: "RCT (2x2 factorial)", n: 1846,
    question_ko: "주3회 투석에서 용량(Kt/V)·막(flux)을 더 올리면 생존이 좋아지나?",
    keyfindings_ko: [
      "표준 vs 고용량(spKt/V), 저flux vs 고flux 2x2 비교",
      "표준군 spKt/V 1.32(eKt/V 1.16) / 고용량군 spKt/V 1.71(eKt/V 1.53)",
      "고용량 투석은 전체사망·입원·삶의질에 유의한 이득 없음(사망 RR 0.96)",
      "고flux도 전체사망 유의차 없음(RR 0.92)"
    ],
    teaching_ko: "주3회에서 1.2를 넘기면 더 올려도 소용없다 — '충분함'의 하한 근거. spKt/V-eKt/V 갭(1.32→1.16, 1.71→1.53)이 리바운드의 실데이터",
    layers: ["L6"], grade_context: "랜드마크 RCT"
  },

  "pmid:fhn_daily2010": {
    id: "pmid:fhn_daily2010",
    pmid: "21091062",
    doi: "10.1056/NEJMoa1001593",
    name_ko: "FHN 주간(Daily) 시험",
    name_en: "FHN Daily Trial — In-center hemodialysis 6x vs 3x/week",
    journal: "N Engl J Med", year: 2010,
    design: "RCT", n: 245,
    question_ko: "투석 빈도를 주6회로 늘리면(센터 단시간) 결과가 좋아지나?",
    keyfindings_ko: [
      "빈도증가군 주5.2회, 주간 stdKt/V 3.54 vs 통상 2.49",
      "공동1차결과 둘 다 개선: 사망/좌심실질량↑ HR 0.61, 사망/신체건강저하 HR 0.70",
      "단, 혈관접근 관련 시술 더 많음 HR 1.71",
      "고혈압·고인산혈증 조절 개선"
    ],
    teaching_ko: "빈도를 올려 주간 stdKt/V를 키우는 건 세션당 Kt/V를 올리는 것과 물리적으로 다르다 — 대신 혈관접근 부담↑",
    layers: ["L6"], grade_context: "랜드마크 RCT"
  },

  "pmid:fhn_nocturnal2011": {
    id: "pmid:fhn_nocturnal2011",
    pmid: "21775973",
    doi: "10.1038/ki.2011.213",
    name_ko: "FHN 야간(Nocturnal) 시험",
    name_en: "FHN Nocturnal Trial — home nocturnal 6x vs conventional 3x/week",
    journal: "Kidney Int", year: 2011,
    design: "RCT", n: 87,
    question_ko: "가정 야간투석(주6회, 세션 6~8시간)이 통상투석보다 나은가?",
    keyfindings_ko: [
      "야간군 주간 stdKt/V 1.82배·치료시간 2.45배",
      "공동1차결과 유의차 미도달: 사망/LV질량 HR 0.68, 사망/신체건강 HR 0.91",
      "인·혈압 조절은 개선, 혈관접근 사건 증가 경향",
      "긴 세션 → 구획평형 충분 → 우레아 리바운드 작음(생리적)"
    ],
    teaching_ko: "느리고 긴 투석일수록 리바운드가 작아 더 생리적 — 단 임상 하드결과 입증은 제한적",
    layers: ["L5", "L6"], grade_context: "RCT (소규모)"
  },

  "pmid:ideal2010": {
    id: "pmid:ideal2010",
    pmid: "20581422",
    doi: "10.1056/NEJMoa1000552",
    name_ko: "IDEAL 시험",
    name_en: "IDEAL — Initiating Dialysis Early and Late",
    journal: "N Engl J Med", year: 2010,
    design: "RCT", n: 828,
    question_ko: "투석을 일찍(eGFR 10~14) 시작하면 늦게(5~7)보다 좋은가?",
    keyfindings_ko: [
      "호주·뉴질랜드 32센터, 조기개시 vs 지연개시 무작위 배정",
      "조기개시가 사망·심혈관·감염·투석합병증에서 우월하지 않음",
      "지연군 다수도 증상 기반으로 결국 더 일찍 시작하게 됨"
    ],
    teaching_ko: "투석 개시는 eGFR 숫자가 아니라 요독 증상으로 — 일찍 시작해도 더 오래 살지 않는다",
    layers: ["L7"], grade_context: "랜드마크 RCT (개시시점 유일 대규모)"
  }
};

</script>
<script>/* ============================================================
   투석 학습 가이드 — DATA 레이어: 임계값 단일 소스
   DIALYSIS_NUMBERS
   ※ 앱 전체에서 모든 수치는 여기서만 정의. ENGINE/UI 하드코딩 절대 금지.
   ※ 각 수치 = {value, unit, source(가이드라인), grade, layer, note}
   ※ source 표기는 원 가이드라인 등급 그대로. HIRA는 [원문재검증] 플래그.
   ============================================================ */

var DIALYSIS_NUMBERS = {

  /* ---------- L6 Adequacy (KDOQI HD Adequacy 2015) ---------- */
  "num:spktv_target": {
    value: 1.4, unit: "", lab: "lab:spktv",
    label_ko: "목표 spKt/V (주3회)",
    source: "KDOQI HD Adequacy 2015", grade: "권고", layer: "L6",
    note: "리바운드 감안한 처방 목표. 실제 전달은 낮아지므로 안전마진"
  },
  "num:spktv_min": {
    value: 1.2, unit: "", lab: "lab:spktv",
    label_ko: "최소 전달 spKt/V (주3회)",
    source: "KDOQI HD Adequacy 2015 / HEMO", grade: "권고", layer: "L6",
    note: "HEMO에서 이 선 넘으면 추가 이득 없음 — 하한 근거"
  },
  "num:urr_target": {
    value: 70, unit: "%", lab: "lab:urr",
    label_ko: "목표 URR", source: "KDOQI 2015", grade: "권고", layer: "L6",
    note: "최소 65%. 간단하나 UF·우레아생성 미반영"
  },
  "num:urr_min": {
    value: 65, unit: "%", lab: "lab:urr",
    label_ko: "최소 URR", source: "KDOQI 2015", grade: "권고", layer: "L6"
  },
  "num:ektv_gap": {
    value: 0.2, unit: "", lab: "lab:ektv",
    label_ko: "spKt/V→eKt/V 평균 갭",
    source: "약동학(2구획)", grade: "관찰", layer: "L5",
    note: "리바운드로 eKt/V는 sp보다 약 0.2 낮음. HEMO 실데이터: 1.32→1.16, 1.71→1.53"
  },
  "num:rebound_pct": {
    value: 15, unit: "%", lab: "lab:ktv",
    label_ko: "리바운드에 의한 Kt/V 저하",
    source: "약동학(2구획)", grade: "관찰", layer: "L5",
    note: "평균 30분에 BUN 17%↑, 일부 45%까지. Kt/V 약 15% 저하"
  },

  /* ---------- L10 IDH / UF rate ---------- */
  "num:ufr_danger": {
    value: 13, unit: "mL/kg/hr", lab: "lab:ufr",
    label_ko: "UF rate 위험 역치",
    source: "관찰연구(IDH·사망 연관)", grade: "관찰", layer: "L10",
    note: ">13에서 IDH·심근스터닝·사망 위험↑. 11.5에서도 빈번 IDH 보고"
  },
  "num:idwg_max": {
    value: 5, unit: "% 체중", lab: "",
    label_ko: "투석간 체중증가(IDWG) 권장 상한",
    source: "임상 관행", grade: "의견", layer: "L10",
    note: "초과 시 필요 UFR↑ → IDH 위험"
  },

  /* ---------- L8 Anemia (KDIGO 2026) ---------- */
  "num:hb_esa_start": {
    value: [9, 10], unit: "g/dL", lab: "lab:hb",
    label_ko: "ESA 시작 고려 Hb",
    source: "KDIGO 2026 Anemia", grade: "2D", layer: "L8",
    note: "투석환자 Hb ≤9.0~10.0 (Rec 3.2.1). 교정가능 원인 먼저 해결"
  },
  "num:hb_target_max": {
    value: 11.5, unit: "g/dL", lab: "lab:hb",

  "L5": {

      {h:"spKt/V vs eKt/V — 같은 투석, 다른 점수",

        "심혈관·혈전색전 사건, 혈관접근로 혈전, 새로 진단된 암이 생기면 중단한다. 위험군에서는 아예 피한다(KDIGO 2026)."},
      {h:"철분(iron) — ESA의 짝",
        t:"빈혈 치료는 EPO만으로 안 된다. 적혈구를 만들 재료인 철이 충분해야 한다. ferritin과 TSAT(transferrin 포화도)를 기준으로 정맥 철분(iron sucrose, ferric carboxymaltose)을 보충한다. "+
        "철을 충분히 주면 같은 Hb를 더 적은 ESA 용량으로 유지할 수 있다(DRIVE 연구)."},
      {h:"수혈 — 임의 숫자가 아니라 증상 기반",
        t:"수혈도 'Hb 몇이면 무조건'이 아니라 증상과 상황으로 판단한다. 대략적 기준 — 혈역학이 안정된 입원 성인은 Hb 7 미만, "+
        "심장수술 전은 7.5 미만, 정형외과 수술 전이나 심혈관질환이 있으면 8 미만. "+
        "이식을 원하는 환자는 동종감작(이식 거부 위험을 높임)을 피하려 수혈을 자제한다."},
      {h:"투여 경로 — 피하가 더 효율적",
        t:"실무 포인트. ESA는 피하주사가 정맥주사보다 적은 용량으로 같은 Hb를 유지한다(피하가 효율적). "+
        "그래서 피하에서 정맥으로 바꿀 때는 용량을 늘려야 한다 — epoetin alfa는 약 30% 증량, epoetin beta는 약 2배가 필요하다."},
      {h:"💰 HIRA 급여 맥락",
        t:"[코딩 직전 원문 재검증 필요] 한국은 HIRA 적정성평가에서 'Hb 10 g/dL 미만 환자 비율'을 모니터링 지표로 쓴다. "+
        "EPO 급여의 흔한 방아쇠가 Hb 10 미만이다. 약전 주의: Hb 12를 넘기면 심혈관 위험이 커진다. "+
        "가이드라인(목표 11.5 미만)과 급여(10 미만 트리거)는 대체로 정합하지만, 과교정 시 삭감에 주의한다."}
    ],
    analogy_ko: "빈혈 교정은 '연료를 가득 채우는 것'이 아니라 '시동이 걸릴 만큼만 채우는 것'이다. "+
      "가득(Hb 13 이상) 채우면 오히려 엔진(심혈관)이 상한다. 그래서 일부러 정상보다 낮은 선에서 멈춘다.",
    numbers: ["num:hb_esa_start","num:hb_target_max","num:hb_overcorrect","num:hb_hira_gate","num:transfusion_threshold"],
    viz: "viz:hb_target_band",
    refs: ["ref:kdigo_anemia2026","ref:nephjc_anemia","ref:hira_quality"]
  },

  "L9": {
    id: "L9", icon: "🦴", title_ko: "CKD-MBD — 뼈·미네랄·혈관석회화",
    subtitle_ko: "phosphate↑·비타민D↓ → 부갑상선 자극 → 뼈 녹고 혈관 굳는다",
    concept_ids: ["concept:ckd_mbd","concept:shpt"],
    drug_ids: ["drug:sevelamer","drug:lanthanum","drug:calcium_acetate","drug:cinacalcet","drug:etelcalcetide","drug:calcitriol"],
    comorbid_ids: ["comorbid:shpt","comorbid:ckd_mbd"],
    core_ko:
      "콩팥이 망가지면 두 가지가 동시에 일어난다 — phosphate(인) 배설이 줄어 고인산혈증이 오고, 활성 비타민 D 생성이 줄어 저칼슘혈증이 온다. "+
      "이 둘이 부갑상선을 자극해 **이차성 부갑상선기능항진증(SHPT, secondary hyperparathyroidism)**을 일으키고, 결국 뼈가 녹고 혈관이 석회화된다. "+
      "처방의 두 원칙: **칼슘 기반 인결합제는 제한**하고, **PTH(부갑상선호르몬)는 정상까지 누르지 않는다**(무형성 골질환 방지). 빈혈과 똑같은 '덜 교정' 철학이다.",
    detail_ko: [
      {h:"연쇄 메커니즘 — 도미노처럼 무너진다",
        t:"순서대로 따라가 보자. 인 배설↓ → 혈중 인↑. 활성 비타민 D 생성↓ → 장에서 칼슘 흡수↓ → 혈중 칼슘↓. "+
        "이 '인↑ + 칼슘↓'가 부갑상선을 자극한다 → PTH↑(SHPT). "+
        "PTH는 혈중 칼슘을 올리려고 뼈에서 칼슘을 빼낸다 → 뼈가 약해진다. 동시에 빠져나온 인·칼슘이 혈관 벽에 침착된다 → 혈관 석회화.\n"+
        "여기서 L6과 직접 이어진다 — Kt/V가 못 보는 phosphate가 이 연쇄의 첫 도미노다. 투석으로는 인이 충분히 안 빠지기 때문에 식이·약으로 따로 관리해야 한다(L13)."},
      {h:"인 강하 — 선제적으로 쓰지 않는다",
        t:"인결합제(phosphate binder)는 음식의 인이 흡수되지 못하게 장에서 붙잡는 약이다. 단 인이 진행성으로/지속적으로 높을 때만 쓰고, 미리 예방적으로 쓰지 않는다.\n"+
        "약 선택이 중요하다 — 칼슘 기반 결합제(calcium acetate)는 칼슘 부하를 늘려 혈관 석회화를 악화시킬 수 있다. 그래서 KDIGO 2017은 칼슘 기반 결합제를 제한하고, "+
        "비칼슘 결합제(sevelamer, lanthanum)를 선호한다. calcium acetate는 1차로 쓰되 칼슘 부하에 주의한다."},
      {h:"PTH 조절 — 정상까지 누르지 않는다",
        t:"투석 환자 SHPT에서 PTH를 낮추려면 calcimimetic(cinacalcet 경구, etelcalcetide 정맥)을 쓴다. 이 약은 부갑상선의 칼슘 수용체를 자극해 'PTH를 그만 만들라'는 신호를 준다. "+
        "여기에 calcitriol(활성 비타민 D)이나 비타민 D 유사체를 병용한다.\n"+
        "핵심 원칙: PTH를 정상 범위까지 완전히 누르지 않는다. 너무 누르면 뼈 교체가 멈춘 무형성 골질환(adynamic bone disease)이 생기기 때문이다 — "+
        "이건 L8 빈혈의 '덜 교정이 안전' 철학과 똑같은 패턴이다. 투석 관리 전체를 관통하는 '정상까지 밀어붙이지 않는다'가 여기서도 작동한다."},
      {h:"투석액 칼슘 — 투석으로도 조절한다",
        t:"투석액의 칼슘 농도를 1.25~1.50 mmol/L로 둔다. L3에서 본 양방향 교환을 떠올리면 — 투석액 칼슘 농도를 조절해 "+
        "투석 중 칼슘을 더 빼거나 덜 빼는 식으로 칼슘 균형까지 다룰 수 있다. 약뿐 아니라 투석액도 미네랄 관리의 도구다."}
    ],
    analogy_ko: "SHPT는 '도미노'다. 인↑·칼슘↓가 첫 패를 밀면 부갑상선이 과로하고(PTH↑), PTH가 뼈에서 칼슘을 빼내 혈관에 쌓는다. "+
      "그런데 칼슘제로 막으려다 오히려 혈관에 칼슘을 더 붓는 함정이 있다 — 그래서 비칼슘 결합제를 선호한다.",
    numbers: ["num:dialysate_ca"],
    viz: "viz:shpt_cascade",
    refs: ["ref:kdigo_mbd2017"]
  },

  "L10": {
    id: "L10", icon: "📉", title_ko: "투석 중 저혈압(IDH) — 투석실 최다 합병증",
    subtitle_ko: "UF가 plasma refill보다 빠르면 혈관이 빈다",
    concept_ids: ["concept:idh","concept:dry_weight","concept:plasma_refill"],
    comorbid_ids: ["comorbid:idh"],
    core_ko:
      "투석은 혈관에서 물을 빼낸다(UF). 그런데 조직에서 혈관으로 물이 다시 채워지는 속도(plasma refill, 혈장 재충전)보다 "+
      "빼는 속도가 빠르면, 혈관 안이 비어 **혈압이 떨어진다**. 이것이 투석 중 저혈압(IDH, intradialytic hypotension)이고, 외래 투석에서 가장 흔한 합병증이다. "+
      "여기가 네가 투석실에서 실제로 가장 자주 마주칠 사건이다.",
    detail_ko: [
      {h:"메커니즘 — UF 속도 vs plasma refill",
        t:"투석으로 물을 빼면 혈관 안 물이 줄어든다. 그러면 조직 사이 공간에 있던 물이 혈관으로 스며들어 채운다(plasma refill). "+
        "이 두 속도의 균형이 핵심이다 — refill이 UF를 따라잡으면 혈관이 안 비어 혈압이 유지되지만, UF가 refill을 추월하면 혈관이 비어 혈압이 급락한다.\n"+
        "위험 역치는 UF rate(시간·체중당 빼는 속도)가 약 13 mL/kg/hr를 넘을 때다(11.5에서도 잦은 IDH가 보고된다). "+
        "이 'mL/kg/hr'가 L1에서 본 체중 보정이고, CRRT의 effluent dose 단위와 정확히 같은 발상이다."},
      {h:"왜 위험한가 — 단순 불편이 아니다",
        t:"IDH를 '투석 중 잠깐 어지러운 것' 정도로 보면 안 된다. 혈관 내 고갈 → 저혈압 → 관상동맥 혈류 감소 → 심근 허혈/스터닝(stunning, 일시적 심근 기능저하)으로 이어진다. "+
        "이게 반복되면 심실 재형성(remodeling)과 심부전으로 진행한다. 실제로 잦고 심한 IDH는 사망 위험 증가와 연관된다. "+
        "매 투석마다 조금씩 심장을 상하게 하는 것이라, '그냥 흔한 일'로 넘기면 안 되는 이유다."},
      {h:"dry weight(건체중) — 정량 지표 없는 임상 판단",
        t:"환자에게서 물을 어디까지 뺄지의 목표가 dry weight(건체중)다. 두 정의가 있다 — '절대적' 건체중은 신장병 없는 사람 기준의 이상 체액량이고, "+
        "'기능적' 건체중은 저혈압 없이 유지 가능한 최소 세포외액 상태의 체중이다(임상에선 후자를 쓴다).\n"+
        "문제는 이걸 재는 정량 지표가 없다는 점이다. 그래서 투석 전 혈압과 그 변화, 근경련, 폐 울혈로 인한 호흡곤란, 말초 부종, 두근거림, 두통·어지럼, 발한, 투석 후 피로 등을 "+
        "종합해 임상적으로 판단한다. 바로 이 부분이 신장내과의 '암묵지'를 대표하는 영역이다 — 숫자로 안 떨어지는, 경험으로 읽는 판단."},
      {h:"관리 — 여러 층으로 접근한다",
        t:"IDH를 줄이는 방법은 한 가지가 아니라 여러 층이다.\n"+
        "• 투석간 체중증가(IDWG)를 줄이도록 교육 — 물·소금을 덜 먹으면 뺄 물이 줄어 UF rate가 낮아진다(L13)\n"+
        "• 목표 체중을 자주 재평가\n"+
        "• 투석액 조성·온도 조정 — 온도를 약간 낮추면 혈관수축으로 혈압을 보존한다(L3)\n"+
        "• 대류요법(HDF)으로 열 손실을 늘려 혈압 보존\n"+
        "• 세션 시간·빈도를 늘려 시간당 필요한 UF rate를 낮추기 — 같은 물을 더 천천히 빼면 refill이 따라잡는다"},
      {h:"CRRT와의 연결",
        t:"왜 중환자실에서 불안정한 환자에게 IHD(일반 투석) 대신 CRRT를 쓸까? 바로 이 IDH 때문이다. "+
        "CRRT는 24시간 연속으로 천천히 빼 시간당 UF rate를 낮게 유지한다. 그래서 혈압이 안정적이다. "+
        "패혈증·다장기부전처럼 혈역학이 불안정한 환자에게 CRRT가 선호되는 핵심 근거가 이것이다(BRIDGE에서 다시)."}
    ],
    analogy_ko: "IDH는 '빨대로 주스를 너무 빨리 빠는 것'이다. 컵(조직)에서 빨대 끝(혈관)으로 주스가 차오르는 속도(plasma refill)보다 "+
      "빨리 빨면, 빨대 끝이 공기를 빨아(혈압↓) 꼬르륵거린다. 천천히 빨면 컵에서 계속 채워져 공기가 안 들어온다.",
    numbers: ["num:ufr_danger","num:idwg_max"],
    viz: "viz:ufr_bp",
    refs: ["ref:cjasn_idh","ref:ki_volume","ref:icu_bridge"]
  },

  "L11": {
    id: "L11", icon: "🔗", title_ko: "혈관접근 — 분당 수백 mL를 뽑는 통로",
    subtitle_ko: "AVF > AVG > CVC (합병증 적은 순). Rule of 6s와 LOOK·LISTEN·FEEL",
    concept_ids: ["concept:maturation","concept:thrill","concept:bruit","concept:rule_of_6s"],
    proc_ids: ["proc:avf","proc:avg","proc:cvc","proc:angioplasty","proc:thrombectomy"],
    core_ko:
      "혈액투석을 하려면 분당 수백 mL의 피를 뽑아야 하는데, 보통 혈관으로는 불가능하다. 그래서 고유량 통로를 따로 만든다. "+
      "세 종류가 있고 우열이 분명하다 — **①AVF(자가 동정맥루)** 최선 → **②AVG(인조혈관 그라프트)** → **③CVC(중심정맥 카테터)** 최악(감염·혈전 위험 최고). "+
      "합병증이 적은 순서가 곧 선호 순서다.",
    detail_ko: [
      {h:"세 가지 접근 — 우열의 이유",
        t:"• AVF(arteriovenous fistula, 동정맥루): 환자 자신의 동맥과 정맥을 직접 연결한 것. 가장 좋다 — 장기 개통률이 높고 감염·혈전이 적다. "+
        "단점은 만든 뒤 쓸 수 있게 익는 데(성숙) 1.5~3개월이 걸린다는 점.\n"+
        "• AVG(arteriovenous graft, 인조혈관): 합성 도관으로 동맥과 정맥을 잇는다. 빨리 쓸 수 있지만 혈전·감염 위험이 AVF보다 높다.\n"+
        "• CVC(central venous catheter, 카테터): 큰 정맥에 관을 꽂는다. 즉시 쓸 수 있지만 감염·혈전 위험이 가장 높다. 1년 미만 기대여명 같은 제한된 상황에서 쓴다."},
      {h:"성숙 판정 — Rule of 6s (외우기)",
        t:"AVF가 충분히 익었는지(성숙) 판정하는 기억하기 쉬운 규칙이 Rule of 6s다 — 직경 >6 mm, 깊이 <6 mm, 혈류 >600 mL/min, "+
        "수술 6주 후 평가, 천자 가능 길이 >6 cm. 6주 후 이 기준을 못 채우면 비성숙으로 보고 영상검사(fistulogram)를 한다.\n"+
        "주의: 2019 KDOQI 가이드라인은 이 정량 기준을 버리고 '임상 판단'을 권고한다. 그래도 Rule of 6s는 직관적이어서 학습용 출발점으로 좋다 — "+
        "숫자로 감을 잡은 뒤, 실제로는 종합 판단이라는 점을 함께 기억하면 된다."},
      {h:"감시 — 손으로 LOOK·LISTEN·FEEL",
        t:"접근로 유지의 핵심은 매 투석마다 손으로 살피는 것이다 — 보고(LOOK), 청진기로 듣고(LISTEN), 손으로 만진다(FEEL).\n"+
        "정상 소견: 문합부(동맥-정맥 연결부)에 부드럽고 연속적인 thrill(떨림 진동)이 만져지고, 청진하면 biphasic bruit(이중성 잡음)가 들린다. "+
        "혈관은 쉽게 만져지고 눌리며, 팔을 들면 collapse(납작해짐)한다 — 이건 중심정맥에 협착이 없다는 뜻이다."},

  "L12": {

      "잘 빠지는 약은 줄이는 게 아니라 오히려 투석 후 '보충'해야 한다 — 투석이 약까지 함께 빼버리기 때문이다.",
    detail_ko: [
      {h:"빠지는 약의 4가지 물성 (L1 물리의 응용)",

        "• 분자 크기가 작을수록 → 막을 잘 통과한다(urea처럼)\n"+

        "• 분포용적(Vd, volume of distribution)이 작을수록 → 잘 빠진다. 약이 혈관에 머물러 있어야 투석기가 잡는다. 조직 깊이 퍼진 약은 못 잡는다\n"+

        "• 안 빠짐: digoxin·amiodarone은 Vd가 매우 크다(조직에 깊이 분포) → 혈관 안 약이 적어 투석기가 거의 못 잡는다 → 보충이 불필요하다.\n"+
        "특히 흥미로운 건 vancomycin이다 — 예전 low-flux 막에서는 '안 빠진다'고 알려졌지만, 요즘 high-flux 막에서는 30~49%나 빠지고 투석 후 16~36%의 rebound도 있다. "+

      {h:"보충 용량과 타이밍 — 언제 주느냐가 중요하다",

        "투석 세션은 약물 투여 간격의 '끝'에 시작하는 게 이상적이고, 잘 빠지는 항생제는 **투석 후에 투여**하는 게 원칙이다.\n"+
        "예: ceftazidime은 매 투석 후 1 g을 주는 게 표준이다(FDA·국제 권고). 무뇨 환자에서 반감기 33.6시간이던 약이 투석 중에는 3.3시간으로 짧아지므로, 투석이 끝난 뒤 새로 채워주는 것이다."},
      {h:"주의 — 투석이 Vd를 흔든다",
        t:"한 가지 더. 투석은 혈관 내 용적과 단백 결합을 급격히 바꿔 약의 겉보기 Vd에 일시적으로 영향을 준다. "+
        "그래서 만성신부전 데이터로 만든 용량 권고가 실제와 어긋날 수 있다 — Vd·단백 결합·투석 타이밍을 함께 고려해야 한다. "+

      "큰 덩어리(digoxin·amiodarone)는 체 위에 남는다. 빠져나간 만큼 다시 채워야(보충) 약효가 유지된다.",

  "L13": {

    detail_ko: [
      {h:"단백질 — 늘려라 (반직관)",
        t:"투석 전 만성신부전 환자는 콩팥 부담을 줄이려 단백질을 제한한다. 그런데 투석 환자는 반대로 충분히(1.0~1.2 g/kg/일) 먹어야 한다.\n"+
        "이유는 두 가지다 — 첫째, 투석 한 세션마다 아미노산이 5~8 g씩 빠져나가니 이를 보충해야 한다. 둘째, 영양실조(단백에너지 소모, PEW)를 막아야 한다.\n"+

      {h:"나트륨(Na) — 2.3 g/일 미만",
        t:"나트륨 제한이 중요한 이유는 연쇄 효과 때문이다 — 나트륨을 많이 먹으면 갈증이 나고 → 물을 더 마시게 되고 → 투석간 체중증가(IDWG)와 혈압이 오른다. "+

      {h:"칼륨(K) — 개별화로 바뀌었다 (최신)",
        t:"과거에는 칼륨을 일률적으로 제한했지만, 지금은 개별화한다. 이유: 과일·채소·통곡물의 칼륨은 생체이용률(실제 흡수율)이 생각보다 낮아서 무리하게 제한할 필요가 없고, "+

      {h:"인(phosphate) — 무기인(첨가물)이 진짜 문제다",

        "참고로 빈도가 높은 가정 혈액투석은 자주 물을 빼므로 수분 제한이 더 느슨하다 — 매일 빼면 한 번에 쌓이는 물이 적기 때문이다."}

    analogy_ko: "투석 식이는 '들어오는 것과 빠지는 것의 수지 균형'이다. 콩팥이 못 빼는 Na·K·인·물은 입구에서 막고, "+

<script>/* ============================================================
   CRRT 시뮬레이터 모듈 — ENGINE 레이어 (이식 핵심)
   crrtCompute(params, DATA) → 결과 객체
   ※ 자기완결 정문. L15도 ICU 계산기도 이 함수만 호출.
   ※ 공식 상수는 DATA(CRRT_DATA.consts)에서 조회 — 하드코딩 금지.
   ※ 검증된 관계식:
       Qp = BFR×60×(1−Hct)
       Effluent = Qd + Qr_pre + Qr_post + Qnet
       Dilution = Qp/(Qp+Qr_pre)
       FF = TotalUF/(Qp+Qr_pre)
   ============================================================ */

function crrtCompute(params, DATA) {
  var C = DATA.consts;
  // 상수 추출(값은 DATA 단독 소유)
  var doseTarget = C["const:kdigo_dose_target"].value;   // [20,25]
  var ffWarn = C["const:ff_warn"].value;                  // 25
  var nufWarn = C["const:nuf_warn"].value;                // 2
  var bfrLow = C["const:bfr_low"].value;                  // 100
  var bfrHigh = C["const:bfr_high"].value;                // 250
  var flowSat = C["const:flow_fraction_sat"].value;       // 0.4

  var weight = +params.weight, hct = +params.hct, bfr = +params.bfr;
  var modality = params.modality || "CVVHDF";
  var uses = DATA.modalities[modality].uses;
  // 모달리티에 따라 비활성 입력은 0 처리
  var qd = uses.qd ? +params.qd : 0;
  var qrPre = uses.qr ? +params.qr_pre : 0;
  var qrPost = uses.qr ? +params.qr_post : 0;
  var qnet = +params.qnet;

  // --- 1. Plasma flow rate (mL/hr) ---
  var qp = bfr * 60 * (1 - hct / 100);

  // --- 2. Effluent rate & dose ---
  var effluent = qd + qrPre + qrPost + qnet;         // mL/hr
  var doseRaw = weight > 0 ? effluent / weight : 0;  // mL/kg/hr (희석 전)

  // --- 3. Dilution factor (pre 보충액이 희석) ---
  var dilution = (qp + qrPre) > 0 ? qp / (qp + qrPre) : 1;
  var doseActual = doseRaw * dilution;               // 실제 dose

  // --- 4. Filtration Fraction ---
  var totalUF = qrPre + qrPost + qnet;               // 막을 통한 총 한외여과
  var ff = (qp + qrPre) > 0 ? (totalUF / (qp + qrPre)) * 100 : 0;

  // --- 5. NUF rate (순한외여과 / 체중) ---
  var nufRate = weight > 0 ? qnet / weight : 0;      // mL/kg/hr

  // --- 6. flow fraction (확산 포화, CVVHD/HDF) ---
  var flowFraction = (bfr * 60) > 0 ? qd / (bfr * 60) : 0;

  // --- 플래그(경고) 생성 ---
  var flags = [];
  if (ff > ffWarn) flags.push({ level: "danger", key: "ff",
    text: "Filtration Fraction " + ff.toFixed(0) + "% > " + ffWarn + "% — 혈액농축으로 필터 응고 위험. BFR↑ 또는 전희석 보충액↑으로 낮추세요." });
  if (nufRate > nufWarn) flags.push({ level: "danger", key: "nuf",
    text: "NUF " + nufRate.toFixed(1) + " > " + nufWarn + " mL/kg/hr — 혈역학 부담. 생명위협 용적과부하가 아니면 Qnet↓." });
  if (bfr < bfrLow) flags.push({ level: "warn", key: "bfr_low",
    text: "혈류 " + bfr + " < " + bfrLow + " mL/min — 정체로 응고 위험↑." });
  if (bfr > bfrHigh) flags.push({ level: "warn", key: "bfr_high",
    text: "혈류 " + bfr + " > " + bfrHigh + " mL/min — 접근로 부담·회로수명↓." });
  // dose 평가
  var doseStatus;
  if (doseActual < doseTarget[0]) { doseStatus = "low";
    flags.push({ level: "warn", key: "dose_low",
      text: "실제 dose " + doseActual.toFixed(1) + " < " + doseTarget[0] + " mL/kg/hr — 목표 미달. effluent↑ 또는 downtime↓." }); }
  else if (doseActual <= doseTarget[1]) { doseStatus = "target"; }
  else { doseStatus = "high";
    flags.push({ level: "info", key: "dose_high",
      text: "dose " + doseActual.toFixed(1) + " > " + doseTarget[1] + " — ATN·RENAL상 고용량 추가이득 없음(고암모니아 등 예외)." }); }
  // 전희석 희석 손실 안내
  if (qrPre > 0 && dilution < 0.95) flags.push({ level: "info", key: "dilution",
    text: "전희석으로 dose가 " + Math.round((1 - dilution) * 100) + "% 희석됨(" + doseRaw.toFixed(1) + "→" + doseActual.toFixed(1) + "). 응고는 줄지만 효율 손해." });

  return {
    // 핵심 출력
    plasmaFlow: qp,                       // mL/hr
    effluent: effluent,                   // mL/hr
    doseRaw: doseRaw,                     // mL/kg/hr (희석 전)
    doseActual: doseActual,              // mL/kg/hr (희석 후, 실제)
    dilutionFactor: dilution,           // 0~1
    ff: ff,                              // %
    nufRate: nufRate,                   // mL/kg/hr
    flowFraction: flowFraction,         // 0~1
    doseStatus: doseStatus,             // low/target/high
    flags: flags,
    // 입력 에코(UI 편의)
    modality: modality,
    inputs: { weight: weight, hct: hct, bfr: bfr, qd: qd, qrPre: qrPre, qrPost: qrPost, qnet: qnet }
  };
}

</script>
<script>/* ============================================================
   CRRT 시뮬레이터 — UI 위젯 (순수 ES5)
   mountCrrtSimulator(slot, CRRT_DATA, crrtCompute)
   ※ UI만 환경별 교체 가능. ENGINE/DATA는 그대로 이식.
   ============================================================ */
(function (global) {
  var KIDNEY = '#7C3AED', DEEP = '#5B21B6', LIGHT = '#EDE9FE', BLOOD = '#DC2626',
      DIALYSATE = '#0D9488', WARN = '#D97706', INK = '#1E1B2E', SOFT = '#6B7280',
      LINE = '#E5E1F0', GREEN = '#059669';

  global.mountCrrtSimulator = function (slot, DATA, compute) {
    var state = {
      weight: DATA.params.weight.default, hct: DATA.params.hct.default,
      modality: 'CVVHDF', bfr: DATA.params.bfr.default, qd: DATA.params.qd.default,
      qr_pre: DATA.params.qr_pre.default, qr_post: DATA.params.qr_post.default,
      qnet: DATA.params.qnet.default
    };

    var wrap = document.createElement('div');
    wrap.style.cssText = 'background:#fff;border:1px solid ' + LINE + ';border-radius:12px;padding:14px;margin:14px 0';

    // 모달리티 토글
    var modBar = document.createElement('div');
    modBar.style.cssText = 'display:flex;gap:6px;margin-bottom:12px';
    ['CVVH', 'CVVHD', 'CVVHDF'].forEach(function (m) {
      var b = document.createElement('button');
      b.textContent = m;
      b.style.cssText = 'flex:1;padding:8px 4px;border-radius:8px;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit;border:1px solid ' + LINE + ';background:#fff;color:' + SOFT;
      b.addEventListener('click', function () { state.modality = m; render(); });
      b._mod = m; modBar.appendChild(b);
    });
    wrap.appendChild(modBar);

    var modDesc = document.createElement('div');
    modDesc.style.cssText = 'font-size:11.5px;color:' + SOFT + ';margin-bottom:12px;text-align:center;min-height:16px';
    wrap.appendChild(modDesc);

    // 출력 패널
    var outPanel = document.createElement('div');
    outPanel.style.cssText = 'background:' + LIGHT + ';border-radius:10px;padding:12px;margin-bottom:14px';
    wrap.appendChild(outPanel);

    // 슬라이더 컨테이너
    var sliderBox = document.createElement('div');
    wrap.appendChild(sliderBox);

    // 플래그 영역
    var flagBox = document.createElement('div');
    flagBox.style.cssText = 'margin-top:10px';
    wrap.appendChild(flagBox);

    slot.innerHTML = ''; slot.appendChild(wrap);

    // 슬라이더 정의
    var sliderDefs = [
      { key: 'weight', chain: null }, { key: 'hct', chain: 'hct' },
      { key: 'bfr', chain: 'bfr' }, { key: 'qd', chain: 'qd' },
      { key: 'qr_pre', chain: 'qr_pre' }, { key: 'qr_post', chain: 'qr_post' },
      { key: 'qnet', chain: 'qnet' }
    ];
    var sliderEls = {};
    sliderDefs.forEach(function (sd) {
      var pdef = DATA.params[sd.key];
      var row = document.createElement('div');
      row.style.cssText = 'margin:9px 0';
      var lab = document.createElement('label');
      lab.style.cssText = 'font-size:12px;display:flex;justify-content:space-between;color:' + INK;
      var val = document.createElement('span');
      val.style.cssText = 'font-family:monospace;font-weight:700;color:' + DEEP;
      lab.appendChild(document.createTextNode(pdef.label_ko));
      lab.appendChild(val);
      var inp = document.createElement('input');
      inp.type = 'range'; inp.min = pdef.min; inp.max = pdef.max; inp.step = pdef.step;
      inp.value = state[sd.key];
      inp.style.cssText = 'width:100%;accent-color:' + KIDNEY + ';margin-top:3px';
      inp.addEventListener('input', function () { state[sd.key] = +inp.value; render(); });
      var chain = document.createElement('div');
      chain.style.cssText = 'font-size:10.5px;color:' + SOFT + ';margin-top:2px;line-height:1.4';
      row.appendChild(lab); row.appendChild(inp); row.appendChild(chain);
      sliderBox.appendChild(row);
      sliderEls[sd.key] = { row: row, val: val, inp: inp, chain: chain, def: pdef, chainKey: sd.chain };
    });

    function gauge(label, value, unit, lo, hi, color, sub) {
      var pct = Math.min(100, Math.max(0, (value / hi) * 100));
      var h = '<div style="margin-bottom:8px">';
      h += '<div style="display:flex;justify-content:space-between;font-size:11px;color:' + INK + '"><span>' + label + '</span>' +
        '<span style="font-family:monospace;font-weight:800;font-size:14px;color:' + color + '">' + value + ' ' + unit + '</span></div>';
      h += '<div style="height:10px;border-radius:5px;background:' + LINE + ';position:relative;overflow:hidden;margin-top:3px">' +
        '<div style="height:100%;width:' + pct + '%;background:' + color + ';border-radius:5px;transition:width .15s,background .15s"></div>';
      if (lo != null) h += '<div style="position:absolute;top:-1px;bottom:-1px;width:2px;background:' + GREEN + ';left:' + ((lo / hi) * 100) + '%"></div>';
      h += '</div>';
      if (sub) h += '<div style="font-size:10px;color:' + SOFT + ';margin-top:2px">' + sub + '</div>';
      h += '</div>';
      return h;
    }

    function render() {
      // 모달리티 버튼 상태
      var uses = DATA.modalities[state.modality].uses;
      modDesc.textContent = DATA.modalities[state.modality].name_ko + ' · ' + DATA.modalities[state.modality].mechanism;
      for (var i = 0; i < modBar.children.length; i++) {
        var b = modBar.children[i], on = b._mod === state.modality;
        b.style.background = on ? KIDNEY : '#fff';
        b.style.color = on ? '#fff' : SOFT;
        b.style.borderColor = on ? DEEP : LINE;
      }
      // 슬라이더 활성/비활성(모달리티)
      sliderDefs.forEach(function (sd) {
        var el = sliderEls[sd.key];
        var disabled = (sd.key === 'qd' && !uses.qd) || ((sd.key === 'qr_pre' || sd.key === 'qr_post') && !uses.qr);
        el.row.style.opacity = disabled ? '0.35' : '1';
        el.inp.disabled = disabled;
        el.val.textContent = state[sd.key] + ' ' + el.def.unit;
        // 연쇄 설명
        if (sd.chainKey && DATA.chains[sd.chainKey] && !disabled) {
          var c = DATA.chains[sd.chainKey];
          el.chain.innerHTML = '↑ ' + c.up_ko + ' <span style="color:' + WARN + '">· ' + c.tradeoff_ko + '</span>';
        } else el.chain.innerHTML = '';
      });

      // 계산
      var r = compute(state, DATA);
      var doseColor = r.doseStatus === 'target' ? GREEN : (r.doseStatus === 'low' ? BLOOD : WARN);
      var ffColor = r.ff > DATA.consts['const:ff_warn'].value ? BLOOD : (r.ff > 18 ? WARN : GREEN);
      var nufColor = r.nufRate > DATA.consts['const:nuf_warn'].value ? BLOOD : GREEN;

      var oh = '';
      oh += gauge('Effluent dose (실제)', r.doseActual.toFixed(1), 'mL/kg/hr', 20, 30, doseColor,
        '목표 20~25(초록선) · 처방 25~30 · ' + (r.doseStatus === 'target' ? '✓ 목표대' : r.doseStatus === 'low' ? '✗ 미달' : '△ 고용량'));
      oh += gauge('Filtration Fraction', r.ff.toFixed(0), '%', null, 40, ffColor,
        '> ' + DATA.consts['const:ff_warn'].value + '% 응고 위험');
      oh += gauge('NUF rate', r.nufRate.toFixed(2), 'mL/kg/hr', null, 4, nufColor,
        '> ' + DATA.consts['const:nuf_warn'].value + ' 혈역학 부담');
      // 보조 수치
      oh += '<div style="display:flex;gap:10px;font-size:10.5px;color:' + SOFT + ';margin-top:4px;flex-wrap:wrap">' +
        '<span>Plasma flow: <b style="font-family:monospace;color:' + INK + '">' + Math.round(r.plasmaFlow) + '</b> mL/hr</span>' +
        '<span>Effluent: <b style="font-family:monospace;color:' + INK + '">' + r.effluent + '</b> mL/hr</span>' +
        (r.dilutionFactor < 0.999 ? '<span>희석계수: <b style="font-family:monospace;color:' + WARN + '">' + r.dilutionFactor.toFixed(2) + '</b></span>' : '') +
        '</div>';
      outPanel.innerHTML = oh;

      // 플래그
      var fh = '';
      r.flags.forEach(function (f) {
        var col = f.level === 'danger' ? BLOOD : (f.level === 'warn' ? WARN : SOFT);
        var bg = f.level === 'danger' ? '#FEF2F2' : (f.level === 'warn' ? '#FFF8F3' : '#F9FAFB');
        var icon = f.level === 'danger' ? '🚨' : (f.level === 'warn' ? '⚠️' : 'ℹ️');
        fh += '<div style="background:' + bg + ';border-left:3px solid ' + col + ';border-radius:6px;padding:7px 10px;margin-bottom:5px;font-size:11.5px;color:' + INK + '">' + icon + ' ' + f.text + '</div>';
      });
      flagBox.innerHTML = fh || '<div style="font-size:11.5px;color:' + GREEN + ';text-align:center;padding:6px">✓ 모든 파라미터 안전 범위</div>';
    }

    render();
  };
})(typeof window !== 'undefined' ? window : this);
</script>
<script>/* ============================================================
   HD UF 시뮬레이터 모듈 — DATA + ENGINE (자기완결)
   HDUF_DATA / hdUfCompute(params, DATA)
   ※ CRRT 모듈과 대칭 구조. 같은 물리(물 빼기)를 4시간 압축으로.
   ※ UFR 임계값은 근거 검증 완료. 하드코딩 아닌 DATA 단독 소유.
   ※ 정문: hdUfCompute(params) → {ufTotal, ufRate, ufRateUnscaled, idhRisk, flags}
   ============================================================ */

var HDUF_DATA = {

  /* ---- 근거 임계값 (const:) ---- */
  consts: {
    "const:ufr_warn": { value: 13, unit: "mL/kg/hr",
      label: "UFR 위험 상한(CMS 품질지표)", source: "Flythe 2011 (HEMO 사후분석)",
      note: ">13 전원인사망 59%·심혈관사망 71%↑. 상한이지 안전선 아님" },
    "const:ufr_caution": { value: 10, unit: "mL/kg/hr",
      label: "UFR 주의 시작선", source: "Assimon 2016 / Kim",
      note: "≥10부터 이미 사망위험 상승(HR 1.15~1.23). CHF 환자는 여기부터 위험" },
    "const:ufr_unscaled_warn": { value: 1000, unit: "mL/hr",
      label: "비보정 UFR 경고", source: "Fan 2022 (CJASN)",
      note: ">1000 mL/hr 사망위험. 900이 저위험 경고선. 큰 환자에 더 정확" },
    "const:idwg_max_pct": { value: 5, unit: "% 체중",
      label: "IDWG 권장 상한", source: "임상 관행",
      note: "초과 시 필요 UFR↑ → IDH 위험" },
    "const:session_default": { value: 4, unit: "시간",
      label: "표준 투석시간", source: "주3회 통상",
      note: "시간↑ → 같은 물 더 천천히 → UFR↓" }
  },

  /* ---- 체중별 사망위험(HR) — 13 mL/kg/hr 초과 시 ---- */
  /* 출처: Fan 2022 — 큰 환자일수록 같은 UFR/kg가 더 위험 */
  weightHazard: [
    { weight: 60, hr: 1.20 },
    { weight: 80, hr: 1.45 },
    { weight: 100, hr: 2.0 }
  ],

  /* ---- 입력 파라미터 ---- */
  params: {
    preWeight: { default: 73, min: 40, max: 150, step: 0.1, unit: "kg", label_ko: "투석 전 체중" },
    dryWeight: { default: 70, min: 40, max: 150, step: 0.1, unit: "kg", label_ko: "목표 체중(dry weight)" },
    sessionHr: { default: 4, min: 2, max: 8, step: 0.5, unit: "시간", label_ko: "투석 시간" }
  },

  /* ---- 연쇄 효과 설명 ---- */
  chains: {
    preWeight: { up_ko: "투석전 체중↑ → IDWG↑ → UFR↑", tradeoff_ko: "식이·수분 제한 교육 필요(L13)" },
    dryWeight: { up_ko: "목표체중↓ → 뺄 물↑ → UFR↑", tradeoff_ko: "너무 낮으면 과도제거·IDH" },
    sessionHr: { up_ko: "시간↑ → UFR↓(같은 물 천천히)", tradeoff_ko: "안전하나 환자 부담·자원↑" }
  }
};

/* ============================================================
   정문: hdUfCompute(params, DATA)
   ============================================================ */
function hdUfCompute(params, DATA) {
  var C = DATA.consts;
  var ufrWarn = C["const:ufr_warn"].value;        // 13
  var ufrCaution = C["const:ufr_caution"].value;  // 10
  var unscaledWarn = C["const:ufr_unscaled_warn"].value; // 1000
  var idwgMaxPct = C["const:idwg_max_pct"].value; // 5

  var pre = +params.preWeight, dry = +params.dryWeight, hr = +params.sessionHr;

  // IDWG = 투석전 − 목표체중 (kg = L)
  var idwg = pre - dry;                             // kg
  var idwgPct = dry > 0 ? (idwg / dry) * 100 : 0;   // % of dry weight
  var ufTotal = Math.max(0, idwg) * 1000;           // mL 총 제거량

  // UFR (mL/kg/hr) — dry weight 기준 보정
  var ufRate = (dry > 0 && hr > 0) ? ufTotal / dry / hr : 0;
  // 비보정 UFR (mL/hr)
  var ufRateUnscaled = hr > 0 ? ufTotal / hr : 0;
  // 시간당 제거량 (mL/hr) = 비보정과 동일
  var perHour = ufRateUnscaled;

  // 위험 등급
  var idhRisk, riskColor;
  if (ufRate > ufrWarn) { idhRisk = "high"; }
  else if (ufRate >= ufrCaution) { idhRisk = "caution"; }
  else { idhRisk = "safe"; }

  // 체중별 사망 HR 보간 (13 초과 시)
  var mortalityHR = null;
  if (ufRate > ufrWarn) {
    var wh = DATA.weightHazard;
    // 선형 보간
    if (dry <= wh[0].weight) mortalityHR = wh[0].hr;
    else if (dry >= wh[wh.length - 1].weight) mortalityHR = wh[wh.length - 1].hr;
    else {
      for (var i = 0; i < wh.length - 1; i++) {
        if (dry >= wh[i].weight && dry < wh[i + 1].weight) {
          var f = (dry - wh[i].weight) / (wh[i + 1].weight - wh[i].weight);
          mortalityHR = wh[i].hr + f * (wh[i + 1].hr - wh[i].hr);
          break;
        }
      }
    }
  }

  // 플래그
  var flags = [];
  if (idwg < 0) flags.push({ level: "warn", key: "neg_idwg",
    text: "투석전 체중이 목표체중보다 낮습니다 — 목표체중 재평가 필요(과도 제거 위험)." });
  if (ufRate > ufrWarn) flags.push({ level: "danger", key: "ufr_high",
    text: "UFR " + ufRate.toFixed(1) + " > " + ufrWarn + " mL/kg/hr — 사망위험↑" +
      (mortalityHR ? " (이 체중 HR≈" + mortalityHR.toFixed(2) + ")" : "") + ". 투석시간↑ 또는 IDWG↓ 필요." });
  else if (ufRate >= ufrCaution) flags.push({ level: "warn", key: "ufr_caution",
    text: "UFR " + ufRate.toFixed(1) + " ≥ " + ufrCaution + " mL/kg/hr — 주의 구간(≥10부터 위험 시작, CHF는 특히)." });
  if (ufRateUnscaled > unscaledWarn) flags.push({ level: "warn", key: "unscaled",
    text: "비보정 UFR " + Math.round(ufRateUnscaled) + " > " + unscaledWarn + " mL/hr — 큰 환자에서 더 정확한 위험 지표." });
  if (idwgPct > idwgMaxPct) flags.push({ level: "warn", key: "idwg_high",
    text: "IDWG " + idwgPct.toFixed(1) + "% > " + idwgMaxPct + "% 체중 — 수분·나트륨 제한 교육 필요(L13)." });

  return {
    idwg: idwg, idwgPct: idwgPct, ufTotal: ufTotal,
    ufRate: ufRate, ufRateUnscaled: ufRateUnscaled, perHour: perHour,
    idhRisk: idhRisk, mortalityHR: mortalityHR, flags: flags,
    inputs: { preWeight: pre, dryWeight: dry, sessionHr: hr }
  };
}

</script>
<script>/* ============================================================
   HD UF 시뮬레이터 — UI 위젯 (순수 ES5)
   mountHdUfSimulator(slot, HDUF_DATA, hdUfCompute)
   ※ CRRT 시뮬레이터와 대칭. UI만 환경별 교체 가능.
   ============================================================ */
(function (global) {
  var KIDNEY = '#7C3AED', DEEP = '#5B21B6', LIGHT = '#EDE9FE', BLOOD = '#DC2626',
      DIALYSATE = '#0D9488', WARN = '#D97706', INK = '#1E1B2E', SOFT = '#6B7280',
      LINE = '#E5E1F0', GREEN = '#059669';

  global.mountHdUfSimulator = function (slot, DATA, compute) {
    var state = {
      preWeight: DATA.params.preWeight.default,
      dryWeight: DATA.params.dryWeight.default,
      sessionHr: DATA.params.sessionHr.default
    };

    var wrap = document.createElement('div');
    wrap.style.cssText = 'background:#fff;border:1px solid ' + LINE + ';border-radius:12px;padding:14px;margin:14px 0';

    var outPanel = document.createElement('div');
    outPanel.style.cssText = 'background:' + LIGHT + ';border-radius:10px;padding:12px;margin-bottom:14px';
    wrap.appendChild(outPanel);

    var sliderBox = document.createElement('div');
    wrap.appendChild(sliderBox);

    var flagBox = document.createElement('div');
    flagBox.style.cssText = 'margin-top:10px';
    wrap.appendChild(flagBox);

    slot.innerHTML = ''; slot.appendChild(wrap);

    var sliderDefs = ['preWeight', 'dryWeight', 'sessionHr'];
    var sliderEls = {};
    sliderDefs.forEach(function (key) {
      var pdef = DATA.params[key];
      var row = document.createElement('div');
      row.style.cssText = 'margin:10px 0';
      var lab = document.createElement('label');
      lab.style.cssText = 'font-size:12px;display:flex;justify-content:space-between;color:' + INK;
      var val = document.createElement('span');
      val.style.cssText = 'font-family:monospace;font-weight:700;color:' + DEEP;
      lab.appendChild(document.createTextNode(pdef.label_ko));
      lab.appendChild(val);
      var inp = document.createElement('input');
      inp.type = 'range'; inp.min = pdef.min; inp.max = pdef.max; inp.step = pdef.step;
      inp.value = state[key];
      inp.style.cssText = 'width:100%;accent-color:' + KIDNEY + ';margin-top:3px';
      inp.addEventListener('input', function () { state[key] = +inp.value; render(); });
      var chain = document.createElement('div');
      chain.style.cssText = 'font-size:10.5px;color:' + SOFT + ';margin-top:2px;line-height:1.4';
      row.appendChild(lab); row.appendChild(inp); row.appendChild(chain);
      sliderBox.appendChild(row);
      sliderEls[key] = { val: val, chain: chain, def: pdef };
    });

    function render() {
      var r = compute(state, DATA);
      var ufrWarn = DATA.consts['const:ufr_warn'].value;   // 13
      var ufrCaut = DATA.consts['const:ufr_caution'].value; // 10
      var ufrColor = r.idhRisk === 'high' ? BLOOD : (r.idhRisk === 'caution' ? WARN : GREEN);

      // 슬라이더 값·연쇄
      sliderDefs.forEach(function (key) {
        var el = sliderEls[key];
        el.val.textContent = state[key] + ' ' + el.def.unit;
        var c = DATA.chains[key];
        if (c) el.chain.innerHTML = '↑ ' + c.up_ko + ' <span style="color:' + WARN + '">· ' + c.tradeoff_ko + '</span>';
      });

      // UFR 게이지 (0~25 스케일, 경고선 10·13)
      var scale = 25;
      var ufrPct = Math.min(100, (r.ufRate / scale) * 100);
      var cautPct = (ufrCaut / scale) * 100, warnPct = (ufrWarn / scale) * 100;
      var oh = '';
      oh += '<div style="display:flex;justify-content:space-between;font-size:11px;color:' + INK + '">' +
        '<span>UF rate</span><span style="font-family:monospace;font-weight:800;font-size:20px;color:' + ufrColor + '">' + r.ufRate.toFixed(1) + ' <span style="font-size:11px">mL/kg/hr</span></span></div>';
      oh += '<div style="height:14px;border-radius:7px;background:' + LINE + ';position:relative;overflow:hidden;margin:5px 0">' +
        '<div style="height:100%;width:' + ufrPct + '%;background:' + ufrColor + ';border-radius:7px;transition:.15s"></div>' +
        '<div style="position:absolute;top:-2px;bottom:-2px;width:2px;background:' + WARN + ';left:' + cautPct + '%" title="주의 10"></div>' +
        '<div style="position:absolute;top:-2px;bottom:-2px;width:2px;background:' + BLOOD + ';left:' + warnPct + '%" title="위험 13"></div>' +
        '</div>';
      oh += '<div style="font-size:9.5px;color:' + SOFT + ';display:flex;justify-content:space-between"><span>안전</span><span style="color:' + WARN + '">주의 10</span><span style="color:' + BLOOD + '">위험 13</span><span>' + scale + '</span></div>';
      // 상태 라벨
      var statusTxt = r.idhRisk === 'high' ? '✗ 위험 — IDH·사망위험↑' : (r.idhRisk === 'caution' ? '△ 주의 구간' : '✓ 안전 구간');
      oh += '<div style="text-align:center;font-size:12px;font-weight:700;color:' + ufrColor + ';margin:6px 0">' + statusTxt +
        (r.mortalityHR ? ' <span style="font-size:10.5px">(이 체중 사망 HR≈' + r.mortalityHR.toFixed(2) + ')</span>' : '') + '</div>';
      // 보조 수치
      oh += '<div style="display:flex;gap:12px;justify-content:center;font-size:11px;color:' + SOFT + ';margin-top:4px;flex-wrap:wrap">' +
        '<span>IDWG: <b style="font-family:monospace;color:' + INK + '">' + r.idwg.toFixed(1) + '</b> kg (' + r.idwgPct.toFixed(1) + '%)</span>' +
        '<span>총 UF: <b style="font-family:monospace;color:' + INK + '">' + r.ufTotal + '</b> mL</span>' +
        '<span>시간당: <b style="font-family:monospace;color:' + INK + '">' + Math.round(r.perHour) + '</b> mL/hr</span>' +
        '</div>';
      outPanel.innerHTML = oh;

      // 플래그
      var fh = '';
      r.flags.forEach(function (f) {
        var col = f.level === 'danger' ? BLOOD : (f.level === 'warn' ? WARN : SOFT);
        var bg = f.level === 'danger' ? '#FEF2F2' : (f.level === 'warn' ? '#FFF8F3' : '#F9FAFB');
        var icon = f.level === 'danger' ? '🚨' : (f.level === 'warn' ? '⚠️' : 'ℹ️');
        fh += '<div style="background:' + bg + ';border-left:3px solid ' + col + ';border-radius:6px;padding:7px 10px;margin-bottom:5px;font-size:11.5px;color:' + INK + '">' + icon + ' ' + f.text + '</div>';
      });
      flagBox.innerHTML = fh || '<div style="font-size:11.5px;color:' + GREEN + ';text-align:center;padding:6px">✓ 안전 범위 — plasma refill이 UF를 따라잡는 속도</div>';
    }

    render();
  };
})(typeof window !== 'undefined' ? window : this);
</script>

        { k: "CKD 합병증", v: "신성빈혈·CKD-MBD 등 일차진료로 조절 안 되는 합병증.", ref: "ref:akdhc_referral" }

    { h: "eGFR 기반 → 위험도 기반 전환", t: "KDIGO 2024는 의뢰 기준을 eGFR 단독에서 KFRE(신부전 위험 방정식) 기반으로 전환했다. 5년 신부전 위험 3~5%면 의뢰를 고려한다. eGFR이 아직 높아도 알부민뇨·진행속도로 고위험이면 조기 의뢰가 이득이다." },

  ],

  /* ---- 의뢰 시 준비 정보 (실전) ---- */

    "추세가 핵심 — 단발 수치보다 eGFR·Cr·ACR의 시간 경과 추이를 함께 전달",
    "투석 환자라면: 투석 스케줄, dry weight, 접근로 종류, 최근 투석 전후 채혈",

    "AKI 의심 시: 기저 Cr, 소변량, 최근 조영제·NSAID·항생제 노출, 용적 상태",
    "가능하면 요검사(혈뇨·단백뇨·원주)와 신초음파 결과 동봉"

<script>/* ============================================================
   투석 학습 가이드 — ENGINE 레이어
   ※ 비협상 원칙: 엔진은 로직만. 임상 수치·약물명·기준값을 자체 보유 금지.
      모든 값은 DATA(DIALYSIS_*)를 ID로 조회해서 얻는다.
   ※ 정문 계약(통합 호환):
        explain(topic)       → 학습앱 주력. 레이어/토픽 구조화 콘텐츠
        recommend(patient)   → 통합엔진 호환. {drugs[],targets[],flags[]}
   ※ 보조: lookupDialyzability / checkMaturation / initiationFlags
   ※ DATA 주입은 생성자에서 받음(테스트 가능·결합도↓). 전역 의존 안 함.
   ============================================================ */

function DialysisEngine(DATA) {
  // DATA = { trials, numbers, conceptsA, conceptsB, drugs, viz, reimb }
  // 내부에서 conceptsA+B를 단일 맵으로 병합 (값 복제 아님 — 참조 보관)
  this.D = DATA;
  this.concepts = {};
  var self = this;
  ["conceptsA", "conceptsB"].forEach(function (k) {
    var src = DATA[k] || {};
    Object.keys(src).forEach(function (L) { self.concepts[L] = src[L]; });
  });
}

/* ---------- 내부 헬퍼: 수치 포맷 (값은 DATA에서, 포맷만 엔진이) ---------- */
DialysisEngine.prototype._fmtNumber = function (numId) {
  var n = this.D.numbers[numId];
  if (!n) return null;
  var v = n.value;
  var valStr = Array.isArray(v) ? (v[0] + "~" + v[1]) : ("" + v);
  return {
    id: numId,
    label: n.label_ko,
    text: valStr + (n.unit ? (" " + n.unit) : ""),
    source: n.source, grade: n.grade, note: n.note || null,
    lab: n.lab || null
  };
};

/* ---------- 내부 헬퍼: 참조 ID 배열 → 표시객체 배열 ---------- */
DialysisEngine.prototype._resolveCrrtTrials = function (ids) {
  var crrtData = (typeof CRRT_DATA !== "undefined") ? CRRT_DATA : (this.D.crrt || null);
  if (!crrtData || !crrtData.trials) return [];
  return (ids || []).map(function (id) {
    var t = crrtData.trials[id];
    return t ? {
      id: id, pmid: t.pmid, doi: t.doi, name: t.name_ko, year: t.year,
      teaching: t.teaching_ko, finding: t.finding_ko,
      url: "https://doi.org/" + t.doi,
      pubmed: "https://pubmed.ncbi.nlm.nih.gov/" + t.pmid + "/"
    } : { id: id, missing: true };
  });
};

DialysisEngine.prototype._resolveTrials = function (ids) {
  var D = this.D;
  return (ids || []).map(function (id) {
    var t = D.trials[id];
    return t ? {
      id: id, pmid: t.pmid, doi: t.doi, name: t.name_ko,
      year: t.year, teaching: t.teaching_ko,
      url: "https://doi.org/" + t.doi,
      pubmed: "https://pubmed.ncbi.nlm.nih.gov/" + t.pmid + "/"
    } : { id: id, missing: true };
  });
};

DialysisEngine.prototype._resolveDrugs = function (ids) {
  var D = this.D;
  return (ids || []).map(function (id) {
    var d = D.drugs[id];
    return d ? { id: id, name: d.name_ko, role: d.role_ko, class: d.class_id || null } : { id: id, missing: true };
  });
};

/* ============================================================
   정문 1: explain(topic) — 학습앱 주력
   topic = 레이어 ID("L1","L6","BRIDGE") 또는 concept: ID
   반환: { found, title, core, detail[], analogy, numbers[], trials[],
           drugs[], reimb[], viz, refs[], grade }
   ============================================================ */
DialysisEngine.prototype.explain = function (topic) {
  var node = this._findNode(topic);
  if (!node) return { found: false, topic: topic, message: "해당 토픽을 찾을 수 없음" };

  var self = this;
  // 수치 해석 (DATA 조회)
  var nums = (node.numbers || []).map(function (id) { return self._fmtNumber(id); })
    .filter(function (x) { return x; });

  // 이 레이어에 걸린 급여 항목 수집
  var reimb = [];
  Object.keys(this.D.reimb).forEach(function (k) {
    if (k === "_meta") return;
    if (self.D.reimb[k].layer === node.id) reimb.push(self._fmtReimb(k));
  });

  return {
    found: true,
    id: node.id, icon: node.icon || null,
    title: node.title_ko, subtitle: node.subtitle_ko || null,
    core: node.core_ko,
    detail: node.detail_ko || [],
    analogy: node.analogy_ko || null,
    numbers: nums,
    trials: this._resolveTrials(node.trial_ids),
    crrt_trials: this._resolveCrrtTrials(node.crrt_trials),
    drugs: this._resolveDrugs(node.drug_ids),
    reimb: reimb,
    viz: node.viz ? this._resolveViz(node.viz) : null,
    viz_secondary: node.viz_secondary ? this._resolveViz(node.viz_secondary) : null,
    refs: node.refs || [],
    // grade: 이 레이어 수치들이 인용한 가이드라인 등급 집합
    grades: this._collectGrades(node)
  };
};

DialysisEngine.prototype._findNode = function (topic) {
  // 1) 레이어 ID 직접 매칭
  if (this.concepts[topic]) return this.concepts[topic];
  // 2) concept: ID → 그 concept을 포함하는 레이어
  var self = this, hit = null;
  Object.keys(this.concepts).forEach(function (L) {
    var c = self.concepts[L];
    if ((c.concept_ids || []).indexOf(topic) >= 0) hit = c;
  });
  return hit;
};

DialysisEngine.prototype._resolveViz = function (vizId) {
  var v = this.D.viz[vizId];
  if (!v) return { id: vizId, missing: true };
  return {
    id: vizId, type: v.type, title: v.title_ko,
    controls: v.controls || [], output: v.output_ko || null,
    formula: v.formula || null, render: v.render
  };
};

DialysisEngine.prototype._fmtReimb = function (noticeId) {
  var r = this.D.reimb[noticeId];
  return {
    id: noticeId, title: r.title_ko, verified: r.verified,
    skeleton: r.skeleton_ko,
    guideline: r.guideline_value_ko || null,
    conflict: !!r.conflict_flag,
    conflict_note: r.conflict_note_ko || null,
    warning: this.D.reimb._meta.warning_ko
  };
};

DialysisEngine.prototype._collectGrades = function (node) {
  var self = this, grades = {};
  (node.numbers || []).forEach(function (id) {
    var n = self.D.numbers[id];
    if (n && n.source) grades[n.source] = n.grade || "";
  });
  return Object.keys(grades).map(function (src) { return { source: src, grade: grades[src] }; });
};

/* ============================================================
   보조 1: lookupDialyzability(drugId)
   약물이 투석으로 빠지나 → 제거율·보충·타이밍 (DATA 조회)
   ============================================================ */
DialysisEngine.prototype.lookupDialyzability = function (drugId) {
  var d = this.D.drugs[drugId];
  if (!d) return { found: false, drugId: drugId };
  if (!d.dialyzability) {
    return { found: true, drugId: drugId, name: d.name_ko, hasData: false,
      note: "이 약물은 dialyzability 데이터 미수록(치료약 분류)" };
  }
  var dz = d.dialyzability;
  // 제거 등급 판정 (로직만 — 역치는 데이터에서 온 값으로 비교)
  var removalPct = dz.removal_highflux_pct || null;
  var tier = "unknown";
  if (removalPct) {
    var mid = (removalPct[0] + removalPct[1]) / 2;
    tier = mid >= 50 ? "high" : (mid >= 20 ? "moderate" : "low");
  } else if (dz.removal_lowflux === "minimal") {
    tier = "low";
  }
  return {
    found: true, drugId: drugId, name: d.name_ko, hasData: true,
    properties: {
      mw_da: dz.mw_da, protein_binding_pct: dz.protein_binding_pct, vd_l_kg: dz.vd_l_kg
    },
    removal_highflux_pct: removalPct,
    removal_tier: tier,
    rebound_pct: dz.rebound_pct || null,
    supplement: dz.supplement,
    timing: dz.timing_ko || null,
    teaching: dz.teaching_ko || null
  };
};

/* ============================================================
   보조 2: checkMaturation(d, depth, flow, weeks) — Rule of 6s
   역치는 DATA(num:)에서 조회, 엔진은 비교 로직만
   ============================================================ */
DialysisEngine.prototype.checkMaturation = function (diameter, depth, flow, weeks) {
  var D = this.D.numbers;
  var thrDia = D["num:avf_diameter"].value;   // 6 (>)
  var thrDep = D["num:avf_depth"].value;       // 6 (<)
  var thrFlow = D["num:avf_flow"].value;       // 600 (>)
  var thrWk = D["num:avf_weeks"].value;        // 6 (평가시점)

  var criteria = [
    { key: "diameter", label: "직경 >" + thrDia + "mm", pass: diameter > thrDia, value: diameter },
    { key: "depth", label: "깊이 <" + thrDep + "mm", pass: depth < thrDep, value: depth },
    { key: "flow", label: "혈류 >" + thrFlow + "mL/min", pass: flow > thrFlow, value: flow }
  ];
  var allPass = criteria.every(function (c) { return c.pass; });
  var evaluable = weeks >= thrWk;

  var verdict;
  if (!evaluable) verdict = "평가시기 이름 (" + thrWk + "주 후 평가)";
  else if (allPass) verdict = "성숙 — 천자 가능 기준 충족";
  else verdict = "비성숙 — 영상검사(fistulogram) 권고";

  return {
    criteria: criteria, allPass: allPass, evaluable: evaluable,
    weeks: weeks, verdict: verdict,
    caveat: "※ 2019 KDOQI는 Rule of 6s 정량기준 대신 임상판단 권고. 본 판정은 학습용 출발점",
    source: D["num:avf_diameter"].source
  };
};

/* ============================================================
   보조 3: initiationFlags(symptoms) — 투석 개시 판단 보조
   증상 트리거 평가 (조언자 역할 — 처방 아님)
   ============================================================ */
DialysisEngine.prototype.initiationFlags = function (symptoms) {
  // symptoms = { uremic_symptoms, fluid_overload, hyperkalemia, acidosis,
  //              pericarditis, encephalopathy, egfr }
  symptoms = symptoms || {};
  var urgent = [], consider = [];

  if (symptoms.pericarditis) urgent.push("요독성 심막염 — 응급 적응증");
  if (symptoms.encephalopathy) urgent.push("요독성 뇌병증 — 응급 적응증");
  if (symptoms.hyperkalemia) urgent.push("난치성 고칼륨혈증");
  if (symptoms.fluid_overload) consider.push("약물 난치성 용적 과부하(폐부종)");
  if (symptoms.acidosis) consider.push("난치성 대사성 산증");
  if (symptoms.uremic_symptoms) consider.push("요독 증상(식욕부진·오심·가려움·인지저하)");

  var egfrNote = null;
  if (typeof symptoms.egfr === "number") {
    var rng = this.D.numbers["num:egfr_initiation"].value; // [5,10]
    egfrNote = symptoms.egfr + " mL/min/1.73m² — GFR은 참고치일 뿐 트리거 아님 (흔한 개시 " +
      rng[0] + "~" + rng[1] + ", 무증상이면 더 지연 가능)";
  }

  return {
    urgent: urgent, consider: consider,
    hasUrgent: urgent.length > 0,
    hasTrigger: urgent.length > 0 || consider.length > 0,
    egfrNote: egfrNote,
    principle: "투석 개시는 eGFR 숫자가 아니라 요독 증상으로 판단 (IDEAL 시험)",
    advisory: "본 도구는 조언자. 실제 개시 결정은 신장내과 전문의 상의",
    trial: this._resolveTrials(["pmid:ideal2010"])[0]
  };
};

/* ============================================================
   정문 2: recommend(patient) — 통합엔진 호환 (최소 구현)
   학습앱이라 처방 추천은 제한적. 빈혈/MBD 급여 게이트 수준.
   반환: { drugs[], targets[], flags[] }  (헌장 계약 형식)
   ============================================================ */
DialysisEngine.prototype.recommend = function (patient) {
  patient = patient || {};
  var D = this.D, self = this;
  var drugs = [], targets = [], flags = [];

  // --- 빈혈 게이트 (Hb) ---
  if (typeof patient.hb === "number") {
    var hbStart = D.numbers["num:hb_esa_start"].value;   // [9,10]
    var hbMax = D.numbers["num:hb_target_max"].value;    // 11.5
    var hbOver = D.numbers["num:hb_overcorrect"].value;  // 13
    targets.push({ id: "lab:hb", label: "Hb 목표", text: "< " + hbMax + " g/dL",
      source: D.numbers["num:hb_target_max"].source, grade: D.numbers["num:hb_target_max"].grade });
    if (patient.hb <= hbStart[1]) {
      drugs.push({ id: "drug:epoetin_alfa", reason: "Hb ≤" + hbStart[1] + " — ESA 시작 고려(교정가능 원인 해결 후)" });
      flags.push({ level: "info", text: "ESA 시작 구간. 철결핍 등 먼저 확인" });
    }
    if (patient.hb > hbOver) {
      flags.push({ level: "warn", text: "Hb > " + hbOver + " 과교정 — 심혈관 위험, ESA 감량/중단 고려" });
    }
  }

  // --- MBD 게이트 (인) ---
  if (typeof patient.phosphate === "number" && patient.phosphate_elevated) {
    drugs.push({ id: "drug:sevelamer", reason: "지속/진행성 고인산혈증 — 비칼슘 인결합제 선호" });
    flags.push({ level: "info", text: "칼슘기반 결합제는 제한(혈관석회화). 급여 단계 확인 필요",
      reimb: "notice:phosphate_binder_급여" });
  }

  // --- adequacy 목표 (항상) ---
  targets.push({ id: "lab:spktv", label: "투석 적정도", text: "목표 spKt/V ≥ " +
    D.numbers["num:spktv_target"].value + " (최소 " + D.numbers["num:spktv_min"].value + ")",
    source: D.numbers["num:spktv_target"].source, grade: D.numbers["num:spktv_target"].grade });

  // --- HIRA 미검증 경고 (급여 관련 플래그 있으면) ---
  var hasReimbFlag = flags.some(function (f) { return f.reimb; });
  if (hasReimbFlag) {
    flags.push({ level: "warn", text: D.reimb._meta.warning_ko });
  }

  return {
    drugs: drugs, targets: targets, flags: flags,
    _advisory: "학습 가이드의 recommend는 통합 호환용 최소 구현. 실제 처방은 전문의 판단",
    _contract: "recommend(patient)→{drugs[],targets[],flags[]}"
  };
};

/* ---------- 레이어 목록 (UI 네비게이션용) ---------- */
DialysisEngine.prototype.listLayers = function () {
  var self = this;
  var order = ["L0","L1","L2","L3","L4","L5","L6","L7","L8","L9","L10","L11","L12","L13","L14","BRIDGE","L15","L16"];
  return order.filter(function (L) { return self.concepts[L]; }).map(function (L) {
    var c = self.concepts[L];
    return { id: L, icon: c.icon, title: c.title_ko, subtitle: c.subtitle_ko || null };
  });
};

/* ============================================================
   투석 학습 가이드 — VIZ 렌더러 (순수 ES5, CDN 없음, iOS Safari 호환)
   mountViz(cardEl, engine, DATA): 카드 내 .viz-slot[data-viz]에 위젯 주입
   ※ 임계값은 DATA(num:)에서 읽음. 렌더러는 그리기/상호작용 로직만.
   ※ requestAnimationFrame 폴백, reduced-motion 존중, devicePixelRatio 대응.
   ============================================================ */
(function (global) {
  var RAF = global.requestAnimationFrame || function (cb) { return setTimeout(function () { cb(Date.now()); }, 16); };
  var CAF = global.cancelAnimationFrame || global.clearTimeout;
  var reduceMotion = global.matchMedia && global.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var KIDNEY = '#7C3AED', BLOOD = '#DC2626', DIALYSATE = '#0D9488', DEEP = '#5B21B6',
      LIGHT = '#EDE9FE', WARN = '#D97706', INK = '#1E1B2E', SOFT = '#6B7280', LINE = '#E5E1F0';

  // 활성 애니메이션 추적(레이어 전환 시 정리)
  var activeAnims = [];
  function stopAll() { activeAnims.forEach(function (id) { CAF(id); }); activeAnims = []; }

  /* ---- 캔버스 헬퍼 (HiDPI) ---- */
  function makeCanvas(w, h) {
    var c = document.createElement('canvas');
    var dpr = global.devicePixelRatio || 1;
    c.width = w * dpr; c.height = h * dpr;
    c.style.width = w + 'px'; c.style.height = h + 'px';
    c.style.maxWidth = '100%'; c.style.borderRadius = '8px';
    var ctx = c.getContext('2d'); ctx.scale(dpr, dpr);
    c._w = w; c._h = h;
    return c;
  }
  function slider(label, min, max, val, step, unit, onInput) {
    var wrap = document.createElement('div'); wrap.style.cssText = 'margin:8px 0;text-align:left';
    var lab = document.createElement('label');
    lab.style.cssText = 'font-size:12px;color:' + INK + ';display:flex;justify-content:space-between;font-family:inherit';
    var valSpan = document.createElement('span');
    valSpan.style.cssText = 'font-family:monospace;font-weight:700;color:' + DEEP;
    valSpan.textContent = val + (unit || '');
    lab.appendChild(document.createTextNode(label)); lab.appendChild(valSpan);
    var inp = document.createElement('input');
    inp.type = 'range'; inp.min = min; inp.max = max; inp.value = val; inp.step = step || 1;
    inp.style.cssText = 'width:100%;accent-color:' + KIDNEY + ';margin-top:4px';
    inp.addEventListener('input', function () {
      valSpan.textContent = inp.value + (unit || ''); onInput(parseFloat(inp.value));
    });
    wrap.appendChild(lab); wrap.appendChild(inp);
    return { el: wrap, set: function (v) { inp.value = v; valSpan.textContent = v + (unit || ''); } };
  }
  function panel() {
    var p = document.createElement('div');
    p.style.cssText = 'background:#fff;border:1px solid ' + LINE + ';border-radius:11px;padding:14px;margin:14px 0';
    return p;
  }
  function caption(txt) {
    var c = document.createElement('div');
    c.style.cssText = 'font-size:12px;color:' + SOFT + ';margin-top:8px;line-height:1.5';
    c.innerHTML = txt; return c;
  }
  function numVal(DATA, id) { var n = DATA.numbers[id]; return n ? n.value : null; }

  /* ============ viz:diffusion — 확산 애니메이션 ============ */
  function diffusion(slot, E, DATA) {
    var p = panel();
    var W = 300, H = 150, c = makeCanvas(W, H), ctx = c.getContext('2d');
    p.appendChild(c);
    var gradient = 70;
    var s = slider('농도차 (혈액-투석액)', 0, 100, 70, 1, '%', function (v) { gradient = v; });
    p.appendChild(s.el);
    p.appendChild(caption('농도차가 클수록 우레아(보라 입자)가 막을 더 빠르게 건너 투석액 쪽으로 이동합니다. <b>확산 = 농도차로 저절로 퍼짐.</b>'));
    slot.innerHTML = ''; slot.appendChild(p);

    var particles = [];
    for (var i = 0; i < 40; i++) particles.push({ x: 20 + Math.random() * 110, y: 15 + Math.random() * 120, side: 0 });
    function frame() {
      ctx.clearRect(0, 0, W, H);
      // 좌(혈액)/우(투석액) 배경
      ctx.fillStyle = '#FEF2F2'; ctx.fillRect(0, 0, W / 2 - 3, H);
      ctx.fillStyle = '#F0FDFA'; ctx.fillRect(W / 2 + 3, 0, W / 2, H);
      // 막
      ctx.fillStyle = KIDNEY; ctx.fillRect(W / 2 - 3, 0, 6, H);
      ctx.fillStyle = SOFT; ctx.font = '10px sans-serif';
      ctx.fillText('혈액', 10, 14); ctx.fillText('투석액', W / 2 + 12, 14);
      var rate = gradient / 100;
      particles.forEach(function (pt) {
        if (!reduceMotion) {
          pt.x += (Math.random() - 0.45) * 2 + (pt.side === 0 ? rate * 1.2 : 0);
          pt.y += (Math.random() - 0.5) * 2;
        }
        if (pt.x > W / 2 && pt.side === 0 && Math.random() < rate) pt.side = 1;
        if (pt.y < 8) pt.y = 8; if (pt.y > H - 8) pt.y = H - 8;
        if (pt.x < 8) pt.x = 8; if (pt.x > W - 8) pt.x = W - 8;
        ctx.beginPath(); ctx.arc(pt.x, pt.y, 3, 0, 6.28);
        ctx.fillStyle = pt.side === 0 ? KIDNEY : DIALYSATE; ctx.fill();
      });
      if (!reduceMotion) activeAnims.push(RAF(frame));
    }
    frame();
  }

  /* ============ viz:countercurrent — 역류 vs 병류 ============ */
  function countercurrent(slot, E, DATA) {
    var p = panel();
    var W = 300, H = 160, c = makeCanvas(W, H), ctx = c.getContext('2d');
    p.appendChild(c);
    var counter = true;
    var btn = document.createElement('button');
    btn.style.cssText = 'width:100%;padding:9px;margin:8px 0;border:1px solid ' + KIDNEY + ';background:' + LIGHT + ';color:' + DEEP + ';border-radius:8px;font-weight:600;cursor:pointer;font-family:inherit';
    function setBtn() { btn.textContent = counter ? '현재: 역류(반대 방향) — 탭하여 병류로' : '현재: 병류(같은 방향) — 탭하여 역류로'; }
    setBtn();
    btn.addEventListener('click', function () { counter = !counter; setBtn(); draw(); });
    var cap = caption('');
    function draw() {
      ctx.clearRect(0, 0, W, H);
      // 혈액(위)·투석액(아래) 채널
      ctx.fillStyle = SOFT; ctx.font = '10px sans-serif';
      ctx.fillText('혈액 →', 8, 18); ctx.fillText(counter ? '← 투석액' : '투석액 →', 8, H - 8);
      // 농도곡선: 역류면 차이 유지, 병류면 중간 수렴
      var n = 50;
      for (var ch = 0; ch < 2; ch++) {
        ctx.beginPath();
        for (var i = 0; i <= n; i++) {
          var x = 20 + (i / n) * (W - 40);
          var t = i / n;
          var blood = ch === 0;
          var conc;
          if (counter) {
            conc = blood ? (1 - t * 0.55) : (0.05 + t * 0.55);  // 평행 갭 유지
          } else {
            conc = blood ? (1 - t * 0.45) : (0.05 + t * 0.45);  // 중간 수렴
            if (!blood) conc = 0.05 + t * 0.45;
          }
          var y = blood ? (60 - conc * 40) : (100 + (1 - conc) * 40 - 40 + conc * 0);
          y = blood ? (70 - conc * 45) : (90 + conc * 45);
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.strokeStyle = ch === 0 ? BLOOD : DIALYSATE; ctx.lineWidth = 2.5; ctx.stroke();
      }
      // 갭 표시
      ctx.fillStyle = counter ? DIALYSATE : WARN; ctx.font = 'bold 10px sans-serif';
      ctx.fillText(counter ? '농도차 내내 유지 ✓ 확산 지속' : '중간서 평형 → 확산 멈춤', 60, H / 2 + 3);
      cap.innerHTML = counter
        ? '<b>역류:</b> 피가 흐르는 내내 양쪽 농도차가 유지돼 확산이 끝까지 계속됩니다.'
        : '<b>병류:</b> 중간쯤 양쪽 농도가 같아져(평형) 확산이 멈춥니다. 그래서 실제 투석기는 역류를 씁니다.';
    }
    slot.innerHTML = ''; slot.appendChild(p); p.appendChild(btn); p.appendChild(cap); draw();
  }

  /* ============ viz:rebound — 우레아 리바운드 ============ */
  function rebound(slot, E, DATA) {
    var p = panel();
    var W = 300, H = 170, c = makeCanvas(W, H), ctx = c.getContext('2d');
    p.appendChild(c);
    var gap = numVal(DATA, 'num:ektv_gap') || 0.2;
    var reboundPct = numVal(DATA, 'num:rebound_pct') || 15;
    var K = 300, V = 40;
    var sK = slider('투석 속도 K', 100, 400, 300, 10, ' mL/min', function (v) { K = v; draw(); });
    var sV = slider('분포용적 V', 25, 50, 40, 1, ' L', function (v) { V = v; draw(); });
    var cap = caption('');
    function draw() {
      ctx.clearRect(0, 0, W, H);
      // 축
      ctx.strokeStyle = LINE; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(35, 10); ctx.lineTo(35, H - 22); ctx.lineTo(W - 10, H - 22); ctx.stroke();
      ctx.fillStyle = SOFT; ctx.font = '9px sans-serif';
      ctx.fillText('BUN', 4, 14); ctx.fillText('투석중', 45, H - 10); ctx.fillText('종료', 150, H - 10); ctx.fillText('+60분', 230, H - 10);
      // K/V 비율이 클수록 리바운드 큼
      var ratio = (K / 1000) / V; // 대략적 지표
      var rb = Math.min(0.45, reboundPct / 100 + ratio * 8); // 리바운드 폭
      function Y(frac) { return 20 + (1 - frac) * (H - 50); }
      // 투석 중 하강 (1 → 0.3)
      ctx.beginPath(); ctx.strokeStyle = KIDNEY; ctx.lineWidth = 2.5;
      ctx.moveTo(40, Y(1));
      var endX = 150, endFrac = 0.3;
      ctx.lineTo(endX, Y(endFrac)); ctx.stroke();
      // 리바운드 상승 (0.3 → 0.3+rb)
      ctx.beginPath(); ctx.strokeStyle = BLOOD; ctx.lineWidth = 2.5; ctx.setLineDash([4, 3]);
      ctx.moveTo(endX, Y(endFrac));
      ctx.quadraticCurveTo(190, Y(endFrac + rb * 0.7), 250, Y(endFrac + rb)); ctx.stroke(); ctx.setLineDash([]);
      // sp vs e 표시
      ctx.fillStyle = KIDNEY; ctx.beginPath(); ctx.arc(endX, Y(endFrac), 4, 0, 6.28); ctx.fill();
      ctx.fillStyle = BLOOD; ctx.beginPath(); ctx.arc(250, Y(endFrac + rb), 4, 0, 6.28); ctx.fill();
      ctx.fillStyle = KIDNEY; ctx.font = 'bold 9px sans-serif'; ctx.fillText('측정 spKt/V', endX - 20, Y(endFrac) - 8);
      ctx.fillStyle = BLOOD; ctx.fillText('실제 eKt/V(평형)', 175, Y(endFrac + rb) + 14);
      cap.innerHTML = '투석 직후(보라점)와 평형(빨강점)의 차이가 <b>리바운드</b>. K/V가 클수록(빠르고 작은 사람) 리바운드가 큼. ' +
        '평균 eKt/V ≈ spKt/V − ' + gap + '. 그래서 목표를 1.4로 잡아 실제 1.2를 확보합니다.';
    }
    slot.innerHTML = ''; slot.appendChild(p); p.appendChild(sK.el); p.appendChild(sV.el); p.appendChild(cap); draw();
  }

  /* ============ viz:ktv — Kt/V 실시간 계산 ============ */
  function ktv(slot, E, DATA) {
    var p = panel();
    var target = numVal(DATA, 'num:spktv_target') || 1.4;
    var min = numVal(DATA, 'num:spktv_min') || 1.2;
    var K = 250, t = 240, V = 40;
    var readout = document.createElement('div');
    readout.style.cssText = 'text-align:center;font-family:monospace;font-size:30px;font-weight:800;margin:6px 0;color:' + DEEP;
    var bar = document.createElement('div');
    bar.style.cssText = 'height:24px;border-radius:12px;background:' + LINE + ';position:relative;overflow:hidden;margin:10px 0';
    var fill = document.createElement('div');
    fill.style.cssText = 'height:100%;border-radius:12px;transition:width .15s,background .15s';
    bar.appendChild(fill);
    // 목표/최소 마커
    function marker(frac, color, txt) {
      var m = document.createElement('div');
      m.style.cssText = 'position:absolute;top:-2px;bottom:-2px;width:2px;background:' + color + ';left:' + (frac * 100) + '%';
      m.title = txt; bar.appendChild(m);
    }
    var verdict = document.createElement('div');
    verdict.style.cssText = 'text-align:center;font-size:13px;font-weight:700;margin-top:4px';
    function calc() {
      var v = (K * t) / (V * 1000);
      readout.textContent = 'Kt/V = ' + v.toFixed(2);
      var scale = 2.2;
      fill.style.width = Math.min(100, (v / scale) * 100) + '%';
      var ok = v >= target, mid = v >= min;
      fill.style.background = ok ? '#059669' : (mid ? WARN : BLOOD);
      verdict.style.color = fill.style.background;
      verdict.textContent = ok ? '✓ 목표 달성 (≥' + target + ')' : (mid ? '△ 최소 충족 (≥' + min + '), 목표 미달' : '✗ 미달 (<' + min + ')');
    }
    var sK = slider('청소율 K', 150, 350, 250, 10, ' mL/min', function (v) { K = v; calc(); });
    var st = slider('투석 시간 t', 120, 360, 240, 10, ' min', function (v) { t = v; calc(); });
    var sV = slider('분포용적 V', 25, 50, 40, 1, ' L', function (v) { V = v; calc(); });
    slot.innerHTML = ''; slot.appendChild(p);
    p.appendChild(readout); p.appendChild(bar);
    marker(min / 2.2, WARN, '최소'); marker(target / 2.2, '#059669', '목표');
    p.appendChild(verdict); p.appendChild(sK.el); p.appendChild(st.el); p.appendChild(sV.el);
    p.appendChild(caption('Kt/V = (K × t) / (V×1000). 슬라이더로 세 변수를 바꿔 보세요. ' +
      '주황선=최소 ' + min + ', 초록선=목표 ' + target + '. V(체격)가 크면 같은 K·t로도 Kt/V가 낮아집니다.'));
    calc();
  }

  /* ============ viz:ufr_bp — UFR-혈압 트레이드오프 ============ */
  function ufrBp(slot, E, DATA) {
    var p = panel();
    var W = 300, H = 150, c = makeCanvas(W, H), ctx = c.getContext('2d');
    p.appendChild(c);
    var danger = numVal(DATA, 'num:ufr_danger') || 13;
    var ufr = 10;
    var s = slider('UF rate', 5, 20, 10, 0.5, ' mL/kg/hr', function (v) { ufr = v; draw(); });
    var cap = caption('');
    function draw() {
      ctx.clearRect(0, 0, W, H);
      // refill 한계선(수평) vs UF(현재)
      ctx.strokeStyle = LINE; ctx.beginPath(); ctx.moveTo(35, 10); ctx.lineTo(35, H - 20); ctx.lineTo(W - 10, H - 20); ctx.stroke();
      ctx.fillStyle = SOFT; ctx.font = '9px sans-serif'; ctx.fillText('혈압', 6, 14); ctx.fillText('시간 →', W - 45, H - 6);
      // 위험 구간 음영
      var dx = 35 + (danger / 20) * (W - 45);
      // 혈압 곡선: ufr<danger면 평탄, 초과면 급락
      ctx.beginPath(); ctx.lineWidth = 2.5;
      var over = ufr > danger;
      ctx.strokeStyle = over ? BLOOD : '#059669';
      for (var i = 0; i <= 50; i++) {
        var x = 40 + (i / 50) * (W - 55), tt = i / 50;
        var bp;
        if (ufr <= danger) bp = 0.85 - tt * 0.1;
        else { var drop = (ufr - danger) / (20 - danger); bp = 0.85 - tt * tt * drop * 0.7; }
        var y = 15 + (1 - bp) * (H - 40);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();
      // 위험선
      ctx.fillStyle = WARN; ctx.font = 'bold 9px sans-serif';
      ctx.fillText('위험역치 ' + danger, W - 90, 20);
      cap.innerHTML = over
        ? '<b style="color:' + BLOOD + '">UFR ' + ufr + ' > ' + danger + ':</b> plasma refill이 못 따라가 혈관이 비고 혈압이 급락(IDH). 심근 스터닝·사망 위험.'
        : '<b style="color:#059669">UFR ' + ufr + ' ≤ ' + danger + ':</b> refill이 UF를 따라잡아 혈압 안정. 안전 구간.';
    }
    slot.innerHTML = ''; slot.appendChild(p); p.appendChild(s.el); p.appendChild(cap); draw();
  }

  /* ============ viz:rule6s — 누공 성숙 판정 ============ */
  function rule6s(slot, E, DATA) {
    var p = panel();

    function evalNow() {
      var r = E.checkMaturation(d, dep, fl, wk);

        return '<div style="display:flex;justify-content:space-between"><span>' + cc.label + '</span><span style="color:' +
          (cc.pass ? '#059669' : BLOOD) + ';font-weight:700">' + (cc.pass ? '✓ ' : '✗ ') + cc.value + '</span></div>';
      }).join('');
      detail.innerHTML = rows;
      var pass = r.allPass && r.evaluable;
      out.style.background = pass ? '#ECFDF5' : (r.evaluable ? '#FEF2F2' : LIGHT);

    var sd = slider('직경', 2, 12, 5, 0.5, ' mm', function (v) { d = v; evalNow(); });

    var sw = slider('경과 주수', 0, 16, 6, 1, ' 주', function (v) { wk = v; evalNow(); });
    slot.innerHTML = ''; slot.appendChild(p);
    p.appendChild(out); p.appendChild(detail);
    p.appendChild(sd.el); p.appendChild(sde.el); p.appendChild(sf.el); p.appendChild(sw.el);

    evalNow();
  }
