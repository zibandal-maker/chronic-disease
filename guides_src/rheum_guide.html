<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>류마티스·자가면역 초기 감별 가이드</title>
<style>
:root{
  --bg:#eef1f4; --panel:#ffffff; --panel2:#f5f7f9; --line:#d6dde3;
  --ink:#16202b; --ink-dim:#48586a; --ink-faint:#8595a3;
  --clin:#2c6fb0; --clin-bg:#e6f0fa; --clin-line:#bcd6ef;   /* 임상·감별 */
  --pay:#b07514;  --pay-bg:#fbf1da;  --pay-line:#ecd2a0;    /* 급여 */
  --ref:#c43838;  --ref-bg:#fce5e5;  --ref-line:#f0bcbc;    /* 의뢰·적신호 */
  --inflam:#c05a1e; --inflam-bg:#fceadd; --inflam-line:#f1c4a3; /* 자가염증 */
  --ra:#1a8a72;   --ra-bg:#dcf2ec;   --ra-line:#a9ddd0;     /* RA */
  --ok:#1f9d54; --warn:#b07514; --block:#c43838; --alert:#d8632a;
  --nav:#1b2c3d; --nav-ink:#dce4ec;
  --radius:13px; --radius-sm:8px;
  --shadow:0 1px 3px rgba(20,40,60,.07),0 4px 14px rgba(20,40,60,.05);
  --fz-display:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  margin:0;background:var(--bg);color:var(--ink);
  font-family:var(--fz-display);font-size:15px;line-height:1.55;
  -webkit-font-smoothing:antialiased;padding-bottom:60px;
}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ===== 상단 고정 메뉴 (sticky) ===== */
.topbar{
  position:sticky;top:0;z-index:100;
  background:var(--nav);color:var(--nav-ink);
  box-shadow:0 2px 10px rgba(15,25,35,.18);
}
.topbar-inner{
  max-width:880px;margin:0 auto;display:flex;align-items:stretch;
  gap:2px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.topbar-inner::-webkit-scrollbar{display:none}
.brand{
  display:flex;align-items:center;gap:7px;padding:11px 13px 11px 15px;
  font-weight:800;font-size:14.5px;white-space:nowrap;color:#fff;letter-spacing:-.01em;
  border-right:1px solid rgba(255,255,255,.1);
}
.brand .mk{font-size:17px}
.navbtn{
  appearance:none;border:0;background:transparent;color:var(--nav-ink);
  font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;
  padding:0 12px;display:flex;align-items:center;gap:5px;white-space:nowrap;
  border-bottom:3px solid transparent;transition:background .15s,border-color .15s,color .15s;
}
.navbtn .ic{font-size:15px}
.navbtn:hover{background:rgba(255,255,255,.06)}
.navbtn.active{color:#fff;border-bottom-color:var(--accent,#6fb0e8);background:rgba(255,255,255,.08)}
.navbtn[data-tab="symptom"].active{--accent:var(--clin)}
.navbtn[data-tab="result"].active{--accent:var(--clin)}
.navbtn[data-tab="inflam"].active{--accent:#e08043}
.navbtn[data-tab="ra"].active{--accent:#3fb89c}
.navbtn[data-tab="library"].active{--accent:#6fb0e8}

.wrap{max-width:880px;margin:0 auto;padding:16px 14px 40px}

/* ===== 공통 카드 ===== */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);margin:0 0 13px;overflow:hidden}
.card-h{padding:13px 15px;font-weight:750;font-size:15px;display:flex;align-items:center;gap:8px;
  border-bottom:1px solid var(--line)}
.card-b{padding:13px 15px}
.card-b.tight{padding:11px 15px}

.tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;
  padding:2px 8px;border-radius:20px;line-height:1.5;white-space:nowrap}
.tag.clin{background:var(--clin-bg);color:var(--clin)}
.tag.pay{background:var(--pay-bg);color:var(--pay)}
.tag.ref{background:var(--ref-bg);color:var(--ref)}
.tag.inflam{background:var(--inflam-bg);color:var(--inflam)}
.tag.ra{background:var(--ra-bg);color:var(--ra)}
.tag.ok{background:#dff3e6;color:var(--ok)}
.tag.warn{background:var(--pay-bg);color:var(--warn)}
.tag.block{background:var(--ref-bg);color:var(--block)}

.eyebrow{font-size:11.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:var(--ink-faint)}

/* 페이지 헤더 */
.phead{margin:4px 0 16px}
.phead h1{font-size:21px;font-weight:800;margin:0 0 4px;letter-spacing:-.02em}
.phead p{margin:0;color:var(--ink-dim);font-size:13.5px}
.axis-line{height:3px;border-radius:3px;margin-top:11px;width:54px}
.axis-line.clin{background:var(--clin)} .axis-line.inflam{background:var(--inflam)}
.axis-line.ra{background:var(--ra)} .axis-line.ref{background:var(--ref)}

/* 칩 입력 */
.chipgrid{display:flex;flex-wrap:wrap;gap:7px;margin:4px 0}
.chip{appearance:none;border:1.4px solid var(--line);background:var(--panel);
  font-family:inherit;font-size:13px;font-weight:600;color:var(--ink-dim);
  padding:7px 12px;border-radius:22px;cursor:pointer;transition:all .13s;line-height:1.3;text-align:left}
.chip:hover{border-color:var(--clin-line);background:var(--clin-bg)}
.chip.on{background:var(--clin);border-color:var(--clin);color:#fff}
.chip.on.spec{background:var(--ref);border-color:var(--ref)}
.chip.redflag{border-color:var(--ref-line)}
.chip.redflag.on{background:var(--ref);border-color:var(--ref)}
.chip small{display:block;font-size:10.5px;font-weight:600;opacity:.72;margin-top:1px}

.grouplbl{font-size:12px;font-weight:750;color:var(--ink-dim);margin:14px 0 6px;
  display:flex;align-items:center;gap:6px}
.grouplbl::before{content:"";width:3px;height:13px;border-radius:2px;background:var(--clin)}
.grouplbl.spec::before{background:var(--ref)} .grouplbl.sug::before{background:var(--warn)}
.grouplbl.non::before{background:var(--ink-faint)}

/* 텍스트영역 */
textarea.freetext{width:100%;min-height:80px;border:1.4px solid var(--line);border-radius:var(--radius-sm);
  padding:11px 12px;font-family:inherit;font-size:14px;line-height:1.5;resize:vertical;color:var(--ink)}
textarea.freetext:focus{outline:none;border-color:var(--clin);box-shadow:0 0 0 3px var(--clin-bg)}

.btn{appearance:none;border:0;border-radius:var(--radius-sm);font-family:inherit;font-weight:700;
  font-size:14px;cursor:pointer;padding:11px 18px;transition:filter .13s}
.btn:hover{filter:brightness(.95)}
.btn.primary{background:var(--clin);color:#fff;width:100%}
.btn.ghost{background:var(--panel2);color:var(--ink-dim);border:1.4px solid var(--line)}
.btn.sm{padding:7px 13px;font-size:12.5px}
.btnrow{display:flex;gap:9px;margin-top:12px;flex-wrap:wrap}

.numrow{display:flex;flex-wrap:wrap;gap:9px;margin:4px 0}
.numfield{flex:1;min-width:84px}
.numfield label{display:block;font-size:11px;font-weight:700;color:var(--ink-dim);margin-bottom:3px}
.numfield input,.numfield select{width:100%;border:1.4px solid var(--line);border-radius:7px;
  padding:8px 9px;font-family:inherit;font-size:14px;color:var(--ink);background:var(--panel)}
.numfield input:focus,.numfield select:focus{outline:none;border-color:var(--clin)}

/* 결과 카드 강조 보더 */
.card.accent-clin{border-left:4px solid var(--clin)}
.card.accent-pay{border-left:4px solid var(--pay)}
.card.accent-ref{border-left:4px solid var(--ref)}
.card.accent-inflam{border-left:4px solid var(--inflam)}
.card.accent-ra{border-left:4px solid var(--ra)}

/* 적신호 카드 */
.redflag-card{background:linear-gradient(180deg,#fff5f5,#fff);border:1.6px solid var(--ref-line);
  border-radius:var(--radius);margin:0 0 13px;box-shadow:0 2px 12px rgba(196,56,56,.12);overflow:hidden}
.redflag-card .rf-h{background:var(--ref);color:#fff;padding:11px 15px;font-weight:800;
  display:flex;align-items:center;gap:8px;font-size:15px}
.redflag-card .rf-b{padding:13px 15px}

/* 확률 게이지 */
.grade{display:flex;align-items:center;gap:13px;margin:2px 0 10px}
.grade-badge{font-size:15px;font-weight:850;padding:8px 16px;border-radius:11px;white-space:nowrap}
.grade-badge.low{background:#e9eef2;color:var(--ink-dim)}
.grade-badge.mid{background:var(--pay-bg);color:var(--pay)}
.grade-badge.high{background:var(--ref-bg);color:var(--ref)}
.grade-meta{font-size:12.5px;color:var(--ink-dim);flex:1}

/* 점수 기여 리스트 */
.contrib{list-style:none;padding:0;margin:8px 0 0}
.contrib li{display:flex;justify-content:space-between;align-items:center;gap:10px;
  padding:7px 11px;border-radius:7px;background:var(--panel2);margin-bottom:5px;font-size:13px}
.contrib li .sc{font-weight:800;font-size:13px;padding:1px 8px;border-radius:20px;min-width:30px;text-align:center}
.contrib li .sc.pos{background:#dff3e6;color:var(--ok)}
.contrib li .sc.neg{background:var(--ref-bg);color:var(--ref)}
.contrib li .sc.zero{background:#e9eef2;color:var(--ink-faint)}

/* 검사 패널 */
.testitem{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-top:1px solid var(--line)}
.testitem:first-child{border-top:0}
.testitem .ti-main{flex:1}
.testitem .ti-name{font-weight:700;font-size:14px}
.testitem .ti-why{font-size:12px;color:var(--ink-dim);margin-top:2px}
.testitem .ti-tags{display:flex;flex-direction:column;gap:4px;align-items:flex-end}

.note{font-size:12.5px;color:var(--ink-dim);background:var(--panel2);border-radius:8px;
  padding:9px 12px;margin-top:10px;line-height:1.5}
.note.warn{background:var(--pay-bg);color:#7a5210}
.note.clin{background:var(--clin-bg);color:#1c4e7e}
.note b{color:inherit}

.banner-diag{font-size:11.5px;font-weight:700;color:var(--ref);background:var(--ref-bg);
  border:1px solid var(--ref-line);border-radius:7px;padding:7px 11px;margin-bottom:11px;
  display:flex;align-items:center;gap:6px}

/* 도서관 */
.searchbar{display:flex;align-items:center;gap:9px;background:var(--panel);border:1.4px solid var(--line);
  border-radius:11px;padding:11px 14px;margin-bottom:14px;box-shadow:var(--shadow)}
.searchbar input{flex:1;border:0;outline:none;font-family:inherit;font-size:15px;background:transparent;color:var(--ink)}
.searchbar .si{font-size:16px;opacity:.5}

.entrygrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.entrycard{border:1.4px solid var(--line);border-radius:var(--radius);padding:14px;cursor:pointer;
  background:var(--panel);transition:all .14s;text-align:left;font-family:inherit}
.entrycard:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(20,40,60,.1)}
.entrycard .ec-ic{font-size:22px;margin-bottom:6px}
.entrycard .ec-t{font-weight:800;font-size:15px;margin-bottom:2px}
.entrycard .ec-d{font-size:12px;color:var(--ink-dim);line-height:1.45}
.entrycard.e-clin{border-top:3px solid var(--clin)}
.entrycard.e-inflam{border-top:3px solid var(--inflam)}
.entrycard.e-ra{border-top:3px solid var(--ra)}
.entrycard.e-ref{border-top:3px solid var(--ref)}

.topicgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.topiccard{border:1.4px solid var(--line);border-radius:var(--radius);padding:13px;cursor:pointer;
  background:var(--panel);transition:all .14s;text-align:left;font-family:inherit;display:flex;flex-direction:column;gap:4px}
.topiccard:hover{border-color:var(--clin-line);background:var(--clin-bg)}
.topiccard .tc-cat{font-size:10px;font-weight:800;letter-spacing:.04em;text-transform:uppercase}
.topiccard.t-clin .tc-cat{color:var(--clin)} .topiccard.t-pay .tc-cat{color:var(--pay)}
.topiccard.t-care .tc-cat,.topiccard.t-ref .tc-cat{color:var(--ref)}
.topiccard .tc-t{font-weight:750;font-size:14px}
.topiccard .tc-d{font-size:11.5px;color:var(--ink-dim);line-height:1.4}

/* 분류기준 점수표 */
.crittable{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
.crittable th{text-align:left;font-size:11px;font-weight:700;color:var(--ink-faint);
  padding:6px 8px;border-bottom:1.5px solid var(--line);text-transform:uppercase;letter-spacing:.03em}
.crittable td{padding:7px 8px;border-bottom:1px solid var(--line);vertical-align:top}
.crittable td.sc{text-align:center;font-weight:800;white-space:nowrap;width:48px}
.crittable td.sc.pos{color:var(--ok)} .crittable td.sc.neg{color:var(--ref)}
.crittable tr.dom td{background:var(--panel2);font-weight:750;font-size:11.5px;color:var(--ink-dim);
  text-transform:uppercase;letter-spacing:.03em}

/* 모달 */
.modal{position:fixed;inset:0;background:rgba(15,25,35,.55);z-index:200;display:none;
  align-items:flex-start;justify-content:center;padding:18px;overflow-y:auto}
.modal.open{display:flex}
.modal-inner{background:var(--panel);border-radius:16px;max-width:760px;width:100%;margin:24px 0;
  box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden}
.modal-h{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;
  align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;background:var(--panel);z-index:1}
.modal-h .mh-t{font-weight:800;font-size:16px;display:flex;align-items:center;gap:8px}
.modal-close{appearance:none;border:0;background:var(--panel2);width:32px;height:32px;border-radius:8px;
  font-size:17px;cursor:pointer;color:var(--ink-dim);flex-shrink:0}
.modal-b{padding:16px 18px}

.def-card{border:1px solid var(--line);border-radius:10px;margin-bottom:9px;overflow:hidden}
.def-card .dc-h{padding:10px 13px;font-weight:700;font-size:14px;cursor:pointer;display:flex;
  justify-content:space-between;align-items:center;background:var(--panel2)}
.def-card .dc-b{padding:11px 13px;font-size:13px;line-height:1.55;display:none;border-top:1px solid var(--line)}
.def-card.open .dc-b{display:block}
.def-card .dc-h .arr{transition:transform .15s}
.def-card.open .dc-h .arr{transform:rotate(90deg)}

h3.sec{font-size:14px;font-weight:800;margin:18px 0 8px;color:var(--ink)}
h3.sec:first-child{margin-top:2px}
ul.kp{margin:6px 0;padding-left:19px}
ul.kp li{margin-bottom:5px;font-size:13.5px;line-height:1.5}

/* 푸터 */
.footer{max-width:880px;margin:30px auto 0;padding:18px 16px 40px;border-top:1px solid var(--line);
  font-size:11.5px;color:var(--ink-faint);line-height:1.6}
.footer h4{font-size:12px;font-weight:800;color:var(--ink-dim);margin:14px 0 6px;text-transform:uppercase;letter-spacing:.04em}
.footer a{color:var(--clin);text-decoration:none;word-break:break-all}
.footer a:hover{text-decoration:underline}
.footer .src-item{margin-bottom:4px}
.footer .disclaim{background:var(--ref-bg);border:1px solid var(--ref-line);border-radius:8px;
  padding:11px 13px;margin:14px 0;color:#8a2828;font-weight:600;line-height:1.55}

.hint{font-size:12px;color:var(--ink-faint);margin-top:6px}
.flow3{margin:12px 0;border:1px solid var(--clin-line);border-radius:10px;overflow:hidden}
.flow-step{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;background:var(--clin-bg);font-size:13px;line-height:1.45}
.flow-step .fs-num{flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--clin);color:#fff;
  font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center}
.flow-step:nth-child(3){background:#fff}
.flow-step:nth-child(5){background:var(--panel2)}
.flow-arrow{text-align:center;color:var(--clin);font-size:12px;padding:1px 0;background:#fff}.empty-hint{text-align:center;color:var(--ink-faint);font-size:13px;padding:24px 12px;line-height:1.6}

@media (max-width:560px){
  .entrygrid,.topicgrid{grid-template-columns:1fr}
  .brand span.full{display:none}
  .navbtn{padding:0 9px;font-size:12px}
}
</style>
</head>
<body>

<!-- ===== 상단 고정 메뉴 ===== -->
<nav class="topbar">
  <div class="topbar-inner">
    <div class="brand"><span class="mk">🦴</span><span class="full">류마티스 감별</span></div>
    <button class="navbtn active" data-tab="library"><span class="ic">📚</span>도서관</button>
    <button class="navbtn" data-tab="symptom"><span class="ic">🩺</span>증상</button>
    <button class="navbtn" data-tab="result"><span class="ic">🔬</span>결과해석</button>
    <button class="navbtn" data-tab="inflam"><span class="ic">🔥</span>자가염증</button>
    <button class="navbtn" data-tab="ra"><span class="ic">🖐</span>RA</button>
  </div>
</nav>

<main class="wrap" id="main"></main>

<footer class="footer" id="footer"></footer>

<div class="modal" id="modal"><div class="modal-inner">
  <div class="modal-h"><div class="mh-t" id="modalTitle"></div>
    <button class="modal-close" onclick="closeModal()">✕</button></div>
  <div class="modal-b" id="modalBody"></div>
</div></div>

<script>
/* =========================================================================
   DATA LAYER — 단일 진실 공급원. 엔진은 ID로 인용만.
   ========================================================================= */

/* ---- 증상: id·라벨·특이도(spec/sug/non)·질환 시사벡터·redflag·구어사전 ---- */
const SYMPTOMS = [
  // specific (강하게 CTD 시사)
  {id:"rheum:sx:raynaud",label:"레이노 현상",grp:"vascular",spec:"spec",
   vec:{ssc:3,sle:1,mctd:2},lex:["하얗게 변","창백","찬 데","찬데","손끝이 하","손가락 색","레이노","파랗게 변","손이 시리면서 색"]},
  {id:"rheum:sx:malar_rash",label:"광과민 말라르(나비형) 발진",grp:"skin",spec:"spec",
   vec:{sle:3},lex:["나비","볼에 발진","뺨에 발진","햇빛에 발진","햇빛 보면","광과민","뺨이 빨"]},
  {id:"rheum:sx:oral_ulcer",label:"반복 구강궤양",grp:"mucosa",spec:"sug",
   vec:{sle:2},lex:["입안이 자주 헐","입안이 헐","구내염","입안 궤양","입이 자주 헐"]},
  {id:"rheum:sx:sicca",label:"시카(구강·안구건조)",grp:"mucosa",spec:"sug",
   vec:{sjogren:3,sle:1},lex:["입이 마르","입도 마르","입도 자주 마","입이 자주 마","입 마름","입안이 마르","눈이 뻑뻑","눈이 건조","모래알","침이 안","구강건조","안구건조"]},
  {id:"rheum:sx:proximal_weakness",label:"근위부 근력약화",grp:"muscle",spec:"sug",
   vec:{iim:3},lex:["계단 오르기 힘","팔을 올리기 힘","팔 들기 힘","머리 감기 힘","의자에서 일어나기","앉았다 일어나기 힘"]},
  {id:"rheum:sx:photosens_skin",label:"고트론/헬리오트로프 등 근염 피부",grp:"skin",spec:"spec",
   vec:{iim:3},lex:["눈두덩 보라","눈꺼풀 보라","손등 마디 발진","고트론","헬리오트로프"]},
  {id:"rheum:sx:fingertip_lesion",label:"손끝 궤양·sclerodactyly",grp:"skin",spec:"spec",
   vec:{ssc:3},lex:["손끝 궤양","손끝이 헐","손가락 피부가 딱딱","손가락이 굳","피부가 두꺼","손가락이 뻣뻣하게 굳"]},

/* ---- 자유텍스트 추출 (로컬 사전, 부정 스코프) ---- */
function extractSymptoms(text){
  if(!text||!text.trim())return [];
  const t=text.toLowerCase();
  const found=[];
  const negWords=["없","아니","아닌","않","아님"];
  SYMPTOMS.forEach(s=>{
    if(!s.lex)return;
    for(const phrase of s.lex){
      const idx=t.indexOf(phrase.toLowerCase());
      if(idx>=0){
        // 부정 스코프: 어구 직후 8자 또는 직전 5자 내 부정어
        const tail=t.slice(idx+phrase.length, idx+phrase.length+8);
        const head=t.slice(Math.max(0,idx-5), idx);
        const negated=negWords.some(n=>tail.includes(n)||head.includes(n));
        if(!negated){found.push({id:s.id,phrase,label:s.label});}
        break;
      }
    }
  });
  return found;
}

/* ---- 적신호 게이트 (점수 우회) ---- */
function redflagGate(ids){
  const hits=[];
  ids.forEach(id=>{
    const s=SYMPTOMS.find(x=>x.id===id);
    if(s&&s.redflag&&!hits.find(h=>h.key===s.redflag)){
      hits.push({key:s.redflag,...REDFLAGS[s.redflag],trigger:s.label});
    }
  });
  return hits;
}

/* ---- 검사 전 확률 점수화 (비특이 캡) ---- */
function pretestScore(ids){
  const sel=ids.map(id=>SYMPTOMS.find(s=>s.id===id)).filter(Boolean);
  const specW={spec:5,sug:2.5,non:1};
  let raw=0, hasSpec=false, hasSug=false, nonOnly=true;
  const vec={};
  const contrib=[];
  sel.forEach(s=>{
    const w=specW[s.spec];
    raw+=w;
    if(s.spec==="spec"){hasSpec=true;nonOnly=false;}
    if(s.spec==="sug"){hasSug=true;nonOnly=false;}
    contrib.push({label:s.label,spec:s.spec,w});
    if(s.vec)Object.entries(s.vec).forEach(([d,v])=>{vec[d]=(vec[d]||0)+v;});
  });
  // 등급 산정
  let grade="low";
  if(hasSpec && (hasSug||raw>=8)) grade="high";
  else if(hasSpec||hasSug) grade="mid";
  // 비특이 캡: nonOnly면 mid 이상 불가
  let capped=false;
  if(nonOnly && grade!=="low"){grade="low";capped=true;}
  if(nonOnly && raw>=4){capped=true;} // 비특이 다수 경고
  // 질환 기울기 정렬
  const leaning=Object.entries(vec).sort((a,b)=>b[1]-a[1]).slice(0,3)
    .map(([d,v])=>({dz:d,score:v}));
  return {grade,raw:Math.round(raw*10)/10,contrib,leaning,capped,nonOnly,hasSpec,hasSug,count:sel.length};
}

/* dz 키 → 검사패널 키 매핑 */
const DZ2PANEL={sle:"sle",ra:"ra",sjogren:"sjogren",ssc:"ssc",iim:"iim",pmr:"pmr",
  gca:"gca",aosd:"aosd",gpa:"vasculitis",mpa:"vasculitis",egpa:"vasculitis",mctd:"sle"};

function recommendPanels(leaning){
  const seen=new Set(); const out=[];
  leaning.forEach(l=>{
    const pk=DZ2PANEL[l.dz]; if(pk&&!seen.has(pk)){seen.add(pk);out.push(TEST_PANELS[pk]);}
  });
  return out;
}

/* ---- ANA 해석 ---- */
function interpretANA(patternId,titer){
  const p=ANA_PATTERNS.find(x=>x.id===patternId);
  if(!p)return null;
  let titerNote="";
  if(titer){
    const n=parseInt(titer.replace(/[^0-9]/g,""))||0;
    if(n>0&&n<80)titerNote="저역가(1:80 미만) — 위양성 가능성↑, 건강인서도 흔함. 단독으로 의미 약함";
    else if(n>=640)titerNote="고역가 — 임상적 의의↑";
    else if(n>=80)titerNote="유의 역가 — 임상 맥락과 함께 해석";
  }
  return {...p,titerNote};
}

/* ---- ANCA 해석 ---- */
function interpretANCA(pr3,mpo){
  const out=[];
  if(pr3)out.push(ANCA_MAP.pr3);
  if(mpo)out.push(ANCA_MAP.mpo);
  return out;
}

/* ---- 분류기준 점수 (수동 항목 선택 기반) ---- */
function criteriaScore(critId, checkedIdx){
  const c=CRITERIA[critId]; if(!c)return null;
  let total=0; const contributing=[];
  if(c.items){ // AAV 평면 구조
    c.items.forEach((it,i)=>{ if(checkedIdx.includes(critId+"_"+i)){total+=it[1];contributing.push({label:it[0],score:it[1]});} });
  } else if(c.domains){ // 도메인 구조 (최고가중 1개 규칙 적용)
    c.domains.forEach((d,di)=>{
      let domMax=null;
      d.items.forEach((it,ii)=>{
        if(checkedIdx.includes(critId+"_"+di+"_"+ii)){
          if(domMax===null||it[1]>domMax.score)domMax={label:it[0],score:it[1],dom:d.dom};
        }
      });
      if(domMax){total+=domMax.score;contributing.push(domMax);}
    });
  }
  const thr=c.threshold;
  return {total,threshold:thr,classified:thr!=null&&total>=thr,contributing,label:c.label,source:c.source};
}

  box.innerHTML=`<div class="note clin" style="margin-top:12px"><b>추출됨 — 확인 후 반영</b> (탭하면 체크리스트에 추가)</div>

function runPretest(){
  const ids=[...STATE.sxSelected];
  const out=$("#pretestOut");
  if(!ids.length){out.innerHTML=`<div class="empty-hint">증상을 하나 이상 선택하세요.</div>`;return;}
  const rf=redflagGate(ids);
  const sc=pretestScore(ids);
  let html="";
  // 적신호 우선
  rf.forEach(r=>{
    html+=`<div class="redflag-card"><div class="rf-h">${r.icon} ${r.label}</div>
      <div class="rf-b"><div style="font-size:12px;color:var(--ink-dim);margin-bottom:5px">유발: ${r.trigger}</div>
      ${r.action}</div></div>`;
  });
  // 확률 카드
  const gradeLbl={low:"저확률",mid:"중확률",high:"고확률"}[sc.grade];
  html+=`<div class="card accent-clin"><div class="card-h">📊 검사 전 확률</div><div class="card-b">
    <div class="grade"><span class="grade-badge ${sc.grade}">${gradeLbl}</span>
      <span class="grade-meta">가중점수 ${sc.raw} · 선택 증상 ${sc.count}개${sc.leaning.length?` · 기울기: ${sc.leaning.map(l=>dzLabel(l.dz)).join(", ")}`:""}</span></div>`;
  if(sc.nonOnly||sc.capped){
    html+=`<div class="note warn"><b>⚠ 비특이 증상 위주.</b> ANA 위양성 폭포 주의 — 건강인 25~30%가 ANA 양성(고령↑). 무차별 ANA는 오진 유도. 특이 증상(레이노·말라르 발진 등) 없이 관절통·피로만이면 검사 자제 고려.</div>`;
  }
  if(sc.contrib.length){
    html+=`<ul class="contrib">${sc.contrib.map(c=>{
      const cls=c.spec==="spec"?"pos":c.spec==="sug"?"pos":"zero";
      const tag={spec:"강",sug:"중",non:"비특이"}[c.spec];
      return `<li><span>${c.label} <small style="color:var(--ink-faint)">[${tag}]</small></span><span class="sc ${cls}">+${c.w}</span></li>`;}).join("")}</ul>`;
  }
  html+=`</div></div>`;
  // 검사 패널
  if(sc.grade!=="low"||sc.leaning.length){
    const panels=recommendPanels(sc.leaning);
    if(panels.length){
      html+=`<div class="card accent-clin"><div class="card-h">🧪 권고 검사 패널 (표적)</div><div class="card-b tight">
        ${panels.map(p=>`<div class="testitem"><div class="ti-main">
          <div class="ti-name">${p.label}</div>
          <div class="ti-why">1차: ${p.first.join(" · ")}${p.reflex.length?` → 반사: ${p.reflex.join(" · ")}`:""}</div>
          ${p.reflexNote?`<div class="ti-why" style="color:var(--pay)">${p.reflexNote}</div>`:""}
        </div></div>`).join("")}
        <div class="note"><b>급여:</b> ${REIMB.ena.note}</div>
      </div></div>`;
    }
  }
  out.innerHTML=html;
  out.scrollIntoView({behavior:"smooth",block:"start"});
}

let CRIT_CHECKED=new Set();
function renderCritForm(critId){
  CRIT_CHECKED=new Set();
  const box=$("#critForm");
  if(!critId){box.innerHTML="";return;}
  const c=CRITERIA[critId];
  if(c.probabilistic){
    box.innerHTML=`<div class="note clin" style="margin-top:12px"><b>${c.label}</b> — ${c.rule}</div>
      <h3 class="sec">간이 점검 항목</h3><ul class="kp">${c.simpleItems.map(i=>`<li>${i}</li>`).join("")}</ul>
      <div class="note warn">확률 기반 정밀 회귀점수는 전문의 영역. 1차에서는 anti-Jo1·CK·근위부약화가 핵심 단서.</div>`;
    return;
  }
  let rows="";
  if(c.entry)rows+=`<div class="note clin" style="margin-bottom:10px"><b>진입조건:</b> ${c.entry.lab}</div>`;
  if(c.prereq)rows+=`<div class="note clin" style="margin-bottom:10px"><b>전제:</b> ${c.prereq}</div>`;
  rows+=`<div class="note" style="margin-bottom:10px">${c.rule}</div>`;
  if(c.items){
    rows+=`<div class="chipgrid" style="flex-direction:column;align-items:stretch">`;
    c.items.forEach((it,i)=>{
      rows+=`<button class="chip" style="display:flex;justify-content:space-between" onclick="toggleCrit('${critId}_${i}',this)">
        <span>${it[0]} <small style="color:var(--ink-faint)">${it[2]}</small></span>
        <b style="color:${it[1]<0?'var(--ref)':'var(--ok)'}">${it[1]>0?'+':''}${it[1]}</b></button>`;
    });
    rows+=`</div>`;
  } else if(c.domains){
    c.domains.forEach((d,di)=>{
      rows+=`<div class="grouplbl">${d.dom}</div><div class="chipgrid" style="flex-direction:column;align-items:stretch">`;
      d.items.forEach((it,ii)=>{
        rows+=`<button class="chip" style="display:flex;justify-content:space-between" onclick="toggleCrit('${critId}_${di}_${ii}',this)">
          <span>${it[0]}</span><b style="color:${it[1]<0?'var(--ref)':'var(--ok)'}">${it[1]>0?'+':''}${it[1]}</b></button>`;
      });
      rows+=`</div>`;
    });
  }
  rows+=`<button class="btn primary" style="margin-top:14px" onclick="calcCrit('${critId}')">점수 계산</button><div id="critResult"></div>`;
  box.innerHTML=rows;
}
function toggleCrit(key,el){
  if(CRIT_CHECKED.has(key))CRIT_CHECKED.delete(key);else CRIT_CHECKED.add(key);
  el.classList.toggle("on");
}
function calcCrit(critId){
  const r=criteriaScore(critId,[...CRIT_CHECKED]);
  const box=$("#critResult");
  box.innerHTML=`<div class="card ${r.classified?'accent-ref':'accent-clin'}" style="margin-top:13px"><div class="card-b">
    <div class="grade"><span class="grade-badge ${r.classified?'high':'low'}">${r.total}점 / 역치 ${r.threshold}</span>
      <span class="grade-meta">${r.classified?'분류기준 충족':'미충족'}</span></div>
    ${r.contributing.length?`<ul class="contrib">${r.contributing.map(c=>`<li><span>${c.label}</span>
      <span class="sc ${c.score<0?'neg':c.score>0?'pos':'zero'}">${c.score>0?'+':''}${c.score}</span></li>`).join("")}</ul>`:""}
    <div class="note warn">★이것은 <b>분류기준상 점수</b>일 뿐 진단이 아닙니다. "${r.label} 분류기준 ${r.total}점(역치 ${r.threshold}) — 전문의 평가 권고".</div>
  </div></div>`;
  box.scrollIntoView({behavior:"smooth",block:"nearest"});
}

    RA는 <b>첫 3개월~1년이 치료 결정적</b>. 미란은 늦게 와서 X-ray 정상이 안심 근거가 아니다.<br>
    <b>의뢰 트리거(하나라도):</b> 소관절 침범 / ≥3 종창관절 / squeeze 양성 / 아침강직 ≥30분 / 증상~내원 3개월 이상 지연.<br>

    <p style="font-size:12.5px;color:var(--ink-dim);margin:0 0 10px">계열 카드를 탭하면 성분별 용법·특징·부작용·모니터링·금기가 펼쳐집니다.</p>

/* ---------- 토픽 모달 ---------- */
function openTopic(id){
  const content=TOPIC_CONTENT[id];
  if(!content){openModalRaw("준비 중","이 토픽은 다음 빌드에서 확장됩니다.");return;}
  openModalRaw(content.title,content.body);
}
function openCriteriaModal(critId){
  const c=CRITERIA[critId];
  let body=`<div class="banner-diag">⚠ 분류기준 ≠ 진단기준 · 임상판단 보조용</div>`;
  if(c.entry)body+=`<div class="note clin"><b>진입조건:</b> ${c.entry.lab}</div>`;
  if(c.prereq)body+=`<div class="note clin"><b>전제:</b> ${c.prereq}</div>`;
  body+=`<div class="note">${c.rule}</div>`;
  body+=`<table class="crittable"><thead><tr><th>항목</th><th style="text-align:center">점수</th></tr></thead><tbody>`;
  if(c.items){
    c.items.forEach(it=>{body+=`<tr><td>${it[0]} <small style="color:var(--ink-faint)">${it[2]}</small></td>
      <td class="sc ${it[1]<0?'neg':'pos'}">${it[1]>0?'+':''}${it[1]}</td></tr>`;});
  } else if(c.domains){
    c.domains.forEach(d=>{body+=`<tr class="dom"><td colspan="2">${d.dom}</td></tr>`;
      d.items.forEach(it=>{body+=`<tr><td>${it[0]}</td><td class="sc ${it[1]<0?'neg':'pos'}">${it[1]>0?'+':''}${it[1]}</td></tr>`;});});
  } else if(c.simpleItems){
    c.simpleItems.forEach(i=>{body+=`<tr><td>${i}</td><td class="sc">✓</td></tr>`;});
  }
  body+=`</tbody></table>`;
  const src=SOURCES.criteria.find(s=>s[0].includes(c.label)||c.source.includes(s[0].split(" ")[1]||"___"));
  body+=`<div class="note" style="margin-top:12px"><b>출처:</b> ${c.source}</div>`;
  openModalRaw(`${c.label} — ${c.source}`,body);
}
function openModalRaw(title,body){
  $("#modalTitle").innerHTML=title;
  $("#modalBody").innerHTML=body;
  $("#modal").classList.add("open");
}
function closeModal(){$("#modal").classList.remove("open");}
$("#modal").addEventListener("click",e=>{if(e.target.id==="modal")closeModal();});

/* ---------- 푸터 (출처) ---------- */
function renderFooter(){
  document.getElementById("footer").innerHTML=`
  <div class="disclaim">분류기준은 진단기준이 아니며, 본 도구는 임상판단 보조용입니다. 자가면역질환 확진·치료는 류마티스 전문의 영역이며, 최종 결정은 진료의 책임입니다. 급여기준은 갱신될 수 있으므로 청구 시 최신 심평원 고시·허가사항을 확인하세요.</div>
  <h4>분류기준 (ACR/EULAR 등)</h4>
  ${SOURCES.criteria.map(s=>`<div class="src-item">• ${s[0]} — ${s[1]}${s[2]?` · <a href="${s[2]}" target="_blank" rel="noopener">link</a>`:""}</div>`).join("")}
  <h4>ANA 패턴·검사·급여</h4>
  ${SOURCES.other.map(s=>`<div class="src-item">• ${s[0]} — ${s[1]}${s[2]?` · <a href="${s[2]}" target="_blank" rel="noopener">link</a>`:""}</div>`).join("")}
  <div style="margin-top:16px;color:var(--ink-faint)">박형도 · 화성유일병원 · 외래 임상판단 보조 도구 · 단일 HTML 로컬</div>`;
}

/* 초기 렌더 */
renderFooter();
render();

</script>
