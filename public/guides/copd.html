<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>COPD 처방 가이드</title>
<style>
:root{
  --bg:#f4f6f8; --panel:#ffffff; --panel2:#eef1f4; --line:#d6dde3;
  --ink:#1a2530; --ink-dim:#4a5a68; --ink-faint:#8493a0;
  --pay:#b87514; --pay-bg:#fbf0d8;
  --clin:#2c6fb0; --clin-bg:#e4eef8;
  --care:#1a8a72; --care-bg:#dcf2ec;
  --bio:#7a4fb0; --bio-bg:#efe7f7;
  --ok:#1f9d54; --warn:#b87514; --block:#c43838; --alert:#d8632a;
  --shadow:0 1px 3px rgba(20,40,60,.08),0 1px 2px rgba(20,40,60,.04);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  font-size:15px;line-height:1.5;-webkit-text-size-adjust:100%;}
body{padding-bottom:20px;}

/* 헤더 — 일반 흐름(스크롤 시 올라감), 탭바가 상단 고정 */
.hdr{position:relative;z-index:41;background:linear-gradient(180deg,#1a8a72,#15786a);
  color:#fff;padding:11px 14px;box-shadow:0 2px 8px rgba(20,40,60,.12);}
.hdr h1{margin:0;font-size:17px;font-weight:700;letter-spacing:-.2px;display:flex;align-items:center;gap:7px;}
.hdr .sub{font-size:11px;opacity:.85;margin-top:2px;}

/* 탭바 — 상단 고정(sticky) */
.tabbar{position:sticky;top:0;z-index:40;display:flex;
  background:var(--panel);border-bottom:1px solid var(--line);box-shadow:0 2px 6px rgba(20,40,60,.06);}
.tabbar button{flex:1;border:0;background:none;padding:9px 4px 8px;font-size:11px;color:var(--ink-faint);
  display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;font-family:inherit;
  border-bottom:2px solid transparent;}
.tabbar button .ic{font-size:19px;line-height:1;}
.tabbar button.on{color:var(--care);font-weight:700;border-bottom-color:var(--care);}

.wrap{max-width:680px;margin:0 auto;padding:12px;}

/* 검색 */
/* 검색바 (돋보기 아이콘) */
.searchbar{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);
  border-radius:11px;padding:10px 13px;margin-bottom:12px;box-shadow:var(--shadow);}
.searchbar .si{color:var(--ink-faint);font-size:15px;}
.searchbar input{flex:1;border:none;outline:none;font-size:15px;font-family:inherit;background:none;color:var(--ink);}
.search{display:flex;gap:8px;margin-bottom:12px;}
.search input{flex:1;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:14px;
  background:var(--panel);color:var(--ink);font-family:inherit;}
.search input:focus{outline:none;border-color:var(--care);}

/* 시뮬 유도 인트로 카드 */
.intro-card{display:block;width:100%;text-align:left;border:0;cursor:pointer;font-family:inherit;
  background:linear-gradient(135deg,var(--care),#14786a);color:#fff;border-radius:14px;
  padding:14px 16px;margin-bottom:13px;box-shadow:0 2px 8px rgba(20,138,114,.18);}
.intro-card:active{transform:scale(.99);}
.intro-card .t{font-size:16px;font-weight:700;margin-bottom:3px;}
.intro-card .d{font-size:12.5px;opacity:.93;line-height:1.45;}

/* 카드 */
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 14px;
  margin-bottom:11px;box-shadow:var(--shadow);}
.card.pay{border-left:3px solid var(--pay);}
.card.clin{border-left:3px solid var(--clin);}
.card.care{border-left:3px solid var(--care);}
.card.bio{border-left:3px solid var(--bio);}
.sec-title{font-size:13px;font-weight:700;color:var(--ink-dim);margin-bottom:8px;letter-spacing:-.2px;}

/* 토픽 그리드 — 아이콘 + 카테고리 배지 상단 행 */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:380px){.grid{grid-template-columns:1fr;}}
.topic{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:13px 14px;
  cursor:pointer;box-shadow:var(--shadow);transition:transform .08s;text-align:left;font-family:inherit;
  border-left:3px solid var(--line);display:block;width:100%;}
.topic:active{transform:scale(.98);}
.topic.clin{border-left-color:var(--clin);} .topic.care{border-left-color:var(--care);} .topic.pay{border-left-color:var(--pay);}
.topic .th{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.topic .ico{font-size:19px;line-height:1;}
.topic .cat{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;margin-left:auto;}
.topic .cat.clin{background:var(--clin-bg);color:var(--clin);}
.topic .cat.care{background:var(--care-bg);color:var(--care);}
.topic .cat.pay{background:var(--pay-bg);color:var(--pay);}
.topic .tt{font-size:14.5px;font-weight:700;letter-spacing:-.3px;color:var(--ink);}
.topic .ts{font-size:11px;margin-top:4px;color:var(--ink-faint);line-height:1.4;}

/* 배지 */
.badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;line-height:1.6;}
.badge.ok{background:#e4f6ec;color:var(--ok);}
.badge.pay{background:var(--pay-bg);color:var(--pay);}
.badge.warn{background:#fbeede;color:var(--alert);}
.badge.block{background:#fbe4e4;color:var(--block);}
.badge.bio{background:var(--bio-bg);color:var(--bio);}
.badge.clin{background:var(--clin-bg);color:var(--clin);}
.badge.care{background:var(--care-bg);color:var(--care);}

/* deepAccordion */
.acc{border:1px solid var(--line);border-radius:9px;margin-bottom:8px;overflow:hidden;background:var(--panel);}
.acc-h{padding:10px 12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;
  font-size:13.5px;font-weight:600;color:var(--ink);gap:8px;}
.acc-h:active{background:var(--panel2);}
.acc-h .chev{color:var(--ink-faint);font-size:12px;transition:transform .15s;flex-shrink:0;}
.acc.open .acc-h .chev{transform:rotate(90deg);}
.acc-b{display:none;padding:0 12px 12px;font-size:13px;color:var(--ink-dim);line-height:1.55;}
.acc.open .acc-b{display:block;}

/* keypoint list */
ul.kp{margin:6px 0 0;padding-left:18px;}
ul.kp li{margin-bottom:5px;font-size:13px;color:var(--ink-dim);line-height:1.5;}
.tag{font-weight:700;color:var(--ink);}

/* 표 */
.tbl{width:100%;border-collapse:collapse;font-size:12px;margin-top:6px;}
.tbl th,.tbl td{border:1px solid var(--line);padding:6px 7px;text-align:left;vertical-align:top;}
.tbl th{background:var(--panel2);font-weight:700;color:var(--ink-dim);font-size:11.5px;}
.tbl td.hl{background:#fff7e8;}

/* 그림 */
.figbox{margin:8px 0;text-align:center;}
.figbox img{max-width:100%;border:1px solid var(--line);border-radius:8px;cursor:zoom-in;}
.figcap{font-size:11px;color:var(--ink-faint);margin-top:4px;}

/* 인터랙티브 알고리즘 도표 (그림 3-3 / 3-4 재현) */
.algo{margin:10px 0;border:1px solid var(--line);border-radius:10px;padding:10px;background:var(--panel);}
.algo .atitle{font-size:12px;font-weight:700;color:var(--ink-dim);margin-bottom:8px;}
.algo-tbl{display:grid;gap:5px;}
.algo-tbl .acell{border:1.5px solid var(--line);border-radius:8px;padding:8px 4px;font-size:11px;
  text-align:center;background:var(--panel);color:var(--ink-dim);line-height:1.3;transition:all .15s;
  overflow:hidden;word-break:break-word;}
.algo-tbl .acell.colh{background:var(--panel2);font-weight:700;color:var(--ink-dim);font-size:10px;}
.algo-tbl .acell.rowh{background:var(--panel2);font-weight:700;color:var(--ink-dim);display:flex;
  flex-direction:column;justify-content:center;font-size:10.5px;}
.algo-tbl .acell .rg{font-weight:800;font-size:11.5px;color:var(--ink);display:block;word-break:break-word;}
.algo-tbl .acell .sub{font-size:9px;color:var(--ink-faint);margin-top:2px;}
.algo-tbl .acell.icsr{background:#fdf3e6;}
.algo-tbl .acell.bior{background:var(--bio-bg);}
/* 환자가 속한 칸 하이라이트 */
.algo-tbl .acell.hit{border-color:var(--care);border-width:2.5px;background:var(--care-bg);
  box-shadow:0 0 0 2px rgba(26,138,114,.12);position:relative;z-index:2;}
.algo-tbl .acell.hit .rg{color:var(--care);}
.algo-tbl .acell.hit.bior{background:var(--bio-bg);border-color:var(--bio);box-shadow:0 0 0 3px rgba(122,79,176,.15);}
.algo-tbl .acell.hit.bior .rg{color:var(--bio);}
.algo-tbl .acell.dim{opacity:.42;}
.algo-hitlabel{display:inline-block;background:var(--care);color:#fff;font-size:9px;font-weight:700;
  padding:1px 6px;border-radius:10px;margin-bottom:3px;}
.algo-tbl .acell.hit.bior .algo-hitlabel{background:var(--bio);}
.algo-path{font-size:11.5px;color:var(--ink-dim);line-height:1.5;margin-top:8px;padding:8px 10px;
  background:var(--care-bg);border-radius:8px;border-left:3px solid var(--care);}
.algo-path b{color:var(--care);}
.algo-legend{font-size:10px;color:var(--ink-faint);margin-top:6px;text-align:center;}

/* 점수→분류→약제 흐름 다이어그램 */
.flowdiag{display:flex;flex-direction:column;gap:6px;margin:8px 0;}
.flowdiag .fstep{border:1px solid var(--line);border-radius:9px;padding:9px 11px;background:var(--panel);position:relative;}
.flowdiag .fstep .fh{font-size:10.5px;font-weight:700;color:var(--ink-faint);margin-bottom:2px;}
.flowdiag .fstep .fv{font-size:13px;font-weight:700;color:var(--ink);}
.flowdiag .farrow{text-align:center;color:var(--care);font-size:14px;line-height:.6;}
.flowdiag .fstep.sym{border-left:3px solid var(--clin);}
.flowdiag .fstep.cls{border-left:3px solid var(--care);}
.flowdiag .fstep.drg{border-left:3px solid var(--pay);background:var(--care-bg);}

/* 출처배너 */
.banner{background:var(--care-bg);border:1px solid #b8e0d5;border-radius:10px;padding:10px 12px;
  font-size:11.5px;color:#0d6e5a;line-height:1.5;margin-bottom:12px;}

/* 입력(플로우) */
.field{margin-bottom:10px;}
.field label{font-size:12px;font-weight:600;color:var(--ink-dim);display:block;margin-bottom:4px;}
.field input,.field select{width:100%;border:1px solid var(--line);border-radius:8px;padding:8px 10px;
  font-size:14px;background:var(--panel);color:var(--ink);font-family:inherit;}
.field input:focus,.field select:focus{outline:none;border-color:var(--care);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;}
.chip{border:1px solid var(--line);border-radius:18px;padding:5px 11px;font-size:12px;cursor:pointer;
  background:var(--panel);color:var(--ink-dim);user-select:none;}
.chip.on{background:var(--care);color:#fff;border-color:var(--care);font-weight:600;}
/* 제품 칩 내 조합 배지 */
.combobadge{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;
  margin-left:5px;vertical-align:middle;letter-spacing:-.2px;}
.combobadge.c-laba{background:#e4eef8;color:#2c6fb0;}
.combobadge.c-lama{background:#e4eef8;color:#2c6fb0;}
.combobadge.c-ll{background:#dcf2ec;color:#1a8a72;}
.combobadge.c-il{background:#fdf3e6;color:#b87514;}
.combobadge.c-ill{background:#efe7f7;color:#7a4fb0;}
.chip.on .combobadge{background:rgba(255,255,255,.25);color:#fff;}
.btn{width:100%;border:0;border-radius:10px;padding:12px;font-size:15px;font-weight:700;
  background:var(--care);color:#fff;cursor:pointer;font-family:inherit;margin-top:4px;}
.btn:active{opacity:.9;}

/* 결과 카드 헤더 */
.rescard-h{font-size:13px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.rescard-h.pay{color:var(--pay);} .rescard-h.clin{color:var(--clin);} .rescard-h.care{color:var(--care);} .rescard-h.bio{color:var(--bio);}

/* 병렬 분류 배지 */
.dualcls{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px;}
.clsbox{border:1px solid var(--line);border-radius:9px;padding:9px 10px;text-align:center;}
.clsbox .lab{font-size:10.5px;color:var(--ink-faint);}
.clsbox .val{font-size:16px;font-weight:800;margin-top:2px;}
.clsbox.k{background:var(--care-bg);} .clsbox.k .val{color:var(--care);}
.clsbox.g{background:var(--clin-bg);} .clsbox.g .val{color:var(--clin);}

/* 모달 */
.modal{position:fixed;inset:0;background:rgba(20,30,40,.82);z-index:90;display:none;
  align-items:center;justify-content:center;padding:14px;}
.modal.on{display:flex;}
.modal img{max-width:100%;max-height:88vh;border-radius:8px;}
.modal .x{position:absolute;top:14px;right:18px;color:#fff;font-size:30px;cursor:pointer;line-height:1;}

/* 시뮬 노드 */
.simnode{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:12px 13px;margin-bottom:10px;box-shadow:var(--shadow);}
.simnode .q{font-size:14px;font-weight:700;margin-bottom:4px;}
.simnode .stage{font-size:12px;color:var(--ink-faint);margin-bottom:8px;}
.simnode .opt{border:1px solid var(--line);border-radius:8px;padding:9px 11px;margin-bottom:6px;cursor:pointer;font-size:13px;}
.simnode .opt:active{background:var(--panel2);}
.simnode .opt.sel{background:var(--care-bg);border-color:var(--care);}
.block3{display:grid;gap:6px;margin-top:8px;}
.b3{border-radius:8px;padding:8px 10px;font-size:12px;line-height:1.5;}
.b3.clin{background:var(--clin-bg);} .b3.pay{background:var(--pay-bg);} .b3.why{background:#f1f4f6;}
.b3 .h{font-weight:700;font-size:11px;margin-bottom:3px;}
.b3.clin .h{color:var(--clin);} .b3.pay .h{color:var(--pay);} .b3.why .h{color:var(--ink-dim);}

.sticky-collect{position:sticky;bottom:12px;background:var(--care-bg);border:1px solid #b8e0d5;
  border-radius:11px;padding:10px 12px;margin-top:12px;box-shadow:0 -2px 8px rgba(20,40,60,.06);}
.sticky-collect .t{font-size:12px;font-weight:700;color:var(--care);margin-bottom:5px;}
.sticky-collect ul{margin:0;padding-left:17px;} .sticky-collect li{font-size:12px;color:#0d6e5a;margin-bottom:3px;}

.note-foot{font-size:11px;color:var(--ink-faint);line-height:1.5;margin-top:14px;padding:10px;
  background:var(--panel2);border-radius:9px;}
.srclink{color:var(--care);font-weight:600;text-decoration:none;border-bottom:1px solid var(--care);}
.srclink:active{opacity:.7;}
.warnbox{background:#fbeede;border:1px solid #f0d4b0;border-radius:9px;padding:10px 12px;font-size:12.5px;color:#9a4d18;line-height:1.5;margin:8px 0;}
.r-layer{border-radius:9px;padding:9px 11px;margin-bottom:6px;font-size:12.5px;line-height:1.5;}
.r-layer.l1{background:var(--clin-bg);} .r-layer.l2{background:var(--pay-bg);}
.r-layer .h{font-weight:700;font-size:11px;margin-bottom:3px;display:flex;justify-content:space-between;}
.r-layer.l1 .h{color:var(--clin);} .r-layer.l2 .h{color:var(--pay);}
.crit{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--line);font-size:12.5px;}
.crit:last-child{border-bottom:0;}
.crit input{margin-top:2px;width:17px;height:17px;flex-shrink:0;}

/* 점수 입력 필드 — 클릭하면 평가도구 펼침 */
.scorefield{border:1px solid var(--line);border-radius:8px;padding:8px 10px;background:var(--panel);
  cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:14px;}
.scorefield:active{background:var(--panel2);}
.scorefield .sv{font-weight:700;color:var(--ink);}
.scorefield .sv.empty{font-weight:400;color:var(--ink-faint);font-size:13px;}
.scorefield .open-ic{font-size:11px;color:var(--care);font-weight:600;}

/* 평가도구 패널 */
.tool{border:1px solid var(--care);border-radius:10px;padding:11px;margin-top:6px;background:#fafdfc;}
.tool .th{font-size:12px;font-weight:700;color:var(--care);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.tool .th .done{font-size:11px;background:var(--care);color:#fff;border:0;border-radius:6px;padding:4px 10px;cursor:pointer;font-family:inherit;font-weight:600;}

/* mMRC 등급 선택 */
.mmrc-opt{border:1px solid var(--line);border-radius:8px;padding:9px 11px;margin-bottom:6px;cursor:pointer;
  display:flex;gap:9px;align-items:flex-start;font-size:12.5px;line-height:1.4;}
.mmrc-opt:active{background:var(--panel2);}
.mmrc-opt.sel{background:var(--care-bg);border-color:var(--care);}
.mmrc-opt .gnum{flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--panel2);
  color:var(--ink-dim);font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;}
.mmrc-opt.sel .gnum{background:var(--care);color:#fff;}

/* CAT 문항 — 0~5 점수 버튼 */
.cat-item{margin-bottom:11px;}
.cat-item .clab{display:flex;justify-content:space-between;font-size:11px;color:var(--ink-faint);margin-bottom:4px;gap:8px;}
.cat-item .clab .lt{text-align:left;} .cat-item .clab .rt{text-align:right;}
.cat-scale{display:flex;gap:4px;}
.cat-scale button{flex:1;border:1px solid var(--line);background:var(--panel);border-radius:7px;
  padding:7px 0;font-size:13px;font-weight:700;color:var(--ink-dim);cursor:pointer;font-family:inherit;}
.cat-scale button.sel{background:var(--care);color:#fff;border-color:var(--care);}
.cat-total{font-size:13px;font-weight:700;color:var(--ink);text-align:center;padding:8px;
  background:var(--care-bg);border-radius:8px;margin-top:4px;}
</style>
</head>

</style>

/* 레지멘 문자열(예: "ICS+LAMA+LABA") → 표준 combo 키 매핑 */
CD.regimenToCombo = function(regimen){
  if(!regimen) return null;
  var r=regimen.toUpperCase();
  var hasICS=r.indexOf("ICS")>=0, hasLAMA=r.indexOf("LAMA")>=0, hasLABA=r.indexOf("LABA")>=0;
  if(hasICS&&hasLAMA&&hasLABA) return "ICS+LABA+LAMA";
  if(hasLABA&&hasLAMA) return "LABA+LAMA";
  if(hasICS&&hasLABA) return "ICS+LABA";
  if(hasLAMA) return "LAMA";
  if(hasLABA) return "LABA";
  return null;
};

/* ============================================================
   COPD ENGINE LAYER — 3엔진 + R-CHECK + 정문함수
   엔진은 DATA를 ID로 참조만. 판정 로직만 소유.
   ============================================================ */

/* ── 유틸: 현재 흡입제 칩 → 계열 집합 ── */
CD.currentClasses = function(productBrands){
  var set = {};
  (productBrands||[]).forEach(function(brand){
    var p = CD.INHALER_PRODUCTS.filter(function(x){return x.brand===brand;})[0];
    if(!p) return;
    p.ingredients.forEach(function(did){
      var d = CD.DRUGS[did]; if(d) set[d.cls]=true;
    });
  });
  return set;
};

/* ============================================================
   임상 엔진 (CLINICAL) — 국내+GOLD 병렬 권고
   ============================================================ */
CD.clinicalEngine = function(input){
  var out = {korean:null, gold:null, initial:null, followup:null, rationale:[], flags:[]};
  // 분류
  var kg = CD.KOREAN_GROUP.classify(input.modExac, input.hospExac);
  var gg = CD.GOLD_GROUP.classify(input.cat, input.mmrc, input.modExac, input.hospExac);
  out.korean = {id:kg, label:CD.KOREAN_GROUP[kg].label, def:CD.KOREAN_GROUP[kg].def};
  out.gold   = {id:gg, label:CD.GOLD_GROUP[gg].label, def:CD.GOLD_GROUP[gg].def,
                tx:CD.GOLD_GROUP.initialTx[gg]};

  // 초기 vs 후속 (악화이력 있으면 후속 알고리즘 우선)
  var hasExac = (input.modExac && input.modExac>=1) || (input.hospExac && input.hospExac>=1);
  out.initial = CD.ALGO_INITIAL.resolve(kg, input.eos);
  if(hasExac){
    out.followup = CD.ALGO_FOLLOWUP.resolve(kg, input.eos);
  }

  // 근거
  if(input.eos!=null){
    var band = CD.EOS_BANDS.band(input.eos);
    out.rationale.push("혈중 호산구 "+input.eos+" /μL → "+CD.EOS_BANDS[band].label+" ("+CD.EOS_BANDS[band].icsValue+")");
  } else {
    out.flags.push({type:"info", msg:"혈중 호산구 미입력 — ICS·생물학 판단의 핵심. 확인 권장."});
  }
  // 천식병력 → ICS 오처방 경고
  if(input.asthmaHx){
    out.flags.push({type:"info", msg:CD.EOS_LOGIC.key+" "+CD.EOS_LOGIC.evidence});
  }
  // ICS 폐렴 경고 (현재 ICS 포함 시)
  var cur = CD.currentClasses(input.products);
  if(cur["class:ics"] && (input.eos!=null && input.eos<100)){
    out.flags.push({type:"warn", msg:"현재 ICS 사용 중 + 호산구<100 → ICS 이득 적고 폐렴 위험. ICS 제외 전환 고려."});
  }
  return out;
};

/* ============================================================
   급여 엔진 (REIMB) — 권고 약물의 급여 판정
   ============================================================ */
CD.reimbEngine = function(input, recommendedRegimen){
  var out = {items:[], notes:[]};
  var fev1 = input.fev1; // % 예측치
  var hasFreqExac = (input.modExac && input.modExac>=2) || (input.hospExac && input.hospExac>=1);

  // 권고 레지멘 문자열에 포함된 계열로 급여 규칙 매핑
  var reg = (recommendedRegimen||"").toUpperCase();
  var hasICS = reg.indexOf("ICS")>=0;
  var hasTriple = hasICS && reg.indexOf("LAMA")>=0 && reg.indexOf("LABA")>=0;

  if(reg.indexOf("ANTI-IL")>=0){
    out.items.push({rule:"생물학제제(Anti-IL-4R)", badge:"100/100",
      detail:"★COPD 급여 미등재 → 전액본인부담(월 ~150만원). 천식 적응증과 구분."});
  }
  if(hasTriple){
    var ok = (fev1!=null && fev1<60) || hasFreqExac;
    out.items.push({rule:"ICS+LABA+LAMA 3제 (트렐리지 기준)",
      badge: ok ? "급여" : "조건확인",
      detail: ok
        ? "충족: FEV1<60% 또는 연 2회↑ 악화 → 급여 인정"
        : "★급여조건 확인 필요: FEV1<60% 또는 연 2회↑ 악화 또는 LABA+ICS 미조절 또는 전환 케이스 중 하나 필요"});
  } else if(hasICS){
    var okI = (fev1!=null && fev1<60) && hasFreqExac;
    out.items.push({rule:"ICS/LABA 복합제",
      badge: okI ? "급여" : "조건확인",
      detail:"FEV1<60% + 악화 잦은 경우 인정. 현재 입력 기준 "+(okI?"충족":"확인 필요")});
  } else if(reg.indexOf("LABA")>=0 && reg.indexOf("LAMA")>=0){
    out.items.push({rule:"LABA+LAMA 복합제", badge:"급여",
      detail:"국내 2024 지침 1차 요법. 급여 인정."});
  }
  // 부가요법
  if(reg.indexOf("PDE4")>=0){
    out.items.push({rule:"로플루밀라스트(PDE4i)", badge:"조건부",
      detail:"만성기관지염 + FEV1<50% + 악화 환자에 한정 급여."});
  }
  if(reg.indexOf("MACROLIDE")>=0){
    out.items.push({rule:"아지스로마이신(Macrolide)", badge:"주의",
      detail:"★국내 급여 삭감 빈번. 청구 전 확인."});
  }
  return out;
};

/* ============================================================
   통합관리 엔진 (CARE) — 챙길 목록 (정답 아님)
   ============================================================ */
CD.careEngine = function(input){
  var out = {vaccines:[], comorbid:[], reminders:[]};
  // 백신 누락
  var done = {}; (input.vaccines||[]).forEach(function(v){done[v]=true;});
  CD.VACCINE.forEach(function(v){
    if(v.level==="강력권고" && !done[v.id]){
      out.vaccines.push({name:v.name, status:"미접종", target:v.target});
    } else if((v.level==="권고") && !done[v.id]){
      out.vaccines.push({name:v.name, status:"확인", target:v.target});
    }
  });
  // 동반질환 선별 리마인더
  out.reminders.push({icon:"🚭", text:"금연 — 매 방문 흡연상태 확인 (FEV1 감소 둔화의 유일 입증 개입)"});
  out.reminders.push({icon:"💉", text:"백신 — 인플루엔자(매년)·폐렴구균·COVID-19 확인"});
  out.reminders.push({icon:"🫁", text:"호흡재활 — 악화 후 조기 재활 / 운동능력·삶의질 개선"});
  if(input.smoker || input.exSmoker){
    out.reminders.push({icon:"🔬", text:"폐암선별 — 흡연력자 매년 저선량 흉부CT 추천"});
  } else {
    out.reminders.push({icon:"🔬", text:"폐암선별 — 국내는 비흡연 COPD도 폐암↑ → 저선량CT 고려"});
  }
  if(input.fev1!=null && input.fev1<30){
    out.reminders.push({icon:"🫀", text:"폐성심·장기산소요법 필요성 평가 (FEV1<30%)"});
  }
  out.reminders.push({icon:"📋", text:"동반질환 — 심혈관(심부전·허혈성·부정맥)·골다공증·불안우울 선별"});
  out.reminders.push({icon:"🍽️", text:"영양 — 체중감소 시 단백질보충, 비타민D 결핍 확인"});
  return out;
};

/* ============================================================
   R-CHECK — 생물학제제 평가 (천식 패턴 + COPD 2층 verdict)
   ============================================================ */
CD.rcEvaluate = function(bio, checked){
  var total = bio.criteria.length, met = 0;
  bio.criteria.forEach(function(c){ if(checked[c.id]) met++; });
  return {met:met, total:total, allMet:(met===total)};
};
CD.rcVerdict = function(bio, ev){
  if(ev.allMet){
    return {
      layer1:{label:"임상 적응", status:"충족", text:CD.BIO_COMMON.verdict_clinical+" ("+bio.evidence+")"},
      layer2:{label:"급여 현실", status:"미등재", text:CD.BIO_COMMON.verdict_reimb}
    };
  }
  return {
    layer1:{label:"임상 적응", status:"미충족", text:"투여대상 기준 "+ev.met+"/"+ev.total+" 충족. 전제·바이오마커·악화력 재확인."},
    layer2:{label:"급여 현실", status:"미등재", text:CD.BIO_COMMON.verdict_reimb}
  };
};

/* ============================================================
   정문 함수 (통합 대비) — recommend(patient)
   ============================================================ */
CD.copdRecommend = function(patient){
  var clin = CD.clinicalEngine(patient);
  var regimen = (clin.followup ? clin.followup.regimen : (clin.initial ? clin.initial.regimen : null));
  var reimb = CD.reimbEngine(patient, regimen);
  var care = CD.careEngine(patient);
  return {
    drugs: regimen ? [regimen] : [],
    targets: {korean:clin.korean, gold:clin.gold},
    flags: clin.flags.concat(reimb.items.filter(function(i){return i.badge==="100/100"||i.badge==="주의";}).map(function(i){return {type:"warn", msg:i.rule+": "+i.detail};})),
    _clinical:clin, _reimb:reimb, _care:care
  };
};

/* ============================================================
   시뮬레이션 종합 판정 — 증상·PFT 대비 심각도 + 약제 제안
   ============================================================ */
CD.simAssess = function(p){
  var out = {steps:{}, severity:null, regimen:null, biologic:false, addons:[], warnings:[], collected:[]};

  // STEP 1: PFT 병기
  var grade = CD.GOLD_GRADE.grade(p.fev1);
  out.steps.pft = grade;
  if(grade) out.collected.push("PFT: "+grade.label+" ("+grade.desc+")");

  // STEP 2: 증상
  var symp = CD.SYMPTOM.assess(p.cat, p.mmrc);
  out.steps.symptom = symp;
  if(symp) out.collected.push("증상: "+symp.label+" ("+symp.detail+")");

  // STEP 3: 악화이력 → 위험군 + GOLD ABE
  var kg = CD.KOREAN_GROUP.classify(p.modExac, p.hospExac);
  var gg = CD.GOLD_GROUP.classify(p.cat, p.mmrc, p.modExac, p.hospExac);
  out.steps.korean = {id:kg, label:CD.KOREAN_GROUP[kg].label, def:CD.KOREAN_GROUP[kg].def};
  out.steps.gold = {id:gg, label:CD.GOLD_GROUP[gg].label, def:CD.GOLD_GROUP[gg].def};
  out.collected.push("위험군: 국내 "+out.steps.korean.label+" / GOLD "+out.steps.gold.label);

  // ★ 심각도 종합 — 증상 대비 / PFT 대비 / 악화 대비
  var sevParts = [];
  if(grade) sevParts.push({axis:"기류제한(PFT)", level:grade.g, text:grade.label});
  if(symp)  sevParts.push({axis:"증상부담", level:symp.high?"높음":"낮음", text:symp.label});
  var exacLevel = (kg==="copd:group:high") ? "고위험" : "저위험";
  sevParts.push({axis:"악화위험", level:exacLevel, text:CD.KOREAN_GROUP[kg].label});
  // 불일치 감지 (증상-PFT 괴리)
  if(grade && symp){
    if(grade.g<=2 && symp.high) out.warnings.push("증상은 많은데 기류제한은 경증/중등증 — 동반질환(심부전·불안)·다른 원인 감별 고려.");
    if(grade.g>=3 && !symp.high) out.warnings.push("기류제한은 중증인데 증상 적음 — 활동량 적어 증상 가려졌을 수 있음. 운동내성 확인.");
  }
  out.severity = {parts:sevParts,
    summary: gradeSummary(grade, symp, kg)};

  // STEP 4: 호산구 → 약제 제안 (초기 vs 후속)
  var band = CD.EOS_BANDS.band(p.eos);
  out.steps.eos = band ? {id:band, label:CD.EOS_BANDS[band].label, ics:CD.EOS_BANDS[band].icsValue} : null;
  if(band) out.collected.push("호산구: "+CD.EOS_BANDS[band].label);

  var hasExac = (p.modExac && p.modExac>=1) || (p.hospExac && p.hospExac>=1);
  var algo;
  if(hasExac){
    algo = CD.ALGO_FOLLOWUP.resolve(kg, p.eos);
    out.steps.algoType = "악화 후 후속 (그림 3-4)";
  } else {
    algo = CD.ALGO_INITIAL.resolve(kg, p.eos);
    out.steps.algoType = "초기 약물 (그림 3-3)";
  }
  if(algo){
    out.regimen = algo.regimen;
    out.regimenNote = algo.note || "";
    if(algo.biologic){ out.biologic = true; out.bioNote = algo.bioNote; }
    if(algo.addon){
      out.addons.push("± PDE4i (로플루밀라스트): 만성기관지염 + FEV1<50% + 악화");
      out.addons.push("± Macrolide (아지스로마이신): 흡연력 — ★국내 급여 삭감 주의");
    }
    out.collected.push("제안 레지멘: "+algo.regimen);
  } else if(p.eos==null){
    out.warnings.push("혈중 호산구 미입력 — ICS·생물학제제 판단의 핵심. 확인 필요.");
  }

  // STEP 5: 약제 경고
  if(p.asthmaHx && band && band!=="copd:eos:ge300"){
    out.warnings.push("천식 병력만으로 ICS를 권고하지 않음 — 호산구 ≥300에서만 ICS 악화감소 입증.");
  }
  var cur = CD.currentClasses(p.products);
  if(cur["class:ics"] && band==="copd:eos:lt100"){
    out.warnings.push("현재 ICS 사용 + 호산구<100 → 폐렴 위험 대비 이득 적음. ICS 제외 전환 고려.");
  }

  // STEP 6: 급여 + 생물학 verdict
  out.reimb = CD.reimbEngine(p, out.regimen);

  return out;
};

function gradeSummary(grade, symp, kg){
  var g = grade ? grade.g : "?";
  var s = symp ? (symp.high?"증상 많음":"증상 적음") : "증상 미평가";
  var r = (kg==="copd:group:high") ? "고위험(잦은 악화)" : "저위험";
  return "기류제한 GOLD "+g+" · "+s+" · "+r+". 세 축을 종합해 약제 강도를 결정합니다.";
}

    +'<span>'+title+'</span><span class="chev">▶</span></div>'

function kp(arr){var h='<ul class="kp">';arr.forEach(function(x){h+='<li>'+x+'</li>';});return h+'</ul>';}

/* ════════ CAT·mMRC 평가도구 (앱 내 자동 계산) ════════ */
/* state.catScores: {cat1:..}, state.scoreOpen: 'cat'|'mmrc'|null */
function scoreField(state, kind, label){
  // 필드만 반환 (도구 패널은 scoreToolPanel로 2열 밖에 배치)
  var val = state[kind];
  var open = (state.scoreOpen === kind);
  var disp = (val==null)
    ? '<span class="sv empty">탭하여 평가도구 열기</span>'
    : '<span class="sv">'+esc(label)+' '+val+(kind==='cat'?' / 40':'')+'</span>';
  var ic = open ? '닫기 ▲' : (val==null?'계산 ▶':'수정 ▶');
  return '<div class="field"><label>'+esc(label)+(kind==='cat'?' (0–40)':' (0–4)')+'</label>'
    +'<div class="scorefield" onclick="toggleScore(\''+state._ns+'\',\''+kind+'\')">'
    + disp +'<span class="open-ic">'+ic+'</span></div></div>';
}
/* 펼친 평가도구 — row2 밖, 전체 너비 */
function scoreToolPanel(state){
  if(state.scoreOpen==="cat") return renderCATTool(state);
  if(state.scoreOpen==="mmrc") return renderMMRCTool(state);
  return "";
}

function renderMMRCTool(state, standalone){
  var cur = state.mmrc;
  var doneBtn = standalone ? '' : '<button class="done" onclick="closeScore(\''+state._ns+'\')">완료</button>';
  var h='<div class="tool"><div class="th"><span>mMRC 호흡곤란 등급 — 해당 항목 선택</span>'+doneBtn+'</div>';
  CD.MMRC_ITEMS.forEach(function(it){
    var sel = (cur===it.g);
    h+='<div class="mmrc-opt'+(sel?' sel':'')+'" onclick="setMMRC(\''+state._ns+'\','+it.g+(standalone?',1':'')+')">'
      +'<span class="gnum">'+it.g+'</span><span>'+esc(it.label)+'</span></div>';
  });
  h+='</div>';
  return h;
}

function renderCATTool(state, standalone){
  var sc = state.catScores || {};
  var doneBtn = standalone ? '' : '<button class="done" onclick="closeScore(\''+state._ns+'\')">완료</button>';
  var h='<div class="tool"><div class="th"><span>CAT — 8문항 각 0~5점 선택</span>'+doneBtn+'</div>';
  CD.CAT_ITEMS.forEach(function(it){
    var v = sc[it.id];
    h+='<div class="cat-item"><div class="clab"><span class="lt">'+esc(it.left)+'</span><span class="rt">'+esc(it.right)+'</span></div>'
      +'<div class="cat-scale">';
    for(var n=0;n<=5;n++){
      h+='<button class="'+(v===n?'sel':'')+'" onclick="setCAT(\''+state._ns+'\',\''+it.id+'\','+n+(standalone?',1':'')+')">'+n+'</button>';
    }
    h+='</div></div>';
  });
  var total = catTotal(sc);
  var answered = Object.keys(sc).length;
  h+='<div class="cat-total">합계: '+total+' / 40 ('+answered+'/8 문항)'
    +(answered<8?' — 모든 문항 선택 시 반영':'')+'</div>';
  if(sc.cat1>=3 && sc.cat2>=3){
    h+='<div style="font-size:11.5px;color:var(--alert);margin-top:6px;text-align:center">기침·가래 모두 ≥3 → 만성기관지염 시사 (PDE4i 부가요법 고려 근거)</div>';
  }
  h+='</div>';
  return h;
}

function catTotal(sc){var t=0;CD.CAT_ITEMS.forEach(function(it){if(sc[it.id]!=null)t+=sc[it.id];});return t;}

/* 제품 칩용 조합 배지 (LABA / LABA+LAMA 등 색구분) */
function comboBadge(combo){
  var map={
    "LABA":{c:"c-laba",t:"LABA"}, "LAMA":{c:"c-lama",t:"LAMA"},
    "LABA+LAMA":{c:"c-ll",t:"LABA+LAMA"}, "ICS+LABA":{c:"c-il",t:"ICS+LABA"},
    "ICS+LABA+LAMA":{c:"c-ill",t:"ICS+LABA+LAMA"}
  };
  var m=map[combo]; if(!m) return "";
  return '<span class="combobadge '+m.c+'">'+m.t+'</span>';
}

/* 레지멘 → 해당 조합 제품명 나열 (예: LABA+LAMA → 아노로·조터나…) */
function regimenProducts(regimen){
  var combo=CD.regimenToCombo(regimen);
  if(!combo) return "";
  var prods=CD.productsByCombo(combo);
  if(!prods.length) return "";
  var list=prods.map(function(p){
    return '<span style="display:inline-block;background:var(--panel2);border-radius:6px;padding:2px 7px;margin:2px 3px 0 0;font-size:11px">'
      +esc(p.brand)+' <span style="color:var(--ink-faint);font-size:9.5px">'+esc(p.device)+'·'+esc(p.freq)+'</span></span>';
  }).join("");
  return '<div style="margin-top:7px"><div style="font-size:10.5px;font-weight:700;color:var(--ink-dim);margin-bottom:2px">'
    +esc(combo)+' 제품 ('+prods.length+'종):</div>'+list+'</div>';
}

/* ════════ 인터랙티브 알고리즘 도표 (그림 3-3 / 3-4 재현) ════════ */
/* patient가 주어지면 해당 칸 하이라이트. 없으면 정적 도표. */

function renderInitialAlgo(patient){
  // 그림 3-3: 행=고/저위험, 열=호산구 <300 / ≥300
  var kg = patient ? CD.KOREAN_GROUP.classify(patient.modExac, patient.hospExac) : null;
  var eosHigh = patient && patient.eos!=null ? (patient.eos>=300) : null;
  var hasPatient = kg!=null && eosHigh!=null;

  function cell(group, high, regimen, opts){
    opts=opts||{};
    var isHit = hasPatient && (kg===group) && (eosHigh===high);
    // 저위험은 호산구 무관 → 두 열 병합 셀이므로 high 비교 제외
    if(group==="copd:group:low") isHit = hasPatient && (kg===group);
    var cls = "acell"+(opts.ics?" icsr":"");
    if(hasPatient){ cls += isHit ? " hit" : " dim"; }
    var lbl = isHit ? '<span class="algo-hitlabel">이 환자</span><br>' : '';
    return '<div class="'+cls+'">'+lbl+'<span class="rg">'+esc(regimen)+'</span>'
      +(opts.sub?'<span class="sub">'+esc(opts.sub)+'</span>':'')+'</div>';
  }

  var h='<div class="algo"><div class="atitle">📊 초기 약물치료 (그림 3-3) — 위험군 × 호산구</div>';
  h+='<div class="algo-tbl" style="grid-template-columns:0.7fr 1fr 1fr">';
  // 헤더 행
  h+='<div class="acell colh"></div>'
    +'<div class="acell colh">혈중 호산구<br>&lt; 300</div>'
    +'<div class="acell colh">혈중 호산구<br>≥ 300</div>';
  // 고위험 행
  h+='<div class="acell rowh">고위험군</div>'
    +cell("copd:group:high",false,"LABA+LAMA")
    +cell("copd:group:high",true,"ICS+LAMA+LABA",{ics:true});
  // 저위험 행 (호산구 무관 — 2열 병합)
  h+='<div class="acell rowh">저위험군</div>'
    +'<div class="acell'+(hasPatient?(kg==="copd:group:low"?" hit":" dim"):"")+'" style="grid-column:span 2">'
    +(hasPatient&&kg==="copd:group:low"?'<span class="algo-hitlabel">이 환자</span><br>':'')
    +'<span class="rg">LABA+LAMA</span></div>';
  h+='</div>';
  if(hasPatient){
    h+=algoPath(kg, patient.eos, false, "ICS+LAMA+LABA");
  }
  h+='<div class="algo-legend">행=악화이력(위험군) · 열=혈중 호산구. CAT/mMRC는 분류축이 아님</div>';
  h+='</div>';
  return h;
}

function renderFollowupAlgo(patient){
  // 그림 3-4: 행=고/저위험 악화발생, 열=호산구 <100 / 100-300 / ≥300
  var kg = patient ? CD.KOREAN_GROUP.classify(patient.modExac, patient.hospExac) : null;
  var band = patient && patient.eos!=null ? CD.EOS_BANDS.band(patient.eos) : null;
  var hasPatient = kg!=null && band!=null;

  function cell(group, bandKey, regimen, opts){
    opts=opts||{};
    var isHit = hasPatient && (kg===group) && (band===bandKey);
    var cls="acell"+(opts.bio?" bior":(opts.ics?" icsr":""));
    if(hasPatient){ cls += isHit ? " hit" : " dim"; }
    var lbl = isHit ? '<span class="algo-hitlabel">이 환자</span>' : '';
    var addon = opts.addon ? '<span class="sub">± PDE4i ± Macrolide</span>' : '';
    return '<div class="'+cls+'">'+lbl+'<span class="rg">'+regimen+'</span>'+addon+'</div>';
  }

  var h='<div class="algo"><div class="atitle">📊 악화 후 후속 치료 (그림 3-4) — 위험군 × 호산구 3구간</div>';
  h+='<div class="algo-tbl" style="grid-template-columns:0.65fr 1fr 1fr 1fr">';
  h+='<div class="acell colh"></div>'
    +'<div class="acell colh">호산구<br>&lt;100</div>'
    +'<div class="acell colh">100≤호산구<br>&lt;300</div>'
    +'<div class="acell colh">호산구<br>≥300</div>';
  // 고위험 악화발생
  h+='<div class="acell rowh">고위험군<br>악화 발생</div>'
    +cell("copd:group:high","copd:eos:lt100","LABA+LAMA",{addon:true})
    +cell("copd:group:high","copd:eos:100_300","ICS+LABA+LAMA",{ics:true,addon:true})
    +cell("copd:group:high","copd:eos:ge300","ICS+LAMA+LABA<br>+Anti-IL-4R",{bio:true,addon:true});
  // 저위험 악화발생
  h+='<div class="acell rowh">저위험군<br>악화 발생</div>'
    +'<div class="acell'+(hasPatient?(kg==="copd:group:low"&&(band==="copd:eos:lt100"||band==="copd:eos:100_300")?" hit":" dim"):"")+'" style="grid-column:span 2">'
    +(hasPatient&&kg==="copd:group:low"&&(band==="copd:eos:lt100"||band==="copd:eos:100_300")?'<span class="algo-hitlabel">이 환자</span>':'')
    +'<span class="rg">LABA+LAMA</span><span class="sub">± PDE4i ± Macrolide</span></div>'
    +cell("copd:group:low","copd:eos:ge300","ICS+LABA+LAMA",{ics:true});
  h+='</div>';
  if(hasPatient){
    h+=algoPath(kg, patient.eos, true);
  }
  h+='<div class="algo-legend">행=악화이력(위험군) · 열=혈중 호산구 3구간 · ⬛Anti-IL-4R=듀피젠트(급여 미등재)</div>';
  h+='</div>';
  return h;
}

/* 환자가 어떤 경로로 그 칸에 도달했는지 설명 */
function algoPath(kg, eos, isFollowup){
  var kgLabel = CD.KOREAN_GROUP[kg].label;
  var band = CD.EOS_BANDS.band(eos);
  var eosLabel = band ? CD.EOS_BANDS[band].label : "호산구 미입력";
  var algo = isFollowup ? CD.ALGO_FOLLOWUP.resolve(kg, eos) : CD.ALGO_INITIAL.resolve(kg, eos);
  if(!algo) return "";
  var h='<div class="algo-path">이 환자는 <b>'+esc(kgLabel)+'</b> + <b>'+esc(eosLabel)+'</b> → '
    +'도표의 해당 칸에 속하므로 <b>'+esc(algo.regimen)+'</b> 제안';
  if(algo.biologic) h+=' <span style="color:var(--bio)">(Anti-IL-4R 등재 — 급여 미등재)</span>';
  h+='.</div>';
  return h;
}

/* 점수 → 분류 → 약제 흐름 다이어그램 (도서관 진단 토픽) */
function renderDxFlow(){
  var t=APP.dxTool;
  var cat=t.cat, mmrc=t.mmrc;
  var symp=CD.SYMPTOM.assess(cat,mmrc);
  var h='<div style="font-size:12px;color:var(--ink-dim);margin-bottom:8px">위 CAT·mMRC를 입력하면 아래 흐름이 채워집니다. '
    +'<b>CAT/mMRC는 증상 평가와 GOLD A/B 구분</b>에 쓰입니다.</div>';

  h+='<div class="flowdiag">';
  // 1단계: 점수
  h+='<div class="fstep sym"><div class="fh">① 증상 점수</div><div class="fv">'
    +(cat!=null?'CAT '+cat+' / 40':'CAT 미입력')
    +' · '+(mmrc!=null?'mMRC '+mmrc:'mMRC 미입력')+'</div></div>';
  h+='<div class="farrow">▼</div>';
  // 2단계: 증상 분류
  h+='<div class="fstep cls"><div class="fh">② 증상 분류 (GOLD A/B 축)</div><div class="fv">'
    +(symp?(symp.high?'증상 많음 (CAT≥10 또는 mMRC≥2)':'증상 적음 (CAT<10 그리고 mMRC<2)'):'—')+'</div></div>';
  h+='<div class="farrow">▼</div>';
  // 3단계: GOLD A/B 의미
  var gldNote;
  if(symp){
    gldNote = symp.high
      ? '증상 많음 → 악화 적으면 <b>GOLD B</b> (악화 많으면 E)'
      : '증상 적음 → 악화 적으면 <b>GOLD A</b> (악화 많으면 E)';
  } else gldNote='—';
  h+='<div class="fstep cls"><div class="fh">③ GOLD 분류 기여</div><div class="fv" style="font-weight:400;font-size:12px">'+gldNote+'</div></div>';
  h+='<div class="farrow">▼</div>';
  // 4단계: ★ 약제는 다른 축
  h+='<div class="fstep drg"><div class="fh">④ 약제 결정 — 실제 축</div>'
    +'<div class="fv" style="font-size:12.5px;font-weight:400;line-height:1.5">'
    +'국내 약제 알고리즘(그림 3-3/3-4)은 <b>악화이력(위험군) × 호산구</b>로 결정합니다. '
    +'CAT/mMRC는 증상·GOLD 분류용이며 <b>약제 칸을 직접 가르지 않습니다.</b><br>'
    +'→ 약제 도표는 시뮬레이션·플로우에서 환자별로 하이라이트됩니다.</div></div>';
  h+='</div>';
  return h;
}

function stState(ns){ return ns==='sim'?APP.sim:(ns==='flow'?APP.flow:APP.dxTool); }
function toggleScore(ns,kind){
  var st=stState(ns);
  st.scoreOpen = (st.scoreOpen===kind)?null:kind;
  render();
}
function closeScore(ns){var st=stState(ns);st.scoreOpen=null;render();}
function setMMRC(ns,g,keepOpen){
  var st=stState(ns);
  st.mmrc=g; if(!keepOpen) st.scoreOpen=null; render();
}
function setCAT(ns,itemId,n,keepOpen){
  var st=stState(ns);
  if(!st.catScores)st.catScores={};
  st.catScores[itemId]=n;
  // 8문항 모두 채워지면 cat 값 확정
  if(Object.keys(st.catScores).length===8){
    st.cat=catTotal(st.catScores);
  } else {
    st.cat=null; // 미완성이면 분류에 미반영
  }
  render();
}

/* 검색: 입력칸은 그대로 두고 결과 영역만 부분 갱신 (한글 조합·포커스 보존) */
function doSearch(v){
  APP.q=(v||"").trim();
  var box=document.getElementById("libresult");
  if(box) box.innerHTML=renderLibBody();
}
/* 검색바 input에 이벤트 바인딩 (oninput 속성 대신 addEventListener — IME 안전) */
function bindSearchInput(){
  var inp=document.getElementById("libsearch");
  if(!inp||inp._bound) return;
  inp._bound=true;
  inp.addEventListener("input", function(){ doSearch(this.value); });
}
function renderSearch(){
  var q=APP.q.toLowerCase(),hits=[];
  // 토픽: 제목·부제·키워드 검색
  TOPICS.forEach(function(t){
    var hay=(t.title+" "+t.star+" "+(t.kw||"")).toLowerCase();
    if(hay.indexOf(q)>=0) hits.push(t);
  });
  // 약물 검색 (성분명·영문·브랜드) → 어느 토픽에서 다루는지 매핑
  var drugHits=[];
  Object.keys(CD.DRUGS).forEach(function(did){
    var d=CD.DRUGS[did];
    var hay=(d.name+" "+(d.en||"")+" "+(d.brand||"")).toLowerCase();
    if(hay.indexOf(q)>=0) drugHits.push(d);
  });
  // 제품(흡입제 브랜드·조합·성분) 검색
  var prodHits=[];
  CD.INHALER_PRODUCTS.forEach(function(p){
    var ingNames=p.ingredients.map(function(did){return CD.DRUGS[did]?CD.DRUGS[did].name:"";}).join(" ");
    var hay=(p.brand+" "+p.combo+" "+p.device+" "+ingNames).toLowerCase();
    if(hay.indexOf(q)>=0) prodHits.push(p);
  });
  // KCD 코드 검색
  var kcdHits=[];
  CD.KCD.forEach(function(c){
    if((c.code+" "+c.label).toLowerCase().indexOf(q)>=0) kcdHits.push(c);
  });

  var h='';
  // 토픽 카드
  if(hits.length){h+='<div class="sec-title">토픽 ('+hits.length+')</div><div class="grid">';
    hits.forEach(function(t){h+='<button type="button" class="topic '+t.cat+'" onclick="openTopic(\''+t.id+'\')">'
      +'<div class="th"><span class="ico">'+t.icon+'</span><span class="cat '+t.cat+'">'+CAT_LABEL[t.cat]+'</span></div>'
      +'<div class="tt">'+esc(t.title)+'</div><div class="ts">'+esc(t.star)+'</div></button>';});
    h+='</div>';}
  // 약물
  if(drugHits.length){h+='<div class="card clin" style="margin-top:10px"><div class="sec-title">약물 ('+drugHits.length+')</div>';
    drugHits.forEach(function(d){
      var cls=CD.CLASSES[d.cls];
      h+='<div style="font-size:13px;margin-bottom:5px;display:flex;align-items:center;gap:6px;flex-wrap:wrap">'
        +'<b>'+esc(d.name)+'</b> <span style="color:var(--ink-faint);font-size:11px">'+esc(d.en||"")+'</span> '
        +(d.brand?'<span class="badge bio">'+esc(d.brand)+'</span>':'')
        +'<span class="badge clin">'+esc(cls.label)+'</span></div>';});
    h+='<div style="font-size:11px;color:var(--ink-faint);margin-top:4px">상세 설명은 💨흡입제 치료 토픽의 계열별 카드 참고.</div></div>';}
  // 제품
  if(prodHits.length){h+='<div class="card clin" style="margin-top:10px"><div class="sec-title">흡입제 제품 ('+prodHits.length+')</div>';
    prodHits.forEach(function(p){
      h+='<div style="font-size:13px;margin-bottom:5px"><b>'+esc(p.brand)+'</b> '
        +comboBadge(p.combo)+' <span style="color:var(--ink-faint);font-size:11px">'+esc(p.device)+'·'+esc(p.freq)+'</span></div>';});
    h+='</div>';}
  // KCD
  if(kcdHits.length){h+='<div class="card pay" style="margin-top:10px"><div class="sec-title">질병코드 ('+kcdHits.length+')</div>';
    kcdHits.forEach(function(c){
      h+='<div style="font-size:13px;margin-bottom:4px"><b>'+esc(c.code)+'</b> '+esc(c.label)
        +(c.note?' <span style="color:var(--ink-faint);font-size:11px">'+esc(c.note)+'</span>':'')+'</div>';});
    h+='</div>';}

  if(!hits.length&&!drugHits.length&&!prodHits.length&&!kcdHits.length)
    h+='<div class="card" style="text-align:center;color:var(--ink-faint)">검색 결과가 없습니다.<br>약물명·계열(LABA)·증상·코드(J44)·키워드로 검색해 보세요.</div>';
  return h;
}

function openTopic(id){APP.topic=id;APP.acc={};render(true);}
function closeTopic(){APP.topic=null;render(true);}

function renderTopic(id){
  var t=TOPICS.filter(function(x){return x.id===id;})[0];
  var h='<div style="margin-bottom:10px"><span style="color:var(--care);font-weight:600;cursor:pointer" onclick="closeTopic()">‹ 도서관</span></div>';
  h+='<div class="card '+t.cat+'"><div class="sec-title" style="font-size:16px;color:var(--ink)">'
    +'<span style="margin-right:6px">'+t.icon+'</span>'+esc(t.title)+'</div>';
  h+=TOPIC_RENDER[id]?TOPIC_RENDER[id]():'준비 중';
  h+='</div>';
  return h;
}

           "<span class=tag>제한성:</span> 전체 모양은 정상과 비슷하나 좌우로 좁음(용적↓) — 키 작은 삼각형.",
           "<span class=tag>들숨 곡선:</span> 아래 반원. 흉곽외 상기도 폐쇄 시 들숨부가 평평(plateau)해짐."]));

    // ★ 그림 2: 용적-시간 곡선 (FEV1·FVC가 어떻게 나오나)
    h+=acc("pft_vt","그림② 용적-시간 곡선 (Volume-Time) — FEV1·FVC 측정",
      svgVolumeTime()
      +kp(["<span class=tag>FVC:</span> 곡선이 평평해지는 최종 도달점(총 내쉰 양).",
           "<span class=tag>FEV1:</span> 1초 시점의 세로 높이.",
           "<span class=tag>FEV1/FVC:</span> 둘의 비. 폐쇄성이면 1초에 적게 나와 비가 ↓(<0.70).",
           "<span class=tag>폐쇄성 곡선:</span> 천천히 상승해 늦게 평평 — 1초 내 호기량이 적음."]));

    // 약어
    var ab='<table class="tbl"><tr><th>약어</th><th>의미</th><th>설명</th></tr>';
    P.abbr.forEach(function(a){
      ab+='<tr><td class="hl"><b>'+esc(a.ab)+'</b></td><td>'+esc(a.ko)+'<br><span style="font-size:9.5px;color:var(--ink-faint)">'+esc(a.full)+'</span></td><td style="font-size:11px">'+esc(a.desc)+'</td></tr>';
    });
    ab+='</table>';
    h+=acc("pft_ab","약어 정리 (FVC·FEV1·DLCO·LLN…)",ab);
    // 패턴
    h+=acc("pft_pat","패턴 해석 — 폐쇄성 vs 제한성",
      kp(["<span class=tag>폐쇄성:</span> "+esc(P.pattern.obstructive),
          "<span class=tag>제한성 의심:</span> "+esc(P.pattern.restrictive),
          "<span class=tag>혼합성:</span> "+esc(P.pattern.mixed),
          "<span class=tag>중증도:</span> "+esc(P.pattern.severity)])
      +'<div class="warnbox" style="margin-top:6px">'+esc(P.fixed_vs_lln)+'</div>');
    // BDR
    h+=acc("pft_bdr","기관지확장제 반응 (BDR · 구 가역성)",
      '<div style="font-size:12.5px;line-height:1.55"><b>'+esc(P.bdr.criteria)+'</b><br><br>'
      +'<span style="color:var(--alert)">'+esc(P.bdr.note)+'</span></div>');
    // ★ 신뢰성 (+ 곡선 신뢰 신호 그림)
    h+=acc("pft_rel","★ 신뢰할 수 없는 PFT — 품질 기준",
      '<div class="warnbox" style="margin-bottom:8px">품질 낮은 검사(C 이하·U·F)는 수치를 진단·병기에 그대로 쓰지 마세요. 재검사 또는 곡선 직접 확인.</div>'
      +svgQualityCurves()
      +kp(["<span class=tag>허용성:</span> "+esc(P.reliability.acceptability),
           "<span class=tag>재현성:</span> "+esc(P.reliability.repeatability),
           "<span class=tag>등급(A–F):</span> "+esc(P.reliability.grade),
           "<span class=tag>신뢰 의심 신호:</span> "+esc(P.reliability.redflags),
           "<span class=tag>조치:</span> "+esc(P.reliability.action)]));
    h+='<div class="note-foot">기준: ATS/ERS Standardization of Spirometry 2019 + 대한결핵및호흡기학회 2024 지침. '
      +'<a href="https://www.atsjournals.org/doi/full/10.1164/rccm.201908-1590ST" target="_blank" rel="noopener" class="srclink">ATS/ERS 2019 원문</a></div>';
    return h;
  }
};

/* ════════════════ 플로우 ════════════════ */
function renderFlow(){
  var f=APP.flow;
  var h='<div class="banner">⚡ <b>플로우</b> — 환자 앞 실시간 입력 → 3엔진이 각자 관점에서 카드를 냅니다. 조언이며 강제 아님.</div>';
  h+='<div class="card">';
  h+='<div class="row2">'
    +fInput("fev1","FEV1 (% 예측치)","number","예: 55")
    +fInput("fev1fvc","FEV1/FVC","number","예: 0.6")+'</div>';
  h+='<div class="row2">'
    +scoreField(f,"cat","CAT")
    +scoreField(f,"mmrc","mMRC")+'</div>';
  h+=scoreToolPanel(f);
  h+=fInput("eos","혈중 호산구 (/μL)","number","예: 320");
  h+='<div class="row2">'
    +fInput("modExac","연간 중등도 악화","number","횟수")
    +fInput("hospExac","연간 입원 악화","number","입원 횟수")+'</div>';
  h+='<div class="field"><label>흡연 상태</label><div class="chips">'
    +fChip("smoker","현재흡연","smk")+fChip("exSmoker","과거흡연","smk")+fChip("asthmaHx","천식병력","smk")+'</div></div>';
  // 현재 흡입제
  h+='<div class="field"><label>현재 흡입제</label><div class="chips">';
  CD.INHALER_PRODUCTS.forEach(function(p){
    if(p.combo==="SABA"||p.combo==="SAMA")return;
    var on=f.products.indexOf(p.brand)>=0;
    h+='<div class="chip'+(on?' on':'')+'" onclick="toggleProd(\''+esc(p.brand)+'\')">'+esc(p.brand)+comboBadge(p.combo)+'</div>';
  });
  h+='</div></div>';
  // 백신
  h+='<div class="field"><label>접종 완료 백신</label><div class="chips">';
  CD.VACCINE.forEach(function(v){
    var on=f.vaccines.indexOf(v.id)>=0;
    h+='<div class="chip'+(on?' on':'')+'" onclick="toggleVacc(\''+v.id+'\')">'+esc(v.name)+'</div>';
  });
  h+='</div></div>';
  h+='<button class="btn" onclick="runFlow()">3엔진 분석</button>';
  h+='</div>';
  if(APP.flowResult)h+=APP.flowResult;
  return h;
}
function fInput(k,label,type,ph){
  var v=APP.flow[k]; if(v==null)v="";
  return '<div class="field"><label>'+esc(label)+'</label><input type="'+type+'" inputmode="decimal" '
    +'placeholder="'+esc(ph)+'" value="'+esc(v)+'" oninput="setFlow(\''+k+'\',this.value)"></div>';
}
function fChip(k,label,grp){
  var on=APP.flow[k];
  return '<div class="chip'+(on?' on':'')+'" onclick="toggleFlow(\''+k+'\')">'+esc(label)+'</div>';
}
function setFlow(k,v){APP.flow[k]=(v===""?null:parseFloat(v));}
function toggleFlow(k){APP.flow[k]=!APP.flow[k];render();}
function toggleProd(b){var i=APP.flow.products.indexOf(b);if(i>=0)APP.flow.products.splice(i,1);else APP.flow.products.push(b);render();}
function toggleVacc(v){var i=APP.flow.vaccines.indexOf(v);if(i>=0)APP.flow.vaccines.splice(i,1);else APP.flow.vaccines.push(v);render();}

function runFlow(){
  var p=APP.flow;
  var r=CD.copdRecommend(p);
  var clin=r._clinical,reimb=r._reimb,care=r._care;
  var h='<div class="card clin"><div class="rescard-h clin">🧭 분류 (2체계 병렬)</div>';
  h+='<div class="dualcls">'
    +'<div class="clsbox k"><div class="lab">국내 2024</div><div class="val">'+esc(clin.korean.label)+'</div></div>'
    +'<div class="clsbox g"><div class="lab">GOLD 2025</div><div class="val">'+esc(clin.gold.label)+'</div></div></div>';
  h+='<div style="font-size:11.5px;color:var(--ink-faint);line-height:1.5">국내: '+esc(clin.korean.def)+'<br>GOLD: '+esc(clin.gold.def)+'</div>';
  h+='</div>';
  // 처방·급여
  var regimen=clin.followup?clin.followup.regimen:(clin.initial?clin.initial.regimen:null);
  h+='<div class="card pay"><div class="rescard-h pay">💊 처방·급여</div>';
  h+='<div style="font-size:14px;font-weight:700;margin-bottom:6px">권고: '+esc(regimen||"—")
    +(clin.followup?' <span class="badge clin">악화 후 후속</span>':' <span class="badge clin">초기</span>')+'</div>';
  h+=regimenProducts(regimen);
  reimb.items.forEach(function(i){
    var bc=i.badge==="급여"?"ok":(i.badge==="100/100"||i.badge==="주의"?"block":"warn");
    h+='<div style="margin-bottom:6px"><span class="badge '+bc+'">'+esc(i.badge)+'</span> <b style="font-size:12.5px">'+esc(i.rule)+'</b>'
      +'<div style="font-size:11.5px;color:var(--ink-dim);margin-top:2px">'+esc(i.detail)+'</div></div>';
  });
  // ★ 인터랙티브 알고리즘 도표 — 이 환자 칸 하이라이트
  var hasExacF = (p.modExac && p.modExac>=1) || (p.hospExac && p.hospExac>=1);
  h+= hasExacF ? renderFollowupAlgo(p) : renderInitialAlgo(p);
  h+='</div>';
  // 생물학제제
  if(clin.followup&&clin.followup.biologic){
    h+='<div class="card bio"><div class="rescard-h bio">🧬 생물학제제 (Anti-IL-4R 등재)</div>'
      +'<div class="warnbox">'+esc(clin.followup.bioNote)+'</div>'
      +'<div style="font-size:12px;color:var(--ink-dim)">상세 R-CHECK은 🧭시뮬레이션 또는 생물학제제 토픽에서 체크하세요.</div></div>';
  }
  // 임상 플래그
  if(clin.flags.length){
    h+='<div class="card"><div class="rescard-h clin">⚠ 임상 참고</div>';
    clin.flags.forEach(function(fl){h+='<div style="font-size:12px;margin-bottom:5px;line-height:1.5">• '+esc(fl.msg)+'</div>';});
    h+='</div>';
  }
  // 통합관리
  h+='<div class="card care"><div class="rescard-h care">🫁 종합관리 — 챙길 목록</div>';
  if(care.vaccines.length){
    h+='<div style="font-size:12px;font-weight:700;margin-bottom:4px">백신 확인:</div>';
    care.vaccines.forEach(function(v){h+='<div style="font-size:12px;margin-bottom:3px">• '+esc(v.name)+' <span class="badge warn">'+esc(v.status)+'</span> '+esc(v.target)+'</div>';});
  }
  h+='<div style="font-size:12px;font-weight:700;margin:6px 0 4px">리마인더:</div>';
  care.reminders.forEach(function(rm){h+='<div style="font-size:12px;margin-bottom:4px;line-height:1.5">'+rm.icon+' '+esc(rm.text)+'</div>';});
  h+='</div>';
  h+='<div class="note-foot">본 결과는 조언이며 최종 결정은 처방의 책임입니다. 급여기준은 청구 시 최신 고시 확인 권장.</div>';
  APP.flowResult=h;
  render();
  setTimeout(function(){var c=document.querySelector('.card.clin');if(c)c.scrollIntoView({behavior:'smooth',block:'start'});},60);
}

/* ════════════════ 시뮬레이션 — 환자 입력 → 심각도 → 약제 제안 ════════════════ */
/* APP.sim 에 환자 데이터 저장. 각 단계 입력이 채워지면 판정이 누적 펼쳐짐. */

function renderSim(){
  var s=APP.sim;
  var h='<div class="banner">🧭 <b>시뮬레이션</b> — 이 환자의 데이터를 단계별로 입력하면, '
    +'<b>증상·폐기능·악화이력으로 심각도를 판정</b>하고 <b>약제를 제안</b>합니다. 조언이며 강제 아님.</div>';

  /* ── STEP 1: 폐기능 (PFT) ── */
  h+='<div class="simnode">';
  h+='<div class="q">① 폐기능 — PFT로 진단·병기</div>';
  h+='<div class="stage">기관지확장제 후 FEV1/FVC<0.70 = COPD. FEV1%로 GOLD 1–4 병기.</div>';
  h+='<div class="row2">'+simInput("fev1","FEV1 (% 예측치)","예: 45")+simInput("fev1fvc","FEV1/FVC","예: 0.58")+'</div>';
  var grade=CD.GOLD_GRADE.grade(s.fev1);
  if(s.fev1fvc!=null && s.fev1fvc>=0.70){
    h+='<div class="warnbox">FEV1/FVC ≥0.70 — 기류제한 기준 미충족. PRISm(FEV1<80%)·Pre-COPD 감별 필요. COPD 진단 재확인.</div>';
  }
  if(grade){
    h+=simVerdict("📊 기류제한 병기", grade.label, grade.desc
      +(grade.g>=3?" — 중증. 폐성심·장기산소요법 평가 고려.":""), "clin");
  }
  h+='</div>';

  /* ── STEP 2: 증상 (CAT/mMRC) ── */
  h+='<div class="simnode">';
  h+='<div class="q">② 증상 — CAT / mMRC</div>';
  h+='<div class="stage">증상부담을 정량화. 칸을 누르면 평가도구가 펼쳐져 자동 계산됩니다. (CAT≥10 또는 mMRC≥2 = 증상 많음)</div>';
  h+='<div class="row2">'+scoreField(s,"cat","CAT")+scoreField(s,"mmrc","mMRC")+'</div>';
  h+=scoreToolPanel(s);
  var symp=CD.SYMPTOM.assess(s.cat,s.mmrc);
  if(symp){
    h+=simVerdict("🗣 증상 평가", symp.label, symp.detail, "clin");
  }
  /* ★ 증상 vs PFT 괴리 — 핵심 */
  if(grade && symp){
    if(grade.g<=2 && symp.high){
      h+='<div class="warnbox">⚖ <b>증상-폐기능 괴리:</b> 폐기능은 경증/중등증인데 증상이 많음. '
        +'동반질환(심부전·관상동맥·불안·빈혈)이나 비만·탈조건화 등 <b>다른 호흡곤란 원인 감별</b>을 고려하세요. 약제 증량만으로 해결 안 될 수 있음.</div>';
    } else if(grade.g>=3 && !symp.high){
      h+='<div class="warnbox">⚖ <b>증상-폐기능 괴리:</b> 폐기능은 중증인데 증상이 적게 보고됨. '
        +'활동량을 줄여 증상이 가려졌을 가능성. <b>실제 운동내성·일상활동</b>을 확인하세요(6분보행 등).</div>';
    }
  }
  h+='</div>';

  /* ── STEP 3: 악화이력 → 위험군 분류 ── */
  h+='<div class="simnode">';
  h+='<div class="q">③ 악화이력 — 위험군 분류</div>';
  h+='<div class="stage">지난 1년 악화 횟수가 위험군·약제강도를 결정. (최강 악화 예측인자)</div>';
  h+='<div class="row2">'+simInput("modExac","연간 중등도 악화","횟수")+simInput("hospExac","연간 입원 악화","입원 횟수")+'</div>';
  var hasExacInput = (s.modExac!=null || s.hospExac!=null);
  if(hasExacInput){
    var kg=CD.KOREAN_GROUP.classify(s.modExac,s.hospExac);
    var gg=CD.GOLD_GROUP.classify(s.cat,s.mmrc,s.modExac,s.hospExac);
    h+='<div class="dualcls" style="margin-top:8px">'
      +'<div class="clsbox k"><div class="lab">국내 2024</div><div class="val">'+esc(CD.KOREAN_GROUP[kg].label)+'</div></div>'
      +'<div class="clsbox g"><div class="lab">GOLD 2025</div><div class="val">'+esc(CD.GOLD_GROUP[gg].label)+'</div></div></div>';
    h+='<div style="font-size:11.5px;color:var(--ink-faint);line-height:1.5;margin-top:4px">'
      +'국내: '+esc(CD.KOREAN_GROUP[kg].def)+'<br>GOLD: '+esc(CD.GOLD_GROUP[gg].def)+'</div>';
    if(kg==="copd:group:high" && gg.indexOf("A")<0 && gg.indexOf("B")<0){
      // 일치
    } else if(kg==="copd:group:low" && (gg==="copd:gold:B")){
      h+='<div style="font-size:11.5px;color:var(--alert);margin-top:4px">⚖ 국내 저위험이나 GOLD는 B군(증상 많음) — 분류축 차이.</div>';
    }
  }
  h+='</div>';

  /* ── STEP 4: 흡연·천식병력·현재약제 ── */
  h+='<div class="simnode">';
  h+='<div class="q">④ 배경 — 흡연·병력·현재 약제</div>';
  h+='<div class="stage">ICS 적합성·부가요법 판단에 사용.</div>';
  h+='<div class="chips" style="margin-bottom:8px">'
    +simChip("smoker","현재흡연")+simChip("exSmoker","과거흡연")+simChip("asthmaHx","천식병력")
    +simChip("chronicBronchitis","만성기관지염")+'</div>';
  h+='<div style="font-size:11.5px;color:var(--ink-faint);margin-bottom:5px">현재 흡입제 (선택):</div>';
  h+='<div class="chips">';
  CD.INHALER_PRODUCTS.forEach(function(p){
    if(p.combo==="SABA"||p.combo==="SAMA")return;
    var on=(s.products||[]).indexOf(p.brand)>=0;
    h+='<div class="chip'+(on?' on':'')+'" onclick="simToggleProd(\''+esc(p.brand)+'\')">'+esc(p.brand)+comboBadge(p.combo)+'</div>';
  });
  h+='</div>';
  h+='</div>';

  /* ── STEP 5: 호산구 → 약제 제안 (핵심) ── */
  h+='<div class="simnode" style="border-color:var(--care)">';
  h+='<div class="q" style="color:var(--care)">⑤ 혈중 호산구 → 약제 제안</div>';
  h+='<div class="stage">호산구가 ICS·생물학 의사결정의 핵심. 입력하면 알고리즘이 제안을 산출.</div>';
  h+=simInput("eos","혈중 호산구 (/μL)","예: 320");

  var assess = CD.simAssess(s);
  if(assess.regimen){
    // 심각도 종합
    h+='<div class="b3 why" style="margin-top:10px"><div class="h">⚙ 심각도 종합</div>'+esc(assess.severity.summary)+'</div>';
    // 약제 제안 카드
    h+='<div style="background:var(--care-bg);border:1px solid #b8e0d5;border-radius:10px;padding:11px 12px;margin-top:8px">';
    h+='<div style="font-size:11px;color:var(--care);font-weight:700">'+esc(assess.steps.algoType)+'</div>';
    h+='<div style="font-size:16px;font-weight:800;color:var(--ink);margin:3px 0">'+esc(assess.regimen)+'</div>';
    if(assess.regimenNote)h+='<div style="font-size:11.5px;color:var(--ink-dim);line-height:1.5">'+esc(assess.regimenNote)+'</div>';
    h+=regimenProducts(assess.regimen);
    if(assess.addons.length){
      h+='<div style="font-size:11.5px;color:var(--ink-dim);margin-top:6px"><b>부가 고려:</b><br>'+assess.addons.map(esc).join('<br>')+'</div>';
    }
    h+='</div>';
    // ★ 인터랙티브 알고리즘 도표 — 이 환자가 속한 칸 하이라이트
    var hasExacS = (s.modExac && s.modExac>=1) || (s.hospExac && s.hospExac>=1);
    h+= hasExacS ? renderFollowupAlgo(s) : renderInitialAlgo(s);
    // 급여 판정
    if(assess.reimb && assess.reimb.items.length){
      h+='<div style="margin-top:8px">';
      assess.reimb.items.forEach(function(i){
        var bc=i.badge==="급여"?"ok":(i.badge==="100/100"||i.badge==="주의"?"block":"warn");
        h+='<div style="margin-bottom:5px"><span class="badge '+bc+'">'+esc(i.badge)+'</span> <b style="font-size:12px">'+esc(i.rule)+'</b>'
          +'<div style="font-size:11px;color:var(--ink-dim);margin-top:1px">'+esc(i.detail)+'</div></div>';
      });
      h+='</div>';
    }
    // 생물학제제 등재 알림
    if(assess.biologic){
      h+='<div class="warnbox" style="margin-top:8px">🧬 '+esc(assess.bioNote)+' → 아래 R-CHECK에서 적응 확인.</div>';
    }
    // 경고
    if(assess.warnings.length){
      h+='<div style="margin-top:8px">';
      assess.warnings.forEach(function(w){h+='<div style="font-size:12px;color:#9a4d18;margin-bottom:4px;line-height:1.5">⚠ '+esc(w)+'</div>';});
      h+='</div>';
    }
  } else if(s.eos==null && (s.fev1!=null||s.cat!=null)){
    h+='<div style="font-size:12px;color:var(--ink-faint);margin-top:8px">혈중 호산구를 입력하면 약제 제안이 표시됩니다.</div>';
  }
  h+='</div>';

  /* ── STEP 6: 생물학제제 R-CHECK (조건 충족 시 강조) ── */
  var showBio = assess.biologic || (s.eos!=null && s.eos>=150);
  h+='<div class="simnode" style="border-color:var(--bio)'+(assess.biologic?';box-shadow:0 0 0 2px var(--bio-bg)':'')+'">';
  h+='<div class="q" style="color:var(--bio)">⑥ 생물학제제 R-CHECK</div>';
  h+='<div class="stage">3제+호산구↑에도 잦은 악화 시 — 적응 충족 확인 (강제 아님)</div>';
  if(!showBio){
    h+='<div style="font-size:12px;color:var(--ink-faint)">호산구 ≥150에서 후보가 됩니다. 위에서 호산구를 입력하세요.</div>';
  } else {
    CD.BIOLOGICS.forEach(function(b){ h+=renderRCheck(b); });
  }
  h+='</div>';

  /* ── STEP 7: 종합관리 (비약물) ── */
  h+='<div class="simnode" style="border-color:var(--care)">';
  h+='<div class="q" style="color:var(--care)">⑦ 종합관리 — 챙길 목록</div>';
  h+='<div class="stage">낫지 않는 병 — 약제만큼 관리가 핵심.</div>';
  var care=CD.careEngine(s);
  care.reminders.forEach(function(rm){h+='<div style="font-size:12.5px;margin-bottom:5px;line-height:1.5">'+rm.icon+' '+esc(rm.text)+'</div>';});
  h+='</div>';

  /* ── sticky: 누적 판정 요약 ── */
  if(assess.collected.length){
    h+='<div class="sticky-collect"><div class="t">📋 이 환자 판정 요약</div><ul>';
    assess.collected.forEach(function(c){h+='<li>'+esc(c)+'</li>';});
    h+='</ul></div>';
  }
  h+='<div class="note-foot">본 제안은 2024 진료지침 알고리즘 기반 조언입니다. 증상-폐기능 괴리·동반질환·환자 선호를 함께 고려해 최종 결정은 처방의가 내립니다.</div>';

  return h;
}

/* 시뮬 입력 헬퍼 */
function simInput(k,label,ph){
  var raw = APP.sim._raw && APP.sim._raw[k];
  var v = (raw!=null) ? raw : (APP.sim[k]==null ? "" : APP.sim[k]);
  return '<div class="field"><label>'+esc(label)+'</label><input id="simf_'+k+'" type="text" inputmode="decimal" '
    +'placeholder="'+esc(ph)+'" value="'+esc(v)+'" '
    +'onfocus="APP._focus=\'simf_'+k+'\'" '
    +'oninput="setSim(\''+k+'\',this.value)"></div>';
}
function simChip(k,label){
  var on=APP.sim[k];
  return '<div class="chip'+(on?' on':'')+'" onclick="toggleSimFlag(\''+k+'\')">'+esc(label)+'</div>';
}
function simVerdict(title,val,detail,cat){
  return '<div class="b3 '+(cat||"clin")+'" style="margin-top:8px"><div class="h">'+esc(title)+'</div>'
    +'<b style="font-size:13px;color:var(--ink)">'+esc(val)+'</b> — '+esc(detail)+'</div>';
}
function setSim(k,v){
  if(!APP.sim._raw)APP.sim._raw={};
  APP.sim._raw[k]=v;                       // 원본 문자열 보존 (예: "0.", "0.7")
  var n = parseFloat(v);
  APP.sim[k] = (v===""||isNaN(n)) ? null : n;  // 계산용 숫자 (불완전 입력은 null)
  render();
}
function toggleSimFlag(k){APP.sim[k]=!APP.sim[k];render();}
function simToggleProd(b){
  if(!APP.sim.products)APP.sim.products=[];
  var i=APP.sim.products.indexOf(b);
  if(i>=0)APP.sim.products.splice(i,1);else APP.sim.products.push(b);
  render();
}

function renderRCheck(b){
  var dd=CD.DRUGS[b.drug];
  var checked=APP.rcheck[b.id]||{};
  var h='<div style="border:1px solid var(--line);border-radius:9px;padding:10px;margin-top:8px">'
    +'<div style="font-size:13px;font-weight:700">'+esc(b.brand)+' <span class="badge bio">'+esc(b.target)+'</span></div>';
  b.criteria.forEach(function(c){
    var on=checked[c.id];
    h+='<label class="crit"><input type="checkbox" '+(on?'checked':'')+' onclick="rcToggle(\''+b.id+'\',\''+c.id+'\')">'
      +'<span>'+esc(c.label)+'</span></label>';
  });
  // verdict
  var ev=CD.rcEvaluate(b,checked);
  var v=CD.rcVerdict(b,ev);
  h+='<div class="r-layer l1" style="margin-top:8px"><div class="h"><span>'+esc(v.layer1.label)+'</span><span>'+esc(v.layer1.status)+'</span></div>'+esc(v.layer1.text)+'</div>';
  h+='<div class="r-layer l2"><div class="h"><span>'+esc(v.layer2.label)+'</span><span>'+esc(v.layer2.status)+'</span></div>'+esc(v.layer2.text)+'</div>';
  h+='</div>';
  return h;
}
function rcToggle(bid,cid){
  if(!APP.rcheck[bid])APP.rcheck[bid]={};
  APP.rcheck[bid][cid]=!APP.rcheck[bid][cid];
  render();
}

/* ════════════════ 메인 렌더 ════════════════ */
function render(scrollTop){
  // 현재 포커스된 입력의 커서 위치 저장 (id 있는 input, 단 검색칸 제외)
  var active = document.activeElement;
  var isInput = active && active.id && (active.tagName==="INPUT") && active.id!=="libsearch";
  var saveId = isInput ? active.id : null;
  var saveStart = null;
  if(saveId){ try{ saveStart = active.selectionStart; }catch(e){} }

  var h='';
  if(APP.tab==="lib"){
    h=APP.topic?renderTopic(APP.topic):renderLibGrid();
  } else if(APP.tab==="sim"){
    h=renderSim();
  } else if(APP.tab==="flow"){
    h=renderFlow();
  }
  el().innerHTML='<div class="wrap">'+h+'</div>';
  if(scrollTop)window.scrollTo(0,0);

  // 포커스·커서 복원 (입력 중 render로 인한 포커스 손실 방지)
  if(saveId){
    var elInput=document.getElementById(saveId);
    if(elInput){
      elInput.focus();
      try{ var pos=(saveStart==null?elInput.value.length:saveStart);
           elInput.setSelectionRange(pos,pos); }catch(e){}
    }
  }
  // 도서관 검색 입력 바인딩 (IME 안전 — addEventListener)
  if(APP.tab==="lib" && !APP.topic) bindSearchInput();
}
render(true);

</script>
