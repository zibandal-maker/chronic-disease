<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>심방세동 처방 가이드 · AF Advisor</title>
<style>
:root{
  --bg:#f6f5f3; --panel:#ffffff; --panel2:#f3f1ee; --line:#e7e3dd;
  --ink:#2a2622; --ink-dim:#5c564e; --ink-faint:#9a938a;
  --pay:#c07b1e; --pay-bg:#fbf2df;     /* 급여(앰버) */
  --clin:#3a7bb8; --clin-bg:#e9f1f9;   /* 지침/임상(블루) */
  --care:#2a9580; --care-bg:#e0f3ee;   /* 통합관리(틸) */
  --refer:#8a63bd; --refer-bg:#f0e9f8; /* 의뢰(퍼플) */
  --ok:#34a866; --warn:#c07b1e; --block:#cf4d4d; --alert:#dd7038;
  --ok-bg:#e3f4e9; --block-bg:#fbe6e6; --alert-bg:#fcecdf;
  --radius:18px; --radius-sm:12px;
  --shadow:0 1px 2px rgba(50,44,38,.04), 0 4px 14px rgba(50,44,38,.05);
  --shadow-sm:0 1px 3px rgba(50,44,38,.05);
  --fz:15px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  font-size:var(--fz);line-height:1.66;-webkit-text-size-adjust:100%;letter-spacing:-.005em}
.wrap{max-width:880px;margin:0 auto;padding:0 16px 90px}

/* 헤더 */
header.top{position:sticky;top:0;z-index:40;background:rgba(246,245,243,.88);
  backdrop-filter:saturate(1.5) blur(12px);border-bottom:1px solid var(--line);margin:0 -16px;padding:13px 18px}
.title{display:flex;align-items:baseline;gap:9px;flex-wrap:wrap}
.title b{font-size:18px;letter-spacing:-.02em}
.title .en{font-size:11px;color:var(--ink-faint);font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.title .ver{margin-left:auto;font-size:10.5px;color:var(--ink-faint);border:1px solid var(--line);
  border-radius:20px;padding:2px 8px;background:var(--panel)}

/* 탭바 */
.tabs{display:flex;gap:7px;margin:13px -16px 0;padding:0 16px;position:sticky;top:52px;z-index:39;
  background:rgba(246,245,243,.88);backdrop-filter:blur(12px);padding-bottom:11px;padding-top:4px}
.tab{flex:1;text-align:center;padding:11px 4px;border-radius:15px;background:var(--panel);
  border:1px solid var(--line);font-weight:600;font-size:13px;color:var(--ink-dim);cursor:pointer;
  transition:transform .15s ease,background .15s ease,color .15s ease;user-select:none;box-shadow:var(--shadow-sm)}
.tab .ic{display:block;font-size:18px;margin-bottom:2px;line-height:1}
.tab:active{transform:scale(.97)}
.tab.on{background:var(--ink);color:#fff;border-color:var(--ink);box-shadow:0 3px 12px rgba(50,44,38,.16)}

section.view{display:none;padding-top:16px}
section.view.on{display:block;animation:fade .26s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* 공통 카드 */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:17px 18px;margin-bottom:13px;box-shadow:var(--shadow)}
.card.pad0{padding:0;overflow:hidden}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:6px}
h2.sec{font-size:16.5px;margin:2px 0 10px;letter-spacing:-.01em}
h3.sub{font-size:14.5px;margin:16px 0 8px;color:var(--ink)}
p.lead{color:var(--ink-dim);margin:3px 0 12px;font-size:13.5px;line-height:1.6}
.src{font-size:11.5px;color:var(--ink-faint);margin-top:6px;line-height:1.5}
.muted{color:var(--ink-faint)}

/* 배지 */
.badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;
  padding:3px 9px;border-radius:20px;white-space:nowrap;line-height:1.5}
.b-pay{background:var(--pay-bg);color:var(--pay)}
.b-clin{background:var(--clin-bg);color:var(--clin)}
.b-care{background:var(--care-bg);color:var(--care)}
.b-refer{background:var(--refer-bg);color:var(--refer)}
.b-ok{background:var(--ok-bg);color:var(--ok)}
.b-warn{background:var(--pay-bg);color:var(--warn)}
.b-block{background:var(--block-bg);color:var(--block)}
.b-alert{background:var(--alert-bg);color:var(--alert)}
.cor{display:inline-block;min-width:30px;text-align:center;font-weight:800;font-size:11px;
  padding:2px 7px;border-radius:7px;font-family:ui-monospace,Menlo,monospace}
.cor-1{background:#dcefe3;color:#1c8049}.cor-2a{background:#e3eefa;color:#2a679f}
.cor-2b{background:#eef1f4;color:#62707c}.cor-3{background:#f9e3e3;color:#bd3838}
.loe{font-size:10px;font-weight:700;color:var(--ink-faint);margin-left:3px}

/* 라이브러리 토픽 그리드 */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
@media(max-width:560px){.grid{grid-template-columns:1fr}}
.topic{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:15px 16px 15px 18px;cursor:pointer;transition:transform .15s ease,box-shadow .15s ease;position:relative;box-shadow:var(--shadow)}
.topic:active{transform:scale(.98)}
.topic:hover{box-shadow:0 2px 6px rgba(50,44,38,.07),0 8px 22px rgba(50,44,38,.07)}
.topic .tnum{font-size:12px;font-weight:800;color:var(--ink-faint);font-family:ui-monospace,monospace;display:flex;align-items:center;gap:5px}
.topic h4{margin:6px 0 4px;font-size:15px;letter-spacing:-.01em}
.topic p{margin:0;font-size:12px;color:var(--ink-dim);line-height:1.55}
.topic .strip{position:absolute;left:0;top:14px;bottom:14px;width:4px;border-radius:4px}
.s-pay{background:var(--pay)}.s-clin{background:var(--clin)}.s-care{background:var(--care)}.s-refer{background:var(--refer)}

/* 검색 */
.searchbar{display:flex;align-items:center;gap:9px;background:var(--panel);border:1px solid var(--line);
  border-radius:16px;padding:12px 16px;margin-bottom:14px;box-shadow:var(--shadow-sm);transition:box-shadow .15s}
.searchbar:focus-within{box-shadow:0 0 0 3px var(--clin-bg),var(--shadow-sm)}
.searchbar input{border:0;outline:0;flex:1;font-size:14px;background:transparent;color:var(--ink)}
.searchbar .mag{color:var(--ink-faint);font-size:15px}

/* 펼침 상세 */
.detail{display:none;margin-top:10px}
.detail.on{display:block}
.backbtn{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:600;color:var(--clin);
  cursor:pointer;margin-bottom:12px;background:var(--clin-bg);border:0;padding:7px 14px;border-radius:20px;transition:transform .12s}
.backbtn:active{transform:scale(.96)}
/* 토픽 본문을 하나의 카드로 */
.topicbody{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:18px 18px 20px;box-shadow:var(--shadow)}
/* 본문 안에서 이미 카드인 요소는 평평하게(이중 그림자 방지) */
.topicbody .scroll{box-shadow:none;background:var(--panel2);padding:7px;margin-left:-4px;margin-right:-4px}
.topicbody .doaccard{box-shadow:none;background:var(--panel2)}
.topicbody .acc{box-shadow:none}

/* 표 */
.tbl{width:100%;border-collapse:separate;border-spacing:0;font-size:12.5px;margin:0;
  border:1px solid var(--line);border-radius:var(--radius-sm);overflow:hidden}
.tbl th,.tbl td{border-bottom:1px solid var(--line);border-right:1px solid var(--line);padding:9px 11px;text-align:left;vertical-align:top}
.tbl tr:last-child th,.tbl tr:last-child td{border-bottom:0}
.tbl th:last-child,.tbl td:last-child{border-right:0}
.tbl th{background:var(--panel2);font-weight:700;font-size:11.5px;color:var(--ink-dim)}
.tbl td.c{text-align:center}
.tbl .hl{background:var(--clin-bg)}
/* 표를 카드처럼 감싸기 */
.scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:11px 0;padding:10px;
  background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-sm)}
.scroll .tbl{box-shadow:none}

/* 권고 항목 */
.rec{border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:9px;background:var(--panel);box-shadow:var(--shadow-sm)}
.rec .rh{display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.rec .rt{font-size:13.5px;line-height:1.6}
.rec.r-refer{border-left:4px solid var(--refer)}
.rec.r-mand{border-left:4px solid var(--block);background:var(--block-bg)}

/* 의뢰 배너 */
.refbanner{border-radius:var(--radius-sm);padding:14px 16px;margin:11px 0;font-size:13.5px;line-height:1.6}
.refbanner.mand{background:var(--block-bg);border:1px solid #eecaca;color:#9a3434}
.refbanner.consider{background:var(--refer-bg);border:1px solid #ddd0ee;color:#6a4a96}
.refbanner b{display:block;margin-bottom:4px;font-size:14px}

/* 알림/플래그 박스 */
.flag{border-radius:var(--radius-sm);padding:12px 14px;margin:8px 0;font-size:13px;line-height:1.6;border:1px solid transparent}
.flag.ok{background:var(--ok-bg);border-color:#c8e6d3}
.flag.warn{background:var(--pay-bg);border-color:#f0deb6}
.flag.block{background:var(--block-bg);border-color:#eecaca}
.flag.alert{background:var(--alert-bg);border-color:#f0d3ba}
.flag.info{background:var(--clin-bg);border-color:#cfe0f2}
.flag .ft{font-weight:700;margin-bottom:3px;font-size:13px}

/* 간극 비교 박스 */
.gap{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--line);border-radius:var(--radius-sm);overflow:hidden;margin:10px 0}
.gap>div{padding:12px 14px}
.gap .g-guide{background:var(--clin-bg)}
.gap .g-pay{background:var(--pay-bg);border-left:1px solid var(--line)}
.gap .gl{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
.gap .g-guide .gl{color:var(--clin)}.gap .g-pay .gl{color:var(--pay)}
.gap .gv{font-size:13px;line-height:1.55}

/* 플로우 입력 */
.field{margin-bottom:13px}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-dim);margin-bottom:6px}
.field input,.field select{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:13px;
  font-size:15px;background:var(--panel);color:var(--ink);outline:none;transition:box-shadow .15s,border-color .15s}
.field input:focus,.field select:focus{border-color:var(--clin);box-shadow:0 0 0 3px var(--clin-bg)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{padding:8px 14px;border:1px solid var(--line);border-radius:20px;font-size:12.5px;font-weight:600;
  cursor:pointer;background:var(--panel);color:var(--ink-dim);user-select:none;transition:transform .12s,background .12s,color .12s;box-shadow:var(--shadow-sm)}
.chip:active{transform:scale(.95)}
.chip.on{background:var(--clin);color:#fff;border-color:var(--clin)}
.chip.on.pt2{background:var(--alert);border-color:var(--alert)}
.btn{display:block;width:100%;padding:14px;border:0;border-radius:15px;background:var(--ink);color:#fff;
  font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;box-shadow:var(--shadow)}
.btn:active{opacity:.88;transform:scale(.99)}

/* 점수 디스플레이 */
.scorebox{display:flex;gap:11px;margin:10px 0}
.scoreitem{flex:1;text-align:center;background:var(--panel2);border-radius:15px;padding:13px 6px}
.scoreitem .sv{font-size:27px;font-weight:800;line-height:1;letter-spacing:-.02em}
.scoreitem .sl{font-size:11px;color:var(--ink-dim);margin-top:4px;font-weight:600}
.scoreitem.risk-hi .sv{color:var(--block)}
.scoreitem.risk-mid .sv{color:var(--alert)}
.scoreitem.risk-lo .sv{color:var(--ok)}

/* DOAC 비교 카드 */
.doaccard{border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px;margin-bottom:11px;background:var(--panel);box-shadow:var(--shadow-sm)}
.doaccard .dh{display:flex;align-items:baseline;gap:8px;margin-bottom:7px;flex-wrap:wrap}
.doaccard .dn{font-size:15.5px;font-weight:800;letter-spacing:-.01em}
.doaccard .db{font-size:12px;color:var(--ink-faint)}
.doaccard .dclass{font-size:11px;background:var(--clin-bg);color:var(--clin);padding:3px 9px;border-radius:20px;font-weight:700}
.kv{display:grid;grid-template-columns:auto 1fr;gap:4px 12px;font-size:12.5px;margin-top:6px}
.kv .k{color:var(--ink-faint);font-weight:600}
.kv .v{color:var(--ink)}

/* 확장 토글 */
.exp{cursor:pointer;user-select:none}
.exp .more{display:none}
.exp.open .more{display:block;margin-top:8px}
.exp .caret{font-size:11px;color:var(--clin);font-weight:700}

/* 아코디언 (접이식 섹션) */
.acc{border:1px solid var(--line);border-radius:var(--radius-sm);margin:9px 0;overflow:hidden;background:var(--panel);box-shadow:var(--shadow-sm)}
.acc>.ah{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;user-select:none;transition:background .15s}
.acc>.ah:active{background:var(--panel2)}
.acc>.ah .aic{font-size:17px;line-height:1;flex-shrink:0}
.acc>.ah .at{flex:1;font-weight:700;font-size:14px;letter-spacing:-.01em}
.acc>.ah .asub{font-size:11.5px;color:var(--ink-faint);font-weight:500}
.acc>.ah .acaret{font-size:14px;color:var(--ink-faint);transition:transform .25s ease;flex-shrink:0}
.acc.open>.ah .acaret{transform:rotate(90deg)}
.acc>.ab{display:none;padding:2px 16px 15px;border-top:1px solid var(--line)}
.acc.open>.ab{display:block;animation:fade .24s ease}
.acc.open>.ah{background:var(--panel2)}

/* 칩 토글 그룹 (요약 권고 등) */
.summary{display:flex;gap:8px;flex-wrap:wrap;margin:11px 0}
.scount{display:inline-flex;align-items:center;gap:5px;background:var(--panel2);border-radius:20px;
  padding:6px 12px;font-size:12px;font-weight:600;color:var(--ink-dim)}
.scount .n{font-weight:800;color:var(--ink)}

footer{margin-top:28px;padding:4px;font-size:13px;color:var(--ink-dim);line-height:1.65}
footer a{color:var(--clin);text-decoration:none;font-weight:600}
footer a:active{opacity:.7}
.srcbox{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:18px 18px 20px;box-shadow:var(--shadow);margin-bottom:14px}
.srcbox h3{font-size:15px;margin:0 0 12px;letter-spacing:-.01em;color:var(--ink);display:flex;align-items:center;gap:7px}
.srclist{display:flex;flex-direction:column;gap:11px}
.srcitem{display:block;padding:12px 14px;border:1px solid var(--line);border-radius:var(--radius-sm);
  background:var(--panel2);transition:transform .12s,box-shadow .12s;text-decoration:none;color:inherit}
.srcitem:active{transform:scale(.985)}
.srcitem .stt{font-size:13.5px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.srcitem .sdd{font-size:12.5px;color:var(--ink-dim);margin-top:3px;line-height:1.5}
.srcitem .slink{font-size:12px;color:var(--clin);font-weight:600;margin-top:5px;display:inline-flex;align-items:center;gap:4px}
.srcitem.nolink{cursor:default}
.gradekey{font-size:12.5px;color:var(--ink-dim);margin-top:14px;padding-top:13px;border-top:1px solid var(--line);line-height:1.6}
.discl{background:var(--panel2);border-radius:14px;padding:14px 16px;font-size:12px;color:var(--ink-dim);margin-top:12px;line-height:1.62}

/* 모달 */
.modal{position:fixed;inset:0;background:rgba(42,38,34,.5);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.modal.on{display:flex}
.modal .box{background:var(--panel);border-radius:20px;max-width:560px;width:100%;max-height:84vh;overflow-y:auto;padding:18px 18px 22px}
.modal .x{float:right;font-size:22px;color:var(--ink-faint);cursor:pointer;line-height:1;border:0;background:none}
</style>
</head>

<script>
/* ════════════════ DATA LAYER ════════════════ */
/* 권고 등급 정의 (전역) */
var COR={ "I":{t:"추천됨/적응증",c:"cor-1"}, "IIa":{t:"고려되어야 함",c:"cor-2a"},
  "IIb":{t:"고려될 수 있음",c:"cor-2b"}, "III":{t:"추천되지 않음",c:"cor-3"} };
var LOE={ "A":"다수 RCT·메타분석", "B":"단일 RCT·대규모 비무작위", "C":"전문가 의견·소규모·후향" };

/* ── DOAC 약제 데이터 (성분 단위 전역 ID) ── */

/* CHA2DS2-VASc 점수 — 성별 분기 포함 */
function cha2ds2(sel, isFemale){
  var s=0; for(var i=0;i<CHADS.length;i++){ if(sel[CHADS[i].id]) s+=CHADS[i].pt; }
  return s;
}
/* 항응고 적응증 판정: 지침 vs 급여 간극 */
function anticoagDecision(score, isFemale){
  // 지침: 남 ≥2 / 여 ≥3 추천(I), 남1/여2 고려(IIa), 남0/여1 비투여(I-III)
  // 급여: ≥2 일괄
  var nonSexScore = score - (isFemale?1:0); // 성별 제외 실질 위험점수
  var guide, gradeG, payOk, gap=null;
  if(nonSexScore>=2){ guide="추천 (항응고제 투여)"; gradeG="I"; }
  else if(nonSexScore===1){ guide="고려 (개별화 결정)"; gradeG="IIa"; }
  else { guide="투여하지 않음 (저위험)"; gradeG="III"; }
  payOk = score>=2;
  // 간극 케이스
  if(isFemale && score===2 && nonSexScore===1){
    gap={type:"female2", msg:"여성 성별점수(1점)만으로 VASc 2점 — 성별 제외 시 VA 1점(저~중등도)이다. 급여는 되나 추가 위험인자가 없으면 항응고 이득이 작다. 2024 ESC는 이런 모호함 때문에 성별을 뺀 CHA₂DS₂-VA로 전환했다. 다른 위험인자 동반 여부로 판단."};
  } else if(!isFemale && score===1 && nonSexScore===1){
    gap={type:"male1", msg:"남성 1점 — 지침은 개별화 고려(IIa) 권장하나 현행 급여기준(≥2점)으로는 비급여. 비급여 부담 또는 미투여 선택."};
  }
  return {guide:guide, gradeG:gradeG, payOk:payOk, score:score, nonSex:nonSexScore, gap:gap};
}
/* Cockcroft-Gault CrCl */
function crcl(age, wt, scr, isFemale){
  if(!age||!wt||!scr) return null;
  var v=((140-age)*wt)/(72*scr); if(isFemale) v*=0.85;
  return Math.round(v);
}
/* DOAC 신기능 밴드 */
function doacRenalBand(cr){
  if(cr==null) return null;
  if(cr>=50) return 0; if(cr>=30) return 1; if(cr>=15) return 2; return 3;
}

/* 권고 묶음 → 등급 요약 칩 + 접이식 전체 */
function recsAccordion(cat, label){
  var list=[]; for(var i=0;i<AF_RECS.length;i++){ if(AF_RECS[i].cat===cat) list.push(AF_RECS[i]); }
  if(!list.length) return '';
  var cnt={I:0,IIa:0,IIb:0,III:0};
  for(var j=0;j<list.length;j++) cnt[list[j].cor]=(cnt[list[j].cor]||0)+1;
  var chips='<div class="summary">';
  var order=["I","IIa","IIb","III"];
  for(var k=0;k<order.length;k++){ if(cnt[order[k]]) chips+='<span class="scount"><span class="cor '+COR[order[k]].c+'">'+order[k]+'</span><span class="n">'+cnt[order[k]]+'</span></span>'; }
  chips+='</div>';
  var body=chips;
  for(var m=0;m<list.length;m++) body+=recHtml(list[m]);
  return acc("📋", (label||"권고 사항"), list.length+"개 · 탭하여 펼치기", body, false);
}

  var refMap={mandatory:'b-block',consider:'b-refer',comanage:'b-care',direct:'',avoid_note:'b-warn'};

  var cls=r.ref==='mandatory'?'rec r-mand':(r.ref==='consider'||r.ref==='comanage'?'rec r-refer':'rec');
  var corObj=COR[r.cor]||{c:''};
  var refBadge = (r.ref&&r.ref!=='direct') ? '<span class="badge '+refMap[r.ref]+'">'+refTxt[r.ref]+'</span>' : '';
  return '<div class="'+cls+'"><div class="rh"><span class="cor '+corObj.c+'">'+r.cor+'</span>'+
    '<span class="loe">LOE '+r.loe+'</span>'+refBadge+'</div><div class="rt">'+r.t+'</div></div>';
}

function filterLib(q){

  for(var i=0;i<topics.length;i++){
    var t=topics[i];
    var hay=(t.textContent+' '+(t.getAttribute('data-kw')||'')).toLowerCase();
    var match=!q||hay.indexOf(q)>=0;
    t.style.display=match?'':'none';
    if(match) shown++;

  h+='<p class="lead">카테터 절제술의 적응증·전략·기법은 부정맥 중재시술 전문의의 영역이다. 본 도구는 적응증을 판정하지 않으며, 언제 의뢰할지를 돕는다.</p>';

  h+='<p class="src">출처: 2024 KHRS PART 2 (절제술), PART 1.</p>';

  var steps=[

   {t:"A · 항응고제 선택", items:["DOAC을 와파린보다 우선 고려했다","신기능(CrCl, Cockcroft-Gault) 확인했다","고령·저체중 시 감량 기준 검토했다","병용약(P-gp/CYP3A4 상호작용) 확인했다"]},
   {t:"B · 심박수 조절", items:["목표 심박수 설정했다 (안정시 <110)","EF 기준 1차 약제 선택했다"]},
   {t:"B · 율동 조절", items:["증상 기반 율동조절 필요성 평가했다","구조적 심질환 유무로 항부정맥제 선택했다","절제술 의뢰 필요성 검토했다"]},
   {t:"C · 위험인자 관리", items:["고혈압·당뇨·비만·음주 등 동반질환 관리했다","상병코드 확인했다 (영구형이면 드로네다론 금기)"]}
  ];
  for(var s=0;s<steps.length;s++){

      var id='ck'+s+'_'+i;
      h+='<label style="display:flex;gap:9px;align-items:flex-start;padding:6px 0;cursor:pointer;font-size:13.5px">'+
         '<input type="checkbox" id="'+id+'" onchange="simUpdate()" style="margin-top:3px;width:17px;height:17px;flex-shrink:0"><span>'+steps[s].items[i]+'</span></label>';

function simUpdate(){
  var boxes=document.querySelectorAll('#view-sim input[type=checkbox]');
  var done=0; for(var i=0;i<boxes.length;i++) if(boxes[i].checked) done++;
  var pct=Math.round(done/boxes.length*100);
  document.getElementById('simBar').innerHTML='<b>'+done+'/'+boxes.length+'</b> 항목 점검 · '+pct+'%'+
    (pct===100?' <span class="badge b-ok">완료</span>':'');
}

function buildFlow(){
  var v=document.getElementById('view-flow'); var h='';
  h+='<div class="card"><div class="eyebrow">실시간 입력</div><h2 class="sec">환자 입력 → 권고</h2>'+
     '<p class="lead">환자 정보를 입력하면 항응고 적응증(지침·급여 간극 포함), DOAC 신기능 용량, 의뢰 필요성을 산출합니다.</p>';
  h+='<div class="field"><label>성별</label><div class="chips"><span class="chip on" id="sexM" onclick="setSex(0)">남성</span><span class="chip" id="sexF" onclick="setSex(1)">여성</span></div></div>';
  h+='<div class="row3"><div class="field"><label>나이</label><input type="number" id="fAge" inputmode="numeric" placeholder="세" oninput="flowRun()"></div>'+
     '<div class="field"><label>체중</label><input type="number" id="fWt" inputmode="decimal" placeholder="kg" oninput="flowRun()"></div>'+
     '<div class="field"><label>혈청 Cr</label><input type="number" id="fScr" inputmode="decimal" placeholder="mg/dL" step="0.1" oninput="flowRun()"></div></div>';
  h+='<div class="field"><label>CHA₂DS₂-VASc 위험인자 (나이·성별 자동 반영)</label><div class="chips" id="chadsChips"></div></div>';
  h+='<div class="field"><label>HAS-BLED 출혈 위험인자</label><div class="chips" id="bledChips"></div></div>';
  h+='<div class="field"><label>현재 상태 / 동반</label><div class="chips" id="condChips"></div></div>';
  h+='</div>';
  h+='<div id="flowOut"></div>';
  v.innerHTML=h;
  // 칩 렌더
  var cc='';
  for(var i=0;i<CHADS.length;i++){ if(CHADS[i].id==='A2'||CHADS[i].id==='A'||CHADS[i].id==='Sc') continue; // 나이·성별 자동
    cc+='<span class="chip" data-ch="'+CHADS[i].id+'" onclick="toggleChip(this);flowRun()">'+CHADS[i].k.split(' (')[0]+'</span>'; }
  document.getElementById('chadsChips').innerHTML=cc;
  var bc='';
  for(var j=0;j<HASBLED.length;j++){ bc+='<span class="chip" data-bl="'+HASBLED[j].id+'" onclick="toggleChip(this);flowRun()">'+HASBLED[j].k.split(' (')[0]+'</span>'; }
  document.getElementById('bledChips').innerHTML=bc;
  var conds=[["permanent","영구형 AF"],["hf","심부전"],["structural","구조적 심질환"],["mech_valve","기계판막/승모판협착"]];
  var ccc='';
  for(var k=0;k<conds.length;k++) ccc+='<span class="chip pt2" data-cond="'+conds[k][0]+'" onclick="toggleChip(this);flowRun()">'+conds[k][1]+'</span>';
  document.getElementById('condChips').innerHTML=ccc;
  flowRun();
}
var FLOW={sex:0};
function setSex(s){ FLOW.sex=s; document.getElementById('sexM').classList.toggle('on',s===0); document.getElementById('sexF').classList.toggle('on',s===1); flowRun(); }
function toggleChip(el){ el.classList.toggle('on'); }
function chipSet(attr){ var o={}; var els=document.querySelectorAll('['+attr+']'); for(var i=0;i<els.length;i++){ if(els[i].classList.contains('on')) o[els[i].getAttribute(attr)]=true; } return o; }

function flowRun(){
  var age=parseFloat(document.getElementById('fAge').value)||0;
  var wt=parseFloat(document.getElementById('fWt').value)||0;
  var scr=parseFloat(document.getElementById('fScr').value)||0;
  var isF=FLOW.sex===1;
  var chSel=chipSet('data-ch'); var blSel=chipSet('data-bl'); var cond=chipSet('data-cond');
  // 나이·성별 자동 반영
  if(age>=75) chSel['A2']=true; else if(age>=65) chSel['A']=true;
  if(isF) chSel['Sc']=true;
  var score=cha2ds2(chSel,isF);
  var bled=hasbled(blSel);
  var dec=anticoagDecision(score,isF);
  var cr=crcl(age,wt,scr,isF);
  var band=doacRenalBand(cr);

  var h='';
  // 점수
  h+='<div class="card"><div class="scorebox">';
  var riskCls=score>=2?'risk-hi':(score===1?'risk-mid':'risk-lo');
  h+='<div class="scoreitem '+riskCls+'"><div class="sv">'+score+'</div><div class="sl">CHA₂DS₂-VASc</div></div>';
  h+='<div class="scoreitem"><div class="sv">'+dec.nonSex+'</div><div class="sl">VA (성별 제외)</div></div>';
  h+='<div class="scoreitem '+(bled>=3?'risk-hi':'risk-lo')+'"><div class="sv">'+bled+'</div><div class="sl">HAS-BLED</div></div>';
  h+='</div>';
  if(cr!=null) h+='<div class="flag info" style="font-size:12px;margin-top:0">CrCl '+cr+' mL/min (Cockcroft-Gault)</div>';
  // 항응고 판정 + 간극
  h+='<h3 class="sub">항응고 적응증</h3>';
  h+='<div class="gap"><div class="g-guide"><div class="gl">지침</div><div class="gv"><span class="cor '+(COR[dec.gradeG]?COR[dec.gradeG].c:'')+'">'+dec.gradeG+'</span> '+dec.guide+'</div></div>'+
     '<div class="g-pay"><div class="gl">급여</div><div class="gv">'+(dec.payOk?'<span class="badge b-pay">급여 인정 (≥2점)</span>':'<span class="badge b-block">비급여 (≥2점 미달)</span>')+'</div></div></div>';
  if(dec.gap){
    var fc=dec.gap.type==='female2'?'warn':'alert';
    h+='<div class="flag '+fc+'"><div class="ft">⚠ 지침–급여 간극</div>'+dec.gap.msg+'</div>';
  }
  if(score>=2||dec.gradeG==='I'){
    h+='<div class="flag info">DOAC을 와파린보다 우선 고려 (I-A). 신기능·병용약·고령 반영하여 약제·용량 선택.</div>';
  }
  if(bled>=3) h+='<div class="flag warn"><div class="ft">출혈 고위험 (HAS-BLED '+bled+')</div>항응고 중단 사유 아님. 교정 가능 위험인자 관리 + 더 자주 추적.</div>';
  h+='</div>';

  // DOAC 신기능 용량
  if(cr!=null){
    h+='<div class="card"><h3 class="sub" style="margin-top:0">DOAC 신기능 용량 (CrCl '+cr+')</h3>';
    if(band===3){
      h+='<div class="flag block"><div class="ft">말기 신질환 / 투석 영역</div>다비가트란·리바록사반 금기. 아픽사반/에독사반도 데이터 부족 → 신장내과 협의·공유결정.</div>';
    } else {
      var rr=DOAC_RENAL[band];
      h+='<div class="scroll"><table class="tbl"><tr><th>다비가트란</th><th>리바록사반</th><th>아픽사반</th><th>에독사반</th></tr>'+
         '<tr><td>'+rr.dabi+'</td><td>'+rr.riva+'</td><td>'+rr.apix+'</td><td>'+rr.edox+'</td></tr></table></div>';
      if(band>=1) h+='<div class="flag warn">신기능 저하 — 감량 기준 충족 여부를 약제별로 확인하십시오. 저체중·고령 동반 시 아픽사반/에독사반 선호.</div>';
      if(cr>95) h+='<div class="flag alert"><div class="ft">CrCl >95</div>에독사반은 고기능 신장에서 뇌졸중 예방 효과 감소 경고(라벨) — 다른 약제 고려.</div>';
    }
    h+='<div class="flag info" style="font-size:12px">CrCl은 Cockcroft-Gault 추정값. 임상 확인 필수.</div></div>';
  }

  // 금기/플래그
  var flags=[];
  if(cond['mech_valve']) flags.push(['block','기계판막 / 중등도+ 승모판협착','비판막성 AF 아님 → DOAC 금기. 와파린(INR 목표 판막 기준) 영역.']);
  if(cond['permanent']||cond['hf']) flags.push(['block','드로네다론 금기','영구형 AF 또는 심부전 — 드로네다론 투여 금기 (PALLAS).']);
  if(cond['structural']) flags.push(['warn','구조적 심질환','율동조절 시 Class IC(플레카이니드·프로파페논) 금기 → 아미오다론 고려.']);
  for(var f=0;f<flags.length;f++) h+='<div class="flag '+flags[f][0]+'"><div class="ft">'+flags[f][1]+'</div>'+flags[f][2]+'</div>';

  // 의뢰
  h+='<div class="card"><h3 class="sub" style="margin-top:0">의뢰 / 다음 단계</h3>'+
     '<div class="flag info">증상성 AF에서 항부정맥제 실패·불내성 시 절제술 적응증 검토 → 부정맥 전문의 의뢰. 절제술 적응증은 본 도구가 판정하지 않습니다.</div></div>';

  document.getElementById('flowOut').innerHTML=h;
}

 {cat:"율동",cor:"IIb",loe:"B",ref:"consider",t:"폐정맥 고립술 외 추가적인 병변 형성(저전압 부위, 선형 병변, 분할 전기도, 이소성 병변, 로터 등)은 고려될 수 있으나 잘 정립되어 있지는 않다."},
 {cat:"율동",cor:"IIa",loe:"A",ref:"consider",t:"다른 심장 수술을 진행할 때, 함께 심방세동 수술적 치료를 하는 것을 고려해야 한다. 다만 율동 조절의 이익과 심방 부정맥 재발의 위험성을 따져보아야 한다."},
 {cat:"율동",cor:"IIa",loe:"B",ref:"consider",t:"하이브리드 시술을 포함하여 흉강경을 이용한 심방세동 시술은 이전 경피적 심방세동 시술이 실패하였거나 혹은 실패할 확률이 높고, 항부정맥 약제에 불응하는 유증상 발작성, 지속성 심방세동 환자에게 장기간의 율동 조절을 목적으로 고려되어야 한다. 그리고 시술은 부정맥 전문의와 외과의사로 구성된 경험있는 협의체를 통해 결정되어야 한다."},
 {cat:"율동",cor:"IIb",loe:"C",ref:"consider",t:"하이브리드 시술을 포함하여 흉강경을 이용한 심방세동 수술적 치료는 항부정맥제 약물치료에 불응하는 재발의 위험성의 높은 유증상 지속성 심방세동 환자에서 율동 조절을 선호하는 경우 고려될 수 있다."},
 {cat:"항응고",cor:"I",loe:"C",ref:"comanage",t:"뇌졸중 위험 인자가 있는 심방세동 환자에서 절제술 전 경구항응고제를 복용하지 않는 경우 시술 전 뇌졸중 위험 관리로서 항응고치료 시작 및 다음 사항을 권고한다."},
 {cat:"항응고",cor:"I",loe:"A",ref:"mandatory",t:"반, 아픽사반 또는 에독사반으로 항응고치료를 받고 있었을 경우 경구항응고제 중단 없이 절제술을 진행하는 것을 권고한다."},
 {cat:"항응고",cor:"I",loe:"C",ref:"mandatory",t:"심방세동 카테터 절제술 후 다음 사항을 권고한다. ▪ 절제술 후 적어도 2 개월 동안 비타민 K 길항제나 NOAC으로 전신 항응고치료를 유지한다. ▪ 절제술 후 2 개월이 지난 후 전신 항응고치료의 장기적 유지는 절제술의 확실한 성공 또는 실패가 아니라 환자의 뇌졸중 위험 요소를 기반으로 한다."},
 {cat:"항응고",cor:"IIa",loe:"B",ref:"direct",t:"음주는 심방세동을 예방하고 특히 항응고제 치료를 계획한 심방세동 환자에서 제한이 고려되어야 한다."},
 {cat:"항응고",cor:"IIb",loe:"B",ref:"direct",t:"고려할 수 있다.684-686) 11.2 처음 진단된 심방세동 처음 진단된 심방세동은 심방세동의 기왕력이 없는 환자에서 심방세동의 정확한 분류 가 되기 전에 사용되는 진단이다. 이전 레지스트리 연구에서는 처음 진단된 심방세동 환 자의 임상 양상이나 경과가 영구형 심방세동과 유사하며, 발작성 심방세동보다 예후가 더 불량함에도 불구하고,687)688) 항응고제 처방률은 가장 낮았다.689) 따라서 처음 진단된 심방 세동에서도 ABC pathway를 바탕으로 치료하여야 한다."},
 {cat:"항응고",cor:"IIa",loe:"B",ref:"direct",t:"비타민 K 길항제의 용량이 목표 INR 2.0-2.5 면서 TTR > 70 %로 조절되어야 한다.708-711) 급성 관동맥 증후군이 있는 심방세동 환자에서의 치료 지침 사항 복잡하지 않은 경피적 스텐트 삽입술을 시행 받은 급성 관동맥 증후군을 동반한 심방세동 환자에서 스텐트 혈전증의 위험이 낮거나 스텐트 혈전증의 위험보다"},
 {cat:"항응고",cor:"IIa",loe:"C",ref:"direct",t:"혈전증의 위험이 출혈 위험보다 높은 경우 최대 1 개월 이내로 고려해야 있다."},
 {cat:"항응고",cor:"IIa",loe:"C",ref:"direct",t:"혈전증의 위험이 출혈 위험보다 높은 경우 최대 1 개월 이내로 고려해야 있다."},
 {cat:"항응고",cor:"III",loe:"B",ref:"direct",t:"헤파린, 비분획 헤파린, 비타민 K 항응고제는 적용되지 않는다.733) 뇌내 출혈 후 심방세동 환자에서 뇌졸중 예방 지침 사항 허혈성 뇌졸중 위험이 높은 심방세동 환자는 다음의 경우 비타민 K 항응고제보다는 NOAC을 적용하여야 한다. 이때는 출혈의 위험성에 대한 위험편익이 고려되어야 한다."},
 {cat:"항응고",cor:"IIa",loe:"C",ref:"comanage",t:"외상성 뇌내 출혈 급성 자발성 뇌출혈 (경막하, 지주막하 또는 뇌내 출혈) 11.5 항응고치료 중 출혈 : 관리 및 역전제 항응고제를 사용하는 동안 출혈이 발생하는 환자의 관리는 그림 16에 제시하였다. 출혈 부위 감지, 출혈의 중증도, 마지막으로 항응고제를 복용한 시점에 대한 평가가 일반적인 평가에 포함되어야 한다. 동시에 복용중인 다른 항혈전제와 출혈의 위험에 영향을 미치는 다른 요인들 (알코올 남용, 신장기능)에 대해 조사해야 한다. 비타민 K 길항제를 사용하는 경우 INR과 같은 혈액 검사가 유용하다. NOAC에 대한 보다 구체적인 검사로는 다비 가트란에 대해서는 희석된 트롬빈 시간, 리바록사반, 아픽사반, 에독사반에 대해서는 anti-factor Xa 분석이 있다.734) 그러나 이런 검사나 NOAC의 혈장 수준 측정은 실제로는 쉽게 사용할 수 있는 것이 아니며, 출혈 관리 시 반드시 필요한 것은 아니다.735) 무엇보다도 적절한 임상적 결정을 내리기 위해서는 신장 기능, 헤모글로빈, 헤마토크리 트 그리고 혈소판 수의 평가와 마지막 약제 섭취 시간을 아는 것이 중요하다. 경미한 출혈 은 지혈을 위해서 물리적 압박이나 간단한 수술로 치료한다. 비타민 K 길항제는 중단하더 라도 즉각적인 효과 감소를 기대하기 힘든 반면 NOAC은 반감기가 짧아 투여 중단 후 12-24 시간이면 지혈이 이루어질 수 있다."},
 {cat:"항응고",cor:"I",loe:"C",ref:"direct",t:"중증 출혈이 발생한 심방세동 환자에서는 다음이 권고된다. 심각한 출혈이 멈추고 출혈의 원인이 확인될 때까지 항응고제를 중단한다. 출혈의 원인을 확인하고 관리하기 위한 진단 및 치료 개입이 즉시 시행되어야 한다."},
 {cat:"항응고",cor:"IIa",loe:"C",ref:"direct",t:"중증 출혈 합병증이 발생한 비타민 K 길항제 복용 환자에서는 프로트롬빈 복합 농축액 사용을 고려한다."},
 {cat:"율동",cor:"IIa",loe:"C",ref:"consider",t:"심방세동에 대한 수술은 다음과 같은 환자에게 고려되어야 한다. • 심방중격 결손증의 수술적 폐쇄가 필요하고 증상이 있는 심방 부정맥의 기왕력이 있는 환자 (심방절제술은 심방중격 결손증 폐쇄술 시 고려해야 한다).891-893) • Cox-Maze 수술은 다음과 같은 경우에 고려한다."},
 {cat:"율동",cor:"IIb",loe:"C",ref:"direct",t:"함께 고려할 수 있다.895)896) 11.16 유전성 심근병증과 일차성 부정맥 증후군에서 심방세동 유전성 심근병증 및 원발성 부정맥 증후군 환자에서 심방세동의 발생률과 유병률은 더 높다.895-929) 때로는 심방세동이 나타나거나 임상적으로 명백한 특징인 경우도 있지 만,930-934) 종종 임상적으로 나쁜 예후와 관련이 있다.132)895)910)912)918)919)921)935-939) 다음과 같은 중요한 의미가 있다: ∙ 항부정맥제를 사용하는 것이 어려울 수 있다. 선천성 긴 QT 증후군에서는 QT간격 연 장과 염전성 심실빈맥 위험 증가로 많은 약물이 금기다. (http://www.crediblemeds.org) 브루가다 증후군에서는 class I 항부정맥제가 금기다. (http://www.brugadadrugs.org/). 장 기간 사용의 부작용으로 인해 이와 같은 젊은 환자군에서 아미오다론을 만성적으로 사 용하는 것은 문제가 된다."},
 {cat:"항응고",cor:"IIa",loe:"C",ref:"direct",t:"베타차단제가 실패할 경우 심박수 조절을 위해 디곡신e이나 베라파밀e을 고려한다. 심방세동의 심율동 전환은 일반적으로 항응고 치료보다 먼저 시행되어야 한다."},
 {cat:"항응고",cor:"I",loe:"B",ref:"comanage",t:"장기간의 강렬한 스포츠 활동이 심방세동을 촉진할 수 있음을 전문 운동선수에게 상담하는 것이 권장되며, 심방세동 예방을 위해서는 적당한 신체 활동이 권장된다.615)968)972)979-982) 11.19 수술 후 심방세동 수술 전후 (Peri-operative) 심방세동은 진행 중인 수술, 시술 중 부정맥이 시작된 것을 지칭한다. 이는 심장 수술을 받는 환자에게 가장 의미가 있다. 수술 전후 심방세동을 줄이 기 위해 전처리 또는 급성 약물 치료를 통해 수술 전후 AF 발생률을 줄이기 위한 여러 전략이 시도되었지만 대규모 무작위 대조 연구의 증거는 부족하다. 아미오다론은 수술 전 후 심방세동 예방을 위해 가장 자주 사용되는 약물이다.983) 수술 후 바로 발생하는 심방세동으로 정의되는 수술 후 심방세동은 임상적으로 주요한 문제이며,984)985) 심장 수술 후 환자의 20~50 %,986)987) 비심장 흉부 수술 후 10~30 %,988) 혈관 또는 대형 대장 수술 후 5~10 %에서 발생하며989) 수술 후 2~4일 사이에 발생률이 1부 심방세동 일반 치료 진료지침 99 후 변화는 다음과 같은 심방 취약성을 증가시킬 수 있다. 많은 수술 후 심방세동은 스스로 종료되거나 일부는 증상이 없지만 수술 후 심방세동은 향후 5 년 내에 심방세동 재발 위 험이 4~5 배로 높았다.991)992) 이는 또한 수술 후 심방세동이 없는 환자에 비해 뇌졸중, 심근경색 및 사망의 위험 인자인 것으로 나타났다.993)994) 수술 후 심방세동의 다른 결과로는 혈역학적 불안정성, 입원 기간 연장, 감염, 신장 합 병증, 출혈, 병원 내 사망 증가, 의료 비용 증가 등이 있다.985)995)996) 수술 후 심방세동의 관리 방법은 다음과 같다. (그림 17) 수술 후 수술 전 심방세동 ∙ 혈액동학적 안정 ∙ 전해질 불균형 교정 (마그네슘 포함) ∙ 수술 후 심방세동의 위험성이 높은 환자 규명 혈역학적 Yes 응급 안정성? 심율동전환 약리학적 수술 후 심방세동 예방 : ∙ 베타 차단제 지속/시작과 함께/또는 아미오다론 고려 ∙ 금기라면 정맥내 마그네슘 주입 ∙ 선택적으로 다른 항부정맥 약제 사용 전신 항응고치료 만약 약물 예방이 금기인 경우에는 적응증이 되지 않음"},
