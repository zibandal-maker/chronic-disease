<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>감염 임상결정 지원 · v1</title>
<style>
:root{
  --bg:#f5f7fa; --surface:#ffffff; --surface-2:#eef2f7; --line:#dde4ec; --line-soft:#e8edf3;
  --ink:#1c2733; --ink-dim:#5a6b7b; --ink-faint:#94a3b2;
  --accent:#1f7ae0; --accent-soft:#e8f1fd;
  --rec:#1b9e5a; --rec-bg:#e7f6ee; --rec-line:#bfe6d0;
  --caut:#c98a00; --caut-bg:#fdf4e0; --caut-line:#f0dba8;
  --avoid:#d83a34; --avoid-bg:#fbeae9; --avoid-line:#f3c4c1;
  --consider:#1f7ae0; --consider-bg:#e8f1fd; --consider-line:#c2dcf7;
  --todo:#94a3b2; --r:12px;
  --mono:ui-monospace,"SF Mono","Cascadia Code",Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",system-ui,sans-serif;
  --shadow:0 1px 2px rgba(20,40,70,.04),0 2px 8px rgba(20,40,70,.05);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.5;padding-bottom:74px;-webkit-font-smoothing:antialiased;}
button{font-family:inherit;cursor:pointer;}
.appbar{position:sticky;top:0;z-index:30;background:rgba(245,247,250,.86);backdrop-filter:saturate(160%) blur(10px);border-bottom:1px solid var(--line);padding:11px 16px 13px;}
.brand{display:flex;align-items:baseline;gap:8px;margin-bottom:10px;}
.brand b{font-size:16px;letter-spacing:-.015em;font-weight:680;}
.brand span{font-size:11px;color:var(--ink-faint);font-family:var(--mono);}
.search-wrap{position:relative;}
#search{width:100%;background:var(--surface);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:11px 12px 11px 38px;font-size:15px;outline:none;box-shadow:var(--shadow);}
#search:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
.search-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--ink-faint);font-size:16px;}
.search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--ink-faint);font-size:20px;display:none;padding:4px 8px;}
#searchResults{display:none;position:absolute;left:0;right:0;top:100%;margin-top:7px;background:var(--surface);border:1px solid var(--line);border-radius:12px;max-height:62vh;overflow-y:auto;z-index:40;box-shadow:0 12px 40px rgba(20,40,70,.16);}
.sr-group-label{font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;color:var(--ink-faint);padding:10px 13px 4px;}
.sr-item{display:flex;align-items:center;gap:10px;padding:10px 13px;border-top:1px solid var(--line-soft);}
.sr-item:active{background:var(--surface-2);}
.sr-item .nm{flex:1;font-size:14px;}
.sr-item .sub{font-size:11px;color:var(--ink-faint);font-family:var(--mono);}
.sr-empty{padding:18px 13px;color:var(--ink-faint);font-size:13px;}
#disclaimer{background:var(--caut-bg);border-bottom:1px solid var(--caut-line);color:#8a6400;font-size:12px;line-height:1.45;padding:10px 16px;display:flex;gap:9px;align-items:flex-start;}
#disclaimer button{margin-left:auto;background:var(--surface);border:1px solid var(--caut-line);color:#8a6400;border-radius:7px;padding:4px 11px;font-size:11px;flex:none;}
.view{padding:16px;display:none;}
.view.active{display:block;}
.crumb{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:14px;font-size:13px;}
.crumb button{background:none;border:none;color:var(--accent);font-size:13px;padding:0;font-weight:550;}
.crumb .sep{color:var(--ink-faint);}
.crumb .here{color:var(--ink-dim);}
.ptitle{font-size:21px;font-weight:720;letter-spacing:-.02em;margin:2px 0 3px;}
.psub{font-size:13px;color:var(--ink-dim);margin-bottom:16px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:11px;}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px 13px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:5px;transition:transform .08s,border-color .12s;min-height:74px;}
.card:active{transform:scale(.98);border-color:var(--accent);}
.card .c-top{display:flex;align-items:center;gap:8px;}
.card .c-tag{font-family:var(--mono);font-size:10px;font-weight:600;padding:3px 7px;border-radius:6px;background:var(--accent-soft);color:var(--accent);flex:none;}
.card .c-count{margin-left:auto;font-size:11px;color:var(--ink-faint);font-family:var(--mono);}
.card .c-ttl{font-size:15px;font-weight:600;letter-spacing:-.01em;line-height:1.25;}
.card .c-meta{font-size:11.5px;color:var(--ink-faint);font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card.dim{opacity:.55;}
.gram-dot{display:inline-block;font-family:var(--mono);font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px;flex:none;}
.gp{background:#e7eeff;color:#3056b5;} .gn{background:#fdeede;color:#b5651f;} .gx{background:var(--surface-2);color:var(--ink-dim);}
.kr-on{font-size:9.5px;font-family:var(--mono);color:var(--accent);}
.kr-off{font-size:9.5px;font-family:var(--mono);color:var(--ink-faint);}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:8px;}
.dash-card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:18px 16px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:7px;}
.dash-card:active{transform:scale(.98);}
.dash-ic{font-size:24px;}
.dash-card .dc-t{font-size:16px;font-weight:680;}
.dash-card .dc-n{font-size:12px;color:var(--ink-faint);font-family:var(--mono);}
.dash-section{font-size:11px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;color:var(--ink-faint);margin:22px 0 10px;}
.quick-row{display:flex;gap:8px;flex-wrap:wrap;}
.quick{background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:7px 14px;font-size:13px;color:var(--ink-dim);box-shadow:var(--shadow);}
.quick:active{border-color:var(--accent);color:var(--accent);}
#detail{position:fixed;inset:0;z-index:50;background:var(--bg);transform:translateX(100%);transition:transform .22s ease;overflow-y:auto;padding-bottom:34px;}
#detail.open{transform:translateX(0);}
.det-bar{position:sticky;top:0;background:rgba(245,247,250,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;padding:13px 16px;z-index:5;}
.det-back{background:none;border:none;color:var(--accent);font-size:15px;padding:0;font-weight:600;}
.det-bar .dt{font-size:15px;font-weight:650;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.det-body{padding:18px 16px;}
.det-title{font-size:23px;font-weight:760;letter-spacing:-.025em;line-height:1.18;}
.det-sub{font-size:12.5px;color:var(--ink-dim);font-family:var(--mono);margin-top:5px;}
.kv{margin-top:18px;}
.kv-h{font-size:11px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.07em;color:var(--accent);margin-bottom:7px;font-weight:600;}
.kv-v{font-size:14.5px;line-height:1.55;}
.kv-v.todo{color:var(--todo);font-style:italic;}
.kv-v.ok{color:var(--rec);font-weight:550;}
.dose-tbl{width:100%;border-collapse:collapse;font-size:14px;margin-top:2px;background:var(--surface);border:1px solid var(--line);border-radius:10px;overflow:hidden;}
.dose-tbl td{border-top:1px solid var(--line-soft);padding:9px 11px;vertical-align:top;}
.dose-tbl tr:first-child td{border-top:none;}
.dose-tbl td:first-child{font-family:var(--mono);color:var(--ink-dim);white-space:nowrap;width:34%;background:var(--surface-2);font-size:12.5px;}
.dose-tbl td.todo{color:var(--todo);font-style:italic;}
.pill-list{display:flex;flex-wrap:wrap;gap:7px;}
.pill{background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:5px 11px;font-size:12.5px;}
.pill.bad{border-color:var(--avoid-line);color:var(--avoid);background:var(--avoid-bg);}
.pill.click:active{border-color:var(--accent);}
.lnk{cursor:pointer;transition:all .12s;}
.pill.lnk:hover{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent);}
.drug-chip,.bug-chip{display:inline-block;background:var(--surface);border:1px solid var(--line);border-radius:7px;padding:2px 9px;font-size:12px;margin:2px 3px 2px 0;}
.drug-chip.lnk:hover,.bug-chip.lnk:hover{border-color:var(--accent);color:var(--accent);box-shadow:0 0 0 1px var(--accent);}
.bug-chip.lnk{font-style:italic;}
.reg-block{background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:9px 11px;margin:6px 0;}
.reg-label{font-weight:600;font-size:13.5px;margin-bottom:5px;}
.reg-dose{width:100%;border-collapse:collapse;}
.reg-dose td{padding:2px 0;vertical-align:top;font-size:13px;}
.rd-name{width:1%;white-space:nowrap;padding-right:10px!important;}
.rd-dose{color:var(--ink);}
.reg-dur{margin-top:5px;font-size:12.5px;color:var(--accent);font-weight:600;}
.fl-sev{font-size:12px;color:var(--muted);font-weight:600;margin:8px 0 2px;}
.fl-sev:first-child{margin-top:0;}
.ladder-step{margin-bottom:12px;}
.ls-step{font-weight:700;font-size:13px;margin-bottom:4px;}
.ls-note{color:var(--muted);font-size:12.5px;margin-top:3px;}
.ref-box{background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:14px 15px;margin-top:8px;}
.ref-note{font-size:12.5px;color:var(--muted);line-height:1.6;margin-bottom:11px;}
.ref-link{display:block;padding:8px 0;font-size:13.5px;color:var(--accent);text-decoration:none;border-top:1px solid var(--line);}
.ref-link:first-of-type{border-top:none;}
.ref-link:hover{text-decoration:underline;}
.pt-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:10px 0;padding:10px 12px;background:var(--surface);border:1px solid var(--line);border-radius:10px;}
.pt-bar-top{margin-bottom:14px;}
.pt-hint{font-size:12.5px;color:var(--muted);flex:1;}
.pt-tag{font-size:12px;color:var(--accent);font-weight:600;flex:1;}
.pt-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 13px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}
.pt-btn:hover{opacity:.9;}
.pt-note{background:#fff8e6;border:1px solid #f0d98c;border-radius:9px;padding:10px 12px;font-size:12.5px;color:#7a5c00;line-height:1.6;margin:10px 0;}
.pt-form{display:flex;flex-direction:column;gap:9px;margin:12px 0;}
.pt-row{display:flex;align-items:center;justify-content:space-between;gap:12px;font-size:14px;}
.pt-row span{color:var(--ink);}
.pt-row input[type=number],.pt-row select{width:130px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:14px;background:var(--bg);color:var(--ink);}
.pt-check{justify-content:flex-start;gap:9px;}
.pt-check input{width:18px;height:18px;}
.pt-calc{background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:11px 13px;font-size:13.5px;color:var(--ink);margin:6px 0 12px;}
.pt-actions{display:flex;gap:10px;}
.btn.ghost{background:transparent;color:var(--accent);border:1px solid var(--accent);}
.pt-result{border:1.5px solid var(--accent)!important;border-radius:11px;padding:4px 0;}
.pt-result .kv-h{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.pt-line{font-size:13.5px;padding:4px 0;line-height:1.55;}
.pt-line.ok{color:var(--ok,#1a7f4b);}
.pt-cap{color:var(--muted);font-size:12px;}
.pt-warn{margin-top:8px;padding:9px 11px;background:#fdecec;border:1px solid #f0b0b0;border-radius:8px;font-size:12.5px;color:#a12020;line-height:1.6;}
.appx-grid{display:flex;flex-direction:column;gap:11px;margin-top:6px;}
.appx-card{display:flex;align-items:center;gap:13px;padding:15px 16px;background:var(--surface);border:1px solid var(--line);border-radius:12px;cursor:pointer;}
.appx-card:hover{border-color:var(--accent);}
.appx-ic{font-size:26px;line-height:1;}
.appx-body{flex:1;}
.appx-t{font-weight:600;font-size:15px;margin-bottom:3px;}
.appx-d{font-size:12.5px;color:var(--muted);}
.appx-arrow{font-size:22px;color:var(--muted);}
.appx-tbl{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px;}
.appx-tbl th{text-align:left;padding:8px 10px;background:var(--surface);border:1px solid var(--line);font-size:12.5px;color:var(--muted);}
.appx-tbl td{padding:8px 10px;border:1px solid var(--line);vertical-align:top;line-height:1.5;}
.appx-tbl .appx-age{white-space:nowrap;font-weight:600;color:var(--accent);width:1%;}
.src-foot{margin-top:26px;padding-top:13px;border-top:1px solid var(--line);font-size:11px;color:var(--ink-faint);font-family:var(--mono);line-height:1.6;}
.sev-tabs{display:flex;gap:7px;margin:16px 0 4px;flex-wrap:wrap;}
.sev-tab{background:var(--surface);border:1px solid var(--line);color:var(--ink-dim);border-radius:9px;padding:8px 14px;font-size:13px;box-shadow:var(--shadow);}
.sev-tab.on{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600;}
.regimen{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:13px;margin-bottom:9px;box-shadow:var(--shadow);}
.regimen .rg-type{font-size:10px;font-family:var(--mono);color:var(--accent);text-transform:uppercase;letter-spacing:.06em;font-weight:600;}
.regimen .rg-label{font-size:15.5px;font-weight:600;margin-top:3px;}
.regimen .rg-drugs{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px;}
.rg-drug{background:var(--surface-2);border:1px solid var(--line);border-radius:8px;padding:5px 10px;font-size:12px;color:var(--ink-dim);}
.rg-drug b{color:var(--ink);font-weight:600;}
.ce-note{background:var(--consider-bg);border:1px solid var(--consider-line);color:#1559a8;font-size:12px;border-radius:10px;padding:10px 12px;margin-bottom:16px;line-height:1.5;}
.ce-label{font-size:11px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.07em;color:var(--ink-dim);margin:18px 0 7px;font-weight:600;}
.ce-label .num{display:inline-block;width:19px;height:19px;line-height:19px;text-align:center;background:var(--accent);color:#fff;border-radius:50%;font-size:11px;margin-right:7px;}
textarea.ce{width:100%;background:var(--surface);border:1px solid var(--line);border-radius:10px;color:var(--ink);font-size:14px;padding:11px;resize:vertical;line-height:1.5;box-shadow:var(--shadow);}
textarea.ce:focus{border-color:var(--accent);outline:none;box-shadow:0 0 0 3px var(--accent-soft);}
#ceHx{min-height:54px;} #cePaste{min-height:150px;font-family:var(--mono);font-size:12.5px;}
.btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:12px 16px;font-size:15px;font-weight:650;width:100%;margin-top:12px;box-shadow:var(--shadow);}
.btn:active{transform:scale(.99);}
.parse-info{font-size:12.5px;margin:12px 0;padding:11px 13px;border-radius:10px;}
.parse-ok{background:var(--rec-bg);border:1px solid var(--rec-line);color:#14713f;}
.parse-warn{background:var(--caut-bg);border:1px solid var(--caut-line);color:#8a6400;}
.result-card{border-radius:var(--r);padding:12px 14px;margin-bottom:8px;border:1px solid;}
.result-card .rc-h{display:flex;align-items:center;gap:8px;font-size:14.5px;font-weight:650;}
.result-card .rc-reason{font-size:12.5px;margin-top:4px;opacity:.9;}
.result-card .rc-dose{font-size:12px;margin-top:5px;font-family:var(--mono);color:var(--ink-dim);}
.rc-rec{background:var(--rec-bg);border-color:var(--rec-line);} .rc-rec .rc-h{color:var(--rec);}
.rc-caut{background:var(--caut-bg);border-color:var(--caut-line);} .rc-caut .rc-h{color:var(--caut);}
.rc-avoid{background:var(--avoid-bg);border-color:var(--avoid-line);} .rc-avoid .rc-h{color:var(--avoid);}
.rc-consider{background:var(--consider-bg);border-color:var(--consider-line);} .rc-consider .rc-h{color:var(--consider);}
.cat-divider{font-size:11px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.07em;color:var(--ink-faint);margin:16px 0 8px;}
.prompt-box{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:13px;margin-top:8px;box-shadow:var(--shadow);}
.prompt-box textarea{width:100%;min-height:130px;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;color:var(--ink-dim);font-family:var(--mono);font-size:11.5px;padding:11px;resize:vertical;line-height:1.55;}
.empty{color:var(--ink-faint);font-size:13px;text-align:center;padding:34px 14px;line-height:1.6;}
.todo-pill{display:inline-block;background:var(--surface-2);color:var(--todo);font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:5px;font-style:italic;}
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:35;background:rgba(255,255,255,.94);backdrop-filter:blur(10px);border-top:1px solid var(--line);display:flex;padding:7px 4px;padding-bottom:calc(7px + env(safe-area-inset-bottom));}
.tabbar button{flex:1;background:none;border:none;color:var(--ink-faint);font-size:10.5px;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;font-weight:600;}
.tabbar button .ic{font-size:19px;line-height:1;}
.tabbar button.on{color:var(--accent);}
</style>
</head>

</style>

<div class="appbar">
  <div class="brand"><b>감염 임상결정 지원</b><span>v1</span></div>
  <div class="search-wrap">
    <span class="search-ico">⌕</span>
    <input id="search" type="text" placeholder="검색: 약·균·증후군 (cap, tb, ptz, 대장균…)" autocomplete="off">

var ABX_MAP={},BUG_MAP={},REG_MAP={},CLASS_MAP={};
ABX.forEach(function(d){ABX_MAP[d.id]=d;});
BUG.forEach(function(b){BUG_MAP[b.id]=b;});
REGIMEN.forEach(function(r){REG_MAP[r.id]=r;});
ABX_CLASS.forEach(function(c){CLASS_MAP[c.id]=c;});

function classAncestry(id){var o=[],cur=id,g=0;while(cur&&g<20){o.push(cur);var c=CLASS_MAP[cur];cur=c?c.parent:null;g++;}return o;}
function classHasAncestor(id,anc){return classAncestry(id).indexOf(anc)!==-1;}

(function(){var e=[];
  ABX.forEach(function(d){if(!CLASS_MAP[d.classId])e.push("ABX "+d.id+" -> bad classId "+d.classId);});
  REGIMEN.forEach(function(r){r.drugs.forEach(function(x){if(!ABX_MAP[x])e.push("REG "+r.id+" -> bad drug "+x);});});
  function ck(l,c){(l||[]).forEach(function(x){if(x!=="TODO"&&!REG_MAP[x])e.push(c+" -> bad regimen "+x);});}
  BUG.forEach(function(b){if(b.firstLine){ck(b.firstLine.mild,"BUG "+b.id+".mild");ck(b.firstLine.severe,"BUG "+b.id+".severe");}
    (b.intrinsicResistance||[]).forEach(function(x){if(!ABX_MAP[x]&&!CLASS_MAP[x])e.push("BUG "+b.id+" iR -> bad "+x);});});
  SYN.forEach(function(s){Object.keys(s.empiric||{}).forEach(function(k){ck(s.empiric[k],"SYN "+s.id+"["+k+"]");});
    (s.likelyBugs||[]).forEach(function(x){if(!BUG_MAP[x])e.push("SYN "+s.id+" bug -> bad "+x);});});
  if(e.length){console.warn("[INTEGRITY] "+e.length+" issue(s):");e.forEach(function(x){console.warn("  - "+x);});}
  else console.log("[INTEGRITY] OK");
})();

function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];});}
function drugCatLabel(d){var m={antibacterial:"항생제",antifungal:"항진균",antiviral:"항바이러스",antiparasitic:"항기생충",antitoxin:"항독소"};return m[d.category]||"기타";}
function bugKingdomLabel(b){var k=b.taxonomy.kingdom;if(k==="fungus")return"진균";if(k==="parasite")return"기생충";if(b.taxonomy.family==="Mycobacteriaceae")return"항산균";if(b.taxonomy.family==="atypical/intracellular")return"세포내";return"세균";}
function gramTag(b){if(b.taxonomy.gram==="positive")return{t:"G(+)",c:"gp"};if(b.taxonomy.gram==="negative")return{t:"G(−)",c:"gn"};return{t:bugKingdomLabel(b),c:"gx"};}

var PT={age:null,sex:"M",weight:null,scr:null,crclManual:null,peds:false};
function ptHasRenal(){return ptCrCl()!=null;}
function ptCrCl(){
  if(PT.crclManual!=null && !isNaN(PT.crclManual))return PT.crclManual;
  if(PT.age!=null&&PT.weight!=null&&PT.scr!=null&&PT.scr>0){
    var c=((140-PT.age)*PT.weight)/(72*PT.scr);
    if(PT.sex==="F")c*=0.85;
    return Math.round(c);
  }
  return null;
}
function parseCrclRange(s){
  // returns {lo,hi} numeric bounds in mL/min; null if non-numeric (text)
  s=String(s);
  var m;
  if(/전\s*(구간|범위)/.test(s))return {lo:0,hi:Infinity};
  m=s.match(/^>\s*(\d+)/); if(m)return {lo:+m[1],hi:Infinity};
  m=s.match(/^<\s*(\d+)/); if(m)return {lo:0,hi:+m[1]};
  m=s.match(/(\d+)\s*[–\-~]\s*(\d+)/); if(m)return {lo:+m[1],hi:+m[2]};
  return null;
}
function matchRenalDose(d,crcl){
  if(!d.renal||!d.renal.length||crcl==null)return null;
  // pick the row whose numeric range contains crcl; prefer narrowest match
  var best=null,bestSpan=Infinity;
  for(var i=0;i<d.renal.length;i++){
    var r=d.renal[i],rg=parseCrclRange(r.crcl);
    if(!rg)continue;
    var inRange = (rg.lo<=crcl && crcl< (rg.hi===Infinity?Infinity:rg.hi+1)) || (rg.hi===Infinity&&crcl>=rg.lo);
    // for ranges like 30-50 treat hi inclusive
    if(/[–\-~]/.test(r.crcl)){inRange = (rg.lo<=crcl && crcl<=rg.hi);}
    if(inRange){var span=(rg.hi===Infinity?9999:rg.hi)-rg.lo; if(span<bestSpan){bestSpan=span;best=r;}}
  }
  return best;
}
function ptWeightDose(perKgStr){
  // extract first "N mg/kg" pattern → compute mg with patient weight
  if(PT.weight==null)return null;
  var m=String(perKgStr).match(/(\d+(?:\.\d+)?)(?:\s*[–\-~]\s*(\d+(?:\.\d+)?))?\s*mg\/kg/);
  if(!m)return null;
  var lo=parseFloat(m[1]),hi=m[2]?parseFloat(m[2]):null;
  var loMg=Math.round(lo*PT.weight), hiMg=hi?Math.round(hi*PT.weight):null;
  return hiMg?(loMg+"–"+hiMg+" mg"):(loMg+" mg");
}
function ptSummaryLine(){
  var parts=[];
  if(PT.age!=null)parts.push(PT.age+"세");
  parts.push(PT.sex==="F"?"여":"남");
  if(PT.weight!=null)parts.push(PT.weight+" kg");
  var c=ptCrCl();
  if(c!=null)parts.push("CrCl ~"+c+" mL/min"+(PT.crclManual!=null?"(직접)":"(C-G 추정)"));
  if(PT.peds)parts.push("소아");
  return parts.join(" · ");
}

function dosingPanelHTML(d){
  // returns the per-drug computed dosing block based on PT
  if(!ptIsSet())return '';
  var h='<div class="kv pt-result"><div class="kv-h">환자 맞춤 용량 <span class="pt-tag">'+esc(ptSummaryLine())+'</span></div><div class="kv-v">';
  var crcl=ptCrCl(), any=false;
  // renal
  if(d.renal&&d.renal.length){
    var hasNumeric=d.renal.some(function(r){return parseCrclRange(r.crcl);});
    if(crcl!=null&&hasNumeric){
      var row=matchRenalDose(d,crcl);
      if(row){h+='<div class="pt-line"><b>신기능 보정 (CrCl ~'+crcl+'):</b> '+esc(row.dose)+'</div>';any=true;}
      else h+='<div class="pt-line">신기능 구간 자동매칭 실패 — 표준용량·신기능 표 직접 확인</div>';
    }else if(d.renal.length===1&&/전\s*(구간|범위)/.test(d.renal[0].crcl)){
      h+='<div class="pt-line">신기능 보정 불필요 (전 구간 동일)</div>';any=true;
    }
  } else {
    h+='<div class="pt-line ok">신기능 보정 불필요</div>';any=true;
  }
  // pediatric weight-based
  if(PT.peds&&d.pediatricDose&&d.pediatricDose.perKg){
    var pmg=ptWeightDose(d.pediatricDose.perKg);
    if(pmg){h+='<div class="pt-line"><b>소아 ('+esc(d.pediatricDose.perKg)+'):</b> ≈ '+pmg+' / 회 '+esc(d.pediatricDose.interval||'')+' <span class="pt-cap">(최대 '+esc(d.pediatricDose.maxDose||'—')+')</span></div>';any=true;}
    else h+='<div class="pt-line">소아 용량: '+esc(d.pediatricDose.perKg)+' '+esc(d.pediatricDose.interval||'')+' — 체중기반 자동계산 불가, 직접 환산</div>';
  }
  // adult weight-based (vancomycin/aminoglycoside style in usualDose)
  if(!PT.peds&&PT.weight!=null&&/mg\/kg/.test(d.usualDose||'')){

    if(amg){h+='<div class="pt-line"><b>체중기반 ('+PT.weight+' kg):</b> ≈ '+amg+' / 회 (usualDose 기준)</div>';any=true;}
  }
  // safety guards
  var warn=[];
  if(/vancomycin|aminoglycoside|gentamicin|amikacin|tobramycin/i.test(d.name)||d.classId==="GLYCOPEPTIDE"||d.classId==="AMINOGLYCOSIDE")
    warn.push("★TDM(혈중농도) 필수 — 위 값은 시작용량 추정일 뿐, 목표 농도/AUC로 조정");
  if(crcl!=null&&crcl<30)warn.push("★신기능 저하(CrCl<30) — 용량·간격 신중, 신독성 약 회피·대체 고려");
  if(PT.peds)warn.push("★소아 — 반드시 최대용량(cap) 확인, 신생아·미숙아는 별도 기준");
  if(warn.length)h+='<div class="pt-warn">'+warn.map(esc).join('<br>')+'</div>';
  if(!any)h+='<div class="pt-line">이 약은 입력값 기반 자동 보정 항목이 없습니다 — 표준용량 참고</div>';
  h+='</div></div>';
  return h;

function normSIR(tok){
  tok=tok.trim().toUpperCase();
  if(/RESIST|내성/.test(tok)||/^R$/.test(tok))return"R";
  if(/SUSCEPT|감수성/.test(tok)||/^S$/.test(tok))return"S";
  if(/INTERMED|중간/.test(tok)||/^I$/.test(tok))return"I";
  return null;
}
function normName(s){return s.trim().toLowerCase().replace(/[\s\-\/().]+/g,'');}
function findDrugByName(name){
  var n=normName(name); if(!n)return null;
  // exact match on name/abbr/alias wins
  for(var i=0;i<ABX.length;i++){var d=ABX[i];var cands=[d.name,d.abbr].concat(d.aliases||[]);
    for(var j=0;j<cands.length;j++){ if(normName(cands[j])===n)return d.id; }}
  // combination markers: if input names an inhibitor partner, force the combo drug
  if(/clav|tazo|tazobactam|sulbactam|avibactam|vaborbactam/.test(n)){
    if(/amoxi|amox|augmentin/.test(n))return "AMC";
    if(/piper|pip|tazocin/.test(n))return "PTZ";
  }
  // partial-contains: choose the LONGEST candidate that matches (most specific)
  var best=null,bestLen=0;
  for(var i2=0;i2<ABX.length;i2++){var d2=ABX[i2];var cands2=[d2.name].concat(d2.aliases||[]);
    for(var j2=0;j2<cands2.length;j2++){var c=normName(cands2[j2]);
      if(c.length>3&&(c.indexOf(n)!==-1||n.indexOf(c)!==-1)){ if(c.length>bestLen){bestLen=c.length;best=d2.id;} }}}
  return best;
}
function findBugByText(text){
  var low=text.toLowerCase();
  // pass 1: full name / alias substring match — choose LONGEST match (most specific)
  var p1=null,p1len=0;
  for(var i=0;i<BUG.length;i++){var b=BUG[i];var cands=[b.name.split(' (')[0]].concat(b.aliases||[]);
    for(var j=0;j<cands.length;j++){var c=cands[j].toLowerCase();if(c.length>3&&low.indexOf(c)!==-1&&c.length>p1len){p1len=c.length;p1=b.id;}}}
  if(p1)return p1;
  // pass 2: short distinctive aliases (≤3 chars: tb, afb, mac, gbs, gc…) — exact token w/ word boundary, 오매칭 방지
  var tokens=low.split(/[^a-z0-9가-힣]+/);
  for(var i3=0;i3<BUG.length;i3++){var b3=BUG[i3];var al=b3.aliases||[];
    for(var j3=0;j3<al.length;j3++){var a=al[j3].toLowerCase();
      if(a.length<=3 && a.length>=2 && tokens.indexOf(a)!==-1)return b3.id;}}
  // pass 3: distinctive species epithet (e.g. "agalactiae", "pyogenes") — handles "S. agalactiae" style
  for(var i2=0;i2<BUG.length;i2++){var b2=BUG[i2];
    var words=b2.name.split(' (')[0].toLowerCase().split(/\s+/);
    for(var w=0;w<words.length;w++){var word=words[w];
      if(word.length>=6 && ["strepto","staphylo","entero","escheri","klebsie","pseudom","myco"].indexOf(word.slice(0,7))===-1 && low.indexOf(word)!==-1)return b2.id;}}
  return null;
}
function ceAnalyze(){
  var hx=(document.getElementById('ceHx')||{}).value||ceHxVal;
  var paste=(document.getElementById('cePaste')||{}).value||cePasteVal;
  ceHxVal=hx; cePasteVal=paste;
  var lines=paste.split(/\r?\n/);
  var bugId=findBugByText(paste+" "+hx);
  var sir={}, unrec=[];
  lines.forEach(function(ln){
    if(!ln.trim())return;
    var m=ln.match(/^(.*?)[\s:]+([A-Za-z가-힣<>=≤≥0-9.\/]+)\s*$/);
    if(!m)return;
    var namePart=m[1], resultTok=m[2];
    var sirVal=normSIR(resultTok);
    if(!sirVal){ if(/^[≤<]/.test(resultTok))sirVal="S"; else if(/^[>≥]/.test(resultTok))sirVal="R"; }
    if(!sirVal)return;
    var did=findDrugByName(namePart);
    if(did)sir[did]=sirVal;
    else unrec.push(namePart.trim()+" = "+resultTok);
  });
  var mechs={};
  var ceph3R=ABX.filter(function(d){return classHasAncestor(d.classId,"CEPH_3");}).some(function(d){return sir[d.id]==="R";});
  var carbaS=ABX.filter(function(d){return classHasAncestor(d.classId,"CARBAPENEM");}).some(function(d){return sir[d.id]==="S";});
  if(ceph3R&&carbaS)mechs["ESBL"]=true;
  var site=detectSite(hx);
  ceParsed={bugId:bugId, sir:sir, unrec:unrec, mechs:mechs, site:site};
  renderCult();
  setTimeout(function(){var o=document.getElementById('ceOut');if(o)o.scrollIntoView({behavior:'smooth',block:'start'});},60);
}
// lightweight site hint from free-text Hx (실패해도 무방 — 보조 신호)
function detectSite(hx){
  var t=(hx||"").toLowerCase();
  if(/pneumonia|폐렴|호흡기|respiratory|sputum|객담|lung|폐|기관지|bronch|hap|vap|cap\b/.test(t))return"respiratory";
  if(/urine|urinary|요로|소변|uti|방광|cystitis|신우|pyelo/.test(t))return"urinary";
  if(/blood|혈액|균혈증|bacteremia|sepsis|패혈|culture\s*blood/.test(t))return"blood";
  return null;
}
function ceManualBug(id){ if(!ceParsed)return; ceParsed.bugId=id; renderCult(); }

function classifyDrug(b,sir,mechs,d,site){
  var ir=b.intrinsicResistance||[];
  // identity-defining mechanism: MRSA bug is definitionally MRSA (merge into active flags).
  // VRE/ESBL stay runtime-only (they are *possible* traits, not identity) to avoid over-flagging.
  var M={}; for(var k in mechs){M[k]=mechs[k];}
  if((b.mechanisms||[]).indexOf("MRSA")!==-1 && /MRSA/i.test(b.name))M["MRSA"]=true;
  mechs=M;
  function inFirst(){var f=false;if(b.firstLine)["mild","severe"].forEach(function(k){(b.firstLine[k]||[]).forEach(function(rid){var r=REG_MAP[rid];if(r&&r.drugs.indexOf(d.id)!==-1)f=true;});});return f;}
  var s=sir[d.id];
  // 0) SITE pharmacologic constraints — 검사지·감수성 무관 (약물이 그 부위에서 작동 불가)
  if(site==="respiratory"&&d.id==="DAP")return{cat:"avoid",reason:"폐 surfactant가 daptomycin 불활성화 — 폐렴엔 사용 금지(검사지 무관)"};
  if(site&&site!=="urinary"&&(d.id==="NIT"||d.id==="FOS"))return{cat:"avoid",reason:(d.abbr+" — 요로(방광) 외 부위는 조직농도 부족, 비뇨기 한정")};
  if((site==="blood"||site==="urinary")&&d.id==="TGC")return{cat:"caution",reason:"tigecycline — 혈중·요중 농도 낮음(균혈증·UTI 부적합 경향)"};
  // 1) AVOID — intrinsic resistance (drug id or class) — 검사지 무관 (P5)
  // 예외: 항MRSA 약(ceftaroline 등)은 MRSA의 BETALACTAM 고유내성 룰에서 제외
  var mrsaBug=(b.mechanisms||[]).indexOf("MRSA")!==-1 && /MRSA/i.test(b.name);
  var betalactamException=(d.antiMRSA&&mrsaBug);
  if(ir.indexOf(d.id)!==-1)return{cat:"avoid",reason:"이 균의 고유 내성 (검사지 무관)"};
  for(var i=0;i<ir.length;i++){
    if(!CLASS_MAP[ir[i]]||!classHasAncestor(d.classId,ir[i]))continue;
    // 항MRSA β-lactam(ceftaroline)은 MRSA의 BETALACTAM 계열 회피에서 면제
    if(betalactamException&&(ir[i]==="BETALACTAM"||classHasAncestor(ir[i],"BETALACTAM")))continue;
    return{cat:"avoid",reason:"고유 내성 계열 ("+CLASS_MAP[ir[i]].name+")"};
  }
  if(b.taxonomy.family==="Enterococcaceae"&&classHasAncestor(d.classId,"CEPH"))return{cat:"avoid",reason:"장구균은 모든 cephalosporin에 고유 내성"};
  if(b.taxonomy.metabolism==="anaerobe"&&classHasAncestor(d.classId,"AMINOGLY"))return{cat:"avoid",reason:"혐기성균 — aminoglycoside 산소의존 흡수 불가(검사지 무관)"};
  // 2) explicit R always avoid
  if(s==="R")return{cat:"avoid",reason:"감수성 검사 내성(R)"};
  // 3) mechanism rules — special-case cefepime+ESBL BEFORE blanket ceph-avoid
  if(mechs["ESBL"]&&d.id==="FEP")return{cat:"caution",reason:"ESBL+cefepime — inoculum effect 논란, 중증엔 회피"};
  if(mechs["MRSA"]&&classHasAncestor(d.classId,"BETALACTAM")&&!d.antiMRSA)return{cat:"avoid",reason:"MRSA — 표준 β-lactam 무효"};
  if(mechs["ESBL"]&&(classHasAncestor(d.classId,"CEPH")||d.id==="AMX"||d.id==="AMC"))return{cat:"avoid",reason:"ESBL — cephalosporin 신뢰 불가"};
  if(mechs["CRE"]&&classHasAncestor(d.classId,"CARBAPENEM"))return{cat:"avoid",reason:"CRE — carbapenem 무효"};
  if(mechs["VRE"]&&d.classId==="GLYCOPEP")return{cat:"avoid",reason:"VRE — vancomycin 무효"};
  // 4) intermediate
  if(s==="I")return{cat:"caution",reason:"중간(I) — 고용량/부위 고려"};
  // 5) susceptible
  if(s==="S")return{cat:"rec",reason:inFirst()?"감수성(S) + 가이드라인 1차":"감수성(S)"};
  // 6) no S/I/R entered: mechanism/guideline-preferred drug → rec; else guideline candidate → consider
  var mechPreferred=(mechs["MRSA"]&&(d.classId==="GLYCOPEP"||d.classId==="OXAZOLID")) ||
                    (mechs["VRE"]&&d.classId==="OXAZOLID");
  if(mechPreferred&&inFirst())return{cat:"rec",reason:"내성기전 우선 약제 (가이드라인 1차)"};
  if(inFirst()){
    // bug where every other agent is intrinsically resistant and this is the designated firstLine → rec
    var soleAgent=isSoleFirstLine(b,d);
    if(soleAgent)return{cat:"rec",reason:"이 균의 1차 선택약 (대안 제한적)"};
    return{cat:"consider",reason:"가이드라인 후보 (감수성 미입력)"};
  }
  return null;
}
// true when d is the bug's firstLine.severe AND that severe list resolves to only this drug (e.g. MRSA→VAN, Steno→TMP-SMX)
function isSoleFirstLine(b,d){
  if(!b.firstLine||!b.firstLine.severe)return false;
  var sev=b.firstLine.severe.filter(function(x){return x!=="TODO";});
  if(sev.length!==1)return false;
  var r=REG_MAP[sev[0]];
  return !!(r&&r.drugs.length===1&&r.drugs[0]===d.id);
}
function renderCeOutput(){
  var h='';
  if(!ceParsed.bugId){
    h+='<div class="parse-info parse-warn">균을 자동 인식하지 못했습니다. 직접 선택하세요.</div>';
    h+='<select onchange="ceManualBug(this.value)" style="width:100%;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:11px;font-size:15px;color:var(--ink)"><option value="">— 균 선택 —</option>'+BUG.map(function(b){return '<option value="'+b.id+'">'+esc(b.name)+'</option>';}).join('')+'</select>';
    return h;
  }
  var b=BUG_MAP[ceParsed.bugId];
  var sirCount=Object.keys(ceParsed.sir).length;
  var siteLabel={respiratory:"호흡기",urinary:"요로",blood:"혈류"}[ceParsed.site];
  h+='<div class="parse-info parse-ok">인식: <b>'+esc(b.name)+'</b> · 감수성 '+sirCount+'건'+(siteLabel?' · 부위: '+siteLabel:'')+(Object.keys(ceParsed.mechs).length?' · 자동추정: '+Object.keys(ceParsed.mechs).join(', '):'')+'</div>';
  if(ceParsed.unrec.length)h+='<div class="parse-info parse-warn">미인식 '+ceParsed.unrec.length+'건 (무시 안 됨): '+esc(ceParsed.unrec.join(' / '))+'</div>';
  var buckets={rec:[],caut:[],avoid:[],consider:[]};
  ABX.filter(function(d){return d.category==="antibacterial";}).forEach(function(d){
    var r=classifyDrug(b,ceParsed.sir,ceParsed.mechs,d,ceParsed.site); if(!r)return;
    var key=r.cat==="caution"?"caut":r.cat; buckets[key].push({d:d,reason:r.reason});
  });
  function card(it,cls,ic){var dose=it.d.usualDose?'<div class="rc-dose">'+esc(it.d.usualDose)+'</div>':'';return '<div class="result-card rc-'+cls+'" onclick="openDrug(\''+it.d.id+'\')"><div class="rc-h">'+ic+' '+esc(it.d.name)+' <span style="font-weight:400;color:var(--ink-faint);font-size:12px">'+esc(it.d.abbr)+'</span></div><div class="rc-reason">'+esc(it.reason)+'</div>'+dose+'</div>';}
  if(buckets.rec.length){h+='<div class="cat-divider">✓ 권장</div>'+buckets.rec.map(function(x){return card(x,'rec','✓');}).join('');}
  if(buckets.caut.length){h+='<div class="cat-divider">⚠ 주의</div>'+buckets.caut.map(function(x){return card(x,'caut','⚠');}).join('');}
  if(buckets.consider.length){h+='<div class="cat-divider">💡 고려</div>'+buckets.consider.map(function(x){return card(x,'consider','💡');}).join('');}
  if(buckets.avoid.length){h+='<div class="cat-divider">✕ 회피</div>'+buckets.avoid.map(function(x){return card(x,'avoid','✕');}).join('');}
  if(!buckets.rec.length&&!buckets.caut.length&&!buckets.consider.length&&!buckets.avoid.length)h+='<div class="empty">판정할 항목이 없습니다. 감수성 입력을 확인하세요.</div>';
  h+='<div class="ce-label" style="margin-top:22px">LLM 검토용 프롬프트</div><div class="prompt-box"><textarea id="cePrompt" readonly>'+esc(buildPrompt(b))+'</textarea><button class="btn" onclick="copyPrompt(event)">프롬프트 복사</button></div>';
  return h;
}
function buildPrompt(b){
  var L=[];
  L.push("당신은 감염내과 전문의입니다. 아래 배양 결과를 검토하고 항생제 선택을 도와주세요.");
  L.push("");
  if(ceHxVal.trim())L.push("[Hx] "+ceHxVal.trim());
  L.push("[동정균] "+b.name+" ("+b.taxonomy.kingdom+(b.taxonomy.gram!=="n/a"?", "+b.taxonomy.gram:"")+(b.taxonomy.family?", "+b.taxonomy.family:"")+")");
  var mechs=Object.keys(ceParsed.mechs);
  if(mechs.length)L.push("[추정 내성기전] "+mechs.join(", "));
  var sirE=Object.keys(ceParsed.sir).map(function(k){return (ABX_MAP[k]?ABX_MAP[k].name:k)+"="+ceParsed.sir[k];});
  if(sirE.length)L.push("[감수성] "+sirE.join(", "));
  if(ceParsed.unrec.length)L.push("[미인식 항목] "+ceParsed.unrec.join(", "));
  L.push("");
  L.push("[앱 룰베이스 1차 판정]");
  var buckets={rec:[],caut:[],avoid:[],consider:[]};
  ABX.filter(function(d){return d.category==="antibacterial";}).forEach(function(d){var r=classifyDrug(b,ceParsed.sir,ceParsed.mechs,d,ceParsed.site);if(!r)return;var k=r.cat==="caution"?"caut":r.cat;buckets[k].push(ABX_MAP[d.id].abbr+"("+r.reason+")");});
  if(buckets.rec.length)L.push(" 권장: "+buckets.rec.join(", "));
  if(buckets.caut.length)L.push(" 주의: "+buckets.caut.join(", "));
  if(buckets.consider.length)L.push(" 고려: "+buckets.consider.join(", "));
  if(buckets.avoid.length)L.push(" 회피: "+buckets.avoid.join(", "));
  L.push("");
  L.push("위를 검토하여: (1) 누락된 고려 약물, (2) 감염 부위·중증도별 권장 용량과 투여기간, (3) 신기능 보정과 주의점을 알려주세요. 한국 임상 상황(국내 유통·내성 역학)을 고려해주세요.");
  return L.join("\n");
}
function copyPrompt(ev){var t=document.getElementById('cePrompt');t.select();try{document.execCommand('copy');}catch(e){}if(navigator.clipboard)navigator.clipboard.writeText(t.value).catch(function(){});var b=ev.target;var o=b.textContent;b.textContent='복사됨 ✓';setTimeout(function(){b.textContent=o;},1400);}
function goCultureWith(id){ceParsed={bugId:id,sir:{},unrec:[],mechs:{}};closeDetail();switchTab('cult');renderCult();}

/* ---------- SEARCH ---------- */
function doSearch(q){
  q=q.trim().toLowerCase();
  var box=document.getElementById('searchResults');
  if(!q){box.style.display='none';document.getElementById('searchClear').style.display='none';return;}
  document.getElementById('searchClear').style.display='block';
  function match(name,aliases){if(name.toLowerCase().indexOf(q)!==-1)return true;return (aliases||[]).some(function(a){return a.toLowerCase().indexOf(q)!==-1;});}
  var drugs=ABX.filter(function(d){return match(d.name+' '+d.abbr,d.aliases);}).slice(0,6);
  var bugs=BUG.filter(function(b){return match(b.name,b.aliases);}).slice(0,6);
  var syns=SYN.filter(function(s){return match(s.name+' '+s.id,[]);}).slice(0,6);
  var h='';
  if(drugs.length)h+='<div class="sr-group-label">약제</div>'+drugs.map(function(d){return '<div class="sr-item" onclick="searchGo(\'abx\',\''+d.id+'\')"><span class="c-tag">'+esc(d.abbr)+'</span><span class="nm">'+esc(d.name)+'</span><span class="sub">약</span></div>';}).join('');
  if(bugs.length)h+='<div class="sr-group-label">병원체</div>'+bugs.map(function(b){return '<div class="sr-item" onclick="searchGo(\'bug\',\''+b.id+'\')"><span class="nm">'+esc(b.name)+'</span><span class="sub">균</span></div>';}).join('');
  if(syns.length)h+='<div class="sr-group-label">증후군</div>'+syns.map(function(s){return '<div class="sr-item" onclick="searchGo(\'syn\',\''+s.id+'\')"><span class="nm">'+esc(s.name)+'</span><span class="sub">증후군</span></div>';}).join('');
  box.innerHTML=h||'<div class="sr-empty">결과 없음 — v1 골격엔 핵심 항목만 있습니다.</div>';
  box.style.display='block';
}
function searchGo(type,id){
  document.getElementById('searchResults').style.display='none';
  document.getElementById('search').value=''; doSearch('');
  document.getElementById('search').blur();
  if(type==='abx'){switchTab('abx');openDrug(id);}
  if(type==='bug'){switchTab('bug');openBug(id);}
  if(type==='syn'){switchTab('syn');openSyn(id);}
}

/* ---------- SHELL ---------- */
function switchTab(tab){
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active');});
  document.getElementById('view-'+tab).classList.add('active');
  document.querySelectorAll('.tabbar button').forEach(function(b){b.classList.toggle('on',b.dataset.tab===tab);});
  if(tab==='cult')renderCult();
  if(tab==='appx')renderAppx();
  window.scrollTo(0,0);
}
function showDetail(html){var d=document.getElementById('detail');d.innerHTML=html;d.classList.add('open');d.scrollTop=0;}
function closeDetail(){document.getElementById('detail').classList.remove('open');}
function jumpToDrug(id){if(!ABX_MAP[id])return;switchTab('abx');openDrug(id);}
function jumpToBug(id){if(!BUG_MAP[id])return;switchTab('bug');openBug(id);}

if(typeof document!=="undefined"&&document.querySelectorAll){
  document.querySelectorAll('.tabbar button').forEach(function(b){b.onclick=function(){switchTab(b.dataset.tab);};});
  document.getElementById('search').addEventListener('input',function(e){doSearch(e.target.value);});
  document.getElementById('searchClear').onclick=function(){document.getElementById('search').value='';doSearch('');};
  document.getElementById('disBtn').onclick=function(){document.getElementById('disclaimer').style.display='none';};
  document.addEventListener('click',function(e){var sw=document.querySelector('.search-wrap');if(sw&&!sw.contains(e.target))document.getElementById('searchResults').style.display='none';});
  renderHome(); renderAbx(); renderBug(); renderSyn(); renderCult();
}
