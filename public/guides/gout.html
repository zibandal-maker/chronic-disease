<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>통풍 처방 가이드 · Gout Advisor</title>
<style>
:root{
  --bg:#eef2f5; --panel:#ffffff; --panel2:#f4f7f9; --line:#d8e0e6;
  --ink:#16212c; --ink-dim:#48586a; --ink-faint:#7e8e9c;
  --clin:#2566a8; --clin-bg:#e6f0fa; --clin-line:#bcd6ef;
  --pay:#a9690f; --pay-bg:#fbf0d9; --pay-line:#ecd3a3;
  --edu:#15806a; --edu-bg:#d9f0ea; --edu-line:#a8ddcf;
  --ok:#1c9150; --ok-bg:#dff3e6;
  --warn:#a9690f; --warn-bg:#fbf0d9;
  --block:#c0362f; --block-bg:#fbe6e4;
  --alert:#cc5a26; --alert-bg:#fceadd;
  --urate:#5b3fa6; --urate-bg:#ece6f8;
  --radius:14px; --radius-sm:9px;
  --shadow:0 1px 2px rgba(20,33,44,.05),0 2px 8px rgba(20,33,44,.04);
  --shadow-lg:0 6px 24px rgba(20,33,44,.13);
  --mono:'SF Mono',ui-monospace,'Menlo','Consolas',monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:var(--bg);color:var(--ink);font-family:var(--sans);
  font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased;
  padding-bottom:24px;
}
h1,h2,h3,h4{margin:0;font-weight:700;letter-spacing:-.01em}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.mono{font-family:var(--mono)}

/* ===== Header ===== */
.app-header{
  position:sticky;top:0;z-index:40;background:rgba(255,255,255,.92);
  backdrop-filter:saturate(180%) blur(12px);border-bottom:1px solid var(--line);
}
.app-header-inner{max-width:760px;margin:0 auto;padding:11px 16px;display:flex;align-items:center;gap:11px}
.crystal{flex-shrink:0;width:30px;height:30px}
.app-title{font-size:16px;font-weight:750;letter-spacing:-.02em}
.app-sub{font-size:11px;color:var(--ink-faint);font-weight:500;margin-top:1px;letter-spacing:.01em}
.app-flag{margin-left:auto;font-size:10.5px;color:var(--ink-faint);text-align:right;line-height:1.35;font-weight:600}

/* ===== Tabs (상단) ===== */
.tabbar{
  max-width:760px;margin:0 auto;display:flex;
  padding:4px 12px 9px;gap:6px;
}
.tabbtn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:9px 4px;border-radius:11px;color:var(--ink-faint);transition:.15s;background:var(--panel2);border:1px solid var(--line)}
.tabbtn .ic{font-size:15px;line-height:1}
.tabbtn .lb{font-size:12.5px;font-weight:650}
.tabbtn.on{color:#fff;background:var(--clin);border-color:var(--clin)}

.wrap{max-width:760px;margin:0 auto;padding:16px}
.view{display:none;animation:fade .22s ease}
.view.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

/* ===== Search ===== */
.searchbar{position:relative;margin-bottom:14px}
.searchbar input{
  width:100%;padding:12px 14px 12px 40px;border:1.5px solid var(--line);border-radius:12px;
  font-size:15px;background:var(--panel);color:var(--ink);transition:.15s;font-family:inherit;
}
.searchbar input:focus{outline:none;border-color:var(--clin);box-shadow:0 0 0 3px var(--clin-bg)}
.searchbar .sic{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--ink-faint);font-size:15px}

/* ===== Cards / topics ===== */
.banner{
  background:linear-gradient(135deg,#2566a8,#1d5391);color:#fff;border-radius:var(--radius);
  padding:15px 17px;margin-bottom:14px;box-shadow:var(--shadow);position:relative;overflow:hidden;
}
.banner::after{content:"";position:absolute;right:-22px;top:-22px;width:120px;height:120px;
  background:radial-gradient(circle,rgba(255,255,255,.14),transparent 70%)}
.banner h3{font-size:15.5px;margin-bottom:3px;position:relative}
.banner p{font-size:12.5px;opacity:.92;margin:0;position:relative;line-height:1.5}
.banner .go{margin-top:10px;display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.18);
  border:1px solid rgba(255,255,255,.3);padding:7px 13px;border-radius:9px;font-size:12.5px;font-weight:650;position:relative}

.sec-label{font-size:11px;font-weight:700;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.07em;margin:18px 2px 9px}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.topic{
  background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:13px 13px 12px;text-align:left;box-shadow:var(--shadow);transition:.16s;position:relative;overflow:hidden;
}
.topic:active{transform:scale(.975)}
.topic .tnum{font-family:var(--mono);font-size:10px;color:var(--ink-faint);font-weight:600}
.topic .tcat{display:inline-block;font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:20px;margin-bottom:7px;letter-spacing:.02em}
.tcat.clin{background:var(--clin-bg);color:var(--clin)}
.tcat.pay{background:var(--pay-bg);color:var(--pay)}
.tcat.edu{background:var(--edu-bg);color:var(--edu)}
.topic h4{font-size:13.5px;line-height:1.3;margin-bottom:4px}
.topic p{font-size:11px;color:var(--ink-dim);margin:0;line-height:1.45}
.topic .edge{position:absolute;left:0;top:0;bottom:0;width:3px}
.edge.clin{background:var(--clin)} .edge.pay{background:var(--pay)} .edge.edu{background:var(--edu)}

.src-banner{margin-top:18px;padding:12px 14px;background:var(--panel2);border:1px solid var(--line);
  border-radius:11px;font-size:11px;color:var(--ink-faint);line-height:1.6}
.src-banner b{color:var(--ink-dim)}
.src-banner a{color:var(--clin);text-decoration:none}

/* ===== Detail sheet ===== */
.sheet-back{position:fixed;inset:0;background:rgba(16,24,33,.46);z-index:60;opacity:0;pointer-events:none;transition:.2s;backdrop-filter:blur(2px)}
.sheet-back.on{opacity:1;pointer-events:auto}
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:61;background:var(--bg);
  border-radius:20px 20px 0 0;max-height:92vh;overflow-y:auto;transform:translateY(100%);
  transition:transform .28s cubic-bezier(.32,.72,0,1);box-shadow:0 -8px 40px rgba(0,0,0,.2);
  -webkit-overflow-scrolling:touch;
}
.sheet.on{transform:translateY(0)}
.sheet-grip{position:sticky;top:0;background:var(--bg);padding:9px 0 5px;display:flex;justify-content:center;z-index:5}
.sheet-grip::before{content:"";width:38px;height:4.5px;border-radius:3px;background:var(--line)}
.sheet-head{position:sticky;top:0;background:rgba(238,242,245,.94);backdrop-filter:blur(10px);
  padding:3px 18px 12px;border-bottom:1px solid var(--line);z-index:4}
.sheet-head h2{font-size:18px;letter-spacing:-.02em;padding-right:40px}
.sheet-head .shsub{font-size:12px;color:var(--ink-dim);margin-top:3px}
.sheet-x{position:absolute;right:14px;top:2px;width:30px;height:30px;border-radius:50%;background:var(--panel2);
  display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--ink-dim);border:1px solid var(--line)}
.sheet-body{max-width:760px;margin:0 auto;padding:16px 18px 40px}

/* ===== Generic content blocks ===== */
.kp{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin-bottom:10px;box-shadow:var(--shadow)}
.kp h4{font-size:13.5px;margin-bottom:6px;display:flex;align-items:center;gap:7px}
.kp p{margin:5px 0;font-size:13px;color:var(--ink-dim);line-height:1.6}
.kp ul{margin:6px 0;padding-left:18px}
.kp li{font-size:12.5px;color:var(--ink-dim);line-height:1.6;margin:3px 0}
.kp .lead{color:var(--ink);font-weight:600;font-size:13.5px}
.pill{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;vertical-align:middle}
.pill.ok{background:var(--ok-bg);color:var(--ok)}
.pill.warn{background:var(--warn-bg);color:var(--warn)}
.pill.block{background:var(--block-bg);color:var(--block)}
.pill.alert{background:var(--alert-bg);color:var(--alert)}
.pill.info{background:var(--clin-bg);color:var(--clin)}
.pill.urate{background:var(--urate-bg);color:var(--urate)}

.note{font-size:11.5px;color:var(--ink-faint);font-style:normal;line-height:1.55;margin-top:6px;
  padding:8px 11px;background:var(--panel2);border-radius:9px;border-left:3px solid var(--line)}
.note.warn{border-left-color:var(--warn);background:var(--warn-bg);color:#7a4d0a}
.note.block{border-left-color:var(--block);background:var(--block-bg);color:#8f2820}
.note.clin{border-left-color:var(--clin);background:var(--clin-bg);color:#1c4f80}

.tag-row{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}

/* tables */
.tbl{width:100%;border-collapse:collapse;font-size:12px;margin:8px 0}
.tbl th{background:var(--panel2);text-align:left;padding:7px 9px;font-weight:700;color:var(--ink-dim);font-size:11px;border-bottom:1.5px solid var(--line)}
.tbl td{padding:7px 9px;border-bottom:1px solid var(--line);color:var(--ink-dim);vertical-align:top}
.tbl tr:last-child td{border-bottom:none}
.tbl .em{color:var(--ink);font-weight:650}

/* expandable */
.exp{border:1px solid var(--line);border-radius:11px;margin-bottom:9px;overflow:hidden;background:var(--panel)}
.exp-h{display:flex;align-items:center;gap:9px;padding:12px 14px;cursor:pointer;user-select:none}
.exp-h .chev{margin-left:auto;color:var(--ink-faint);transition:.2s;font-size:13px}
.exp.open .exp-h .chev{transform:rotate(90deg)}
.exp-h h4{font-size:13.5px}
.exp-c{display:none;padding:0 14px 13px;border-top:1px solid var(--line);margin-top:-1px;padding-top:12px}
.exp.open .exp-c{display:block}
.exp-mini{font-size:11px;color:var(--ink-faint);font-weight:500}

/* drug status badges */
.dstat{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:8px}
.dstat.preferred{background:var(--ok-bg);color:var(--ok)}
.dstat.usable{background:var(--clin-bg);color:var(--clin)}
.dstat.caution{background:var(--warn-bg);color:var(--warn)}
.dstat.avoid{background:var(--alert-bg);color:var(--alert)}
.dstat.contra{background:var(--block-bg);color:var(--block)}
.dstat.dose{background:var(--warn-bg);color:var(--warn)}
.dstat.ok{background:var(--ok-bg);color:var(--ok)}
.dstat.special{background:var(--urate-bg);color:var(--urate)}

/* info modal (evidence) */
.ibtn{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;border-radius:50%;
  background:var(--clin-bg);color:var(--clin);font-size:11px;font-weight:700;vertical-align:middle;margin-left:3px;font-style:normal}

/* flow inputs */
.field{margin-bottom:13px}
.field label{display:block;font-size:12px;font-weight:650;color:var(--ink-dim);margin-bottom:6px}
.field input[type=number],.field select{
  width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;font-size:15px;
  background:var(--panel);color:var(--ink);font-family:inherit;-webkit-appearance:none;
}
.field input:focus,.field select:focus{outline:none;border-color:var(--clin);box-shadow:0 0 0 3px var(--clin-bg)}
.field .hint{font-size:10.5px;color:var(--ink-faint);margin-top:4px}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{padding:7px 12px;border:1.5px solid var(--line);border-radius:20px;font-size:12.5px;font-weight:600;
  color:var(--ink-dim);background:var(--panel);transition:.13s}
.chip.on{background:var(--clin);color:#fff;border-color:var(--clin)}
.chip.on.care{background:var(--edu);border-color:var(--edu)}
.seg{display:flex;gap:0;border:1.5px solid var(--line);border-radius:10px;overflow:hidden;background:var(--panel)}
.seg button{flex:1;padding:9px 6px;font-size:12.5px;font-weight:650;color:var(--ink-dim);border-right:1px solid var(--line)}
.seg button:last-child{border-right:none}
.seg button.on{background:var(--clin);color:#fff}

.run-btn{width:100%;padding:14px;background:var(--clin);color:#fff;border-radius:12px;font-size:15px;font-weight:700;
  box-shadow:0 4px 14px rgba(37,102,168,.32);margin-top:4px;letter-spacing:.01em}
.run-btn:active{transform:scale(.985)}

/* result cards */
.rcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow)}
.rcard-h{padding:12px 15px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--line);font-weight:700;font-size:14px}
.rcard-h.clin{background:var(--clin-bg);color:var(--clin)}
.rcard-h.pay{background:var(--pay-bg);color:var(--pay)}
.rcard-h.edu{background:var(--edu-bg);color:var(--edu)}
.rcard-h.urate{background:var(--urate-bg);color:var(--urate)}
.rcard-b{padding:13px 15px}
.rrow{display:flex;align-items:flex-start;gap:9px;padding:9px 0;border-bottom:1px solid var(--line)}
.rrow:last-child{border-bottom:none}
.rrow .rmain{flex:1;min-width:0}
.rrow .rdrug{font-weight:650;font-size:13.5px}
.rrow .rdose{font-size:11.5px;color:var(--ink-dim);margin-top:2px;font-family:var(--mono)}
.rrow .rwhy{font-size:11.5px;color:var(--ink-faint);margin-top:3px;line-height:1.5}

/* big number / metric */
.metric{display:flex;gap:11px;flex-wrap:wrap;margin:4px 0 10px}
.metric .mbox{flex:1;min-width:88px;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:10px 12px}
.metric .mval{font-size:22px;font-weight:750;letter-spacing:-.02em;font-family:var(--mono)}
.metric .mlb{font-size:10.5px;color:var(--ink-faint);font-weight:600;margin-top:1px}

/* sticky accumulator (sim) */
.sim-sticky{position:sticky;bottom:12px;z-index:30;margin-top:14px}
.sim-sticky-inner{background:var(--ink);color:#fff;border-radius:13px;padding:12px 15px;box-shadow:var(--shadow-lg)}
.sim-sticky h4{font-size:12px;color:#9fb2c4;text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px}
.sim-sticky ul{margin:0;padding-left:17px}
.sim-sticky li{font-size:12.5px;line-height:1.55;margin:3px 0;color:#e6edf3}
.sim-empty{font-size:12px;color:#7e94a8;font-style:italic}

/* sim nodes */
.node{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:14px 15px;margin-bottom:11px;box-shadow:var(--shadow)}
.node h4{font-size:14px;margin-bottom:4px}
.node .nq{font-size:12.5px;color:var(--ink-dim);margin-bottom:10px;line-height:1.5}
.opt{display:block;width:100%;text-align:left;padding:11px 13px;border:1.5px solid var(--line);border-radius:10px;
  margin-bottom:7px;font-size:13px;color:var(--ink);background:var(--panel);transition:.13s;font-weight:550}
.opt:active{transform:scale(.99)}
.opt.sel{border-color:var(--clin);background:var(--clin-bg);color:var(--clin);font-weight:650}
.opt .osub{display:block;font-size:11px;color:var(--ink-faint);font-weight:500;margin-top:2px}
.opt.sel .osub{color:var(--clin)}

/* food db */
.food-tier{display:flex;align-items:center;gap:8px;padding:5px 0}
.food-q{display:inline-flex;align-items:center;justify-content:center;min-width:54px;padding:3px 8px;border-radius:7px;font-family:var(--mono);font-size:11px;font-weight:700;text-align:center}
.foodrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
.foodrow:last-child{border-bottom:none}
.foodrow .fname{flex:1;font-size:13px;font-weight:550}
.foodrow .fmg{font-family:var(--mono);font-size:12px;font-weight:700}
.foodrow .fadd{width:28px;height:28px;border-radius:8px;background:var(--clin-bg);color:var(--clin);font-size:17px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.t1c{color:var(--block)} .t1bg{background:var(--block-bg)}
.t2c{color:var(--alert)} .t2bg{background:var(--alert-bg)}
.t3c{color:var(--warn)} .t3bg{background:var(--warn-bg)}
.t4c{color:var(--ok)} .t4bg{background:var(--ok-bg)}

/* pathway diagram */
.pathway{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:15px 13px;margin:10px 0;overflow-x:auto}
.pwstep{display:flex;align-items:center;gap:7px;flex-wrap:wrap;justify-content:center;font-size:12px}
.pwnode{background:var(--panel);border:1.5px solid var(--clin-line);border-radius:9px;padding:7px 10px;font-weight:650;font-size:11.5px;text-align:center;color:var(--clin)}
.pwnode.urate{border-color:var(--urate);color:var(--urate);background:var(--urate-bg)}
.pwarrow{color:var(--ink-faint);font-size:14px;font-weight:700}
.pwenz{font-size:9.5px;color:var(--alert);font-weight:700;background:var(--alert-bg);padding:1px 6px;border-radius:6px}

.divider{height:1px;background:var(--line);margin:16px 0}
.foot{font-size:10.5px;color:var(--ink-faint);text-align:center;line-height:1.7;padding:20px 10px 4px}
.warn-strip{background:var(--block-bg);border:1px solid var(--block);border-radius:10px;padding:10px 13px;margin:9px 0;font-size:12px;color:#8f2820;font-weight:600;display:flex;gap:8px;align-items:flex-start}

mark{background:#fde9a8;color:inherit;padding:0 2px;border-radius:3px}
.calc-out{background:var(--clin-bg);border:1px solid var(--clin-line);border-radius:11px;padding:12px 14px;margin-top:10px}
.calc-out .cval{font-size:17px;font-weight:750;color:var(--clin)}
</style>
</head>

<!-- ============ HEADER + TABS markup ============ -->
<header class="app-header">
  <div class="app-header-inner">
    <svg class="crystal" viewBox="0 0 32 32" fill="none">
      <path d="M16 2l5 6-2 9-3 13-3-13-2-9z" fill="#2566a8" opacity=".9"/>
      <path d="M16 2l5 6-5 2-5-2z" fill="#4a86c8"/>
      <path d="M11 8l5 2 5-2-2 9-3 4-3-4z" fill="#5b3fa6" opacity=".85"/>
      <path d="M16 10v20" stroke="#fff" stroke-width=".6" opacity=".4"/>
    </svg>
    <div>

<script>
/* ════════════════════════════════════════════════════════════
   ENGINE LAYER — 데이터 참조만. 판정·계산. 강제 아닌 옵션 차등.
   ════════════════════════════════════════════════════════════ */

/* ---- 진단 자동채점 ---- */
function acrEularScore(sel){
  let total=0; const bd=[];
  ACR_EULAR.forEach(item=>{
    const v=sel[item.id]; if(v==null)return;
    total+=v; if(v!==0)bd.push({q:item.q,v});
  });
  return {score:total, gout:total>=8, bd};
}

/* ---- 요산 목표 ---- */
function urateTarget(tophus){ return tophus?URATE_TARGET.tophus:URATE_TARGET.nontophus; }

/* ---- 콜키신 용량 자동(급성/예방 × 신기능) ---- */
function colchicineDose(egfr, mode, onProphylaxis){
  const band=egfrBand(egfr);
  const r=RENAL_DOSE["drug:colchicine"][band||"g0"];
  let out={dose:"",warn:[]};
  if(mode==="acute"){
    if(onProphylaxis){out.dose="다른 약(NSAID/GC)로 전환 권장";out.warn.push("이미 예방 콜키신 복용 중 — 급성 콜키신 추가 대신 전환");return out;}
    if(band==="g3"){out.dose="단회 0.6mg (2주 내 반복 금지)";}
    else if(band==="g2"){out.dose="신중 사용·반복코스 회피";out.warn.push("중증 신부전 노출 2배↑");}
    else {out.dose="1.2mg → 1h 후 0.6mg → 이후 0.6mg 1~2회/일";}
  }else{ // prophylaxis
    if(band==="g3"){out.dose="0.3mg 주2회";}
    else if(band==="g2"){out.dose="0.3mg/일 시작";}
    else if(band==="g1"){out.dose="0.6mg 1~2회/일 (감량 고려·모니터)";}
    else {out.dose="0.6mg 1~2회/일";}
  }
  if(band&&band!=="g0")out.warn.push(BAND_LABEL[band]+" — CYP3A4/P-gp 억제제·스타틴 병용 시 독성 가중");
  return out;
}

/* ---- 급성기 약물 차등 ---- */
function acuteOptions(inp){
  // inp: {egfr, pud, dm_uncontrolled, infection, hf, anticoag, onColchicine, joints, monoLarge}
  const e=inp.egfr, band=egfrBand(e);
  const res=[];
  // 콜키신
  let cStat="usable",cWhy=[];
  if(inp.onColchicine){cStat="caution";cWhy.push("이미 예방 복용 중 → 전환 고려");}
  if(band==="g2"){cStat="caution";cWhy.push("중증 신부전 노출↑");}
  if(band==="g3"){cStat="caution";cWhy.push("투석 — 단회만");}
  const cd=colchicineDose(e,"acute",inp.onColchicine);
  res.push({id:"drug:colchicine",name:"콜키신",stat:cStat,dose:cd.dose,why:cWhy.concat(cd.warn).join(" · ")||"48h 이내 시작이 효과적",pr:2});
  // NSAID
  let nStat="usable",nWhy=[];
  if(inp.pud){nStat="contra";nWhy.push("소화성궤양");}
  if(band==="g2"||band==="g3"){nStat="contra";nWhy.push("eGFR<30");}
  else if(band==="g1"){nStat="caution";nWhy.push("신기능 주의");}
  if(inp.hf){nStat= nStat==="contra"?"contra":"avoid";nWhy.push("심부전");}
  if(inp.anticoag){if(nStat!=="contra")nStat="avoid";nWhy.push("항응고제");}
  res.push({id:"drug:naproxen",name:"NSAID (나프록센 등)",stat:nStat,dose:"충분용량 조기 ±PPI",why:nWhy.join(" · ")||"확진 환자 급성기 효과 우수",pr:1});
  // 경구 GC
  let gStat="usable",gWhy=[];
  if(inp.dm_uncontrolled){gStat="caution";gWhy.push("당뇨 혈당불량");}
  if(inp.infection){gStat="avoid";gWhy.push("활동성 감염");}
  if(inp.pud||band==="g2"||band==="g3"){if(gStat==="usable")gStat="preferred";gWhy.push("NSAID 금기 대안");}
  res.push({id:"drug:prednisolone",name:"경구 글루코코르티코이드",stat:gStat,dose:"prednisolone 30~35mg×3~5일",why:gWhy.join(" · ")||"CKD서 상대적 안전",pr:3});
  // 관절강내 GC
  if(inp.monoLarge){
    res.push({id:"gc:intra",name:"관절강내 스테로이드",stat:"preferred",dose:"관절천자 후 트리암시놀론/덱사 ±국소마취",why:"큰 관절 단일 침범 — 활액배출·감염배제 겸",pr:0});
  }
  // 정렬: preferred > usable > caution > avoid > contra, 동급은 pr
  const order={preferred:0,usable:1,caution:2,avoid:3,contra:4};
  res.sort((a,b)=> (order[a.stat]-order[b.stat]) || (a.pr-b.pr));
  // 병용 안내
  const combos=["단독요법 우선 · 중증/다관절은 콜키신+NSAID 또는 콜키신+GC 병용 고려","★NSAID+전신GC 병용은 회피(GI독성·체액저류)"];
  return {drugs:res,combos};
}

/* ---- ULT 옵션 ---- */
function ultOptions(inp){
  // inp:{egfr, hla(null/'pos'/'neg'/'unk'), cvd}
  const e=inp.egfr, band=egfrBand(e);
  const out=[];
  ["drug:allopurinol","drug:febuxostat","drug:benzbromarone","drug:probenecid"].forEach(id=>{
    const rd=RENAL_DOSE[id][band||"g0"];
    let flags=[];
    if(id==="drug:allopurinol"){
      if(inp.hla==="pos")flags.push({t:"block",x:"HLA-B*5801 양성 — AHS 위험, 회피/대안 고려"});
      else if(inp.hla==="unk"||inp.hla==null)flags.push({t:"warn",x:"한국인 ~12% HLA 보유 — 검사 고려 또는 저용량 시작"});
    }
    if(id==="drug:febuxostat"&&inp.cvd)flags.push({t:"warn",x:"CVD 동반 — CARES 심혈관 경고(FAST 반박) 유의"});
    if(id==="drug:benzbromarone")flags.push({t:"warn",x:"간독성 — 간기능 모니터"});
    out.push({id,name:DRUG_DB[id].name,role:DRUG_DB[id].role,stat:rd.s,dose:rd.dose,note:rd.note,flags});
  });
  // XOI 우선(특히 CKD)
  const order={ok:0,dose:1,caution:2,special:3,avoid:4,contra:5};
  out.sort((a,b)=>order[a.stat]-order[b.stat]);
  return out;
}

/* ---- ULT 적응증 ---- */
function ultIndication(inp){
  // inp:{tophus, flaresPerYear, jointDamage, urolithiasis, sua}
  const hits=[];
  if(inp.tophus)hits.push("통풍결절 존재");
  if(inp.flaresPerYear>=2)hits.push("재발성 발작(연 2회 이상)");
  if(inp.jointDamage)hits.push("통풍성 관절손상");
  if(inp.urolithiasis)hits.push("요로결석 동반");
  return {indicated:hits.length>0, reasons:hits};
}

/* ---- 반발성 발작 예방 ---- */
function flareProphylaxis(inp){
  // inp:{egfr, pud, statin, cyp3a4, tophus, flaresPerYear}
  const e=inp.egfr, band=egfrBand(e);
  const agents=[];
  // 1차 콜키신
  const cd=colchicineDose(e,"prophylaxis",false);
  agents.push({rank:"1차",name:"콜키신",dose:cd.dose,note:(cd.warn.join(" · ")||"발작 ~85% 감소"),stat:"preferred"});
  // 2차 NSAID
  let nStat="usable",nNote="콜키신 불내약/금기·상호작용 시";
  if(inp.pud||band==="g2"||band==="g3"){nStat="avoid";nNote="신장·GI 위험군 회피";}
  agents.push({rank:"2차",name:"저용량 NSAID",dose:"나프록센 250mg bid",note:nNote,stat:nStat});
  // 3차 GC
  agents.push({rank:"3차",name:"저용량 경구 GC",dose:"prednisone 저용량",note:"콜키신·NSAID 둘 다 금기 시(예방효과 다소 약할 수 있음)",stat:"usable"});
  // 기간
  let dur="최소 3~6개월";
  if(inp.tophus||inp.flaresPerYear>=2)dur="6개월 이상(결절·잦은 발작 → 6~9개월 연장)";
  const warns=[];
  if(inp.statin)warns.push("스타틴 병용 → 근병증 위험, CK 모니터");
  if(inp.cyp3a4)warns.push("CYP3A4/P-gp 억제제 병용 → 콜키신 감량/회피");
  return {agents,duration:dur,
    stop:"요산 목표 도달 AND 일정기간(3~6개월) 무발작 → 예방약 중단. 발작 지속 시 연장.",
    teach:"초기 수개월 발작은 예상된 반응(조직 요산 동원). 치료 실패 아님 — ULT는 지속, 예방약으로 줄인다.",
    warns};
}

/* ---- 무증상 고요산혈증 ---- */
function ahuAdvisor(inp){
  // inp:{sua, ckd, cvd, htn, dm, urolithiasis, metabolic, special}
  const layerA=[
    "대다수는 평생 통풍으로 진행하지 않는다 → 일률적 약물치료 비권장",
    "모든 고요산혈증에서 2차 원인·동반질환 반드시 평가(비만·음주·이뇨제·신질환·대사증후군)",
    "약물 시작 전 생활습관·원인교정 우선",
    "치료 안 할 경우 정기 추적(sUA + 동반질환 관리)"
  ];
  const layerB=[
    {who:"한국 2024 / ACR 2020 / KDIGO",pos:"조건부 반대 — CKD·CVD·요로결석·고혈압 동반해도 일반적으로 시작 안 함",t:"info"},
    {who:"한국 지침 예외",pos:"sUA>9.0 무증상 → 신손상 위험↑ → 개별 ULT 고려. 첫 발작이어도 신기능저하·sUA 8~9↑·요로결석이면 시작",t:"warn"},
    {who:"일본 2011(가장 적극적)",pos:"sUA≥8.0+동반질환 → ULT / sUA≥9.0이면 동반질환 없어도 ULT",t:"warn"},
    {who:"ACR 특수 예외",pos:"종양용해(방사선·항암 예정)·유전성 과다생성·현저한 고요산뇨",t:"alert"}
  ];
  const rct="RCT(FEATHER·CKD-FIX·PERL) 신보호 주요결과 무효(FEATHER 일부 하위군만 신호) ↔ 대규모 코호트는 ULT 신보호 신호(인과 아님). 일률치료 근거 부족, 고위험 개별환자는 득실 고려.";
  // 행동 분기
  const s=inp.sua; const hasComorbid=inp.ckd||inp.cvd||inp.htn||inp.dm||inp.urolithiasis||inp.metabolic;
  let decision,strength,opts=[];
  if(inp.special){
    decision="예방적 ULT 적응 가능"; strength="alert";
    opts=["종양용해/유전성/현저 고요산뇨 → 알칼리화·수분·(라스부리카제) 연계","요산신병증·결석 예방 목적"];
  }else if(s!=null&&s>9){
    decision="ULT 고려 강도↑"; strength="warn";
    opts=["신손상 위험·한국지침 예외(>9)·일본기준(≥9 단독) 모두 부합","단 생활습관·원인교정 병행, HLA·신기능 고려한 약물선택"];
  }else if(s!=null&&s>=8&&hasComorbid){
    decision="옵션 양면 제시 (강제 아님)"; strength="warn";
    opts=["옵션 A: 생활습관·원인교정 우선(한국/ACR 기조)","옵션 B: 일본식 ULT 고려(sUA≥8+동반질환)","→ 환자와 득실 공유 후 결정"];
  }else{
    decision="추적관찰 + 생활습관"; strength="info";
    opts=["치료 일반적으로 불필요","생활습관 교정 + 정기 sUA·동반질환 추적"];
  }
  const workup=["BMI/비만","음주(종류·양)","이뇨제(thiazide/loop)","저용량 아스피린","cyclosporine","신기능(eGFR)","대사증후군(혈압·혈당·지질)","요로결석력","과다생성질환(혈액암·건선) 단서"];
  return {layerA,layerB,rct,decision,strength,opts,workup,
    krNote:"★한국인 HLA-B*5801 ~12% → 무증상에 알로푸리놀 시작은 SCAR 위험까지 떠안음 → 득실 더 불리(쓸 거면 HLA 검사/페북소스타트 고려)"};

  body.innerHTML=`

    <input id="kcdSearch" placeholder="코드·상병명 검색 (예: M10, 고요산, 결석)" style="width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit">

  <div id="kcdList"></div>

    <p style="font-size:11.5px;color:var(--ink-faint);margin-top:7px">예: <span class="mono">M10.07</span> 특발성 통풍, 발목 및 발 (.7 = 발목·발, 호발 부위)</p>`,"📍")}
  ${kp("청구 실전 팁",`<ul>
    <li>가능하면 <b>구체 코드</b>(M10.0 등) — 상세불명(M10.9)보다 권장</li>
    <li>CKD 동반 → <b>M10.3</b> 또는 통풍+CKD 코드 병기, 신기능별 약물 제약 함께 기록</li>
    <li>약물-유발(이뇨제 등) → <b>M10.2</b> + 원인 약물 검토</li>
    <li>요로결석 동반 → <b>N20.x</b> 병기, 요산결석이면 알로푸리놀·알칼리화 연계</li>
    <li>★요산저하제 급여는 통풍 상병에서 인정 — E79.0 단독으론 ULT 급여 제한적</li></ul>`,"💡")}
  ${noteBox("KCD·심사기준은 개정될 수 있음 — 청구 시 최신 KCD(KOICD)·심평원 기준 확인.","")}`;
  openSheet("급여코드 (KCD)","통풍 M10 · 고요산 E79 · 결석 N20",body);
  function renderKcdList(q){
    const list=$("#kcdList",body);list.innerHTML="";
    KCD_GROUPS.forEach(g=>{
      const items=KCD_DB.filter(k=>k.grp===g && (!q||(k.code+k.label+k.desc).toLowerCase().includes(q.toLowerCase())));
      if(!items.length)return;
      list.appendChild(el("div","sec-label",g));
      items.forEach(k=>{
        const card=el("div","kp");
        card.innerHTML=`<h4><span class="mono" style="color:var(--pay);background:var(--pay-bg);padding:2px 8px;border-radius:7px;font-size:13px">${k.code}</span> ${k.label}</h4>
          <p style="font-size:12.5px;color:var(--ink-dim);margin-top:6px">${k.desc}</p>
          ${k.key?`<ul style="margin:6px 0 0">${k.key.map(x=>`<li style="font-size:11.5px">${x}</li>`).join("")}</ul>`:""}`;
        list.appendChild(card);
      });
    });
    if(!list.children.length)list.innerHTML=`<div class="note">검색 결과 없음</div>`;
  }
  $("#kcdSearch",body).oninput=e=>renderKcdList(e.target.value.trim());
  renderKcdList("");
}

  ${kp("포화와 온도",`<p>포화농도 ~7mg/dL(37℃). <mark>온도 낮으면 포화농도 급락</mark> → 찬 말단(1st MTP·발목)에서 결정 석출. 침착된 MSU를 대식세포·호중구가 탐식 → IL-1β 등 분비 → 급성 염증.</p>`,"❄️")}`);

    <li>🥬 <b>고퓨린 채소는 발작 안 늘림</b> — 시금치·아스파라거스·버섯·완두는 다수 코호트서 무관. 채소 자유.</li>
    <li>🍺 <b>맥주는 퓨린 수치로 설명 안 됨</b> — 퓨린 부하 + 알코올의 신배설 차단 이중타격. 1잔에 sUA 0.5~1.0↑.</li>
    <li>🥛 <b>저지방 유제품은 보호적</b> — 요산 배설 촉진.</li>
    <li>☕ <b>블랙커피</b>(무가당) 발작↓ 관찰 / 🍒 체리 위험↓ 신호.</li>

  <div class="kp"><h4>🔍 식품 퓨린 DB + 1일 합산</h4>
    <input id="foodSearch" placeholder="식품 검색 (예: 멸치, 우유)" style="width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;margin-bottom:10px;font-family:inherit">
    <div id="foodTally" class="calc-out" style="display:none"></div>
    <div id="foodList"></div>
  </div>`;
  // 음주/과당 기전
  body.innerHTML+=expand("술이 나쁜 3중 기전","맥주 최악",`
    <p>① 맥주·막걸리 = 퓨린 직접 함유 ② 알코올 = 신장 요산배설 방해 ③ 대사 시 젖산↑ → 요산배설 경쟁억제.</p>
    <p>1년 무발작 + 조절양호 시 맥주 1~2잔/와인 1잔 정도 허용. 비알코올 맥주 포함 절주 권장.</p>`);
  body.innerHTML+=expand("과당이 나쁜 기전","하이볼·청량음료",`
    <p>과당은 인슐린 비의존 흡수 → 간에서 빠르게 ATP 고갈하며 대사 → 퓨린대사 활성화 → 요산생성↑. 콘시럽·청량음료·과일주스 주의.</p>`);
  openSheet("식이 · 음주 · 과당","퓨린 정량 DB · 기전",body);
  // food list + tally
  const tally=[];
  function renderFoodList(q){
    const list=$("#foodList",body);list.innerHTML="";
    const items=DIET_DB.filter(f=>!q||f.f.includes(q)).sort((a,b)=>b.mg-a.mg);
    items.forEach(f=>{
      const ti=TIER_INFO[f.t];
      const row=el("div","foodrow");
      row.innerHTML=`<span class="food-q ${ti.cls}c ${ti.cls}bg">${f.mg}</span>
        <span class="fname">${f.f} <span style="color:var(--ink-faint);font-size:10.5px">${f.c}${f.veg?" · 채소예외":""}${f.dairy?" · 보호적":""}</span></span>
        <button class="fadd">+</button>`;
      row.querySelector(".fadd").onclick=()=>{tally.push(f);updateTally();};
      list.appendChild(row);
    });
  }
  function updateTally(){
    const t=$("#foodTally",body);
    if(!tally.length){t.style.display="none";return;}
    t.style.display="block";
    const sum=tally.reduce((a,f)=>a+f.mg,0);
    const over=sum>PURINE_DAILY_LIMIT;
    t.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center">
      <div><span class="cval" style="color:${over?'var(--block)':'var(--clin)'}">${sum}</span> <span style="font-size:12px;color:var(--ink-faint)">mg / ${PURINE_DAILY_LIMIT}mg 목표 (100g 기준 합산)</span></div>

    <div style="font-size:11px;color:var(--ink-dim);margin-top:6px">${tally.map(f=>esc(f.f)).join(", ")}</div>
    ${over?noteBox("1일 권장(~400mg) 초과 — 발작기엔 더 제한.","warn"):""}`;
  }
  window._clearTally=()=>{tally.length=0;updateTally();};
  $("#foodSearch",body).oninput=e=>renderFoodList(e.target.value.trim());
  renderFoodList("");
}

<script>
/* ════════════════════════════════════════════════════════════
   시뮬레이션 — 체크형 조언 누적 (강제 아님)
   ════════════════════════════════════════════════════════════ */
const SIM_PICK={}; // node -> choice
const SIM_ITEMS=[]; // 누적 챙길 항목
function renderSim(){
  const v=$("#view-sim");
  v.innerHTML=`
  ${`<div class="banner"><h3>시뮬레이션 · 조언자</h3><p>각 단계를 선택하면 고려할 옵션·근거가 아래에 누적됩니다. 처방을 내리지 않고 "챙길 것"을 모읍니다.</p></div>`}
  <div id="simNodes"></div>
  <div class="sim-sticky"><div class="sim-sticky-inner">
    <h4>📋 챙길 항목</h4><div id="simAcc"><div class="sim-empty">선택을 시작하면 여기에 누적됩니다.</div></div>
  </div></div>`;
  SIM_ITEMS.length=0;for(const k in SIM_PICK)delete SIM_PICK[k];
  renderSimNodes();
}
const SIM_NODES=[
  {id:"dx",h:"1 · 진단 확인",q:"통풍이 확진/분류되었나?",opts:[
    {l:"MSU 결정 확인 또는 ACR/EULAR ≥8",s:"진단 확정 — 병기 판정으로",add:null},
    {l:"불확실",s:"활액검사/분류기준 재확인 권장",add:"진단 재확인: 활액 MSU 또는 ACR/EULAR 채점(도서관 진단 탭)"}]},
  {id:"stage",h:"2 · 병기",q:"현재 상태는?",opts:[
    {l:"무증상 고요산혈증",s:"→ 무증상 분기",add:"무증상: 2차원인 workup + LAYER C 행동트리(도서관)"},
    {l:"급성 발작 중",s:"→ 급성 분기",add:"급성: 항염증 3약물 위험도 차등 선택(24h 내 시작)"},
    {l:"간헐기/만성·결절성",s:"→ ULT 분기",add:"ULT 적응증·목표 평가 + 반발성 발작 예방 동반"}]},
  {id:"comorbid",h:"3 · 동반질환·안전성",q:"고려할 동반질환 (대표)",opts:[
    {l:"CKD 동반",s:"신기능별 약물 제약 — 용량표 확인",add:"CKD: eGFR별 용량표(콜키신 감량·프로베네시드 회피·GC 안전)"},
    {l:"CVD 동반",s:"페북소스타트 CV 경고 유의",add:"CVD: 페북소스타트 CARES 경고(FAST 반박) 고려"},
    {l:"특이사항 없음",s:"표준 진행",add:null}]},
  {id:"hla",h:"4 · HLA-B*5801",q:"알로푸리놀 고려 시 HLA",opts:[
    {l:"검사 안 함/모름",s:"한국인 ~12% 보유 — 검사 또는 저용량 시작",add:"HLA-B*5801: 검사 고려(한국인 12%) 또는 알로푸리놀 저용량 시작"},
    {l:"음성",s:"알로푸리놀 사용 가능",add:null},
    {l:"양성",s:"알로푸리놀 회피 → 페북소스타트 등",add:"HLA 양성: 알로푸리놀 회피 → 페북소스타트 대안"}]},
  {id:"ult",h:"5 · ULT 결정",q:"요산저하요법 적응?",opts:[
    {l:"적응 충족(결절·재발·손상·결석)",s:"ULT 시작 + 목표 설정",add:"ULT 시작: 목표 sUA<6(결절<5) + 발작예방 콜키신 병용"},
    {l:"첫 발작·적응 불충분",s:"생활습관 + 추적",add:"추적: 생활습관 교정 + sUA 모니터, 재발 시 ULT 재평가"}]},
  {id:"life",h:"6 · 생활습관 (항상)",q:"환자교육 핵심",opts:[
    {l:"교육 항목 추가",s:"음주·과당·체중·식이",add:"생활습관: 절주(맥주 최악)·과당 제한·체중감량·저지방유제품/채소 권장(채소예외)"}]}
];
function renderSimNodes(){
  const wrap=$("#simNodes");wrap.innerHTML="";
  // 항상 첫 노드부터, 선택 시 다음 노드 공개
  let show=true;
  SIM_NODES.forEach((node,idx)=>{
    if(!show)return;
    const n=el("div","node");
    n.innerHTML=`<h4>${node.h}</h4><div class="nq">${node.q}</div>`;
    node.opts.forEach((o,oi)=>{
      const b=el("button","opt"+(SIM_PICK[node.id]===oi?" sel":""));
      b.innerHTML=`${o.l}<span class="osub">${o.s}</span>`;
      b.onclick=()=>{
        SIM_PICK[node.id]=oi;
        rebuildAcc();renderSimNodes();
      };
      n.appendChild(b);
    });
    wrap.appendChild(n);
    if(SIM_PICK[node.id]==null)show=false; // 미선택 시 다음 잠금
  });
  // finale
  if(SIM_PICK["life"]!=null){
    const fin=el("div","node");
    fin.style.borderColor="var(--clin)";
    fin.innerHTML=`<h4>✓ 요약</h4><div class="nq">아래 "챙길 항목"이 이 환자의 고려사항입니다. 모든 선택은 조언이며 최종 결정은 처방의 책임입니다.</div>
      <button class="opt" onclick="renderSim()" style="text-align:center;color:var(--clin);font-weight:650">처음부터 다시</button>`;
    fin.querySelector(".opt").classList.remove("opt");
    wrap.appendChild(fin);
  }
}
function rebuildAcc(){
  SIM_ITEMS.length=0;
  SIM_NODES.forEach(node=>{
    const pick=SIM_PICK[node.id];
    if(pick!=null&&node.opts[pick].add)SIM_ITEMS.push(node.opts[pick].add);
  });
  const acc=$("#simAcc");
  if(!SIM_ITEMS.length){acc.innerHTML=`<div class="sim-empty">선택을 시작하면 여기에 누적됩니다.</div>`;return;}
  acc.innerHTML=`<ul>${SIM_ITEMS.map(i=>`<li>${i}</li>`).join("")}</ul>`;
}

/* ════════════════════════════════════════════════════════════
   플로우 — 실시간 입력 → 3엔진 카드
   ════════════════════════════════════════════════════════════ */

  const v=$("#view-flow");
  v.innerHTML=`
  <div class="banner"><h3>플로우 · 환자 앞 실시간</h3><p>입력하면 진단·급성기·ULT·급여·교육 카드가 자동 계산됩니다.</p></div>

    <div class="field"><label>병기</label><div class="seg" id="fStage">

    <div class="field"><label>HLA-B*5801</label><div class="seg" id="fHla">
      <button data-v="unk" class="on">모름</button><button data-v="neg">음성</button><button data-v="pos">양성</button></div></div>
    <div class="field"><label>연 발작 횟수</label><input type="number" id="fFlares" placeholder="예: 3"></div>
    <div class="field"><label>동반질환 (해당 모두)</label><div class="chips" id="fComorbid"></div></div>
    <div class="field"><label>급성기 상황 (발작 시)</label><div class="chips" id="fAcute"></div></div>
    <button class="run-btn" onclick="flowRun()">3엔진 카드 생성</button>
  </div>
  <div id="flowOut"></div>`;
  // segs
  $$("#fStage button,#fTophus button,#fHla button").forEach(b=>b.onclick=()=>{
    [...b.parentElement.children].forEach(x=>x.classList.remove("on"));b.classList.add("on");});
  const coDefs=[["ckd","CKD"],["cvd","CVD"],["htn","고혈압"],["dm","당뇨"],["pud","소화성궤양"],["hf","심부전"],["urolithiasis","요로결석"]];
  const cw=$("#fComorbid",v);const coState={};
  coDefs.forEach(([k,l])=>{const b=el("button","chip");b.textContent=l;b.onclick=()=>{coState[k]=!coState[k];b.classList.toggle("on");};cw.appendChild(b);});
  const acDefs=[["onColchicine","예방콜키신중"],["infection","활동성감염"],["dm_uncontrolled","혈당불량"],["anticoag","항응고제"],["monoLarge","큰관절단일"]];
  const aw=$("#fAcute",v);const acState={};
  acDefs.forEach(([k,l])=>{const b=el("button","chip");b.textContent=l;b.onclick=()=>{acState[k]=!acState[k];b.classList.toggle("on");};aw.appendChild(b);});
  window._flowState={coState,acState};
}
function flowRun(){
  const v=$("#view-flow");
  const stage=$("#fStage .on",v).dataset.v;
  const sua=parseFloat($("#fSua",v).value);
  const egfr=parseFloat($("#fEgfr",v).value);
  const tophus=$("#fTophus .on",v).dataset.v==="1";
  const hla=$("#fHla .on",v).dataset.v;
  const flares=parseInt($("#fFlares",v).value)||0;
  const {coState,acState}=window._flowState;
  const inp={stage,sua:isNaN(sua)?null:sua,egfr:isNaN(egfr)?null:egfr,tophus,hla,flaresPerYear:flares,...coState,...acState};
  let html="";

  // 진단·병기 카드
  const tgt=urateTarget(tophus);
  html+=`<div class="rcard"><div class="rcard-h urate">🎯 병기 · 요산 목표</div><div class="rcard-b">
    <div class="metric">
      <div class="mbox"><div class="mval">${inp.sua!=null?inp.sua:"–"}</div><div class="mlb">현재 sUA</div></div>
      <div class="mbox"><div class="mval" style="color:var(--urate)">&lt;${tgt}</div><div class="mlb">목표 ${tophus?"결절":"무결절"}</div></div>
      <div class="mbox"><div class="mval">${egfrBand(egfr)?BAND_LABEL[egfrBand(egfr)].replace("eGFR ",""):"–"}</div><div class="mlb">신기능</div></div>
    </div>
    ${inp.sua!=null&&inp.sua>tgt?noteBox(`목표(<${tgt}) 미달 — ULT 적응 시 적정 필요`,"warn"):inp.sua!=null?noteBox("목표 범위 내","clin"):""}
  </div></div>`;

  // 무증상 분기
  if(stage==="asymptomatic"){
    const a=ahuAdvisor(inp);
    html+=`<div class="rcard"><div class="rcard-h clin">🧭 무증상 — 행동 옵션</div><div class="rcard-b">
      <div style="margin-bottom:7px">${pill(a.decision,a.strength)}</div>
      <ul style="margin:4px 0;padding-left:18px">${a.opts.map(o=>`<li style="font-size:12.5px;color:var(--ink-dim);margin:3px 0">${o}</li>`).join("")}</ul>
      ${noteBox(a.krNote,"warn")}
      <div style="font-size:11px;color:var(--ink-faint);margin-top:8px">한/미/일 입장·RCT 근거는 도서관 무증상 탭 참조. 일률치료 아닌 개별 득실.</div>
    </div></div>`;
  }

  // 급성기 카드
  if(stage==="acute"){
    const r=acuteOptions(inp);
    html+=`<div class="rcard"><div class="rcard-h clin">⚡ 급성기 — 약물 차등</div><div class="rcard-b">
      ${r.drugs.map(d=>`<div class="rrow"><div class="rmain">
        <div class="rdrug">${d.name} ${statBadge(d.stat)}</div>
        <div class="rdose">${d.dose}</div><div class="rwhy">${d.why}</div></div></div>`).join("")}
      ${r.combos.map(c=>noteBox(c,c.includes("회피")?"warn":"")).join("")}
    </div></div>`;
  }

  // ULT 카드 (만성 또는 적응)
  if(stage==="chronic"||stage==="acute"){
    const ind=ultIndication(inp);
    const opts=ultOptions(inp);
    html+=`<div class="rcard"><div class="rcard-h clin">💊 ULT — 요산저하 옵션</div><div class="rcard-b">
      ${ind.indicated?noteBox("ULT 적응: "+ind.reasons.join(" · "),"clin"):noteBox("적응 불충분 — 첫발작·저빈도면 추적 고려(신기능저하·sUA 8~9↑·결석은 시작 고려)","")}
      ${opts.map(d=>`<div class="rrow"><div class="rmain">
        <div class="rdrug">${d.name} <span style="font-size:10.5px;color:var(--ink-faint)">${d.role}</span> ${statBadge(d.stat)}</div>
        <div class="rdose">${d.dose}${d.note?" · "+d.note:""}</div>
        ${d.flags.map(f=>`<div class="rwhy"><span class="pill ${f.t}">${f.t==="block"?"⛔":f.t==="warn"?"⚠":"ⓘ"}</span> ${f.x}</div>`).join("")}
      </div></div>`).join("")}
    </div></div>`;
    // 반발성 발작 예방 (ULT 떴으면 항상)
    const fp=flareProphylaxis({egfr,pud:coState.pud,statin:false,cyp3a4:false,tophus,flaresPerYear:flares});
    html+=`<div class="rcard"><div class="rcard-h edu">🛡️ 반발성 발작 예방 (ULT 동반 필수)</div><div class="rcard-b">
      <div class="warn-strip">⚠️ ULT 시작 시 최대 80% 발작 — 예방 없이 시작 금물</div>
      ${fp.agents.map(a=>`<div class="rrow"><div class="rmain">
        <div class="rdrug"><span class="pill ${a.stat==="avoid"?"alert":a.stat==="preferred"?"ok":"info"}">${a.rank}</span> ${a.name}</div>
        <div class="rdose">${a.dose}</div><div class="rwhy">${a.note}</div></div></div>`).join("")}
      <div class="rrow"><div class="rmain"><div class="rdrug">기간</div><div class="rwhy">${fp.duration}</div></div></div>
      ${noteBox("👤 "+fp.teach,"clin")}
    </div></div>`;
  }

  // 급여 카드
  const reimbIds=stage==="acute"?["drug:colchicine","drug:naproxen","drug:prednisolone"]:["drug:allopurinol","drug:febuxostat","drug:benzbromarone"];
  html+=`<div class="rcard"><div class="rcard-h pay">💰 급여</div><div class="rcard-b">
    ${reimbIds.map(id=>{const b=reimbBadge(id);return `<div class="rrow"><div class="rmain">
      <div class="rdrug">${DRUG_DB[id].name} <span class="dstat ${b.cls==="ok"?"ok":"caution"}">${b.b}</span></div>
      ${b.note?`<div class="rwhy">${b.note}</div>`:""}</div></div>`;}).join("")}
  </div></div>`;

  // 교육 카드
  html+=`<div class="rcard"><div class="rcard-h edu">🥗 교육 · 관리</div><div class="rcard-b">
    <ul style="margin:0;padding-left:18px">
      <li style="font-size:12.5px;color:var(--ink-dim);margin:3px 0">절주 — 맥주·막걸리 최악(퓨린+배설차단+젖산)</li>
      <li style="font-size:12.5px;color:var(--ink-dim);margin:3px 0">과당 제한 — 하이볼·청량음료·콘시럽</li>
      <li style="font-size:12.5px;color:var(--ink-dim);margin:3px 0">체중감량(점진), 저지방 유제품·채소·커피 권장(채소 예외)</li>
      ${coState.ckd||coState.htn||coState.dm?`<li style="font-size:12.5px;color:var(--ink-dim);margin:3px 0">동반질환 목표 관리(각 질환 지침) + 요산상승 약물(이뇨제·아스피린) 검토</li>`:""}
    </ul>
  </div></div>`;

  html+=`<div class="foot">조언자 도구 · 모든 결과는 참고이며 최종 결정은 처방의 책임</div>`;
  $("#flowOut",v).innerHTML=html;
  $("#flowOut",v).scrollIntoView({behavior:"smooth",block:"start"});
}

/* ════════════════════════════════════════════════════════════
   INIT
   ════════════════════════════════════════════════════════════ */
renderLibrary();
renderSim();
renderFlow();
</script>
</body>
</html>
