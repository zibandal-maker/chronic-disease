<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>천식 Total Care</title>
<style>
  :root{
    /* 천식 흡입제 관행색: reliever 블루 기조 + controller/생물학 핑크·퍼플 포인트 */
    --ink:#1a2333; --muted:#5e6b80; --line:#dde3ec; --bg:#f3f6fb;
    --card:#ffffff; --accent:#1f6fb2; --accent-soft:#e4eef7;
    --clin:#1f6fb2; --clin-bg:#e4eef7;     /* 임상 — reliever 블루 */
    --care:#6a8fb8; --care-bg:#eaf0f6;     /* 관리 — 연한 블루그레이 */
    --pay:#b23a6f;  --pay-bg:#f9e6ef;      /* 급여 — 핑크(생물학제제 강조) */
    --met:#1f6fb2; --met-bg:#e4eef7; --notmet:#b23a6f; --notmet-bg:#f9e6ef;
    --warn:#9a5b1a; --warn-bg:#f7efdf;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;
    font-size:16px;line-height:1.5;-webkit-text-size-adjust:100%}
  .wrap{max-width:820px;margin:0 auto}

  /* 상단 고정 */
  .topbar{position:sticky;top:0;z-index:50;background:var(--bg);
    border-bottom:1px solid var(--line);padding:10px 16px 0}
  .topbar-row{display:flex;align-items:center;justify-content:space-between;gap:10px;
    max-width:820px;margin:0 auto}
  .brand{font-size:18px;font-weight:800;letter-spacing:-.01em}
  .brand span{color:var(--accent)}
  .search-box{flex:0 1 200px;display:flex;align-items:center;gap:6px;
    background:var(--card);border:1px solid var(--line);border-radius:8px;padding:6px 10px}
  .search-box input{border:none;outline:none;font-size:16px;width:100%;background:transparent;
    font-family:inherit;color:var(--ink)}
  .tabs{display:flex;gap:4px;max-width:820px;margin:10px auto 0}
  .tab{appearance:none;border:none;background:transparent;font-family:inherit;
    font-size:15px;font-weight:700;color:var(--muted);padding:10px 16px;cursor:pointer;
    border-bottom:3px solid transparent;touch-action:manipulation}
  .tab.on{color:var(--ink);border-bottom-color:var(--accent)}

  .view{padding:18px 16px 60px}

  /* 도서관 그리드 */
  .cat-band{margin:18px 0 10px;display:flex;align-items:center;gap:8px}
  .cat-dot{width:10px;height:10px;border-radius:50%}
  .cat-label{font-size:12px;letter-spacing:.12em;text-transform:uppercase;font-weight:800}
  .cat-clin .cat-dot{background:var(--clin)} .cat-clin .cat-label{color:var(--clin)}
  .cat-care .cat-dot{background:var(--care)} .cat-care .cat-label{color:var(--care)}
  .cat-pay .cat-dot{background:var(--pay)} .cat-pay .cat-label{color:var(--pay)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
  .topic-card{appearance:none;text-align:left;font-family:inherit;cursor:pointer;
    background:var(--card);border:1px solid var(--line);border-radius:11px;padding:14px;
    touch-action:manipulation;border-left:3px solid var(--line)}
  .topic-card.clin{border-left-color:var(--clin)}
  .topic-card.care{border-left-color:var(--care)}
  .topic-card.pay{border-left-color:var(--pay)}
  .tc-num{font-size:11px;color:var(--muted);font-weight:700}
  .tc-title{font-size:16px;font-weight:700;margin-top:3px;line-height:1.3}
  .tc-star{font-size:11px;color:var(--pay);font-weight:700;margin-top:5px}

  /* 토픽 상세 */
  .back-btn{appearance:none;border:none;background:none;font-family:inherit;font-size:15px;
    color:var(--accent);font-weight:700;cursor:pointer;padding:4px 0;margin-bottom:6px;touch-action:manipulation}
  .topic-h{font-size:22px;font-weight:800;margin:0 0 4px;letter-spacing:-.01em}
  .topic-desc{color:var(--muted);font-size:14px;margin:0 0 16px}
  .placeholder{background:var(--card);border:1px dashed var(--line);border-radius:11px;
    padding:24px;text-align:center;color:var(--muted);font-size:14px}

  /* 생물학제제 카드 (토픽7) */
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:14px}
  .sec-title{font-size:13px;letter-spacing:.08em;text-transform:uppercase;
    color:var(--accent);font-weight:800;margin:6px 0 10px}
  .bio-card{border:1px solid var(--line);border-radius:10px;padding:13px 14px;margin-bottom:9px;cursor:pointer;touch-action:manipulation}
  .bio-row{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .bio-name{font-size:17px;font-weight:700}
  .bio-pill{font-size:11px;font-weight:700;background:var(--accent-soft);color:var(--accent);
    padding:2px 8px;border-radius:20px}
  .bio-meta{font-size:12px;color:var(--muted);margin-top:3px}
  .bio-cta{margin-top:11px;display:inline-block;background:var(--pay-bg);color:var(--pay);
    border:1px solid var(--pay);border-radius:8px;padding:8px 13px;font-size:13px;font-weight:700;
    cursor:pointer;font-family:inherit;touch-action:manipulation}
  .gap-box{background:var(--warn-bg);border-left:3px solid var(--warn);border-radius:8px;
    padding:11px 13px;font-size:13px;color:var(--warn);margin-top:6px}

  /* R-CHECK 모달 */
  .modal-bg{position:fixed;inset:0;background:rgba(10,20,16,.45);z-index:100;
    display:none;align-items:flex-end;justify-content:center}
  .modal-bg.on{display:flex}
  .modal{background:var(--bg);width:100%;max-width:600px;max-height:90vh;overflow-y:auto;
    border-radius:16px 16px 0 0;padding:18px 16px 30px}
  .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
  .modal-title{font-size:18px;font-weight:800}
  .modal-close{appearance:none;border:none;background:none;font-size:24px;color:var(--muted);
    cursor:pointer;line-height:1;padding:0 4px;touch-action:manipulation}
  .precond{margin:10px 0;padding:10px 12px;background:var(--card);border-radius:8px;font-size:13px;color:var(--muted)}
  .precond b{color:var(--ink)}
  .note-strict{margin:8px 0;font-size:12.5px;color:var(--notmet);background:var(--notmet-bg);padding:8px 11px;border-radius:7px}
  .phase-label{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);font-weight:800;margin:14px 0 6px}
  .path-group{border:1px dashed var(--line);border-radius:9px;padding:11px;margin-bottom:9px;background:var(--card)}
  .path-head{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:6px;display:flex;justify-content:space-between}
  .ck{display:flex;gap:10px;padding:10px 0;border-top:1px solid var(--line);cursor:pointer}
  .ck:first-child{border-top:none}
  .ck input{width:20px;height:20px;margin:1px 0 0;accent-color:var(--accent);flex:0 0 auto;touch-action:manipulation}
  .ck label{font-size:14.5px;cursor:pointer;flex:1}
  .req{font-size:10px;color:var(--notmet);font-weight:700;margin-left:4px}
  .verdict{margin-top:16px;border-radius:11px;padding:15px;border:1.5px solid}
  .verdict.met{background:var(--met-bg);border-color:var(--met)}
  .verdict.notmet{background:var(--notmet-bg);border-color:var(--notmet)}
  .v-status{font-size:16px;font-weight:800}
  .verdict.met .v-status{color:var(--met)} .verdict.notmet .v-status{color:var(--notmet)}
  .v-text{font-size:13.5px;margin-top:6px;line-height:1.55}
  .switch-warn{margin-top:11px;background:var(--warn-bg);border-radius:8px;padding:10px 12px;
    font-size:12.5px;color:var(--warn);border-left:3px solid var(--warn)}
  .switch-warn b{display:block;margin-bottom:2px}
  .eval-box{background:var(--card);border:1px solid var(--line);border-radius:8px;
    padding:10px 12px;font-size:13px;color:var(--ink);line-height:1.5}

  .stub{text-align:center;color:var(--muted);font-size:14px;padding:40px 16px}

  /* 섹션 렌더러 공통 */
  .kp{margin:0;padding-left:20px} .kp li{margin:5px 0;font-size:14.5px;line-height:1.5}
  .callout{background:var(--bg);border-radius:8px;padding:11px 13px;font-size:13.5px;
    line-height:1.55;margin-top:8px;color:var(--ink)}
  .callout.accent{background:var(--accent-soft);color:var(--accent);font-weight:500}
  .callout.warn{background:var(--warn-bg);color:var(--warn);border-left:3px solid var(--warn)}
  .kv{font-size:14px;margin:7px 0;line-height:1.5} .kv b{color:var(--accent)}
  .tbl-wrap{overflow-x:auto} .tbl{width:100%;border-collapse:collapse;font-size:13px}
  .tbl th,.tbl td{border:1px solid var(--line);padding:7px 9px;text-align:left}
  .tbl th{background:var(--accent-soft);color:var(--accent);font-weight:700;white-space:nowrap}
  .step-row{display:flex;gap:11px;padding:9px 0;border-top:1px solid var(--line)}
  .step-row:first-child{border-top:none}
  .step-n{flex:0 0 auto;width:34px;height:24px;background:var(--accent-soft);color:var(--accent);
    border-radius:6px;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center}
  .step-ex{font-size:12.5px;color:var(--muted);margin-top:2px}
  .mini-steps{font-size:12.5px;color:var(--muted);margin:4px 0 8px 8px;line-height:1.7}
  .inh-row{display:flex;justify-content:space-between;align-items:center;gap:8px;
    padding:10px 0;border-top:1px solid var(--line)}
  .inh-row:first-child{border-top:none}
  .inh-item{border:1px solid var(--line);border-radius:10px;padding:0;margin-bottom:9px;overflow:hidden}
  .inh-open{border-color:var(--accent)}
  .inh-clickhead{width:100%;display:flex;gap:12px;align-items:flex-start;background:none;border:none;
    font-family:inherit;text-align:left;cursor:pointer;padding:12px 13px;touch-action:manipulation}
  .inh-icon{width:40px;height:38px;flex:0 0 auto;margin-top:2px}
  .inh-body{flex:1;min-width:0}
  .inh-arrow{font-size:18px;font-weight:700;color:var(--accent);flex:0 0 auto;line-height:1.2}
  .inh-detail{padding:0 13px 13px 65px;border-top:1px solid var(--line)}
  .inh-detail .inh-feat{margin-top:10px}
  .inh-top{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .inh-name{font-weight:700;font-size:15px} .inh-type{font-size:12.5px;color:var(--muted);margin-top:2px}
  .inh-dose{font-size:13px;color:var(--accent);font-weight:700;margin-top:6px}
  .inh-feat{font-size:13px;margin-top:5px;line-height:1.5;color:var(--ink)}
  .badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;flex:0 0 auto}
  .badge-blue{background:var(--accent-soft);color:var(--accent)}
  .badge-soft{background:var(--care-bg);color:var(--care)}
  .badge-warn{background:var(--warn-bg);color:var(--warn)}
  .test-card{border:1px solid var(--line);border-radius:9px;padding:11px 12px;margin-bottom:8px}
  .test-head{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .test-head b{font-size:15px} .test-cat{font-size:11px;color:var(--muted);font-weight:600}
  .test-cut{font-size:13.5px;margin-top:4px;line-height:1.5}
  .test-warn{font-size:12.5px;color:var(--warn);margin-top:5px;background:var(--warn-bg);padding:5px 8px;border-radius:6px}
  .test-pay{font-size:12.5px;margin-top:5px;padding:5px 8px;border-radius:6px;line-height:1.5}
  .test-pay.pay-yes{color:var(--care);background:var(--care-bg)}
  .test-pay.pay-no{color:var(--pay);background:var(--pay-bg);font-weight:600}
  .test-pay.pay-na{color:var(--muted);background:var(--bg)}
  .pheno-bio{font-size:13px;color:var(--accent);font-weight:700;margin-top:5px}

  /* 시뮬레이터 */
  .sim-crumb{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .trig-box{border:1.5px solid var(--warn);border-radius:11px;margin-bottom:16px;overflow:hidden;background:var(--warn-bg)}
  .trig-head{width:100%;display:flex;justify-content:space-between;align-items:center;background:none;
    border:none;font-family:inherit;cursor:pointer;padding:12px 14px;font-size:14px;font-weight:800;
    color:var(--warn);touch-action:manipulation}
  .trig-ic{font-size:18px}
  .trig-item{padding:10px 14px;border-top:1px solid var(--line)}
  .trig-when{font-size:13.5px;font-weight:700;color:var(--ink)}
  .trig-act{font-size:13px;color:var(--warn);margin-top:3px;line-height:1.5}

  /* 인터랙티브 매트릭스 */
  .mtx-box{border:1px solid var(--accent);border-radius:12px;padding:14px;margin-bottom:16px;background:var(--card)}
  .mtx-title{font-size:15px;font-weight:800;color:var(--accent)}
  .mtx-desc{font-size:12.5px;color:var(--muted);margin:4px 0 12px;line-height:1.5}
  .mtx-field{margin-bottom:10px}
  .mtx-label{font-size:12.5px;font-weight:700;color:var(--ink);margin-bottom:5px}
  .mtx-chips{display:flex;flex-wrap:wrap;gap:6px}
  .mtx-chip{appearance:none;border:1px solid var(--line);background:var(--bg);font-family:inherit;
    font-size:12.5px;padding:7px 11px;border-radius:18px;cursor:pointer;color:var(--ink);touch-action:manipulation}
  .mtx-chip.on{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700}
  .mtx-grid{margin:12px 0 8px;display:flex;flex-direction:column;gap:6px}
  .mtx-row{border:1.5px solid var(--line);border-radius:9px;padding:10px 12px;
    display:grid;grid-template-columns:84px 1fr;gap:4px 10px;transition:all .15s;background:var(--card)}
  .mtx-step{font-size:13px;font-weight:800;color:var(--ink);grid-row:span 2;
    display:flex;flex-direction:column;justify-content:center;gap:3px}
  .mtx-cond{font-size:12px;color:var(--muted);line-height:1.45}
  .mtx-rx{font-size:12.5px;color:var(--ink);line-height:1.5}
  .mtx-rx b{color:var(--accent)}
  .mtx-row.hit{border-color:var(--accent);border-width:2.5px;background:var(--accent-soft);
    box-shadow:0 0 0 2px rgba(31,111,178,.12)}
  .mtx-row.hit .mtx-step{color:var(--accent)}
  .mtx-row.dim{opacity:.4}
  .mtx-hitlabel{display:inline-block;background:var(--accent);color:#fff;font-size:9px;font-weight:800;
    padding:2px 7px;border-radius:10px;letter-spacing:.03em}
  .crumb-cur{font-size:12px;color:var(--muted);font-weight:700;letter-spacing:.05em}
  .sim-q{font-size:18px;font-weight:800;margin:6px 0 14px;line-height:1.4}
  .sim-opt{display:block;width:100%;text-align:left;font-family:inherit;cursor:pointer;
    background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px;
    font-size:15px;font-weight:600;margin-bottom:9px;touch-action:manipulation;color:var(--ink)}
  .sim-opt.consider{display:flex;gap:9px;align-items:center}
  .consider-dot{color:var(--accent);font-size:16px}
  .sim-route{display:block;width:100%;text-align:left;font-family:inherit;cursor:pointer;
    background:var(--card);border:1px solid var(--line);border-radius:11px;padding:15px;
    margin-bottom:10px;touch-action:manipulation;border-left:3px solid var(--accent)}
  .sim-route:active{background:var(--bg)}
  .route-label{font-size:16px;font-weight:700;color:var(--ink)}
  .route-desc{font-size:12.5px;color:var(--muted);margin-top:3px}
  .sim-next{appearance:none;border:none;background:var(--accent);color:#fff;font-family:inherit;
    font-size:14px;font-weight:700;padding:11px 18px;border-radius:9px;cursor:pointer;
    margin:2px 0 14px;touch-action:manipulation}
  .sim-skip{appearance:none;border:1px dashed var(--muted);background:transparent;color:var(--muted);
    font-family:inherit;font-size:13px;font-weight:700;padding:9px 14px;border-radius:8px;
    cursor:pointer;margin-bottom:12px;touch-action:manipulation}
  .stage-box{background:var(--accent-soft);border-radius:9px;padding:11px 13px;font-size:13.5px;
    color:var(--accent);line-height:1.55;margin:0 0 12px;position:relative}
  .stage-tag{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.1em;
    background:var(--accent);color:#fff;padding:2px 7px;border-radius:4px;margin-right:7px;vertical-align:1px}
  .gate-item{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 13px;margin-bottom:8px}
  .gate-head{display:flex;align-items:center;gap:10px;cursor:pointer}
  .gate-head input{width:19px;height:19px;accent-color:var(--accent);touch-action:manipulation}
  .gate-head b{font-size:15px}
  .gate-reveal{font-size:13px;color:var(--muted);margin-top:8px;line-height:1.5;padding-left:29px}
  .gate-toggle{margin-left:auto;font-size:11px;color:var(--accent);font-weight:700}
  .gate-detail-title{font-size:12px;font-weight:800;color:var(--accent);letter-spacing:.04em;
    margin:10px 0 6px;padding-left:29px}
  .gate-checklist{margin:0 0 6px;padding-left:46px;list-style:none}
  .gate-checklist li{position:relative;font-size:13.5px;line-height:1.5;margin:6px 0;padding-left:18px;color:var(--ink)}
  .gate-checklist li:before{content:"☐";position:absolute;left:0;color:var(--accent);font-size:13px}
  .gate-link{display:inline-block;margin:4px 0 0 29px;font-size:12.5px}
  .sim-opt-on{border-color:var(--accent);border-width:1.5px}
  .base-check{margin:0 0 10px;padding:2px 0}
  .base-check-t{font-size:12px;font-weight:800;color:var(--accent);letter-spacing:.06em;
    text-transform:uppercase;margin:4px 0 8px}
  .base-grp-h{font-size:13.5px;font-weight:700;color:var(--ink);margin:10px 0 2px}

  /* 아코디언 (심화) */
  .acc{border:1px solid var(--line);border-radius:9px;margin-bottom:8px;overflow:hidden;background:var(--card)}
  .acc-open{border-color:var(--accent)}
  .acc-head{width:100%;display:flex;justify-content:space-between;align-items:center;gap:8px;
    background:none;border:none;font-family:inherit;cursor:pointer;padding:13px 14px;
    text-align:left;touch-action:manipulation}
  .acc-title{font-size:14.5px;font-weight:700;color:var(--ink)}
  .acc-open .acc-title{color:var(--accent)}
  .acc-icon{font-size:18px;font-weight:700;color:var(--accent);flex:0 0 auto;line-height:1}
  .acc-body{padding:0 14px 14px;border-top:1px solid var(--line)}
  .acc-body .kp{margin:10px 0 0} .acc-body .kp li{margin:6px 0;font-size:13.5px}
  .acc-text{font-size:13.5px;line-height:1.6;margin-top:10px}
  .deep-label{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
    color:var(--muted);margin:18px 0 8px;display:flex;align-items:center;gap:8px}
  .deep-label:before,.deep-label:after{content:"";flex:1;height:1px;background:var(--line)}
  .kcd-tbl td{font-size:12px;vertical-align:top} .kcd-tbl th{font-size:11.5px}
  .kcd-code{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;font-weight:700;
    color:var(--pay);white-space:nowrap}
  .opt-reveal{font-size:13.5px;color:var(--muted);background:var(--bg);border-radius:8px;
    padding:10px 12px;margin:0 0 10px;line-height:1.55}
  .opt-detail{margin:0 0 12px}
  .ex-h{font-size:12px;font-weight:800;color:var(--accent);letter-spacing:.04em;margin:10px 0 6px}
  .ex-drug{font-size:13.5px;line-height:1.55;padding:7px 11px;background:var(--card);
    border:1px solid var(--line);border-radius:7px;margin-bottom:6px}
  .ex-drug b{color:var(--ink)}
  .ex-drug.ex-warn{border-color:var(--warn);background:var(--warn-bg)}
  .ex-mini{font-size:12.5px;color:var(--muted);line-height:1.6;margin-bottom:6px}
  .ex-note{font-size:12.5px;color:var(--accent);background:var(--accent-soft);
    border-radius:7px;padding:8px 11px;margin-top:4px;line-height:1.5}
  .topic-link{color:var(--accent);font-weight:700;cursor:pointer;white-space:nowrap}

  /* 약물 무기 아이템 */
  .drug-item{border-top:1px solid var(--line);padding:10px 0}
  .drug-item:first-child{border-top:none}
  .drug-item-h{display:flex;align-items:center;gap:8px}
  .drug-item-h b{font-size:15px}

<script>
// R-CHECK 엔진 (검증 완료, 18 테스트 통과)
function rcEvalCriteria(criteria, checked){
  for(var i=0;i<criteria.length;i++){ var c=criteria[i]; if(c.required && !checked[c.id]) return false; }
  return true;
}
function rcEvaluate(rec, checked){
  checked=checked||{}; var res={met:false,paths:[],sharedMet:true};
  // 공통 전제(sharedChecks) — ANY_PATH에서 경로와 무관하게 먼저 충족돼야
  if(rec.sharedChecks){ res.sharedMet = rcEvalCriteria(rec.sharedChecks, checked); }
  if(rec.logic==="ALL"){ res.met=rcEvalCriteria(rec.criteria,checked); }
  else if(rec.logic==="ANY_PATH"){ var any=false;
    for(var p=0;p<rec.paths.length;p++){ var pm=rcEvalCriteria(rec.paths[p].criteria,checked);
      res.paths.push({id:rec.paths[p].id,label:rec.paths[p].label,met:pm}); if(pm)any=true; }
    res.met = any && res.sharedMet; }
  return res;
}
function rcVerdict(ev){
  var C=ASTHMA_DATA.BIO_COMMON;
  return ev.met ? {status:"MET",text:C.verdict_met,sw:C.switch_text}
                : {status:"NOT_MET",text:C.verdict_notmet,sw:null};
}
function findBio(id){ var B=ASTHMA_DATA.BIOLOGICS; for(var i=0;i<B.length;i++) if(B[i].id===id) return B[i]; }
</script>

    html += '</div>';

  return html;
}

  var html='<button type="button" class="back-btn" onclick="closeTopic()">← 도서관</button>';
  html += '<h2 class="topic-h">'+t.num+'. '+esc(t.title)+'</h2>';
  var R={ biologic:renderBiologicTopic, assess:renderAssess, tracks:renderTracks,
    inhaler:renderInhaler, device:renderDevice, monitor:renderMonitor,
    pheno:renderPheno, exac:renderExac, ait:renderAit, comorbid:renderComorbid, kcd:renderKcd };
  if(R[id]){ html += R[id](); }
  else { html += '<div class="placeholder">📋 준비 중</div>'; }
  if(A.DEEP && A.DEEP[id]){
    html += '<div class="deep-label">심화 — 펼쳐서 보기</div>'+deepBlocks(A.DEEP[id]);
  }
  return html;
}

/* ---------- 공통 섹션 헬퍼 ---------- */
function secCard(title, inner){ return '<div class="card"><div class="sec-title">'+esc(title)+'</div>'+inner+'</div>'; }

/* 아코디언: 심화 내용 접기/펼치기 */
function accToggle(key){ APP.acc[key]=!APP.acc[key]; render(); }
function deepAccordion(key, title, bodyHtml){
  var open=APP.acc[key];
  return '<div class="acc'+(open?' acc-open':'')+'">'+
    '<button type="button" class="acc-head" onclick="accToggle(\''+key+'\')">'+
    '<span class="acc-title">'+esc(title)+'</span><span class="acc-icon">'+(open?'−':'+')+'</span></button>'+
    (open?'<div class="acc-body">'+bodyHtml+'</div>':'')+'</div>';
}
/* 심화 블록을 리스트로 렌더 (deep 배열) */
function deepBlocks(deepArr){
  var h='';
  for(var i=0;i<deepArr.length;i++){ var d=deepArr[i];
    var body='';
    if(d.items){ body+='<ul class="kp">'; for(var j=0;j<d.items.length;j++) body+='<li>'+esc(d.items[j])+'</li>'; body+='</ul>'; }
    if(d.table){ body+=dataTable(d.table.cols, d.table.rows); }
    if(d.text){ body+='<div class="acc-text">'+esc(d.text)+'</div>'; }
    h += deepAccordion(d.key, d.title, body);
  }
  return h;
}
function kpList(arr){ var h='<ul class="kp">'; for(var i=0;i<arr.length;i++) h+='<li>'+esc(arr[i])+'</li>'; return h+'</ul>'; }
function calloutBox(text, kind){ return '<div class="callout '+(kind||'')+'">'+esc(text)+'</div>'; }
function dataTable(cols, rows){
  var h='<div class="tbl-wrap"><table class="tbl"><thead><tr>';
  for(var i=0;i<cols.length;i++) h+='<th>'+esc(cols[i])+'</th>'; h+='</tr></thead><tbody>';
  for(var r=0;r<rows.length;r++){ h+='<tr>'; for(var c=0;c<rows[r].length;c++) h+='<td>'+esc(rows[r][c])+'</td>'; h+='</tr>'; }
  return h+'</tbody></table></div>';
}

/* ---------- R-CHECK 모달 ---------- */
function openRcheck(drugId){ APP.rcheck={drugId:drugId, checked:{}}; renderModal(); document.getElementById("modalBg").className="modal-bg on"; }
function closeModal(){ document.getElementById("modalBg").className="modal-bg"; }
function rcToggle(cid){ APP.rcheck.checked[cid]=!APP.rcheck.checked[cid]; renderModal(); }

function renderCriteriaList(criteria){
  var html="";
  for(var i=0;i<criteria.length;i++){
    var c=criteria[i];
    var ck=APP.rcheck.checked[c.id]?"checked":"";
    html += '<div class="ck" onclick="rcToggle(\''+c.id+'\')">'+
      '<input type="checkbox" '+ck+' onclick="event.stopPropagation();rcToggle(\''+c.id+'\')">'+
      '<label>'+esc(c.label)+(c.required?'<span class="req">필수</span>':'')+'</label></div>';
  }
  return html;
}

function renderModal(){
  var d=findBio(APP.rcheck.drugId);
  var ev=rcEvaluate(d, APP.rcheck.checked);
  var v=rcVerdict(ev);
  var html='<div class="modal-head"><span class="modal-title">'+esc(d.brand)+' 급여 체크리스트</span>'+
    '<button type="button" class="modal-close" onclick="closeModal()">×</button></div>';
  html += '<div class="precond"><b>전제:</b> '+esc(d.precondition)+'<br><b>대상 연령:</b> '+esc(d.age)+'</div>';
  if(d.strict) html += '<div class="note-strict">'+esc(d.strict)+'</div>';
  // 공통 전제(ANY_PATH의 sharedChecks)
  if(d.sharedChecks){
    html += '<div class="phase-label">공통 전제조건</div>'+renderCriteriaList(d.sharedChecks);
  }
  html += '<div class="phase-label">투여대상 기준</div>';
  if(d.logic==="ALL"){
    html += renderCriteriaList(d.criteria);
  } else {
    html += '<div style="font-size:12.5px;color:var(--muted);margin-bottom:7px">아래 경로 중 하나를 충족 (+ 위 공통 전제)</div>';
    for(var p=0;p<d.paths.length;p++){
      var path=d.paths[p]; var pm=ev.paths[p].met;
      html += '<div class="path-group"><div class="path-head"><span>'+esc(path.label)+'</span>'+
        '<span style="color:'+(pm?'var(--met)':'var(--muted)')+'">'+(pm?'✓ 충족':'미충족')+'</span></div>'+
        renderCriteriaList(path.criteria)+'</div>';
    }
  }
  var cls=v.status==="MET"?"met":"notmet";
  var label=v.status==="MET"?"✓ 투여대상 기준 충족":"→ 급여 미충족 · 100/100 경로";
  html += '<div class="verdict '+cls+'"><div class="v-status">'+label+'</div>'+
    '<div class="v-text">'+esc(v.text)+'</div>';
  if(v.sw) html += '<div class="switch-warn"><b>⚠ 교체투여 주의</b>'+esc(v.sw)+'</div>';
  html += '</div>';
  // 평가·중단 (4부 구조의 나머지)
  html += '<div class="phase-label">반응 평가</div><div class="eval-box">'+esc(d.eval)+'</div>';
  html += '<div class="phase-label">지속 / 중단</div><div class="eval-box">'+esc(d.stop)+'</div>';
  if(d.dose_note) html += '<div class="eval-box" style="margin-top:6px">'+esc(d.dose_note)+'</div>';
  html += '<div style="font-size:11px;color:var(--muted);margin-top:12px">'+esc(ASTHMA_DATA.BIO_COMMON.eos_note)+'<br>'+esc(ASTHMA_DATA.BIO_COMMON.reeval)+'<br>출처: 보건복지부 고시·심평원 약제 세부사항·식약처 허가사항.</div>';
  document.getElementById("modalContent").innerHTML = html;
}

/* ---------- 검색 ---------- */
function onSearch(q){
  q=(q||"").trim().toLowerCase();
  if(!q){ render(); return; }
  // 약제명 매칭 → 생물학제제 토픽
  var B=ASTHMA_DATA.BIOLOGICS;
  for(var i=0;i<B.length;i++){ if(B[i].brand.toLowerCase().indexOf(q)>=0 || B[i].ingredient.toLowerCase().indexOf(q)>=0){ APP.tab="lib"; openTopic("biologic"); return; } }
  // 토픽명 매칭
  var ts=ASTHMA_DATA.TOPICS;
  for(var j=0;j<ts.length;j++){ if(ts[j].title.toLowerCase().indexOf(q)>=0){ APP.tab="lib"; openTopic(ts[j].id); return; } }
}

function simToggleOpen(i){ APP.sim.opened[i]=!APP.sim.opened[i]; render(); }

/* ── 인터랙티브 매트릭스 (COPD 가이드 그림 재현) ── */
function mtxSet(which, id, v){ if(APP.mtx[which][id]===v) APP.mtx[which][id]=null; else APP.mtx[which][id]=v; render(); }
function calcStep(inp){
  var s=inp.sx, n=inp.night;
  if(!s) return -1;
  if(s==="daily") return 3;
  if(s==="most") return 2;
  if(n==="yes" && s==="mid") return 2;
  if(s==="mid") return 1;
  if(s==="low") return 0;
  return -1;
}
function calcBioRows(inp){
  var hits={}, eos=inp.eos, feno=inp.feno, allergy=inp.allergy;
  if(allergy==="yes") hits.allergic=true;
  if(eos==="ge300") hits.eos=true;
  if(eos==="150_300"||eos==="ge300"||feno==="ge25") hits.t2=true;
  if((eos==="lt150"||!eos) && feno==="lt25" && (allergy==="no"||!allergy)) hits.low=true;
  return hits;
}
function renderMatrix(which){
  var m=A.SIM.matrix[which], inp=APP.mtx[which];
  var h='<div class="mtx-box"><div class="mtx-title">'+esc(m.title)+'</div>'+
    '<div class="mtx-desc">'+esc(m.desc)+'</div>';
  for(var i=0;i<m.inputs.length;i++){ var f=m.inputs[i];
    h+='<div class="mtx-field"><div class="mtx-label">'+esc(f.label)+'</div><div class="mtx-chips">';
    for(var j=0;j<f.opts.length;j++){ var o=f.opts[j];
      var on=inp[f.id]===o.v;
      h+='<button type="button" class="mtx-chip'+(on?" on":"")+'" onclick="mtxSet(\''+which+'\',\''+f.id+'\',\''+o.v+'\')">'+esc(o.t)+'</button>';
    }
    h+='</div></div>';
  }
  if(which==="step"){
    var hitIdx=calcStep(inp);
    h+='<div class="mtx-grid">';
    for(var r=0;r<m.rows.length;r++){ var row=m.rows[r];
      var cls=hitIdx===r?"hit":(hitIdx>=0?"dim":"");
      h+='<div class="mtx-row '+cls+'">'+
        '<div class="mtx-step">'+(cls==="hit"?'<span class="mtx-hitlabel">내 환자</span>':"")+esc(row.step)+'</div>'+
        '<div class="mtx-cond">'+esc(row.cond)+'</div>'+
        '<div class="mtx-rx"><b>T1:</b> '+esc(row.t1)+'<br><b>T2:</b> '+esc(row.t2)+'</div></div>';
    }
    h+='</div>';
  } else {
    var hits=calcBioRows(inp), any=false;
    for(var k in hits){ if(hits[k]){any=true;break;} }
    h+='<div class="mtx-grid">';
    for(var b=0;b<m.rows.length;b++){ var br=m.rows[b];
      var hit=hits[br.key], cls=hit?"hit":(any?"dim":"");
      h+='<div class="mtx-row '+cls+'">'+
        '<div class="mtx-step">'+(hit?'<span class="mtx-hitlabel">해당</span>':"")+esc(br.ph)+'</div>'+
        '<div class="mtx-cond">'+esc(br.crit)+'</div>'+
        '<div class="mtx-rx">'+esc(br.drug)+'</div></div>';
    }
    h+='</div>';
  }
  h+=calloutBox(m.note,"warn")+'</div>';
  return h;
}

/* 까먹음 방지 트리거 — 항상 환기 (접이식) */
function renderTriggers(){
  var open=APP.acc.trig;
  var h='<div class="trig-box'+(open?' trig-open':'')+'">'+
    '<button type="button" class="trig-head" onclick="accToggle(\'trig\')">'+
    '<span>⚡ 놓치기 쉬운 것 — 항상 확인</span><span class="trig-ic">'+(open?'−':'+')+'</span></button>';
  if(open){
    var ts=A.SIM.triggers;
    for(var i=0;i<ts.length;i++){
      h += '<div class="trig-item"><div class="trig-when">'+esc(ts[i].icon)+' '+esc(ts[i].when)+'</div>'+
        '<div class="trig-act">'+esc(ts[i].action)+'</div></div>';
    }
  }
  h += '</div>';
  return h;
}

/* 선택지 클릭 시 도서관 데이터를 시뮬 안에서 직접 풀어서 보여줌 */
function renderExpand(type){
  if(type==="ics_step"){
    // ICS 용량 등급표 + Track step 직접 표시
    var t=A.TRACKS, h='<div class="ex-h">ICS 용량 등급 (성인 µg/day)</div>'+dataTable(t.ics.cols,t.ics.rows);
    h+='<div class="ex-h">Track별 단계 — 한 단계 위로</div>';
    h+='<div class="ex-mini">Track1(MART): ';
    for(var i=0;i<t.track1.length;i++) h+=(i?' · ':'')+t.track1[i].step+'단계 '+esc(t.track1[i].ex||t.track1[i].controller);
    h+='</div><div class="ex-mini">Track2: ';
    for(var j=0;j<t.track2.length;j++) h+=(j?' · ':'')+t.track2[j].step+'단계 '+esc(t.track2[j].ex||t.track2[j].controller);
    h+='</div>';
    return h;
  }
  if(type==="lama"){
    // 3제(LAMA 포함) 흡입제만 필터 + 천식/COPD 구분
    var h='<div class="ex-h">LAMA 추가 옵션 — 천식 적응 확인 필수</div>';
    var list=A.INHALERS.list.filter(function(x){return x.type.indexOf("LAMA")>=0||x.type.indexOf("3제")>=0;});
    for(var i=0;i<list.length;i++){ var x=list[i];
      var warn=x.badge.indexOf("⚠")>=0;
      h+='<div class="ex-drug'+(warn?' ex-warn':'')+'"><b>'+esc(x.brand)+'</b> — '+esc(x.feat)+'</div>';
    }
    h+='<div class="ex-note">★별도 LAMA 단독(스피리바 레스피맷)을 기존 ICS-LABA에 추가하는 방법도 있음. T2-low에서 특히 고려.</div>';
    return h;
  }
  if(type==="oral"){
    var oa=A.TRACKS.oral_addon, h='<div class="ex-h">'+esc(oa.title)+'</div>';
    for(var i=0;i<oa.items.length;i++){ var it=oa.items[i];
      h+='<div class="ex-drug"><b>'+esc(it.name)+'</b> ('+esc(it.drug)+') — '+esc(it.note)+'</div>'; }
    h+='<div class="ex-note">'+esc(oa.note)+'</div>';
    return h;
  }
  if(type==="track_compare"){
    return '<div class="ex-h">Track 1 vs Track 2</div>'+
      '<div class="ex-drug"><b>Track 1 (MART)</b> — 유지+증상완화를 한 흡입기로(ICS-formoterol). 흡입기 1개라 술기오류·순응도 유리. SABA 단독보다 악화↓.</div>'+
      '<div class="ex-drug"><b>Track 2</b> — 매일 controller + 별도 reliever(SABA/ICS-SABA). MART에 익숙지 않거나 formoterol 접근 어려울 때.</div>'+
      '<div class="ex-note">환자 선호·순응도·기존 익숙함으로 선택. 정답 없음.</div>';
  }
  if(type==="pheno_bio"){
    var ph=A.PHENO, h='<div class="ex-h">표현형 → 해당 생물학제제</div>';
    for(var i=0;i<ph.types.length;i++){ var t=ph.types[i];
      h+='<div class="ex-drug"><b>'+esc(t.label)+'</b> ('+esc(t.crit)+') → '+esc(t.bio)+'</div>'; }
    h+='<div class="ex-note">먼저 혈중 호산구·FeNO·총IgE·통년성 특이IgE(MAST/RAST) 확보 → 아래 "생물학제제 검토"에서 R-CHECK로 급여 확인.</div>';
    return h;
  }
  if(type==="technique"){
    var d=A.DEVICE, h='<div class="ex-h">흔한 흡입 오류</div>';
    for(var i=0;i<d.errors.length;i++) h+='<div class="ex-drug">• '+esc(d.errors[i])+'</div>';
    h+='<div class="ex-note">'+esc(d.key)+'</div>';
    return h;
  }
  if(type==="comorbid"){
    var d=A.COMORBID, h='<div class="ex-h">'+esc(d.intro)+'</div>';
    for(var i=0;i<d.domains.length;i++){ h+='<div class="ex-drug"><b>'+esc(d.domains[i].group)+'</b>: '+d.domains[i].items.join(' · ')+'</div>'; }
    return h;
  }
  if(type==="ocs"){
    var d=A.EXAC, h='<div class="ex-h">OCS 사용·누적</div>';
    h+='<div class="ex-drug"><b>단기</b> '+esc(d.ocs_acute)+'</div>';
    h+='<div class="ex-drug"><b>장기</b> '+esc(d.ocs_long)+'</div>';
    h+='<div class="ex-note">'+esc(d.taper.candidate)+'</div>';
    return h;
  }
  return '';
}

function simCrumb(){
  var labels={"new":"신규",uncontrolled:"미조절",acute:"급성악화",biologic:"생물학제제"};
  var cur=APP.sim.route;
  return '<div class="sim-crumb">'+
    (cur?'<button type="button" class="back-btn" onclick="simReset()">↺ 상황 다시 선택</button><span class="crumb-cur">'+esc(labels[cur]||"")+'</span>':'<span></span>')+
    '</div>';
}

function stageBox(text){ return '<div class="stage-box"><span class="stage-tag">CHECK</span>'+esc(text)+'</div>'; }

/* 체크리스트 스텝 렌더 (신규·급성 경로) */
function renderStepChecklist(grp){
  var h='<div class="base-grp-h">'+esc(grp.h)+'</div><ul class="gate-checklist">';
  for(var i=0;i<grp.items.length;i++) h+='<li>'+esc(grp.items[i])+'</li>';
  return h+'</ul>';
}

function renderSim(){
  var S=A.SIM, route=APP.sim.route, h=simCrumb();

  // 진입점: 상황 선택
  if(!route){
    h += renderTriggers();
    h += '<div class="sim-q">'+esc(S.entry.q)+'</div>';
    for(var i=0;i<S.entry.options.length;i++){ var o=S.entry.options[i];
      h += '<button type="button" class="sim-route" onclick="simRoute(\''+o.goto+'\')">'+
        '<div class="route-label">'+esc(o.label)+'</div><div class="route-desc">'+esc(o.desc)+'</div></button>';
    }
    return h;
  }

  // ── 경로 1: 신규 (진단 → 단계 매트릭스 → 시작) ──
  if(route==="new"){
    var N=S["new"];
    h += '<div class="sim-q">'+esc(N.title)+'</div>';
    for(var s=0;s<N.steps.length;s++){ var st=N.steps[s];
      if(st.type==="checklist"){ h += '<div class="card">'+renderStepChecklist({h:st.h,items:st.items})+'</div>'; }
      else if(st.type==="matrix"){ h += '<div class="base-grp-h" style="margin-left:2px">'+esc(st.h)+'</div>'+renderMatrix(st.which); }
    }
    h += '<div class="summary-box"><div class="summary-tag">간단한 답</div>'+esc(N.summary)+'</div>';
    return h;
  }

  // ── 경로 2: 미조절 (게이트 → 선택지) ──
  if(route==="uncontrolled"){
    var U=S.uncontrolled;
    h += '<div class="sim-q">'+esc(U.title)+'</div>';
    h += calloutBox(U.intro,'accent');
    h += '<div class="deep-label">올리기 전 점검</div>';
    for(var g=0;g<U.gate.length;g++){ var c=U.gate[g]; var on=APP.sim.gate[g];
      h += '<div class="gate-item"><div class="gate-head" onclick="simToggleGate('+g+')">'+
        '<input type="checkbox" '+(on?'checked':'')+' onclick="event.stopPropagation();simToggleGate('+g+')"><b>'+esc(c.label)+'</b>'+
        '<span class="gate-toggle">'+(on?'▲':'▼ 점검항목')+'</span></div>';
      if(on){
        h += '<div class="gate-reveal">'+esc(c.summary)+'</div><ul class="gate-checklist">';
        for(var ci=0;ci<c.items.length;ci++) h+='<li>'+esc(c.items[ci])+'</li>';
        h += '</ul><a class="topic-link gate-link" onclick="gotoTopic(\''+c.link+'\')">→ '+esc(findTopic(c.link).title)+' 자세히</a>';
      }
      h += '</div>';
    }
    h += '<div class="deep-label">점검해도 미조절이면 — 선택지</div>';
    for(var k=0;k<U.options.length;k++){ var op=U.options[k];
      h += '<button type="button" class="sim-opt consider" onclick="simToggleOpen('+k+')"><span class="consider-dot">'+(APP.sim.opened[k]?'●':'○')+'</span>'+esc(op.label)+'</button>';
      if(APP.sim.opened[k]){
        h += '<div class="opt-reveal">'+esc(op.reveal)+'</div>';
        if(op.expand) h += '<div class="opt-detail">'+renderExpand(op.expand)+'</div>';
        if(op.goto) h += '<button type="button" class="sim-next" onclick="simRoute(\''+op.goto+'\')">생물학제제 경로로 →</button>';
      }
    }
    h += '<div class="summary-box"><div class="summary-tag">간단한 답</div>'+esc(U.summary)+'</div>';
    return h;
  }

  // ── 경로 3: 급성 악화 (처치 → 퇴원 → 재발방지) ──
  if(route==="acute"){
    var AC=S.acute;
    h += '<div class="sim-q">'+esc(AC.title)+'</div>';
    for(var a=0;a<AC.steps.length;a++){ h += '<div class="card">'+renderStepChecklist(AC.steps[a])+'</div>'; }
    h += '<div class="summary-box"><div class="summary-tag">간단한 답</div>'+esc(AC.summary)+'</div>';
    return h;
  }

  // ── 경로 4: 생물학제제 (표현형 매트릭스 → R-CHECK) ──
  if(route==="biologic"){
    var B=S.biologic;
    h += '<div class="sim-q">'+esc(B.title)+'</div>';
    if(B.stage) h += stageBox(B.stage);
    h += renderMatrix("bio");
    h += calloutBox(B.intro,'accent');
    var bl=A.BIOLOGICS;
    for(var b=0;b<bl.length;b++){ var d=bl[b];
      h += '<div class="bio-card"><div class="bio-row"><span class="bio-name">'+esc(d.brand)+'</span>'+
        '<span class="bio-pill">'+esc(d.target)+'</span></div>'+
        '<div class="bio-meta">'+esc(d.ingredient)+' · 급여 '+esc(d.date)+'</div>'+
        '<button type="button" class="bio-cta" onclick="openRcheck(\''+d.id+'\')">급여 체크리스트 열기 →</button></div>';
    }
    h += calloutBox(A.BIO_COMMON.switch_text,'warn');
    h += '<div class="summary-box"><div class="summary-tag">간단한 답</div>'+esc(B.summary)+'</div>';
    return h;
  }
  return h;
}

/* 시뮬→도서관 토픽 점프 */
function gotoTopic(id){ APP.tab="lib"; APP.topic=id; APP.acc={};
  document.getElementById("tab-lib").className="tab on";
  document.getElementById("tab-sim").className="tab";
  render(true);
}

/* ---------- 메인 렌더 ---------- */
function render(scrollTop){
  var v=document.getElementById("view");
  if(APP.tab==="lib"){
    v.innerHTML = APP.topic ? renderTopicDetail(APP.topic) : renderLibraryGrid();
  } else {
    v.innerHTML = renderSim();
  }
  if(scrollTop) window.scrollTo(0,0);
}
render();
</script>
