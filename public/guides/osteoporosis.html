<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>골다공증 처방가이드</title>
<style>
:root{
  --amber:#C9852A; --amber-d:#A66A1E; --amber-l:#F3E2C7;
  --bone:#6E6354; --bone-l:#EFEAE0;
  --bg:#F5F4F1; --card:#FFFFFF; --ink:#241F18; --muted:#6E665B;
  --line:#E2DCD0;
  --ok:#1E8449; --ok-bg:#E5F3EB; --ok-bd:#BFE3CC;
  --warn:#B7791F; --warn-bg:#FBF0DA; --warn-bd:#ECD49A;
  --danger:#C0392B; --danger-bg:#FBE9E7; --danger-bd:#F0C2BC;
  --info:#2E6DA4; --info-bg:#E8F1F9; --info-bd:#C2DBF0;
  --radius:14px;
  --shadow:0 1px 3px rgba(40,30,10,.07),0 1px 2px rgba(40,30,10,.05);
  --shadow-h:0 6px 18px rgba(40,30,10,.12);
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:17px;line-height:1.6;-webkit-font-smoothing:antialiased}
.wrap{max-width:1000px;margin:0 auto;padding:18px 16px 90px}
.hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:6px}
.hd h1{font-size:24px;font-weight:800;letter-spacing:-.3px;display:flex;align-items:center;gap:9px}
.hd .dot{width:11px;height:11px;border-radius:50%;background:var(--amber);box-shadow:0 0 0 3px var(--amber-l)}
.hd .asof{font-size:13px;color:var(--info);font-weight:700}
.tabs{display:flex;border-bottom:1px solid var(--line);margin:12px 0 18px}
.tab{flex:1;text-align:center;padding:14px 6px;cursor:pointer;font-weight:700;color:var(--muted);position:relative;font-size:16.5px;display:flex;align-items:center;justify-content:center;gap:6px;background:none;border:none;font-family:inherit}
.tab.active{color:var(--amber-d)}
.tab.active::after{content:"";position:absolute;left:8%;right:8%;bottom:-1px;height:3px;background:var(--amber);border-radius:3px 3px 0 0}
.note{background:var(--ok-bg);border:1px solid var(--ok-bd);border-radius:11px;padding:13px 16px;font-size:15px;color:#27623f;margin-bottom:14px}
.note b{color:#1c4a30}
.search{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:14px 17px;margin-bottom:16px;box-shadow:var(--shadow)}
.search .si{font-size:19px}
.search input{border:none;outline:none;flex:1;font-size:16.5px;background:none;font-family:inherit;color:var(--ink)}
.search input::placeholder{color:#ABA499}
.flowbar{background:linear-gradient(135deg,#B23A2E,#8E2A20);color:#fff;border-radius:13px;padding:16px 18px;margin-bottom:20px;cursor:pointer;box-shadow:var(--shadow-h)}
.flowbar h3{font-size:18px;font-weight:800;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.flowbar p{font-size:14.5px;opacity:.95}
.seclabel{display:flex;align-items:center;gap:9px;margin:22px 2px 11px;font-size:15px;font-weight:800;color:var(--bone)}
.seclabel .line{flex:1;height:1px;background:var(--line)}
.srchsub{font-size:13.5px;font-weight:800;color:var(--amber-d);margin:14px 2px 8px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
@media(max-width:680px){.grid{grid-template-columns:1fr}.hd h1{font-size:20px}body{font-size:16px}}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px 17px 14px;cursor:pointer;box-shadow:var(--shadow);border-top:3px solid var(--amber);transition:transform .12s,box-shadow .12s;position:relative}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow-h)}
.card:hover .cardgo{opacity:1}
.card .top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.card .tno{font-size:12.5px;font-weight:800;color:var(--muted);display:flex;align-items:center;gap:6px}
.card .tno .emo{font-size:19px}
.card .pill{font-size:11.5px;font-weight:800;padding:4px 10px;border-radius:20px;white-space:nowrap}
.pill.clin{background:var(--amber-l);color:var(--amber-d)}
.pill.risk{background:var(--ok-bg);color:var(--ok)}
.pill.reimb{background:var(--warn-bg);color:var(--warn)}
.pill.intl{background:var(--info-bg);color:var(--info)}
.pill.code{background:var(--bone-l);color:var(--bone)}
.card h4{font-size:18px;font-weight:800;letter-spacing:-.2px;margin-bottom:5px}
.card .desc{font-size:14px;color:var(--muted);line-height:1.5}
.card .cardgo{font-size:13px;font-weight:800;color:var(--amber-d);margin-top:9px;opacity:.55;transition:opacity .12s}
.card.b-risk{border-top-color:var(--ok)} .card.b-reimb{border-top-color:var(--warn)}
.card.b-intl{border-top-color:var(--info)} .card.b-code{border-top-color:var(--bone)}
.detailbar{display:flex;align-items:center;gap:12px;margin-bottom:16px;position:sticky;top:0;background:var(--bg);padding:8px 0 12px;z-index:10;border-bottom:1px solid var(--line)}
.backbtn{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 15px;font-weight:800;cursor:pointer;font-size:15px;color:var(--amber-d);font-family:inherit;box-shadow:var(--shadow);flex-shrink:0}
.backbtn:hover{background:var(--amber-l)}
.detailbar h2{font-size:20px;font-weight:800}
.cbox{background:var(--card);border:1px solid var(--line);border-radius:13px;margin-bottom:14px;overflow:hidden;box-shadow:var(--shadow);border-left:5px solid var(--amber)}
.cbox.info{border-left-color:var(--info)} .cbox.ok{border-left-color:var(--ok)}
.cbox.warn{border-left-color:var(--warn)} .cbox.danger{border-left-color:var(--danger)}
.cbox-h{font-size:16.5px;font-weight:800;padding:13px 17px;background:var(--bone-l);color:var(--ink)}
.cbox.info .cbox-h{background:var(--info-bg);color:#235176}
.cbox.ok .cbox-h{background:var(--ok-bg);color:#1c5a36}
.cbox.warn .cbox-h{background:var(--warn-bg);color:#7a5512}
.cbox.danger .cbox-h{background:var(--danger-bg);color:#8a2a20}
.cbox-b{padding:14px 17px}
.sub{font-size:13.5px;font-weight:800;color:var(--bone);margin:14px 0 7px;padding-left:9px;border-left:3px solid var(--amber-l)}
.row{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid var(--line);font-size:15px}
.row:last-child{border-bottom:none}
.row .k{font-weight:800;color:var(--bone);font-size:13.5px;min-width:90px;flex-shrink:0}
.row .v{flex:1}
.note-line{font-size:14px;color:var(--muted);margin-top:8px;line-height:1.55}
.muted-line{font-size:14px;color:var(--muted);margin-bottom:10px}
ul.li{margin:7px 0 7px 2px;padding-left:20px}
ul.li li{margin:6px 0;font-size:15px;line-height:1.6}
.redx{color:var(--danger);font-weight:900;font-size:1.05em;margin-right:2px}
.bigwarn{background:var(--danger-bg);border:1px solid var(--danger-bd);border-radius:9px;padding:12px 14px;font-size:15px;color:#8a2a20;font-weight:600;line-height:1.5}
.hl{border-radius:9px;padding:11px 14px;margin:10px 0;font-size:14.5px;line-height:1.55}
.hl.ok{background:var(--ok-bg);border:1px solid var(--ok-bd);color:#1c5a36}
.hl.warn{background:var(--warn-bg);border:1px solid var(--warn-bd);color:#7a5512}
.hl.danger{background:var(--danger-bg);border:1px solid var(--danger-bd);color:#8a2a20}
.hl.info{background:var(--info-bg);border:1px solid var(--info-bd);color:#235176}
.tag{display:inline-block;font-size:12.5px;font-weight:800;padding:3px 10px;border-radius:7px;margin-right:5px;white-space:nowrap}
.t-ok{background:var(--ok-bg);color:var(--ok)} .t-warn{background:var(--warn-bg);color:var(--warn)}
.t-danger{background:var(--danger-bg);color:var(--danger)} .t-info{background:var(--info-bg);color:var(--info)}
.toggle{display:flex;gap:8px;margin:0 0 16px;background:var(--bone-l);padding:6px;border-radius:11px}
.toggle button{flex:1;padding:11px;border:none;background:none;border-radius:8px;font-weight:800;font-size:15px;cursor:pointer;color:var(--muted);font-family:inherit}
.toggle button.on{background:var(--card);color:var(--amber-d);box-shadow:var(--shadow)}
.drugcard{border:1px solid var(--line);border-radius:12px;margin-bottom:11px;overflow:hidden;box-shadow:var(--shadow)}
.drugcard .dh{padding:14px 16px;background:var(--card);cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px}
.drugcard.open .dh{background:var(--amber-l)}
.drugcard .dn{font-weight:800;font-size:16.5px}
.drugcard .db{font-size:13px;color:var(--muted);margin-top:2px}
.drugcard .dhr{display:flex;align-items:center;gap:6px;flex-shrink:0}
.drugcard .dbody{padding:14px 16px;display:none;border-top:1px solid var(--line)}
.drugcard.open .dbody{display:block}
.drugcard .chev{color:var(--muted);font-size:14px;transition:transform .15s}
.drugcard.open .chev{transform:rotate(180deg)}
.simbox{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:var(--shadow)}
.field{margin-bottom:13px}
.field label{display:block;font-size:13.5px;font-weight:800;color:var(--bone);margin-bottom:5px}
.field input,.field select{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:9px;font-size:16px;font-family:inherit;background:var(--bg)}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.chkrow{display:flex;flex-wrap:wrap;gap:8px 16px;margin:6px 0 14px}
.chk{display:flex;align-items:center;gap:7px;font-size:14.5px;cursor:pointer}
.chk input{width:17px;height:17px}
.btn{background:var(--amber);color:#fff;border:none;padding:13px 18px;border-radius:10px;font-weight:800;cursor:pointer;font-size:15.5px;font-family:inherit;width:100%;margin-top:4px}
.btn:hover{background:var(--amber-d)}
.btn.link{display:block;text-align:center;text-decoration:none;margin:8px 0}
.reslabel{font-size:16px;font-weight:800;color:var(--bone);margin:20px 2px 11px}
.resultcard{border-radius:14px;padding:16px 18px;margin-bottom:13px;border:1px solid;box-shadow:var(--shadow)}
.resultcard.rc-danger{background:var(--danger-bg);border-color:var(--danger-bd)}
.resultcard.rc-warn{background:var(--warn-bg);border-color:var(--warn-bd)}
.resultcard.rc-info{background:var(--info-bg);border-color:var(--info-bd)}
.resultcard.rc-ok{background:var(--ok-bg);border-color:var(--ok-bd)}
.resultcard .rc-badge{font-size:19px;font-weight:800;margin-bottom:5px}
.resultcard.rc-danger .rc-badge{color:#a3271b} .resultcard.rc-warn .rc-badge{color:#7a5512}
.resultcard.rc-info .rc-badge{color:#235176} .resultcard.rc-ok .rc-badge{color:#1c5a36}
.resultcard .rc-sub{font-size:15px;line-height:1.6;color:var(--ink)}
.resultcard.flagcard{padding:14px 16px}
.resultcard.rc-ok ul.li{margin-top:8px}
.rxgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:680px){.rxgrid{grid-template-columns:1fr}}
.rxcard{background:var(--card);border-radius:13px;padding:14px 15px;border:2px solid var(--line);box-shadow:var(--shadow)}
.rxcard.rx-good{border-color:var(--ok-bd)}
.rxcard.rx-bad{border-color:var(--danger-bd)}
.rxhead{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.rxrank{background:var(--amber);color:#fff;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0}
.rxname{font-size:17px;font-weight:800;flex:1}
.rxgrade{font-size:13.5px;color:var(--muted);margin-bottom:6px}
.rxnote{font-size:13.5px;color:var(--ink);background:var(--bg);border-radius:8px;padding:8px 10px;line-height:1.5}
.sources{margin-top:26px;padding:16px 18px;background:var(--card);border:1px solid var(--line);border-radius:13px;font-size:13.5px}
.sources h4{font-size:14px;color:var(--bone);margin-bottom:9px;display:flex;align-items:center;gap:6px}
.sources a{color:var(--info);text-decoration:none;word-break:break-all}
.sources li{margin:4px 0;list-style:none;color:var(--muted)}
table.cmp{width:100%;border-collapse:collapse;font-size:14px;margin:8px 0}
table.cmp th,table.cmp td{border:1px solid var(--line);padding:9px 11px;text-align:left;vertical-align:top}
table.cmp th{background:var(--bone-l);font-weight:800;color:var(--bone)}
.muted{color:var(--muted);font-size:13.5px}
.hidden{display:none}
</style>
</head>

    REIMB_ANABOLIC: REIMB_ANABOLIC, TEST_REIMB: TEST_REIMB, GIO: GIO,
    SEQUENCE: SEQUENCE, SAFETY: SAFETY, ADJUNCT: ADJUNCT, FRAX: FRAX,
    KCD: KCD, SOURCES: SOURCES
  };
})();
if (typeof module !== 'undefined' && module.exports) { module.exports = OP_DATA; }

<script>/* ============================================================
   골다공증 처방가이드 — ENGINE 레이어 (op_engine.js)
   DATA를 ID로만 참조. 임상 리터럴 하드코딩 금지.
   정문: recommend(patient) -> { drugs[], targets[], flags[] }
   ============================================================ */
var OP_ENGINE = (function (DATA) {
  'use strict';

  /* ---- BMD 평균값 판정 (op:rule:bmd_average) ---- */
  function bmdAverage(input) {
    // input: { lumbar:[L1,L2,L3,L4 (T)], hipTotal, femurNeck }
    var flags = [];
    var lumbarT = null;
    if (input.lumbar && input.lumbar.length) {
      var vals = input.lumbar.slice();
      // 배제 사유: 주변과 1.0 이상 차이 (자동 후보 탐지 — 경고만, 강제 배제 X)
      var mean = avg(vals);
      var outliers = [];
      for (var i = 0; i < vals.length; i++) {
        // 다른 부위 평균과 1.0 이상 차이나면 배제 후보
        var others = vals.filter(function (_, j) { return j !== i; });
        if (others.length && Math.abs(vals[i] - avg(others)) >= 1.0) outliers.push(i + 1);
      }
      if (outliers.length) {
        flags.push({ id: 'op:rule:bmd_average', severity: 'info',
          msg: 'L' + outliers.join(',L') + ' 부위가 주변과 1.0 이상 차이 — 배제 검토 대상(명확한 사유 필요). 임의 저값 선택 금지.' });
      }
      if (vals.length < 2) {
        flags.push({ id: 'op:rule:bmd_average', severity: 'warn', msg: '평가부위 2개 미만 — 진단 불인정 위험.' });
      }
      lumbarT = mean;
    }
    var hipT = null;
    if (input.hipTotal != null || input.femurNeck != null) {
      var cand = [];
      if (input.hipTotal != null) cand.push(input.hipTotal);
      if (input.femurNeck != null) cand.push(input.femurNeck);
      hipT = Math.min.apply(null, cand); // 낮은 부위
    }
    var dxT = minDefined([lumbarT, hipT]); // 진단 T = 둘 중 낮은 값
    flags.push({ id: 'op:rule:bmd_average', severity: 'info',
      msg: '진단 T-score = 요추 4부위 평균(' + fmt(lumbarT) + ') / hip 최저(' + fmt(hipT) + ') 중 낮은 값 = ' + fmt(dxT) });
    return { lumbarT: lumbarT, hipT: hipT, diagnosticT: dxT, flags: flags };
  }

  /* ---- 위험군 분류 (op:rule:classifyRisk) ---- */
  function classifyRisk(p) {
    var t = (p.tscore != null) ? p.tscore : null;
    var fx = p.fractureHistory || [];
    var vh = [];
    if (fx.length >= 2) vh.push('골절 ≥2개(다발)');
    if (p.recentFractureMonths != null && p.recentFractureMonths <= 24) vh.push('최근 ' + p.recentFractureMonths + '개월 골절');
    if (t != null && t < -3.0) vh.push('T < -3.0');
    if (p.fractureOnTreatment) vh.push('치료 중 골절');
    if (p.fraxMof != null && p.fraxMof >= 30) vh.push('FRAX MOF ≥30%');
    if (vh.length) return { level: 'veryhigh', label: '초고위험', reasons: vh, data: DATA.RISK.veryhigh };
    var hi = [];
    if (t != null && t <= -2.5) hi.push('골다공증(T≤-2.5)');
    if (fx.length) hi.push('골다공증 골절 병력');
    if (hi.length) return { level: 'high', label: '고위험', reasons: hi, data: DATA.RISK.high };
    return { level: 'normal', label: '치료대상 아님/골감소증', reasons: [], data: null };
  }

  /* ---- 약제 급여 게이트 (op:rule:gateReimbursement) ---- */
  function gateReimbursement(drugId, p) {
    var d = DATA.DRUGS[drugId];
    if (!d) return { covered: false, note: '미등록 약물' };
    var t = (p && p.tscore != null) ? p.tscore : null;
    var fx = (p && p.fractureHistory) ? p.fractureHistory : [];
    var r = d.reimb || {};
    // 골형성촉진제 2차 게이트
    if (d.classId === 'class:sclerostin_inhibitor' || d.classId === 'class:pth_analog') {
      if (d.notImported) return { covered: false, basis: null, note: '국내 미도입' };
      var unmet = [];
      if (!(p && p.priorBpFailed)) unmet.push('BP≥1종 실패/금기');
      if (drugId === 'drug:romosozumab' && !(p && p.age >= 65 && p.postmenopausal)) unmet.push('65세↑ 폐경후여성');
      if (drugId === 'drug:teriparatide' && !(p && p.age >= 65)) unmet.push('65세 이상');
      if (!(t != null && t <= -2.5)) unmet.push('T≤-2.5');
      if (!(fx.length >= 2)) unmet.push('골다공증 골절 ≥2개');
      return {
        covered: unmet.length ? '조건부(미충족)' : '조건부(충족)',
        basis: r.noticeId, unmet: unmet,
        conflict: r.conflict || DATA.REIMB_ANABOLIC.conflict,
        note: unmet.length ? ('미충족: ' + unmet.join(', ') + ' → 100/100 또는 삭감 위험') : '2차 급여요건 충족'
      };
    }
    // 일반원칙 약물
    var ok = (t != null && t <= -2.5) || fx.length > 0;
    return { covered: ok ? true : '미충족', basis: r.noticeId,
      gate: r.gate || null,
      note: ok ? '일반원칙 급여요건(T≤-2.5 또는 골절)' : 'T≤-2.5 미달·골절 없음 → 일반원칙 미충족(칼슘/HRT는 T≤-1.0 별도)' };
  }

  /* ---- 검사 급여 간격 (op:rule:test_reimbursement) ---- */
  function testInterval(input) {
    // input: { lastBmdDate, normalBmd, steroidOrPhpt, tscore, markerCountThisYear }
    var out = [];
    var bmd = DATA.TEST_REIMB.bmd;
    var intervalMonths = input.normalBmd ? 24 : 12;
    if (input.steroidOrPhpt && input.tscore != null && input.tscore <= -3) intervalMonths = 6;
    out.push({ test: 'BMD', intervalMonths: intervalMonths,
      next: addMonths(input.lastBmdDate, intervalMonths),
      note: input.steroidOrPhpt ? '스테로이드/부갑상선항진 예외 적용' : (input.normalBmd ? '정상골밀도 → 2년' : '추적 1년 이상(4주 먼저 시행 가능)') });
    var mk = (input.markerCountThisYear || 0);
    out.push({ test: '골표지자(CTX+P1NP)', remaining: Math.max(0, 2 - mk),
      note: '연 2회 이내. 올해 ' + mk + '회 사용 → 잔여 ' + Math.max(0, 2 - mk) + '회' });
    return out;
  }

  /* ---- SERM 분기 (op:rule:serm_pathway) ---- */
  function sermPathway(p) {
    // 현재 약이 SERM이고 추적 시
    var t = (p && p.tscore != null) ? p.tscore : null;
    var steps = [];
    if (t != null && t <= -2.5) {
      steps.push({ branch: 'T≤-2.5 유지/악화', recommend: 'BP 전환(직선 급여) ✅',
        warn: 'denosumab 직행 ⚠️ — 게이트가 "BP 실패" 명시, SERM 실패는 미해당 → 삭감위험' });
    } else if (t != null && t > -2.5 && t <= -2.0) {
      steps.push({ branch: '-2.5<T≤-2.0 호전', recommend: 'SERM·BP·denosumab 교체투여 가능(확대구간, 총6회) ✅', warn: null });
    }
    if (p && p.newFracture) steps.push({ branch: '신규 골절', recommend: '골절경로(3년 급여) 합류', warn: null });
    return { id: 'op:rule:serm_pathway', steps: steps };
  }

  /* ---- FRAX 임계값 (op:rule:frax_intervention) ---- */
  function fraxIntervention(mof, hip, set) {
    set = set || 'NOF(미국)';
    var th = null, list = DATA.FRAX.thresholds;
    for (var i = 0; i < list.length; i++) if (list[i].set === set) th = list[i];
    if (!th) return { exceeds: null, note: '임계값 세트 없음' };
    var exMof = (th.mof != null && mof != null) ? (mof >= th.mof) : null;
    var exHip = (th.hip != null && hip != null) ? (hip >= th.hip) : null;
    var exceeds = (exMof === true) || (exHip === true);
    return { set: set, exceeds: exceeds, exMof: exMof, exHip: exHip,
      note: DATA.FRAX.koreaNote + ' / ' + (exceeds ? '임계값 초과 — 치료 고려' : '임계값 미만') };
  }

  /* ---- 정문: recommend() ---- */
  function recommend(p) {
    p = p || {};
    var flags = [];
    var risk = classifyRisk(p);
    var drugs = [];
    var rank = 1;
    if (risk.data) {
      var fl = risk.data.firstLine;
      for (var i = 0; i < fl.length; i++) {
        var id = fl[i], d = DATA.DRUGS[id];
        if (!d) continue;
        var g = gateReimbursement(id, p);
        drugs.push({ id: id, classId: d.classId, ko: d.ko, rank: rank++,
          gradeClass: d.grade ? d.grade.cls : null,
          gradeRuleset: d.grade ? d.grade.ruleset : null,
          reimbursed: g.covered, reimbNote: g.note,
          notes: d.grade ? d.grade.note : '' });
      }
    }
    // 초고위험 상충 플래그
    if (risk.level === 'veryhigh') {
      flags.push({ id: 'op:rule:anabolic_conflict', severity: 'warn', msg: DATA.REIMB_ANABOLIC.conflict });
    }
    // denosumab 사용 중 리바운드 경고
    if (p.priorDrugs && p.priorDrugs.indexOf('drug:denosumab') !== -1) {
      flags.push({ id: 'op:rule:denosumab_rebound', severity: 'warn', msg: DATA.SEQUENCE.denosumabRebound });
    }
    // SERM 분기
    if (p.priorDrugs && (p.priorDrugs.indexOf('drug:raloxifene') !== -1 || p.priorDrugs.indexOf('drug:bazedoxifene') !== -1)) {
      var sp = sermPathway(p);
      if (sp.steps.length) flags.push({ id: 'op:rule:serm_pathway', severity: 'info', msg: 'SERM 전환 분기: ' + sp.steps.map(function (s) { return s.branch + '→' + s.recommend; }).join(' / ') });
    }
    var targets = [{ id: 'lab:bmd_tscore', goal: '치료 목표 T > -2.0 (급여 확대구간 활용)' },
                   { id: 'lab:vitd_25oh', goal: '≥30 ng/mL' }];
    return { risk: risk, drugs: drugs, targets: targets, flags: flags };
  }

  /* ---- util ---- */
  function avg(a) { var s = 0, n = 0; for (var i = 0; i < a.length; i++) if (a[i] != null) { s += a[i]; n++; } return n ? s / n : null; }
  function minDefined(a) { var v = null; for (var i = 0; i < a.length; i++) if (a[i] != null) v = (v == null) ? a[i] : Math.min(v, a[i]); return v; }
  function fmt(x) { return x == null ? '—' : (Math.round(x * 100) / 100); }
  function addMonths(dateStr, m) { if (!dateStr) return '(검사일 입력)'; var d = new Date(dateStr); if (isNaN(d)) return '(날짜 형식 오류)'; d.setMonth(d.getMonth() + m); return d.toISOString().slice(0, 10); }

  return {
    recommend: recommend, classifyRisk: classifyRisk, bmdAverage: bmdAverage,
    gateReimbursement: gateReimbursement, testInterval: testInterval,
    sermPathway: sermPathway, fraxIntervention: fraxIntervention
  };
})(OP_DATA);
if (typeof module !== 'undefined' && module.exports) { module.exports = OP_ENGINE; }
</script>

  function renderDrugGroup(group) {
    var host = $('drugList'); if (!host) return;
    var ids = Object.keys(D.DRUGS).filter(function (id) {
      var d = D.DRUGS[id]; var cls = D.CLASSES[d.classId];
      return cls && cls.group === group;
    });
    host.innerHTML = ids.map(function (id) { return drugCardHtml(D.DRUGS[id]); }).join('');
    Array.prototype.forEach.call(host.querySelectorAll('.drugcard'), function (el) {
      el.querySelector('.dh').onclick = function () { el.classList.toggle('open'); };
    });
  }
  function drugCardHtml(d) {
    var g = d.grade || {};
    var reimbTag = d.reimb && d.reimb.covered === true ? '<span class="tag t-ok">✅ 급여</span>' :
      (d.reimb && d.reimb.covered === '조건부' ? '<span class="tag t-warn">⚠️ 조건부</span>' :
      (d.notImported ? '<span class="tag t-info">국내 미도입</span>' : '<span class="tag t-danger">비급여</span>'));
    var h = '<div class="drugcard"><div class="dh"><div><div class="dn">' + d.ko +
      ' <span class="muted">(' + (d.route || '') + ')</span></div>' +
      '<div class="db">' + (d.brands && d.brands.length ? d.brands.join('·') + ' · ' : '') + (g.cls || '') + '</div></div>' +
      '<div class="dhr">' + reimbTag + ' <span class="chev">▾</span></div></div>';
    h += '<div class="dbody">';
    h += rows([['용법', d.dose || '—'], ['기전', d.mechanism || '—'], ['권고', (g.cls || '') + (g.note ? ' — ' + g.note : '')]]);
    if (d.contraindications) h += '<div class="sub">금기</div>' + ul(d.contraindications);
    if (d.reimb) {
      h += '<div class="hl ' + (d.reimb.covered === true ? 'ok' : 'warn') + '"><b>📋 급여:</b> ' + d.reimb.summary + '</div>';
      if (d.reimb.gate) h += '<div class="hl warn">' + d.reimb.gate + '</div>';
      if (d.reimb.conflict) h += '<div class="hl danger">' + d.reimb.conflict + '</div>';
    }
    if (d.safety) { h += '<div class="sub">🚨 안전성·모니터링</div>' + ul(d.safety); }
    if (d.rebound) h += '<div class="hl danger"><b>리바운드:</b> ' + d.rebound + '</div>';
    if (d.holiday) h += '<div class="hl info"><b>약물휴일:</b> ' + d.holiday + '</div>';
    if (d.sequence) h += '<div class="hl info"><b>순차:</b> ' + d.sequence + '</div>';
    if (d.monitoring) h += rows([['모니터링', d.monitoring]]);
    h += '</div></div>';
    return h;
  }

  function patientFormHtml(pfx) {
    return '<div class="fr2">' +
      '<div class="field"><label>성별</label><select id="' + pfx + '_sex"><option value="F">여성</option><option value="M">남성</option></select></div>' +

      '<label class="chk"><input type="checkbox" id="' + pfx + '_onrx"> 치료 중 골절</label>' +
      '<label class="chk"><input type="checkbox" id="' + pfx + '_bpfail"> BP 실패/금기</label>' +
      '<label class="chk"><input type="checkbox" id="' + pfx + '_prevDmab"> 과거 denosumab</label>' +
      '<label class="chk"><input type="checkbox" id="' + pfx + '_prevSerm"> 과거 SERM</label>' +
      '</div>';

  function readPatient(pfx) {
    var fxn = parseInt(($(pfx + '_fxn') || {}).value || '0', 10);
    var fh = []; for (var i = 0; i < fxn; i++) fh.push('fx');
    var prior = [];
    if ($(pfx + '_prevDmab').checked) prior.push('drug:denosumab');
    if ($(pfx + '_prevSerm').checked) prior.push('drug:raloxifene');
    return {
      sex: $(pfx + '_sex').value, age: parseInt($(pfx + '_age').value || '0', 10),
      postmenopausal: $(pfx + '_pmp').checked,
      tscore: $(pfx + '_t').value ? parseFloat($(pfx + '_t').value) : null,
      fractureHistory: fh,
      recentFractureMonths: $(pfx + '_recent').value ? parseInt($(pfx + '_recent').value, 10) : null,
      fractureOnTreatment: $(pfx + '_onrx').checked,
      priorBpFailed: $(pfx + '_bpfail').checked,
      priorDrugs: prior
    };
  }
  function runRecommend(pfx, outId) {
    var p = readPatient(pfx);
    var r = E.recommend(p);
    var lvl = r.risk.level;
    var h = '';
    h += '<div class="resultcard ' + (lvl === 'veryhigh' ? 'rc-danger' : lvl === 'high' ? 'rc-warn' : 'rc-info') + '">' +
      '<div class="rc-badge">' + (lvl === 'veryhigh' ? '🔴 초고위험' : lvl === 'high' ? '🟠 고위험' : '🟢 ' + r.risk.label) + '</div>' +
      (r.risk.reasons.length ? '<div class="rc-sub">근거: ' + r.risk.reasons.join(' · ') + '</div>' : '') + '</div>';

    if (r.drugs.length) {
      h += '<div class="reslabel">💊 권고 약제 <span class="muted">(등급순)</span></div>';
      h += '<div class="rxgrid">' + r.drugs.map(function (d) {
        var s = String(d.reimbursed);
        var bad = s.indexOf('미충족') !== -1 || s.indexOf('미달') !== -1;
        var rt = d.reimbursed === true ? '<span class="tag t-ok">✅급여</span>' :
          (bad ? '<span class="tag t-danger">⚠️미충족</span>' : (s.indexOf('충족') !== -1 ? '<span class="tag t-ok">✅충족</span>' : '<span class="tag t-warn">' + s + '</span>'));
        return '<div class="rxcard ' + (bad ? 'rx-bad' : 'rx-good') + '">' +
          '<div class="rxhead"><span class="rxrank">' + d.rank + '</span><span class="rxname">' + d.ko + '</span>' + rt + '</div>' +
          '<div class="rxgrade">' + (d.gradeClass || '') + ' · ' + (d.notes || '') + '</div>' +
          '<div class="rxnote">' + (d.reimbNote || '') + '</div></div>';
      }).join('') + '</div>';
    } else {
      h += '<div class="resultcard rc-info"><div class="rc-sub">치료대상 기준 미충족(골감소증 등). FRAX 보조평가 고려.</div></div>';
    }

    if (r.flags.length) {
      h += '<div class="reslabel">⚠️ 플래그 · 주의</div>';
      h += r.flags.map(function (f) {
        var cls = f.severity === 'warn' ? 'rc-warn' : f.severity === 'danger' ? 'rc-danger' : 'rc-info';
        return '<div class="resultcard ' + cls + ' flagcard"><div class="rc-sub">' + f.msg + '</div></div>';
      }).join('');
    }
    h += '<div class="resultcard rc-ok"><div class="rc-badge">🎯 치료 목표</div>' + ul(r.targets.map(function (t) { return t.goal; })) + '</div>';
    $(outId).innerHTML = h;
  }

  function cardKeywords(c) {
    var kw = c.title + ' ' + c.desc;
    if (c.id === 'drugs') kw += ' ' + Object.keys(D.DRUGS).map(function (id) { var d = D.DRUGS[id]; return d.ko + ' ' + id + ' ' + (d.brands || []).join(' '); }).join(' ');
    if (c.id === 'dx') kw += ' T-score BMD DXA QCT 골표지자 CTX P1NP 평균 삭감 진단';
    if (c.id === 'test') kw += ' 골밀도 검사 급여 비타민D 25 OH 골표지자 횟수 간격';
    if (c.id === 'reimb') kw += ' 급여 고시 100/100 일반원칙 프롤리아 이베니티 포스테오 교체';
    if (c.id === 'frax') kw += ' FRAX 골절위험 10년 임계값';
    if (c.id === 'adj') kw += ' 근감소증 sarcopenia 칼슘 비타민D 운동 AWGS 낙상';
    if (c.id === 'gio') kw += ' 스테로이드 글루코코르티코이드 prednisolone GIO';
    if (c.id === 'seq') kw += ' 순차 전환 리바운드 SERM 사다리';
    return kw.toLowerCase();
  }
  function runSearch(q) {
    var host = $('searchResult');
    if (!q) { host.classList.add('hidden'); host.innerHTML = ''; $('cardHost').classList.remove('hidden'); return; }
    var ql = q.toLowerCase();
    var hits = CARDS.filter(function (c) { return cardKeywords(c).indexOf(ql) !== -1; });
    var drugHits = Object.keys(D.DRUGS).filter(function (id) {
      var d = D.DRUGS[id];
      return (d.ko + ' ' + id + ' ' + (d.brands || []).join(' ')).toLowerCase().indexOf(ql) !== -1;
    });
    var h = '<div class="seclabel">🔎 "' + q + '" 검색결과<span class="line"></span></div>';
    if (drugHits.length) {
      h += '<div class="srchsub">약물 (' + drugHits.length + ')</div><div class="grid">';
      h += drugHits.map(function (id) {
        var d = D.DRUGS[id];
        return '<div class="card" onclick="openPage(\'drugs\')"><div class="top"><span class="tno"><span class="emo">💊</span>약물</span></div>' +
          '<h4>' + d.ko + '</h4><div class="desc">' + (d.brands || []).join('·') + ' · ' + ((d.grade || {}).cls || '') + ' → 약제 카드에서 보기</div><div class="cardgo">열기 →</div></div>';
      }).join('') + '</div>';
    }
    if (hits.length) h += '<div class="srchsub">관련 카드 (' + hits.length + ')</div><div class="grid" id="srchcards"></div>';
    if (!hits.length && !drugHits.length) h += '<p class="muted" style="padding:24px;text-align:center;font-size:16px">검색 결과 없음</p>';
    host.innerHTML = h;
    if (hits.length) { var g = host.querySelector('#srchcards'); hits.forEach(function (c) { g.appendChild(cardEl(c)); }); }
    $('cardHost').classList.add('hidden');
    host.classList.remove('hidden');
  }

  function renderSources() {
    $('sources').innerHTML = '<h4>📚 출처·가이드라인</h4><ul>' +
      D.SOURCES.map(function (s) {
        return '<li>' + (s.url ? '<a href="' + s.url + '" target="_blank">' + s.label + ' ↗</a>' : s.label) + '</li>';
      }).join('') + '</ul><p class="muted" style="margin-top:8px">작성 박형도 · asOf ' + D.META.asOf + ' · 조언 보조용, 최종 책임 처방의</p>';
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init); else init();
})(OP_DATA, OP_ENGINE);
</script>
</body>
</html>
