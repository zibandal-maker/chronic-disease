<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>만성콩팥병(CKD) 처방가이드</title>
<style>
:root{
  --ckd:#5B4B8A; --ckd2:#7C6BB0; --ckd-bg:#F5F3FA; --ckd-line:#E2DCF0;
  --green:#2E7D32; --yellow:#F9A825; --orange:#EF6C00; --red:#C62828;
  --ink:#1F1B2E; --gray:#6B6580; --card:#FFFFFF;
  --r1:#C62828; --r2:#EF6C00; --r3:#F9A825;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  background:var(--ckd-bg);color:var(--ink);font-size:15px;line-height:1.55;-webkit-text-size-adjust:100%;}
.wrap{max-width:760px;margin:0 auto;padding:0 0 80px;}
header{background:linear-gradient(135deg,var(--ckd),var(--ckd2));color:#fff;padding:18px 16px 14px;}
header h1{margin:0;font-size:19px;font-weight:700;letter-spacing:-.3px;}
header p{margin:4px 0 0;font-size:12px;opacity:.92;}
.tabs{display:flex;background:#fff;border-bottom:1px solid var(--ckd-line);position:sticky;top:0;z-index:50;}
.tab{flex:1;border:none;background:none;padding:11px 4px;font-size:13px;font-weight:600;color:var(--gray);
  cursor:pointer;border-bottom:3px solid transparent;font-family:inherit;min-height:46px;}
.tab.on{color:var(--ckd);border-bottom-color:var(--ckd);}
.tab .ico{display:block;font-size:18px;margin-bottom:1px;}
.view{display:none;padding:14px 14px 0;}
.view.on{display:block;}
.card{background:var(--card);border:1px solid var(--ckd-line);border-radius:13px;padding:13px 14px;margin-bottom:11px;}
.card h3{margin:0 0 8px;font-size:15px;color:var(--ckd);display:flex;align-items:center;gap:6px;}
.muted{color:var(--gray);font-size:13px;}
details{margin:7px 0 0;}
details{margin:8px 0 0;border:1px solid var(--ckd-line);border-radius:11px;background:#fff;overflow:hidden;}
details>summary{cursor:pointer;font-weight:700;font-size:14px;color:var(--ckd);padding:12px 40px 12px 14px;
  list-style:none;position:relative;background:#FBFAFE;min-height:46px;display:flex;align-items:center;}
details>summary::-webkit-details-marker{display:none;}
details>summary:after{content:"펼치기 ▸";position:absolute;right:13px;top:50%;transform:translateY(-50%);
  font-size:11px;font-weight:700;color:var(--ckd2);background:var(--ckd-bg);padding:3px 9px;border-radius:20px;}
details[open]>summary{border-bottom:1px solid var(--ckd-line);}
details[open]>summary:after{content:"접기 ▾";}
details>summary:before{content:none;}
/* details 내부 콘텐츠 패딩 */
details>*:not(summary){margin-left:14px;margin-right:14px;}
details>*:not(summary):last-child{margin-bottom:12px;}
details>summary~*{padding-top:2px;}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;vertical-align:middle;}
.b-guide{background:#E8F0FE;color:#1A56C4;}
.b-reimb{background:#FFF1E0;color:#C46A00;}
.b-conflict{background:#FFE5E5;color:#C62828;border:1px solid #F3B8B8;}
.b-grade{background:#EDE9F7;color:var(--ckd);}
.flag{border-radius:11px;padding:11px 13px;margin-bottom:9px;border:1.5px solid;}
.flag.emergency{background:#FFEBEE;border-color:var(--red);}
.flag.urgent{background:#FFF3E0;border-color:var(--orange);}
.flag.early{background:#FFFDE7;border-color:#C9A516;}
.flag.info{background:var(--ckd-bg);border-color:var(--ckd-line);}
.flag h4{margin:0 0 5px;font-size:14px;}
.flag ul{margin:4px 0 0;padding-left:18px;}
.flag li{font-size:13px;margin:2px 0;}
table{width:100%;border-collapse:collapse;font-size:12.5px;margin:6px 0;}
th,td{border:1px solid var(--ckd-line);padding:5px 7px;text-align:left;vertical-align:top;}
th{background:var(--ckd-bg);color:var(--ckd);font-weight:700;}
.heat{display:grid;grid-template-columns:auto 1fr 1fr 1fr;gap:3px;margin:8px 0;font-size:11px;}
.heat .hc{padding:7px 3px;text-align:center;border-radius:5px;color:#fff;font-weight:700;}
.heat .hh{background:var(--ckd-bg);color:var(--ckd);padding:6px 3px;text-align:center;font-weight:700;border-radius:5px;}
.heat .cur{outline:3px solid #1F1B2E;outline-offset:-2px;}
.hc.green{background:var(--green);} .hc.yellow{background:var(--yellow);}
.hc.orange{background:var(--orange);} .hc.red{background:var(--red);}
label{display:block;font-size:12.5px;font-weight:600;color:var(--gray);margin:9px 0 3px;}
input,select{width:100%;padding:9px 10px;border:1px solid var(--ckd-line);border-radius:9px;font-size:15px;
  font-family:inherit;background:#fff;-webkit-appearance:none;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.btn{width:100%;padding:13px;background:var(--ckd);color:#fff;border:none;border-radius:11px;
  font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:13px;min-height:48px;}
.btn:active{background:var(--ckd2);}
.chip{display:inline-block;padding:6px 11px;margin:3px 4px 3px 0;border:1px solid var(--ckd-line);
  border-radius:20px;font-size:13px;cursor:pointer;background:#fff;user-select:none;min-height:32px;}
.chip.on{background:var(--ckd);color:#fff;border-color:var(--ckd);}
.search{width:100%;padding:11px 13px;border:1px solid var(--ckd-line);border-radius:11px;font-size:15px;
  margin-bottom:11px;font-family:inherit;-webkit-appearance:none;}
.gate{background:var(--ckd-bg);border-left:3px solid var(--ckd2);padding:8px 11px;border-radius:0 8px 8px 0;margin:6px 0;font-size:13px;}
.gate .gt{font-weight:700;color:var(--ckd);margin-bottom:3px;}
.gate ol{margin:3px 0 0;padding-left:18px;}
.notice{font-size:11.5px;color:var(--gray);margin-top:4px;font-style:italic;}
.conflict-box{background:#FFF6F6;border:1px solid #F3B8B8;border-radius:9px;padding:9px 11px;margin:7px 0;font-size:13px;}
.conflict-box .ct{font-weight:700;color:var(--red);margin-bottom:3px;}
.topiclist .card{cursor:pointer;}
.topiclist .card:active{background:var(--ckd-bg);}
.sec-card{padding:0;overflow:hidden;position:relative;border-left:4px solid var(--sc,var(--ckd));
  transition:transform .12s ease, box-shadow .12s ease;}
.sec-card:active{transform:scale(.985);}
.sec-head{padding:13px 13px 13px 12px;cursor:pointer;display:flex;align-items:center;gap:12px;}
.sec-head:active{background:var(--ckd-bg);}
.sec-ibadge{flex:0 0 auto;width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;
  font-size:23px;background:var(--ckd-bg);
  background:color-mix(in srgb, var(--sc,var(--ckd)) 14%, #fff);
  box-shadow:inset 0 0 0 1px color-mix(in srgb, var(--sc,var(--ckd)) 25%, transparent);}
.sec-txt{flex:1 1 auto;min-width:0;}
.sec-head h3{margin:0;font-size:15.5px;color:var(--ink);}
.sec-desc{font-size:12px;color:var(--gray);margin-top:2px;}
.sec-right{flex:0 0 auto;display:flex;flex-direction:column;align-items:flex-end;gap:5px;}
.sec-count{display:inline-block;background:var(--ckd-bg);
  background:color-mix(in srgb, var(--sc,var(--ckd)) 12%, #fff);
  color:var(--sc,var(--ckd));border-radius:20px;padding:2px 9px;font-size:11px;font-weight:800;white-space:nowrap;}
.sec-go{color:var(--sc,var(--ckd));font-size:22px;font-weight:700;line-height:1;opacity:.65;}
.sec-topics{border-top:1px solid var(--ckd-line);}
/* 플로우 권고 약물 카드 */
.rxcard{border:1px solid var(--ckd-line);border-left:4px solid var(--ckd);border-radius:11px;
  padding:11px 13px;margin:9px 0;background:#fff;box-shadow:0 1px 3px rgba(60,40,90,.05);}
.rxcard.prio1{border-left-color:#2E9E83;}
.rxcard.prio2{border-left-color:#5B8DEF;}
.rxcard.prio3{border-left-color:#E0902B;}
.rxcard.prio4{border-left-color:#7E6BC4;}
.rxcard .rx-top{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:5px;}
.rxcard .rx-rank{flex:0 0 auto;width:22px;height:22px;border-radius:50%;background:var(--ckd);color:#fff;
  font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;}
.rxcard.prio1 .rx-rank{background:#2E9E83;} .rxcard.prio2 .rx-rank{background:#5B8DEF;}
.rxcard.prio3 .rx-rank{background:#E0902B;} .rxcard.prio4 .rx-rank{background:#7E6BC4;}
.rxcard .rx-name{font-weight:800;font-size:14.5px;color:var(--ink);flex:1 1 auto;}
.rxcard .rx-reason{font-size:12.5px;color:var(--gray);line-height:1.5;}
.rxcard .rx-reimb{margin-top:7px;padding-top:7px;border-top:1px dashed var(--ckd-line);font-size:12px;}
.rxcard .rx-reimb .rl{font-weight:700;color:var(--ckd2);}
.topic-row{border-bottom:1px solid var(--ckd-line);}
.topic-row:last-child{border-bottom:none;}
.topic-head{padding:11px 14px 11px 16px;font-size:13.5px;font-weight:600;color:var(--ink);cursor:pointer;
  background:#FCFBFE;min-height:42px;}
.topic-head:active{background:var(--ckd-bg);}
.topic-arrow{color:var(--ckd2);font-weight:700;display:inline-block;width:14px;}
.topic-body{padding:4px 14px 13px 16px;background:#fff;cursor:default;}
.chain{border-left:3px solid var(--ckd2);padding:3px 0 3px 12px;margin:8px 0;}
.chain .arrow{color:var(--ckd2);font-weight:700;}
.insight{background:#FFF8E6;border:1px solid #F0E0A0;border-radius:8px;padding:8px 11px;margin:6px 0;font-size:13px;}
.insight b{color:#9A7A00;}
.ref{font-size:11.5px;color:var(--gray);}
.ref a{color:var(--ckd2);}
.foot{padding:16px 14px 40px;font-size:11px;color:var(--gray);line-height:1.6;}
.foot h4{color:var(--ckd);font-size:12px;margin:10px 0 4px;}
.foot a{color:var(--ckd2);word-break:break-all;}
.pill-num{display:inline-block;width:20px;height:20px;line-height:20px;text-align:center;background:var(--ckd);
  color:#fff;border-radius:50%;font-size:11px;font-weight:700;margin-right:5px;}
.hide{display:none;}
.result-section{margin-bottom:14px;}

/* ===== 시각 디자인 요소 ===== */
/* 정보 행 — 좌측 컬러바 + 제목 + 설명 */
.irow{display:flex;gap:0;margin:8px 0;border-radius:10px;overflow:hidden;border:1px solid var(--ckd-line);background:#fff;}
.irow .bar{flex:0 0 5px;background:var(--ckd2);}
.irow .ic{flex:1;padding:9px 12px;}
.irow .ic .rt{font-weight:700;font-size:13.5px;color:var(--ink);margin-bottom:2px;}
.irow .ic .rd{font-size:12.5px;color:var(--gray);line-height:1.5;}
.irow.green .bar{background:var(--green);} .irow.yellow .bar{background:var(--yellow);}
.irow.orange .bar{background:var(--orange);} .irow.red .bar{background:var(--red);}
.irow.ckd .bar{background:var(--ckd);}
/* 단계 박스 — 번호 동그라미 + 내용 */
.step{display:flex;gap:10px;margin:9px 0;}
.step .sn{flex:0 0 26px;height:26px;line-height:26px;text-align:center;background:var(--ckd);color:#fff;
  border-radius:50%;font-size:13px;font-weight:800;}
.step .sc{flex:1;}
.step .st{font-weight:700;font-size:13.5px;color:var(--ckd);margin-bottom:2px;}
.step .sd{font-size:13px;color:var(--ink);line-height:1.55;}
.step-line{margin-left:13px;border-left:2px dashed var(--ckd-line);height:6px;}
/* 큰 통찰 박스 */
.keybox{background:linear-gradient(135deg,#FFF8E6,#FFF3D6);border:1px solid #F0DFA0;border-radius:11px;
  padding:11px 13px;margin:10px 0;}
.keybox .kh{font-weight:800;color:#9A7A00;font-size:13px;margin-bottom:4px;}
.keybox .kc{font-size:13px;line-height:1.6;color:#5C4A00;}
/* 임상 연결 박스 */
.clinbox{background:#F2F6FF;border:1px solid #CFE0FF;border-radius:11px;padding:11px 13px;margin:10px 0;}
.clinbox .ch{font-weight:800;color:#1A56C4;font-size:13px;margin-bottom:5px;}
.clinbox ul{margin:0;padding-left:17px;}
.clinbox li{font-size:13px;margin:4px 0;line-height:1.5;}
/* 한줄 요약 */
.oneliner{font-size:14px;font-weight:600;color:var(--ckd);background:var(--ckd-bg);
  padding:9px 12px;border-radius:9px;margin:6px 0 10px;border-left:3px solid var(--ckd);}
/* 모식도 박스 */
.schema-box{background:#FBFAFE;border:1px solid var(--ckd-line);border-radius:11px;padding:10px;margin:10px 0;text-align:center;}
.schema-box svg{max-width:100%;height:auto;}
.schema-cap{font-size:11px;color:var(--gray);margin-top:5px;}
/* 용어 풀이 */
.termcard{background:#fff;border:1px solid var(--ckd-line);border-radius:8px;padding:8px 11px;margin:6px 0;font-size:12.5px;line-height:1.5;color:var(--ink);}
.termcard .termname{font-weight:800;color:var(--ckd);display:inline-block;margin-right:4px;}
.sec-mini-title{font-weight:800;font-size:14px;color:var(--ckd);margin:14px 0 6px;padding-bottom:4px;border-bottom:2px solid var(--ckd-line);}
/* 정의/수치 강조 */
.statline{display:flex;justify-content:space-between;align-items:center;padding:7px 11px;background:var(--ckd-bg);
  border-radius:8px;margin:5px 0;font-size:13px;}
.statline .sl-k{color:var(--gray);font-weight:600;}
.statline .sl-v{font-weight:800;color:var(--ckd);font-size:15px;}
.statline.warn .sl-v{color:var(--red);}
/* 약물 카드 */
.drugcard{border:1px solid var(--ckd-line);border-radius:10px;padding:10px 12px;margin:7px 0;background:#fff;}
.drugcard .dn{font-weight:700;font-size:14px;color:var(--ink);margin-bottom:3px;}
.tag{display:inline-block;padding:2px 7px;border-radius:6px;font-size:10.5px;font-weight:700;margin-right:4px;}
.tag.ok{background:#E3F4E4;color:#2E7D32;} .tag.warn{background:#FFE5E5;color:#C62828;}
.tag.info{background:#E8F0FE;color:#1A56C4;} .tag.gray{background:#EEE;color:#666;}

/* ===== 바텀시트 ===== */
.sheet-overlay{position:fixed;inset:0;background:rgba(20,15,35,.45);opacity:0;pointer-events:none;
  transition:opacity .25s ease;z-index:200;}
.sheet-overlay.on{opacity:1;pointer-events:auto;}
.sheet{position:fixed;left:0;right:0;bottom:0;max-width:760px;margin:0 auto;background:var(--ckd-bg);
  border-radius:20px 20px 0 0;z-index:201;transform:translateY(100%);
  transition:transform .28s cubic-bezier(.32,.72,0,1);
  height:88vh;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 -8px 30px rgba(40,30,70,.22);}
.sheet.on{transform:translateY(0);}
.sheet-handle{flex:0 0 auto;padding:9px 0 5px;display:flex;justify-content:center;cursor:grab;touch-action:none;}
.sheet-handle .bar{width:40px;height:5px;border-radius:3px;background:var(--ckd-line);}
.sheet-head{flex:0 0 auto;display:flex;align-items:center;gap:9px;padding:3px 16px 11px;
  border-bottom:1px solid var(--ckd-line);background:#fff;}
.sheet-head .emoji{font-size:21px;}
.sheet-head .stitle{flex:1;font-weight:800;font-size:16px;color:var(--ckd);}
.sheet-head .sclose{flex:0 0 auto;width:34px;height:34px;border-radius:50%;border:1px solid var(--ckd-line);
  background:var(--ckd-bg);font-size:17px;color:var(--ckd);cursor:pointer;line-height:1;}
.sheet-head .sback{flex:0 0 auto;width:34px;height:34px;border-radius:50%;border:1px solid var(--ckd-line);
  background:var(--ckd-bg);font-size:24px;color:var(--ckd);cursor:pointer;line-height:1;padding:0;font-weight:700;
  display:flex;align-items:center;justify-content:center;}
.sheet-body{flex:1 1 auto;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px 30px;overscroll-behavior:contain;}
.sheet-body .card{cursor:default;}
/* 시트 안 토픽 행 (도서관 세부 토픽을 시트에 나열) */
.sheet-tlist .topic-head{border-radius:10px;border:1px solid var(--ckd-line);margin:7px 0;background:#fff;}
.result-section>h3{font-size:14px;color:var(--ckd);border-bottom:2px solid var(--ckd-line);padding-bottom:4px;margin-bottom:8px;}
.kfre-num{font-size:22px;font-weight:800;color:var(--ckd);}
.warn-inline{color:var(--red);font-weight:600;}
</style>
</head>
<body>

<div class="wrap">
<header>
  <h1>🫘 만성콩팥병(CKD) 처방가이드</h1>
  <p>한국 1·2차 의료기관 임상의사결정 지원 · 가이드라인 + 심평원 급여 이중레이어</p>
</header>
<div class="tabs">
  <button class="tab on" data-v="lib"><span class="ico">📚</span>도서관</button>
  <button class="tab" data-v="flow"><span class="ico">⚡</span>플로우</button>
  <button class="tab" data-v="sim"><span class="ico">🧭</span>시뮬레이션</button>
  <button class="tab" data-v="learn"><span class="ico">🎓</span>학습공간</button>
</div>

<div id="lib" class="view on"></div>
<div id="flow" class="view"></div>
<div id="sim" class="view"></div>
<div id="learn" class="view"></div>

<div class="foot" id="foot"></div>
</div>

<div class="sheet-overlay" id="sheetOverlay"></div>
<div class="sheet" id="sheet" role="dialog" aria-modal="true">
  <div class="sheet-handle" id="sheetHandle"><div class="bar"></div></div>
  <div class="sheet-head">
    <button class="sback" id="sheetBack" aria-label="뒤로" style="display:none">‹</button>
    <span class="emoji" id="sheetEmoji"></span>
    <span class="stitle" id="sheetTitle"></span>
    <button class="sclose" id="sheetClose" aria-label="닫기">✕</button>
  </div>
  <div class="sheet-body" id="sheetBody"></div>
</div>

<script>
/* ============================================================

/* ============================================================
   CKD 처방가이드 — ENGINE LAYER (4엔진)
   DATA 참조만. 하드코딩 금지. 정문계약 recommend(patient).

var CKD_ENGINE = (function(D){
"use strict";

/* ===== 위험·병기 엔진 ===== */
function egfrBand(egfr){
  if(egfr==null) return null;
  if(egfr>=60) return 0; if(egfr>=45) return 1; if(egfr>=30) return 2;
  if(egfr>=15) return 3; return 4;
}
function gStage(egfr){
  if(egfr==null) return null;
  var g=D.CKD_STAGE_G, i;
  for(i=0;i<g.length;i++){ if(egfr>=g[i].min && egfr<=g[i].max) return g[i]; }
  return g[g.length-1];
}
function aStage(uacr){
  if(uacr==null) return null;
  var a=D.CKD_STAGE_A, i;
  for(i=0;i<a.length;i++){ if(uacr>=a[i].min && uacr<=a[i].max) return a[i]; }
  return a[a.length-1];
}
function stageGA(egfr,uacr){
  var g=gStage(egfr), a=aStage(uacr);
  var color=null,risk=null;
  if(g&&a){
    var aIdx = a.id==="A1"?0 : a.id==="A2"?1 : 2;
    color = D.HEATMAP[g.id][aIdx];
    risk = D.RISK_LABEL[color];
  }
  return {g:g, a:a, color:color, risk:risk};
}
/* KFRE — non-NA(한국). eGFR<60에서만 유효 */
function kfre(p, years){
  if(p.egfr==null || p.uacr==null || p.age==null || !p.sex) return null;
  if(p.egfr>=60) return {valid:false, reason:"eGFR≥60: KFRE 부적합(G3-G5용)"};
  if(p.uacr<=0) return {valid:false, reason:"uACR 필요"};
  var c=D.KFRE.coef, sexMale=(p.sex==="M")?1:0;
  var L = c.age*(p.age/10 - c.ageCtr)
        + c.sex*(sexMale - c.sexCtr)
        + c.egfr*(p.egfr/5 - c.egfrCtr)
        + c.lnacr*(Math.log(p.uacr) - c.acrCtr);
  var b=D.KFRE.baseline_nonNA;
  var s = (years===2)? b.y2 : b.y5;
  var risk = (1 - Math.pow(s, Math.exp(L)))*100;
  return {valid:true, risk:risk, years:years};
}

/* ===== 급여 엔진 ===== */
function reimbDrug(drugId, p){
  var R=D.REIMB[drugId];
  if(!R) return null;
  /* SGLT2i 비당뇨 CKD */
  if(R.nondm_ckd){
    var g=R.nondm_ckd, fail=[];
    var hasDm = p.comorbid && indexOf(p.comorbid,"dm")>=0;
    if(p.egfr!=null && (p.egfr<g.egfr_min||p.egfr>g.egfr_max))
      fail.push("eGFR "+g.egfr_min+"-"+g.egfr_max+" 범위 밖 (현재 "+p.egfr+")");
    var acrOk = (p.uacr!=null && p.uacr>=g.acr_min) || (p.dipstick && p.dipstick!=="음성");
    if(p.uacr!=null && !acrOk) fail.push("uACR≥"+g.acr_min+" 또는 dipstick 1+ 필요 (현재 "+p.uacr+")");
    return {grade: fail.length? "조건미충족":"급여가능", gate:g.gate, fail:fail,
            notice:g.notice, note:g.note, dmNote: hasDm?"당뇨 동반시 당뇨 기준으로도 급여":null};
  }
  /* 피네레논 */
  if(R.ckd && drugId==="drug:finerenone"){
    var f=R.ckd, ff=[];
    var hasDm2 = p.comorbid && indexOf(p.comorbid,"dm")>=0;
    if(p.comorbid && !hasDm2) ff.push("제2형 당뇨병 필수");
    if(p.egfr!=null && (p.egfr<f.egfr_min||p.egfr>f.egfr_max))
      ff.push("eGFR "+f.egfr_min+"-"+f.egfr_max+" 범위 밖 (현재 "+p.egfr+")");
    if(p.uacr!=null && p.uacr<f.acr_min) ff.push("uACR>"+f.acr_min+" 필요 (현재 "+p.uacr+", ★지침은 ≥30부터)");
    return {grade: ff.length?"조건미충족":"급여가능", gate:f.gate, fail:ff,
            notice:f.notice, note:f.note, exclude:f.exclude, stop:f.stop};
  }
  /* 구형흡착탄 */
  if(R.ckd && drugId==="drug:spherical_carbon"){
    var s=R.ckd, sf=[];
    var cr = p.labs && p.labs.creatinine;
    if(cr!=null && cr<s.cr_min) sf.push("혈청 Cr≥"+s.cr_min+" 필요 (현재 "+cr+") → ★호전시 급여중단 역설");
    return {grade: sf.length?"조건미충족":"급여가능", gate:s.gate, fail:sf, notice:s.notice, note:s.note};
  }
  return null;
}
function reimbESA(p){
  var e=D.REIMB["class:esa"].anemia, hb=p.labs&&p.labs.hemoglobin;
  var elig = (hb!=null && hb<=e.hb_start);
  return {grade: elig?"급여개시 가능":(hb!=null?"Hb>"+e.hb_start+" 개시기준 미달":"Hb 측정필요"),

/* ===== 임상 엔진 ===== */
function renalProtection(p){
  var out=[], rp=D.RENAL_PROTECTION, i;
  var hasDm = p.comorbid && indexOf(p.comorbid,"dm")>=0;
  var hasHf = p.comorbid && indexOf(p.comorbid,"hf")>=0;

    var pillar=rp[i], applicable=true, reason="";
    if(pillar.id==="sglt2i"){
      applicable = (p.egfr==null||p.egfr>=20) && ((p.uacr!=null&&p.uacr>=200)||hasHf);
      reason = applicable?"적응 (eGFR≥20 + ACR≥200/심부전)":"eGFR<20 또는 알부민뇨·심부전 없음";
    } else if(pillar.id==="finerenone"){
      applicable = hasDm && (p.egfr==null||p.egfr>25);
      reason = applicable?"적응 (T2DM+eGFR>25)":"제2형 당뇨 아님 또는 eGFR≤25";
    } else if(pillar.id==="glp1"){
      applicable = hasDm; reason = hasDm?"당뇨 보조":"당뇨 아님";
    } else {
      reason = "알부민뇨·단백뇨 클수록 강권. eGFR<30서도 지속.";
    }
    out.push({id:pillar.id,label:pillar.label,order:pillar.order,
              applicable:applicable,reason:reason,note:pillar.note,grade:pillar.grade,
              indication:pillar.indication});
  }
  return out;
}
function statinRec(p){
  var s=D.STATIN_CKD, rec=null;
  if(p.dialysis && p.dialysis!=="none") return {rec:s.dialysis, renal:s.renal_dose};
  if(p.age!=null){
    if(p.age>=50 && p.egfr!=null && p.egfr<60) rec=s.rules[0];
    else if(p.age>=50) rec=s.rules[1];
    else if(p.age>=18) rec=s.rules[2];
  }
  return {rec:rec, strategy:s.strategy, renal:s.renal_dose};
}

/* ===== 통합관리 엔진 ===== */
function referralCheck(p){
  var R=D.REFERRAL, result={level:null, emergency:[], urgent:[], early:[]};
  /* 응급 AEIOU — 입력값 있을 때만 판정 */
  var L=p.labs||{};
  if(L.ph!=null && L.ph<7.1) result.emergency.push("산증 pH "+L.ph+" <7.1");
  if(L.potassium!=null && L.potassium>6.5) result.emergency.push("고칼륨 K "+L.potassium+" >6.5");
  if(p.flags){
    if(indexOf(p.flags,"pulm_edema")>=0) result.emergency.push("이뇨제 불응 폐부종");
    if(indexOf(p.flags,"uremic")>=0) result.emergency.push("요독성 심막염/뇌병증/출혈");
    if(indexOf(p.flags,"intox")>=0) result.emergency.push("투석가능 중독");
  }
  /* 긴급 — KFRE 2년 */
  var k2=kfre(p,2);
  if(k2&&k2.valid){
    if(k2.risk>40) result.urgent.push("KFRE 2년 "+k2.risk.toFixed(1)+"% >40% → KRT준비");
    else if(k2.risk>10) result.urgent.push("KFRE 2년 "+k2.risk.toFixed(1)+"% >10% → 다학제");
  }
  if(p.egfr!=null && p.egfr<15) result.urgent.push("eGFR<15 (G5) → 신대체요법 교육");
  /* 조기 */
  var k5=kfre(p,5);
  if(p.egfr!=null && p.egfr<30) result.early.push("eGFR<30 (G4)");
  if(k5&&k5.valid && k5.risk>=3) result.early.push("KFRE 5년 "+k5.risk.toFixed(1)+"% ≥3%");
  if(p.uacr!=null && p.uacr>500) result.early.push("지속 단백뇨 의심 (uACR "+p.uacr+")");
  if(p.flags){
    if(indexOf(p.flags,"gross_hematuria")>=0) result.early.push("육안혈뇨");
    if(indexOf(p.flags,"rapid_decline")>=0) result.early.push("급속 eGFR 감소");
  }
  if(result.emergency.length) result.level="emergency";
  else if(result.urgent.length) result.level="urgent";
  else if(result.early.length) result.level="early";
  return result;
}
function anemiaTree(p){
  var A=D.ANEMIA, L=p.labs||{}, out={steps:[]};
  var hb=L.hemoglobin, ferr=L.ferritin, tsat=L.tsat;
  var isHD = p.dialysis==="HD";
  if(hb!=null){
    var anemic = (p.sex==="M"&&hb<13)||(p.sex==="F"&&hb<12)||(!p.sex&&hb<12);
    out.anemic=anemic;
    if(!anemic){ out.steps.push("Hb 정상 — 빈혈 아님"); return out; }
  }
  if(ferr!=null && ferr<45) out.steps.push("★ferritin<45 → 출혈평가·의뢰");
  /* 철 시작 판정 */
  if(ferr!=null && tsat!=null){
    if(isHD){
      if(ferr<=500 && tsat<=30) out.ironStart="HD: 철 시작 (IV 우선, ferritin≤500&TSAT≤30)";
    } else {
      if((ferr<100&&tsat<40)||(ferr>=100&&ferr<=300&&tsat<25))
        out.ironStart="비투석: 철 시작 (경구/IV 선택)";
    }
    if(ferr>700||tsat>=40) out.ironHold="★철 보류 (ferritin>700 또는 TSAT≥40)";
  }
  /* ESA */
  if(hb!=null){
    if(isHD && hb<=10) out.esa="HD: ESA 개시 고려 (Hb≤9-10, 철 충족 후)";
    else if(!isHD && hb<=10) out.esa="비투석: ESA 개시 고려 (Hb 8.5-10, 개별화)";
    out.esaTarget="목표 Hb 10-11.5 (≤11.5)";
  }
  return out;
}
function renalDrugStatus(drugId, egfr){
  /* 핵심 약물 신기능 판정 */
  if(drugId==="drug:metformin"){
    if(egfr==null) return {s:"unknown"};
    if(egfr>=45) return {s:"ok", t:"표준용량"};
    if(egfr>=30) return {s:"caution", t:"감량·신규시작 권장안함"};
    return {s:"stop", t:"★eGFR<30 금기(MALA)"};

/* CKD-MBD 평가 트리 — 인·칼슘·PTH 종합 판정 */
function mbdTree(p){
  var M=D.MBD, L=p.labs||{};
  var phos=L.phosphate, ca=L.calcium, pth=L.pth;
  var out={steps:[], flags:[], active:false};
  var isDialysis = p.dialysis==="HD"||p.dialysis==="PD";

  /* 인 평가 */
  if(phos!=null){
    if(phos>M.p_normal){
      out.active=true;
      out.phosHigh=true;
      out.phosVal=phos;
      /* 단계 트리 */
      out.steps.push({k:"①식이 인 제한", v:"가공식품·인첨가물(인산염)부터. 흡수율 90% 첨가물이 1순위"});
      out.steps.push({k:"②인결합제", v: (ca!=null && ca>M.ca_high)
        ? "고칼슘 동반 → 비칼슘계 우선 (세벨라머·란타넘). 칼슘계 회피"
        : "칼슘계(탄산/아세트산칼슘) 또는 비칼슘계. 식사와 함께 복용"});
      out.steps.push({k:"③PTH·비타민D 동반 평가", v:"고인산혈증엔 SHPT 동반 흔함 → PTH 확인 필수"});
    } else {
      out.phosHigh=false;
    }
  }
  /* 칼슘 평가 */
  if(ca!=null){
    if(ca>M.ca_high){ out.active=true; out.caHigh=true; out.caVal=ca;
      out.flags.push("고칼슘혈증("+ca+") → 칼슘계 결합제·활성비타민D 감량/중단 검토"); }
    else if(ca<M.ca_low){ out.active=true; out.caLow=true; out.caVal=ca;
      out.flags.push("저칼슘혈증("+ca+") → calcitriol↓ 가능성, PTH 자극 요인"); }
  }
  /* PTH 평가 — 핵심 분기 */
  if(pth!=null){
    out.pthVal=pth;
    if(isDialysis){
      if(pth>M.pth_dialysis_high){ out.active=true; out.pthHigh=true;
        out.steps.push({k:"투석 SHPT (PTH>"+M.pth_dialysis_high+")", v:"칼시미메틱(시나칼셋·에텔칼세타이드) ± 활성비타민D. 인·칼슘 먼저 조절"}); }
      else if(pth<M.pth_dialysis_low){ out.active=true; out.pthLow=true;
        out.flags.push("PTH<"+M.pth_dialysis_low+" (무력성 골질환 위험) → 칼슘·비타민D·칼시미메틱 감량"); }
      else { out.pthOk=true; out.flags.push("PTH 목표범위("+M.pth_dialysis_low+"-"+M.pth_dialysis_high+") 내"); }
    } else {
      /* 비투석 */
      if(pth>M.pth_normal_max){ out.active=true; out.pthHigh=true;
        out.steps.push({k:"비투석 PTH↑ (>"+M.pth_normal_max+")", v:"먼저 원인 교정 — 인 제한, 저칼슘 교정, 비타민D 결핍 보충. 진행성·지속 상승 시 활성비타민D 고려"}); }
      else { out.pthOk=true; }
    }
  }
  return out;
}

/* ===== 정문 계약 ===== */
function recommend(patient){
  var p=patient||{};
  var stage=stageGA(p.egfr,p.uacr);
  var drugs=[], targets=[], flags=[];

  /* 신장보호 약물 */
  var rp=renalProtection(p), i;
  for(i=0;i<rp.length;i++){
    if(rp[i].applicable){
      drugs.push({id:rp[i].id, label:rp[i].label, grade:rp[i].grade,
                  reason:rp[i].reason, source:"신장보호"});
    }
  }
  /* 목표 */
  targets.push({k:"혈압", nephro:D.BP_TARGET.nephro.value, cardio:D.BP_TARGET.cardio.value,
                conflict:D.BP_TARGET.conflict});
  var st=statinRec(p);
  if(st.rec) targets.push({k:"지질", v:st.rec.drug, grade:st.rec.grade});

  /* 플래그 */
  var ref=referralCheck(p);
  if(ref.level==="emergency") flags.push({type:"emergency", label:"🔴 응급 의뢰", items:ref.emergency});
  if(ref.urgent.length) flags.push({type:"urgent", label:"🟠 긴급", items:ref.urgent});
  if(ref.early.length) flags.push({type:"early", label:"🟡 조기 의뢰", items:ref.early});

  var an=anemiaTree(p);
  if(an.anemic) flags.push({type:"anemia", label:"🩸 빈혈", tree:an});

  var L=p.labs||{};
  if(L.potassium!=null && L.potassium>5.5) flags.push({type:"hyperk", label:"🅺 고칼륨혈증", v:L.potassium});
  if(L.bicarbonate!=null && L.bicarbonate<18) flags.push({type:"acidosis", label:"⚗️ 대사성산증", v:L.bicarbonate});
  var mbd=mbdTree(p);
  if(mbd.active) flags.push({type:"mbd", label:"🦴 CKD-MBD", tree:mbd});

  /* 모니터링 */
  var mon = stage.g? D.MONITORING[stage.g.id] : null;

  return {stage:stage, kfre2:kfre(p,2), kfre5:kfre(p,5),
          drugs:drugs, targets:targets, flags:flags,
          referral:ref, monitoring:mon, anemia:an, mbd:mbd};
}

/* util */
function indexOf(arr,v){ if(!arr)return -1; for(var i=0;i<arr.length;i++){if(arr[i]===v)return i;} return -1; }

return {
  egfrBand:egfrBand, gStage:gStage, aStage:aStage, stageGA:stageGA, kfre:kfre,
  reimbDrug:reimbDrug, reimbESA:reimbESA,
  renalProtection:renalProtection, statinRec:statinRec,
  referralCheck:referralCheck, anemiaTree:anemiaTree, renalDrugStatus:renalDrugStatus,
  mbdTree:mbdTree,
  recommend:recommend
};
})(CKD_DATA);

/* 전문 검색 — DATA 전체를 평탄화한 인덱스 */
var SEARCH_INDEX=null;
function buildIndex(){
  if(SEARCH_INDEX)return SEARCH_INDEX;
  SEARCH_INDEX=[];
  function walk(obj,topicId,topicTitle){
    if(obj==null)return;
    if(typeof obj==="string"||typeof obj==="number"){
      SEARCH_INDEX.push({t:topicId,title:topicTitle,txt:String(obj)});return;
    }
    if(Array.isArray(obj)){for(var k=0;k<obj.length;k++)walk(obj[k],topicId,topicTitle);return;}
    if(typeof obj==="object"){for(var key in obj)if(obj.hasOwnProperty(key))walk(obj[key],topicId,topicTitle);}
  }
  /* 토픽별 매핑 */
  walk([D.CKD_STAGE_G,D.CKD_STAGE_A,D.RISK_LABEL],"diagnosis","CKD 정의·병기");
  walk(D.KFRE,"risk","위험도·KFRE"); walk(D.MONITORING,"risk","모니터링");
  walk([D.REIMB,D.RENAL_PROTECTION,D.RAAS_30RULE,D.GLP1_DETAIL],"protection","신장보호·급여");
  walk(D.BP_TARGET,"bp","혈압");
  walk(D.STATIN_CKD,"lipid","이상지질혈증");
  walk(D.ANEMIA,"anemia","빈혈");
  walk(D.MBD,"mbd","CKD-MBD");
  walk(D.HYPERK,"potassium","고칼륨혈증");
  walk(D.ACIDOSIS,"acidosis","대사성산증");
  walk(D.DIET,"diet","식이");
  walk([D.NEPHROTOXIN,D.SICK_DAY,D.METFORMIN_RENAL],"drugsafety","약물안전");
  walk(D.VACCINE,"vaccine","백신");
  walk(D.HEMATURIA,"hematuria","현미경혈뇨");
  walk(D.REFERRAL,"dialysis","투석시점·의뢰");
  walk(D.LAB_REIMB,"protection","검사 급여");
  return SEARCH_INDEX;
}
function doSearch(q){
  var res=$("searchRes"), list=$("topicList");
  q=(q||"").trim().toLowerCase();
  if(q.length<1){res.innerHTML="";list.classList.remove("hide");return;}
  list.classList.add("hide");
  var idx=buildIndex(), hits=[], seen={};
  for(var i=0;i<idx.length;i++){
    if(idx[i].txt.toLowerCase().indexOf(q)>=0){
      var key=idx[i].t+"|"+idx[i].txt;
      if(seen[key])continue; seen[key]=1;
      hits.push(idx[i]);
    }
  }
  res.innerHTML="";
  if(!hits.length){res.appendChild(el("div","card muted","검색 결과 없음. 다른 키워드를 시도하세요."));return;}
  var byTopic={};
  for(var h=0;h<hits.length;h++){(byTopic[hits[h].title]=byTopic[hits[h].title]||[]).push(hits[h]);}
  for(var tt in byTopic){
    var c=el("div","card");
    c.innerHTML='<h3>'+esc(tt)+'</h3>';
    var ul=el("div","");
    for(var m=0;m<byTopic[tt].length && m<6;m++){
      ul.appendChild(el("div","muted","· "+highlight(byTopic[tt][m].txt,q)));
    }
    c.appendChild(ul); res.appendChild(c);
  }
}
function highlight(txt,q){
  var s=esc(txt), low=s.toLowerCase(), i=low.indexOf(q.toLowerCase());
  if(i<0)return s.length>120?s.substr(0,120)+"…":s;
  var st=Math.max(0,i-40), en=Math.min(s.length,i+80);
  return (st>0?"…":"")+s.substring(st,i)+'<mark>'+s.substr(i,q.length)+'</mark>'+s.substring(i+q.length,en)+(en<s.length?"…":"");
}

      }
      if(p.id==="finerenone")h+=conflictBox("상충 — 알부민뇨 기준","지침은 uACR≥30(미세알부민뇨)부터 권고하지만, 급여는 uACR>300(현성 알부민뇨)부터입니다. 30-300 구간은 비급여.");

function gateHTML(r){
  if(!r)return"";
  var h='<div class="gate"><div class="gt">📋 급여 게이트 (모두 충족 = AND)</div><ol>';
  for(var i=0;i<r.gate.length;i++)h+='<li>'+esc(r.gate[i])+'</li>';
  h+='</ol>';
  if(r.exclude)h+='<div class="notice">⊘ 제외: '+esc(r.exclude)+'</div>';
  if(r.stop)h+='<div class="notice">■ 중단: '+esc(r.stop)+'</div>';
  h+='<div class="notice">📎 '+esc(r.notice)+'</div></div>';
  return h;
}

function simSolve(body,cs){

  if(r.referral.urgent.length)h+='<div class="flag urgent"><h4>🟠 긴급</h4><ul><li>'+r.referral.urgent.join("</li><li>")+'</li></ul></div>';

  /* SGLT2i 급여 대조 */
  if(cs.p.egfr<25){
    var dapa=E.reimbDrug("drug:dapagliflozin",cs.p),empa=E.reimbDrug("drug:empagliflozin",cs.p);
    h+='<div class="conflict-box"><div class="ct">SGLT2i 급여 대조 (eGFR'+cs.p.egfr+')</div>';
    h+='다파: '+(dapa.fail.length?'<span class="warn-inline">미충족</span>':'급여가능')+' / 자디앙: '+(empa.fail.length?'미충족':'<b>급여가능(하한20)</b>')+'</div>';
  }
  if(r.anemia&&r.anemia.anemic){
    h+='<div class="flag info"><h4>🩸 빈혈</h4>';
    if(r.anemia.ironStart)h+='<p>'+esc(r.anemia.ironStart)+'</p>';
    if(r.anemia.steps.length)h+='<p class="muted">'+r.anemia.steps.join("<br>")+'</p>';
    if(r.anemia.esa)h+='<p>'+esc(r.anemia.esa)+'</p>';
    h+='</div>';
  }
  body.innerHTML=h;
}

function svgBox(x,y,w,h,fill,stroke,txt,tcol,fs){
  return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" rx="7" fill="'+fill+'" stroke="'+(stroke||"none")+'" stroke-width="1.5"/>'+
    '<text x="'+(x+w/2)+'" y="'+(y+h/2+(fs||11)/3)+'" text-anchor="middle" font-size="'+(fs||11)+'" font-weight="700" fill="'+(tcol||"#fff")+'">'+txt+'</text>';
}
function svgArrow(x1,y1,x2,y2,col){
  return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(col||"#7C6BB0")+'" stroke-width="2" marker-end="url(#ah)"/>';
}
function svgDefs(){return '<defs><marker id="ah" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#7C6BB0"/></marker></defs>';}

function masterSVG(){
  /* 화살표 겹침 제거 — 중앙 줄기에서 좌우 2열로 깔끔하게 분기 */
  var rows=[
    ["phosphate 배설↓","FGF23↑→PTH↑→인↑",ORA],
    ["EPO↓","빈혈(anemia)",RED],
    ["calcitriol↓","저Ca→PTH↑",ORA],
    ["Na·수분↓","고혈압·부종",CK2],
    ["K⁺ 배설↓","고칼륨(hyperK)",ORA],
    ["산 배설↓","대사성산증",YEL]
  ];
  var W=340, top=8, boxH=30, gap=10, startY=78, rowH=boxH+gap;
  var H=startY+rowH*rows.length+4;
  var s='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">';
  /* 중앙 루트 박스 */
  var cx=W/2;
  s+=svgBox(cx-80,top,160,32,CK,null,"nephron 감소",null,13);
  /* 중앙 세로 줄기 */
  var stemTop=top+32, stemBot=startY+rowH*(rows.length-1)+boxH/2;
  s+='<line x1="'+cx+'" y1="'+stemTop+'" x2="'+cx+'" y2="'+(startY-6)+'" stroke="'+CK2+'" stroke-width="2.5"/>';
  for(var i=0;i<rows.length;i++){
    var y=startY+rowH*i;
    var bw=150, bx=8;  /* 좌측 정렬 단일 열 — 겹침 없음 */
    /* 줄기 → 박스 연결 (수직 줄기에서 가로로) */
    var midY=y+boxH/2;
    s+='<line x1="'+cx+'" y1="'+midY+'" x2="'+(bx+bw)+'" y2="'+midY+'" stroke="'+CK2+'" stroke-width="1.5"/>';
    s+='<circle cx="'+cx+'" cy="'+midY+'" r="3" fill="'+CK2+'"/>';
    s+=svgBox(bx,y,bw,boxH,"#F5F3FA",rows[i][2],rows[i][0],"#1F1B2E",10);
