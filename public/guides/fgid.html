      const inp = document.getElementById("lib-search-input"); if(inp) inp.value = libQuery;
      renderLibView();
      smoothScroll("library-content");
    });
  }

  // 약물 라이브러리 카드 (성분별 상세 + 급여 포함)
  function drugLibCard(d){
    const cls = (d.class||"").replace("class:","");
    const g = (d.grade && Object.values(d.grade)[0]) || {};
    const gradeBadge = g.strength==="strong" ? `<span class="badge grade-strong">📊 강함</span>` :
                       g.strength==="weak" ? `<span class="badge grade-weak">📊 조건부</span>` : "";
    const r = d.reimb||{};
    const reimbBadge = !d.domestic ? `<span class="badge edu">국내 미시판</span>` :
      r.covered&&r.strict ? `<span class="badge reimb-strict">급여(조건)</span>` :
      r.covered ? `<span class="badge reimb-ok">급여</span>` : `<span class="badge reimb-no">비급여</span>`;
    let body = `<dl class="lib-kv">`;
    if(d.nameEn) body += `<dt>성분(영문)</dt><dd>${d.nameEn}</dd>`;
    if(d.dose) body += `<dt>용량</dt><dd>${d.dose}</dd>`;
    body += `<dt>계열</dt><dd>${cls}</dd>`;
    if(d.cautions&&d.cautions.length) body += `<dt>주의</dt><dd class="caution">${d.cautions.join(" · ")}</dd>`;
    if(d.domesticNote) body += `<dt>국내</dt><dd>${d.domesticNote}</dd>`;
    body += `</dl>`;
    // 급여 상세 (약물 안에 편입)
    body += `<div class="reimb-detail">💰 <b>급여</b> `;
    if(!d.domestic) body += `국내 미시판`;
    else {
      if(r.indication) body += `적응 ${r.indication} · `;
      if(r.notice) body += `고시 ${r.notice} · `;
      body += r.note || (r.covered?"급여":"비급여");
      if(r.verify) body += ` <span style="color:var(--reimb-strict)">[급여 기준은 처방 전 확인이 필요합니다]</span>`;
    }
    body += `</div>`;
    // 기전 링크
    const mech = (typeof LIB_MECH!=="undefined") && Object.values(LIB_MECH).find(m=>m.target===d.id);
    if(mech) body += `<div class="lib-links"><span class="lnk" data-target="${mech.id}">⚙️ 작용 기전 보기</span></div>`;
    return `<div class="lib-card ${d.domestic===false?'edu':''}"><div class="lib-head">
      <span class="lib-type-tag lib-type-mech" style="font-size:9.5px">${cls}</span>
      <div class="lib-head-main"><div class="lib-name">${d.nameKo} <span class="badges">${gradeBadge}${reimbBadge}</span></div></div>
      <span class="lib-toggle">▶</span></div>
      <div class="lib-body">${body}</div></div>`;
  }

  function libCard(it){
    const core = it.core || it.statement || it.mechanism || it.timeline || "";
    let body = "";
    // 개념/기전 공통
    if(it.deep) body += `<div class="deep">${it.deep}</div>`;
    if(it.mechanism && it._type==="mech") body += `<div class="deep"><b>작용 방식</b> — ${it.mechanism}</div>`;
    if(it.whyWorks) body += `<div class="deep"><b>효과가 나타나는 이유</b> — ${it.whyWorks}</div>`;
    if(it.receptor) body += `<div class="lib-kv"><dt>표적</dt><dd>${it.receptor}</dd></div>`;
    if(it.adverseMech) body += `<div class="deep"><b>부작용이 생기는 원리</b> — ${it.adverseMech}</div>`;
    if(it.classComparison) body += `<div class="deep"><b>같은 계열 안에서</b> — ${it.classComparison}</div>`;
    if(it.evidenceNuance) body += `<div class="deep"><b>근거를 볼 때 유의할 점</b> — ${it.evidenceNuance}</div>`;
    // RCT
    if(it._type==="rct"){
      let kv = `<div class="lib-kv">`;
      if(it.design) kv += `<dt>설계</dt><dd>${it.design}</dd>`;
      if(it.n) kv += `<dt>대상 수</dt><dd>${it.n}</dd>`;
      if(it.population) kv += `<dt>대상</dt><dd>${it.population}</dd>`;
      if(it.intervention) kv += `<dt>중재</dt><dd>${it.intervention}${it.comparator?` vs ${it.comparator}`:""}</dd>`;
      if(it.primaryEndpoint) kv += `<dt>1차 지표</dt><dd>${it.primaryEndpoint}</dd>`;
      kv += `</div>`;
      body += kv;
      if(it.result) body += `<div class="lib-rct-result"><b>결과</b> — ${it.result}</div>`;
      if(it.keyFindings) body += `<div class="deep"><b>주요 내용</b> — ${it.keyFindings.join(" · ")}</div>`;
      if(it.limitations) body += `<div class="deep" style="color:var(--ink3)"><b>한계</b> — ${it.limitations.join(" · ")}</div>`;
      if(it.relevanceKo) body += `<div class="deep"><b>국내 관련성</b> — ${it.relevanceKo}</div>`;
    }
    // 감별진단 (단순화)
    if(it._type==="ddx"){
      if(it.pretest) body += `<div class="lib-kv"><dt>참고 빈도</dt><dd>${it.pretest}</dd></div>`;
      if(it.keyDiscriminators) body += `<div class="deep"><b>구분 근거</b> — ${it.keyDiscriminators.join(" · ")}</div>`;
    }
    // 역사
    if(it._type==="history"){
      if(it.timeline) body += `<div class="deep"><b>경과</b> — ${it.timeline}</div>`;
    }
    // 짚어둘 점
    if(it.clinicalPearl) body += `<div class="pearl">💡 ${it.clinicalPearl}</div>`;
    if(it.pitfall) body += `<div class="pearl">⚠️ 놓치기 쉬운 점 — ${it.pitfall}</div>`;
    if(it.lesson) body += `<div class="pearl">📌 남는 교훈 — ${it.lesson}</div>`;
    if(it.effect) body += `<div class="deep"><b>효과 크기</b> — ${it.effect}</div>`;
    if(it.domesticNote) body += `<div class="deep" style="color:var(--reimb-strict)"><b>국내</b> — ${it.domesticNote}</div>`;
    // 링크 + PMID
    let links = "";
    (it.links||[]).forEach(l=>{
      const drug = DATA.FGID_DRUGS[l];
      const label = drug ? "💊 "+drug.nameKo : (l.startsWith("lib:")?"🔗 "+l.split(":").pop():l.split(":").pop());
      links += `<span class="lnk" data-target="${l}">${label}</span>`;
    });
    let pmidLink = "";
    if(it.pmid) pmidLink = ` <span class="lib-pmid">PMID ${it.pmid}</span>`;
    if(it.doi) pmidLink += ` <a href="https://doi.org/${it.doi}" target="_blank" rel="noopener" class="lib-pmid">DOI</a>`;
    if(links || pmidLink) body += `<div class="lib-links">${links}${pmidLink}</div>`;

    return `<div class="lib-card">
      <div class="lib-head">
        <span class="lib-type-tag lib-type-${it._type}">${LIB_TYPE_KO[it._type]}</span>
        <div class="lib-head-main">
          <div class="lib-name">${it.nameKo}</div>
          <div class="lib-core">${core}</div>
        </div>
        <span class="lib-toggle">▶</span>
      </div>
      <div class="lib-body">${body}</div>
    </div>`;
  }

  function renderEduInLibrary(){

  // ① FODMAP 3단계 기전 흐름
  function eduMechFlow(){
    const steps = [
      { n:"1", title:"소장: 흡수 불량 → 삼투압으로 수분↑", desc:"FODMAP은 소장에서 잘 흡수되지 않아 삼투압으로 소장 내 수분을 끌어당깁니다(MRI로 입증). fructose·polyol이 주로 여기서 작용.", tag:"삼투 (소장)" },
      { n:"2", title:"대장: 세균 발효 → 가스(H₂·CO₂·CH₄)↑", desc:"대장에서 장내세균이 FODMAP을 빠르게 발효시켜 가스와 단쇄지방산을 생성합니다. fructans·GOS는 소장엔 영향 없이 대장에서만 발효.", tag:"발효 (대장)" },
      { n:"3", title:"장관 팽창 → 기계수용체 자극", desc:"수분과 가스로 장관이 팽창하면 기계수용체가 자극됩니다.", tag:"팽창" },
      { n:"4", title:"내장과민성 있으면 → 증상", desc:"정상인은 경미한 팽만뿐이지만, 내장과민성이 있는 사람은 이 팽창을 복통·팽만·설사/변비로 느낍니다. 이것이 IBS 증상의 핵심 경로.", tag:"과민성 → 증상" }
    ];
    let flow = steps.map(s=>`
      <div class="mech-step">
        <div class="step-num">${s.n}</div>
        <div class="step-body">
          <div class="step-title">${s.title}</div>
          <div class="step-desc">${s.desc}</div>
          <span class="step-tag">${s.tag}</span>
        </div>
      </div>`).join("");
    return `<div class="edu-block" style="--edu-accent:var(--ibs);--edu-tag-bg:var(--ibs-bg);--edu-tag:var(--ibs)">
      <h3>🌀 FODMAP이 증상으로 이어지는 과정</h3>
      <div class="edu-sub">소장에서의 삼투, 대장에서의 발효, 그리고 장관 팽창으로 이어지는 흐름입니다</div>
      <div class="mech-flow">${flow}</div>
    </div>`;
  }

  // ② Gibson 프레임
  function eduFrame(){
    return `<div class="edu-block">
      <div class="edu-frame">
        <div class="ef-q">"당신의 장은 고장난 게 아니라 예민한 것입니다"</div>

      </div>
    </div>`;
  }

      <div class="trigger-chart">${rows}</div>

  // ④ 5-HT 신호전달

    if(!concept) return "";
    return `<div class="edu-block">
      <h3>⚙️ 세로토닌(5-HT) 신호 — IBS 약물의 표적</h3>

          <div class="step-desc">장운동·분비·내장감각을 매개. 라모세트론이 이를 차단하면 운동↓·분비↓·감각↓ 3중으로 설사형을 개선.</div>

          <span class="step-tag">작용 = 촉진</span></div></div>
      </div>
    </div>`;
  }

  // ⑤ 국내 미시판약
  function eduUnavailable(){
    const unavail = Object.values(DATA.FGID_DRUGS).filter(d=>d.domestic===false);
    if(!unavail.length) return "";
    let cards = unavail.map(d=>{
      const g = (d.grade && Object.values(d.grade).find(x=>x.strength)) || {};
      const gradeTxt = g.strength ? `해외 ${g.strength==='strong'?'강한':'조건부'} 권고 · 근거 ${({high:'높음',moderate:'중간',low:'낮음',very_low:'매우낮음'})[g.evidence]||g.evidence}` : "";
      return `<div class="unavail-card">
        <div class="uc-name">${d.nameKo} <span style="font-size:11px;color:var(--ink3)">${d.nameEn||""}</span></div>
        <div class="uc-status">🚫 ${d.domesticNote||"국내 미시판"}</div>
        <div class="uc-body">${(d.cautions||[]).join(" · ")||((d.class||"").replace("class:",""))}</div>
        ${gradeTxt?`<div class="uc-grade">📊 ${gradeTxt}</div>`:""}
      </div>`;
    }).join("");
    return `<div class="edu-block">
      <h3>🌐 국내에 없는 약물</h3>
      <div class="edu-sub">해외 지침에서는 권고되지만 국내에서는 쓸 수 없는 약들입니다. 지침과 현실이 어긋나는 지점을 함께 봅니다.</div>
      <div class="edu-unavail">${cards}</div>
    </div>`;
  }

      patient:{ conSubtype:"con:sub:defecatory", age:40, rectalExamAbnormal:true, comorbids:[] }, fn:"con" },

    { id:"sim6", dis:"dia", tag:"담즙산설사", title:"55세, 담낭절제 후 만성설사",
      vignette:"55세. 담낭절제술 2년 후 지속되는 수양성 설사. 복통은 뚜렷하지 않음. 대장내시경 정상.",
      data:["55세","담낭절제 후","복통 미미"],
      question:"담낭절제 후 만성설사, 무엇을 의심하고 어떻게 접근하는가?",
      teach:"담낭절제 후는 <b>담즙산설사(BAD)</b>의 전형적 배경. SeHCAT은 국내 불가라 C4 또는 cholestyramine 경험적 시도가 실질적 접근. 단 cholestyramine 단독 44% 무반응 → 무반응으로 BAD 배제 불가. 유럽은 경험적 시도 권고, 영·캐는 비권고 — <b>지침 상충</b>을 그대로 제시합니다. colesevelam은 국내無.",
      patient:{ diarrheaClues:{ cholecystectomy:true, abdominalPain:false }, age:55, comorbids:[] }, fn:"dia" },

    { id:"sim7", dis:"dia", tag:"현미경적대장염", title:"62세, 야간설사 + 경고증상",
      vignette:"62세 여성. 만성 수양성 설사, 야간에도 발생. 체중 약간 감소. 자가면역질환 병력.",
      data:["62세","경고증상 있음","야간설사","자가면역 병력"],
      question:"경고증상을 동반한 만성설사, 배제 우선순위는?",
      teach:"경고증상(야간설사·체중감소)이 있으므로 <b>대장내시경 + 무작위 생검</b>이 우선 — 육안 정상이어도 <b>미세현미경적대장염(MC)</b>은 생검으로만 진단됩니다. MC 확진 시 budesonide가 근거수준 높음(서구 특이허가)이나 국내는 오프라벨 가능성. 치료는 배제 후.",
      patient:{ diarrheaClues:{ alarmFeatures:true, abdominalPain:false }, age:62, comorbids:[] }, fn:"dia" }
  ];

  let simView = "list", simCaseId = null;

  function renderSimulation(){
    const el = document.getElementById("simulation-content");
    if(simView==="detail"){ el.innerHTML = renderSimDetail(simCaseId); attachSimDetailEvents(el); }
    else { el.innerHTML = renderSimList(); attachSimListEvents(el); }
  }

  function renderSimList(){
    let cards = SIM_CASES.map(c=>`
      <div class="sim-case-card" data-dis="${c.dis}" data-case="${c.id}">
        <span class="sc-tag ${c.dis}">${THEME[c.dis]} ${c.tag}</span>
        <div class="sc-title">${c.title}</div>
        <div class="sc-vignette">${c.vignette.slice(0,60)}…</div>
        <div class="sc-go">▶ 케이스 풀어보기</div>
      </div>`).join("");
    return `<div class="sim-intro">🧪 가상 증례로 처방을 연습합니다. 케이스를 읽고 스스로 판단한 뒤, 가이드라인·급여 기반 추천과 대조하세요. <b>정답이 아니라 근거 기반 조언</b>입니다.</div>
      <div class="sim-list">${cards}</div>`;
  }

  function renderSimDetail(caseId){
    const c = SIM_CASES.find(x=>x.id===caseId);
    if(!c) return renderSimList();
    let html = `<div class="sim-detail-crumb">
      <button class="back" data-simback="1">← 케이스 목록</button>
      <span class="crumb-sep">/</span>
      <span class="crumb-here">${THEME[c.dis]} ${c.title}</span></div>`;
    html += `<div class="sim-vignette-box">
      <div class="svb-title">📋 증례</div>
      <div class="svb-text">${c.vignette}</div>
      <div class="svb-data">${c.data.map(d=>`<span class="svb-chip">${d}</span>`).join("")}</div>
    </div>`;
    html += `<div class="sim-question">❓ ${c.question}</div>`;
    html += `<button class="sim-reveal-btn" data-reveal="1">💊 가이드라인·급여 기반 추천 보기</button>`;
    // 정답부(숨김)
    let res;
    if(c.fn==="ibs") res = recommendIBS(c.patient, DATA);
    else if(c.fn==="con") res = recommendConstipation(c.patient, DATA);
    else res = recommendDiarrhea(c.patient, DATA);
    html += `<div class="sim-answer" id="sim-answer">
      <div class="sim-teach">🎓 <b>해설:</b> ${c.teach}</div>
      <div class="themed-${c.dis}">${renderResultInner(res)}</div>
    </div>`;
    return html;
  }

  function attachSimListEvents(el){
    el.querySelectorAll(".sim-case-card").forEach(c=> c.onclick = ()=>{
      simCaseId = c.dataset.case; simView = "detail"; renderSimulation();
      smoothScroll("simulation-content");
    });
  }
  function attachSimDetailEvents(el){
    el.querySelector("[data-simback]").onclick = ()=>{ simView="list"; renderSimulation(); };
    const btn = el.querySelector("[data-reveal]");
    btn.onclick = ()=>{
      document.getElementById("sim-answer").classList.add("shown");
      btn.style.display = "none";
      // 카드 토글 활성화
      el.querySelectorAll("#sim-answer .drug-head").forEach(h=> h.onclick = ()=> h.parentNode.classList.toggle("open"));
      attachLibJump(el.querySelector("#sim-answer"));
    };
  }

  /* ── 초기화 ── */
  // 도서관 v2 렌더러에 DATA 전역 노출 (렌더러는 별도 IIFE)
  window.FGID_DRUGS = FGID_DRUGS;
  window.FGID_LIBRARY = (typeof FGID_LIBRARY!=="undefined") ? FGID_LIBRARY : [];
  window.FGID_LIB_CATS = (typeof FGID_LIB_CATS!=="undefined") ? FGID_LIB_CATS : {};
  window.FGID_DRUGCLASS = (typeof FGID_DRUGCLASS!=="undefined") ? FGID_DRUGCLASS : {};
  window.DRUGCLASS_PARENTS = (typeof DRUGCLASS_PARENTS!=="undefined") ? DRUGCLASS_PARENTS : [];
  window.FGID_DRUG_DETAIL = (typeof FGID_DRUG_DETAIL!=="undefined") ? FGID_DRUG_DETAIL : {};
  window.FGID_FIGURES = (typeof FGID_FIGURES!=="undefined") ? FGID_FIGURES : {};
  window.FGID_FIGURES_DEEP = (typeof FGID_FIGURES_DEEP!=="undefined") ? FGID_FIGURES_DEEP : {};
  window.GUT_SIGNAL_NODES = (typeof GUT_SIGNAL_NODES!=="undefined") ? GUT_SIGNAL_NODES : {};
  window.PERISTALSIS_NODES = (typeof PERISTALSIS_NODES!=="undefined") ? PERISTALSIS_NODES : {};
  window.DEEP_NODES_ALL = (typeof DEEP_NODES_ALL!=="undefined") ? DEEP_NODES_ALL : {};
  window.FODMAP_FOODS = (typeof FODMAP_FOODS!=="undefined") ? FODMAP_FOODS : {};
  window.FODMAP_KOREAN = (typeof FODMAP_KOREAN!=="undefined") ? FODMAP_KOREAN : {};
  window.FODMAP_GROUPS = (typeof FODMAP_GROUPS!=="undefined") ? FODMAP_GROUPS : {};
  window.FODMAP_SWAPS = (typeof FODMAP_SWAPS!=="undefined") ? FODMAP_SWAPS : [];
  window.ICD_CODES = ICD_CODES;
  window.LIB_CONCEPTS = (typeof LIB_CONCEPTS!=="undefined") ? LIB_CONCEPTS : {};
  window.LIB_MECH = (typeof LIB_MECH!=="undefined") ? LIB_MECH : {};
  window.LIB_RCT = (typeof LIB_RCT!=="undefined") ? LIB_RCT : {};
  window.LIB_DDX = (typeof LIB_DDX!=="undefined") ? LIB_DDX : {};
  window.LIB_HISTORY = (typeof LIB_HISTORY!=="undefined") ? LIB_HISTORY : {};
  window.FGID_CONCEPT_DEEP = (typeof FGID_CONCEPT_DEEP!=="undefined") ? FGID_CONCEPT_DEEP : {};
  window.smoothScroll = smoothScroll;
  if(typeof window.renderLibraryV2==="function") window.renderLibraryV2();
  renderPatientInput();
  renderSources();
})();
</script>
</body>
</html>
