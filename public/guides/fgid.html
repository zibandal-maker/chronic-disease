<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<meta name="color-scheme" content="light only">
<title>기능성 장질환 처방가이드 · IBS · 만성변비 · 만성설사</title>
<style>
:root {
  /* 질환 색 (헌장: disease 색 구조) */
  --ibs: #b45309;        --ibs-bg: #fef3e2;    --ibs-line: #f0c088;
  --con: #3730a3;        --con-bg: #eef0fb;    --con-line: #b0b6ea;
  --dia: #0e7490;        --dia-bg: #e4f4f6;    --dia-line: #8fcfda;
  /* 중립 */
  --ink: #1a1d21;        --ink2: #4a5058;      --ink3: #7a828c;
  --bg: #f7f8f9;         --card: #ffffff;      --line: #e2e6ea;
  --line2: #eef1f3;
  /* 이중축 배지 */
  --grade-strong: #15803d; --grade-weak: #a16207;
  --reimb-ok: #0369a1;    --reimb-no: #b91c1c;  --reimb-strict: #c2410c;
  --edu: #6b7280;
  --radius: 10px;
  --mono: ui-monospace, "SF Mono", "Cascadia Code", monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: "Pretendard", -apple-system, "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
  background: var(--bg); color: var(--ink);
  font-size: 14px; line-height: 1.55; letter-spacing: -0.01em;
}
.wrap { max-width: 960px; margin: 0 auto; padding: 0 16px 80px; }

/* ── 헤더 ── */
header.app {
  padding: 20px 0 14px; border-bottom: 2px solid var(--ink);
  margin-bottom: 4px;
}
header.app h1 { font-size: 20px; letter-spacing: -0.02em; display: flex; align-items: center; gap: 8px; }
header.app .sub { color: var(--ink3); font-size: 12.5px; margin-top: 3px; }
.disclaimer {
  background: #fffbeb; border: 1px solid #fde68a; border-radius: var(--radius);
  padding: 9px 13px; font-size: 12px; color: #78350f; margin: 12px 0;
}
.disclaimer b { color: #92400e; }

/* ── 탭 (4공통 섹션) ── */
nav.tabs {
  display: flex; gap: 4px; position: sticky; top: 0; z-index: 20;
  background: var(--bg); padding: 10px 0; border-bottom: 1px solid var(--line);
  overflow-x: auto;
}
nav.tabs button {
  flex: 0 0 auto; padding: 8px 15px; border: 1px solid var(--line);
  background: var(--card); border-radius: 8px; font-size: 13px; font-weight: 600;
  color: var(--ink2); cursor: pointer; white-space: nowrap; transition: .12s;
  font-family: inherit;
}
nav.tabs button:hover { border-color: var(--ink3); }
nav.tabs button.active { background: var(--ink); color: #fff; border-color: var(--ink); }
.tab-panel { display: none; padding-top: 16px; }
.tab-panel.active { display: block; }

/* ── 질환 선택 (플로우) ── */
.disease-pick { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.disease-pick button {
  flex: 1; min-width: 120px; padding: 13px; border-radius: var(--radius);
  border: 2px solid var(--line); background: var(--card); cursor: pointer;
  font-family: inherit; font-size: 14px; font-weight: 700; transition: .12s;
  display: flex; align-items: center; justify-content: center; gap: 7px;
}
.disease-pick button[data-d="ibs"].on { border-color: var(--ibs); background: var(--ibs-bg); color: var(--ibs); }
.disease-pick button[data-d="con"].on { border-color: var(--con); background: var(--con-bg); color: var(--con); }
.disease-pick button[data-d="dia"].on { border-color: var(--dia); background: var(--dia-bg); color: var(--dia); }
.disease-pick button .em { font-size: 18px; }

/* ── 환자 입력 패널 ── */
.patient-panel {
  background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
  padding: 15px; margin-bottom: 16px;
}
.patient-panel h3 { font-size: 13px; color: var(--ink2); margin-bottom: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .03em; }
.field-row { display: flex; flex-wrap: wrap; gap: 8px 16px; align-items: center; margin-bottom: 10px; }
.field-row > label { font-size: 12.5px; color: var(--ink2); min-width: 70px; font-weight: 600; }
.chip-group { display: flex; gap: 6px; flex-wrap: wrap; }
.chip {
  padding: 5px 11px; border: 1px solid var(--line); border-radius: 20px;
  background: var(--card); font-size: 12.5px; cursor: pointer; user-select: none;
  color: var(--ink2); transition: .1s; font-family: inherit;
}
.chip:hover { border-color: var(--ink3); }
.chip.on { background: var(--ink); color: #fff; border-color: var(--ink); }
.run-btn {
  width: 100%; padding: 12px; margin-top: 6px; border: none; border-radius: var(--radius);
  background: var(--ink); color: #fff; font-size: 14.5px; font-weight: 700; cursor: pointer;
  font-family: inherit;
}
.run-btn:hover { opacity: .9; }

/* ── 결과: flags ── */
.flags { margin-bottom: 14px; }
.flag {
  padding: 9px 13px; border-radius: 8px; font-size: 12.5px; margin-bottom: 6px;
  border-left: 3px solid; display: flex; gap: 8px; align-items: flex-start;
}
.flag .fi { font-size: 15px; line-height: 1; margin-top: 1px; }
.flag.diagnosis { background: #f0f9ff; border-color: #0284c7; color: #075985; }
.flag.axis_conflict { background: #fef2f2; border-color: #dc2626; color: #991b1b; }
.flag.safety { background: #fffbeb; border-color: #d97706; color: #92400e; }
.flag.classification { background: #f5f3ff; border-color: #7c3aed; color: #5b21b6; }

/* ── 결과: 약물 카드 (이중축 배지) ── */
.rank-note { font-size: 12px; color: var(--ink3); margin: 4px 0 10px; }
.drug-card {
  background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
  margin-bottom: 8px; overflow: hidden;
}
.drug-card.edu { opacity: .72; }
.drug-card.contra { border-color: #fca5a5; }
.drug-head {
  padding: 11px 14px; display: flex; align-items: center; gap: 9px; cursor: pointer;
  user-select: none;
}
.drug-head:hover { background: var(--line2); }
.drug-rank {
  font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--ink3);
  min-width: 20px;
}
.drug-name { font-weight: 700; font-size: 14.5px; flex: 1; }
.drug-name .cls { font-size: 11.5px; color: var(--ink3); font-weight: 500; margin-left: 6px; }
.badges { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
.badge {
  font-size: 10.5px; font-weight: 700; padding: 2.5px 7px; border-radius: 5px;
  white-space: nowrap; letter-spacing: .01em;
}
.badge.grade-strong { background: #dcfce7; color: var(--grade-strong); }
.badge.grade-weak { background: #fef9c3; color: var(--grade-weak); }
.badge.grade-na { background: #f1f5f9; color: var(--ink3); }
.badge.reimb-ok { background: #e0f2fe; color: var(--reimb-ok); }
.badge.reimb-no { background: #fee2e2; color: var(--reimb-no); }
.badge.reimb-strict { background: #ffedd5; color: var(--reimb-strict); }
.badge.edu { background: #f3f4f6; color: var(--edu); }
.badge.conflict { background: #fef2f2; color: #dc2626; border: 1px dashed #dc2626; }
.drug-toggle { font-size: 12px; color: var(--ink3); transition: transform .15s; }
.drug-card.open .drug-toggle { transform: rotate(90deg); }
.drug-body {
  display: none; padding: 0 14px 13px 43px; font-size: 12.5px; color: var(--ink2);
  border-top: 1px solid var(--line2);
}
.drug-card.open .drug-body { display: block; padding-top: 11px; }
.drug-body dl { display: grid; grid-template-columns: 76px 1fr; gap: 4px 10px; }
.drug-body dt { color: var(--ink3); font-weight: 600; font-size: 11.5px; }
.drug-body dd { color: var(--ink); }
.drug-body .caution { color: #b45309; }
.drug-body .reimb-detail { margin-top: 7px; padding-top: 7px; border-top: 1px dashed var(--line);
  font-size: 11.5px; }
/* 플로우 카드 근거 권고 */
.drug-body .drug-evidence { margin-top: 9px; padding-top: 8px; border-top: 1px dashed var(--line); }
.drug-body .de-h { font-size: 11px; font-weight: 700; color: var(--ink3); margin-bottom: 5px; }
.drug-body .de-item { font-size: 12px; color: var(--ink); line-height: 1.5; margin-bottom: 5px; padding-left: 8px; border-left: 2px solid var(--line); }
.drug-body .de-effect { color: var(--grade-strong); font-weight: 600; font-size: 11px; }
.drug-body .de-meta { color: var(--ink3); font-size: 10.5px; }
.drug-body .drug-links { margin-top: 8px; }
.drug-body .drug-lnk {
  display: inline-block; font-size: 11px; background: var(--line2); color: var(--reimb-ok);
  padding: 3px 9px; border-radius: 5px; margin: 2px 4px 0 0; cursor: pointer; font-weight: 600;
}
.drug-body .drug-lnk:hover { background: var(--line); }

/* ── targets ── */
.targets { margin-top: 14px; }
.targets h4 { font-size: 12.5px; color: var(--ink2); margin-bottom: 7px; font-weight: 700; }
.target-item {
  padding: 8px 12px; background: var(--card); border: 1px solid var(--line);
  border-radius: 8px; font-size: 12.5px; margin-bottom: 5px; color: var(--ink2);
}

/* 질환 테마 적용 */
.themed-ibs .drug-rank { color: var(--ibs); }
.themed-con .drug-rank { color: var(--con); }
.themed-dia .drug-rank { color: var(--dia); }

/* ── placeholder 섹션 ── */
.placeholder { text-align: center; padding: 50px 20px; color: var(--ink3); font-size: 13px; }

/* ── 도서관 섹션 ── */
/* 대분류 허브 (라벨 카드 그리드) */
.lib-hub { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; margin-bottom: 8px; }
.hub-card {
  background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
  padding: 16px 15px; cursor: pointer; transition: .12s; display: flex; align-items: center; gap: 12px;
  position: relative;
}
.hub-card:hover { border-color: var(--ink); box-shadow: 0 2px 8px rgba(0,0,0,.06); transform: translateY(-1px); }
.hub-card .hub-em { font-size: 24px; line-height: 1; }
.hub-card .hub-txt { flex: 1; }
.hub-card .hub-name { font-weight: 700; font-size: 14px; }
.hub-card .hub-count { font-size: 11.5px; color: var(--ink3); margin-top: 2px; }
.hub-card .hub-arrow { color: var(--ink3); font-size: 13px; }
/* 브레드크럼 */
.lib-crumb { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; font-size: 13px; }
.lib-crumb .back {
  padding: 6px 12px; border: 1px solid var(--line); border-radius: 8px; background: var(--card);
  cursor: pointer; font-size: 12.5px; font-weight: 600; color: var(--ink2); font-family: inherit;
}
.lib-crumb .back:hover { border-color: var(--ink3); }
.lib-crumb .crumb-here { font-weight: 700; color: var(--ink); display: flex; align-items: center; gap: 6px; }
.lib-crumb .crumb-sep { color: var(--ink3); }

.lib-search {
  position: relative; margin-bottom: 14px;
}
.lib-search input {
  width: 100%; padding: 12px 14px 12px 40px; border: 1px solid var(--line);
  border-radius: var(--radius); font-size: 14px; font-family: inherit; background: var(--card);
}
.lib-search input:focus { outline: 2px solid var(--ink); outline-offset: -1px; border-color: var(--ink); }
.lib-search .si { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--ink3); }
.lib-filters { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 14px; }
.lib-filters button {
  padding: 6px 12px; border: 1px solid var(--line); background: var(--card); border-radius: 20px;
  font-size: 12px; font-weight: 600; color: var(--ink2); cursor: pointer; font-family: inherit; transition: .1s;
}
.lib-filters button:hover { border-color: var(--ink3); }
.lib-filters button.on { background: var(--ink); color: #fff; border-color: var(--ink); }
.lib-count { font-size: 11.5px; color: var(--ink3); margin-bottom: 10px; }

.lib-card {
  background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
  margin-bottom: 8px; overflow: hidden;
}
.lib-card .lib-head {
  padding: 12px 14px; cursor: pointer; user-select: none; display: flex; gap: 10px; align-items: flex-start;
}
.lib-card .lib-head:hover { background: var(--line2); }
.lib-type-tag {
  font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 5px; white-space: nowrap;
  margin-top: 1px; letter-spacing: .02em;
}
.lib-type-concept { background: #ede9fe; color: #6d28d9; }
.lib-type-mech { background: #dbeafe; color: #1d4ed8; }
.lib-type-rct { background: #dcfce7; color: #15803d; }
.lib-type-ddx { background: #fef3c7; color: #b45309; }
.lib-type-history { background: #fce7f3; color: #be185d; }
.lib-head-main { flex: 1; }
.lib-name { font-weight: 700; font-size: 14.5px; }
.lib-core { font-size: 12.5px; color: var(--ink2); margin-top: 3px; line-height: 1.5; }
.lib-toggle { color: var(--ink3); font-size: 12px; transition: transform .15s; margin-top: 3px; }
.lib-card.open .lib-toggle { transform: rotate(90deg); }
.lib-body {
  display: none; padding: 0 14px 14px 14px; border-top: 1px solid var(--line2);
  font-size: 13px; color: var(--ink); line-height: 1.6;
}
.lib-card.open .lib-body { display: block; padding-top: 12px; }
.lib-body .deep { margin-bottom: 10px; }
.lib-body .pearl {
  background: #fffbeb; border-left: 3px solid #f59e0b; padding: 8px 12px; border-radius: 6px;
  font-size: 12.5px; color: #78350f; margin: 8px 0;
}
.lib-body .pearl b { color: #92400e; }
.lib-kv { display: grid; grid-template-columns: 88px 1fr; gap: 5px 10px; font-size: 12.5px; margin: 8px 0; }
.lib-kv dt { color: var(--ink3); font-weight: 600; font-size: 11.5px; }
.lib-kv dd { color: var(--ink); }
.lib-rct-result { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 6px; padding: 8px 12px;
  font-size: 12.5px; margin: 8px 0; }
.lib-rct-result b { color: #15803d; }
.lib-links { margin-top: 10px; padding-top: 8px; border-top: 1px dashed var(--line); font-size: 11.5px; color: var(--ink3); }
.lib-links .lnk { display: inline-block; background: var(--line2); padding: 2px 8px; border-radius: 5px;
  margin: 2px 3px 0 0; color: var(--ink2); cursor: pointer; }
.lib-links .lnk:hover { background: var(--line); }
.lib-pmid { color: var(--reimb-ok); font-family: var(--mono); font-size: 11px; }
.lib-empty { text-align: center; padding: 40px; color: var(--ink3); font-size: 13px; }

/* ═══ 도서관 v2 (당뇨 구조) ═══ */
:root {
  --pay: #b87514; --pay-bg: #fbf0d8;
  --clin: #2c6fb0; --clin-bg: #e4eef8;
  --care: #1a8a72; --care-bg: #dcf2ec;
  --ok: #1f9d54; --block: #c43838; --alert: #d8632a;
}
.lib-search { position: relative; margin-bottom: 16px; }
.lib-search input { width: 100%; padding: 12px 40px 12px 40px; border: 1px solid var(--line); border-radius: 10px; font-size: 14px; font-family: inherit; }
.lib-search input:focus { outline: 2px solid var(--ink); outline-offset: -1px; }
.lib-search .si { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); }
.lib-search .clr { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); border: none; background: var(--line2); border-radius: 50%; width: 22px; height: 22px; cursor: pointer; color: var(--ink3); font-size: 11px; }

/* 카테고리 섹션 */
.lib-catsec { margin-bottom: 22px; }
.lib-cathead { font-size: 13px; font-weight: 700; color: var(--ink); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 2px solid var(--line); }
.lib-cat-pay .lib-cathead { border-color: var(--pay); }
.lib-cat-clin .lib-cathead { border-color: var(--clin); }
.lib-cat-care .lib-cathead { border-color: var(--care); }
.lib-catdesc { font-weight: 500; font-size: 11.5px; color: var(--ink3); margin-left: 6px; }
.lib-topicgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }

/* 토픽 카드 */
.lib-topic { display: flex; align-items: center; gap: 12px; background: var(--card); border: 1px solid var(--line); border-left-width: 3px; border-radius: 10px; padding: 14px 15px; cursor: pointer; transition: .12s; }
.lib-topic:hover { box-shadow: 0 2px 8px rgba(0,0,0,.07); transform: translateY(-1px); }
.lib-topic.lib-cat-pay { border-left-color: var(--pay); }
.lib-topic.lib-cat-clin { border-left-color: var(--clin); }
.lib-topic.lib-cat-care { border-left-color: var(--care); }
.lt-icon { font-size: 22px; }
.lt-txt { flex: 1; }
.lt-title { font-weight: 700; font-size: 14px; }
.lt-sub { font-size: 11.5px; color: var(--ink3); margin-top: 2px; }
.lt-arrow { color: var(--ink3); font-size: 12px; }

/* 브레드크럼 */
.lib-crumb { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; font-size: 13px; }
.lib-crumb .back { padding: 6px 12px; border: 1px solid var(--line); border-radius: 8px; background: var(--card); cursor: pointer; font-size: 12.5px; font-weight: 600; color: var(--ink2); font-family: inherit; }
.lib-crumb .crumb-here { font-weight: 700; }
.lib-crumb .crumb-sep { color: var(--ink3); }
.lib-count { font-size: 11.5px; color: var(--ink3); margin-bottom: 10px; }

/* 블록 공통 */
.lib-block { margin-bottom: 22px; }
.blk-title { font-size: 14px; font-weight: 700; margin-bottom: 10px; color: var(--ink); }
.blk-note { font-size: 12px; color: var(--ink3); margin: 6px 0 10px; line-height: 1.5; }

/* keypoints */
.blk-kp { list-style: none; }
.blk-kp li { position: relative; padding: 7px 0 7px 20px; font-size: 13px; line-height: 1.6; border-bottom: 1px solid var(--line2); }
.blk-kp li:before { content: "•"; position: absolute; left: 4px; color: var(--clin); font-weight: 700; }

/* ladder */
.blk-ladder { display: flex; flex-direction: column; gap: 8px; }
.lad-row { display: flex; gap: 12px; background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 11px 13px; }
.lad-row.danger { border-color: #fca5a5; }
.lad-n { flex: 0 0 30px; height: 30px; border-radius: 8px; background: var(--clin); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; }
.lad-h { font-weight: 700; font-size: 13px; }
.lad-b { font-size: 12px; color: var(--ink2); margin-top: 2px; line-height: 1.5; }

/* figure (모식도) */
.blk-figure { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 14px; text-align: center; }
.blk-figure svg { max-width: 100%; height: auto; }
.blk-figure figcaption { font-size: 12px; color: var(--ink3); margin-top: 8px; }
.gut-svg .gut-node { cursor: pointer; }
.gut-svg .gut-node rect { fill: var(--clin-bg); stroke: var(--clin); stroke-width: 1.5; transition: .12s; }
.gut-svg .gut-node:hover rect { fill: var(--clin); }
.gut-svg .gut-node:hover text { fill: #fff; }
.gut-svg .gut-node text { text-anchor: middle; font-size: 12px; font-weight: 700; fill: var(--ink); pointer-events: none; }
.gut-svg .gut-edge { font-size: 10px; fill: var(--ink3); }
.gut-svg .gut-boxlabel { text-anchor: middle; font-size: 11px; fill: var(--ink3); font-weight: 600; }
.gut-svg .gut-hint { text-anchor: middle; font-size: 10px; fill: var(--ink-faint, #8493a0); }
.gut-svg .gs-t { text-anchor: middle; font-size: 12px; font-weight: 700; fill: var(--ink); }
.gut-svg .gs-b { text-anchor: middle; font-size: 10px; fill: var(--ink2); }
/* 질환 시각 요소 텍스트 */
.gut-svg .br-zone { font-size: 11px; font-weight: 700; }
.gut-svg .br-t { font-size: 11px; fill: var(--ink2); }
.gut-svg .br-hint { font-size: 10px; fill: var(--ink3); }
.gut-svg .br-axis { text-anchor: middle; font-size: 9.5px; fill: var(--ink3); }
.gut-svg .qt { text-anchor: middle; font-size: 15px; font-weight: 700; fill: var(--ink); }
.gut-svg .qb { text-anchor: middle; font-size: 11px; fill: var(--ink2); }
.gut-svg .al-h { text-anchor: middle; font-size: 12.5px; font-weight: 700; fill: #b3261e; }
.gut-svg .al-b text { font-size: 11px; fill: var(--ink2); }
.gut-svg .al-f { text-anchor: middle; font-size: 10.5px; font-weight: 600; fill: #b3261e; }
/* 연동반사 심화 도식 */
.peri-svg .peri-title { text-anchor: middle; font-size: 11.5px; font-weight: 700; fill: var(--ink); }
.peri-svg .peri-node rect { fill: var(--clin-bg); stroke: var(--clin); stroke-width: 1.4; transition: .12s; }
.peri-svg .peri-node { cursor: pointer; }
.peri-svg .peri-node:hover rect { fill: var(--clin); }
.peri-svg .peri-node:hover text { fill: #fff; }
.peri-svg .peri-node text { text-anchor: middle; font-size: 11px; font-weight: 700; fill: var(--ink); pointer-events: none; }
.peri-svg .peri-node.peri-ex rect { fill: #fbe2e2; stroke: #c43838; }
.peri-svg .peri-node.peri-ex:hover rect { fill: #c43838; }
.peri-svg .peri-node.peri-in rect { fill: #e4eef8; stroke: #2c6fb0; }
.peri-svg .peri-sub { font-size: 8.5px !important; font-weight: 400 !important; fill: var(--ink3) !important; }
.peri-svg .peri-sub2 { text-anchor: middle; font-size: 8.5px; fill: var(--ink3); }
.peri-svg .peri-musc { text-anchor: middle; font-size: 11px; font-weight: 700; fill: var(--ink); }
.peri-svg .peri-tx { font-size: 9px; fill: var(--care); font-weight: 600; }
.peri-svg .peri-bolus { text-anchor: middle; font-size: 11px; font-weight: 700; fill: #fff; }
.peri-svg .peri-bolus2 { text-anchor: middle; font-size: 8.5px; fill: #f0d0d8; }
.peri-svg .peri-prop { text-anchor: middle; font-size: 10px; font-weight: 700; fill: var(--ink3); }
.nm-step { display: inline-block; font-size: 10px; font-weight: 700; background: var(--clin); color: #fff; padding: 1px 8px; border-radius: 10px; margin-left: 8px; vertical-align: middle; }
.nm-edu { display: inline-block; font-size: 10px; font-weight: 700; background: #c43838; color: #fff; padding: 1px 8px; border-radius: 10px; margin-left: 6px; vertical-align: middle; }
/* 해부학적 심화도식 v2 */
.peri-svg .peri-axlabel { text-anchor: middle; font-size: 9px; font-weight: 700; fill: var(--ink3); }
.peri-svg .peri-dot { text-anchor: middle; font-size: 7px; font-weight: 700; fill: #fff; pointer-events: none; }
.peri-svg .peri-bbb { text-anchor: middle; font-size: 8px; font-weight: 700; fill: #c43838; }
.peri-svg .peri-bbbsub { text-anchor: middle; font-size: 7.5px; fill: var(--ink3); }
.peri-svg .peri-organ { text-anchor: middle; font-size: 9px; font-weight: 600; fill: #a06a6a; }
.peri-svg .peri-zoom { text-anchor: middle; font-size: 8px; font-style: italic; fill: var(--ink3); }
.peri-svg .peri-walllabel { text-anchor: middle; font-size: 9.5px; font-weight: 700; fill: var(--ink2); }
.peri-svg .peri-muscle-rect { fill: #f3d5db; stroke: #b0687c; stroke-width: 1.3; }
.peri-svg .peri-node.peri-ex .peri-muscle-rect { fill: #f3d5db; }
.peri-svg .peri-legend2 { text-anchor: middle; font-size: 8.5px; fill: var(--ink3); }
.peri-svg .peri-bolus { text-anchor: middle; font-size: 8.5px; font-weight: 700; fill: #fff; pointer-events: none; }
/* FODMAP·담즙산·내장과민성 도식 */
.fmech-svg .peri-node rect, .bile-svg .peri-node rect, .vh-svg .peri-node rect { fill: var(--clin-bg); stroke: var(--clin); stroke-width: 1.4; transition: .12s; }
.fmech-svg .peri-node { cursor: pointer; }
.bile-svg .peri-node { cursor: pointer; }
.vh-svg .peri-node { cursor: pointer; }
.fmech-svg .peri-node text, .bile-svg .peri-node text, .vh-svg .peri-node text { text-anchor: middle; font-size: 11px; font-weight: 700; fill: var(--ink); pointer-events: none; }
.fmech-svg .peri-node:hover rect, .bile-svg .peri-node:hover rect, .vh-svg .peri-node:hover rect { fill: var(--clin); }
.fmech-svg .peri-node:hover text, .bile-svg .peri-node:hover text, .vh-svg .peri-node:hover text { fill: #fff; }
.fmech-svg .peri-sub, .bile-svg .peri-sub, .vh-svg .peri-sub { font-size: 8.5px !important; font-weight: 400 !important; fill: var(--ink3) !important; }
.fmech-svg .peri-sub2, .bile-svg .peri-sub2, .vh-svg .peri-sub2 { text-anchor: middle; font-size: 8.5px; fill: var(--ink3); }
.fmech-svg .peri-title, .bile-svg .peri-title, .vh-svg .peri-title { text-anchor: middle; font-size: 11.5px; font-weight: 700; fill: var(--ink); }
.fmech-svg .peri-prop, .bile-svg .peri-prop, .vh-svg .peri-prop { text-anchor: middle; font-size: 9px; font-weight: 600; fill: var(--ink3); }
.fmech-water rect { fill: #e4eef8 !important; stroke: #0369a1 !important; }
.fmech-gas rect { fill: #fef3c7 !important; stroke: #b45309 !important; }
.fmech-symptom rect { fill: #fbe2e2 !important; stroke: #c43838 !important; }
.fmech-svg .fmech-normal { text-anchor: middle; font-size: 11px; font-weight: 700; fill: #1f7a45; }
.bile-organ rect { fill: #fdf6e3 !important; stroke: #c9a227 !important; }
.bile-colon rect { fill: #fbe2e2 !important; stroke: #c43838 !important; }
.bile-svg .bile-loop { text-anchor: middle; font-size: 8.5px; font-weight: 600; fill: #1f9d54; }
.bile-svg .bile-fgf { text-anchor: middle; font-size: 8px; fill: #1f9d54; }
.bile-svg .bile-fail { text-anchor: middle; font-size: 8.5px; font-weight: 700; fill: #c43838; }
.vh-mast rect { fill: #f3e8ff !important; stroke: #9333ea !important; }
.vh-nerve rect { fill: #e0f2fe !important; stroke: #0284c7 !important; }
.vh-central rect { fill: #e4eef8 !important; stroke: #2c6fb0 !important; }

/* 노드 모달 */
.node-modal { display: none; position: fixed; inset: 0; z-index: 100; align-items: center; justify-content: center; padding: 20px; }
.nm-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,.4); }
.nm-box { position: relative; background: #fff; border-radius: 14px; padding: 20px; max-width: 400px; width: 100%; box-shadow: 0 10px 40px rgba(0,0,0,.2); }
.nm-close { position: absolute; top: 12px; right: 14px; cursor: pointer; color: var(--ink3); font-size: 16px; }
.nm-title { font-size: 16px; font-weight: 700; margin-bottom: 10px; }
.nm-desc { font-size: 13px; line-height: 1.65; color: var(--ink2); }
.nm-drugs { margin-top: 12px; padding: 10px 12px; background: var(--clin-bg); border-radius: 8px; font-size: 12.5px; line-height: 1.6; }
.nm-note { margin-top: 8px; font-size: 12px; color: var(--ink3); line-height: 1.5; }

/* frame */
.blk-frame { background: linear-gradient(135deg,#fffbeb,#fef3c7); border: 1px solid #fde68a; border-radius: 12px; padding: 16px; }
.bf-q { font-size: 15px; font-weight: 700; color: #92400e; margin-bottom: 8px; }
.bf-a { font-size: 13px; color: #78350f; line-height: 1.65; }

/* reimb matrix (이중축) */
.blk-reimbmatrix { border: 1px solid var(--line); border-radius: 10px; overflow: hidden; }
.rm-head, .rm-row { display: grid; grid-template-columns: 1fr 84px 96px; align-items: center; }
.rm-head { background: var(--panel2, #eef1f4); font-size: 11px; font-weight: 700; color: var(--ink3); }
.rm-head .rm-cell, .rm-head .rm-nm { padding: 8px 10px; text-align: center; }
.rm-head .rm-nm { text-align: left; }
.rm-row { border-top: 1px solid var(--line2); font-size: 12px; }
.rm-row.rm-conflict { background: #fff7ed; }
.rm-nm { padding: 9px 10px; font-weight: 600; }
.rm-flag { font-size: 10px; color: var(--alert); font-weight: 700; }
.rm-cell { padding: 6px 4px; text-align: center; font-size: 11px; font-weight: 700; margin: 4px; border-radius: 6px; }
.gm-strong { background: #dcf2e4; color: #1f7a45; }
.gm-weak { background: #fef3c7; color: #92400e; }
.gm-na { background: var(--line2); color: var(--ink3); }
.pm-ok { background: #dcf2e4; color: #1f7a45; }
.pm-strict { background: #fef3c7; color: #92400e; }
.pm-no { background: #fbe2e2; color: #b3261e; }
.pm-none { background: #ede9fe; color: #6d28d9; }
.rm-legend { padding: 9px 11px; font-size: 10.5px; color: var(--ink3); line-height: 1.5; border-top: 1px solid var(--line2); background: var(--panel2, #eef1f4); }

/* drugreimb → 표 */
.blk-reimbtable { width: 100%; border-collapse: collapse; font-size: 12px; border: 1px solid var(--line); border-radius: 10px; overflow: hidden; }
.blk-reimbtable thead th { background: var(--panel2, #eef1f4); font-size: 11px; font-weight: 700; color: var(--ink3); padding: 8px 10px; text-align: left; }
.blk-reimbtable thead th:nth-child(2) { text-align: center; width: 56px; }
.blk-reimbtable tbody tr { border-top: 1px solid var(--line2); }
.blk-reimbtable .rt-nm { padding: 8px 10px; font-weight: 600; white-space: nowrap; }
.blk-reimbtable .rt-st { padding: 8px 4px; text-align: center; }
.blk-reimbtable .rt-dt { padding: 8px 10px; color: var(--ink2); line-height: 1.45; }
.rt-badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 5px; white-space: nowrap; }
.rt-ok { background: #dcf2e4; color: #1f7a45; }
.rt-strict { background: #fef3c7; color: #92400e; }
.rt-no { background: #fbe2e2; color: #b3261e; }
.rt-none { background: #ede9fe; color: #6d28d9; }

/* codetable */
.blk-codetable { display: flex; flex-direction: column; gap: 4px; }
.ct-row { display: flex; align-items: center; gap: 10px; padding: 7px 10px; background: var(--card); border: 1px solid var(--line); border-radius: 7px; }
.ct-code { font-family: var(--mono); font-weight: 700; color: var(--clin); font-size: 12px; min-width: 62px; }
.ct-ko { font-size: 12.5px; flex: 1; }
.ct-note { font-size: 11px; color: var(--ink3); }

/* drugclass */
.dc-parent { margin-bottom: 16px; }
.dc-parent-h { font-size: 13px; font-weight: 700; color: var(--care); margin-bottom: 8px; }
.dc-card { background: var(--card); border: 1px solid var(--line); border-radius: 10px; margin-bottom: 7px; overflow: hidden; }
.dc-head { padding: 12px 14px; font-weight: 700; font-size: 13.5px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
.dc-head:hover { background: var(--line2); }
.dc-toggle { color: var(--ink3); font-size: 12px; transition: transform .15s; }
.dc-card.open .dc-toggle { transform: rotate(90deg); }
.dc-body { display: none; padding: 0 14px 14px; border-top: 1px solid var(--line2); }
.dc-card.open .dc-body { display: block; padding-top: 12px; }
.dc-fields { display: grid; grid-template-columns: 52px 1fr; gap: 6px 10px; font-size: 12.5px; margin-bottom: 12px; }
.dc-fields dt { color: var(--ink3); font-weight: 700; font-size: 11.5px; }
.dc-fields dd { line-height: 1.55; }
.dc-fields dd.dc-reimb { color: var(--pay); font-weight: 500; }
.dc-members { display: flex; flex-direction: column; gap: 7px; }
.dc-member { background: var(--panel2, #eef1f4); border-radius: 8px; padding: 9px 11px; }
.dcm-nm { font-weight: 700; font-size: 12.5px; }
.dcm-brand { font-weight: 500; font-size: 11px; color: var(--clin); }
.dcm-dose, .dcm-adj { font-size: 11.5px; color: var(--ink2); margin-top: 3px; }
.dcm-adj { color: var(--alert); }
.dcm-tip { font-size: 11.5px; color: var(--ink3); margin-top: 3px; line-height: 1.5; }

/* LIB 아이템 카드 (concept/ddx/rct/history) */
.li-card { background: var(--card); border: 1px solid var(--line); border-radius: 10px; margin-bottom: 7px; overflow: hidden; }
.li-head { padding: 12px 14px; cursor: pointer; display: flex; flex-direction: column; gap: 3px; position: relative; }
.li-head:hover { background: var(--line2); }
.li-name { font-weight: 700; font-size: 13.5px; padding-right: 20px; }
.li-core { font-size: 12px; color: var(--ink2); line-height: 1.5; }
.li-toggle { position: absolute; right: 14px; top: 13px; color: var(--ink3); font-size: 12px; transition: transform .15s; }
.li-card.open .li-toggle { transform: rotate(90deg); }
.li-body { display: none; padding: 0 14px 13px; border-top: 1px solid var(--line2); font-size: 12.5px; line-height: 1.6; }
.li-card.open .li-body { display: block; padding-top: 11px; }
.li-deep { margin-bottom: 8px; }
.li-dim { color: var(--ink3); }
.li-kv { display: grid; grid-template-columns: 70px 1fr; gap: 4px 10px; margin: 8px 0; font-size: 12px; }
.li-kv dt { color: var(--ink3); font-weight: 600; }
.li-result { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 6px; padding: 8px 11px; margin: 8px 0; font-size: 12.5px; }
.li-result b { color: var(--ok); }
.li-pearl { background: #fffbeb; border-left: 3px solid #f59e0b; padding: 8px 11px; border-radius: 6px; font-size: 12px; color: #78350f; margin: 8px 0; line-height: 1.55; }
.li-links { margin-top: 8px; }
.li-pmid { font-family: var(--mono); font-size: 11px; color: var(--clin); }

/* 심화 개념 섹션 */
.cd-sec { margin-bottom: 11px; }
.cd-h { font-size: 12.5px; font-weight: 700; color: var(--care); margin-bottom: 4px; }
.cd-b { font-size: 12.5px; line-height: 1.65; color: var(--ink2); }
.li-refplain { font-size: 11px; color: var(--ink3); }

/* trigger chart */
.blk-trigger { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 14px; }
.trg-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.trg-nm { flex: 0 0 130px; font-size: 12px; font-weight: 600; }
.trg-bar-wrap { flex: 1; background: var(--line2); border-radius: 5px; height: 22px; overflow: hidden; }
.trg-bar { height: 100%; border-radius: 5px; display: flex; align-items: center; padding: 0 8px; color: #fff; font-size: 11px; font-weight: 700; }

/* food table */
.blk-foodtable { display: flex; flex-direction: column; gap: 5px; }
.ft-row { display: grid; grid-template-columns: 54px 1fr 1fr; gap: 8px; padding: 8px 10px; background: var(--card); border: 1px solid var(--line); border-radius: 7px; font-size: 11.5px; align-items: center; }
.ft-cat { font-weight: 700; color: var(--care); }
.ft-hi b { color: var(--block); }
.ft-lo b { color: var(--ok); }

/* food table 전체판 */
.blk-foodtable-full { display: flex; flex-direction: column; gap: 14px; }
.ft-legend { background: var(--panel2, #eef1f4); border-radius: 10px; padding: 12px 14px; }
.ft-legend-h { font-size: 12px; font-weight: 700; margin-bottom: 8px; color: var(--ink); }
.ft-legend-row { font-size: 11.5px; line-height: 1.9; }
.ft-g { display: inline-block; color: #fff; font-size: 9.5px; font-weight: 700; padding: 1px 6px; border-radius: 4px; margin-right: 3px; }
.blk-foodtable-full .ft-cat { display: block; }
.ft-cat-h { font-size: 13px; font-weight: 700; color: var(--care); margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid var(--line); }
.ft-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.ft-col { border-radius: 10px; padding: 10px; }
.ft-col-hi { background: #fef2f2; border: 1px solid #fecaca; }
.ft-col-lo { background: #f0fdf4; border: 1px solid #bbf7d0; }
.ft-col-h { font-size: 11px; font-weight: 700; margin-bottom: 8px; }
.ft-col-hi .ft-col-h { color: var(--block); }
.ft-col-lo .ft-col-h { color: var(--ok); }
.ft-item { padding: 5px 0; border-top: 1px solid rgba(0,0,0,.04); }
.ft-item:first-of-type { border-top: none; }
.ft-food { font-size: 12px; font-weight: 600; }
.ft-en { font-weight: 400; font-size: 10px; color: var(--ink3); }
.ft-nonkr { font-size: 9.5px; color: var(--ink-faint, #8493a0); }
.ft-swap { font-size: 11px; color: var(--care); margin-top: 2px; }
.ft-korean { background: #fffbeb; border: 1px solid #fde68a; border-radius: 10px; padding: 12px 14px; }
.ft-korean-h { font-size: 13px; font-weight: 700; color: #92400e; margin-bottom: 8px; }
.ft-kitem { font-size: 12px; padding: 6px 0; border-top: 1px solid #fef3c7; line-height: 1.5; }
.ft-kitem:first-of-type { border-top: none; }
.ft-knote { font-size: 11px; color: var(--ink2); margin-top: 2px; }

/* ── 교육공간 섹션 ── */
.edu-intro { font-size: 13px; color: var(--ink2); margin-bottom: 18px; line-height: 1.6; }
.edu-block { margin-bottom: 28px; }
.edu-block > h3 {
  font-size: 15px; font-weight: 700; margin-bottom: 4px; display: flex; align-items: center; gap: 8px;
}
.edu-block > .edu-sub { font-size: 12px; color: var(--ink3); margin-bottom: 12px; }

/* 기전 흐름도 (스텝) */
.mech-flow { display: flex; flex-direction: column; gap: 0; }
.mech-step {
  display: flex; gap: 14px; align-items: flex-start; position: relative; padding-bottom: 16px;
}
.mech-step:not(:last-child)::before {
  content: ""; position: absolute; left: 17px; top: 36px; bottom: 0; width: 2px; background: var(--line);
}
.mech-step .step-num {
  flex: 0 0 36px; height: 36px; border-radius: 50%; background: var(--edu-accent, var(--ink));
  color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px;
  z-index: 1;
}
.mech-step .step-body {
  flex: 1; background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
  padding: 12px 14px;
}
.mech-step .step-title { font-weight: 700; font-size: 13.5px; margin-bottom: 3px; }
.mech-step .step-desc { font-size: 12.5px; color: var(--ink2); line-height: 1.55; }
.mech-step .step-tag {
  display: inline-block; font-size: 10.5px; font-weight: 700; padding: 2px 8px; border-radius: 5px;
  background: var(--edu-tag-bg, #eef2ff); color: var(--edu-tag, #4338ca); margin-top: 6px;
}

/* 프레임 강조 박스 (Gibson 프레임 등) */
.edu-frame {
  background: linear-gradient(135deg, #fffbeb, #fef3c7); border: 1px solid #fde68a;
  border-radius: var(--radius); padding: 14px 16px; margin: 14px 0;
}
.edu-frame .ef-q { font-size: 15px; font-weight: 700; color: #92400e; margin-bottom: 6px; }
.edu-frame .ef-a { font-size: 13px; color: #78350f; line-height: 1.6; }

/* 트리거 순위 바차트 */
.trigger-chart { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 15px; }
.trigger-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
.trigger-row .tr-name { flex: 0 0 130px; font-size: 12.5px; font-weight: 600; }
.trigger-row .tr-bar-wrap { flex: 1; background: var(--line2); border-radius: 5px; height: 22px; overflow: hidden; }
.trigger-row .tr-bar {
  height: 100%; border-radius: 5px; display: flex; align-items: center; padding: 0 8px;
  color: #fff; font-size: 11px; font-weight: 700; transition: width .6s ease;
}

/* 국내 미시판 카드 */
.edu-unavail { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; }
.unavail-card {
  background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 13px 15px;
  border-left: 3px solid var(--reimb-strict);
}
.unavail-card .uc-name { font-weight: 700; font-size: 14px; }
.unavail-card .uc-status { font-size: 11px; color: var(--reimb-no); font-weight: 700; margin: 3px 0 7px; }
.unavail-card .uc-body { font-size: 12px; color: var(--ink2); line-height: 1.5; }
.unavail-card .uc-grade { font-size: 11px; color: var(--grade-strong); margin-top: 6px; font-weight: 600; }

/* 역사 타임라인 */
.timeline { position: relative; padding-left: 20px; }
.timeline::before { content: ""; position: absolute; left: 4px; top: 4px; bottom: 4px; width: 2px; background: var(--line); }
.tl-item { position: relative; margin-bottom: 16px; }
.tl-item::before {
  content: ""; position: absolute; left: -20px; top: 5px; width: 10px; height: 10px; border-radius: 50%;
  background: var(--pink, #be185d); border: 2px solid var(--card);
}
.tl-item .tl-name { font-weight: 700; font-size: 13.5px; }
.tl-item .tl-timeline { font-size: 12px; color: var(--ink2); margin: 3px 0; line-height: 1.5; }
.tl-item .tl-lesson { font-size: 12px; color: #92400e; background: #fffbeb; padding: 6px 10px; border-radius: 6px; margin-top: 5px; }

/* ── 시뮬레이션 섹션 ── */
.sim-intro { font-size: 13px; color: var(--ink2); margin-bottom: 16px; line-height: 1.6; }
.sim-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
.sim-case-card {
  background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
  padding: 14px 15px; cursor: pointer; transition: .12s; border-left: 3px solid var(--line);

/* ============================================================
   FGID ENGINE — 추천 로직 (정문 3개 + grade순위 + 이중축 + 안전가드)
   원칙(헌장): 문자열 리터럴 하드코딩 금지. DATA 순회만.
   정문 계약: recommend*(patient) → {drugs[], targets[], flags[]}
   이중축: 가이드라인 등급 + HIRA 급여 분리 보존. 상충 flag.
   조언자: 순위는 참고 표시일 뿐 강제 아님. drugs[]는 등급순 나열.
   생성: 2026-07-01 | 검증: node --check + 가상환자 6케이스
   의존: FGID_DRUGS, FGID_RECS, DIA_CLASSES (DATA 레이어)
   ============================================================ */

/* ── 등급 정규화: 가이드별 표기 → 단일 수치 척도 ── */
const STRENGTH_SCORE = { strong: 2, weak: 1, na: 0 };
const EVIDENCE_SCORE = { high: 4, moderate: 3, low: 2, very_low: 1, none: 0, na: 0 };

function normalizeGrade(gradeObj, disease) {
 // gradeObj = drug.grade[disease] = {strength, evidence}
 if (!gradeObj) return { strength: "na", evidence: "na", sScore: 0, eScore: 0 };
 const s = gradeObj.strength || "na";
 const e = gradeObj.evidence || "na";
 return {
  strength: s, evidence: e,
  sScore: STRENGTH_SCORE[s] ?? 0,
  eScore: EVIDENCE_SCORE[e] ?? 0,
  source: gradeObj.source || null
 };
}

/* ── 안전가드: 환자 동반질환·상태로 flag/제외 ── */
function applySafetyGuards(drug, patient) {
 const flags = [];
 // 금기(contraindications) — 제외 대상
 (drug.contraindications || []).forEach(c => {
  if ((patient.comorbids || []).includes(c)) {
   flags.push({ level: "contraindicated", reason: `${c} 금기`, drugId: drug.id });
  }
 });
 // 용량조정(doseAdjust)
 if (drug.doseAdjust) {
  Object.keys(drug.doseAdjust).forEach(cond => {
   if (cond === "elderly" && patient.age >= 65) {
    flags.push({ level: "dose_adjust", reason: `고령 → ${drug.doseAdjust[cond]}`, drugId: drug.id });
   } else if ((patient.comorbids || []).includes(cond)) {
    flags.push({ level: "dose_adjust", reason: `${cond} → ${drug.doseAdjust[cond]}`, drugId: drug.id });
   }
  });
 }
 // 일반 주의(cautions 중 comorbid 링크)
 (drug.cautions || []).forEach(cau => {
  // cautions는 자유텍스트라 flag만; comorbid 배열형 주의는 별도
 });
 return flags;
}

/* ── 급여 게이트: 급여 상태 + 가이드라인 상충 판정 ── */
function applyReimbursementGate(drug) {
 const r = drug.reimb || {};
 return {
  covered: !!r.covered,
  strict: !!r.strict,           // 급여 조건 까다로움
  verify: !!r.verify,           // 코딩직전 재검증 대상
  indication: r.indication || null,
  notice: r.notice || null,
  note: r.note || null
 };
}

/* ── 이중축 정렬: 등급 우선, 급여/가용은 표시(강제 아님) ── */
function rankDrugs(candidates, patient, disease) {
 return candidates
  .map(drug => {
   const grade = normalizeGrade((drug.grade || {})[disease], disease);
   const reimb = applyReimbursementGate(drug);
   const safety = applySafetyGuards(drug, patient);
   const contraindicated = safety.some(f => f.level === "contraindicated");
   return {
    drugId: drug.id, nameKo: drug.nameKo, class: drug.class,
    domestic: drug.domestic !== false,
    domesticNote: drug.domesticNote || null,
    educationOnly: !!drug.educationOnly,
    grade, reimb, safety, contraindicated,
    // 이중축 상충: (1)등급 높은데 급여/가용 문제 or (2)적응증 있는데 비급여(급여-가이드라인 괴리)
    axisConflict: ((grade.sScore >= 2 || grade.eScore >= 3) &&
                   (!reimb.covered || reimb.strict || drug.domestic === false)) ||
                  (reimb.strict && !reimb.covered && grade.sScore >= 1)
   };
  })
  // 교육전용(국내無)은 뒤로, 금기는 표시하되 순위 하락
  .sort((a, b) => {
   // 1. 교육전용(국내무) 후순위
   if (a.educationOnly !== b.educationOnly) return a.educationOnly ? 1 : -1;
   // 2. 금기 후순위
   if (a.contraindicated !== b.contraindicated) return a.contraindicated ? 1 : -1;
   // 3. 권고강도 desc
   if (b.grade.sScore !== a.grade.sScore) return b.grade.sScore - a.grade.sScore;
   // 4. 근거수준 desc
   if (b.grade.eScore !== a.grade.eScore) return b.grade.eScore - a.grade.eScore;
   // 5. 급여됨 우선(동급일 때만)
   if (a.reimb.covered !== b.reimb.covered) return a.reimb.covered ? -1 : 1;
   return 0;
  });
}

/* ── 후보 약물 수집: DATA에서 해당 질환/아형 indication 매칭 ── */
function collectCandidates(FGID_DRUGS, indicationTags) {
 return Object.values(FGID_DRUGS).filter(drug =>
  (drug.indications || []).some(ind => indicationTags.includes(ind))
 );
}

/* ══════════════ 정문 1: IBS ══════════════ */
function recommendIBS(patient, DATA) {
 const { FGID_DRUGS } = DATA;
 const flags = [];
 const subtype = patient.ibsSubtype || "ibs:sub:u"; // c/d/m/u

 // 배제진단 게이트 (조언자: 진단상태 flag)
 const alarms = (patient.alarms || []);
 if (alarms.length === 0 && patient.labsNormal) {
  flags.push({ type: "diagnosis", value: "positive", msg: "경고증상 없음+기본검사 정상 → 양성진단 가능, 즉시 치료" });
 } else if (alarms.length > 0) {
  flags.push({ type: "diagnosis", value: "needs_workup", msg: `경고증상(${alarms.length}) → 대장내시경 등 표적 배제검사 우선`, alarms });
 } else {
  flags.push({ type: "diagnosis", value: "provisional", msg: "기본검사 확인 필요 → 잠정 권고" });
 }

 // 아형별 indication 태그
 const tagMap = {
  "ibs:sub:c": ["ibs:sub:c", "ibs:all"],
  "ibs:sub:d": ["ibs:sub:d", "ibs:all"],
  "ibs:sub:m": ["ibs:all"],
  "ibs:sub:u": ["ibs:all"]
 };
 const painTags = patient.painPredominant ? ["ibs:pain"] : [];
 const tags = [...(tagMap[subtype] || ["ibs:all"]), ...painTags];

 const candidates = collectCandidates(FGID_DRUGS, tags);
 const drugs = rankDrugs(candidates, patient, "ibs");

 // 상충 flag 승격
 drugs.filter(d => d.axisConflict).forEach(d => {
  flags.push({ type: "axis_conflict", drugId: d.drugId,
   msg: `${d.nameKo}: 등급 높으나 ${d.domestic ? (d.reimb.covered ? "급여 까다로움" : "비급여") : "국내 미시판"} — 판단은 임상의` });
 });

 // 비약물 targets (식이·정신요법 등 권고)
 const targets = [
  { id: "ibs:rec:fodmap", label: "저FODMAP 식이(조언자: 개인 트리거는 3상으로만 확인)" },
  ...(patient.refractory ? [{ id: "ibs:rec:psychotherapy", label: "장지향 정신요법(난치성)" }] : [])
 ];

 return { drugs, targets, flags };
}

/* ══════════════ 정문 2: 만성변비 ══════════════ */
function recommendConstipation(patient, DATA) {
 const { FGID_DRUGS } = DATA;
 const flags = [];
 const subtype = patient.conSubtype || "con:sub:normal";

 // 배변장애형 감별 flag
 if (patient.rectalExamAbnormal) {
  flags.push({ type: "diagnosis", value: "defecatory_suspect",
   msg: "직장수지 이상 → 배변장애형 의심, 생리검사(항문직장내압·풍선배출) 고려. 완하제 불응시 바이오피드백" });
 }

 const tagMap = {
  "con:sub:normal": ["con:sub:normal"],
  "con:sub:slow": ["con:sub:slow", "con:sub:normal", "con:refractory"],
  "con:sub:defecatory": ["con:sub:normal"] // 약물보다 바이오피드백 우선(target)
 };
 const tags = tagMap[subtype] || ["con:sub:normal"];
 const candidates = collectCandidates(FGID_DRUGS, tags);
 const drugs = rankDrugs(candidates, patient, "con");

 // CKD 환자 마그네슘 경고 승격
 if ((patient.comorbids || []).includes("comorbid:ckd") || (patient.comorbids || []).includes("comorbid:ckd_severe")) {
  flags.push({ type: "safety", msg: "CKD 동반 → 마그네슘염 고Mg혈증 위험(신장애 투여금기). PEG·비흡수당 선호" });
 }

 drugs.filter(d => d.axisConflict).forEach(d => {
  flags.push({ type: "axis_conflict", drugId: d.drugId,
   msg: `${d.nameKo}: 등급 높으나 ${d.domestic ? (d.reimb.strict ? "급여 조건 있음" : "급여 확인") : "국내 미시판"}` });
 });

 const targets = [];
 if (subtype === "con:sub:defecatory") {
  targets.push({ id: "con:rec:biofeedback", label: "바이오피드백(배변장애형 1차, 약물보다 우선)" });
 }
 targets.push({ id: "con:diet", label: "수분·식이섬유(수용성)" });

 return { drugs, targets, flags };
}

/* ══════════════ 정문 3: 만성설사 (2단계 깔때기) ══════════════ */
function classifyDiarrhea(patient, DIA_CLASSES) {
 // 환자 단서 → 8분류 후보 반환 (조언자: 감별 리스트, 단정 아님)
 const hits = [];
 const c = patient.diarrheaClues || {};
 if (c.drugHistory) hits.push("dia:class:drug");
 if (c.dietExcess) hits.push("dia:class:food");
 if (c.systemicSx) hits.push("dia:class:systemic");
 if (c.antibioticHistory || c.travel) hits.push("dia:class:infectious");
 if (c.alarmFeatures) { hits.push("dia:class:organic"); hits.push("dia:class:organic_mc"); }
 if (c.bileAcidRisk || c.cholecystectomy) hits.push("dia:class:bileacid");
 // 기본: 복통 유무로 기능성 vs IBS-D
 if (c.abdominalPain) hits.push("dia:class:ibsd");
 else hits.push("dia:class:functional");
 return hits.map(id => DIA_CLASSES[id]).filter(Boolean);
}

function recommendDiarrhea(patient, DATA) {
 const { FGID_DRUGS, DIA_CLASSES } = DATA;
 const flags = [];

 // 1단계: 분류
 const classification = classifyDiarrhea(patient, DIA_CLASSES);
 flags.push({ type: "classification", value: classification.map(c => c.id),
  msg: `감별 후보: ${classification.map(c => c.nameKo).join(", ")}` });

 // 경고증상시 대장내시경 우선
 if ((patient.diarrheaClues || {}).alarmFeatures) {
  flags.push({ type: "diagnosis", value: "colonoscopy_first",
   msg: "경고증상 → 대장내시경+무작위생검(MC 배제) 우선. 치료는 배제 후" });
 }

 // 2단계: 기능성/IBS-D/담즙산 확정시 치료 후보
 const classIds = classification.map(c => c.id);
 const tags = [];
 if (classIds.includes("dia:class:functional")) tags.push("dia:class:functional");
 if (classIds.includes("dia:class:ibsd")) tags.push("dia:class:ibsd");
 if (classIds.includes("dia:class:bileacid")) tags.push("dia:class:bileacid");
 if (classIds.includes("dia:class:organic_mc")) tags.push("dia:class:organic_mc");

 const candidates = collectCandidates(FGID_DRUGS, tags);
 const drugs = rankDrugs(candidates, patient, "dia");

 drugs.filter(d => d.axisConflict).forEach(d => {
  flags.push({ type: "axis_conflict", drugId: d.drugId,
   msg: `${d.nameKo}: ${d.domestic ? "급여 확인" : "국내 미시판"}` });
 });

 const targets = [
  { id: "dia:rec:lifestyle", label: "저FODMAP·생활교정(기능성/IBS-D)" }
 ];
 if (classIds.includes("dia:class:bileacid")) {
  targets.push({ id: "dia:bad:empiric", label: "담즙산설사: cholestyramine 경험적(유럽 권고/영·캐 비권고 상충)" });
 }

 return { drugs, targets, flags, classification };
}




/* ===== fgid_library_render.js ===== */
/* ============================================================
   FGID 도서관 렌더러 v2 (당뇨 구조 이식)
   3카테고리(pay/clin/care) 홈 → 토픽 카드 → libDetail(블록 렌더)
   블록: figure·keypoints·ladder·matrix·drugclass·ddx·codetable·rct·foodtable 등
   전역 함수로 노출 (조립 시 UI IIFE에서 호출). window에 부착.
   ============================================================ */
(function(){
  "use strict";

  // 상태
  var libV2 = { view:"home", topicId:null, query:"" };

  // esc 헬퍼
  function esc(s){ return String(s==null?"":s).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];}); }

  // ── 진입점 ──
  window.renderLibraryV2 = function(){
    var el = document.getElementById("library-content");
    if(!el) return;
    el.innerHTML =
      '<div class="lib-search"><span class="si">🔍</span>'+
      '<input type="text" id="libSearch" placeholder="약물·기전·개념·논문 찾기" value="'+esc(libV2.query)+'">'+
      '<button class="clr" id="libClr" type="button" aria-label="지우기">✕</button></div>'+
      '<div id="libBody"></div>';
    var inp = document.getElementById("libSearch");
    inp.oninput = function(e){ libV2.query = e.target.value.trim(); libV2.view = libV2.query?"search":"home"; paintLib(); };
    document.getElementById("libClr").onclick = function(){ libV2.query=""; libV2.view="home"; inp.value=""; paintLib(); };
    paintLib();
  };

  function paintLib(){
    var body = document.getElementById("libBody");
    if(libV2.view==="search") body.innerHTML = renderSearch();
    else if(libV2.view==="detail") body.innerHTML = renderDetail(libV2.topicId);
    else body.innerHTML = renderHome();
    wireLib(body);
  }

  // ── 홈: 카테고리별 토픽 그리드 ──
  function renderHome(){
    var cats = FGID_LIB_CATS;
    var order = ["clin","care","pay"];
    var html = "";
    order.forEach(function(catKey){
      var cat = cats[catKey];
      var topics = FGID_LIBRARY.filter(function(t){ return t.cat===catKey; });
      if(!topics.length) return;
      html += '<div class="lib-catsec lib-cat-'+catKey+'">'+
              '<div class="lib-cathead">'+cat.em+' '+cat.name+' <span class="lib-catdesc">'+esc(cat.desc)+'</span></div>'+
              '<div class="lib-topicgrid">';
      topics.forEach(function(t){
        html += '<div class="lib-topic lib-cat-'+catKey+'" data-topic="'+t.id+'">'+
                '<span class="lt-icon">'+t.icon+'</span>'+
                '<div class="lt-txt"><div class="lt-title">'+esc(t.title)+'</div>'+
                '<div class="lt-sub">'+esc(t.sub)+'</div></div>'+
                '<span class="lt-arrow">▶</span></div>';
      });
      html += '</div></div>';
    });
    return html;
  }

  // ── 상세: 토픽의 sections 블록 렌더 ──
  function renderDetail(topicId){
    var t = FGID_LIBRARY.find(function(x){ return x.id===topicId; });
    if(!t) return renderHome();
    var html = '<div class="lib-crumb"><button class="back" data-back="home">← 도서관</button>'+
               '<span class="crumb-sep">/</span><span class="crumb-here">'+t.icon+' '+esc(t.title)+'</span></div>';
    html += '<div class="lib-detail lib-cat-'+t.cat+'">';
    t.sections.forEach(function(s){ html += renderBlock(s, t); });
    html += '</div>';
    return html;
  }

  // ── 블록 렌더러 (타입별) ──
  function renderBlock(s, topic){
    var h = "";
    var title = s.title ? '<div class="blk-title">'+esc(s.title)+'</div>' : "";
    switch(s.type){
      case "keypoints":
        h = title + '<ul class="blk-kp">'+ s.items.map(function(it){ return '<li>'+esc(it)+'</li>'; }).join("") +'</ul>';
        break;
      case "ladder":
        h = title + '<div class="blk-ladder">'+ s.items.map(function(it){
          return '<div class="lad-row'+(it.danger?" danger":"")+'"><span class="lad-n">'+esc(it.n)+'</span>'+
                 '<div><div class="lad-h">'+esc(it.h)+'</div><div class="lad-b">'+esc(it.b)+'</div></div></div>';
        }).join("") +'</div>';
        break;
      case "figure":
        h = renderFigure(s);
        break;
      case "frame":
        h = '<div class="blk-frame"><div class="bf-q">'+esc(s.q)+'</div><div class="bf-a">'+esc(s.a)+'</div></div>';
        break;
      case "drugreimb":
        h = title + renderDrugReimb();
        break;
      case "reimbmatrix":
        h = title + renderReimbMatrix();
        break;
      case "codetable":
        h = title + (s.note?'<div class="blk-note">'+esc(s.note)+'</div>':"") + renderCodeTable();
        break;
      case "drugclass-all":
        h = title + renderDrugClassAll();
        break;
      case "conceptlist":
        h = title + renderRefList(s.refs, "concept");
        break;
      case "ddx":
        h = title + renderRefList(s.refs, "ddx");
        break;
      case "history":
        h = title + renderRefList(s.refs, "history");
        break;
      case "rctlist":
        h = title + renderRefList(s.refs, "rct");
        break;
      case "triggerchart":
        h = title + renderTriggerChart();
        break;
      case "foodtable":
        h = title + renderFoodTable();
        break;
      default:
        h = title + '<div class="blk-note">('+esc(s.type)+')</div>';
    }
    return '<div class="lib-block">'+h+'</div>';
  }

  // figure: SVG + 클릭 노드 (기본 + 심화 도식)
  function renderFigure(s){
    var fig = (typeof FGID_FIGURES!=="undefined") ? FGID_FIGURES[s.fig] : null;
    if(!fig && typeof FGID_FIGURES_DEEP!=="undefined") fig = FGID_FIGURES_DEEP[s.fig];
    if(!fig) return '<div class="blk-note">[모식도 없음]</div>';
    return '<figure class="blk-figure">'+ fig.svg +
           '<figcaption>📊 '+esc(s.caption||"")+'</figcaption></figure>';
  }

  // 급여 매트릭스 — 이중축(가이드라인 권고 × 국내 급여)
  function renderReimbMatrix(){
    // 대표 약물만 (급여 판단이 임상적으로 중요한 것들)
    var picks = ["drug:ramosetron","drug:prucalopride","drug:rifaximin","drug:otilonium",
                 "drug:polyethylene_glycol","drug:amitriptyline","drug:cholestyramine","drug:budesonide",
                 "drug:linaclotide","drug:lubiprostone"];
    var rows = picks.map(function(id){
      var d = FGID_DRUGS[id]; if(!d) return "";
      var r = d.reimb||{};
      // 가이드라인 축
      var g = d.grade ? (Object.keys(d.grade).map(function(k){return d.grade[k];})[0]||{}) : {};
      var gTxt, gCls;
      if(g.strength==="strong"){ gTxt="강함"; gCls="gm-strong"; }
      else if(g.strength==="weak"){ gTxt="조건부"; gCls="gm-weak"; }
      else { gTxt="—"; gCls="gm-na"; }
      // 급여 축
      var pTxt, pCls;
      if(d.domestic===false){ pTxt="국내 없음"; pCls="pm-none"; }
      else if(r.covered && r.strict){ pTxt="급여(조건)"; pCls="pm-strict"; }
      else if(r.covered){ pTxt="급여"; pCls="pm-ok"; }
      else { pTxt="비급여"; pCls="pm-no"; }
      // 상충 표시: 가이드 강함인데 급여 안 됨 → 경고
      var conflict = (g.strength && (d.domestic===false || !r.covered));
      return '<div class="rm-row'+(conflict?" rm-conflict":"")+'">'+
             '<div class="rm-nm">'+esc(d.nameKo)+(conflict?' <span class="rm-flag">⚠️ 상충</span>':"")+'</div>'+
             '<div class="rm-cell '+gCls+'">'+gTxt+'</div>'+
             '<div class="rm-cell '+pCls+'">'+pTxt+'</div></div>';
    }).join("");
    return '<div class="blk-reimbmatrix">'+
           '<div class="rm-head"><div class="rm-nm">약물</div><div class="rm-cell">가이드라인</div><div class="rm-cell">국내 급여</div></div>'+
           rows +
           '<div class="rm-legend">⚠️ 상충 = 가이드라인 권고가 있으나 국내 급여가 안 되는 경우입니다. 실제 청구 전 최신 고시를 확인하세요.</div></div>';
  }

  // 약물별 급여 요지 — 컴팩트 표
  function renderDrugReimb(){
    var rows = "";
    Object.keys(FGID_DRUGS).forEach(function(id){
      var d = FGID_DRUGS[id], r = d.reimb||{};
      if(!(r.notice||r.indication||r.strict||r.note||d.domestic===false)) return;
      var badge = d.domestic===false ? '<span class="rt-badge rt-none">국내無</span>' :
        (r.covered&&r.strict) ? '<span class="rt-badge rt-strict">조건</span>' :
        r.covered ? '<span class="rt-badge rt-ok">급여</span>' : '<span class="rt-badge rt-no">비급여</span>';
      var detail = d.domestic===false ? (d.domesticNote||"국내 미시판") :
        [r.indication||"", r.notice||"", r.note||""].filter(Boolean).join(" · ");
      rows += '<tr><td class="rt-nm">'+esc(d.nameKo)+'</td><td class="rt-st">'+badge+'</td>'+
              '<td class="rt-dt">'+esc(detail)+'</td></tr>';
    });
    return '<table class="blk-reimbtable"><thead><tr>'+
           '<th>약물</th><th>급여</th><th>조건 · 고시</th></tr></thead><tbody>'+rows+'</tbody></table>';
  }

  // 급병코드 표
  function renderCodeTable(){
    if(typeof ICD_CODES==="undefined") return "";
    return '<div class="blk-codetable">'+ ICD_CODES.map(function(c){
      return '<div class="ct-row"><span class="ct-code">'+esc(c.code)+'</span>'+
             '<span class="ct-ko">'+esc(c.ko)+'</span>'+(c.note?'<span class="ct-note">'+esc(c.note)+'</span>':"")+'</div>';
    }).join("") +'</div>';
  }

  // 계열별 상세 (6필드 + 성분) — 대분류 → 계열 아코디언
  function renderDrugClassAll(){
    if(typeof DRUGCLASS_PARENTS==="undefined") return "";
    var html = "";
    DRUGCLASS_PARENTS.forEach(function(p){
      html += '<div class="dc-parent"><div class="dc-parent-h">'+p.em+' '+esc(p.name)+'</div>';
      p.classes.forEach(function(cid){
        var c = FGID_DRUGCLASS[cid]; if(!c) return;
        html += drugClassCard(c);
      });
      html += '</div>';
    });
    return '<div class="blk-drugclass">'+html+'</div>';
  }

  function drugClassCard(c){
    // 6필드 + 성분 members
    var fields = [
      ["기전", c.mechanism],["효과", c.effect],["부작용", c.ae],
      ["금기", c.contra],["특징", c.feature],["급여", c.reimb]
    ];
    var body = '<dl class="dc-fields">'+ fields.map(function(f){
      return '<dt>'+f[0]+'</dt><dd'+(f[0]==="급여"?' class="dc-reimb"':"")+'>'+esc(f[1])+'</dd>';
    }).join("") +'</dl>';
    // 성분
    var mem = (c.members||[]).map(function(mid){
      var d = FGID_DRUGS[mid]||{};
      var det = (typeof FGID_DRUG_DETAIL!=="undefined") ? (FGID_DRUG_DETAIL[mid]||{}) : {};
      var brand = det.brand ? ' <span class="dcm-brand">'+esc(det.brand)+'</span>' : "";
      var dose = d.dose ? '<div class="dcm-dose">💊 '+esc(d.dose)+'</div>' : "";
      var adj = d.doseAdjust ? '<div class="dcm-adj">⚙️ '+Object.keys(d.doseAdjust).map(function(k){
        return adjLabel(k)+" → "+d.doseAdjust[k]; }).join(" · ")+'</div>' : "";
      var tip = det.tip ? '<div class="dcm-tip">'+esc(det.tip)+'</div>' : "";
      var na = d.domestic===false ? ' <span class="badge edu" style="font-size:9px">국내 미시판</span>' : "";
      return '<div class="dc-member"><div class="dcm-nm">'+esc(d.nameKo||mid)+brand+na+'</div>'+dose+adj+tip+'</div>';
    }).join("");
    return '<div class="dc-card"><div class="dc-head">'+esc(c.title)+
           ' <span class="dc-toggle">▶</span></div>'+
           '<div class="dc-body">'+body+'<div class="dc-members">'+mem+'</div></div></div>';
  }

  function adjLabel(k){
    var m = {"elderly":"고령","comorbid:ckd_severe":"CKD(중증)","comorbid:ckd":"CKD","comorbid:hepatic_impairment":"간장애"};
    return m[k]||k;
  }

  // 참조 리스트 (concept/ddx/history/rct 공통) — LIB DATA 인용
  function renderRefList(refs, kind){
    if(!refs) return "";
    var all = getLibAll();
    return '<div class="blk-reflist">'+ refs.map(function(rid){
      var it = all[rid]; if(!it) return "";
      if(kind==="concept") return conceptCard(it, rid);
      return libItemCard(it, kind);
    }).join("") +'</div>';
  }

  // 심화 개념 카드 (FGID_CONCEPT_DEEP 다층 섹션)
  function conceptCard(it, rid){
    var deep = (typeof FGID_CONCEPT_DEEP!=="undefined") ? FGID_CONCEPT_DEEP[rid] : null;
    var core = it.core || "";
    var body = "";
    if(deep && deep.sections){
      body += deep.sections.map(function(s){
        return '<div class="cd-sec"><div class="cd-h">'+esc(s.h)+'</div><div class="cd-b">'+esc(s.b)+'</div></div>';
      }).join("");

  function renderSearch(){

    m.style.display="flex";

  function renderPatientInput(){
    patientState = {};
    const schema = INPUT_SCHEMA[currentDisease];
    let html = `<div class="patient-panel"><h3>환자 정보 입력</h3>`;
    for(const [k,f] of Object.entries(schema)){
      html += `<div class="field-row"><label>${f.label}</label><div class="chip-group">`;
      if(f.type==="single"||f.type==="multi"){
        f.opts.forEach(([val,lbl])=>{
          html += `<span class="chip" data-field="${k}" data-val="${val}" data-type="${f.type}">${lbl}</span>`;
        });
      } else if(f.type==="toggle"){
        html += `<span class="chip" data-field="${k}" data-type="toggle">해당</span>`;
      }
      html += `</div></div>`;
    }
    html += `<button class="run-btn" id="run-recommend">💊 근거·급여 기반 추천 보기</button></div>`;
    document.getElementById("patient-input").innerHTML = html;

    // chip 이벤트
    document.querySelectorAll("#patient-input .chip").forEach(c=>{
      c.onclick = ()=>{
        const type = c.dataset.type;
        if(type==="single"){
          c.parentNode.querySelectorAll(".chip").forEach(x=>x.classList.remove("on"));
          c.classList.add("on");
        } else {
          c.classList.toggle("on");
        }
      };
    });
    document.getElementById("run-recommend").onclick = runRecommend;
  }

  /* ── 입력 → patient 객체 빌드 ── */
  function buildPatient(){
    const schema = INPUT_SCHEMA[currentDisease];
    const p = { comorbids:[], alarms:[], diarrheaClues:{} };
    document.querySelectorAll("#patient-input .chip.on").forEach(c=>{
      const fk = c.dataset.field, f = schema[fk], val = c.dataset.val;
      if(f.type==="single"){ p[f.key] = val; }
      else if(f.type==="multi"){ (p[f.key]=p[f.key]||[]).push(val); }
      else if(f.type==="toggle"){
        if(f.comorbid) p.comorbids.push(f.comorbid);
        else if(f.setAge) p.age = f.setAge;
        else if(f.clue) p.diarrheaClues[f.clue] = true;
        else p[f.key] = true;
      }
    });
    return p;
  }

  /* ── 추천 실행 ── */
  function runRecommend(){
    const p = buildPatient();
    let res;
    if(currentDisease==="ibs") res = recommendIBS(p, DATA);
    else if(currentDisease==="con") res = recommendConstipation(p, DATA);
    else res = recommendDiarrhea(p, DATA);
    renderResult(res);
  }

  function renderResult(res){

      h.onclick = ()=> h.parentNode.classList.toggle("open");

  }

      e.stopPropagation();
      const targetId = l.dataset.libjump;

      document.querySelectorAll("nav.tabs button").forEach(x=>x.classList.remove("active"));

      document.querySelector('.tab-panel[data-panel="library"]').classList.add("active");

      libQuery = item ? item.nameKo : "";

  // 결과 내부(카드+flags+targets) — 플로우·시뮬 공유
  function renderResultInner(res){
    let html = "";
    // flags
    if(res.flags && res.flags.length){
      html += `<div class="flags">`;
      res.flags.forEach(f=>{
        const icon = {diagnosis:"🔍",axis_conflict:"⚖️",safety:"⚠️",classification:"🗂️"}[f.type]||"ℹ️";
        const msg = f.msg || (f.value ? `${f.type}: ${f.value}` : JSON.stringify(f));
        html += `<div class="flag ${f.type}"><span class="fi">${icon}</span><span>${msg}</span></div>`;
      });
      html += `</div>`;
    }
    // 약물 카드
    if(res.drugs && res.drugs.length){
      html += `<div class="rank-note">가이드라인 권고등급 순으로 정렬했습니다. 순위는 참고 목적이며, 카드를 누르면 자세한 내용을 볼 수 있습니다.</div>`;
      res.drugs.forEach((d,i)=> html += drugCard(d,i+1));
    }
    // targets
    if(res.targets && res.targets.length){
      html += `<div class="targets"><h4>🎯 비약물·병행 권고</h4>`;
      res.targets.forEach(t=> html += `<div class="target-item">${t.label}</div>`);
      html += `</div>`;
    }
    return html;
  }

  /* ── 약물 카드 HTML (이중축 배지 + 전문가 밀도) ── */
  function drugCard(d, rank){
    const drug = DATA.FGID_DRUGS[d.drugId] || {};
    const g = d.grade;
    // 등급 배지
    let gradeBadge;
    if(g.strength==="strong") gradeBadge = `<span class="badge grade-strong">📊 강함/${evKo(g.evidence)}</span>`;
    else if(g.strength==="weak") gradeBadge = `<span class="badge grade-weak">📊 조건부/${evKo(g.evidence)}</span>`;
    else gradeBadge = `<span class="badge grade-na">📊 등급 없음</span>`;
    // 급여 배지
    let reimbBadge;
    if(!d.domestic) reimbBadge = `<span class="badge edu">🌐 국내 미시판</span>`;
    else if(d.reimb.covered && d.reimb.strict) reimbBadge = `<span class="badge reimb-strict">💰 급여(조건)</span>`;
    else if(d.reimb.covered) reimbBadge = `<span class="badge reimb-ok">💰 급여</span>`;
    else reimbBadge = `<span class="badge reimb-no">💰 비급여</span>`;
    const conflictBadge = d.axisConflict ? `<span class="badge conflict">⚖️ 상충</span>` : "";
    const verifyMark = d.reimb.verify ? ` <span style="color:var(--reimb-strict);font-size:10px">⟳검증</span>` : "";
    const cls = (drug.class||"").replace("class:","");
    const cardCls = [d.educationOnly?"edu":"", d.contraindicated?"contra":""].filter(Boolean).join(" ");

    // ── body: 계층적 상세 (핵심 dl + 접이식 근거/기전) ──
    let body = `<dl>`;
    if(drug.dose) body += `<dt>용량</dt><dd>${drug.dose}</dd>`;
    body += `<dt>권고</dt><dd>${gradeText(g)}${g.source?` <span style="color:var(--ink3)">(${g.source})</span>`:""}</dd>`;
    // 용량조정 (CKD·고령·간)
    if(drug.doseAdjust){
      const adj = Object.entries(drug.doseAdjust).map(([k,v])=>`${adjKo(k)} → ${v}`).join(" · ");
      body += `<dt>용량조정</dt><dd class="caution">${adj}</dd>`;
    }
    if(drug.cautions&&drug.cautions.length) body += `<dt>주의</dt><dd class="caution">${drug.cautions.join(" · ")}</dd>`;
    if(d.safety&&d.safety.length) body += `<dt>안전</dt><dd class="caution">${d.safety.map(s=>s.reason).join(" · ")}</dd>`;
    if(drug.domesticNote) body += `<dt>국내</dt><dd>${drug.domesticNote}</dd>`;
    body += `</dl>`;

    // ── 근거 권고 (RECS 연결, 효과크기) ──
    const recs = findRecsForDrug(d.drugId, currentDisease);
    if(recs.length){
      body += `<div class="drug-evidence"><div class="de-h">📋 근거 권고</div>`;
      recs.forEach(r=>{
        body += `<div class="de-item">${r.statement}`;
        if(r.effect) body += ` <span class="de-effect">${r.effect}</span>`;
        if(r.consensus) body += ` <span class="de-meta">합의 ${r.consensus}</span>`;
        body += `</div>`;
      });
      body += `</div>`;
    }

    // ── 급여 상세 ──
    body += `<div class="reimb-detail">💰 `;
    if(d.reimb.indication) body += `<b>적응</b> ${d.reimb.indication} · `;
    if(d.reimb.notice) body += `<b>고시</b> ${d.reimb.notice} · `;
    body += d.reimb.note || (d.reimb.covered?"급여":"비급여");
    if(d.reimb.verify) body += ` <span style="color:var(--reimb-strict)">[코딩직전 재검증 대상]</span>`;
    body += `</div>`;

    // ── 도서관 크로스링크 (기전·RCT) ──
    let links = "";
    const mech = (typeof LIB_MECH!=="undefined") && Object.values(LIB_MECH).find(m=>m.target===d.drugId);
    if(mech) links += `<span class="drug-lnk" data-libjump="${mech.id}">⚙️ 기전</span>`;
    const rcts = (typeof LIB_RCT!=="undefined") ? Object.values(LIB_RCT).filter(rc=>(rc.links||[]).includes(d.drugId)) : [];
    rcts.forEach(rc=> links += `<span class="drug-lnk" data-libjump="${rc.id}">📊 ${rc.pmid?("PMID "+rc.pmid):"RCT"}</span>`);
    if(links) body += `<div class="drug-links">${links}</div>`;

    return `<div class="drug-card ${cardCls}">
      <div class="drug-head">
        <span class="drug-rank">${rank}</span>
        <span class="drug-name">${d.nameKo}<span class="cls">${cls}</span></span>
        <span class="badges">${gradeBadge}${reimbBadge}${conflictBadge}${verifyMark}</span>
        <span class="drug-toggle">▶</span>
      </div>
      <div class="drug-body">${body}</div>
    </div>`;
  }

  // 약물 ID로 해당 질환 RECS 찾기 (값 복제 없이 참조)
  function findRecsForDrug(drugId, disease){
    if(typeof FGID_RECS==="undefined") return [];
    return Object.values(FGID_RECS).filter(r=>
      r.disease===disease && (r.links||[]).includes(drugId));
  }
  function adjKo(k){ return {elderly:"고령", "comorbid:ckd_severe":"CKD(중증)", "comorbid:ckd":"CKD", "comorbid:hepatic_impairment":"간장애"}[k]||k; }

  function evKo(e){ return {high:"높음",moderate:"중간",low:"낮음",very_low:"매우낮음",none:"—",na:"—"}[e]||e; }
  function gradeText(g){
    const s = {strong:"강한 권고",weak:"조건부 권고",na:"등급 없음"}[g.strength]||g.strength;
    return `${s} · 근거수준 ${evKo(g.evidence)}`;
  }

  /* ── 출처 푸터 ── */
  function renderSources(){
    let html = `<h4>📖 출처 · 근거</h4><ul>`;
    Object.values(FGID_SOURCES).forEach(s=>{
      const link = s.url ? `<a href="${s.url}" target="_blank" rel="noopener">${s.title}</a>` : s.title;
      html += `<li>· ${link}${s.doi?` <span style="color:var(--ink3)">DOI ${s.doi}</span>`:""}</li>`;
    });
    html += `</ul>`;
    document.getElementById("sources-footer").innerHTML = html;
  }

  /* ══════════ 도서관 섹션 (허브 → 드릴다운) ══════════ */
  // LIB 5종 통합 인덱스
  function buildLibIndex(){
    const idx = [];
    const push = (obj, type) => { if(typeof obj==="object") Object.values(obj).forEach(o => idx.push({ ...o, _type: type })); };
    push(typeof LIB_CONCEPTS!=="undefined"?LIB_CONCEPTS:{}, "concept");
    push(typeof LIB_MECH!=="undefined"?LIB_MECH:{}, "mech");
    push(typeof LIB_RCT!=="undefined"?LIB_RCT:{}, "rct");
    push(typeof LIB_DDX!=="undefined"?LIB_DDX:{}, "ddx");
    push(typeof LIB_HISTORY!=="undefined"?LIB_HISTORY:{}, "history");
    return idx;
  }
  const LIB_INDEX = buildLibIndex();
  const LIB_TYPE_KO = { concept:"핵심개념", mech:"기전", rct:"근거 논문", ddx:"감별진단", history:"약물 변천", drug:"약물", code:"급여코드" };

    { id:"concept", em:"🧠", name:"핵심 개념",       desc:"병태생리의 뿌리" },
    { id:"mech",    em:"⚙️", name:"약물 작용 기전",  desc:"수용체·경로" },
    { id:"rct",     em:"📊", name:"근거 논문",       desc:"주요 임상시험" },
    { id:"ddx",     em:"🔬", name:"감별진단",        desc:"배제할 질환·검사" },
    { id:"history", em:"📜", name:"약물 변천",       desc:"퇴출·교체 이력" },

    { id:"code",    em:"🏷️", name:"급여 상병코드",   desc:"ICD-10" }
  ];

  // 약물 기전별 중분류 (약물 라이브러리 드릴다운)
  const DRUG_GROUPS = [

    { id:"class:prokinetic_5ht4",  name:"5-HT₄ 작용제",     em:"🔵" },
    { id:"class:gcc_agonist",      name:"GC-C 작용제",       em:"🟢" },

  // ICD-10 상병코드 (급병코드 섹션 DATA — 스펙 §5)
  const ICD_CODES = [
    { code:"K58.0", ko:"IBS-D 설사형", note:"정문 IBS-D 분기" },

    { code:"K58.2", ko:"IBS-M 혼합형", note:"" },

    { code:"K59.00", ko:"변비 상세불명", note:"" },

    { code:"K52.82", ko:"호산구성 대장염", note:"" }
  ];

  let libView = "hub";       // hub | category | druggroup | search
  let libCatId = null;
  let libGroupId = null;
  let libQuery = "";

  function libCatCount(catId){
    if(catId==="drug") return Object.keys(DATA.FGID_DRUGS).length;
    if(catId==="code") return ICD_CODES.length;
    if(catId==="edu") return 5; // 교육 블록 수
    return LIB_INDEX.filter(it=>it._type===catId).length;
  }

  function renderLibrary(){
    const el = document.getElementById("library-content");
    let html = `
      <div class="lib-search">
        <span class="si">🔍</span>
        <input type="text" id="lib-search-input" placeholder="약물·기전·개념·논문 찾기" value="${libQuery}">
      </div>
      <div id="lib-view"></div>`;
    el.innerHTML = html;
    const input = document.getElementById("lib-search-input");
    input.oninput = (e)=>{
      libQuery = e.target.value.trim();
      libView = libQuery ? "search" : "hub";
      renderLibView();
    };
    renderLibView();
  }

  function renderLibView(){
    const box = document.getElementById("lib-view");
    if(libView==="search"){ box.innerHTML = renderSearchResults(); }
    else if(libView==="druggroup"){ box.innerHTML = renderDrugGroup(libGroupId); }
    else if(libView==="category"){ box.innerHTML = renderCategory(libCatId); }
    else { box.innerHTML = renderHub(); }
    attachLibEvents(box);
  }

  // ── 허브(대분류 카드 그리드) ──
  function renderHub(){
    let cards = LIB_CATEGORIES.map(c=>`
      <div class="hub-card" data-cat="${c.id}">
        <span class="hub-em">${c.em}</span>
        <div class="hub-txt">
          <div class="hub-name">${c.name}</div>
          <div class="hub-count">${c.desc} · ${libCatCount(c.id)}개</div>
        </div>
        <span class="hub-arrow">▶</span>
      </div>`).join("");
    return `<div class="lib-hub">${cards}</div>`;
  }

  // ── 분류 상세 ──
  function renderCategory(catId){
    const cat = LIB_CATEGORIES.find(c=>c.id===catId);
    let crumb = `<div class="lib-crumb">
      <button class="back" data-back="hub">← 도서관</button>
      <span class="crumb-sep">/</span>
      <span class="crumb-here">${cat.em} ${cat.name}</span></div>`;
    let items = "";
    if(catId==="drug"){
      // 약물: 기전별 중분류 카드
      items = `<div class="lib-hub">` + DRUG_GROUPS.map(gr=>{
        const n = Object.values(DATA.FGID_DRUGS).filter(d=>d.class===gr.id).length;
        if(!n) return "";
        return `<div class="hub-card" data-group="${gr.id}">
          <span class="hub-em">${gr.em}</span>
          <div class="hub-txt"><div class="hub-name">${gr.name}</div>
          <div class="hub-count">${n}개 성분</div></div>
          <span class="hub-arrow">▶</span></div>`;
      }).join("") + `</div>`;
    } else if(catId==="code"){
      items = renderCodeList();
    } else if(catId==="edu"){
      items = renderEduInLibrary();
    } else {
      const list = LIB_INDEX.filter(it=>it._type===catId);
      items = list.map(libCard).join("");
    }
    return crumb + items;
  }

  // ── 약물 기전그룹 → 약물 목록 ──
  function renderDrugGroup(groupId){
    const gr = DRUG_GROUPS.find(g=>g.id===groupId);
    const drugs = Object.values(DATA.FGID_DRUGS).filter(d=>d.class===groupId);
    let crumb = `<div class="lib-crumb">
      <button class="back" data-back="drug">← 약물 라이브러리</button>
      <span class="crumb-sep">/</span>
      <span class="crumb-here">${gr?gr.em:""} ${gr?gr.name:""}</span></div>`;
    return crumb + drugs.map(drugLibCard).join("");
  }

  // ── 검색 결과 ──
  function renderSearchResults(){
    const results = LIB_INDEX.filter(it=>libMatch(it, libQuery));
    const drugHits = Object.values(DATA.FGID_DRUGS).filter(d=>
      (d.nameKo||"").includes(libQuery) || (d.nameEn||"").toLowerCase().includes(libQuery.toLowerCase()));
    let html = `<div class="lib-crumb">
      <button class="back" data-back="hub">← 도서관</button>
      <span class="crumb-sep">/</span>
      <span class="crumb-here">🔍 "${libQuery}"</span></div>`;
    html += `<div class="lib-count">${results.length + drugHits.length}개</div>`;
    if(!results.length && !drugHits.length){
      return html + `<div class="lib-empty">찾는 항목이 없습니다.</div>`;
    }
    html += drugHits.map(drugLibCard).join("");
    html += results.map(libCard).join("");
    return html;
  }

  function libMatch(item, q){
    if(!q) return true;
    const hay = [item.nameKo, item.core, item.deep, item.mechanism, item.whyWorks,
      item.statement, item.pretest, item.timeline, item.lesson, item.clinicalPearl,
      (item.keyFindings||[]).join(" "), item.result, item.pmid,
      (item.keyDiscriminators||[]).join(" "), item.pitfall].filter(Boolean).join(" ").toLowerCase();
    return q.toLowerCase().split(/\s+/).every(w => hay.includes(w));
  }

  // ── 급병코드 ──
  function renderCodeList(){
    let rows = ICD_CODES.map(c=>`
      <div class="lib-card"><div class="lib-head" style="cursor:default">
        <span class="lib-type-tag lib-type-mech" style="font-family:var(--mono)">${c.code}</span>
        <div class="lib-head-main"><div class="lib-name" style="font-size:13.5px">${c.ko}</div>
        ${c.note?`<div class="lib-core">${c.note}</div>`:""}</div>
      </div></div>`).join("");
    return `<div style="font-size:11.5px;color:var(--ink3);margin-bottom:10px">ICD-10-CM 기준입니다. 국내 청구는 KCD 최신판과 대조하시기 바랍니다.</div>` + rows;
  }

  function attachLibEvents(box){
    box.querySelectorAll(".hub-card[data-cat]").forEach(c=> c.onclick = ()=>{
      libCatId = c.dataset.cat; libView = "category"; renderLibView();
      smoothScroll("library-content");
    });
    box.querySelectorAll(".hub-card[data-group]").forEach(c=> c.onclick = ()=>{
      libGroupId = c.dataset.group; libView = "druggroup"; renderLibView();
      smoothScroll("library-content");
    });
    box.querySelectorAll(".back").forEach(b=> b.onclick = ()=>{
      const dest = b.dataset.back;
      if(dest==="drug"){ libView = "category"; libCatId = "drug"; }
      else { libView = "hub"; libQuery = ""; const inp = document.getElementById("lib-search-input"); if(inp) inp.value = ""; }
      renderLibView();
    });
    box.querySelectorAll(".lib-head").forEach(h=>{
      if(h.style.cursor!=="default") h.onclick = ()=> h.parentNode.classList.toggle("open");

    box.querySelectorAll(".lnk").forEach(l=> l.onclick = (e)=>{
      e.stopPropagation();
      const t = l.dataset.target; const drug = DATA.FGID_DRUGS[t];
